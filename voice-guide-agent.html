<script>
  /* FIX 6: theme init wrapped in try/catch — prevents crash in sandboxed iframe contexts */
  (function(){
    try {
      var t = localStorage.getItem('qb-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch(e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<style>
/* BASE & VARIABLES */
html:not([data-theme]) { background:#080604; color:#A89A88; }

:root, [data-theme="dark"] {
  --bg-void: #080604;
  --bg-deep: #0A0806;
  --bg-base: #0E0C09;
  --bg-surface: rgba(140,110,70,0.045);
  --bg-elevated: rgba(140,110,70,0.07);
  --bg-overlay: rgba(18,15,10,0.85);
  --border-subtle: rgba(140,110,70,0.06);
  --border-medium: rgba(140,110,70,0.11);
  --border-strong: rgba(140,110,70,0.18);
  --patina: #3A5F4A;
  --patina-lit: #4A7A5E;
  --patina-dim: rgba(58,95,74,0.2);
  --patina-faint: rgba(58,95,74,0.08);
  --brass: #A8903E;
  --brass-lit: #C4A84E;
  --brass-dim: rgba(168,144,62,0.18);
  --brass-faint: rgba(168,144,62,0.06);
  --phase-discovery: #4A7A5E;
  --phase-creation: #4A7A8A;
  --phase-content: #8A5A5A;
  --phase-execution: #5A7A6A;
  --phase-intel: #A8903E;
  --text-1: #DDD4C4;
  --text-2: #A89A88;
  --text-3: #6A5E50;
  --text-4: #3E3830;
}

[data-theme="light"] {
  --bg-void: #F4F0EB;
  --bg-deep: #EDE8E2;
  --bg-base: #E6E0D8;
  --bg-surface: rgba(100,80,50,0.04);
  --bg-elevated: rgba(100,80,50,0.07);
  --bg-overlay: rgba(244,240,235,0.9);
  --border-subtle: rgba(100,80,50,0.08);
  --border-medium: rgba(100,80,50,0.14);
  --border-strong: rgba(100,80,50,0.22);
  --patina: #2E4E3C;
  --patina-lit: #3A6A4E;
  --patina-dim: rgba(46,78,60,0.15);
  --patina-faint: rgba(46,78,60,0.06);
  --brass: #8A7430;
  --brass-lit: #A08A3A;
  --brass-dim: rgba(138,116,48,0.15);
  --brass-faint: rgba(138,116,48,0.05);
  --phase-discovery: #2E5A42;
  --phase-creation: #2E5A6A;
  --phase-content: #6A3A3A;
  --phase-execution: #3A5A4A;
  --phase-intel: #8A7430;
  --text-1: #1A1610;
  --text-2: #5A5040;
  --text-3: #8A7E70;
  --text-4: #B8AEA0;
}

:root {
  --font-serif: 'DM Serif Display', Georgia, serif;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-void); color: var(--text-2); font-family: var(--font-sans); min-height: 100vh; overflow-x: hidden; }

body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}
[data-theme="light"] body::after { opacity: 0.02; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-void); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

.vignette { position: fixed; inset: 0; pointer-events: none; z-index: 1; background: radial-gradient(ellipse 80% 80% at 50% 20%, transparent 0%, var(--bg-deep) 100%); }
[data-theme="light"] .vignette { background: radial-gradient(ellipse 80% 80% at 50% 20%, transparent 0%, rgba(200,190,175,0.15) 100%); }
main { position: relative; z-index: 10; }

.qb-input, .qb-select, .qb-textarea {
  background: var(--bg-base); border: 1px solid var(--border-medium); color: var(--text-1);
  font-family: var(--font-sans); border-radius: 8px; padding: 12px 16px; font-size: 14px;
  width: 100%; outline: none; transition: all 0.25s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
}
.qb-textarea { resize: vertical; line-height: 1.7; }
.qb-select option { background: var(--bg-base); color: var(--text-1); }
.qb-input::placeholder, .qb-textarea::placeholder { color: var(--text-3); opacity: 0.7; font-style: italic; }
.qb-input:focus, .qb-textarea:focus, .qb-select:focus { border-color: var(--patina); box-shadow: 0 0 0 3px var(--patina-faint), 0 0 24px -4px var(--brass-faint); }

button { cursor: pointer; font-family: var(--font-sans); border: none; outline: none; }

.btn-primary {
  background: var(--patina); color: #E6DDD0; font-weight: 600; font-size: 11px;
  letter-spacing: 0.06em; text-transform: uppercase; padding: 13px 30px;
  border-radius: 7px; transition: all 0.25s ease; border: 1px solid transparent;
}
.btn-primary:hover:not(:disabled) { background: var(--patina-lit); transform: translateY(-1px); box-shadow: 0 4px 24px -4px rgba(58,95,74,0.3), 0 0 0 1px var(--brass-faint); }
.btn-primary:disabled { background: var(--bg-surface); color: var(--text-4); cursor: not-allowed; border: 1px solid var(--border-subtle); }

.btn-secondary {
  background: var(--bg-surface); border: 1px solid var(--border-medium); color: var(--text-2);
  padding: 8px 16px; border-radius: 6px; font-size: 11px; font-family: var(--font-mono);
  letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s ease;
}
.btn-secondary:hover { background: var(--bg-elevated); border-color: var(--border-strong); color: var(--text-1); }

.glass-card {
  background: var(--bg-surface); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-medium); border-radius: 12px; position: relative; overflow: hidden;
}
[data-theme="light"] .glass-card { background: var(--bg-overlay); }
.glass-card::before {
  content: ''; position: absolute; top: -30%; left: -10%; width: 60%; height: 60%;
  background: radial-gradient(ellipse at center, var(--brass-faint) 0%, transparent 70%); pointer-events: none;
}

.manifesto-block { position: relative; padding: 28px 0 28px 32px; }
.manifesto-block::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, var(--brass) 0%, var(--patina) 100%);
  border-radius: 2px; box-shadow: 0 0 12px var(--brass-faint);
}

.tab-btn {
  padding: 10px 20px; border-radius: 6px; font-size: 11px; letter-spacing: 0.12em;
  text-transform: uppercase; font-family: var(--font-mono); background: transparent;
  border: 1px solid transparent; color: var(--text-3); transition: all 0.25s ease; white-space: nowrap;
}
.tab-btn:hover { color: var(--text-1); }
.tab-btn.active { background: var(--bg-elevated); border-color: var(--border-medium); color: var(--brass); box-shadow: inset 0 1px 0 rgba(255,255,255,0.02); }

/* FIX 8: Slider — webkit + Firefox */
.slider-thumb { -webkit-appearance: none; width: 100%; height: 4px; background: var(--border-strong); border-radius: 2px; outline: none; cursor: pointer; }
.slider-thumb::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: var(--bg-void); cursor: pointer; border: 2px solid var(--patina);
  box-shadow: 0 0 8px var(--patina-faint); transition: transform 0.2s ease, border-color 0.2s ease;
}
.slider-thumb::-webkit-slider-thumb:hover { transform: scale(1.15); border-color: var(--patina-lit); }
.slider-thumb::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%; background: var(--bg-void);
  cursor: pointer; border: 2px solid var(--patina); box-shadow: 0 0 8px var(--patina-faint);
  transition: transform 0.2s ease, border-color 0.2s ease;
}
.slider-thumb::-moz-range-thumb:hover { transform: scale(1.15); border-color: var(--patina-lit); }
.slider-thumb::-moz-range-track { height: 4px; background: var(--border-strong); border-radius: 2px; }

.pill { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-family: var(--font-mono); margin: 3px; letter-spacing: 0.05em; }
.pill-patina { background: var(--patina-faint); color: var(--patina-lit); border: 1px solid var(--patina-dim); }
.pill-rose   { background: rgba(138,90,90,0.1); color: var(--phase-content); border: 1px solid rgba(138,90,90,0.2); }
.pill-brass  { background: var(--brass-faint); color: var(--brass); border: 1px solid var(--brass-dim); }
.pill-teal   { background: rgba(74,122,138,0.1); color: var(--phase-creation); border: 1px solid rgba(74,122,138,0.2); }
.pill-sage   { background: rgba(90,122,106,0.1); color: var(--phase-execution); border: 1px solid rgba(90,122,106,0.2); }

.pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brass); box-shadow: 0 0 12px var(--brass-dim), 0 0 2px var(--brass); animation: beat 3s ease infinite; }
@keyframes beat {
  0%, 100% { transform: scale(1); opacity: 1; }
  12% { transform: scale(1.35); opacity: 1; }
  24% { transform: scale(0.95); opacity: 0.6; }
  36% { transform: scale(1.15); opacity: 1; }
  48% { transform: scale(1); opacity: 0.7; }
}

.fade-in { animation: fadeIn 0.5s ease forwards; }
.slide-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

.ba-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; font-family: var(--font-mono); padding: 8px 16px; border-bottom: 1px solid var(--border-medium); }
.ba-text { padding: 20px 24px; font-size: 14px; line-height: 1.8; color: var(--text-1); }
.rule-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 16px 20px; margin-bottom: 8px; transition: border-color 0.2s, background 0.2s; }
.rule-card:hover { border-color: var(--border-strong); background: var(--bg-elevated); }
</style>

<script>
// QB_SPINE v2
(function(){
  var params = new URLSearchParams(window.location.search);
  // FIX 6: atob failure logged + flagged for React UI warning
  // FIX 10: consistent kebab-case localStorage keys
  var urlQBP = params.get('qbp');
  if(urlQBP){
    try{
      localStorage.setItem('qb-qbp', atob(urlQBP));
    }catch(e){
      console.warn('[QB] Invalid QBP token in URL:', e.message);
      try{ sessionStorage.setItem('qb_token_error','1'); }catch(se){}
    }
  }
  try{ window.QB_QBP = JSON.parse(localStorage.getItem('qb-qbp') || '{}'); }catch(e){ window.QB_QBP = {}; }

  // FIX 1: res.ok guard before res.json()
  // FIX 4: systemPrompt is now a static string; userPrompt carries dynamic QBP data
  // FIX 12: model ID corrected
  window.QB_AI = async function(systemPrompt, userPrompt, maxTokens){
    maxTokens = maxTokens || 4000;
    var body = {
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    };
    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error('API error ' + res.status + ': ' + res.statusText);
    var d = await res.json();
    if(d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    return d.content[0].text;
  };
})();
</script>

<body>
<div id="root"></div>

<script type="text/babel">
// FIX 7: removed unused useRef and useCallback
const { useState, useEffect } = React;

const NATURAL_FORCES = ['The Ocean','Lightning','Wildfire','The River','The Earthquake','The Sunrise'];
const ARCHETYPES     = ['The Rebel','The Sage','The Creator','The Ruler','The Magician','The Hero','The Explorer','The Caregiver','The Lover','The Jester','The Everyman','The Innocent'];
const MYTH_FIGURES   = ['The Alchemist','The Oracle','The Warrior','The Creator','The Sage','The Trickster','The Sovereign','The Healer'];
const OUTPUT_TABS    = ['Voice DNA','Writing Rules','Tone Modes','Before & After','Content Templates','Copy Generator'];

// SHARED UI
const MonoLabel = ({children,color,mb=8})=>(
  <div style={{fontFamily:'var(--font-mono)',fontSize:10,letterSpacing:'.2em',color:color||'var(--text-3)',textTransform:'uppercase',marginBottom:mb}}>{children}</div>
);
const Card = ({children,accent,style={}})=>(
  <div className="glass-card" style={{border:`1px solid ${accent||'var(--border-medium)'}`,padding:'24px',...style}}>{children}</div>
);
const Section = ({title,number,children,note})=>(
  <div style={{marginBottom:56}}>
    <div style={{display:'flex',alignItems:'baseline',gap:16,marginBottom:24,paddingBottom:16,borderBottom:'1px solid var(--border-medium)'}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--brass)',letterSpacing:'.2em'}}>0{number}</span>
      <span style={{fontFamily:'var(--font-serif)',fontSize:26,fontWeight:400,color:'var(--text-1)'}}>{title}</span>
      {note&&<span style={{fontFamily:'var(--font-sans)',fontSize:13,color:'var(--text-3)',fontStyle:'italic',marginLeft:'auto'}}>{note}</span>}
    </div>
    {children}
  </div>
);
const TF = ({label,value,onChange,placeholder,rows=2,hint})=>(
  <div style={{marginBottom:24}}>
    <MonoLabel>{label}</MonoLabel>
    {rows>1
      ? <textarea className="qb-textarea" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}/>
      : <input className="qb-input" type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>
    }
    {hint&&<div style={{fontSize:12,color:'var(--text-3)',marginTop:6,fontStyle:'italic'}}>{hint}</div>}
  </div>
);
const SF = ({label,options,value,onChange})=>(
  <div style={{marginBottom:24}}>
    <MonoLabel>{label}</MonoLabel>
    <select className="qb-select" value={value} onChange={e=>onChange(e.target.value)}>
      <option value="">&#8212; select &#8212;</option>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  </div>
);
const SliderF = ({label,left,right,value,onChange})=>(
  <div style={{marginBottom:28}}>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
      <MonoLabel mb={0}>{label}</MonoLabel>
      <span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--brass)'}}>{value}/10</span>
    </div>
    <input type="range" min={1} max={10} value={value} onChange={e=>onChange(parseInt(e.target.value))} className="slider-thumb" style={{marginBottom:8}}/>
    <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text-3)'}}>
      <span>{left}</span><span>{right}</span>
    </div>
  </div>
);

// VOICE DNA PANEL
const VoiceDNAPanel = ({data})=>{
  if(!data) return null;
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div className="manifesto-block">
        <MonoLabel color="var(--brass)">Voice Identity Statement</MonoLabel>
        <p style={{fontFamily:'var(--font-serif)',fontSize:28,lineHeight:1.4,color:'var(--text-1)'}}>{data.voiceIdentityStatement}</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:16}}>
        <Card accent="var(--phase-creation)">
          <MonoLabel color="var(--text-2)">Personality pillars</MonoLabel>
          {data.personalityPillars&&data.personalityPillars.map((p,i)=>(
            <div key={i} style={{padding:'12px 0',borderBottom:i<data.personalityPillars.length-1?'1px solid var(--border-subtle)':''}}>
              <div style={{fontSize:14,fontWeight:500,color:'var(--text-1)',marginBottom:4}}>{p.pillar}</div>
              <div style={{fontSize:13,color:'var(--text-2)',lineHeight:1.6}}>{p.inPractice}</div>
            </div>
          ))}
        </Card>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <Card accent="var(--phase-execution)">
            <MonoLabel color="var(--text-2)">Voice register</MonoLabel>
            <p style={{fontSize:14,color:'var(--text-1)',lineHeight:1.7}}>{data.voiceRegister}</p>
          </Card>
          <Card accent="var(--phase-intel)">
            <MonoLabel color="var(--text-2)">Rhythm + tempo</MonoLabel>
            <p style={{fontSize:14,color:'var(--text-1)',lineHeight:1.7}}>{data.rhythmTempo}</p>
          </Card>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <Card accent="var(--patina-dim)">
          <MonoLabel color="var(--patina-lit)">Sounds aligned with</MonoLabel>
          {data.alignedWith&&data.alignedWith.map((a,i)=>(
            <div key={i} style={{padding:'10px 0',borderBottom:i<data.alignedWith.length-1?'1px solid var(--border-subtle)':''}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text-1)',marginBottom:2}}>{a.brand}</div>
              <div style={{fontSize:12,color:'var(--text-3)'}}>{a.reason}</div>
            </div>
          ))}
        </Card>
        <Card accent="rgba(138,90,90,0.2)">
          <MonoLabel color="var(--phase-content)">Refuses to sound like</MonoLabel>
          {data.refuses&&data.refuses.map((r,i)=>(
            <div key={i} style={{padding:'10px 0',borderBottom:i<data.refuses.length-1?'1px solid var(--border-subtle)':''}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text-1)',marginBottom:2}}>{r.brand}</div>
              <div style={{fontSize:12,color:'var(--text-3)'}}>{r.reason}</div>
            </div>
          ))}
        </Card>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <Card>
          <MonoLabel color="var(--patina-lit)">Always</MonoLabel>
          {data.alwaysDoes&&data.alwaysDoes.map((a,i)=><span key={i} className="pill pill-patina">{a}</span>)}
        </Card>
        <Card>
          <MonoLabel color="var(--phase-content)">Never</MonoLabel>
          {data.neverDoes&&data.neverDoes.map((n,i)=><span key={i} className="pill pill-rose">{n}</span>)}
        </Card>
      </div>
      <Card accent="var(--brass-dim)">
        <MonoLabel color="var(--brass)">Sentence architecture</MonoLabel>
        <p style={{fontSize:14,color:'var(--text-1)',lineHeight:1.7,marginBottom:16}}>{data.sentenceArchitecture&&data.sentenceArchitecture.description}</p>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {data.sentenceArchitecture&&data.sentenceArchitecture.characteristics&&data.sentenceArchitecture.characteristics.map((c,i)=><span key={i} className="pill pill-brass">{c}</span>)}
        </div>
      </Card>
      {data.behavioralSynthesis&&(
        <div className="manifesto-block" style={{background:'var(--bg-surface)',border:'1px solid var(--border-subtle)',borderRadius:12}}>
          <MonoLabel color="var(--text-3)">Behavioral synthesis</MonoLabel>
          <p style={{fontFamily:'var(--font-serif)',fontSize:20,lineHeight:1.5,color:'var(--text-1)',fontStyle:'italic'}}>{data.behavioralSynthesis}</p>
        </div>
      )}
    </div>
  );
};

// WRITING RULES PANEL
const WritingRulesPanel = ({data})=>{
  if(!data||!data.writingRules) return null;
  const [open,setOpen]=useState(null);
  return(
    <div className="fade-in">
      {data.writingRulesIntro&&<p style={{fontSize:14,color:'var(--text-2)',lineHeight:1.7,marginBottom:24}}>{data.writingRulesIntro}</p>}
      {data.writingRules.map((rule,i)=>(
        <div key={i} className="rule-card" onClick={()=>setOpen(open===i?null:i)} style={{cursor:'pointer'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{
                fontFamily:'var(--font-mono)',fontSize:10,
                color:rule.type==='do'?'var(--patina-lit)':rule.type==='never'?'var(--phase-content)':'var(--brass)',
                border:'1px solid '+(rule.type==='do'?'var(--patina-dim)':rule.type==='never'?'rgba(138,90,90,0.3)':'var(--brass-dim)'),
                background:rule.type==='do'?'var(--patina-faint)':rule.type==='never'?'rgba(138,90,90,0.1)':'var(--brass-faint)',
                padding:'4px 10px',borderRadius:4
              }}>
                {rule.type==='do'?'DO':rule.type==='never'?'NEVER':'CAUTION'}
              </span>
              <span style={{fontSize:15,fontWeight:500,color:'var(--text-1)'}}>{rule.rule}</span>
            </div>
            <span style={{color:'var(--text-3)',fontSize:14}}>{open===i?'&#8593;':'&#8595;'}</span>
          </div>
          {open===i&&(
            <div className="slide-in" style={{marginTop:16,paddingTop:16,borderTop:'1px solid var(--border-medium)'}}>
