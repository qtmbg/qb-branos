<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QB BrandOS — 60s Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Figtree:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --cream: #f4f0eb;
        --cream-deep: #e6e0d8;
        --ink: #1a1610;
        --brass: #a8903e;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: var(--cream);
        font-family: "Figtree", sans-serif;
      }

      #main-composition {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(
            ellipse at 50% 20%,
            #fbf7ef 0%,
            var(--cream) 50%,
            var(--cream-deep) 100%
          );
      }

      #grain-overlay-comp {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
      }
      @keyframes grain-noise {
        0%, 100% { transform: translate(0, 0); }
        20% { transform: translate(-8%, 4%); }
        40% { transform: translate(6%, -10%); }
        60% { transform: translate(-4%, 8%); }
        80% { transform: translate(10%, 0); }
      }
      .grain-texture {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        opacity: 0.18;
        animation: grain-noise 0.5s steps(1) infinite;
        mix-blend-mode: multiply;
      }

      .comp-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="main-composition"
      data-composition-id="main-video"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="60"
    >
      <!-- Paper grain overlay (always on) -->
      <div
        id="grain-overlay-comp"
        data-composition-id="grain-overlay"
        data-width="1920"
        data-height="1080"
        data-start="0"
        data-duration="60"
        data-track-index="100"
      >
        <div class="grain-texture"></div>
        <script>
          const grainTl = gsap.timeline({ paused: true });
          window.__timelines = window.__timelines || {};
          window.__timelines["grain-overlay"] = grainTl;
        </script>
      </div>

      <!-- Scene 1: Hook (0-4s) -->
      <div
        class="comp-layer clip"
        data-composition-id="intro"
        data-composition-src="compositions/intro.html"
        data-start="0"
        data-duration="4"
        data-track-index="1"
      ></div>

      <!-- Scene 2: Ecosystem arc (4-12s) -->
      <div
        class="comp-layer clip"
        data-composition-id="ecosystem-arc"
        data-composition-src="compositions/ecosystem-arc.html"
        data-start="4"
        data-duration="8"
        data-track-index="2"
      ></div>

      <!-- Scene 3: Phase tour (12-50s) -->
      <div
        class="comp-layer clip"
        data-composition-id="phases"
        data-composition-src="compositions/phases.html"
        data-start="12"
        data-duration="38"
        data-track-index="3"
      ></div>

      <!-- Scene 4: QBP core (50-56s) -->
      <div
        class="comp-layer clip"
        data-composition-id="qbp"
        data-composition-src="compositions/qbp.html"
        data-start="50"
        data-duration="6"
        data-track-index="4"
      ></div>

      <!-- Scene 5: Outro (56-60s) -->
      <div
        class="comp-layer clip"
        data-composition-id="outro"
        data-composition-src="compositions/outro.html"
        data-start="56"
        data-duration="4"
        data-track-index="5"
      ></div>

      <script>
        const tl = gsap.timeline({ paused: true });
        window.__timelines = window.__timelines || {};
        window.__timelines["main-video"] = tl;
      </script>
    </div>
  </body>
</html>
