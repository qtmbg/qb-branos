<template id="phases-template">
  <div
    data-composition-id="phases"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="38"
  >
    <!-- One scene per phase. All sit stacked; opacity drives visibility. -->
    <div class="ph-scene scene-1" data-phase="1">
      <div class="ph-side" style="--c: var(--p1);">
        <div class="ph-num">01</div>
        <div class="ph-bar"></div>
        <div class="ph-name">Discovery</div>
        <div class="ph-tag">Find the soul before the surface</div>
      </div>
      <div class="ph-grid">
        <div class="ph-tool"><span class="t-icon">✦</span><span class="t-name">Archetype Compass</span><span class="t-desc">Your trinity: primary archetype, secondary texture, tension.</span></div>
        <div class="ph-tool"><span class="t-icon">◬</span><span class="t-name">Brand Soul Map</span><span class="t-desc">6 modules · 15 exercises to surface identity.</span></div>
        <div class="ph-tool"><span class="t-icon">◌</span><span class="t-name">Sensescape</span><span class="t-desc">Map your sensory universe across 47 spectrums.</span></div>
        <div class="ph-tool"><span class="t-icon">◫</span><span class="t-name">Visual DNA</span><span class="t-desc">Build your visual library through instinctive selection.</span></div>
        <div class="ph-tool"><span class="t-icon">◧</span><span class="t-name">War Table</span><span class="t-desc">Score initiatives across 6 strategic dimensions.</span></div>
        <div class="ph-tool"><span class="t-icon">■</span><span class="t-name">Brand Document</span><span class="t-desc">Master foundational doc — every Phase 01 output.</span></div>
      </div>
    </div>

    <div class="ph-scene scene-2" data-phase="2">
      <div class="ph-side" style="--c: var(--p2);">
        <div class="ph-num">02</div>
        <div class="ph-bar"></div>
        <div class="ph-name">Brand Creation</div>
        <div class="ph-tag">Translate identity into form &amp; voice</div>
      </div>
      <div class="ph-grid">
        <div class="ph-tool"><span class="t-icon">◈</span><span class="t-name">Logo Direction</span><span class="t-desc">Complete brief &amp; AI prompts derived from your QBP.</span></div>
        <div class="ph-tool"><span class="t-icon">◎</span><span class="t-name">Logo Evaluation</span><span class="t-desc">Upload concepts — AI scores against your identity.</span></div>
        <div class="ph-tool"><span class="t-icon">◉</span><span class="t-name">Voice Guide</span><span class="t-desc">Tone modes, rules, and a live copy generator.</span></div>
      </div>
    </div>

    <div class="ph-scene scene-3" data-phase="3">
      <div class="ph-side" style="--c: var(--p3);">
        <div class="ph-num">03</div>
        <div class="ph-bar"></div>
        <div class="ph-name">Content</div>
        <div class="ph-tag">Show up — channel by channel</div>
      </div>
      <div class="ph-grid">
        <div class="ph-tool"><span class="t-icon">⬡</span><span class="t-name">Instagram Seed</span><span class="t-desc">First 12 posts: captions, hooks, sequence.</span></div>
        <div class="ph-tool"><span class="t-icon">⬢</span><span class="t-name">LinkedIn Strategy</span><span class="t-desc">Profile rewrite + 20 posts across 4 weeks.</span></div>
        <div class="ph-tool"><span class="t-icon">▷</span><span class="t-name">YouTube Strategy</span><span class="t-desc">Channel plan, 6 scripts, short-form briefs.</span></div>
        <div class="ph-tool"><span class="t-icon">✉</span><span class="t-name">Newsletter</span><span class="t-desc">Publishing platform + 4 issues drafted.</span></div>
        <div class="ph-tool"><span class="t-icon">⇢</span><span class="t-name">Content Bridge</span><span class="t-desc">Scripts → production briefs (HeyGen, Canva…)</span></div>
      </div>
    </div>

    <div class="ph-scene scene-4" data-phase="4">
      <div class="ph-side" style="--c: var(--p4);">
        <div class="ph-num">04</div>
        <div class="ph-bar"></div>
        <div class="ph-name">Execution</div>
        <div class="ph-tag">One piece in. Twenty-five out.</div>
      </div>
      <div class="ph-grid">
        <div class="ph-tool"><span class="t-icon">⟳</span><span class="t-name">Repurposing Engine</span><span class="t-desc">1 long-form → 25 native pieces, 10 platforms.</span></div>
        <div class="ph-tool"><span class="t-icon">◱</span><span class="t-name">Content Scheduler</span><span class="t-desc">Tag, organize, and map output to a timeline.</span></div>
      </div>
    </div>

    <div class="ph-scene scene-5" data-phase="5">
      <div class="ph-side" style="--c: var(--p5);">
        <div class="ph-num">05</div>
        <div class="ph-bar"></div>
        <div class="ph-name">Intelligence</div>
        <div class="ph-tag">Listen. Score. Predict.</div>
      </div>
      <div class="ph-grid">
        <div class="ph-tool"><span class="t-icon">◐</span><span class="t-name">Performance Dashboard</span><span class="t-desc">Data → brand signals, health scores, direction.</span></div>
        <div class="ph-tool"><span class="t-icon">↻</span><span class="t-name">Quarterly Review</span><span class="t-desc">Update QBP, grade the quarter, set 90 days.</span></div>
        <div class="ph-tool"><span class="t-icon">◑</span><span class="t-name">Predictive Panel</span><span class="t-desc">Synthetic persona panels — test before launch.</span></div>
      </div>
    </div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,600;1,500&family=Figtree:wght@400;500;600&display=swap");

      [data-composition-id="phases"] {
        --ink: #1a1610;
        --ink-soft: #5a5040;
        --ink-mute: #8a7e70;
        --brass: #a8903e;
        --p1: #4a7a5e;
        --p2: #4a7a8a;
        --p3: #8a5a5a;
        --p4: #5a7a6a;
        --p5: #a8903e;
        position: relative;
        width: 100%;
        height: 100%;
      }
      [data-composition-id="phases"] .ph-scene {
        position: absolute;
        inset: 0;
        padding: 120px 140px;
        box-sizing: border-box;
        display: flex;
        gap: 100px;
        font-family: "Figtree", sans-serif;
        opacity: 0;
      }
      [data-composition-id="phases"] .ph-side {
        flex: 0 0 480px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      [data-composition-id="phases"] .ph-num {
        font-family: "Figtree", sans-serif;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 6px;
        color: var(--c);
        margin-bottom: 24px;
        opacity: 0;
      }
      [data-composition-id="phases"] .ph-bar {
        width: 0;
        height: 4px;
        background: var(--c);
        margin-bottom: 36px;
      }
      [data-composition-id="phases"] .ph-name {
        font-family: "EB Garamond", serif;
        font-weight: 600;
        font-size: 124px;
        line-height: 0.95;
        letter-spacing: -2px;
        color: var(--ink);
        margin: 0;
        opacity: 0;
      }
      [data-composition-id="phases"] .ph-tag {
        font-family: "EB Garamond", serif;
        font-style: italic;
        font-size: 32px;
        color: var(--ink-soft);
        margin-top: 24px;
        opacity: 0;
      }

      [data-composition-id="phases"] .ph-grid {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-auto-rows: min-content;
        gap: 20px 24px;
        align-content: center;
      }
      [data-composition-id="phases"] .ph-tool {
        background: rgba(255, 255, 255, 0.45);
        border: 1px solid rgba(140, 110, 70, 0.18);
        border-radius: 18px;
        padding: 22px 26px;
        display: grid;
        grid-template-columns: 56px 1fr;
        grid-template-rows: auto auto;
        column-gap: 18px;
        opacity: 0;
        transform: translateY(20px);
      }
      [data-composition-id="phases"] .t-icon {
        grid-row: 1 / 3;
        align-self: center;
        font-size: 44px;
        color: var(--ink);
        text-align: center;
      }
      [data-composition-id="phases"] .t-name {
        font-family: "EB Garamond", serif;
        font-size: 30px;
        font-weight: 600;
        color: var(--ink);
        line-height: 1.1;
      }
      [data-composition-id="phases"] .t-desc {
        font-size: 18px;
        line-height: 1.4;
        color: var(--ink-soft);
        margin-top: 4px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const sel = (s) => '[data-composition-id="phases"] ' + s;

        // 5 phases × 7.5s = 37.5s. Each phase enters, holds, exits.
        const dur = 7.5;
        for (let i = 1; i <= 5; i++) {
          const start = (i - 1) * dur;
          const root = `.scene-${i}`;
          // Scene fade in
          tl.to(sel(root), { opacity: 1, duration: 0.4, ease: "power2.out" }, start);
          // Side reveal
          tl.to(sel(`${root} .ph-num`), { opacity: 1, duration: 0.4 }, start + 0.1)
            .to(sel(`${root} .ph-bar`), { width: 120, duration: 0.5, ease: "power2.out" }, start + 0.2)
            .to(sel(`${root} .ph-name`), { opacity: 1, duration: 0.6, ease: "power2.out" }, start + 0.4)
            .to(sel(`${root} .ph-tag`), { opacity: 1, duration: 0.5, ease: "power2.out" }, start + 0.7);
          // Tool cards cascade
          tl.to(
            sel(`${root} .ph-tool`),
            { opacity: 1, y: 0, duration: 0.55, ease: "power2.out", stagger: 0.12 },
            start + 0.9,
          );
          // Scene fade out (only if not last)
          if (i < 5) {
            tl.to(sel(root), { opacity: 0, duration: 0.5, ease: "power2.in" }, start + dur - 0.4);
          }
        }
        // Final scene exit
        tl.to(sel(".scene-5"), { opacity: 0, duration: 0.5, ease: "power2.in" }, 37.4);

        window.__timelines = window.__timelines || {};
        window.__timelines["phases"] = tl;
      })();
    </script>
  </div>
</template>
