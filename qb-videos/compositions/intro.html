<template id="intro-template">
  <div data-composition-id="intro" data-width="1920" data-height="1080" data-start="0" data-duration="4">
    <div class="qb-stage">
      <div class="qb-mark">
        <span class="qb-dot"></span>
        <span class="qb-wordmark">Quantum Branding</span>
      </div>

      <h1 class="qb-title">
        <span class="qb-line">Your brand,</span>
        <span class="qb-line"><em>operated.</em></span>
      </h1>

      <div class="qb-rule"></div>

      <p class="qb-sub">A Brand Operating System for the post-AI era.</p>
    </div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Figtree:wght@400;500;600&display=swap");

      [data-composition-id="intro"] {
        --cream: #f4f0eb;
        --ink: #1a1610;
        --ink-soft: #5a5040;
        --patina: #3a5f4a;
        --brass: #a8903e;
        --brass-lit: #c4a84e;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }

      [data-composition-id="intro"] .qb-stage {
        width: 100%;
        height: 100%;
        padding: 180px 200px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 32px;
        font-family: "Figtree", sans-serif;
        background: transparent;
      }

      [data-composition-id="intro"] .qb-mark {
        display: flex;
        align-items: center;
        gap: 14px;
        font-family: "EB Garamond", serif;
        font-size: 30px;
        font-weight: 500;
        color: var(--ink-soft);
        opacity: 0;
      }
      [data-composition-id="intro"] .qb-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--brass);
      }

      [data-composition-id="intro"] .qb-title {
        font-family: "EB Garamond", serif;
        font-weight: 600;
        font-size: 196px;
        line-height: 0.95;
        letter-spacing: -3px;
        color: var(--ink);
        margin: 0;
      }
      [data-composition-id="intro"] .qb-title em {
        font-style: italic;
        font-weight: 500;
        color: var(--patina);
      }
      [data-composition-id="intro"] .qb-line {
        display: block;
        opacity: 0;
        transform: translateY(28px);
      }

      [data-composition-id="intro"] .qb-rule {
        height: 2px;
        width: 280px;
        background: var(--brass);
        transform-origin: left center;
        transform: scaleX(0);
        margin-top: 12px;
      }

      [data-composition-id="intro"] .qb-sub {
        font-size: 36px;
        font-weight: 400;
        color: var(--ink-soft);
        margin: 0;
        opacity: 0;
        transform: translateY(16px);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const sel = (s) => '[data-composition-id="intro"] ' + s;

        tl.to(sel(".qb-mark"), { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.2)
          .to(
            sel(".qb-line"),
            { opacity: 1, y: 0, duration: 0.9, ease: "power3.out", stagger: 0.12 },
            0.5,
          )
          .to(sel(".qb-rule"), { scaleX: 1, duration: 0.7, ease: "power2.out" }, 1.4)
          .to(sel(".qb-sub"), { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 1.6)
          // gentle exit
          .to(
            sel(".qb-stage"),
            { opacity: 0, duration: 0.5, ease: "power2.in" },
            3.4,
          );

        window.__timelines = window.__timelines || {};
        window.__timelines["intro"] = tl;
      })();
    </script>
  </div>
</template>
