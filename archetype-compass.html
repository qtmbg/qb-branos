<script src="/qb-cloud.js"></script>
<script src="/qb-gate.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cormorant+Garamond:ital,wght@0,500;1,500&family=DM+Sans:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Figtree:wght@300..900&family=JetBrains+Mono:wght@400;500;700&family=Lora:wght@500&family=Playfair+Display:ital,wght@0,600;1,600&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box }
:root{
  --cream:          #F4F0EB;
  --cream-soft:     #EDE8E2;
  --cream-deep:     #E6E0D8;
  --cream-edge:     rgba(100,80,50,0.10);
  --cream-line:     rgba(100,80,50,0.14);
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(100,80,50,0.04);
  --bg-elevated:    rgba(100,80,50,0.07);
  --bg-overlay:     rgba(244,240,235,0.9);
  --border-subtle:  rgba(100,80,50,0.08);
  --border-medium:  rgba(100,80,50,0.14);
  --border-strong:  rgba(100,80,50,0.22);
  --ink:            #1A1610;
  --ink-soft:       #5A5040;
  --ink-mute:       #8A7E70;
  --ink-faint:      #B8AEA0;
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina:         #3A5F4A;
  --patina-lit:     #4A7A5E;
  --patina-dim:     rgba(58,95,74,0.15);
  --patina-faint:   rgba(58,95,74,0.06);
  --patina-deep:    #0E1C17;
  --brass:          #A8903E;
  --brass-lit:      #C4A84E;
  --brass-dim:      rgba(168,144,62,0.15);
  --brass-faint:    rgba(168,144,62,0.06);
  --terra:          #C4654A;
  --terra-lit:      #D4785E;
  --plum:           #7A5A6E;
  --plum-lit:       #9A7A8E;
  --warmred:        #8A4A4A;
  --pill-bg:        #F3E9C9;
  --pill-bg-hover:  #EFE1B4;
  --pill-border:    #A8903E;
  --pill-ink:       #1A1610;
  --f-display:      'EB Garamond','Cormorant Garamond',Georgia,serif;
  --f-body:         'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --f-mono:         'JetBrains Mono',ui-monospace,monospace;
  --ease:           cubic-bezier(.22,1,.36,1);
  --r-pill:         999px;
  --r-card:         24px;
  --r-card-lg:      36px;
  --nav-h:          74px;
  --container:      1200px;
}
[data-theme="dark"]{
  --cream:          #080604;
  --cream-soft:     #0A0806;
  --cream-deep:     #12100C;
  --cream-edge:     rgba(140,110,70,0.06);
  --cream-line:     rgba(140,110,70,0.11);
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(140,110,70,0.045);
  --bg-elevated:    rgba(140,110,70,0.07);
  --bg-overlay:     rgba(18,15,10,0.85);
  --border-subtle:  rgba(140,110,70,0.06);
  --border-medium:  rgba(140,110,70,0.11);
  --border-strong:  rgba(140,110,70,0.18);
  --ink:            #EEE5D2;
  --ink-soft:       #A8A092;
  --ink-mute:       #6F6A5E;
  --ink-faint:      #3E3830;
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina-dim:     rgba(58,95,74,0.2);
  --patina-faint:   rgba(58,95,74,0.08);
  --brass-dim:      rgba(168,144,62,0.18);
  --warmred:        #B06767;
  --pill-bg:        #2A2318;
  --pill-bg-hover:  #3A2E1F;
  --pill-border:    #A8903E;
  --pill-ink:       #EEE5D2;
}

html{ -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; scroll-behavior:smooth; background:var(--bg-void); }
body{
  font-family:var(--f-body); font-weight:400;
  background:var(--bg-void); color:var(--text-2);
  min-height:100vh; position:relative; overflow-x:hidden;
  transition:background .7s ease, color .3s ease;
}
body::after{
  content:''; position:fixed; inset:0; z-index:9999;
  pointer-events:none; opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
[data-theme="dark"] body::after{ opacity:.05; }
a{ color:inherit; text-decoration:none; }
img{ display:block; max-width:100%; }
button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
textarea,input{ font-family:inherit; }

::-webkit-scrollbar{ width:6px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:var(--border-medium); border-radius:3px; }

/* ================== AMBIENT ================== */
.ambient-glow{
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:radial-gradient(circle at 50% 0%, var(--brass-faint) 0%, transparent 70%);
}
.main-vignette{
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:radial-gradient(circle at center, transparent 0%, rgba(200,190,175,0.08) 100%);
}
[data-theme="dark"] .main-vignette{
  background:radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.35) 100%);
}

/* ================== BUTTONS ================== */
.btn{
  display:inline-flex; align-items:center; justify-content:center;
  gap:.55em;
  font-family:var(--f-body); font-weight:500; font-size:.94rem;
  padding:14px 24px;
  border-radius:var(--r-pill);
  border:1px solid var(--ink);
  background:transparent; color:var(--ink);
  transition:all .25s var(--ease);
  white-space:nowrap; text-decoration:none !important;
}
.btn:hover{ background:var(--ink); color:var(--cream); }
@property --eco-angle{ syntax:'<angle>'; initial-value:0deg; inherits:false; }
.btn-primary{
  background:var(--pill-bg) !important;
  border-color:var(--pill-border) !important;
  color:var(--pill-ink) !important;
  position:relative; isolation:isolate;
  font-weight:500;
}
.btn-primary::before{
  content:''; position:absolute; inset:-3px;
  background:conic-gradient(from var(--eco-angle), var(--patina), var(--brass), var(--terra), var(--plum), var(--patina));
  border-radius:999px; z-index:-1; opacity:0;
  transition:opacity .4s ease;
  animation:ecoSpin 6s linear infinite;
  filter:blur(10px);
}
@keyframes ecoSpin{ to{ --eco-angle:360deg; } }
.btn-primary:hover::before{ opacity:.75; }
.btn-primary:hover{
  background:var(--pill-bg-hover) !important;
  border-color:var(--pill-ink) !important;
  transform:translateY(-1px);
  box-shadow:0 14px 40px -12px rgba(168,144,62,.35) !important;
}
.btn-primary:disabled{ opacity:.45; cursor:not-allowed; transform:none; }
.btn-primary:disabled::before{ display:none; }
.btn-ghost{ border-color:transparent; }
.btn-ghost:hover{ background:transparent; color:var(--ink); text-decoration:underline; text-underline-offset:4px; }
.btn-sm{ padding:10px 18px; font-size:.85rem; }
.btn-lg{ padding:17px 30px; font-size:1rem; }

/* ================== NAV ================== */
.nav-spacer{ height:28px; width:100%; flex-shrink:0; }
.nav{
  position:sticky; top:18px; z-index:50;
  padding:0 20px; width:100%;
}
.nav-inner{
  max-width:1160px; margin-inline:auto;
  background:var(--cream);
  border:1px solid var(--cream-line);
  border-radius:var(--r-pill);
  padding:8px 10px 8px 24px;
  display:flex; align-items:center; justify-content:space-between;
  gap:20px;
  box-shadow:0 6px 30px -18px rgba(26,22,16,.18);
  transition:background .4s ease, border-color .3s ease, box-shadow .3s ease;
}
.nav-brand{
  display:flex; align-items:center; gap:10px;
  font-family:var(--f-display); font-size:1.25rem;
  color:var(--ink); font-weight:500; padding:6px 0;
}
.nav-brand .dot{
  width:10px; height:10px; border-radius:50%;
  background:var(--brass);
  box-shadow:0 0 0 3px var(--brass-faint);
  animation:pulseDot 3s var(--ease) infinite;
}
@keyframes pulseDot{
  0%,100%{ transform:scale(1); box-shadow:0 0 0 3px var(--brass-faint); }
  50%{ transform:scale(1.15); box-shadow:0 0 0 5px rgba(168,144,62,.05); }
}
.nav-links{ display:flex; align-items:center; gap:4px; list-style:none; }
.nav-links a{
  padding:10px 16px; border-radius:var(--r-pill);
  font-size:.92rem; font-weight:500;
  color:var(--ink-soft);
  transition:all .2s var(--ease);
}
.nav-links a:hover{ background:var(--cream-deep); color:var(--ink); }
.nav-actions{ display:flex; align-items:center; gap:6px; }
.theme-toggle{
  width:36px; height:36px; border-radius:50%;
  border:1px solid var(--cream-line);
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; color:var(--ink-mute);
  cursor:pointer; background:transparent; flex-shrink:0;
  transition:all .25s var(--ease);
}
.theme-toggle:hover{ border-color:var(--brass); color:var(--brass); background:var(--brass-faint); }
.hamburger{
  display:none; width:42px; height:42px;
  border-radius:var(--r-pill);
  border:1px solid var(--cream-line);
  background:transparent; cursor:pointer;
  flex-direction:column; align-items:center; justify-content:center; gap:4px;
}
.hamburger span{ display:block; width:18px; height:1.5px; background:var(--ink); transition:.25s; }
.hamburger.open span:nth-child(1){ transform:translateY(5.5px) rotate(45deg); }
.hamburger.open span:nth-child(2){ opacity:0; }
.hamburger.open span:nth-child(3){ transform:translateY(-5.5px) rotate(-45deg); }
@media(max-width:960px){
  .nav-links, .nav .btn-ghost{ display:none; }
  .hamburger{ display:flex; }
  .nav-brand{ font-size:1.1rem; }
  .nav-inner{ padding:8px 8px 8px 20px; }
}
.mmenu{
  position:fixed; inset:0; z-index:100;
  background:var(--cream);
  display:none; flex-direction:column;
  padding:28px;
}
.mmenu.open{ display:flex; }
.mmenu-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
.mmenu-close{
  width:42px; height:42px; border-radius:50%;
  border:1px solid var(--cream-line);
  background:transparent; font-size:1.2rem; color:var(--ink); cursor:pointer;
}
.mmenu-list{ display:flex; flex-direction:column; gap:6px; }
.mmenu-list a{
  font-family:var(--f-display); font-size:2rem;
  padding:10px 0; color:var(--ink);
  border-bottom:1px solid var(--cream-line);
}
.mmenu-foot{ margin-top:auto; padding-top:28px; }
[data-theme="dark"] .nav-inner{
  background:rgba(18,15,10,.85);
  border-color:rgba(140,110,70,.15);
  backdrop-filter:blur(14px);
}
[data-theme="dark"] .nav-links a{ color:var(--ink-mute); }
[data-theme="dark"] .nav-links a:hover{ background:rgba(140,110,70,.08); color:var(--ink); }
[data-theme="dark"] .btn{ border-color:rgba(140,110,70,.2); color:var(--ink); }
[data-theme="dark"] .btn:hover{ background:var(--ink); color:var(--cream); }
[data-theme="dark"] .btn-ghost{ color:var(--ink-soft); }

/* ================== TYPE PRIMITIVES ================== */
.label{
  font-family:var(--f-mono); font-size:10px; font-weight:500;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
}
.display{
  font-family:var(--f-display); font-weight:500;
  letter-spacing:-.015em; line-height:1.05;
  color:var(--text-1);
}

/* ================== INTRO ================== */
.intro-shell{
  position:relative; z-index:3;
  min-height:calc(100vh - 140px);
  padding:clamp(32px,6vh,80px) 24px clamp(32px,4vh,60px);
  display:flex; align-items:center; justify-content:center;
}
.intro-wrap{
  max-width:1080px; width:100%;
  display:flex; flex-direction:column; gap:clamp(28px,4vh,48px);
  animation:fadeInUp 1s var(--ease) forwards; opacity:0;
}
@keyframes fadeInUp{ from{ opacity:0; transform:translateY(24px); } to{ opacity:1; transform:translateY(0); } }
@keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
.intro-eyebrow{
  display:inline-flex; align-items:center; gap:14px;
}
.intro-eyebrow .pulse-dot{
  width:8px; height:8px; border-radius:50%;
  background:var(--brass);
  box-shadow:0 0 0 3px var(--brass-faint);
  animation:pulseDot 3s var(--ease) infinite;
}
.intro-eyebrow .label{ letter-spacing:.32em; }
.intro-hero h1{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(3rem,8vw,5.5rem);
  letter-spacing:-.025em; line-height:.98;
  color:var(--text-1);
  max-width:900px;
}
.intro-hero h1 em{ font-style:italic; color:var(--brass); }
.intro-lede{
  font-family:var(--f-display); font-style:italic; font-weight:400;
  font-size:clamp(1.15rem,2.2vw,1.55rem);
  line-height:1.55; color:var(--text-2);
  max-width:680px;
}
.intro-meta{
  display:flex; flex-wrap:wrap; gap:20px 36px;
  padding:20px 0; border-top:1px solid var(--border-medium); border-bottom:1px solid var(--border-medium);
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.24em;
  color:var(--text-3);
}
.intro-meta span{ display:inline-flex; align-items:center; gap:10px; }
.intro-meta span::before{
  content:''; width:6px; height:6px; border-radius:50%; background:var(--brass);
}
.intro-protocols{
  display:grid; grid-template-columns:1fr; gap:24px;
}
@media(min-width:760px){ .intro-protocols{ grid-template-columns:repeat(3,1fr); gap:36px; } }
.intro-protocol{ display:flex; flex-direction:column; gap:10px; transition:padding-left .4s ease; }
.intro-protocol:hover{ padding-left:8px; }
.intro-protocol .p-num{ letter-spacing:.3em; color:var(--brass); }
.intro-protocol h3{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.15rem,1.6vw,1.35rem);
  color:var(--text-1); line-height:1.25; letter-spacing:-.01em;
}
.intro-protocol p{
  font-family:var(--f-body); font-size:13.5px; line-height:1.6;
  color:var(--text-2); opacity:.85;
}
.intro-cta{ display:flex; flex-wrap:wrap; align-items:center; gap:16px 28px; }
.intro-cta .hint{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
}
.intro-cta .hint b{ color:var(--text-1); font-weight:500; }

/* ================== PROGRESS ================== */
.prog-bar{
  max-width:1160px; margin:24px auto 0; padding:0 32px;
  display:flex; align-items:center; gap:6px;
}
.prog-bar .prog-dot{
  flex:1; height:2px; border-radius:2px;
  background:var(--border-medium);
  transition:background .4s ease;
}
.prog-bar .prog-dot.done{ background:var(--brass); }
.prog-bar .prog-dot.active{
  background:var(--brass);
  box-shadow:0 0 0 3px var(--brass-faint);
}
.prog-meta{
  max-width:1160px; margin:12px auto 0; padding:0 32px;
  display:flex; justify-content:space-between; align-items:center;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--text-3);
}

/* ================== QUESTION SHELL ================== */
.q-shell{
  max-width:1180px; margin:0 auto;
  padding:18px 24px 60px;
  animation:fadeIn .5s ease forwards;
  position:relative; z-index:3;
}
.q-head{ text-align:center; margin:0 auto 18px; max-width:820px; }
.q-head .kicker{
  display:inline-flex; align-items:center; gap:10px;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--brass); margin-bottom:8px;
}
.q-head .kicker .sq{ width:8px; height:8px; border:1.5px solid var(--brass); display:inline-block; }
.q-head h2{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.4rem,2.4vw,1.9rem);
  letter-spacing:-.012em; line-height:1.15;
  color:var(--text-1);
}
.q-head .sub{
  font-family:var(--f-display); font-style:italic; font-weight:400;
  font-size:clamp(.9rem,1.2vw,1rem);
  line-height:1.4; color:var(--text-2);
  margin-top:6px; max-width:620px; margin-inline:auto;
}

/* ============================================================
   CARD GRID — compact responsive layout
   Goal: all 12 ranking options on a single screen, no scrolling.
   Desktop: 6 cols × 2 rows. Tablet: 4 × 3. Mobile: 3 × 4.
   Quadrant question (cols-2) keeps its 2×2 layout.
   ============================================================ */
.q-grid{
  display:grid;
  grid-template-columns:repeat(6, 1fr);
  gap:10px;
  max-width:1180px;
  margin:0 auto;
  padding:0;
}
@media(max-width:1100px){
  .q-grid{ grid-template-columns:repeat(4, 1fr); gap:10px; }
}
@media(max-width:720px){
  .q-grid{ grid-template-columns:repeat(3, 1fr); gap:8px; }
}
@media(max-width:480px){
  .q-grid{ grid-template-columns:repeat(2, 1fr); gap:8px; }
}

/* Ranking hint — single inline row above the grid, minimal height */
.q-rank-hint{
  display:flex; align-items:center; justify-content:space-between;
  gap:14px; flex-wrap:wrap;
  max-width:1180px; margin:0 auto 10px;
  padding:6px 12px;
  border:1px dashed var(--border-subtle);
  border-radius:14px;
  background:var(--bg-surface);
}
.q-rank-hint .rh-text{
  font-family:var(--f-body); font-size:12px;
  color:var(--text-2); line-height:1.3;
}
.q-rank-hint .rh-text b{ color:var(--text-1); font-weight:600; }
.q-rank-hint .rh-pips{
  display:flex; align-items:center; gap:5px;
  font-family:var(--f-mono); font-size:8px;
  text-transform:uppercase; letter-spacing:.24em;
  color:var(--text-3);
}
.q-rank-hint .rh-pip{
  width:16px; height:16px; border-radius:50%;
  border:1px solid var(--border-medium);
  display:inline-flex; align-items:center; justify-content:center;
  font-size:9px; color:var(--text-3);
  background:var(--bg-base);
  transition:all .2s ease;
}
.q-rank-hint .rh-pip.filled{
  background:var(--brass); color:var(--cream);
  border-color:var(--brass);
}

/* Quadrant question (cols-2) keeps a calm 2×2 layout */
.q-grid.cols-2{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  max-width:680px;
}
@media(max-width:540px){
  .q-grid.cols-2{ grid-template-columns:1fr; }
}

/* Generic option card — compact */
.q-opt{
  position:relative; display:flex; flex-direction:column;
  width:100%;
  padding:10px 10px 9px;
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  border-radius:14px;
  cursor:pointer; text-align:left;
  transition:border-color .2s ease, background-color .2s ease, box-shadow .2s ease, transform .15s ease, opacity .25s ease;
  overflow:hidden;
  min-height:128px;
  gap:6px;
}
.q-opt:hover{
  background:var(--bg-elevated);
  border-color:var(--border-medium);
  transform:translateY(-1px);
}
.q-opt.is-selected{
  background:var(--bg-elevated);
  border-color:var(--brass);
  box-shadow:0 0 0 1px var(--brass);
}
.q-opt.is-rank-1{ box-shadow:0 0 0 2px var(--brass); }
.q-opt.is-dimmed{ opacity:.5; }
.q-opt.is-dimmed:hover{ opacity:.85; }

/* Rank badge — small, top-right */
.q-rank-badge{
  position:absolute; top:6px; right:6px;
  width:22px; height:22px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--f-mono); font-size:9px; font-weight:600;
  letter-spacing:.02em;
  background:var(--brass); color:var(--cream);
  border:1.5px solid var(--bg-base);
  box-shadow:0 3px 8px -3px rgba(26,22,16,.35);
  z-index:2;
}
.q-rank-badge.r-1{ background:var(--brass); }
.q-rank-badge.r-2{ background:var(--brass); opacity:.78; }
.q-rank-badge.r-3{ background:var(--brass); opacity:.55; }
.q-opt .arch-glyph{
  display:inline-flex; align-items:center; justify-content:center;
  width:24px; height:24px; border-radius:50%;
  background:var(--brass-faint); color:var(--brass);
  font-size:12px; line-height:1;
  transition:all .3s ease;
}
.q-opt.is-selected .arch-glyph{
  background:var(--brass); color:var(--cream);
  box-shadow:0 0 0 3px var(--brass-faint);
}
.q-opt .opt-text{
  font-family:var(--f-body); font-weight:500; font-size:12px;
  color:var(--text-1); line-height:1.35;
}
.q-opt .opt-sub{
  font-family:var(--f-mono); font-size:8px;
  text-transform:uppercase; letter-spacing:.18em;
  color:var(--text-3); margin-top:auto;
}

/* Text-only option (tone, keyword) */
.q-opt.kind-text{ justify-content:flex-start; text-align:left; }
.q-opt.kind-keyword{ justify-content:flex-start; align-items:flex-start; }
.q-opt.kind-keyword .opt-text{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.05rem,1.4vw,1.3rem);
  letter-spacing:-.01em;
  line-height:1.05;
  color:var(--text-1);
}

/* Quote option */
.q-opt.kind-quote{ }
.q-opt.kind-quote .quote-mark{
  font-family:var(--f-display); font-size:1.6rem;
  color:var(--brass); opacity:.35;
  line-height:.5; margin-bottom:-2px;
  transition:opacity .3s ease;
}
.q-opt.kind-quote.is-selected .quote-mark{ opacity:1; }
.q-opt.kind-quote .opt-text{
  font-family:var(--f-display); font-style:italic; font-weight:400;
  font-size:clamp(.85rem,1.05vw,.95rem);
  color:var(--text-1); line-height:1.4;
}

/* Quadrant (big typographic) — keeps generous treatment, only 4 cards */
.q-opt.kind-quadrant{
  min-height:180px;
  padding:28px 22px;
  justify-content:center; align-items:center; text-align:center;
}
.q-opt.kind-quadrant .quad-title{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.8rem,3.4vw,2.6rem);
  letter-spacing:-.02em; line-height:.95;
  color:var(--text-1);
  margin-bottom:10px;
  transition:color .3s ease;
}
.q-opt.kind-quadrant.is-selected .quad-title{ color:var(--brass); }
.q-opt.kind-quadrant .quad-sub{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--text-3);
}

/* Peers cluster — horizontal logo strip instead of dense 2×2 grid */
.q-opt.kind-peers{
  padding:24px 22px 22px;
  justify-content:center; gap:18px;
}
.q-opt.kind-peers .peer-grid{
  display:flex; flex-wrap:nowrap; gap:5px;
  width:100%;
  justify-content:center; align-items:center;
}
.q-opt.kind-peers .peer{
  display:flex; flex-direction:column; align-items:center;
  flex:1 1 0; min-width:0;
}
.q-opt.kind-peers .peer-logo{
  width:28px; height:28px; border-radius:50%;
  background:#fff; border:1px solid var(--border-subtle);
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  transition:border-color .3s ease, box-shadow .3s ease;
}
.q-opt.kind-peers .peer-logo img{
  position:absolute; inset:0;
  width:100%; height:100%; object-fit:contain;
  padding:3px;
  display:block;
}
.q-opt.kind-peers .peer-fallback{
  font-family:var(--f-mono); font-size:6px; font-weight:600;
  text-transform:uppercase; letter-spacing:.04em;
  color:var(--text-3);
  text-align:center; padding:0 1px; line-height:1.05;
}
/* Hide individual brand names on the card — the cluster reads as a single image */
.q-opt.kind-peers .peer-name{ display:none; }
.q-opt.kind-peers.is-selected .peer-logo{
  border-color:var(--brass);
  box-shadow:0 0 0 1px var(--brass);
}
/* Cluster archetype label — appears under the logo strip when selected */
.q-opt.kind-peers .peer-meta{
  font-family:var(--f-mono); font-size:8px; font-weight:500;
  text-transform:uppercase; letter-spacing:.18em;
  color:var(--text-3);
  text-align:center;
  margin-top:2px;
  transition:color .25s ease;
}
.q-opt.kind-peers.is-selected .peer-meta,
.q-opt.kind-peers:hover .peer-meta{ color:var(--text-2); }
@media(max-width:480px){
  .q-opt.kind-peers .peer-grid{ gap:4px; }
  .q-opt.kind-peers .peer-logo{ width:22px; height:22px; }
}

/* Figure portrait — real image overlay (sits on top of placeholder) */
.q-opt.kind-figure .figure-img{
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover; object-position:center top;
  z-index:2;
  filter:saturate(.88) contrast(1.02);
  transition:filter .3s ease;
}
.q-opt.kind-figure.is-selected .figure-img{
  filter:saturate(1) contrast(1.06);
}
.q-opt.kind-figure .figure-frame .figure-tag{ z-index:3; }

/* Fear card */
.q-opt.kind-fear{ }
.q-opt.kind-fear .fear-words{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(.85rem,1.05vw,.95rem);
  color:var(--text-1); line-height:1.3;
  letter-spacing:-.003em;
}

/* Figure (celebrity/metaphor/expression) — compact: small frame at top, name only */
.q-opt.kind-figure{
  padding:0;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.q-opt.kind-figure .figure-frame{
  position:relative;
  aspect-ratio: 1 / 1;
  width:100%;
  max-height:80px;
  background:linear-gradient(135deg, var(--cream-deep) 0%, var(--cream-soft) 100%);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  border-bottom:1px solid var(--border-subtle);
  transition:background .3s ease;
}
[data-theme="dark"] .q-opt.kind-figure .figure-frame{
  background:linear-gradient(135deg, rgba(140,110,70,0.05) 0%, rgba(140,110,70,0.10) 100%);
}
.q-opt.kind-figure.is-selected .figure-frame{
  background:linear-gradient(135deg, var(--brass-faint) 0%, var(--patina-faint) 100%);
}
.q-opt.kind-figure .figure-frame::before{
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at center, transparent 40%, rgba(26,22,16,.06) 100%);
  pointer-events:none;
}
/* PLACEHOLDER portrait — swap with real <img> via data-img attribute + imagery/{slug}.jpg later */
.q-opt.kind-figure .figure-placeholder{
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; gap:14px;
}
.q-opt.kind-figure .placeholder-ring{
  width:48px; height:48px; border-radius:50%;
  border:1.5px dashed var(--border-strong);
  display:flex; align-items:center; justify-content:center;
  color:var(--brass);
  background:var(--bg-overlay);
  transition:all .3s ease;
  font-size:16px;
}
.q-opt.kind-figure:hover .placeholder-ring{ border-style:solid; }
.q-opt.kind-figure.is-selected .placeholder-ring{
  border-color:var(--brass); border-style:solid;
  box-shadow:0 0 0 3px var(--brass-faint);
  background:var(--bg-overlay);
}
.q-opt.kind-figure .placeholder-meta{ display:none; }
.q-opt.kind-figure .figure-tag{ display:none; }
.q-opt.kind-figure .figure-body{
  padding:8px 10px 10px;
  display:flex; flex-direction:column; gap:2px;
  flex:1;
}
.q-opt.kind-figure .figure-name{
  font-family:var(--f-display); font-weight:500;
  font-size:.85rem; color:var(--text-1);
  letter-spacing:-.005em;
  line-height:1.2;
}
/* Hide the long descriptive line in compact mode — name carries the meaning */
.q-opt.kind-figure .figure-desc{ display:none; }

/* Expression (simpler figure — just face) */
.q-opt.kind-expression{ min-height:128px; }
.q-opt.kind-expression .figure-frame{ aspect-ratio: 1 / 1; max-height:80px; }
.q-opt.kind-expression .figure-body{ padding:8px 10px 10px; }
.q-opt.kind-expression .figure-name{
  font-family:var(--f-body); font-weight:400; font-style:italic;
  font-size:.82rem; line-height:1.3;
  color:var(--text-1);
}

/* ================== NAV BUTTONS ================== */
.q-nav{
  max-width:1180px; margin:18px auto 0;
  display:flex; justify-content:space-between; align-items:center; gap:14px;
  padding:0 24px;
}
.q-nav .back,
.q-nav .next{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em; font-weight:500;
  padding:13px 26px; border-radius:var(--r-pill);
  border:1px solid var(--border-medium);
  background:transparent; color:var(--text-2);
  transition:all .25s var(--ease);
}
.q-nav .back:hover{ border-color:var(--ink); color:var(--ink); }
.q-nav .next{
  background:var(--pill-bg);
  border-color:var(--pill-border);
  color:var(--pill-ink); font-weight:600;
  opacity:.35; pointer-events:none;
}
.q-nav .next.ready{ opacity:1; pointer-events:auto; }
.q-nav .next.ready:hover{
  background:var(--pill-bg-hover);
  transform:translateY(-1px);
  box-shadow:0 10px 28px -12px rgba(168,144,62,.4);
}

/* ================== LOADING ================== */
.loading-shell{
  min-height:calc(100vh - 140px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:36px; padding:60px 24px;
  position:relative; z-index:3;
  animation:fadeIn .5s ease forwards;
}
.loading-ring{
  position:relative; width:64px; height:64px;
}
.loading-ring::before,
.loading-ring::after{
  content:''; position:absolute; inset:0;
  border-radius:50%;
  border:2px solid transparent;
  border-top-color:var(--brass);
  animation:spin 1.4s linear infinite;
}
.loading-ring::after{
  inset:10px;
  border-top-color:var(--patina);
  animation:spin 1s linear infinite reverse;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
.loading-shell h2{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.5rem,2.5vw,2rem);
  color:var(--text-1); letter-spacing:-.01em;
  text-align:center;
}
.loading-msg{
  font-family:var(--f-mono); font-size:11px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--text-3);
  min-height:18px;
  animation:pulseOpacity 2s ease infinite;
}
@keyframes pulseOpacity{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }

/* ================== RESULTS ================== */
.results-shell{
  max-width:1160px; margin:0 auto;
  padding:60px 24px 120px;
  position:relative; z-index:3;
  animation:fadeInUp .8s var(--ease) forwards; opacity:0;
}
.r-head{ text-align:center; max-width:820px; margin:0 auto 60px; }
.r-head .badge{
  display:inline-flex; align-items:center; gap:10px;
  padding:7px 16px;
  border:1px solid var(--patina-dim);
  background:var(--patina-faint);
  border-radius:999px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--patina);
  margin-bottom:24px;
}
.r-head h1{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(2.5rem,5.5vw,4rem);
  letter-spacing:-.025em; line-height:1.02;
  color:var(--text-1);
  margin-bottom:22px;
}
.r-head h1 em{ font-style:italic; color:var(--brass); }
.r-head .headline{
  font-family:var(--f-display); font-style:italic; font-weight:400;
  font-size:clamp(1.05rem,1.8vw,1.3rem);
  line-height:1.55; color:var(--text-2);
  max-width:720px; margin:0 auto;
}

.banner{
  max-width:1100px; margin:-32px auto 40px;
  padding:14px 20px; border-radius:var(--r-card);
  background:var(--brass-faint);
  border:1px solid var(--brass-dim);
  color:var(--text-1);
  font-family:var(--f-mono); font-size:11px;
  line-height:1.55; letter-spacing:.04em;
  display:flex; align-items:center; gap:14px;
}
.banner.err{ background:rgba(196,101,74,.08); border-color:rgba(196,101,74,.22); color:var(--terra); }
.banner .b-glyph{
  flex-shrink:0; width:22px; height:22px; border-radius:50%;
  background:var(--bg-overlay); display:flex; align-items:center; justify-content:center;
  font-size:12px;
}
.banner .b-btn{
  margin-left:auto; padding:7px 14px; border-radius:999px;
  border:1px solid currentColor;
  font-family:var(--f-mono); font-size:9.5px; font-weight:600;
  text-transform:uppercase; letter-spacing:.2em;
  background:transparent; color:inherit; cursor:pointer;
  transition:all .2s ease;
}
.banner .b-btn:hover{ background:var(--bg-overlay); }

/* Dividers */
.r-div{
  display:flex; align-items:center; gap:16px;
  margin:56px 0 20px;
  padding-bottom:12px;
  border-bottom:1px solid var(--border-medium);
}
.r-div .num{
  font-family:var(--f-mono); font-size:11px; font-weight:600;
  letter-spacing:.3em; color:var(--brass);
}
.r-div .ttl{
  font-family:var(--f-mono); font-size:11px; font-weight:500;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-1);
}
.r-div .line{ flex:1; height:1px; background:var(--border-subtle); }

/* Trinity */
.r-trinity{
  display:grid; grid-template-columns:repeat(3,1fr); gap:18px;
}
@media(max-width:860px){ .r-trinity{ grid-template-columns:1fr; } }
.r-arch{
  position:relative; overflow:hidden;
  padding:30px 28px;
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);
  display:flex; flex-direction:column; gap:14px;
}
.r-arch::before{
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
}
.r-arch.primary::before{ background:var(--brass); }
.r-arch.secondary::before{ background:var(--patina); opacity:.7; }
.r-arch.tension::before{ background:var(--terra); opacity:.7; }
.r-arch .role{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.32em;
  color:var(--text-3);
}
.r-arch.primary .role{ color:var(--brass); }
.r-arch.secondary .role{ color:var(--patina); }
.r-arch.tension .role{ color:var(--terra); }
.r-arch .name-row{ display:flex; align-items:baseline; gap:12px; }
.r-arch .name{
  font-family:var(--f-display); font-weight:500;
  font-size:1.6rem; letter-spacing:-.01em;
  color:var(--text-1);
}
.r-arch .glyph{
  font-size:1rem; color:var(--text-3);
}
.r-arch.primary .glyph{ color:var(--brass); }
.r-arch.secondary .glyph{ color:var(--patina); }
.r-arch.tension .glyph{ color:var(--terra); }
.r-arch .meta-line{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.18em;
  color:var(--text-3); line-height:1.55;
}
.r-arch .meta-ref{
  display:flex; align-items:center; gap:10px;
  margin:6px 0 4px;
}
.r-arch .meta-ref-label{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
}
.r-arch .meta-ref-logo{
  width:28px; height:28px; border-radius:50%;
  background:#fff; border:1px solid var(--border-subtle);
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.r-arch .meta-ref-logo img{
  position:absolute; inset:0;
  width:100%; height:100%; object-fit:contain;
  padding:3px; display:block;
}
.r-arch .meta-ref-fallback{
  font-family:var(--f-mono); font-size:6.5px; font-weight:600;
  letter-spacing:.04em; text-transform:uppercase;
  color:var(--text-3); text-align:center; line-height:1;
}
.r-arch .meta-ref-name{
  font-family:var(--f-mono); font-size:10px; font-weight:600;
  letter-spacing:.18em; text-transform:uppercase;
  color:var(--text-2);
}
.r-arch .read{
  font-family:var(--f-body); font-size:14px; line-height:1.7;
  color:var(--text-2);
}

/* Paradox */
.r-paradox-statement{
  padding:30px;
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  border-left:3px solid var(--brass);
  border-radius:var(--r-card);
  margin-bottom:18px;
  font-family:var(--f-display); font-style:italic; font-weight:400;
  font-size:clamp(1.25rem,2.4vw,1.65rem);
  line-height:1.4; color:var(--text-1);
  letter-spacing:-.005em;
}
.r-paradox-cols{
  display:grid; grid-template-columns:1fr 1fr; gap:18px;
}
@media(max-width:760px){ .r-paradox-cols{ grid-template-columns:1fr; } }
.r-paradox-col{
  padding:26px;
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);
}
.r-paradox-col.governed{ border-left:3px solid var(--patina); }
.r-paradox-col.ungoverned{ border-left:3px solid var(--terra); }
.r-paradox-col .pcl{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.3em;
  margin-bottom:14px;
}
.r-paradox-col.governed .pcl{ color:var(--patina); }
.r-paradox-col.ungoverned .pcl{ color:var(--terra); }
.r-paradox-col .pcb{
  font-family:var(--f-body); font-size:14px; line-height:1.7;
  color:var(--text-1);
}

/* Moat */
.r-moat{ display:grid; gap:14px; }
.r-moat-cell{
  padding:24px 28px;
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);
  display:grid; grid-template-columns:180px 1fr; gap:28px;
  align-items:start;
}
@media(max-width:680px){
  .r-moat-cell{ grid-template-columns:1fr; gap:10px; }
}
.r-moat-cell .mlbl{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.24em;
  color:var(--brass); font-weight:500;
  line-height:1.5;
}
.r-moat-cell .mbod{
  font-family:var(--f-body); font-size:14px; line-height:1.7;
  color:var(--text-1);
}

/* Op mode + triple + growth */
.r-op, .r-triple, .r-growth{
  display:grid; grid-template-columns:repeat(3,1fr); gap:14px;
}
@media(max-width:760px){ .r-op, .r-triple, .r-growth{ grid-template-columns:1fr; } }
.r-cell{
  padding:24px 22px;
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);
  display:flex; flex-direction:column; gap:12px;
}
.r-cell .cl{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--text-3);
  padding-bottom:10px;
  border-bottom:1px solid var(--border-subtle);
}
.r-cell.never .cl{ color:var(--terra); }
.r-cell.signature .cl{ color:var(--brass); }
.r-cell.growth .cl{ color:var(--brass); font-weight:600; }
.r-cell .cb{
  font-family:var(--f-body); font-size:13.5px; line-height:1.7;
  color:var(--text-1);
}

/* Market */
.r-brands{
  display:grid; grid-template-columns:repeat(2,1fr); gap:12px;
  margin-bottom:18px;
}
@media(max-width:680px){ .r-brands{ grid-template-columns:1fr; } }
.r-brand{
  padding:18px 22px;
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);
}
.r-brand .bn{
  font-family:var(--f-display); font-weight:500;
  font-size:1.1rem; letter-spacing:-.005em;
  color:var(--text-1); margin-bottom:6px;
}
.r-brand .br{
  font-family:var(--f-body); font-size:13px; line-height:1.6;
  color:var(--text-2);
}
.r-openspace{
  padding:26px 28px;
  background:linear-gradient(135deg, var(--brass-faint) 0%, var(--patina-faint) 100%);
  border:1px solid var(--brass-dim);
  border-radius:var(--r-card);
}
.r-openspace .osl{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--brass); font-weight:500;
  margin-bottom:12px;

.r-fusion{
  padding:32px;
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);

.r-actions{

/* ============================== DOM HELPERS ============================== */
function el(tag, attrs, kids){
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k){
    var v = attrs[k];
    if (v === null || v === undefined || v === false) return;
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'onclick' || k === 'oninput' || k === 'onkeyup') e[k] = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else e.setAttribute(k, v);
  });
  (Array.isArray(kids) ? kids : [kids]).forEach(function(k){
    if (k === null || k === undefined || k === false) return;
    if (k instanceof Node) e.appendChild(k);
    else e.appendChild(document.createTextNode(String(k)));
  });
  return e;
}

function app(){ return document.getElementById('app'); }

function render(){
  var root = app();
  if (!root) return;
  root.innerHTML = '';
  if (S.step === 0) root.appendChild(renderIntro());
  else if (S.step >= 1 && S.step <= 10){
    root.appendChild(renderProgress());
    root.appendChild(renderQuestion(S.step));
  }
  else if (S.step === 11) root.appendChild(renderLoading());
  else if (S.step === 12) root.appendChild(renderResults());
}

  var a = S.answers[n];
  if (a === undefined || a === null) return false;

}

function renderQuestion(n){
  var sc = SCREENS[n-1];

  if (sc.sub) head.appendChild(el('p', {class:'sub'}, sc.sub));
  wrap.appendChild(head);

  if (isRanking){
    var picks = Array.isArray(S.answers[n]) ? S.answers[n] : [];

      el('span', {}, 'Picked'),

    ]);

      el('div', {class:'rh-text', html: 'Pick your <b>top 3</b> in order — most-us first. Tap a picked card to remove it.'}),

  sc.opts.forEach(function(opt, idx){ grid.appendChild(buildCard(sc, opt, idx, n)); });
  wrap.appendChild(grid);

  var ready = isAnswered(n);

  var navEl = el('div', {class:'q-nav'});
  navEl.appendChild(el('button', {
    class:'back',

    class: 'next' + (ready ? ' ready' : ''),

      if (S.step === 10) runSynthesis();
      else { S.step++; render(); window.scrollTo(0,0); }
    }
  }, S.step === 10 ? 'Synthesize trinity →' : 'Next →'));

  wrap.appendChild(navEl);
  return wrap;
}

function buildCard(sc, opt, idx, n){
  var isRanking = sc.cols !== 2;
  var rank = 0;       // 1 / 2 / 3 if picked in ranking; 0 otherwise
  var selected = false;
  var dimmed = false;

  if (isRanking){
    var picks = Array.isArray(S.answers[n]) ? S.answers[n] : [];
    var pos = picks.indexOf(idx);
    if (pos >= 0){ rank = pos + 1; selected = true; }
    else if (picks.length >= 3){ dimmed = true; }
  } else {
    selected = S.answers[n] === idx;
  }

  var onSelect = function(){
    if (isRanking){
      var picks = Array.isArray(S.answers[n]) ? S.answers[n].slice() : [];
      var pos = picks.indexOf(idx);
      if (pos >= 0){
        picks.splice(pos, 1);                    // tap-to-remove (others shift up)
      } else if (picks.length < 3){
        picks.push(idx);                          // assign next rank
      } else {
        return;                                   // already 3 picked, ignore
      }
      S.answers[n] = picks;
    } else {
      S.answers[n] = idx;
    }
    render();
  };

  var base = 'q-opt'
    + (selected ? ' is-selected' : '')
    + (rank ? ' is-rank-' + rank : '')
    + (dimmed ? ' is-dimmed' : '');

  function withBadge(node){
    if (rank){
      node.appendChild(el('span', {class:'q-rank-badge r-' + rank, 'aria-label':'Rank ' + rank}, '#' + rank));
    }
    return node;
  }

  if (sc.kind === 'text'){
    var a = ARCHETYPES[opt.a];
    return withBadge(el('button', {class: base + ' kind-text', onclick:onSelect, type:'button'}, [
      el('span', {class:'arch-glyph'}, a.glyph),
      el('span', {class:'opt-text'}, opt.label)
    ]));
  }

  if (sc.kind === 'keyword'){
    var ak = ARCHETYPES[opt.a];
    return withBadge(el('button', {class: base + ' kind-keyword', onclick:onSelect, type:'button'}, [
      el('span', {class:'arch-glyph'}, ak.glyph),
      el('span', {class:'opt-text'}, opt.label)
    ]));
  }

  if (sc.kind === 'quote'){
    return withBadge(el('button', {class: base + ' kind-quote', onclick:onSelect, type:'button'}, [
      el('span', {class:'quote-mark'}, '“'),
      el('span', {class:'opt-text'}, opt.label)
    ]));
  }

  if (sc.kind === 'peers'){
    var peerGrid = el('div', {class:'peer-grid'});
    opt.peers.forEach(function(p){
      var pName = (typeof p === 'string') ? p : p.name;
      var pDomain = (typeof p === 'string') ? null : p.domain;
      var cell = el('div', {class:'peer', title: pName});
      var logoWrap = el('div', {class:'peer-logo'});
      var fallback = el('span', {class:'peer-fallback'}, pName);
      logoWrap.appendChild(fallback);
      if (pDomain){
        var img = el('img', {alt: pName + ' logo', loading:'lazy'});
        img.src = 'https://logo.clearbit.com/' + pDomain;
        img.addEventListener('error', function(){ img.remove(); });
        logoWrap.appendChild(img);
      }
      cell.appendChild(logoWrap);
      cell.appendChild(el('div', {class:'peer-name'}, pName));
      peerGrid.appendChild(cell);
    });
    var archMeta = ARCHETYPES[opt.a];
    var metaLabel = archMeta ? archMeta.name : '';
    var meta = el('div', {class:'peer-meta'}, metaLabel);
    return withBadge(el('button', {class: base + ' kind-peers', onclick:onSelect, type:'button'}, [peerGrid, meta]));
  }

  if (sc.kind === 'quadrant'){
    return el('button', {class: base + ' kind-quadrant', onclick:onSelect, type:'button'}, [
      el('span', {class:'quad-title'}, opt.label),
      el('span', {class:'quad-sub'}, opt.sub)
    ]);
  }

  if (sc.kind === 'fear'){
    return withBadge(el('button', {class: base + ' kind-fear', onclick:onSelect, type:'button'}, [
      el('span', {class:'fear-words'}, opt.words.join(' · ')),
      el('span', {class:'opt-sub'}, opt.tag)
    ]));
  }

  if (sc.kind === 'figure'){
    var frame = el('div', {class:'figure-frame', 'data-img': opt.portrait || ('img/archetype/' + (opt.slug||'') + '.jpg')}, [
      el('div', {class:'figure-tag'}, sc.figureTag || 'Portrait'),
      el('div', {class:'figure-placeholder'}, [
        el('div', {class:'placeholder-ring', html: PLACEHOLDER_SVG}),
        el('div', {class:'placeholder-meta'}, 'Portrait · ' + (opt.slug||'tba'))
      ])
    ]);
    if (opt.portrait){
      var pimg = el('img', {alt: opt.name + ' portrait', class:'figure-img', loading:'lazy'});
      pimg.src = opt.portrait;
      pimg.addEventListener('error', function(){ pimg.remove(); });
      frame.appendChild(pimg);
    }
    return withBadge(el('button', {class: base + ' kind-figure', onclick:onSelect, type:'button'}, [
      frame,
      el('div', {class:'figure-body'}, [
        el('div', {class:'figure-name'}, opt.name),
        el('div', {class:'figure-desc'}, opt.desc)
      ])
    ]));
  }

  if (sc.kind === 'expression'){
    var eframe = el('div', {class:'figure-frame', 'data-img':'img/archetype/expression-' + (opt.slug||'') + '.jpg'}, [
      el('div', {class:'figure-tag'}, sc.figureTag || 'Expression'),
      el('div', {class:'figure-placeholder'}, [
        el('div', {class:'placeholder-ring', html: PLACEHOLDER_SVG}),
        el('div', {class:'placeholder-meta'}, 'Face · ' + (opt.slug||'tba'))
      ])
    ]);
    return withBadge(el('button', {class: base + ' kind-figure kind-expression', onclick:onSelect, type:'button'}, [
      eframe,
      el('div', {class:'figure-body'}, [
        el('div', {class:'figure-name'}, opt.name)
      ])
    ]));
  }

  return withBadge(el('button', {class: base, onclick:onSelect, type:'button'}, opt.label || opt.name || ''));
}

function renderResults(){
  if (S.error && !S.result){
    var err = el('div', {class:'err-shell'});

    err.appendChild(el('p', {}, S.error));

      el('button', {class:'btn btn-ghost btn-sm', onclick: function(){ S.step = 10; render(); window.scrollTo(0,0); }}, 'Back to last question')
    ]));
    return err;
  }

  if (!S.result) return el('div', {class:'err-shell'}, [el('h2', {}, 'No result.'), el('p', {}, 'Try again.')]);

  var r = S.result;
  var p = ARCHETYPES[r.primary];
  var s = ARCHETYPES[r.secondary];
  var t = ARCHETYPES[r.tension];

  var results = el('div', {class:'results-shell'});

  // Hero
  var head = el('div', {class:'r-head'});
  head.appendChild(el('div', {class:'badge'}, 'Trinity locked · Strategic reading'));
  head.appendChild(el('h1', {html: 'Your brand reads as <em>' + p.name.replace('The ','') + '</em>'}));
  head.appendChild(el('p', {class:'headline'}, r.headline || ''));
  results.appendChild(head);

  // Banners
  if (S.error && S.fallbackUsed){
    var banner = el('div', {class:'banner err'});
    banner.appendChild(el('span', {class:'b-glyph'}, '!'));
    banner.appendChild(el('div', {style:{flex:'1'}}, S.error + (S.errorDetail ? ' — ' + S.errorDetail.slice(0, 120) : '')));
    banner.appendChild(el('button', {class:'b-btn', onclick:function(){ runSynthesis(); }}, 'Retry'));
    results.appendChild(banner);
  } else if (S.fallbackUsed){
    results.appendChild(el('div', {class:'banner'}, [
      el('span', {class:'b-glyph'}, 'i'),
      el('span', {}, 'Local reading · AI synthesis was skipped. Deploy with ANTHROPIC_API_KEY configured for the deep reading tied to your answers.')
    ]));
  }

  // 01 · Trinity
  results.appendChild(divider('01', 'The Trinity'));
  results.appendChild(el('div', {class:'r-trinity'}, [
    archCard('primary', p, (r.trinityReads||{}).primary),
    archCard('secondary', s, (r.trinityReads||{}).secondary),
    archCard('tension', t, (r.trinityReads||{}).tension)
  ]));

  // 02 · Paradox
  if (r.centralParadox){
    results.appendChild(divider('02', 'The Central Paradox'));
    if (r.centralParadox.statement) results.appendChild(el('div', {class:'r-paradox-statement'}, r.centralParadox.statement));
    if (r.centralParadox.whenGoverned || r.centralParadox.whenUngoverned){
      var cols = el('div', {class:'r-paradox-cols'});
      if (r.centralParadox.whenGoverned){
        cols.appendChild(el('div', {class:'r-paradox-col governed'}, [
          el('div', {class:'pcl'}, 'When Governed'),
          el('div', {class:'pcb'}, r.centralParadox.whenGoverned)
        ]));
      }
      if (r.centralParadox.whenUngoverned){
        cols.appendChild(el('div', {class:'r-paradox-col ungoverned'}, [
          el('div', {class:'pcl'}, 'When Ungoverned'),
          el('div', {class:'pcb'}, r.centralParadox.whenUngoverned)
        ]));
      }
      results.appendChild(cols);
    }
  }

  // 03 · Moat
  if (r.strategicMoat){
    results.appendChild(divider('03', 'The Strategic Moat'));
    var moat = el('div', {class:'r-moat'});
    if (r.strategicMoat.uniqueEnablement) moat.appendChild(moatCell('What this enables', r.strategicMoat.uniqueEnablement));
    if (r.strategicMoat.competitorsCantDo) moat.appendChild(moatCell("What competitors can't", r.strategicMoat.competitorsCantDo));
    if (r.strategicMoat.premiumPosition) moat.appendChild(moatCell('Premium position', r.strategicMoat.premiumPosition));
    results.appendChild(moat);
  }

  // 04 · Operating
  if (r.operatingMode){
    results.appendChild(divider('04', 'The Operating Mode'));
    var op = el('div', {class:'r-op'});
    if (r.operatingMode.decisionStyle) op.appendChild(cell('Decision Style', r.operatingMode.decisionStyle));
    if (r.operatingMode.rhythm) op.appendChild(cell('Rhythm', r.operatingMode.rhythm));
    if (r.operatingMode.yesAndNo) op.appendChild(cell('Yes & No', r.operatingMode.yesAndNo));
    results.appendChild(op);
  }

  // 05 · Market
  if (r.marketLandscape){
    results.appendChild(divider('05', 'The Market Landscape'));
    if (r.marketLandscape.occupiers && r.marketLandscape.occupiers.length){
      var brands = el('div', {class:'r-brands'});
      r.marketLandscape.occupiers.forEach(function(b){
        if (!b) return;

          el('div', {class:'bn'}, b.brand || ''),
          el('div', {class:'br'}, b.read || '')
        ]));
      });
      results.appendChild(brands);
    }
    if (r.marketLandscape.openSpace){
      results.appendChild(el('div', {class:'r-openspace'}, [
        el('div', {class:'osl'}, 'Open space'),
        el('div', {class:'osb'}, r.marketLandscape.openSpace)
      ]));
    }

  // 06 · Failure
  if (r.failurePattern){
    results.appendChild(divider('06', 'The Failure Pattern'));
    if (r.failurePattern.selfSabotage) results.appendChild(el('div', {class:'r-fail-text'}, r.failurePattern.selfSabotage));
    if (r.failurePattern.earlyWarnings && r.failurePattern.earlyWarnings.length){
      var warns = el('div', {class:'r-warn-list'});
      r.failurePattern.earlyWarnings.forEach(function(w){ warns.appendChild(el('div', {class:'r-warn'}, w)); });
      results.appendChild(warns);
    }
  }

  // 07 · Growth
  if (r.growthArc){
    results.appendChild(divider('07', 'The Growth Arc'));
    var growth = el('div', {class:'r-growth'});
    if (r.growthArc.year1) growth.appendChild(growthCell('Year 1', r.growthArc.year1));
    if (r.growthArc.year3) growth.appendChild(growthCell('Year 3', r.growthArc.year3));
    if (r.growthArc.year5) growth.appendChild(growthCell('Year 5', r.growthArc.year5));
    results.appendChild(growth);
  }

  // 08 · Fusion
  results.appendChild(divider('08', 'The Fusion'));
  results.appendChild(el('div', {class:'r-fusion'}, r.fusion || ''));

  // 09 · Filter
  results.appendChild(divider('09', 'The Decision Filter'));
  results.appendChild(el('div', {class:'r-filter'}, r.decisionFilter || ''));

  // 10 · Shadows
  if (r.shadowsToWatch && r.shadowsToWatch.length){
    results.appendChild(divider('10', 'Shadows to Watch'));
    var shadows = el('div', {class:'r-shadows'});
    r.shadowsToWatch.forEach(function(item){ shadows.appendChild(el('div', {class:'r-shadow-item'}, item)); });
    results.appendChild(shadows);
  }

  // 11 · Voice
  if (r.voiceImplications){
    results.appendChild(divider('11', 'Voice Implications'));
    var voice = el('div', {class:'r-triple'});
    voice.appendChild(cell('Register', r.voiceImplications.register || ''));
    voice.appendChild(cell('Never sounds like', r.voiceImplications.neverSounds || '', 'never'));
    voice.appendChild(cell('Signature phrase', r.voiceImplications.signaturePhrase || '', 'signature'));
    results.appendChild(voice);
  }

  // 12 · Visual
  if (r.visualImplications){
    results.appendChild(divider('12', 'Visual Implications'));
    var visual = el('div', {class:'r-triple'});
    visual.appendChild(cell('Visual world', r.visualImplications.world || ''));
    visual.appendChild(cell('Never looks like', r.visualImplications.neverLooks || '', 'never'));
    visual.appendChild(cell('Signature move', r.visualImplications.signatureMove || '', 'signature'));
    results.appendChild(visual);
  }

  // 13 · First move
  if (r.firstMoveThisWeek){
    results.appendChild(divider('13', 'The First Move'));
    results.appendChild(el('div', {class:'r-firstmove'}, [
      el('div', {class:'fml'}, 'This week'),
      el('div', {class:'fmb'}, r.firstMoveThisWeek)
    ]));
  }

  // Fingerprint — uses each exercise's #1 ranked pick
  results.appendChild(divider('·', 'Diagnostic Fingerprint'));
  function topPick(n){
    var a = S.answers[n];
    if (Array.isArray(a) && a.length) return SCREENS[n-1].opts[a[0]];
    if (typeof a === 'number') return SCREENS[n-1].opts[a];
    return null;
  }
  var tone = topPick(1);
  var motivation = topPick(5);
  var fear = topPick(7);
  results.appendChild(el('div', {class:'r-meta'}, [
    metaCell('Tone register', tone ? tone.label : '—'),
    metaCell('Core motivation', motivation ? motivation.label : '—'),
    metaCell('Core fear', fear ? fear.words.join(' · ') : '—')
  ]));

  // Refine
  if (S.revisions < 3 && !S.fallbackUsed){
    var rem = 3 - S.revisions;
    var refine = el('div', {class:'r-refine'});
    refine.appendChild(el('div', {class:'rtl'}, 'Refine the read · ' + rem + ' revision' + (rem === 1 ? '' : 's') + ' remaining'));
    refine.appendChild(el('div', {class:'rhint'}, 'If the reading is missing something, sharpen it. Tell the system what to push, soften, or reframe — it will rewrite from your answers with that lens.'));
    var ta = el('textarea', {
      placeholder: 'e.g. "Push harder on the tension between Magician and Sage. The Year-5 arc feels too cautious."',
      oninput: function(e){ S.refineNote = e.target.value; }
    });
    ta.value = S.refineNote;
    refine.appendChild(ta);
    refine.appendChild(el('div', {}, [
      el('button', {
        class:'btn btn-primary btn-sm',
        onclick: function(){
          if (!S.refineNote.trim()){ alert('Tell the system what to refine.'); return; }
          S.revisions++;
          runSynthesis(true);
        }
      }, 'Refine reading')
    ]));
    results.appendChild(refine);
  }

  // Actions
  var actions = el('div', {class:'r-actions'});
  if (!S.saved){
    actions.appendChild(el('button', {
      class:'btn btn-primary btn-lg',
      onclick: function(){ saveToQBP(); }
    }, 'Save to QBP'));
  } else {
    actions.appendChild(el('a', {
      class:'btn btn-primary btn-lg',
      href:'brand-soul-map.html'
    }, 'Continue to Brand Soul Map →'));
  }
  actions.appendChild(el('button', {
    class:'btn btn-sm',
    onclick: function(){
      S.step = 0; S.answers = {}; S.result = null; S.revisions = 0;
      S.refineNote = ''; S.saved = false; S.fallbackUsed = false;
      S.error = ''; S.errorDetail = '';
      render(); window.scrollTo(0,0);
    }
  }, 'Re-take diagnostic'));
  results.appendChild(actions);

  results.appendChild(el('div', {
    style:{textAlign:'center', marginTop:'18px', fontFamily:'var(--f-mono)', fontSize:'10px', letterSpacing:'.24em', textTransform:'uppercase', color: S.saved ? 'var(--patina)' : 'var(--text-3)'}
  }, S.saved
      ? 'Trinity saved to QBP · Soul Map and downstream tools will read from this'
      : 'Save to QBP to lock the trinity into your brand profile'
  ));

  // Epigraph
  results.appendChild(el('div', {class:'r-epigraph'}, [
    el('div', {class:'eq'}, r.epigraph || "The brand isn't being invented here. It's being uncovered."),
    el('div', {class:'ec'}, 'QB BrandOS · Archetype Compass')
  ]));

  return results;
}

/* ============================== SCORING ============================== */
// Each ranking exercise contributes a weighted Borda vote per pick:
//   #1 → 3 points, #2 → 2 points, #3 → 1 point.
// Quadrant exercise contributes +1.5 per archetype in the chosen quadrant
// (kept on the same scale as before; quadrant is single-pick of 4).
var RANK_WEIGHTS = [3, 2, 1];

function tally(){
  var votes = {};
  Object.keys(ARCHETYPES).forEach(function(k){ votes[k] = 0; });

  [1,2,3,4,5,7,8,9,10].forEach(function(n){
    var picks = S.answers[n];
    if (!Array.isArray(picks)) return;
    picks.forEach(function(idx, i){
      var o = SCREENS[n-1].opts[idx];
      var w = RANK_WEIGHTS[i] || 0;
      if (o && o.a && w) votes[o.a] += w;
    });
  });

  var qIdx = S.answers[6];
  if (qIdx !== undefined && qIdx !== null && !Array.isArray(qIdx)){
    var q = SCREENS[5].opts[qIdx].q;
    QUADRANT_ARCHETYPES[q].forEach(function(a){ votes[a] += 1.5; });
  }

  var ranked = Object.keys(votes).map(function(a){ return {a:a, v:votes[a]}; })
    .sort(function(x,y){ return y.v - x.v || x.a.localeCompare(y.a); })
    .map(function(r){ return { a:r.a, v: Math.round(r.v * 10) / 10 }; });

  return {
    primary:   ranked[0].a,
    secondary: ranked[1].a,
    tension:   ranked[2].a,
    votes:     ranked
  };
}

/* ============================== SYNTHESIS ============================== */
function runSynthesis(isRefinement){
  S.step = 11;
  S.error = ''; S.errorDetail = '';
  S.fallbackUsed = false;
  if (!isRefinement) S.result = null;
  S.saved = false;
  render();

  if (S.loadingTimer) clearInterval(S.loadingTimer);
  var mi = 0;
  S.loadingTimer = setInterval(function(){
    mi = (mi + 1) % LOADING_MESSAGES.length;
    var msg = document.getElementById('loadMsg');
    if (msg) msg.textContent = LOADING_MESSAGES[mi];
  }, 1700);

  var scored;
  try { scored = tally(); }
  catch(err){
    clearInterval(S.loadingTimer);
    S.error = 'Could not score the diagnostic.';
    S.errorDetail = (err && err.stack) || String(err);
    S.step = 12; render(); window.scrollTo(0,0);
    return;
  }

  callClaude(scored, !!isRefinement).then(function(result){
    S.result = Object.assign({}, result, {
      primary: scored.primary, secondary: scored.secondary, tension: scored.tension, votes: scored.votes
    });
    S.refineNote = '';
    clearInterval(S.loadingTimer);
    S.step = 12; render(); window.scrollTo(0,0);
  }).catch(function(err){
    console.error('Synthesis error:', err);
    clearInterval(S.loadingTimer);
    S.error = 'AI synthesis was unavailable. The diagnostic was scored but the deep reading could not be generated.';
    S.errorDetail = (err && err.message) || String(err);
    try {
      S.result = Object.assign({}, localFallback(scored), {
        primary: scored.primary, secondary: scored.secondary, tension: scored.tension, votes: scored.votes
      });
      S.fallbackUsed = true;
    } catch(e){}
    S.step = 12; render(); window.scrollTo(0,0);
  });
}

/* --- Call /api/claude proxy (not direct Anthropic) --- */
function optChoiceLabel(o){
  if (!o) return '';
  if (o.label) return o.label;
  if (o.name) return o.name;
  if (o.peers) return o.peers.map(function(p){ return typeof p === 'string' ? p : p.name; }).join(', ');
  if (o.words) return o.words.join(' · ');
  return '';
}

function callClaude(scored, isRefinement){
  var answers = {};
  for (var n = 1; n <= 10; n++){
    var a = S.answers[n];
    if (a === undefined || a === null) continue;
    var sc = SCREENS[n-1];

    if (Array.isArray(a)){
      // Ranking exercise — top 3 in order
      var ranked = a.map(function(idx, i){
        var o = sc.opts[idx];
        return {
          rank: i + 1,
          choice: optChoiceLabel(o),
          mappedTo: o && o.a ? ARCHETYPES[o.a].name : ''
        };
      });
      answers[n] = {
        question: sc.title,
        format: 'ranked-top-3',
        ranked: ranked,
        choice: ranked.map(function(r){ return '#' + r.rank + ' ' + r.choice; }).join(' → '),
        mappedTo: ranked.map(function(r){ return '#' + r.rank + ' ' + r.mappedTo; }).join(' → ')
      };
    } else {
      // Single-pick (quadrant)
      var o = sc.opts[a];
      answers[n] = {
        question: sc.title,
        format: 'single-pick',
        choice: optChoiceLabel(o),
        mappedTo: o && o.a ? ARCHETYPES[o.a].name : (o && o.q ? 'quadrant: ' + o.q : '')
      };
    }
  }

  var brandName = QBP.brandName || 'this brand';
  var brandEssence = QBP.brandEssence || '';
  var spark = QBP.spark || '';
  var offer = QBP.offer || '';

  var refinementInstr = isRefinement && S.refineNote.trim()
    ? '\n\nUSER REVISION REQUEST: ' + S.refineNote.trim() + '\nApply this revision to sharpen the read while staying faithful to the underlying diagnostic. Do not invent new archetypes — work with the trinity.'
    : '';

  var p = ARCHETYPES[scored.primary];
  var s = ARCHETYPES[scored.secondary];
  var t = ARCHETYPES[scored.tension];

  var sys = 'You are the Archetype Compass synthesizer inside QB BrandOS — a strategic intelligence system, NOT a personality test.\n\n'
    + 'You read raw answers from a 10-exercise archetype diagnostic and produce a precise, brand-specific strategic reading.\n\n'
    + 'You are not a generic archetype copywriter. You operate as a senior brand strategist + cultural critic + product architect. You think with rigor, write with edge, and refuse to flatter.\n\n'
    + 'Every sentence you write MUST be:\n'
    + '- TRACEABLE to the user\'s actual choices (no generic archetype-101 copy)\n'
    + '- BEHAVIORALLY CONCRETE (show the brand in motion — what it actually DOES)\n'
    + '- SPECIFIC (no abstractions like "authenticity," "connection," "premium quality")\n'
    + '- USEFUL (the founder should be able to act on it within 24 hours)\n'
    + '- HONEST (if the trinity reveals a tension or risk, name it directly)\n\n'
    + 'Use the brand\'s actual name. Reference their actual answer choices. Connect dots they have not yet connected.\n\n'
    + 'Return ONLY valid JSON. No markdown. No code fences. No preamble.';

  var usr = 'BRAND CONTEXT\n'
    + 'Name: ' + brandName + '\n'
    + 'Essence: ' + (brandEssence || '(not yet defined — work from diagnostic alone)') + '\n'
    + 'Spark: ' + (spark || '(not yet defined)') + '\n'
    + 'Core Offer: ' + (offer || '(not yet defined)') + '\n\n'
    + 'DIAGNOSTIC SCORING (weighted Borda tally · 9 ranking exercises score #1=3pts / #2=2pts / #3=1pt + quadrant +1.5 per archetype in chosen quadrant)\n'
    + scored.votes.map(function(v){ return ARCHETYPES[v.a].name.padEnd(20) + ' ' + v.v + ' votes'; }).join('\n') + '\n\n'
    + 'DETECTED TRINITY\n'
    + 'PRIMARY:   ' + p.name + ' · ref: ' + p.brand + ' · gift: ' + p.gift + ' · shadow: ' + p.shadow + '\n'
    + 'SECONDARY: ' + s.name + ' · ref: ' + s.brand + ' · gift: ' + s.gift + ' · shadow: ' + s.shadow + '\n'
    + 'TENSION:   ' + t.name + ' · ref: ' + t.brand + ' · gift: ' + t.gift + ' · shadow: ' + t.shadow + '\n\n'
    + "USER'S ACTUAL ANSWERS (use these to make every sentence specific)\n"
    + Object.keys(answers).map(function(k){ var a = answers[k]; return 'Q' + k + ': ' + a.question + '\n  Chose: ' + a.choice + '\n  Maps to: ' + a.mappedTo; }).join('\n\n')
    + refinementInstr
    + '\n\nReturn JSON with EXACTLY this structure. Every field required. Every sentence specific.\n\n'
    + '{\n'
    + '  "headline": "ONE sharp sentence (max 28 words) naming what makes this trinity distinct in market terms. Speak to ' + brandName + '. No generic adjectives.",\n'
    + '  "centralParadox": {\n'
    + '    "statement": "One sentence naming the contradiction this brand carries. Format: You are X yet Y.",\n'
    + '    "whenGoverned": "1-2 sentences on what this paradox UNLOCKS when held with intention.",\n'
    + '    "whenUngoverned": "1-2 sentences on how this paradox DESTROYS the brand when ignored."\n'
    + '  },\n'
    + '  "trinityReads": {\n'
    + '    "primary": "3-4 sentences. Why ' + p.name + ' is THIS BRAND\'S operating system. Reference 2-3 specific answer choices. Show the brand in motion.",\n'
    + '    "secondary": "3-4 sentences. How ' + s.name + ' adds texture. Where it surfaces.",\n'
    + '    "tension": "3-4 sentences. ' + t.name + ' — when it serves and when it betrays."\n'
    + '  },\n'
    + '  "strategicMoat": {\n'
    + '    "uniqueEnablement": "2-3 sentences on what this trinity uniquely enables in market.",\n'
    + '    "competitorsCantDo": "1-2 sentences on what competitors with different trinities CANNOT do.",\n'
    + '    "premiumPosition": "1-2 sentences on what clients will pay premium for."\n'
    + '  },\n'
    + '  "operatingMode": {\n'
    + '    "decisionStyle": "How this brand makes decisions. Concrete pattern.",\n'
    + '    "rhythm": "Its relationship to time — fast or slow, urgent or patient. Why.",\n'
    + '    "yesAndNo": "Format: YES to [X]. NO to [Y]. Two specific each."\n'
    + '  },\n'
    + '  "marketLandscape": {\n'
    + '    "occupiers": [\n'
    + '      {"brand":"Real brand name","read":"One sentence on how they hold this trinity"},\n'
    + '      {"brand":"Real brand name","read":"..."},\n'
    + '      {"brand":"Real brand name","read":"..."}\n'
    + '    ],\n'
    + '    "openSpace": "2-3 sentences on the position nobody currently owns."\n'
    + '  },\n'
    + '  "failurePattern": {\n'
    + '    "selfSabotage": "2-3 sentences on the SPECIFIC death spiral pattern.",\n'
    + '    "earlyWarnings": ["sign 1","sign 2","sign 3","sign 4"]\n'
    + '  },\n'
    + '  "growthArc": {\n'
    + '    "year1": "What to establish in year 1. One paragraph.",\n'
    + '    "year3": "Recognized positioning by year 3. One paragraph.",\n'
    + '    "year5": "The rare positioning at year 5. One paragraph."\n'
    + '  },\n'
    + '  "fusion": "ONE sentence: Only ' + brandName + ' can be ' + p.name.replace('The ','') + ' and ' + s.name.replace('The ','') + ' at the same time because [SPECIFIC REASON].",\n'
    + '  "decisionFilter": "ONE sharp question. Format: Does this make us [GIFT quality] without making us [SHADOW risk]?",\n'
    + '  "shadowsToWatch": ["behavior 1","behavior 2","behavior 3","behavior 4","behavior 5","behavior 6"],\n'
    + '  "voiceImplications": {\n'
    + '    "register": "1-2 sentences on register, rhythm, posture.",\n'
    + '    "neverSounds": "1 sentence on what it must NEVER sound like.",\n'
    + '    "signaturePhrase": "Short signature phrase this brand can own."\n'
    + '  },\n'
    + '  "visualImplications": {\n'
    + '    "world": "1-2 sentences on visual world — color temperature, geometry, materiality.",\n'
    + '    "neverLooks": "1 sentence on what it must NEVER look like.",\n'
    + '    "signatureMove": "Specific visual signature move."\n'
    + '  },\n'
    + '  "firstMoveThisWeek": "ONE specific action in the next 7 days. Concrete and doable.",\n'
    + '  "epigraph": "Short closing sentence (max 14 words) that captures this brand\'s essence."\n'
    + '}';

  return fetch('/api/claude', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 8000,
      system: sys,
      messages: [{ role:'user', content: usr }]
    })
  }).then(function(res){
    return res.json().then(function(data){ return { status: res.status, data: data }; });
  }).then(function(wrap){
    if (wrap.status === 503) throw new Error('Claude API key is not configured on the server.');
    if (wrap.status === 502) throw new Error('Could not reach Claude (upstream error).');
    if (wrap.status !== 200 || !wrap.data || !wrap.data.content){
      var msg = (wrap.data && wrap.data.error && (wrap.data.error.message || wrap.data.error)) || 'Unexpected response from the AI service.';
      throw new Error(msg);
    }
    var text = '';
    wrap.data.content.forEach(function(block){ if (block.type === 'text') text += block.text; });
    text = text.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();
    var start = text.indexOf('{'), end = text.lastIndexOf('}');
    if (start < 0 || end < 0 || end < start) throw new Error('The AI response was not valid JSON.');
    var parsed = JSON.parse(text.substring(start, end + 1));
    return validateAndFill(parsed, scored);
  });
}

function validateAndFill(parsed, scored){
  var p = ARCHETYPES[scored.primary];
  var s = ARCHETYPES[scored.secondary];
  var t = ARCHETYPES[scored.tension];
  var r = parsed || {};
  r.headline = r.headline || (p.name + ' primary, ' + s.name + ' secondary, ' + t.name + ' tension.');
  r.centralParadox = r.centralParadox || {};
  r.trinityReads = r.trinityReads || {};
  r.strategicMoat = r.strategicMoat || {};
  r.operatingMode = r.operatingMode || {};
  r.marketLandscape = r.marketLandscape || {};
  r.marketLandscape.occupiers = Array.isArray(r.marketLandscape.occupiers) ? r.marketLandscape.occupiers : [];
  r.failurePattern = r.failurePattern || {};
  r.failurePattern.earlyWarnings = Array.isArray(r.failurePattern.earlyWarnings) ? r.failurePattern.earlyWarnings : [];
  r.growthArc = r.growthArc || {};
  r.fusion = r.fusion || ('Only this brand can be ' + p.name.replace('The ','') + ' and ' + s.name.replace('The ','') + ' at the same time.');
  r.decisionFilter = r.decisionFilter || ('Does this make us more ' + p.gift.toLowerCase() + ' without making us more ' + p.shadow.toLowerCase() + '?');
  r.shadowsToWatch = Array.isArray(r.shadowsToWatch) ? r.shadowsToWatch : [];
  if (typeof r.voiceImplications === 'string') r.voiceImplications = { register: r.voiceImplications, neverSounds:'', signaturePhrase:'' };
  r.voiceImplications = r.voiceImplications || {};
  if (typeof r.visualImplications === 'string') r.visualImplications = { world: r.visualImplications, neverLooks:'', signatureMove:'' };
  r.visualImplications = r.visualImplications || {};
  r.firstMoveThisWeek = r.firstMoveThisWeek || '';
  r.epigraph = r.epigraph || "The brand isn't being invented here. It's being uncovered.";
  return r;
}

  var p = ARCHETYPES[scored.primary];
  var s = ARCHETYPES[scored.secondary];
  var t = ARCHETYPES[scored.tension];
  var brand = QBP.brandName || 'Your brand';
  return {
    headline: brand + ' reads as a ' + p.name + ' primary with ' + s.name + ' texture and ' + t.name + ' tension.',
    centralParadox: {
      statement: 'You are ' + p.name.replace('The ','') + ' yet ' + s.name.replace('The ','') + ' — and ' + t.name.replace('The ','') + ' keeps knocking.',
      whenGoverned: 'Held with intention, this combination produces a brand that delivers ' + p.gift.toLowerCase() + ' through the texture of ' + s.gift.toLowerCase() + '.',
      whenUngoverned: 'Without discipline, ' + p.shadow.toLowerCase() + ' amplifies ' + s.shadow.toLowerCase() + ', and ' + t.shadow.toLowerCase() + ' pulls the brand off-axis.'
    },

      primary: p.name + ' is the operating system. The diagnostic points to a brand built around ' + p.gift.toLowerCase() + '. Deploy with ANTHROPIC_API_KEY configured for the deep reading tied to your specific answers.',

    },

      uniqueEnablement: 'The combination of ' + p.name + ' and ' + s.name + ' enables work few competitors can produce.',
      competitorsCantDo: 'Brands leading with only one archetype cannot hold this complexity without sounding scattered.',
      premiumPosition: 'Clients pay premium for ' + p.gift.toLowerCase() + ' delivered with the felt presence of ' + s.gift.toLowerCase() + '.'
    },
    operatingMode: {
      decisionStyle: 'Decisions filter through the ' + p.gift.toLowerCase() + ' lens first, then through the ' + s.gift.toLowerCase() + ' lens.',

      yesAndNo: 'YES to work that strengthens both ' + p.gift.toLowerCase() + ' and ' + s.gift.toLowerCase() + '. NO to work that requires ' + t.shadow.toLowerCase() + ' to succeed.'
    },
    marketLandscape: {
      occupiers: [
        { brand: p.brand, read: 'Holds the pure ' + p.name + ' position with global recognition.' },
        { brand: s.brand, read: 'Holds the pure ' + s.name + ' position — useful contrast for your texture.' }
      ],
      openSpace: 'The intersection of ' + p.name + ' and ' + s.name + ' is rarely owned cleanly. Most brands collapse one into the other.'
    },
    failurePattern: {
      selfSabotage: 'The death spiral begins when ' + p.shadow.toLowerCase() + ' compensates for ' + s.shadow.toLowerCase() + ', then ' + t.shadow.toLowerCase() + ' steps in — at which point coherence collapses.',
      earlyWarnings: [
        'Decisions start being made to manage perception rather than express identity',
        'The voice begins drifting toward the ' + t.name + ' register without intention',
        'Visual identity choices feel safer than the brand actually is',
        'The team can no longer articulate why a "no" is a no'
      ]
    },
    growthArc: {
      year1: 'Establish the ' + p.name + ' foundation publicly. Make ' + p.gift.toLowerCase() + ' undeniable.',
      year3: 'Become known for the rare combination — ' + p.name + ' delivered through ' + s.name + ' texture.',
      year5: 'Hold the position no competitor can copy. The ' + p.name + '/' + s.name + ' space is yours.'
    },
    fusion: 'Only ' + brand + ' can be ' + p.name.replace('The ','') + ' and ' + s.name.replace('The ','') + ' at the same time.',
    decisionFilter: 'Does this make us more ' + p.gift.toLowerCase() + ' without making us more ' + p.shadow.toLowerCase() + '?',
    shadowsToWatch: [
      'Watch for ' + p.shadow.toLowerCase() + ' — the failure mode of the ' + p.name + '.',
      'Watch for ' + s.shadow.toLowerCase() + ' — the failure mode of the ' + s.name + '.',
      'Watch for ' + t.shadow.toLowerCase() + ' — the failure mode of the ' + t.name + '.',
      'When ' + p.name + ' and ' + t.name + ' collide unexamined, the brand reads as inconsistent.'
    ],
    voiceImplications: {
      register: 'Voice should foreground the ' + p.gift.toLowerCase() + ' of the ' + p.name + ', modulated by the ' + s.gift.toLowerCase() + ' of the ' + s.name + '.',
      neverSounds: 'Never sound like the ' + t.name + ' — this is where the brand drifts when uncertain.',
      signaturePhrase: 'Deploy with ANTHROPIC_API_KEY for a brand-specific signature phrase.'
    },
    visualImplications: {
      world: 'Visual identity should sit in the world of the ' + p.name + ', with inflections from the ' + s.name + '.',
      neverLooks: 'Never look like the ' + t.name + ' — these visual cues take over the system fast.',
      signatureMove: 'Deploy with ANTHROPIC_API_KEY for a brand-specific signature visual move.'
    },
    firstMoveThisWeek: 'Audit one piece of recent brand output. Test it against the trinity: does it lead with ' + p.gift.toLowerCase() + '? Does the ' + s.name + ' texture come through? Does any ' + t.shadow.toLowerCase() + ' sneak in?',
    epigraph: "The brand isn't being invented here. It's being uncovered."
  };
}

/* ============================== QBP WRITER ============================== */
function saveToQBP(){
  if (!S.result) return;
  var r = S.result;

  function topPickQBP(n){
    var a = S.answers[n];
    if (Array.isArray(a) && a.length) return SCREENS[n-1].opts[a[0]];
    if (typeof a === 'number') return SCREENS[n-1].opts[a];
    return null;
  }
  var tone = topPickQBP(1);
  var motivation = topPickQBP(5);
  var fear = topPickQBP(7);

  var existing = {};
  try { Object.assign(existing, JSON.parse(localStorage.getItem('qb_qbp') || '{}')); } catch(e){}

  var updated = Object.assign({}, existing, {
    archetype:                ARCHETYPES[r.primary].name,
    archetypePrimary:         ARCHETYPES[r.primary].name,
    archetypeSecondary:       ARCHETYPES[r.secondary].name,
    archetypeTension:         ARCHETYPES[r.tension].name,
    archetypeToneRegister:    tone ? tone.label : '',
    archetypeCoreMotivation:  motivation ? motivation.label : '',
    archetypeCoreFear:        fear ? fear.words.join(' · ') : '',
    archetypeHeadline:        r.headline || '',
    archetypeFusion:          r.fusion || '',
    archetypeDecisionFilter:  r.decisionFilter || '',
    archetypeShadowsToWatch:  r.shadowsToWatch || [],
    archetypeFirstMove:       r.firstMoveThisWeek || '',
    archetypeEpigraph:        r.epigraph || '',
    archetypeTrinityReads:    r.trinityReads || {},
    archetypeCentralParadox:  r.centralParadox || {},
    archetypeStrategicMoat:   r.strategicMoat || {},
    archetypeOperatingMode:   r.operatingMode || {},
    archetypeMarketLandscape: r.marketLandscape || {},
    archetypeFailurePattern:  r.failurePattern || {},
    archetypeGrowthArc:       r.growthArc || {},
    archetypeVoiceImplications:     (r.voiceImplications && r.voiceImplications.register) || '',
    archetypeVoiceImplicationsFull: r.voiceImplications || {},
    archetypeVisualImplications:    (r.visualImplications && r.visualImplications.world) || '',
    archetypeVisualImplicationsFull: r.visualImplications || {},
    archetypeCompassComplete: true,
    archetypeCompassDate:     new Date().toISOString(),
    archetypeCompassFallback: !!S.fallbackUsed,
    archetypeRawAnswers:      S.answers
  });

  try {
    // Cloud-aware write: mirrors to Supabase if user is authed
    if (window.QB && QB.setQBP) { QB.setQBP(updated); }
    else { localStorage.setItem('qb_qbp', JSON.stringify(updated)); }
    S.saved = true;
    QBP = updated;
    try {
      window.dispatchEvent(new StorageEvent('storage', {
        key:'qb_qbp', newValue:JSON.stringify(updated), storageArea:localStorage
      }));
    } catch(e){}
    render();
    // Open soft gate (no-op if already authed; records local + cloud completion either way)
    try {
      if (window.QB && QB.openGate){
        QB.openGate({ toolId:'archetype-compass', toolName:'Archetype Compass', brandName: updated.brandName || '' });
      }
    } catch(e){ console.warn('QB gate:', e); }
  } catch(err){
    alert('Could not save to localStorage. Check browser settings.');
  }
}

/* ============================== INIT ============================== */
render();
</script>
