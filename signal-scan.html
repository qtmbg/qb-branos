const QUESTIONS = [

const DIMENSIONS = [
  {id:'identity',    label:'Identity Clarity',   qIds:['identity'],   weight:20},
  {id:'visual',      label:'Visual Coherence',    qIds:['visual'],     weight:18},
  {id:'voice',       label:'Voice Consistency',   qIds:['voice'],      weight:17},
  {id:'positioning', label:'Market Positioning',  qIds:['positioning'],weight:22},
  {id:'content',     label:'Content Performance', qIds:['content'],    weight:13},
  {id:'price',       label:'Brand Authority',     qIds:['price'],      weight:10},
];
function calcScores(answers){
  let total = 0;
  const dims = DIMENSIONS.map(d=>{
    const vals = d.qIds.map(id=>answers[id]??2);
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    const score = Math.round(((3-avg)/3)*100);
    total += score * (d.weight/100);
    return {...d, score};
  });
  return {overall: Math.round(total), dims};
}
function getVerdict(score, moment){
  if(score>=80) return {grade:'A',label:'Strong Foundation',color:'var(--patina)',desc:'Your brand has real coherence. The system helps you sharpen and scale what is already working.'};
  if(score>=60) return {grade:'B',label:'Clear Gaps',color:'var(--info)',desc:'The bones are right but key elements are misaligned. Targeted work produces rapid improvement.'};
  if(score>=40) return {grade:'C',label:'Structural Issues',color:'var(--warning)',desc:'Your brand is working against you. The gaps are costing you clients and price authority.'};
  return {grade:'D',label:'Foundation Needed',color:'var(--error)',desc:'The brand is not doing its job. Before more content or campaigns — rebuild from identity.'};
}
function getTopGap(dims){
  return [...dims].sort((a,b)=>a.score-b.score)[0];
}
function getRecommendedPath(moment, topGap){
  const tools = {
    soulMap:  {tool:'Brand Soul Map',    file:'brand-soul-map.html',            desc:'Start at identity. Everything else is built from here.'},
    logo:     {tool:'Logo Evaluation',   file:'logo-evaluation-agent.html',     desc:'Audit what you have against identity standards before rebuilding.'},
    warTable: {tool:'War Table',         file:'war-table.html',                 desc:'Pressure-test your next move with strategic prioritization.'},
  };
  if(moment==='blank' || moment==='pivot') return tools.soulMap;
  if(moment==='doubt'){
    if(topGap.id==='identity') return {...tools.soulMap, desc:'The identity is the root problem. Resolve this before any visual or voice work.'};
    if(topGap.id==='visual')   return {...tools.logo,    desc:'The visual system is your primary gap. Audit it against identity standards first.'};
    return tools.logo;
  }
  if(moment==='scale'){
    if(topGap.id==='identity')    return {...tools.soulMap,  desc:'Scale without a clear identity compounds confusion. Fix the foundation first.'};
    if(topGap.id==='positioning') return {...tools.warTable, desc:'Sharpen your positioning before scaling — the gap is actively costing you market share.'};
    return tools.warTable;
  }
  return tools.soulMap;
}

function render(){
  // Guard: if nothing structural changed, don't rebuild the DOM.
  // This protects text/email inputs from losing focus during typing
  // even if render() is accidentally invoked from an input event.
  if(step === lastRenderedStep && analyzing === lastRenderedAnalyzing){
    return;
  }
  lastRenderedStep = step;
  lastRenderedAnalyzing = analyzing;
  const active = document.activeElement;
  let focusInfo = null;
  if(active && (active.tagName==='TEXTAREA' || (active.tagName==='INPUT' && active.type==='email')) && app.contains(active)){
    focusInfo = {tag: active.tagName, type: active.type, selStart: active.selectionStart, selEnd: active.selectionEnd};

    const sel = focusInfo.tag==='TEXTAREA' ? 'textarea' : 'input[type="email"]';
    const el = app.querySelector(sel);
    if(el){

}

        div({width:'6px',height:'6px',borderRadius:'50%',background:'var(--text-4)',flexShrink:'0'}),
        div({fontSize:'13px',color:'var(--text-3)'},'Instant score'),
      ]),
      div({display:'flex',alignItems:'center',gap:'8px'},[
        div({width:'6px',height:'6px',borderRadius:'50%',background:'var(--text-4)',flexShrink:'0'}),
        div({fontSize:'13px',color:'var(--text-3)'},'No credit card'),
      ]),
    ]),
  ]));
  const btn=document.createElement('button');
  btn.className='cta-primary';btn.textContent='Start the Scan →';
  btn.style.width='auto'; btn.style.alignSelf='flex-start'; btn.style.padding='18px 36px'; btn.style.fontSize='12px';
  btn.onclick=()=>{step=1;render();};
  wrap.appendChild(btn);
  wrap.appendChild(div({marginTop:'40px'},[
    p('Used by 1,000+ founders and brand builders.',{fontSize:'13px',color:'var(--text-3)'})
  ]));
  return wrap;
}
function buildQuestion(){
  const qIdx = step-1;
  const q = QUESTIONS[qIdx];
  const pct = (step/8)*100;
  const wrap=div({flex:'1',display:'flex',flexDirection:'column',animation:'fadeIn .5s cubic-bezier(.2,0,0,1)'});
  const progWrap=div({marginBottom:'40px'},[]);
  const progBar=div({class:'progress-bar'},[]);
  const progFill=document.createElement('div');
  progFill.className='progress-fill';
  progFill.style.width=`${pct}%`;
  progBar.appendChild(progFill);
  progWrap.appendChild(progBar);
  progWrap.appendChild(div({display:'flex',justifyContent:'space-between'},[
    div({fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text-3)',letterSpacing:'.15em',textTransform:'uppercase'},`Step ${step} of 8`),
    div({fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--brass)',letterSpacing:'.15em'},`${Math.round(pct)}%`),
  ]));
  wrap.appendChild(progWrap);
  wrap.appendChild(div({marginBottom:'32px'},[
    h1(q.q,{fontSize:'28px',marginBottom:'12px'}),
    p(q.sub,{fontSize:'14px'}),
  ]));
  if(q.type==='single'){
    const optWrap=div({display:'flex',flexDirection:'column',gap:'12px',flex:'1'},[]);
    q.options.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className=`option-btn${answers[q.id]===opt.v?' selected':''}`;
      btn.innerHTML=`<div class="opt-dot"></div><span style="padding-top:1px">${opt.l}</span>`;
      btn.onclick=()=>{
        answers[q.id]=opt.v;
        if(step<8){setTimeout(()=>{step++;render();},250);}
        else{render();}
      };
      optWrap.appendChild(btn);
    });
    wrap.appendChild(optWrap);
  } else {
    const ta=document.createElement('textarea');
    ta.placeholder=q.placeholder||'Type here…';
    ta.rows=4;ta.value=answers[q.id]||'';
    ta.addEventListener('input',e=>{answers[q.id]=e.target.value;});
    wrap.appendChild(ta);
    wrap.appendChild(div({height:'20px'}));
    const next=document.createElement('button');
    next.className='cta-primary';next.textContent='Continue →';
    next.style.width='auto'; next.style.alignSelf='flex-start';
    next.onclick=()=>{
      if(!answers[q.id]?.trim()){answers[q.id]='Not specified';}
      step++;render();
    };
    wrap.appendChild(next);
  }
  if(step>1){
    wrap.appendChild(div({marginTop:'32px'},[
      (()=>{const b=document.createElement('button');b.className='cta-secondary';b.textContent='← Back';b.onclick=()=>{step--;render();};return b;})()
    ]));
  }
  return wrap;
}
function buildEmail(){
  const wrap=div({flex:'1',display:'flex',flexDirection:'column',justifyContent:'center',animation:'fadeIn .5s cubic-bezier(.2,0,0,1)'});
  wrap.appendChild(div({marginBottom:'40px'},[
    div({display:'flex',alignItems:'center',gap:'10px',marginBottom:'20px'},[
      div({class:'pulse-dot'}),
      monoLabel('Almost there', 'var(--brass)', {marginBottom:'0px'})
    ]),
    h1('Your scan is ready.',{fontSize:'32px'}),
    p('Enter your email to receive your complete Brand Signal Report — your score, the gaps, and the exact first move.'),
    div({marginTop:'16px',fontSize:'13px',color:'var(--text-3)',lineHeight:'1.7'},'No spam. No sales sequences. Just your intelligence report.'),
  ]));
  const emailEl=document.createElement('input');
  emailEl.type='email';emailEl.placeholder='your@email.com';emailEl.className='email-input';
  emailEl.value=email;emailEl.addEventListener('input',e=>{email=e.target.value;});
  wrap.appendChild(emailEl);
  wrap.appendChild(div({height:'16px'}));
  const btn=document.createElement('button');
  btn.className='cta-primary';btn.textContent='Send My Report →';
  btn.onclick=async()=>{
    if(!email.includes('@')){emailEl.style.borderColor='var(--error)';return;}
    emailSubmitted=true;
    analyzing=true;
    step=9;render();
    try {
    result = calcScores(answers);
    const topGap = getTopGap(result.dims);
    const verdict = getVerdict(result.overall, answers.moment);
    const userEmail = email;
    const overallScore = result.overall;
    const dimScore = (id)=>((result.dims.find(d=>d.id===id)||{}).score);
    const identityScore    = dimScore('identity');
    const visualScore      = dimScore('visual');
    const voiceScore       = dimScore('voice');
    const positioningScore = dimScore('positioning');
    const contentScore     = dimScore('content');
    const authorityScore   = dimScore('price');
    const topGapLabel      = topGap.label;
    const verdictText      = verdict.label;
    try {
      console.log('Klaviyo call firing for:', userEmail);
      var klaviyoBody = new URLSearchParams();
      klaviyoBody.append('g', 'Rh3gvy');
      klaviyoBody.append('email', userEmail);
      klaviyoBody.append('$fields', 'email');
      klaviyoBody.append('$source', 'Signal Scan');
      fetch('https://manage.kmail-lists.com/ajax/subscriptions/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: klaviyoBody.toString()
      })
      .then(function(r){ return r.json(); })
      .then(function(d){ console.log('Klaviyo response:', d); })
      .catch(function(e){ console.warn('Klaviyo network error:', e); });
    } catch(err) { console.warn('Klaviyo signal-scan sync failed:', err); }
    } catch(err) {
      console.error('Signal scan submit error:', err);
    }
    const QB_KLAVIYO_KEY = window.QB_KLAVIYO_KEY || '';
    const QB_KLAVIYO_LIST_ID = window.QB_KLAVIYO_LIST_ID || '';
    if(QB_KLAVIYO_KEY && QB_KLAVIYO_LIST_ID){
      try{
        const profileRes = await fetch('https://a.klaviyo.com/client/profiles/?company_id='+QB_KLAVIYO_KEY,{
          method:'POST',
          headers:{'Content-Type':'application/json','revision':'2026-01-15'},
          body:JSON.stringify({
            data:{
              type:'profile',
              attributes:{
                email:email,
                properties:{
                  signal_scan_score:   result.overall,
                  signal_scan_grade:   verdict.grade,
                  signal_scan_verdict: verdict.label,
                  signal_scan_top_gap: topGap.label,
                  signal_scan_moment:  answers.moment,
                  signal_scan_describe:answers.describe||'',
                  signal_scan_date:    new Date().toISOString().split('T')[0],
                }
              }
            }
          })
        });
        if(profileRes.ok||profileRes.status===409){
          await fetch('https://a.klaviyo.com/client/subscriptions/?company_id='+QB_KLAVIYO_KEY,{
            method:'POST',
            headers:{'Content-Type':'application/json','revision':'2026-01-15'},
            body:JSON.stringify({
              data:{
                type:'subscription',
                attributes:{
                  profile:{data:{type:'profile',attributes:{email:email}}},
                  custom_source:'Signal Scan'
                },
                relationships:{list:{data:{type:'list',id:QB_KLAVIYO_LIST_ID}}}
              }
            })
          });
        }
      }catch(err){
        console.warn('Klaviyo sync failed silently:',err);
      }
    }
    setTimeout(()=>{analyzing=false;step=10;render();},3200);
  };
  wrap.appendChild(btn);
  return wrap;
}
function buildAnalyzing(){
  const wrap=div({flex:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'32px',textAlign:'center'});
  const spinner=div({width:'56px',height:'56px',border:'2px solid var(--border-subtle)',borderTop:'2px solid var(--brass)',borderRight:'2px solid var(--patina)',borderRadius:'50%'});
  spinner.style.animation='spin 1s linear infinite';
  wrap.appendChild(spinner);
  wrap.appendChild(div({textAlign:'center'},[
    monoLabel('Compiling intelligence','var(--brass)',{marginBottom:'12px',textAlign:'center'}),
    div({fontSize:'14px',color:'var(--text-2)',fontFamily:'var(--font-display)',letterSpacing:'0.02em'},[
      document.createTextNode('Reading answers through the brand lens…'),
    ]),
  ]));
  return wrap;
}
function buildResults(){
  if(!result) return buildIntro();
  const {overall, dims} = result;
  const verdict = getVerdict(overall, answers.moment);
  const topGap = getTopGap(dims);
  const path = getRecommendedPath(answers.moment, topGap);
  const circumference = 2*Math.PI*54;
  const offset = circumference - (overall/100)*circumference;
  const wrap=div({flex:'1',display:'flex',flexDirection:'column',animation:'fadeIn .6s cubic-bezier(.2,0,0,1)'});
  wrap.appendChild(div({marginBottom:'40px'},[
    monoLabel('Brand Signal Report','var(--text-3)',{marginBottom:'12px'}),
    h1('Your intelligence brief.',{fontSize:'32px',marginBottom:'8px'}),
    div({fontSize:'14px',color:'var(--text-3)'},'Based on 6 brand health dimensions'),
    div({fontFamily:'var(--font-mono)',fontSize:'11px',color:'var(--patina)',letterSpacing:'.08em',textTransform:'uppercase',marginTop:'14px',animation:'fadeIn .8s cubic-bezier(.2,0,0,1)'},'Results on the way. Check your inbox.'),
    div({fontFamily:'var(--font-mono)',fontSize:'0.6rem',color:'var(--text-3)',letterSpacing:'.08em',textTransform:'uppercase',marginTop:'6px',animation:'fadeIn .8s cubic-bezier(.2,0,0,1)'},'Check your spam folder if you don\'t see it within 2 minutes.'),
  ]));
  const scoreRow=div({display:'flex',gap:'24px',alignItems:'flex-start',marginBottom:'36px',flexWrap:'wrap'},[]);
  const svgNS='http://www.w3.org/2000/svg';

  svg.setAttribute('width','120');svg.setAttribute('height','120');svg.setAttribute('viewBox','0 0 120 120');
  svg.style.flexShrink='0';
  const bgCircle=document.createElementNS(svgNS,'circle');
  bgCircle.setAttribute('cx','60');bgCircle.setAttribute('cy','60');bgCircle.setAttribute('r','54');
  bgCircle.setAttribute('class','score-ring-bg');svg.appendChild(bgCircle);
  const fgCircle=document.createElementNS(svgNS,'circle');
  fgCircle.setAttribute('cx','60');fgCircle.setAttribute('cy','60');fgCircle.setAttribute('r','54');
  fgCircle.setAttribute('class','score-ring-fg');
  fgCircle.setAttribute('stroke',verdict.color);
  fgCircle.setAttribute('stroke-dasharray',circumference);
  fgCircle.setAttribute('stroke-dashoffset',circumference);
  svg.appendChild(fgCircle);
  const scoreText=document.createElementNS(svgNS,'text');
  scoreText.setAttribute('x','60');scoreText.setAttribute('y','60');
  scoreText.setAttribute('text-anchor','middle');scoreText.setAttribute('dominant-baseline','central');
  scoreText.setAttribute('font-family','var(--font-mono)');scoreText.setAttribute('font-size','28');
  scoreText.setAttribute('font-weight','400');scoreText.setAttribute('fill',verdict.color);
  scoreText.textContent=overall;svg.appendChild(scoreText);
  const gradeText=document.createElementNS(svgNS,'text');
  gradeText.setAttribute('x','60');gradeText.setAttribute('y','82');
  gradeText.setAttribute('text-anchor','middle');gradeText.setAttribute('font-family','var(--font-body)');
  gradeText.setAttribute('font-size','11');gradeText.setAttribute('fill','var(--text-3)');
  gradeText.textContent='/100';svg.appendChild(gradeText);
  scoreRow.appendChild(svg);
  setTimeout(()=>{fgCircle.style.strokeDashoffset=offset;},100);
  const verdictBlock=div({flex:'1',minWidth:'180px',paddingTop:'8px'},[]);
  const gradePill=div({display:'inline-flex',alignItems:'center',gap:'10px',padding:'6px 14px',borderRadius:'6px',marginBottom:'16px'},[]);
  const [r,g,b] = VERDICT_RGBA[verdict.color] || [58,95,74];
  gradePill.style.background = `rgba(${r},${g},${b},0.15)`;
  gradePill.style.border = `1px solid rgba(${r},${g},${b},0.30)`;

  gradePill.appendChild(div({fontFamily:'var(--font-mono)',fontSize:'10px',color:verdict.color,letterSpacing:'.1em',textTransform:'uppercase',lineHeight:'1'},verdict.label));

  verdictBlock.appendChild(div({fontSize:'14px',color:'var(--text-2)',lineHeight:'1.75'},verdict.desc));
  scoreRow.appendChild(verdictBlock);
  wrap.appendChild(scoreRow);
  wrap.appendChild(div({class:'glass-card', padding:'24px 28px', marginBottom:'24px'},[
    monoLabel('Dimension breakdown','var(--text-3)',{marginBottom:'24px'}),

      const barColor = d.score>=70?'var(--patina)':d.score>=45?'var(--warning)':'var(--error)';

        div({fontSize:'13px',color:d.id===topGap.id?'var(--text-1)':'var(--text-2)',fontWeight:d.id===topGap.id?'600':'400'},d.label+(d.id===topGap.id?' ← primary gap':'')),

    (()=>{
      const btn=document.createElement('button');
      btn.className='cta-secondary';
      btn.textContent='Explore BrandOS →';
      btn.onclick=()=>{window.open('qb-brandos-hub.html','_blank');};

      (()=>{
        const b=document.createElement('button');
        b.style.background='transparent'; b.style.border='none'; b.style.color='var(--text-4)';
        b.style.fontFamily='var(--font-body)'; b.style.fontSize='12px'; b.style.textDecoration='underline';
        b.style.cursor='pointer'; b.textContent='Run another scan';
        b.onmouseover=()=>b.style.color='var(--text-3)'; b.onmouseout=()=>b.style.color='var(--text-4)';
        b.onclick=()=>{step=0;answers={};result=null;email='';emailSubmitted=false;render();};
        return b;
      })()
    ])
  ]));
  return wrap;
}
