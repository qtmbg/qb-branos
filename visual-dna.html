  (function() {
    try {
      var t = localStorage.getItem('qb-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch(e) {}
  })();

    darkMode: ["class", '[data-theme="dark"]'],

          sans: ["Inter", "-apple-system", "sans-serif"], 
          mono: ["JetBrains Mono", "monospace"],
          serif: ["DM Serif Display", "Georgia", "serif"]

        colors: {

          brass: { DEFAULT: "#A8903E", lit: "#C4A84E", dim: "rgba(168,144,62,0.18)", faint: "rgba(168,144,62,0.06)" },
          warmred: "#8A4A4A",
          bg: { void: "var(--bg-void)", deep: "var(--bg-deep)", base: "var(--bg-base)", surface: "var(--bg-surface)", elevated: "var(--bg-elevated)", overlay: "var(--bg-overlay)" },

          text: { 1: "var(--text-1)", 2: "var(--text-2)", 3: "var(--text-3)", 4: "var(--text-4)" }

      }

  }
</script>

<style>
  /* DESIGN SYSTEM: Entangled Time - Base Variables */
  :root, [data-theme="dark"] {
    --bg-void: #080604;
    --bg-deep: #0A0806;
    --bg-base: #0E0C09;
    --bg-surface: rgba(140,110,70,0.045);
    --bg-elevated: rgba(140,110,70,0.07);
    --bg-overlay: rgba(18,15,10,0.85);
    --border-subtle: rgba(140,110,70,0.06);
    --border-medium: rgba(140,110,70,0.11);
    --border-strong: rgba(140,110,70,0.18);
    --text-1: #DDD4C4;
    --text-2: #A89A88;
    --text-3: #6A5E50;
    --text-4: #3E3830;

    /* Brand colour tokens — used in plain CSS rules below */
    --patina: #3A5F4A;
    --patina-lit: #4A7A5E;
    --patina-faint: rgba(58,95,74,0.08);
    --brass: #A8903E;
    --brass-faint: rgba(168,144,62,0.06);
  }
  
  [data-theme="light"] {
    --bg-void: #F4F0EB;
    --bg-deep: #EDE8E2;
    --bg-base: #E6E0D8;
    --bg-surface: rgba(100,80,50,0.04);
    --bg-elevated: rgba(100,80,50,0.07);
    --bg-overlay: rgba(244,240,235,0.9);
    --border-subtle: rgba(100,80,50,0.08);
    --border-medium: rgba(100,80,50,0.14);
    --border-strong: rgba(100,80,50,0.22);
    --text-1: #1A1610;
    --text-2: #5A5040;
    --text-3: #8A7E70;
    --text-4: #B8AEA0;

    /* Brand colour tokens — light mode variants */
    --patina: #2E4D3A;
    --patina-lit: #3A5F4A;
    --patina-faint: rgba(46,77,58,0.08);
    --brass: #8A7430;
    --brass-faint: rgba(138,116,48,0.06);
  }

  html:not([data-theme]) { background: #080604; color: #A89A88; }
  
  body {
    background-color: var(--bg-void);
    color: var(--text-2);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* 1. Film Grain Overlay */
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
  [data-theme="light"] body::after { opacity: 0.02; }

  /* 8. Warm Vignette */
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(8,6,4,0.4) 100%);
  }
  [data-theme="light"] .vignette {
    background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(200,190,175,0.15) 100%);
  }

  /* 2. Warm Glass Cards */
  .glass-card {
    background: var(--bg-overlay);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border-medium);
    border-radius: 14px;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .glass-card::before {
    content: ''; position: absolute; top: -30%; left: -10%; width: 60%; height: 60%;
    background: radial-gradient(ellipse at center, rgba(168,144,62,0.035) 0%, transparent 70%);
    pointer-events: none;
  }

  /* 3. Brass Heartbeat Pulse */
  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #A8903E;
    box-shadow: 0 0 8px rgba(168,144,62,0.7), 0 0 2px rgba(168,144,62,1);
    animation: beat 3s ease infinite;
  }
  [data-theme="light"] .pulse-dot {
    background: #8A7430; box-shadow: 0 0 8px rgba(138,116,48,0.7), 0 0 2px rgba(138,116,48,1);
  }
  @keyframes beat {
    0%, 100% { transform: scale(1); opacity: 1; }
    12% { transform: scale(1.35); opacity: 1; }
    24% { transform: scale(0.95); opacity: 0.6; }
    36% { transform: scale(1.15); opacity: 1; }
    48% { transform: scale(1); opacity: 0.7; }
  }

  /* 4. Manifesto Block */
  .manifesto-block {
    position: relative;
    padding: 24px 0 24px 24px;
  }
  .manifesto-block::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: linear-gradient(180deg, var(--brass) 0%, var(--patina) 100%);
    border-radius: 2px;
    box-shadow: 0 0 8px var(--brass-faint);
  }

  /* 5. Input Focus */
  input:focus, textarea:focus {
    border-color: var(--patina) !important;
    box-shadow: 0 0 0 3px var(--patina-faint), 0 0 24px -4px var(--brass-faint);
    outline: none;
  }

  /* 6. Primary Button */
  .btn-primary {
    background: var(--patina);
    color: #E6DDD0;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 14px 32px; border-radius: 7px; border: none;
    transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--patina-lit);
    transform: translateY(-1px);
    box-shadow: 0 4px 24px -4px rgba(58,95,74,0.3), 0 0 0 1px var(--brass-faint);
  }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(50%); }

  /* 7. Progress/Image Filters */
  .quantum-image {
    filter: contrast(1.05) saturate(0.9) sepia(0.1);
  }

  /* Animations */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes fadeInSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeInSlideUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  
  /* Typography Overrides */
  .heading-display {
    font-family: 'DM Serif Display', Georgia, serif;
    font-weight: 400;
    letter-spacing: -0.015em;
    color: var(--text-1);
  }
  .label-system {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-3);
  }
  .body-copy {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-2);
  }
</style>

// --- DATA & TAXONOMY ---
const TAG_DIMENSIONS = {
  weight: ['Light', 'Medium', 'Heavy'],
  temperature: ['Warm', 'Neutral', 'Cool'],
  composition: ['Minimal', 'Structured', 'Dense'],
  subject: ['Architecture', 'Person', 'Object', 'Abstract', 'Nature', 'Typography'],
  energy: ['Static', 'Implied motion', 'Kinetic'],
  era: ['Heritage', 'Timeless', 'Contemporary', 'Futuristic'],
  finish: ['Matte', 'Textured', 'Glossy', 'Gradient'],
  mood: ['Serene', 'Confident', 'Intense', 'Playful', 'Intimate', 'Monumental']
};

const generateMockImages = (count = 200) => {
  const images = [];
  const baseUrls = [
    'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1518640467707-6811f4a6ab73?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1534081333815-ae5019106622?auto=format&fit=crop&w=1920&q=80',
  ];
  for (let i = 0; i < count; i++) {
    const isShadow = i % 8 === 0;
    const tags = {};
    Object.keys(TAG_DIMENSIONS).forEach(dim => {
      const options = TAG_DIMENSIONS[dim];
      tags[dim] = options[Math.floor(Math.random() * options.length)];
    });
    images.push({
      id: `img_${i + 1}`,
      url: `${baseUrls[i % baseUrls.length]}&sig=${i}`,
      tags,
      isShadow
    });
  }
  return images;
};

// --- CORE COMPONENTS ---

// Physics Engine for Cards
const SwipeCard = ({ image, onSwipe }) => {
  const [position, setPosition] = useState({ x: 0, y: 0 });
  const [isDragging, setIsDragging] = useState(false);
  const cardRef = useRef(null);
  const startPos = useRef({ x: 0, y: 0 });
  const mountTime = useRef(Date.now());
  const isExiting = useRef(false);
  const threshold = 120;
  
  const triggerExit = useCallback((action) => {
    if (isExiting.current) return;
    isExiting.current = true;
    const hesitation = Date.now() - mountTime.current;
    const direction = action === 'keep' ? window.innerWidth : -window.innerWidth;
    if (cardRef.current) cardRef.current.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease-out';
    setPosition({ x: direction, y: position.y });
    setTimeout(() => onSwipe(action, hesitation), 300);
  }, [onSwipe, position.y]);

  useEffect(() => {
    mountTime.current = Date.now();
    const handleKeyDown = (e) => {
      if (e.key === 'ArrowLeft') triggerExit('discard');
      else if (e.key === 'ArrowRight') triggerExit('keep');
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [image.id, triggerExit]);

  const handlePointerDown = (e) => {
    if (isExiting.current) return;
    e.currentTarget.setPointerCapture(e.pointerId);
    setIsDragging(true);
    startPos.current = { x: e.clientX - position.x, y: e.clientY - position.y };
    if (cardRef.current) cardRef.current.style.transition = 'none';
  };

  const handlePointerMove = (e) => {
    if (!isDragging || isExiting.current) return;
    const newX = e.clientX - startPos.current.x;
    const newY = e.clientY - startPos.current.y;
    setPosition({ x: newX, y: newY });
  };

  const handlePointerUp = (e) => {
    setIsDragging(false);
    if (isExiting.current) return;
    if (cardRef.current) cardRef.current.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease-out';
    const dragDistance = Math.abs(position.x);
    if (position.x > threshold) triggerExit('keep');
    else if (position.x < -threshold) triggerExit('discard');
    else if (dragDistance < 10) {
      const clickX = e.clientX;
      if (clickX > window.innerWidth / 2) triggerExit('keep');
      else triggerExit('discard');
    } else setPosition({ x: 0, y: 0 });
  };

  const rotation = position.x * 0.05;
  const opacity = 1 - Math.abs(position.x) / (window.innerWidth * 1.5);
  const glowRight = Math.max(0, position.x / threshold);
  const glowLeft = Math.max(0, -position.x / threshold);

  return (
    <div className="absolute inset-0 flex items-center justify-center touch-none overflow-hidden">
      <div className="absolute inset-y-0 right-0 w-48 bg-patina blur-[120px] transition-opacity duration-300 pointer-events-none mix-blend-screen" style={{ opacity: glowRight * 0.5 }} />
      <div className="absolute inset-y-0 left-0 w-48 bg-warmred blur-[120px] transition-opacity duration-300 pointer-events-none mix-blend-screen" style={{ opacity: glowLeft * 0.5 }} />

      <div
        ref={cardRef}
        onPointerDown={handlePointerDown}
        onPointerMove={handlePointerMove}
        onPointerUp={handlePointerUp}
        onPointerLeave={isDragging ? handlePointerUp : undefined}
        className="relative w-full h-full max-w-[800px] max-h-[85vh] cursor-pointer active:cursor-grabbing will-change-transform"
        style={{
          transform: `translate(${position.x}px, ${position.y}px) rotate(${rotation}deg)`,
          opacity: opacity,
        }}
      >
        <img
          src={image.url}
          alt=""
          draggable="false"
          className="quantum-image w-full h-full object-cover rounded-xl select-none pointer-events-none border border-border-strong shadow-2xl"
        />
      </div>
    </div>
  );
};

// Theme Toggle Component

  <button
    onClick={onToggle}

// Report Generation Engine & View
const Pill = ({ children, variant = "default" }) => {
  const variants = {
    default: "border border-border-strong bg-bg-surface text-text-2",
    green: "border border-patina-dim bg-patina-faint text-patina-lit",
    red: "border border-warmred/20 bg-warmred/10 text-warmred"
  };
  return <span className={`inline-flex items-center rounded-full px-2.5 py-1 label-system tracking-[0.1em] ${variants[variant]} mr-2 mb-2`}>{children}</span>;
};

const ReportView = ({ history, images, finalists, onRestart, isDarkMode, toggleTheme, leadData }) => {
  const reportData = useMemo(() => {
    const r1History = history.filter(h => h.round === 1);
    const keepsR1 = r1History.filter(h => h.action === 'keep');
    const discardsR1 = r1History.filter(h => h.action === 'discard');

    const keepsR2 = history.filter(h => h.round === 2 && h.action === 'keep').map(h=>h.imageId);
    const keepsR3 = history.filter(h => h.round === 3 && h.action === 'keep').map(h=>h.imageId);
    const coreKeepsIds = keepsR3.filter(id => keepsR2.includes(id));

    const getDominantTagsArr = (imageIds) => {
      const tagCounts = {};
      imageIds.forEach(id => {
        const img = images.find(i => i.id === id);
        if(!img) return;
        Object.values(img.tags).forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; });
      });
      return Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 4).map(e => e[0]);
    };
    
    const considered = r1History.filter(h => h.hesitation > 2500 && h.hesitation < 5000);
    const shadowImages = images.filter(i => i.isShadow).map(i => i.id);
    const keptShadows = keepsR1.filter(k => shadowImages.includes(k.imageId));
    
    return {
      keepRate: Math.round((keepsR1.length / Math.max(1, r1History.length)) * 100),
      dominantKept: getDominantTagsArr(keepsR1.map(k => k.imageId)),
      dominantDiscarded: getDominantTagsArr(discardsR1.map(d => d.imageId)),

Core Energy:    [ ${(reportData.energeticSignature[0] || 'Balanced').padEnd(30)} ]

======================================================

// --- APP STATE MACHINE ---
function App() {
  const [phase, setPhase] = useState('studio');
  const [demoMode, setDemoMode] = useState(true);
  const [session, setSession] = useState({ client: '', code: 'DNA001' });

  const [isDarkMode, setIsDarkMode] = useState(() => {
    try { return (localStorage.getItem('qb-theme') || 'dark') === 'dark'; } catch(e) { return true; }
  });

  const [images, setImages] = useState([]);
  const [history, setHistory] = useState([]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [currentRoundImages, setCurrentRoundImages] = useState([]);
  const [tournamentQueue, setTournamentQueue] = useState([]);
  const [finalists, setFinalists] = useState([]);
  const [leadData, setLeadData] = useState({ firstName: '', lastName: '', company: '', email: '' });
  const [isSubmittingForm, setIsSubmittingForm] = useState(false);

  const startSession = () => {
    // Remove any leftover float button from a previous session
    const oldBtn = document.getElementById('qb-float-results');
    if (oldBtn) oldBtn.remove();
    const imgCount = demoMode ? 15 : 200;
    const freshImages = generateMockImages(imgCount);
    setImages(freshImages);
    setCurrentRoundImages(freshImages);
    setHistory([]);
    setCurrentIndex(0);
    setPhase('intro');
    setLeadData({ firstName: '', lastName: '', company: '', email: '' });
  };

  useEffect(() => {
    if (phase.startsWith('t')) {
      const duration = demoMode ? 3000 : 30000;
      const nextPhase = phase === 't1' ? 'r2' : phase === 't2' ? 'r3' : 'finals';
      const timer = setTimeout(() => { setupNextRound(nextPhase); }, duration);
      return () => clearTimeout(timer);
    }
  }, [phase, demoMode, setupNextRound]);

  const setupNextRound = useCallback((nextPhase) => {
    setCurrentIndex(0);
    if (nextPhase === 'r2') {
      const r1Keeps = history.filter(h => h.round === 1 && h.action === 'keep').map(h => h.imageId);
      setCurrentRoundImages(images.filter(img => r1Keeps.includes(img.id)).sort(() => Math.random() - 0.5));
      setPhase('r2');
    } else if (nextPhase === 'r3') {
      const r2Keeps = history.filter(h => h.round === 2 && h.action === 'keep').map(h => h.imageId);
      setCurrentRoundImages(images.filter(img => r2Keeps.includes(img.id)).sort(() => Math.random() - 0.5));
      setPhase('r3');
    } else if (nextPhase === 'finals') {
      const r2Keeps = history.filter(h => h.round === 2 && h.action === 'keep').map(h => h.imageId);
      const r3Keeps = history.filter(h => h.round === 3 && h.action === 'keep').map(h => h.imageId);
      const coreKeeps = r3Keeps.filter(id => r2Keeps.includes(id));
      const toTournament = images.filter(img => coreKeeps.includes(img.id));
      const queue = [];
      for (let i = 0; i < toTournament.length; i += 2) {
        if (toTournament[i+1]) queue.push([toTournament[i], toTournament[i+1]]);
        else setFinalists(prev => [...prev, toTournament[i]]);
      }
      if (queue.length === 0) {
        setPhase('reveal');
      } else {
        setTournamentQueue(queue);
        setPhase('finals');
      }
    }
  }, [history, images, setFinalists]);

  const recordSwipe = (action, hesitation) => {
    if (currentIndex >= currentRoundImages.length) return;
    const currentImg = currentRoundImages[currentIndex];
    const roundNum = phase === 'r1' ? 1 : phase === 'r2' ? 2 : 3;

    setHistory(prev => [...prev, { imageId: currentImg.id, round: roundNum, action, hesitation }]);
    
    if (currentIndex < currentRoundImages.length - 1) {
      setCurrentIndex(prev => prev + 1);
    } else {
      if (phase === 'r1') setPhase('t1');
      else if (phase === 'r2') setPhase('t2');
      else if (phase === 'r3') setPhase('t3');
    }
  };

  const handleTournamentChoice = (winner) => {
    setFinalists(prev => [...prev, winner]);
    if (tournamentQueue.length > 1) setTournamentQueue(prev => prev.slice(1));
    else setPhase('reveal');
  };

  const toggleTheme = () => setIsDarkMode(prev => {
    const next = !prev;
    const themeName = next ? 'dark' : 'light';
    try { localStorage.setItem('qb-theme', themeName); } catch(e) {}
    document.documentElement.setAttribute('data-theme', themeName);
    return next;
  });

  const isFirstRender = useRef(true);
  useEffect(() => {
    if (isFirstRender.current) { isFirstRender.current = false; return; }
    const themeName = isDarkMode ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', themeName);
    try { localStorage.setItem('qb-theme', themeName); } catch(e) {}
  }, [isDarkMode]);

  const isFormValid = useMemo(() => {
    const hasIdentifier = leadData.firstName.trim() !== '' || leadData.lastName.trim() !== '' || leadData.company.trim() !== '';
    const hasValidEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(leadData.email);
    return hasIdentifier && hasValidEmail;
  }, [leadData]);

  const handleFormSubmit = (e) => {
    e.preventDefault();
    if (!isFormValid) return;
    setIsSubmittingForm(true);

    setTimeout(() => {
      setIsSubmittingForm(false);
      setPhase('report');
      
      try {
        const keeps = history.filter(h => h.action === 'keep');
        const keepIds = keeps.map(h => h.imageId).slice(0, 10);
        const keepCount = keeps.length;
        const discardCount = history.filter(h => h.action === 'discard').length;
        const discardRate = discardCount > 0 ? Math.round((discardCount / (keepCount + discardCount)) * 100) : 0;
        const fastDiscardR1 = history.filter(h => h.round === 1 && h.action === 'discard' && h.hesitation < 3000).map(h=>h.imageId);
        
        const existing = JSON.parse(localStorage.getItem('qb_qbp') || '{}');
        const updated = Object.assign({}, existing, {
          visualDnaCompletedAt: new Date().toISOString(),
          visualDnaKeepCount: keepCount,
          visualDnaDiscardRate: discardRate,
          visualDnaKeptImages: keepIds,
          visualDnaFastDiscards: fastDiscardR1,
          brandName: existing.brandName || leadData.company || leadData.firstName || '',
        });
        
        localStorage.setItem('qb_qbp', JSON.stringify(updated));
        localStorage.setItem('qb_visual_dna_done', '1');
        
        setTimeout(function() {
          if (!document.getElementById('qb-float-results')) {
            var btn = document.createElement('button');
            btn.id = 'qb-float-results';
            btn.className = 'btn-primary';
            btn.style.cssText = 'position:fixed;bottom:32px;right:32px;z-index:9000;box-shadow:0 8px 32px rgba(58,95,74,.3);';
            btn.innerHTML = 'Send me my results';
            btn.addEventListener('click', function() {
              var qbp = {};
              try { qbp = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); } catch(e) {}
              if (window.QB_showResultsModal) { 
                window.QB_showResultsModal({ toolId: 'visual-dna', qbp: qbp, results: {}, pdfPage: '/visual-dna-pdf.html' }); 
              }
            });
            document.body.appendChild(btn);
          }
        }, 600);
        
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'QB_PHASE_COMPLETE', phase: 1, tool: 'visual-dna', qbp: updated }, window.location.origin || '*');
        }
      } catch(e) { console.warn('QB Visual DNA sync:', e); }

    }, 1500);
  };

  // --- VIEWS ---
  if (phase === 'studio') {
    return (
      <div className="relative min-h-screen flex flex-col items-center justify-center p-6 md:p-12 z-10">
        <div className="vignette"></div>
        <div className="w-full max-w-4xl space-y-12 animate-in relative z-10">
          <header className="flex flex-col md:flex-row justify-between items-start md:items-end border-b border-border-medium pb-8 gap-6">
            <div>
              <div className="label-system mb-3 opacity-60">System Ready</div>
              <h1 className="heading-display text-4xl md:text-5xl">Visual DNA</h1>
            </div>
            <div className="flex items-center space-x-6">
              <div className="label-system flex items-center text-brass">
                <div className="pulse-dot mr-3"></div> Facilitator Terminal
              </div>
              <ThemeToggle isDarkMode={isDarkMode} onToggle={toggleTheme} />
            </div>
          </header>
          
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="glass-card p-8 space-y-8">
              <h2 className="label-system flex items-center opacity-80">
                <Settings className="w-3.5 h-3.5 mr-3" /> Session Config
              </h2>
              <div className="space-y-6">
                <div>
                  <label className="block label-system opacity-60 mb-2">Session Identifier</label>
                  <input type="text"
                    className="w-full bg-transparent border-b border-border-strong pb-2 text-text-1 font-sans text-[15px] focus:border-patina transition-colors placeholder:text-text-3 placeholder:italic focus:outline-none focus:ring-0"
                    value={session.code === "DNA001" ? "Verne Jewels — March 2026" : session.client}
                    onChange={(e) => setSession(prev => ({...prev, client: e.target.value}))}
                  />
                </div>
                <div>
                  <label className="block label-system opacity-60 mb-2">Access Code</label>
                  <div className="text-2xl font-mono tracking-widest font-normal text-text-1">{session.code}</div>
                </div>
                <div className="flex items-center space-x-3 pt-2">
                  <input type="checkbox" id="demo" checked={demoMode} onChange={(e) => setDemoMode(e.target.checked)}
                    className="w-3.5 h-3.5 accent-patina bg-transparent border-border-medium cursor-pointer"
                  />
                  <label htmlFor="demo" className="label-system cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
                    Demo Protocol (15 IMG / 3s)
                  </label>
                </div>
              </div>
            </div>
            
            <div className="glass-card p-8 space-y-8">
              <h2 className="label-system flex items-center opacity-80">
                <ImageIcon className="w-3.5 h-3.5 mr-3" /> Asset Status
              </h2>
              <div className="space-y-5">
                <div className="flex justify-between items-center py-2 border-b border-border-subtle">
                  <span className="body-copy">Standard Deck</span>
                  <span className="label-system text-patina flex items-center tracking-widest">
                    <CheckCircle className="w-3 h-3 mr-2"/> Ready ({demoMode ? '13' : '175'})
                  </span>
                </div>
                <div className="flex justify-between items-center py-2 border-b border-border-subtle">
                  <span className="body-copy">Shadow Deck</span>
                  <span className="label-system text-patina flex items-center tracking-widest">
                    <CheckCircle className="w-3 h-3 mr-2"/> Ready ({demoMode ? '2' : '25'})
                  </span>
                </div>
                <p className="label-system opacity-50 leading-relaxed pt-2 normal-case tracking-normal font-sans text-[12px]">
                  Images pre-tagged across 8 psychological dimensions. Transitions pre-configured per 30-minute architecture.
                </p>
              </div>
            </div>
          </div>
          
          <div className="pt-8 flex justify-center">
            <button onClick={startSession} className="btn-primary">
              <Play className="w-3.5 h-3.5 mr-2" /> Initiate Sequence
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (phase === 'intro') {
    return (
      <div className="relative min-h-screen flex flex-col items-center justify-center p-8 text-center z-10">
        <div className="vignette"></div>
        <div className="animate-in max-w-2xl flex flex-col items-center relative z-10">
          <div className="label-system text-brass mb-8 border border-brass-dim bg-brass-faint rounded-full px-3 py-1">Calibration Phase</div>
          <h2 className="heading-display text-5xl md:text-7xl mb-6">Trust your eye.</h2>
          <p className="font-serif italic text-xl md:text-2xl text-text-2 mb-12 opacity-80">
            Do not overthink. Let your instinct decide.
          </p>

          <p className="body-copy mb-16 max-w-md mx-auto">
            For each image, choose whether it belongs to your brand's future. Try to choose intuitively within 7 seconds.
          </p>

          <div className="flex items-center justify-center space-x-16 mb-16 label-system opacity-60">
            <div className="flex flex-col items-center">
              <span className="w-12 h-12 border border-border-strong rounded-full flex items-center justify-center mb-3 text-lg font-sans">←</span>
              DISCARD
            </div>
            <div className="flex flex-col items-center">
              <span className="w-12 h-12 border border-border-strong rounded-full flex items-center justify-center mb-3 text-lg font-sans">→</span>
              KEEP
            </div>
          </div>
          
          <button onClick={() => setPhase('r1')} className="btn-primary px-12">
            Begin
          </button>
        </div>
      </div>
    );
  }

  if (phase.startsWith('t')) {
    // Transition Colors mapping to Entangled Time phases
    const bgColor = phase === 't1' ? 'bg-[#2E5A6A]' : phase === 't2' ? 'bg-[#6A3A3A]' : 'bg-[#A8903E]';
    return (
      <div className={`h-screen w-screen ${bgColor} flex items-center justify-center overflow-hidden transition-colors duration-[3000ms] relative z-10`}>
        <div className="w-full h-full animate-pulse opacity-10 mix-blend-overlay bg-gradient-to-tr from-transparent to-white/30" />
      </div>
    );
  }

  if (phase === 'r1' || phase === 'r2' || phase === 'r3') {
    const currentImg = currentRoundImages[currentIndex];
    return (
      <div className={`h-screen w-screen bg-bg-void overflow-hidden relative transition-colors duration-1000 z-10`}>
        <div className="vignette"></div>
        <div className="absolute bottom-8 left-12 w-1.5 h-1.5 rounded-full bg-warmred opacity-40 shadow-[0_0_12px_rgba(138,74,74,0.6)]" />
        <div className="absolute bottom-8 right-12 w-1.5 h-1.5 rounded-full bg-patina opacity-40 shadow-[0_0_12px_rgba(58,95,74,0.6)]" />
        {currentIndex < currentRoundImages.length - 1 && ( <img src={currentRoundImages[currentIndex + 1].url} className="hidden" alt="preload" /> )}
        {currentImg && <SwipeCard key={currentImg.id + phase} image={currentImg} onSwipe={recordSwipe} />}
      </div>
    );
  }

  if (phase === 'finals') {
    if (tournamentQueue.length === 0) return null;
    const [leftImg, rightImg] = tournamentQueue[0];
    return (
      <div className="h-screen w-screen bg-bg-void flex overflow-hidden relative z-10">
        <div className="vignette pointer-events-none z-20"></div>
        <div className="w-1/2 h-full relative cursor-pointer group" onClick={() => handleTournamentChoice(leftImg)}>
          <img src={leftImg.url} className="quantum-image w-full h-full object-cover opacity-50 group-hover:opacity-100 transition-opacity duration-500" alt="" />
        </div>
        <div className="w-[1px] h-full bg-border-strong z-30" />
        <div className="w-1/2 h-full relative cursor-pointer group" onClick={() => handleTournamentChoice(rightImg)}>
          <img src={rightImg.url} className="quantum-image w-full h-full object-cover opacity-50 group-hover:opacity-100 transition-opacity duration-500" alt="" />
        </div>
      </div>
    );
  }

  if (phase === 'reveal') {
    return (
      <div className="min-h-screen bg-bg-void flex flex-col items-center justify-center p-8 z-10 relative">
        <div className="vignette"></div>
        {finalists.length > 0 ? (
          <div className="grid grid-cols-2 md:grid-cols-5 gap-4 w-full max-w-5xl animate-in relative z-10">
            {finalists.map((img, i) => (
              <div key={i} className="aspect-[4/5] rounded-xl overflow-hidden border border-border-medium relative">
                <img src={img.url} className="quantum-image w-full h-full object-cover opacity-80" alt="" />
              </div>
            ))}
          </div>
        ) : (
          <div className="animate-in text-center relative z-10 mb-8">
            <p className="label-system opacity-60">No finalists — try a longer session</p>
          </div>
        )}
        <button onClick={() => setPhase('capture')} className="mt-16 label-system text-text-3 hover:text-brass transition-colors border-b border-transparent hover:border-brass pb-1 relative z-10">
          Proceed to Diagnostics
        </button>
      </div>
    );
  }

  if (phase === 'capture') {
    return (
      <div className="min-h-screen bg-bg-void flex flex-col items-center justify-center p-6 md:p-12 relative z-10">
        <div className="vignette"></div>
        <div className="w-full max-w-md animate-in relative z-10">
          <div className="text-center mb-10">
            <h2 className="heading-display text-4xl mb-3">Analysis Ready.</h2>
            <p className="font-serif italic text-text-2 opacity-80 text-lg">System compilation complete.</p>
          </div>

          <form onSubmit={handleFormSubmit} className="glass-card p-8 space-y-8">
            <div className="space-y-6">
              <div className="grid grid-cols-2 gap-6">
                <div>
                  <label className="block label-system opacity-60 mb-2">First Name</label>
                  <input type="text" value={leadData.firstName} onChange={(e) => setLeadData({...leadData, firstName: e.target.value})}
                    className="w-full bg-transparent border-b border-border-strong pb-2 text-text-1 font-sans text-[14px] focus:border-patina transition-colors rounded-none outline-none focus:ring-0"
                  />
                </div>
                <div>
                  <label className="block label-system opacity-60 mb-2">Last Name</label>
                  <input type="text" value={leadData.lastName} onChange={(e) => setLeadData({...leadData, lastName: e.target.value})}
                    className="w-full bg-transparent border-b border-border-strong pb-2 text-text-1 font-sans text-[14px] focus:border-patina transition-colors rounded-none outline-none focus:ring-0"
                  />
                </div>
              </div>
              <div>
                <label className="block label-system opacity-60 mb-2">Company</label>
                <input type="text" value={leadData.company} onChange={(e) => setLeadData({...leadData, company: e.target.value})}
                  className="w-full bg-transparent border-b border-border-strong pb-2 text-text-1 font-sans text-[14px] focus:border-patina transition-colors rounded-none outline-none focus:ring-0"
                />
              </div>
              <div>
                <label className="block label-system opacity-60 mb-2">Email Address <span className="text-warmred">*</span></label>
                <input type="email" required value={leadData.email} onChange={(e) => setLeadData({...leadData, email: e.target.value})}
                  className="w-full bg-transparent border-b border-border-strong pb-2 text-text-1 font-sans text-[14px] focus:border-patina transition-colors rounded-none placeholder:text-text-3 placeholder:italic outline-none focus:ring-0"
                  placeholder="name@company.com"
                />
              </div>
            </div>

            <button type="submit" disabled={!isFormValid || isSubmittingForm} className="btn-primary w-full">
              {isSubmittingForm ? <><Loader2 className="w-3.5 h-3.5 mr-2" /> Processing</> : 'Generate Report'}
            </button>
          </form>
        </div>
      </div>
    );
  }

  if (phase === 'report') {
    return <ReportView history={history} images={images} finalists={finalists} onRestart={() => setPhase('studio')} isDarkMode={isDarkMode} toggleTheme={toggleTheme} leadData={leadData} />;
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
