<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB BrandOS — Visual DNA</title>
<meta name="description" content="Visual DNA · QB BrandOS Phase 01 — trust your eye, discover your brand's visual signature.">
<script>(function(){try{var t=localStorage.getItem('qb-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark')}catch(e){}})();</script>
<script src="/qb-cloud.js"></script>
<script src="/qb-gate.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Inter:wght@100..900&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box }
:root{
  /* v3.4 cream/ink + phase + illustration palette */
  --cream:          #FBF5E6;
  --cream-soft:     #F2EBD3;
  --cream-deep:     #ECDDB8;
  --cream-edge:     rgba(45,21,33,0.10);
  --cream-line:     rgba(45,21,33,0.14);
  --cream-card:     #F2EBD3;
  --cream-warm:     #ECDDB8;
  --phase-acquisition:#C5E5E9; --phase-discovery:#9CC4A2; --phase-creation:#B5C8E5;
  --phase-content:#FCB7C7; --phase-execution:#E89380; --phase-intelligence:#B080A0;
  --illus-forest:#5B7E6A; --illus-peach:#E89380; --illus-coral:#DC6B52;
  --illus-mustard:#D4B85A; --illus-rust:#B8704D; --illus-lavender:#B8A0C7;
  --illus-pink-soft:#F4C4D0;
  --gold:#E0B069; --gold-deep:#B58840; --rose:#CA6180; --rose-deep:#8E3F58;
  --teal:#9ED3DC; --teal-deep:#5BA8B5; --aubergine:#4A2B3A;
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(45,21,33,0.04);
  --bg-elevated:    rgba(45,21,33,0.07);
  --bg-overlay:     rgba(251,245,230,0.92);
  --border-subtle:  rgba(45,21,33,0.10);
  --border-medium:  rgba(45,21,33,0.18);
  --border-strong:  rgba(45,21,33,0.30);
  --ink:            #2D1521;
  --ink-soft:       rgba(45,21,33,0.75);
  --ink-mute:       rgba(45,21,33,0.50);
  --ink-faint:      rgba(45,21,33,0.33);
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina:         #3A5F4A;
  --patina-lit:     #4A7A5E;
  --patina-dim:     rgba(58,95,74,0.15);
  --patina-faint:   rgba(58,95,74,0.06);
  --patina-deep:    #0E1C17;
  --brass:          #A8903E;
  --brass-lit:      #C4A84E;
  --brass-dim:      rgba(168,144,62,0.15);
  --brass-faint:    rgba(168,144,62,0.06);
  --terra:          #C4654A;
  --terra-lit:      #D4785E;
  --plum:           #7A5A6E;
  --plum-lit:       #9A7A8E;
  --warmred:        #8A4A4A;
  --pill-bg:        #F3E9C9;
  --pill-bg-hover:  #EFE1B4;
  --pill-border:    #A8903E;
  --pill-ink:       #1A1610;
  --f-display:      'Fraunces','Times New Roman',serif;
  --f-body:         'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --f-mono:         'JetBrains Mono',ui-monospace,monospace;
  --font-display:   var(--f-display);
  --font-body:      var(--f-body);
  --font-mono:      var(--f-mono);
  --ease:           cubic-bezier(.22,1,.36,1);
  --r-pill:         999px;
  --r-card:         24px;
  --r-card-lg:      36px;
  --nav-h:          74px;
  --container:      1200px;
}
[data-theme="dark"]{
  --cream:          #080604;
  --cream-soft:     #0A0806;
  --cream-deep:     #12100C;
  --cream-edge:     rgba(140,110,70,0.06);
  --cream-line:     rgba(140,110,70,0.11);
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(140,110,70,0.045);
  --bg-elevated:    rgba(140,110,70,0.07);
  --bg-overlay:     rgba(18,15,10,0.85);
  --border-subtle:  rgba(140,110,70,0.06);
  --border-medium:  rgba(140,110,70,0.11);
  --border-strong:  rgba(140,110,70,0.18);
  --ink:            #EEE5D2;
  --ink-soft:       #A8A092;
  --ink-mute:       #6F6A5E;
  --ink-faint:      #3E3830;
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina-dim:     rgba(58,95,74,0.2);
  --patina-faint:   rgba(58,95,74,0.08);
  --brass-dim:      rgba(168,144,62,0.18);
  --warmred:        #B06767;
  --pill-bg:        #2A2318;
  --pill-bg-hover:  #3A2E1F;
  --pill-border:    #A8903E;
  --pill-ink:       #EEE5D2;
}
html{ -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; scroll-behavior:smooth; background:var(--bg-void); }
body{
  font-family:var(--f-body);
  font-weight:400;
  background:var(--bg-void);
  color:var(--text-2);
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
  transition:background .5s ease, color .3s ease;
}
body::after{
  content:'';
  position:fixed; inset:0; z-index:9999;
  pointer-events:none; opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px 256px;
}
[data-theme="dark"] body::after{ opacity:.05; }
a{ color:inherit; text-decoration:none; }
img{ display:block; max-width:100%; }
button{ font-family:inherit; }

/* ================== AMBIENT ================== */
.ambient{
  position:fixed; inset:0; z-index:0;
  pointer-events:none; overflow:hidden;
}
.ambient .ablob{
  position:absolute; border-radius:50%;
  filter:blur(120px); opacity:.1; mix-blend-mode:screen;
}
[data-theme="dark"] .ambient .ablob{ opacity:.18; }
.ablob.ab1{
  width:500px; height:500px; top:-15%; left:-10%;
  background:var(--patina);
  animation:abf1 22s ease-in-out infinite;
}
.ablob.ab2{
  width:420px; height:420px; bottom:-10%; right:-12%;
  background:var(--brass);
  animation:abf2 26s ease-in-out infinite;
}
@keyframes abf1{ 0%,100%{ transform:translate(0,0) scale(1); } 50%{ transform:translate(40px,30px) scale(1.08); } }
@keyframes abf2{ 0%,100%{ transform:translate(0,0) scale(1); } 50%{ transform:translate(-40px,-30px) scale(1.1); } }

.vignette{
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(200,190,175,0.10) 100%);
}
[data-theme="dark"] .vignette{
  background:radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(8,6,4,0.45) 100%);
}

/* ================== BUTTONS (ecosystem parity) ================== */
.btn{
  display:inline-flex; align-items:center; justify-content:center;
  gap:.55em;
  font-family:var(--f-body); font-weight:500; font-size:.94rem;
  padding:14px 24px;
  border-radius:var(--r-pill);
  border:1px solid var(--ink);
  background:transparent; color:var(--ink);
  transition:all .25s var(--ease);
  white-space:nowrap;
  text-decoration:none !important;
  cursor:pointer;
}
.btn:hover{ background:var(--ink); color:var(--cream); }
@property --eco-angle{ syntax:'<angle>'; initial-value:0deg; inherits:false; }
.btn-primary{
  background:var(--pill-bg) !important;
  border-color:var(--pill-border) !important;
  color:var(--pill-ink) !important;
  position:relative; isolation:isolate;
}
.btn-primary::before{
  content:''; position:absolute; inset:-3px;
  background:conic-gradient(from var(--eco-angle), var(--patina), var(--brass), var(--terra), var(--plum), var(--patina));
  border-radius:999px; z-index:-1; opacity:0;
  transition:opacity .4s ease;
  animation:ecoSpin 6s linear infinite;
  filter:blur(10px);
}
@keyframes ecoSpin{ to{ --eco-angle:360deg; } }
.btn-primary:hover::before{ opacity:.75; }
.btn-primary:hover{
  background:var(--pill-bg-hover) !important;
  border-color:var(--pill-ink) !important;
  transform:translateY(-1px);
  box-shadow:0 14px 40px -12px rgba(168,144,62,.35) !important;
}
.btn-primary:disabled{
  opacity:.45; cursor:not-allowed; transform:none;
}
.btn-primary:disabled::before{ display:none; }
.btn-ghost{ border-color:transparent; }
.btn-ghost:hover{ background:transparent; color:var(--ink); text-decoration:underline; text-underline-offset:4px; }
.btn-sm{ padding:10px 18px; font-size:.85rem; }
.btn-lg{ padding:17px 30px; font-size:1rem; }
.btn .ic{ width:16px; height:16px; }

/* ================== NAV (pill, ecosystem parity) ================== */
.nav-spacer{ height:28px; width:100%; flex-shrink:0; }
.nav{
  position:sticky; top:18px; z-index:50;
  padding:0 20px; width:100%;
}
.nav-inner{
  max-width:1160px; margin-inline:auto;
  background:var(--cream);
  border:1px solid var(--cream-line);
  border-radius:var(--r-pill);
  padding:8px 10px 8px 24px;
  display:flex; align-items:center; justify-content:space-between;
  gap:20px;
  box-shadow:0 6px 30px -18px rgba(26,22,16,.18);
  transition:background .4s ease, border-color .3s ease, box-shadow .3s ease;
}
.nav-brand{
  display:flex; align-items:center; gap:10px;
  font-family:var(--f-display); font-size:1.25rem;
  color:var(--ink); font-weight:500; padding:6px 0;
}
.nav-brand .dot{
  width:10px; height:10px; border-radius:50%;
  background:var(--brass);
  box-shadow:0 0 0 3px var(--brass-faint);
  animation:pulseDot 3s var(--ease) infinite;
}
@keyframes pulseDot{
  0%,100%{ transform:scale(1); box-shadow:0 0 0 3px var(--brass-faint); }
  50%{ transform:scale(1.15); box-shadow:0 0 0 5px rgba(168,144,62,.05); }
}
.nav-links{ display:flex; align-items:center; gap:4px; list-style:none; }
.nav-links a{
  padding:10px 16px; border-radius:var(--r-pill);
  font-size:.92rem; font-weight:500;
  color:var(--ink-soft);
  transition:all .2s var(--ease);
}
.nav-links a:hover{ background:var(--cream-deep); color:var(--ink); }
.nav-actions{ display:flex; align-items:center; gap:6px; }
.theme-toggle{
  width:36px; height:36px; border-radius:50%;
  border:1px solid var(--cream-line);
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; color:var(--ink-mute);
  cursor:pointer; background:transparent; flex-shrink:0;
  transition:all .25s var(--ease);
}
.theme-toggle:hover{
  border-color:var(--brass); color:var(--brass);
  background:var(--brass-faint);
}
.hamburger{
  display:none; width:42px; height:42px;
  border-radius:var(--r-pill);
  border:1px solid var(--cream-line);
  background:transparent; cursor:pointer;
  flex-direction:column; align-items:center; justify-content:center; gap:4px;
}
.hamburger span{ display:block; width:18px; height:1.5px; background:var(--ink); transition:.25s; }
.hamburger.open span:nth-child(1){ transform:translateY(5.5px) rotate(45deg); }
.hamburger.open span:nth-child(2){ opacity:0; }
.hamburger.open span:nth-child(3){ transform:translateY(-5.5px) rotate(-45deg); }
@media(max-width:960px){
  .nav-links, .nav .btn-ghost{ display:none; }
  .hamburger{ display:flex; }
  .nav-brand{ font-size:1.1rem; }
  .nav-inner{ padding:8px 8px 8px 20px; }
}
.mmenu{
  position:fixed; inset:0; z-index:100;
  background:var(--cream);
  display:none; flex-direction:column;
  padding:28px;
}
.mmenu.open{ display:flex; }
.mmenu-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
.mmenu-close{
  width:42px; height:42px; border-radius:50%;
  border:1px solid var(--cream-line);
  background:transparent; font-size:1.2rem; color:var(--ink); cursor:pointer;
}
.mmenu-list{ display:flex; flex-direction:column; gap:6px; }
.mmenu-list a{
  font-family:var(--f-display); font-size:2rem;
  padding:10px 0; color:var(--ink);
  border-bottom:1px solid var(--cream-line);
}
.mmenu-foot{ margin-top:auto; padding-top:28px; }

/* Dark mode nav overrides (ecosystem parity) */
[data-theme="dark"] .nav-inner{
  background:rgba(18,15,10,.85);
  border-color:rgba(140,110,70,.15);
  backdrop-filter:blur(14px);
}
[data-theme="dark"] .nav-links a{ color:var(--ink-mute); }
[data-theme="dark"] .nav-links a:hover{ background:rgba(140,110,70,.08); color:var(--ink); }
[data-theme="dark"] .btn{ border-color:rgba(140,110,70,.2); color:var(--ink); }
[data-theme="dark"] .btn:hover{ background:var(--ink); color:var(--cream); }
[data-theme="dark"] .btn-ghost{ color:var(--ink-soft); }

/* ================== IMMERSIVE MODE (hide nav during swipe) ================== */
body.immersive .nav-spacer,
body.immersive .nav,
body.immersive .mmenu{ display:none !important; }
body.immersive{ overflow:hidden; }

/* ================== TYPE PRIMITIVES ================== */
.label-system{
  font-family:var(--f-mono);
  font-size:10px; font-weight:500;
  text-transform:uppercase; letter-spacing:.2em;
  color:var(--text-2);
}
.heading-display{
  font-family:var(--f-display);
  font-weight:500; letter-spacing:-.01em;
  color:var(--text-1); line-height:1.05;
}
.heading-display em{ font-style:italic; color:var(--brass); font-weight:400; }
.body-copy{
  font-family:var(--f-body);
  font-size:15px; line-height:1.75;
  color:var(--text-2);
}
.serif-italic{ font-family:var(--f-display); font-style:italic; color:var(--text-2); }
.mono{ font-family:var(--f-mono); }

/* ================== EXERCISE COMPONENTS ================== */
.glass-card{
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-radius:16px;
  transition:border-color .3s ease, background .3s ease;
}
.manifesto-block{
  background:var(--bg-deep);
  border-left:3px solid var(--brass);
  padding:28px;
  border-radius:0 12px 12px 0;
}
.pulse-dot{
  width:8px; height:8px; border-radius:50%;
  background:var(--brass);
  box-shadow:0 0 0 3px var(--brass-faint);
  animation:pulseDot 2.4s var(--ease) infinite;
  display:inline-block;
}
.quantum-image{
  filter:grayscale(.1) contrast(1.02);
  transition:filter .6s ease, opacity .6s ease;
}
.animate-in{
  animation:fadeUp .7s var(--ease) both;
}
@keyframes fadeUp{
  from{ opacity:0; transform:translateY(14px); }
  to  { opacity:1; transform:translateY(0); }
}
.spin{ animation:spin 1s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

.pill{
  display:inline-flex; align-items:center;
  font-family:var(--f-mono);
  font-size:10px; font-weight:500;
  letter-spacing:.18em; text-transform:uppercase;
  padding:6px 12px;
  border-radius:999px;
  border:1px solid var(--border-medium);
  background:var(--bg-surface);
  color:var(--text-2);
  margin:4px 6px 4px 0;
}
.pill.green{
  color:var(--patina-lit);
  border-color:var(--patina-dim);
  background:var(--patina-faint);
}
.pill.red{
  color:var(--warmred);
  border-color:rgba(138,74,74,.25);
  background:rgba(138,74,74,.08);
}
.pill.brass{
  color:var(--brass);
  border-color:var(--brass-dim);
  background:var(--brass-faint);
}

/* Form inputs (matches visual language) */
.vd-input{
  width:100%;
  background:transparent;
  border:none;
  border-bottom:1px solid var(--border-strong);
  padding:10px 0;
  color:var(--text-1);
  font-family:var(--f-body); font-size:15px;
  outline:none;
  transition:border-color .2s ease;
}
.vd-input:focus{ border-bottom-color:var(--patina); }
.vd-input::placeholder{ color:var(--text-3); font-style:italic; }
.vd-label{
  display:block; margin-bottom:8px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.2em;
  color:var(--text-3);
}
.vd-checkbox{
  accent-color:var(--patina);
  width:14px; height:14px;
  cursor:pointer;
}

/* ================== PHASE: STUDIO ================== */
.phase-studio{
  position:relative; z-index:2;
  min-height:calc(100vh - 120px);
  display:flex; align-items:center; justify-content:center;
  padding:60px 24px;
}
.studio-wrap{
  width:100%; max-width:980px;
}
.studio-header{
  display:flex; flex-direction:column; gap:20px;
  padding-bottom:32px;
  border-bottom:1px solid var(--border-medium);
  margin-bottom:48px;
}
@media(min-width:760px){
  .studio-header{ flex-direction:row; justify-content:space-between; align-items:flex-end; }
}
.studio-header h1{ font-size:clamp(2.25rem, 5vw, 3.25rem); }
.studio-header-meta{
  display:flex; align-items:center; gap:20px;
  color:var(--brass);
}
.studio-grid{
  display:grid; grid-template-columns:1fr; gap:24px;
  margin-bottom:40px;
}
@media(min-width:760px){ .studio-grid{ grid-template-columns:1fr 1fr; } }
.studio-card{
  padding:32px;
}
.studio-card h2{
  display:flex; align-items:center; gap:10px;
  margin-bottom:24px;
}
.studio-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 0;
  border-bottom:1px solid var(--border-subtle);
}
.studio-row:last-child{ border-bottom:none; }
.studio-footnote{
  margin-top:16px;
  font-family:var(--f-body); font-size:12px;
  color:var(--text-3); line-height:1.6;
}
.studio-cta{
  display:flex; justify-content:center; padding-top:16px;
}

/* ================== PHASE: INTRO ================== */
.phase-intro{
  position:relative; z-index:2;
  min-height:calc(100vh - 120px);
  display:flex; align-items:center; justify-content:center;
  padding:60px 24px; text-align:center;
}
.intro-wrap{ max-width:640px; display:flex; flex-direction:column; align-items:center; }
.intro-badge{
  display:inline-block;
  font-family:var(--f-mono); font-size:10px; letter-spacing:.22em;
  text-transform:uppercase;
  padding:6px 14px; border-radius:999px;
  color:var(--brass);
  border:1px solid var(--brass-dim);
  background:var(--brass-faint);
  margin-bottom:32px;
}
.intro-wrap h2{
  font-family:var(--f-display); font-size:clamp(2.5rem,6vw,4.5rem);
  margin-bottom:24px; color:var(--text-1); line-height:1.05;
}
.intro-wrap .serif-italic{
  font-size:clamp(1.1rem,2.2vw,1.4rem);
  margin-bottom:48px;
}
.intro-wrap p.body-copy{ max-width:420px; margin:0 auto 56px; }
.intro-keys{
  display:flex; align-items:center; justify-content:center; gap:64px;
  margin-bottom:56px;
}
.intro-key{ display:flex; flex-direction:column; align-items:center; gap:10px; }
.intro-key .key-circle{
  width:48px; height:48px; border-radius:50%;
  border:1px solid var(--border-strong);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:var(--text-2);
}

/* ================== PHASE: ROUND ================== */
.phase-round{
  position:fixed; inset:0; z-index:2;
  background:var(--bg-void);
  overflow:hidden;
}
.round-progress{
  position:absolute; top:32px; left:0; right:0; z-index:5;
  display:flex; align-items:center; justify-content:center; gap:12px;
  pointer-events:none;
}
.round-progress .rp-label{
  font-family:var(--f-mono); font-size:10px;
  letter-spacing:.2em; text-transform:uppercase;
  color:var(--text-3);
}
.round-progress .rp-bar{
  width:140px; height:2px; border-radius:2px;
  background:var(--border-subtle); overflow:hidden;

  content:'';
  position:absolute; inset:0;

(function(){
  var toggle = document.getElementById('themeToggle');
  var icon   = document.getElementById('toggleIcon');
  function setIcon(){
    if(!icon) return;
    icon.innerHTML = document.documentElement.getAttribute('data-theme') === 'dark' ? '&#9728;' : '&#9789;';

  if(toggle){

      });

<script>
/* ============================== VISUAL DNA · STATE + ENGINE ============================== */
(function(){
  'use strict';

  /* --- Data model --- */
  var TAG_DIMENSIONS = {
    weight:      ['Light','Medium','Heavy'],
    temperature: ['Warm','Neutral','Cool'],
    composition: ['Minimal','Structured','Dense'],
    subject:     ['Architecture','Person','Object','Abstract','Nature','Typography'],
    energy:      ['Static','Implied motion','Kinetic'],
    era:         ['Heritage','Timeless','Contemporary','Futuristic'],
    finish:      ['Matte','Textured','Glossy','Gradient'],
    mood:        ['Serene','Confident','Intense','Playful','Intimate','Monumental']
  };

  var BASE_URLS = [
    'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1518640467707-6811f4a6ab73?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1534081333815-ae5019106622?auto=format&fit=crop&w=1920&q=80'
  ];

  function generateMockImages(count){
    var out = [];
    for (var i = 0; i < count; i++){
      var tags = {};
      Object.keys(TAG_DIMENSIONS).forEach(function(dim){
        var opts = TAG_DIMENSIONS[dim];
        tags[dim] = opts[Math.floor(Math.random() * opts.length)];
      });
      out.push({
        id: 'img_' + (i+1),
        url: BASE_URLS[i % BASE_URLS.length] + '&sig=' + i,
        tags: tags,
        isShadow: (i % 8 === 0)
      });
    }
    return out;
  }

  /* --- State --- */
  var state = {
    phase: 'studio',
    demoMode: true,
    session: { client: '', code: 'DNA001' },
    images: [],
    history: [],
    currentIndex: 0,
    currentRoundImages: [],
    tournamentQueue: [],
    finalists: [],
    leadData: { firstName:'', lastName:'', company:'', email:'' },
    isSubmitting: false
  };

  var IMMERSIVE_PHASES = { r1:1, r2:1, r3:1, t1:1, t2:1, t3:1, finals:1 };

  /* --- Helpers --- */
  var $app = document.getElementById('app');

  function el(tag, attrs, kids){
    var node = document.createElement(tag);
    if (attrs){
      for (var k in attrs){
        if (!attrs.hasOwnProperty(k)) continue;
        var v = attrs[k];
        if (v == null || v === false) continue;
        if (k === 'class')       node.className = v;
        else if (k === 'html')   node.innerHTML = v;
        else if (k === 'text')   node.textContent = v;
        else if (k === 'style' && typeof v === 'object') Object.assign(node.style, v);
        else if (k.indexOf('on') === 0 && typeof v === 'function') node.addEventListener(k.slice(2), v);
        else node.setAttribute(k, v);
      }
    }
    if (kids){
      (Array.isArray(kids) ? kids : [kids]).forEach(function(c){
        if (c == null || c === false) return;
        node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
    }
    return node;
  }

  function updateImmersive(){
    document.body.classList.toggle('immersive', !!IMMERSIVE_PHASES[state.phase]);
  }

  function setPhase(next){
    state.phase = next;
    updateImmersive();
    render();
  }

  /* --- Session --- */
  function startSession(){
    var old = document.getElementById('qb-float-results');
    if (old) old.remove();
    var imgCount = state.demoMode ? 15 : 200;
    state.images = generateMockImages(imgCount);
    state.currentRoundImages = state.images.slice();
    state.history = [];
    state.currentIndex = 0;
    state.tournamentQueue = [];
    state.finalists = [];
    state.leadData = { firstName:'', lastName:'', company:'', email:'' };
    setPhase('intro');
  }

  /* --- Round transition logic --- */
  function setupNextRound(nextPhase){
    state.currentIndex = 0;
    if (nextPhase === 'r2'){
      var r1Keeps = state.history.filter(function(h){ return h.round === 1 && h.action === 'keep'; }).map(function(h){ return h.imageId; });
      state.currentRoundImages = state.images
        .filter(function(img){ return r1Keeps.indexOf(img.id) !== -1; })
        .sort(function(){ return Math.random() - 0.5; });
      if (!state.currentRoundImages.length){ buildFinals(); return; }
      setPhase('r2');
    } else if (nextPhase === 'r3'){
      var r2Keeps = state.history.filter(function(h){ return h.round === 2 && h.action === 'keep'; }).map(function(h){ return h.imageId; });
      state.currentRoundImages = state.images
        .filter(function(img){ return r2Keeps.indexOf(img.id) !== -1; })
        .sort(function(){ return Math.random() - 0.5; });
      if (!state.currentRoundImages.length){ buildFinals(); return; }
      setPhase('r3');
    } else if (nextPhase === 'finals'){
      buildFinals();
    }
  }

  function buildFinals(){
    var r2Keeps = state.history.filter(function(h){ return h.round === 2 && h.action === 'keep'; }).map(function(h){ return h.imageId; });
    var r3Keeps = state.history.filter(function(h){ return h.round === 3 && h.action === 'keep'; }).map(function(h){ return h.imageId; });
    var coreKeeps = r3Keeps.filter(function(id){ return r2Keeps.indexOf(id) !== -1; });
    var toTournament = state.images.filter(function(img){ return coreKeeps.indexOf(img.id) !== -1; });
    var queue = [];
    state.finalists = [];
    for (var i = 0; i < toTournament.length; i += 2){
      if (toTournament[i+1]) queue.push([toTournament[i], toTournament[i+1]]);
      else state.finalists.push(toTournament[i]);
    }
    if (!queue.length){
      setPhase('reveal');
    } else {
      state.tournamentQueue = queue;
      setPhase('finals');
    }
  }

  function recordSwipe(action, hesitation){
    if (state.currentIndex >= state.currentRoundImages.length) return;
    var currentImg = state.currentRoundImages[state.currentIndex];
    var roundNum = state.phase === 'r1' ? 1 : state.phase === 'r2' ? 2 : 3;
    state.history.push({ imageId: currentImg.id, round: roundNum, action: action, hesitation: hesitation });

    if (state.currentIndex < state.currentRoundImages.length - 1){
      state.currentIndex++;
      renderRoundCard(); // just re-mount the card
    } else {
      if (state.phase === 'r1') setPhase('t1');
      else if (state.phase === 'r2') setPhase('t2');
      else if (state.phase === 'r3') setPhase('t3');
    }
  }

  function handleTournamentChoice(winner){
    state.finalists.push(winner);
    if (state.tournamentQueue.length > 1){
      state.tournamentQueue.shift();
      render();
    } else {
      setPhase('reveal');
    }
  }

  /* ============================== RENDERERS ============================== */

  function render(){
    $app.innerHTML = '';
    var viewFn = views[state.phase];
    if (viewFn) $app.appendChild(viewFn());
  }

  var views = {};

  /* --- STUDIO --- */
  views.studio = function(){

    var img = state.currentRoundImages[state.currentIndex];

    // Preload next
    if (state.currentIndex < state.currentRoundImages.length - 1){

  /* --- SWIPE CARD (vanilla, pointer + keyboard) --- */
  function mountSwipeCard(container, imgData, onSwipe){
    var card = el('div', { class:'swipe-card' },
      el('img', { class:'quantum-image', src:imgData.url, alt:'', draggable:'false' })
    );
    container.appendChild(card);

    var glowL = document.getElementById('swipe-glow-l');
    var glowR = document.getElementById('swipe-glow-r');

    var mountTime = Date.now();
    var threshold = 120;
    var isDragging = false;
    var isExiting  = false;
    var pos  = { x:0, y:0 };
    var start= { x:0, y:0 };

    function setTransform(){
      var rotation = pos.x * 0.05;
      var opacity  = 1 - Math.abs(pos.x) / (window.innerWidth * 1.5);
      card.style.transform = 'translate(' + pos.x + 'px,' + pos.y + 'px) rotate(' + rotation + 'deg)';
      card.style.opacity = opacity;
      if (glowL) glowL.style.opacity = Math.max(0, -pos.x / threshold) * 0.5;
      if (glowR) glowR.style.opacity = Math.max(0,  pos.x / threshold) * 0.5;
    }

    function exit(action){
      if (isExiting) return;
      isExiting = true;
      var hesitation = Date.now() - mountTime;
      var dir = action === 'keep' ? window.innerWidth : -window.innerWidth;
      card.style.transition = 'transform .42s cubic-bezier(.2,.8,.2,1), opacity .42s ease-out';
      pos.x = dir; setTransform();
      setTimeout(function(){
        if (glowL) glowL.style.opacity = 0;
        if (glowR) glowR.style.opacity = 0;
        window.removeEventListener('keydown', onKey);
        onSwipe(action, hesitation);
      }, 320);
    }

    function onKey(e){
      if (e.key === 'ArrowLeft') exit('discard');
      else if (e.key === 'ArrowRight') exit('keep');
    }
    window.addEventListener('keydown', onKey);

    card.addEventListener('pointerdown', function(e){
      if (isExiting) return;
      card.setPointerCapture(e.pointerId);
      isDragging = true;
      start.x = e.clientX - pos.x; start.y = e.clientY - pos.y;
      card.style.transition = 'none';
    });
    card.addEventListener('pointermove', function(e){
      if (!isDragging || isExiting) return;
      pos.x = e.clientX - start.x;
      pos.y = e.clientY - start.y;
      setTransform();
    });
    card.addEventListener('pointerup', function(e){
      isDragging = false;
      if (isExiting) return;
      card.style.transition = 'transform .42s cubic-bezier(.2,.8,.2,1), opacity .42s ease-out';
      var dragDist = Math.abs(pos.x);
      if (pos.x > threshold) exit('keep');
      else if (pos.x < -threshold) exit('discard');
      else if (dragDist < 10){
        // tap: left half = discard, right half = keep
        var half = window.innerWidth / 2;
        if (e.clientX > half) exit('keep');
        else exit('discard');
      } else {
        pos.x = 0; pos.y = 0; setTransform();
      }
    });
    card.addEventListener('pointerleave', function(){
      if (isDragging && !isExiting){
        isDragging = false;
        card.style.transition = 'transform .42s cubic-bezier(.2,.8,.2,1)';
        pos.x = 0; pos.y = 0; setTransform();
      }
    });
  }

  /* --- COMPUTE REPORT DATA --- */
  function computeReportData(){
    var r1History = state.history.filter(function(h){ return h.round === 1; });
    var keepsR1 = r1History.filter(function(h){ return h.action === 'keep'; });
    var discardsR1 = r1History.filter(function(h){ return h.action === 'discard'; });
    var keepsR2 = state.history.filter(function(h){ return h.round === 2 && h.action === 'keep'; }).map(function(h){ return h.imageId; });
    var keepsR3 = state.history.filter(function(h){ return h.round === 3 && h.action === 'keep'; }).map(function(h){ return h.imageId; });
    var coreKeepsIds = keepsR3.filter(function(id){ return keepsR2.indexOf(id) !== -1; });

    function dominantTags(imageIds){
      var counts = {};
      imageIds.forEach(function(id){
        var img = state.images.find(function(i){ return i.id === id; });
        if (!img) return;
        Object.values(img.tags).forEach(function(tag){ counts[tag] = (counts[tag] || 0) + 1; });
      });
      return Object.entries(counts).sort(function(a,b){ return b[1]-a[1]; }).slice(0,4).map(function(e){ return e[0]; });
    }

    var considered = r1History.filter(function(h){ return h.hesitation > 2500 && h.hesitation < 5000; });
    var shadowImageIds = state.images.filter(function(i){ return i.isShadow; }).map(function(i){ return i.id; });
    var keptShadows = keepsR1.filter(function(k){ return shadowImageIds.indexOf(k.imageId) !== -1; });

    return {
      keepRate:          Math.round((keepsR1.length / Math.max(1, r1History.length)) * 100),
      dominantKept:      dominantTags(keepsR1.map(function(k){ return k.imageId; })),
      dominantDiscarded: dominantTags(discardsR1.map(function(d){ return d.imageId; })),
      coreKeepsCount:    coreKeepsIds.length,
      signatureTags:     dominantTags(coreKeepsIds),
      biasTags:          dominantTags(considered.map(function(c){ return c.imageId; })),
      fastDiscards:      dominantTags(discardsR1.filter(function(d){ return d.hesitation < 1000; }).map(function(d){ return d.imageId; })),
      shadowRate:        shadowImageIds.length ? Math.round((keptShadows.length / shadowImageIds.length) * 100) : 0,
      energeticSignature: dominantTags(state.finalists.map(function(f){ return f.id; }))
    };
  }

  function padRight(s, n){
    s = String(s || '');
    return s.length >= n ? s : s + new Array(n - s.length + 1).join(' ');
  }

  /* --- PERSISTENCE + HAND-OFF --- */
  function saveToQBP(){
    try{
      var keeps = state.history.filter(function(h){ return h.action === 'keep'; });
      var keepIds = keeps.map(function(h){ return h.imageId; }).slice(0,10);
      var keepCount = keeps.length;
      var discardCount = state.history.filter(function(h){ return h.action === 'discard'; }).length;
      var discardRate = discardCount > 0 ? Math.round((discardCount / (keepCount + discardCount)) * 100) : 0;
      var fastDiscardR1 = state.history.filter(function(h){ return h.round === 1 && h.action === 'discard' && h.hesitation < 3000; }).map(function(h){ return h.imageId; });

      var existing = {};
      try { existing = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); } catch(e){}
      var updated = Object.assign({}, existing, {
        visualDnaCompletedAt: new Date().toISOString(),
        visualDnaKeepCount: keepCount,
        visualDnaDiscardRate: discardRate,
        visualDnaKeptImages: keepIds,
        visualDnaFastDiscards: fastDiscardR1,
        brandName: existing.brandName || state.leadData.company || state.leadData.firstName || ''
      });
      // Cloud-aware write: mirrors to Supabase if user is authed
      if (window.QB && QB.setQBP) { QB.setQBP(updated); }
      else { localStorage.setItem('qb_qbp', JSON.stringify(updated)); }
      // Note: qb_visual_dna_done legacy flag removed — completion is recorded
      // by QB.openGate() → QB.recordCompletion() below as the single source.
      // Open soft gate (no-op if already authed)
      try {
        if (window.QB && QB.openGate){
          QB.openGate({ toolId:'visual-dna', toolName:'Visual DNA', brandName: updated.brandName || '' });
        }
      } catch(e){ console.warn('QB gate:', e); }
    } catch(e) { console.warn('QB Visual DNA persistence:', e); }
  }

  function mountFloatResults(){
    if (document.getElementById('qb-float-results')) return;
    var btn = document.createElement('button');
    btn.id = 'qb-float-results';
    btn.type = 'button';
    btn.textContent = 'Send me my results';
    btn.addEventListener('click', function(){
      var qbp = {};
      try { qbp = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); } catch(e){}
      if (window.QB_showResultsModal){
        window.QB_showResultsModal({ toolId:'visual-dna', qbp:qbp, results:{}, pdfPage:'/visual-dna-pdf.html' });
      }
    });
    document.body.appendChild(btn);
  }

  function postToParent(){
    try{
      if (window.parent && window.parent !== window){
        var qbp = {};
        try { qbp = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); } catch(e){}
        window.parent.postMessage({ type:'QB_PHASE_COMPLETE', phase:1, tool:'visual-dna', qbp:qbp }, window.location.origin || '*');
      }
    } catch(e){}
  }

  /* --- BOOT --- */
  updateImmersive();
  render();

})();
</script>
