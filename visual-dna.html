  const images = [];
  const baseUrls = [
    'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1518640467707-6811f4a6ab73?auto=format&fit=crop&w=1920&q=80',
    'https://images.unsplash.com/photo-1534081333815-ae5019106622?auto=format&fit=crop&w=1920&q=80',
  ];
  for (let i = 0; i < count; i++) {
    const isShadow = i % 8 === 0;
    const tags = {};
    Object.keys(TAG_DIMENSIONS).forEach(dim => {
      const options = TAG_DIMENSIONS[dim];
      tags[dim] = options[Math.floor(Math.random() * options.length)];
    });
    images.push({
      id: `img_${i + 1}`,
      url: `${baseUrls[i % baseUrls.length]}&sig=${i}`,
      tags,
      isShadow
    });
  }
  return images;
};

// The physics engine for the cards
const SwipeCard = ({ image, onSwipe }) => {
  const [position, setPosition] = useState({ x: 0, y: 0 });
  const [isDragging, setIsDragging] = useState(false);
  const cardRef = useRef(null);
  const startPos = useRef({ x: 0, y: 0 });
  const mountTime = useRef(Date.now());
  const isExiting = useRef(false);
  const threshold = 120;
  
  const triggerExit = useCallback((action) => {
    if (isExiting.current) return;
    isExiting.current = true;

    const hesitation = Date.now() - mountTime.current;
    const direction = action === 'keep' ? window.innerWidth : -window.innerWidth;
    if (cardRef.current) cardRef.current.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease-out';
    setPosition({ x: direction, y: position.y });
    setTimeout(() => onSwipe(action, hesitation), 300);
  }, [onSwipe, position.y]);

  useEffect(() => {
    mountTime.current = Date.now();
    const handleKeyDown = (e) => {
      if (e.key === 'ArrowLeft') {
        triggerExit('discard');
      } else if (e.key === 'ArrowRight') {
        triggerExit('keep');
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [image.id, triggerExit]);

  const handlePointerDown = (e) => {
    if (isExiting.current) return;
    setIsDragging(true);
    startPos.current = { x: e.clientX - position.x, y: e.clientY - position.y };
    if (cardRef.current) cardRef.current.style.transition = 'none';
  };

  const handlePointerMove = (e) => {
    if (!isDragging || isExiting.current) return;
    const newX = e.clientX - startPos.current.x;
    const newY = e.clientY - startPos.current.y;
    setPosition({ x: newX, y: newY });
  };

  const handlePointerUp = (e) => {
    setIsDragging(false);
    if (isExiting.current) return;
    if (cardRef.current) cardRef.current.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease-out';
    const dragDistance = Math.abs(position.x);
    if (position.x > threshold) {
      triggerExit('keep');
    } else if (position.x < -threshold) {
      triggerExit('discard');
    } else if (dragDistance < 10) {
      const clickX = e.clientX;
      const screenWidth = window.innerWidth;
      if (clickX > screenWidth / 2) {
        triggerExit('keep');
      } else {
        triggerExit('discard');
      }
    } else {
      setPosition({ x: 0, y: 0 });
    }
  };

  const rotation = position.x * 0.05;
  const opacity = 1 - Math.abs(position.x) / (window.innerWidth * 1.5);
  const glowRight = Math.max(0, position.x / threshold);
  const glowLeft = Math.max(0, -position.x / threshold);
  return (
    <div className="absolute inset-0 flex items-center justify-center touch-none overflow-hidden">
      <div className="absolute inset-y-0 right-0 w-32 bg-[#4ade80] blur-[100px] transition-opacity duration-200 pointer-events-none" style={{ opacity: glowRight * 0.4 }} />
      <div className="absolute inset-y-0 left-0 w-32 bg-[#ef4444] blur-[100px] transition-opacity duration-200 pointer-events-none" style={{ opacity: glowLeft * 0.4 }} />

      <div
        ref={cardRef}
        onPointerDown={handlePointerDown}
        onPointerMove={handlePointerMove}
        onPointerUp={handlePointerUp}
        onPointerLeave={isDragging ? handlePointerUp : undefined}
        className="relative w-full h-full max-w-5xl max-h-[90vh] cursor-pointer active:cursor-grabbing will-change-transform"
        style={{
          transform: `translate(${position.x}px, ${position.y}px) rotate(${rotation}deg)`,
          opacity: opacity,
        }}
      >
        <img
          src={image.url}
          alt=""
          draggable="false"
          className="quantum-image w-full h-full object-cover rounded-[32px] select-none pointer-events-none border border-white/5 shadow-[0_0_50px_rgba(0,0,0,0.8)]"
        />
      </div>
    </div>
  );
};

const Pill = ({ children, variant = "default" }) => {
  const base = "inline-block rounded-full px-3 py-1 font-mono text-[10px] tracking-[0.3em] uppercase border mr-2 mb-2";
  const variants = {
    default: "border-black/20 dark:border-white/20 bg-black/5 dark:bg-white/5 text-zinc-600 dark:text-zinc-400",
    green: "border-[#4ade80]/30 bg-[#4ade80]/10 text-[#4ade80]",
    red: "border-[#ef4444]/30 bg-[#ef4444]/10 text-[#ef4444]"
  };
  return <span className={`${base} ${variants[variant]}`}>{children}</span>;
};

const ReportView = ({ history, images, finalists, onRestart, isDarkMode, toggleTheme, leadData }) => {
  const reportData = useMemo(() => {
    const r1History = history.filter(h => h.round === 1);
    const keepsR1 = r1History.filter(h => h.action === 'keep');
    const discardsR1 = r1History.filter(h => h.action === 'discard');

    const keepsR2 = history.filter(h => h.round === 2 && h.action === 'keep').map(h=>h.imageId);
    const keepsR3 = history.filter(h => h.round === 3 && h.action === 'keep').map(h=>h.imageId);
    const coreKeepsIds = keepsR3.filter(id => keepsR2.includes(id));

    const getDominantTagsArr = (imageIds) => {
      const tagCounts = {};
      imageIds.forEach(id => {
        const img = images.find(i => i.id === id);
        if(!img) return;
        Object.values(img.tags).forEach(tag => {
          tagCounts[tag] = (tagCounts[tag] || 0) + 1;
        });
      });
      return Object.entries(tagCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 4)
        .map(e => e[0]);
    };
    const considered = r1History.filter(h => h.hesitation > 2500 && h.hesitation < 5000);
    const biasTags = getDominantTagsArr(considered.map(c => c.imageId));
    const shadowImages = images.filter(i => i.isShadow).map(i => i.id);
    const keptShadows = keepsR1.filter(k => shadowImages.includes(k.imageId));
    const shadowRate = shadowImages.length ? Math.round((keptShadows.length / shadowImages.length) * 100) : 0;
    return {
      keepRate: Math.round((keepsR1.length / Math.max(1, r1History.length)) * 100),
      dominantKept: getDominantTagsArr(keepsR1.map(k => k.imageId)),
      dominantDiscarded: getDominantTagsArr(discardsR1.map(d => d.imageId)),
      coreKeepsCount: coreKeepsIds.length,
      signatureTags: getDominantTagsArr(coreKeepsIds),
      biasTags: biasTags,
      fastDiscards: getDominantTagsArr(discardsR1.filter(d => d.hesitation < 1000).map(d=>d.imageId)),
      shadowRate,
      energeticSignature: getDominantTagsArr(finalists.map(f => f.id))
    };
  }, [history, images, finalists]);

  return (
    <div className="min-h-screen bg-[#ffffff] dark:bg-[#000000] text-black dark:text-white font-sans p-8 md:p-16 overflow-y-auto selection:bg-[#4ade80] selection:text-black transition-colors duration-500 relative">
      <div className="noise-overlay" />
      {/* SUCCESS NOTIFICATION BANNER */}
      <div className="fixed top-6 left-0 right-0 z-50 flex justify-center p-4 pointer-events-none">
        <div className="bg-[#111] dark:bg-[#222] text-white px-6 py-4 rounded-full shadow-2xl flex items-center space-x-3 border border-[#4ade80]/50 font-mono text-[10px] tracking-[0.2em] uppercase animate-quantum-in pointer-events-auto">
          <div className="w-2 h-2 rounded-full bg-[#4ade80] animate-pulse"></div>
          <span>Report securely generated to <strong className="text-[#4ade80] font-bold">{leadData.email}</strong></span>
        </div>
      </div>

      <div className="max-w-4xl mx-auto space-y-16 mt-16 relative z-10 animate-quantum-in">
        <header className="border-b border-black/10 dark:border-white/10 pb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
          <div>
            <div className="font-mono text-[10px] tracking-[0.4em] uppercase text-[#4ade80] mb-3">Diagnostic Output</div>
            <h1 className="text-5xl md:text-6xl font-black tracking-tighter leading-[1.1] uppercase">Visual DNA.</h1>
            {(leadData.firstName || leadData.company) && (
              <p className="font-light italic text-zinc-500 mt-2 text-xl">
                Client: {leadData.firstName} {leadData.lastName} {leadData.company ? `(${leadData.company})` : ''}
              </p>
            )}
          </div>
          <div className="flex items-center space-x-6">
            <ThemeToggle isDarkMode={isDarkMode} onToggle={toggleTheme} />
            <button onClick={onRestart} className="font-mono text-[10px] tracking-[0.3em] uppercase border border-black/20 dark:border-white/20 px-6 py-3 hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-colors rounded-full active:scale-95">
              Reset Terminal
            </button>
          </div>
        </header>

        {/* SECTION 1 */}
        <section>
          <div className="font-mono text-[10px] tracking-[0.4em] uppercase text-zinc-500 mb-4">Sec 01. The Eye Chooses</div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-8 glass-card p-10">
            <div>
              <div className="mb-8">
                <span className="font-mono text-[10px] tracking-[0.3em] uppercase text-[#71717a] block mb-3">Acceptance Rate</span>
                <span className="text-4xl font-black">{reportData.keepRate}%</span>
              </div>
              <div className="mb-6">
                <span className="font-mono text-[10px] tracking-[0.3em] uppercase text-[#71717a] block mb-3">Dominant Markers (Kept)</span>
                <div className="flex flex-wrap">{reportData.dominantKept.length ? reportData.dominantKept.map(t => <Pill key={t} variant="green">{t}</Pill>) : <Pill>Neutral</Pill>}</div>
              </div>
              <div>
                <span className="font-mono text-[10px] tracking-[0.3em] uppercase text-[#71717a] block mb-3">Dominant Markers (Discarded)</span>
                <div className="flex flex-wrap">{reportData.dominantDiscarded.length ? reportData.dominantDiscarded.map(t => <Pill key={t}>{t}</Pill>) : <Pill>Neutral</Pill>}</div>
              </div>
            </div>
            <div className="bg-black/5 dark:bg-[#111] p-8 border-l-2 border-[#4ade80] rounded-[24px]">
              <span className="font-mono text-[10px] tracking-[0.3em] uppercase text-[#71717a] block mb-4">Generated Insight</span>
              <p className="text-lg leading-relaxed text-[#71717a] dark:text-zinc-300">
                The client's eye moves instinctively toward <strong className="font-bold text-black dark:text-white">{reportData.dominantKept[0] || 'neutrality'}</strong> and violently away from <strong className="font-bold text-black dark:text-white">{reportData.dominantDiscarded[0] || 'standard'}</strong>. The initial calibration strongly rejects historical/static norms.
              </p>
            </div>
          </div>
        </section>

        {/* SECTION 2 */}
        <section>
          <div className="font-mono text-[10px] tracking-[0.4em] uppercase text-zinc-500 mb-4">Sec 02. The Visual Signature</div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-8 glass-card p-10">

// --- APP STATE MACHINE ---
function App() {
  const [phase, setPhase] = useState('studio');
  const [demoMode, setDemoMode] = useState(true);
  const [session, setSession] = useState({ client: '', code: 'DNA001' });

  // Safely grab initial theme inside strict environments
  const [isDarkMode, setIsDarkMode] = useState(() => {
    try { return (localStorage.getItem('qb-theme') || 'dark') === 'dark'; } catch(e) { return true; }
  });

  const [images, setImages] = useState([]);
  const [history, setHistory] = useState([]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [currentRoundImages, setCurrentRoundImages] = useState([]);
  const [tournamentQueue, setTournamentQueue] = useState([]);
  const [finalists, setFinalists] = useState([]);
  const [leadData, setLeadData] = useState({ firstName: '', lastName: '', company: '', email: '' });
  const [isSubmittingForm, setIsSubmittingForm] = useState(false);

  const startSession = () => {
    const imgCount = demoMode ? 15 : 200;
    const freshImages = generateMockImages(imgCount);
    setImages(freshImages);
    setCurrentRoundImages(freshImages);
    setHistory([]);
    setCurrentIndex(0);
    setPhase('intro');
    setLeadData({ firstName: '', lastName: '', company: '', email: '' });
  };

  useEffect(() => {
    if (phase.startsWith('t')) {
      const duration = demoMode ? 3000 : 30000;
      const nextPhase = phase === 't1' ? 'r2' : phase === 't2' ? 'r3' : 'finals';
      const timer = setTimeout(() => {
        setupNextRound(nextPhase);
      }, duration);
      return () => clearTimeout(timer);
    }
  }, [phase, demoMode]);

  const setupNextRound = (nextPhase) => {
    setCurrentIndex(0);
    if (nextPhase === 'r2') {
      const r1Keeps = history.filter(h => h.round === 1 && h.action === 'keep').map(h => h.imageId);
      setCurrentRoundImages(images.filter(img => r1Keeps.includes(img.id)).sort(() => Math.random() - 0.5));
      setPhase('r2');
    } else if (nextPhase === 'r3') {
      setPhase('r3');
    } else if (nextPhase === 'finals') {
      const r2Keeps = history.filter(h => h.round === 2 && h.action === 'keep').map(h => h.imageId);
      const r3Keeps = history.filter(h => h.round === 3 && h.action === 'keep').map(h => h.imageId);
      const coreKeeps = r3Keeps.filter(id => r2Keeps.includes(id));

      const toTournament = images.filter(img => coreKeeps.includes(img.id));

      const queue = [];
      for (let i = 0; i < toTournament.length; i += 2) {
        if (toTournament[i+1]) {
          queue.push([toTournament[i], toTournament[i+1]]);
        } else {
          setFinalists(prev => [...prev, toTournament[i]]);
        }
      }
      setTournamentQueue(queue);
      setPhase('finals');

      if (queue.length === 0) setPhase('reveal');
    }
  };

  const recordSwipe = (action, hesitation) => {
    if (currentIndex >= currentRoundImages.length) return;
    const currentImg = currentRoundImages[currentIndex];
    const roundNum = phase === 'r1' ? 1 : phase === 'r2' ? 2 : 3;

    setHistory(prev => [...prev, { imageId: currentImg.id, round: roundNum, action, hesitation }]);
    
    if (currentIndex < currentRoundImages.length - 1) {
      setCurrentIndex(prev => prev + 1);
    } else {
      if (phase === 'r1') setPhase('t1');
      if (phase === 'r2') setPhase('t2');
      if (phase === 'r3') setPhase('t3');
    }
  };

  const handleTournamentChoice = (winner) => {
    setFinalists(prev => [...prev, winner]);
    if (tournamentQueue.length > 1) {
      setTournamentQueue(prev => prev.slice(1));
    } else {
      setPhase('reveal');
    }
  };

  // Safely toggle theme to prevent crashing in embedded environments
  const toggleTheme = () => setIsDarkMode(prev => {
    const next = !prev;
    const themeName = next ? 'dark' : 'light';
    try { localStorage.setItem('qb-theme', themeName); } catch(e) {}
    document.documentElement.setAttribute('data-theme', themeName);
    return next;
  });

  useEffect(() => {
    const themeName = isDarkMode ? 'dark' : 'light';
    if (isDarkMode) {
      document.documentElement.classList.add('dark');
      document.documentElement.classList.remove('light');
    } else {
      document.documentElement.classList.remove('dark');
      document.documentElement.classList.add('light');
    }
    document.documentElement.setAttribute('data-theme', themeName);
    try { localStorage.setItem('qb-theme', themeName); } catch(e) {}
  }, [isDarkMode]);

  const isFormValid = useMemo(() => {
    const hasIdentifier = leadData.firstName.trim() !== '' || leadData.lastName.trim() !== '' || leadData.company.trim() !== '';
    const hasValidEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(leadData.email);
    return hasIdentifier && hasValidEmail;
  }, [leadData]);

  const handleFormSubmit = (e) => {
    e.preventDefault();
    if (!isFormValid) return;

    setIsSubmittingForm(true);

    setTimeout(() => {
      setIsSubmittingForm(false);
      setPhase('report');
      
      // ── QB OS: Auto-populate QBP from Visual DNA ────────────────────────────
      try {
        const keeps = history.filter(h => h.action === 'keep');
        const keepIds = keeps.map(h => h.imageId).slice(0, 10);
        const exemplarRef = keepIds.join(', ');
        const keepCount = keeps.length;
        const discardCount = history.filter(h => h.action === 'discard').length;
        const discardRate = discardCount > 0 ? Math.round((discardCount / (keepCount + discardCount)) * 100) : 0;
        
        // Changed h.time to h.hesitation based on the state architecture
        const fastDiscardR1 = history.filter(h => h.round === 1 && h.action === 'discard' && h.hesitation < 3000).map(h=>h.imageId);
        
        const existing = JSON.parse(localStorage.getItem('qb_qbp') || '{}');
        const updated = Object.assign({}, existing, {
          visualDnaCompletedAt: new Date().toISOString(),
          visualDnaKeepCount: keepCount,
          visualDnaDiscardRate: discardRate,
          visualDnaKeptImages: keepIds,
          visualDnaFastDiscards: fastDiscardR1,
          brandName: (leadData && leadData.firstName) ? existing.brandName || '' : existing.brandName || '',
        });
        
        localStorage.setItem('qb_qbp', JSON.stringify(updated));
        localStorage.setItem('qb_visual_dna_done', '1');
        
        // Show results button on completion
        setTimeout(function() {
          if (!document.getElementById('qb-float-results')) {
            var btn = document.createElement('button');
            btn.id = 'qb-float-results';
            btn.className = 'qb-send-results-btn';

              var qbp = {};

              if (window.QB_showResultsModal) { 
                window.QB_showResultsModal({
                  toolId: 'visual-dna',
                  qbp: qbp,
                  results: {},
                  pdfPage: '/visual-dna-pdf.html'
                }); 
              }
            });
            document.body.appendChild(btn);
          }
        }, 600);
        
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'QB_PHASE_COMPLETE', phase: 1, tool: 'visual-dna', qbp: updated }, '*');
        }
      } catch(e) { console.warn('QB Visual DNA sync:', e); }
      // ── END QB OS ─────────────────────────────────────────────────────────

    }, 2000);
  };

  // --- VIEWS ---
  if (phase === 'studio') {

              </div>

                <ThemeToggle isDarkMode={isDarkMode} onToggle={toggleTheme} />
              </div>
            </header>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              {/* Card 1 */}
              <div className="glass-card p-8 space-y-8">

                  <Settings className="w-4 h-4 mr-3" /> Session Config
                </h2>
                <div className="space-y-6">
                  <div>
                    <label className="block font-mono text-[10px] tracking-[0.3em] uppercase text-[#71717a] mb-2">Session Identifier</label>
                    <input type="text"
                      className="w-full bg-transparent border-b border-black/20 dark:border-white/20 pb-2 text-lg font-normal focus:outline-none focus:border-[#4ade80] dark:focus:border-[#4ade80] transition-colors placeholder-zinc-600"
                      defaultValue="Verne Jewels — March 2026"
                    />
                  </div>
                  <div>
                    <label className="block font-mono text-[10px] tracking-[0.3em] uppercase text-[#71717a] mb-2">Access Code</label>

                  <div className="flex items-center space-x-3 pt-4">
                    <input

                  </div>
                </div>
              </div>
              
              {/* Card 2 */}
              <div className="glass-card p-8 space-y-8">

                      <CheckCircle className="w-3 h-3 mr-2"/> Ready ({demoMode ? '13' : '170'})
                    </span>
                  </div>
                  <div className="flex justify-between items-center py-2 border-b border-black/5 dark:border-white/5">
                    <span className="font-normal text-lg">Shadow Deck</span>
                    <span className="inline-block rounded-full border border-[#4ade80]/30 bg-[#4ade80]/10 text-[#4ade80] px-3 py-1 font-mono text-[10px] tracking-[0.3em] uppercase flex items-center">
                      <CheckCircle className="w-3 h-3 mr-2"/> Ready ({demoMode ? '2' : '30'})
                    </span>
                  </div>
                  <p className="font-mono text-[10px] tracking-[0.1em] text-zinc-500 leading-relaxed pt-4">
                    IMAGES PRE-TAGGED ACROSS 8 DIMENSIONS. TRANSITIONS PRE-CONFIGURED PER 30-MIN ARCHITECTURE.
                  </p>
                </div>
              </div>
            </div>
            
            <div className="pt-12 flex justify-center">
              <button
                onClick={startSession}
                className="bg-black text-white dark:bg-white dark:text-black font-black uppercase tracking-[0.2em] px-10 py-5 rounded-[40px] text-sm hover:bg-[#4ade80] dark:hover:bg-[#4ade80] dark:hover:text-black active:scale-95 transition-all duration-300 flex items-center"
              >
                <Play className="w-4 h-4 mr-3" fill="currentColor" />
                Initiate Sequence
              </button>
            </div>
            
          </div>
        </div>
      </div>
    );
  }

  // --- CLIENT EXPERIENCE ---
  if (phase === 'intro') {
    return (

        <div className="noise-overlay" />

          <p className="font-light italic text-xl md:text-2xl text-white/90 mb-16">

          </p>

          <p className="text-[#71717a] text-lg font-normal leading-relaxed mb-16 max-w-md">

          <div className="flex items-center justify-center space-x-16 mb-16 font-mono text-[10px] tracking-[0.3em] uppercase text-[#71717a]">

              <span className="w-14 h-14 border border-white/20 rounded-full flex items-center justify-center mb-4 text-xl">←</span>

          <button

        <div className="noise-overlay" />
        <div className="w-full h-full animate-pulse opacity-10 mix-blend-overlay bg-gradient-to-tr from-transparent to-white/50" />
      </div>
    );

        <div className="noise-overlay" />

        <div className="absolute bottom-6 left-10 w-2 h-2 rounded-full bg-[#ef4444]/20 shadow-[0_0_15px_rgba(239,68,68,0.3)]" />

        {currentIndex < currentRoundImages.length - 1 && (
          <img src={currentRoundImages[currentIndex + 1].url} className="hidden" alt="preload" />
        )}

        {currentImg && (
          <SwipeCard

            image={currentImg}
            onSwipe={recordSwipe}
          />
        )}
      </div>
    );
  }

        <div className="w-full max-w-md animate-quantum-in">
          <div className="text-center mb-12">
            <h2 className="text-4xl font-black tracking-tighter leading-[1.1] mb-2 uppercase">Analysis Ready.</h2>
            <p className="font-light italic text-white/90 text-lg">System compilation complete.</p>
          </div>

          <form onSubmit={handleFormSubmit} className="space-y-8 glass-card p-8">
            <div className="space-y-6">
              <div className="grid grid-cols-2 gap-6">
                <div>
                  <label className="block font-mono text-[10px] tracking-[0.3em] uppercase text-[#71717a] mb-2">First Name</label>
                  <input
                    type="text"
                    value={leadData.firstName}
                    onChange={(e) => setLeadData({...leadData, firstName: e.target.value})}
                    className="w-full bg-transparent border-b border-white/20 pb-2 text-white font-normal focus:outline-none focus:border-[#4ade80] transition-colors rounded-none"
                  />
                </div>
                <div>
                  <label className="block font-mono text-[10px] tracking-[0.3em] uppercase text-[#71717a] mb-2">Last Name</label>
                  <input
                    type="text"
                    value={leadData.lastName}
                    onChange={(e) => setLeadData({...leadData, lastName: e.target.value})}
                    className="w-full bg-transparent border-b border-white/20 pb-2 text-white font-normal focus:outline-none focus:border-[#4ade80] transition-colors rounded-none"
                  />
                </div>
              </div>

              <div>
                <label className="block font-mono text-[10px] tracking-[0.3em] uppercase text-[#71717a] mb-2">Company</label>
                <input
                  type="text"
                  value={leadData.company}
                  onChange={(e) => setLeadData({...leadData, company: e.target.value})}
                  className="w-full bg-transparent border-b border-white/20 pb-2 text-white font-normal focus:outline-none focus:border-[#4ade80] transition-colors rounded-none"
                />
              </div>
              <div>
                <label className="block font-mono text-[10px] tracking-[0.3em] uppercase text-[#71717a] mb-2">Email Address <span className="text-[#ef4444]">*</span></label>
                <input
                  type="email"
                  required
                  value={leadData.email}
                  onChange={(e) => setLeadData({...leadData, email: e.target.value})}
                  className="w-full bg-transparent border-b border-white/20 pb-2 text-white font-normal focus:outline-none focus:border-[#4ade80] transition-colors rounded-none placeholder-zinc-700"
                  placeholder="name@company.com"
                />
              </div>
            </div>

            <button
              type="submit"
              disabled={!isFormValid || isSubmittingForm}
              className={`w-full py-5 rounded-[40px] font-black uppercase tracking-[0.2em] text-sm flex items-center justify-center transition-all duration-300
                ${isFormValid && !isSubmittingForm
                  ? 'bg-white text-black hover:bg-[#4ade80] cursor-pointer active:scale-95'
                  : 'bg-white/10 text-white/30 cursor-not-allowed'}`}
            >
              {isSubmittingForm ? (
                <>
                  <Loader2 className="w-4 h-4 mr-3 animate-spin" />
                  Processing
                </>
              ) : (
                'Generate Report'
              )}
            </button>
          </form>
        </div>
      </div>
    );
  }

  if (phase === 'report') {
    return (
      <div className={isDarkMode ? 'dark' : 'light'}>
        <QuantumStyles />
        <ReportView
          history={history}
          images={images}
          finalists={finalists}
          onRestart={() => setPhase('studio')}
          isDarkMode={isDarkMode}
          toggleTheme={toggleTheme}
          leadData={leadData}
        />
      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
