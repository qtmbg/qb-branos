// ── QB OS: Supabase Access Check ─────────────────────────────────────────────
(async function(){
  const SUPA_URL = 'https://yushbxjwfhuokaezoioe.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1c2hieGp3Zmh1b2thZXpvaW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjEwNTAsImV4cCI6MjA5MDM5NzA1MH0.xU_jlBhmSeb1Bck04bEgNAD7HQBsGvgkf7d3PK_dbl0';
  
  // Check for payment success redirect
  const params = new URLSearchParams(window.location.search);
  if (params.get('payment') === 'success') {
    const plan = params.get('plan') || 'starter';
    localStorage.setItem('qb_user_tier', plan);
    localStorage.setItem('qb_paid', '1');
    // Clean URL
    window.history.replaceState({}, '', window.location.pathname);
  }
  
  // Load user session from Supabase if token exists
  const session = (() => { try { return JSON.parse(localStorage.getItem('qb_session') || '{}'); } catch(e) { return {}; } })();
  
  if (session && session.token) {
    try {
      const res = await fetch(SUPA_URL + '/rest/v1/profiles?select=tier,subscription_status,qbp', {
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + session.token,
          'Content-Type': 'application/json'
        }
      });
      if (res.ok) {
        const data = await res.json();
        if (data && data[0]) {
          const profile = data[0];
          // Update local tier from server
          if (profile.tier) localStorage.setItem('qb_user_tier', profile.tier);
          if (profile.subscription_status) localStorage.setItem('qb_sub_status', profile.subscription_status);
          // Restore QBP from server if local is empty
          if (profile.qbp && Object.keys(profile.qbp).length > 0) {
            const localQBP = JSON.parse(localStorage.getItem('qb_qbp') || '{}');
            if (Object.keys(localQBP).length === 0) {
              localStorage.setItem('qb_qbp', JSON.stringify(profile.qbp));
            }
          }
        }
      }
    } catch(e) { /* silent fail — local state is fallback */ }
  }
  
  // Expose access check function for tools
  window.QB_HAS_ACCESS = function(feature) {
    const tier = localStorage.getItem('qb_user_tier') || 'free';
    const paid = localStorage.getItem('qb_paid') === '1';
    const status = localStorage.getItem('qb_sub_status') || 'inactive';
    const isActive = paid || status === 'active';
    if (feature === 'panel') return isActive && (tier === 'pro' || tier === 'agency');
    if (feature === 'agency') return isActive && tier === 'agency';
    if (feature === 'free') return true;
    return isActive; // all paid features
  };
  
  window.QB_TIER = localStorage.getItem('qb_user_tier') || 'free';
  window.QB_SUPA_URL = SUPA_URL;
  window.QB_SUPA_KEY = SUPA_KEY;
  
  // Save QBP to Supabase when it changes
  const originalSetItem = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function(key, value) {
    originalSetItem(key, value);
    if (key === 'qb_qbp' && session && session.token) {
      try {
        const qbp = JSON.parse(value);
        fetch(SUPA_URL + '/rest/v1/profiles?id=eq.' + session.supabaseId, {
          method: 'PATCH',
          headers: {
            'apikey': SUPA_KEY,
            'Authorization': 'Bearer ' + session.token,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ qbp, updated_at: new Date().toISOString() })
        }).catch(() => {});
      } catch(e) {}
    }
  };
})();

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function el(tag,props={},children=[]){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html')e.innerHTML=v;
    else if(k==='class')e.className=v;
    else e.setAttribute(k,v);
  });
  [children].flat(Infinity).forEach(c=>{
    if(c==null)return;
    if(c instanceof Node)e.appendChild(c);
    else if(typeof c==='string'||typeof c==='number')e.appendChild(document.createTextNode(String(c)));
  });
  return e;
}

function buildMap(){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','100%');svg.setAttribute('viewBox','0 0 680 96');svg.style.display='block';
  const pw=116,ph=44,py=16,gap=14;
  PHASES.forEach((p,i)=>{
    const x=10+i*(pw+gap);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
    Object.entries({x,y:py,width:pw,height:ph,rx:6,fill:p.color+'16',stroke:p.color+'45','stroke-width':'.7'}).forEach(([k,v])=>r.setAttribute(k,v));
    g.appendChild(r);
    const nt=document.createElementNS('http://www.w3.org/2000/svg','text');
    Object.entries({x:x+8,y:py+13,'font-family':'JetBrains Mono,monospace','font-size':8,fill:p.color,opacity:.65}).forEach(([k,v])=>nt.setAttribute(k,v));
    nt.textContent=`0${p.n}`;g.appendChild(nt);
    const lt=document.createElementNS('http://www.w3.org/2000/svg','text');
    Object.entries({x:x+pw/2,y:py+30,'text-anchor':'middle','font-family':'Inter,sans-serif','font-size':11,'font-weight':500,fill:'#e8e8e8'}).forEach(([k,v])=>lt.setAttribute(k,v));
    lt.textContent=p.label;g.appendChild(lt);
    svg.appendChild(g);
    if(i<PHASES.length-1){
      const a=document.createElementNS('http://www.w3.org/2000/svg','line');
      Object.entries({x1:x+pw+2,y1:py+ph/2,x2:x+pw+gap-2,y2:py+ph/2,stroke:'#333','stroke-width':1}).forEach(([k,v])=>a.setAttribute(k,v));
      svg.appendChild(a);
    }
  });
  const sl=document.createElementNS('http://www.w3.org/2000/svg','line');

// ── TOOL LAUNCH ───────────────────────────────────────────────────────────────
function launch(tool){
  const provider=localStorage.getItem('qb_provider')||'anthropic';
  const params=new URLSearchParams();
  if(S.apiKey) params.set('apikey',S.apiKey);
  params.set('provider',provider);
  // Pass Klaviyo keys to Signal Scan
  if(tool.id==='signal-scan'){
    if(S.klaviyoPublicKey) params.set('kpk',S.klaviyoPublicKey);
    if(S.klaviyoListId) params.set('kli',S.klaviyoListId);
  }
  window.open(`${tool.file}?${params.toString()}`,'_blank');
  notify(`Opening ${tool.name}…`);
}

  ]));
  QBP_FIELDS.forEach(f=>{
    const g=d({marginBottom:14},[el('div',{style:{fontFamily:'var(--mono)',fontSize:9,letterSpacing:'.18em',color:'var(--text3)',textTransform:'uppercase',marginBottom:5}},[f.l])]);
    if(f.r>1){const ta=el('textarea',{placeholder:f.p,rows:f.r});ta.value=S.qbp[f.k]||'';ta.addEventListener('input',e=>{S.qbp[f.k]=e.target.value;});g.appendChild(ta);}
    else{const inp=el('input',{type:'text',placeholder:f.p});inp.value=S.qbp[f.k]||'';inp.addEventListener('input',e=>{S.qbp[f.k]=e.target.value;});g.appendChild(inp);}
    wrap.appendChild(g);
  });
  wrap.appendChild(d({display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:24,paddingTop:20,borderTop:'1px solid var(--border)',flexWrap:'wrap',gap:12},[
    d({display:'flex',gap:8},[
      el('button',{style:{background:'none',border:'1px solid var(--border)',color:'var(--text2)',padding:'9px 16px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase'},onClick:exportQBP},['Export']),
      el('button',{style:{background:'none',border:'1px solid var(--border)',color:'var(--text2)',padding:'9px 16px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase'},onClick:importQBP},['Import']),
    ]),
    el('button',{style:{background:'var(--green)',color:'#000',padding:'10px 26px',borderRadius:5,fontWeight:700,fontSize:12,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)'},
      onClick:()=>{persist();notify('QBP saved ✓');render();}},['Save QBP']),
  ]));
  return wrap;
}
function exportQBP(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({version:'QB_BrandOS_v3',saved:new Date().toISOString(),qbp:S.qbp},null,2)],{type:'application/json'}));
  a.download=`${(S.qbp.brandName||'brand').replace(/\s+/g,'-').toLowerCase()}-qbp.json`;a.click();
  notify('QBP exported ✓');
}
function importQBP(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const r=new FileReader();r.onload=ev=>{
    try{const d=JSON.parse(ev.target.result);if(d.qbp){S.qbp=d.qbp;persist();notify('QBP imported ✓');render();}else notify('Invalid file','err');}
    catch{notify('Could not read file','err');}
  };r.readAsText(e.target.files[0]);};inp.click();
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function buildSettings(){
  const wrap=el('div',{class:'fade-in',style:{padding:'36px 24px',maxWidth:660,margin:'0 auto'}});
  wrap.appendChild(d({marginBottom:28},[
    mono('// Settings','var(--green)',{marginBottom:10}),
    el('h1',{style:{fontSize:24,fontWeight:700,marginBottom:8}},['Settings']),
    el('p',{style:{color:'var(--text2)',fontSize:14,lineHeight:1.7}},['API key, display mode, data management. Everything stored locally — nothing sent anywhere except directly to Anthropic.']),
  ]));

  // API KEY
  const keyBlock=el('div',{class:'setting-block'});
  keyBlock.appendChild(mono('Anthropic API Key','var(--blue)',{marginBottom:6}));
  keyBlock.appendChild(el('p',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:14}},['Required for every agent tool. Get yours at console.anthropic.com → API Keys. Once saved here, every tool you open from this Hub will use it automatically — you never enter it again.']));
  const kw=el('div',{class:'key-wrap'});
  const ki=el('input',{type:S.keyVisible?'text':'password',placeholder:'sk-ant-api03-...'});
  ki.value=S.apiKey||'';ki.addEventListener('input',e=>{S.apiKey=e.target.value;});
  const kt=el('button',{class:'key-show',onClick:()=>{S.keyVisible=!S.keyVisible;render();}});
  kt.textContent=S.keyVisible?'Hide':'Show';
  kw.appendChild(ki);kw.appendChild(kt);keyBlock.appendChild(kw);
  keyBlock.appendChild(d({marginTop:10,display:'flex',gap:8,alignItems:'center'},[
    el('button',{style:{background:'var(--blue)',color:'#000',padding:'8px 18px',borderRadius:5,fontWeight:700,fontSize:10,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)'},onClick:()=>{persist();notify('API key saved ✓');}},['Save Key']),
    el('button',{style:{background:'none',border:'1px solid var(--border)',color:'var(--text3)',padding:'8px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase'},onClick:()=>{S.apiKey='';persist();notify('Key removed');render();}},['Remove']),
    S.apiKey?el('div',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',letterSpacing:'.08em'}},['✓ All tools will use this key']):null,
  ]));
  wrap.appendChild(keyBlock);

  // AI PROVIDER
  const provBlock=el('div',{class:'setting-block'});
  provBlock.appendChild(mono('AI Provider','var(--teal)',{marginBottom:6}));
  provBlock.appendChild(el('p',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:14}},['Choose which AI provider powers the agent tools. Anthropic (Claude) produces the highest quality outputs. Gemini 2.0 Flash is free — good for testing and early stage use.']));
  const currentProvider=localStorage.getItem('qb_provider')||'anthropic';
  provBlock.appendChild(d({display:'flex',gap:8},[
    ...['anthropic','gemini'].map(prov=>{
      const isActive=currentProvider===prov;
      const labels={anthropic:'Anthropic (Claude) — Recommended',gemini:'Gemini 2.0 Flash — Free tier'};
      const colors={anthropic:'var(--blue)',gemini:'var(--teal)'};
      return el('button',{
        style:{
          padding:'9px 16px',borderRadius:5,fontSize:11,fontFamily:'var(--mono)',letterSpacing:'.08em',textTransform:'uppercase',
          background:isActive?colors[prov]+'18':'none',
          border:`1px solid ${isActive?colors[prov]+'50':'var(--border)'}`,
          color:isActive?colors[prov]:'var(--text3)',transition:'all .15s',
        },
        onClick:()=>{localStorage.setItem('qb_provider',prov);notify(`Provider set: ${prov} ✓`);render();}
      },[labels[prov]]);
    }),
  ]));
  provBlock.appendChild(d({marginTop:10,fontSize:11,color:'var(--text3)',lineHeight:1.6},[
    currentProvider==='gemini'?'⚠ Gemini free tier has rate limits. For client work, switch to Anthropic.':'✓ Claude Sonnet 4 — best quality for all agent tools.',
  ]));
  wrap.appendChild(provBlock);

  // CLIENT MODE
  const cb=el('div',{class:'setting-block'});
  cb.appendChild(mono('Client Delivery Mode','var(--purple)',{marginBottom:6}));
  cb.appendChild(el('p',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:14}},['Hides QBP editor, Settings, and all builder navigation. The system becomes a clean client-facing product. Your client sees only their brand name, the path, and the tools. Toggle off to return to build mode.']));
  const tt=el('div',{class:`toggle-track${S.clientMode?' on':''}`,onClick:()=>{S.clientMode=!S.clientMode;persist();render();}});
  tt.appendChild(el('div',{class:'toggle-knob'}));
  cb.appendChild(d({display:'flex',alignItems:'center',gap:12},[
    tt,
    el('span',{style:{fontSize:13,color:S.clientMode?'var(--green)':'var(--text2)'}},[S.clientMode?'On — client view active':'Off — full build mode']),
  ]));
  wrap.appendChild(cb);

  // QBP BACKUP
  const bb=el('div',{class:'setting-block'});
  bb.appendChild(mono('QBP Backup','var(--amber)',{marginBottom:6}));
  bb.appendChild(el('p',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:14}},['Export as JSON to back up or share. Import to restore or switch between brands.']));
  bb.appendChild(d({display:'flex',gap:8},[
    el('button',{style:{background:'var(--amber)',color:'#000',padding:'8px 18px',borderRadius:5,fontWeight:700,fontSize:10,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)'},onClick:exportQBP},['Export QBP']),
    el('button',{style:{background:'none',border:'1px solid var(--border)',color:'var(--text2)',padding:'8px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase'},onClick:importQBP},['Import QBP']),
  ]));
  wrap.appendChild(bb);

  // KLAVIYO INTEGRATION
  const klavBlock=el('div',{class:'setting-block'});
  klavBlock.appendChild(mono('Klaviyo Integration','var(--pink)',{marginBottom:6}));
  klavBlock.appendChild(el('p',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:14}},['Connect Klaviyo to automatically capture Signal Scan leads, tag them with their score and top gap, and trigger the 5-email nurture sequence. Requires your Klaviyo Public API Key and a list ID.']));
  const kpkInp=el('input',{type:'text',placeholder:'Klaviyo Public API Key — starts with pk_...'});
  kpkInp.value=S.klaviyoPublicKey||'';kpkInp.style.marginBottom='8px';
  kpkInp.addEventListener('input',e=>{S.klaviyoPublicKey=e.target.value;});
  klavBlock.appendChild(kpkInp);
  const kliInp=el('input',{type:'text',placeholder:'Signal Scan List ID — find in Klaviyo → Lists'});
  kliInp.value=S.klaviyoListId||'';kliInp.style.marginBottom='12px';
  kliInp.addEventListener('input',e=>{S.klaviyoListId=e.target.value;});
  klavBlock.appendChild(kliInp);
  klavBlock.appendChild(d({display:'flex',gap:8,alignItems:'center'},[
    el('button',{style:{background:'var(--pink)',color:'#000',padding:'8px 18px',borderRadius:5,fontWeight:700,fontSize:10,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)'},
      onClick:()=>{persist();notify('Klaviyo keys saved ✓');}},['Save']),
    S.klaviyoPublicKey&&S.klaviyoListId?el('div',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',letterSpacing:'.08em'}},['✓ Signal Scan will sync leads to Klaviyo automatically']):null,
  ]));
  klavBlock.appendChild(d({marginTop:12,background:'var(--bg4)',borderRadius:6,padding:'10px 14px'},[
    el('div',{style:{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',letterSpacing:'.12em',marginBottom:6,textTransform:'uppercase'}},['Where to find these in Klaviyo']),
    el('div',{style:{fontSize:11,color:'var(--text2)',lineHeight:1.8}},['Public API Key: Klaviyo → Settings → API Keys → Create Public API Key']),
    el('div',{style:{fontSize:11,color:'var(--text2)',lineHeight:1.8}},['List ID: Klaviyo → Lists & Segments → Select your list → Settings → List ID']),
    el('div',{style:{fontSize:11,color:'var(--text3)',lineHeight:1.8,marginTop:4}},['Profile properties passed: signal_scan_score, signal_scan_grade, signal_scan_top_gap, signal_scan_moment, signal_scan_date']),
  ]));
  wrap.appendChild(klavBlock);

  // ENTRY POINT
  const eb=el('div',{class:'setting-block'});
  eb.appendChild(mono('Journey Entry Point','var(--teal)',{marginBottom:6}));
  eb.appendChild(el('p',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:14}},['Change which path you are on, or reset to see the entry screen again.']));
  eb.appendChild(d({display:'flex',gap:8,flexWrap:'wrap'},[
    ...DOORS.map(door=>el('button',{
      style:{background:S.chosenDoor?.id===door.id?door.color+'20':'none',border:`1px solid ${S.chosenDoor?.id===door.id?door.color+'50':'var(--border)'}`,color:S.chosenDoor?.id===door.id?door.color:'var(--text3)',padding:'6px 14px',borderRadius:4,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.08em',textTransform:'uppercase'},
      onClick:()=>{S.chosenDoor=door;S.view='hub';render();notify(`Path set: ${door.badge}`);}
    },[door.badge])),
    el('button',{style:{background:'none',border:'1px dashed var(--border)',color:'var(--text3)',padding:'6px 14px',borderRadius:4,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.08em',textTransform:'uppercase'},
      onClick:()=>{S.view='entry';S.firstVisit=true;localStorage.removeItem('qb_visited');render();}},['Reset entry']),
  ]));
  wrap.appendChild(eb);

  // DANGER
  const danger=el('div',{class:'setting-block',style:{border:'1px solid rgba(239,68,68,0.15)'}});
  danger.appendChild(mono('Danger Zone','var(--red)',{marginBottom:6}));
  danger.appendChild(el('p',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:10}},['Clears all stored data — QBP, API key, and preferences. Export your QBP first.']));
  danger.appendChild(el('button',{style:{background:'none',border:'1px solid rgba(239,68,68,0.3)',color:'var(--red)',padding:'7px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase'},
    onClick:()=>{
      if(!confirm('Clear all QB BrandOS data?'))return;
      ['qb_qbp','qb_api_key','qb_client','qb_visited'].forEach(k=>localStorage.removeItem(k));
      Object.assign(S,{qbp:{},apiKey:'',clientMode:false,firstVisit:true,chosenDoor:null,view:'entry'});
      notify('All data cleared');render();
    }},['Clear All Data']));
  wrap.appendChild(danger);
  return wrap;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  const shell=el('div',{style:{display:'flex',flexDirection:'column',minHeight:'100vh'}});
  shell.appendChild(buildHeader());

  // System map (hidden on entry screen)
  if(S.view!=='entry'){
    shell.appendChild(d({borderBottom:'1px solid var(--border)',padding:'14px 24px',background:'var(--bg2)'}, [
      d({maxWidth:1100,margin:'0 auto'},[buildMap()])
    ]));
  }

  const main=el('main',{style:{flex:1}});
  if(S.view==='entry') main.appendChild(buildEntry());
  else if(S.view==='hub') main.appendChild(buildHub());
  else if(S.view==='qbp') main.appendChild(buildQBP());
  else if(S.view==='settings') main.appendChild(buildSettings());
  shell.appendChild(main);

  if(S.view!=='entry'){
    shell.appendChild(el('footer',{style:{borderTop:'1px solid var(--border)',padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}},[
      el('span',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.2em',textTransform:'uppercase'}},['Quantum Branding BrandOS v3']),
      el('span',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.12em'}},['18 tools · From idea to orbit']),
    ]));
  }
  if(S.clientMode) shell.appendChild(el('div',{class:'client-badge'},['Client View']));
  app.appendChild(shell);
}

load();render();
</script>
<script src="qb-shell.js"></script>
</body>
