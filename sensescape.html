// --- HELPER COMPONENTS ---

// Visualizer Canvas - This is the core "Sensory" part of the app

const SensoryVisualizer = ({ type, value }) => {

  // Normalize value from 1 to 10 to a 0-1 range for easier math

  const n = (value - 1) / 9;

  const inv = 1 - n;

  const renderVisuals = () => {

    switch (type) {

      case 'weight':

        return (

          <div className="flex items-center justify-center h-full w-full bg-transparent text-black dark:text-white overflow-hidden relative transition-colors duration-500">

             <span style={{ fontWeight: 900 - (n * 800), fontSize: '12rem', letterSpacing: '-0.05em', transition: 'font-weight 0.3s ease' }}>

                Aa

             </span>

             <div className="absolute bottom-4 text-black/50 dark:text-white/50 text-[10px] font-mono tracking-[0.3em] uppercase">WEIGHT: {Math.round(900 - (n * 800))}</div>

          </div>

        );

      case 'font-family':

        return (

          <div className="flex items-center justify-center h-full w-full bg-transparent text-black dark:text-white transition-colors duration-500">

             <span style={{ fontFamily: n < 0.5 ? 'Georgia, serif' : 'Inter, sans-serif', fontSize: '10rem', transition: 'all 0.3s ease' }}>

                {n < 0.5 ? 'Serif' : 'Sans'}

             </span>

          </div>

        );

      case 'temperature':

        const r = Math.round(255 * inv + 40 * n);

        const g = Math.round(100 * inv + 150 * n);

        const b = Math.round(50 * inv + 255 * n);

        return (

          <div className="flex items-center justify-center h-full w-full transition-colors duration-500" style={{ backgroundColor: `rgb(${r},${g},${b})` }}>

            <div className="w-32 h-32 rounded-full border border-black/30 dark:border-white/30 backdrop-blur-md flex items-center justify-center text-black/80 dark:text-white/80 font-mono text-[10px] tracking-[0.3em] uppercase transition-colors duration-500 shadow-xl">

              TEMP

            </div>

          </div>

        );

      case 'saturation':

        return (

          <div className="flex items-center justify-center h-full w-full overflow-hidden relative bg-transparent transition-colors duration-500">

             <div className="absolute inset-0 opacity-80 mix-blend-screen dark:mix-blend-lighten" style={{

                background: 'radial-gradient(circle at center, #ff0055, #0055ff)',

                filter: `saturate(${100 - (n * 90)}%)`,

                transition: 'filter 0.3s ease'

             }} />

          </div>

        );

      case 'luminosity':

        const lum = n * 255;

        return (

          <div className="flex items-center justify-center h-full w-full transition-colors duration-500" style={{ backgroundColor: `rgb(${lum},${lum},${lum})` }}>

             <div className="w-24 h-24 border border-current opacity-50 text-black dark:text-white transition-colors duration-500" style={{ color: n > 0.5 ? 'black' : 'white' }} />

          </div>

        );

      case 'radius':

      case 'corners':

        return (

          <div className="flex items-center justify-center h-full w-full bg-transparent transition-colors duration-500">

             <div className="w-48 h-48 bg-black dark:bg-[#4ade80] transition-all duration-300 shadow-2xl" style={{ borderRadius: `${n * 50}%` }} />

          </div>

        );

      case 'tracking':

        return (

          <div className="flex flex-col items-center justify-center h-full w-full bg-transparent text-[#111] dark:text-[#4ade80] transition-colors duration-500">

             <span className="text-3xl uppercase font-black" style={{ letterSpacing: `${(n * 2) - 0.1}em`, transition: 'letter-spacing 0.3s ease' }}>

                Presence

             </span>

          </div>

        );

      case 'density':

        return (

          <div className="flex items-center justify-center h-full w-full bg-transparent p-8 overflow-hidden relative transition-colors duration-500">

              {Array.from({ length: Math.max(1, Math.floor(n * 50)) }).map((_, i) => (

                 <div key={i} className="absolute border border-black/20 dark:border-[#4ade80]/20 bg-black/5 dark:bg-[#4ade80]/5 transition-all duration-500 backdrop-blur-sm"

                      style={{

                        width: `${Math.random() * 100 + 20}px`,

                        height: `${Math.random() * 100 + 20}px`,

                        left: `${Math.random() * 100}%`,

                        top: `${Math.random() * 100}%`,

                        transform: 'translate(-50%, -50%)'

                      }} />

              ))}

              <div className="z-10 bg-white/80 dark:bg-black/80 backdrop-blur-md px-4 py-2 border border-black/10 dark:border-[#4ade80]/30 text-black dark:text-[#4ade80] font-mono text-[10px] tracking-[0.3em] uppercase transition-colors duration-500">

                NOISE LEVEL

              </div>

          </div>

        );

      case 'contrast':

        return (

           <div className="flex items-center justify-center h-full w-full relative"

                style={{

                  background: n < 0.5

                    ? 'linear-gradient(135deg, #000 50%, #fff 50%)'

                    : 'linear-gradient(135deg, rgba(120,120,120,0.5), rgba(180,180,180,0.5))',

                  transition: 'background 0.5s ease'

                }}>

           </div>

        );

      default:

        return (

          <div className="flex items-center justify-center h-full w-full bg-transparent text-zinc-500 dark:text-zinc-600 font-mono text-[10px] tracking-[0.3em] uppercase transition-colors duration-500">

            System Ready

          </div>

        );

    }

  };

  return (

    <div className="w-full h-64 md:h-80 rounded-[32px] overflow-hidden shadow-2xl border border-black/10 dark:border-white/10 relative group transition-colors duration-500 bg-black/5 dark:bg-white/5 backdrop-blur-[24px]">

       {renderVisuals()}

       <div className="absolute top-6 left-6 flex items-center space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">

         <div className="inline-flex items-center space-x-2 px-3 py-1 rounded-full border border-[#16a34a]/30 dark:border-[#4ade80]/30 bg-[#16a34a]/10 dark:bg-[#4ade80]/10 text-[#16a34a] dark:text-[#4ade80] font-mono text-[10px] uppercase tracking-[0.3em]">

           <Sparkles size={12} />

           <span>Live Preview</span>

         </div>

       </div>

    </div>

  );

};

// --- MAIN APP COMPONENT ---

export default function App() {

  const [theme, setTheme] = useState('dark');

  const [started, setStarted] = useState(false);

  const [currentChapterIndex, setCurrentChapterIndex] = useState(0);

  const [answers, setAnswers] = useState({});

  const [showCodex, setShowCodex] = useState(false);

  const [showLeadForm, setShowLeadForm] = useState(false);

  const [leadData, setLeadData] = useState({ firstName: '', lastName: '', company: '', email: '' });

  const [isSubmitting, setIsSubmitting] = useState(false);

  const [validationError, setValidationError] = useState('');

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  // Sync theme with document root to ensure Tailwind 'dark:' utility classes trigger properly

  useEffect(() => {

    if (theme === 'dark') {

      document.documentElement.classList.add('dark');

    } else {

      document.documentElement.classList.remove('dark');

    }

  }, [theme]);

  // Initialize slider values to 5

  useEffect(() => {

    const initAnswers = {};

    SENSESCAPE_DATA.forEach(ch => {

      ch.questions.forEach(q => {

        if (q.type === 'slider') {

          initAnswers[q.id] = 5;

        } else {

          initAnswers[q.id] = "";

        }

      });

    });

    setAnswers(initAnswers);

  }, []);

  const handleSliderChange = (id, value) => {

    setAnswers(prev => ({ ...prev, [id]: parseInt(value) }));

  };

  const handleTextChange = (id, value) => {

    setAnswers(prev => ({ ...prev, [id]: value }));

    setValidationError('');

  };

  const isChapterComplete = () => {

    const currentQuestions = SENSESCAPE_DATA[currentChapterIndex].questions;

    for (let q of currentQuestions) {

      if (q.type === 'text') {

        if (!answers[q.id] || answers[q.id].trim() === "") {

          return false;

        }

      }

    }

    return true;

  };

  const nextChapter = () => {

    if (!isChapterComplete()) {

      setValidationError("Please answer all text prompts to continue.");

      return;

    }

    setValidationError('');

    if (currentChapterIndex < SENSESCAPE_DATA.length - 1) {

      setCurrentChapterIndex(prev => prev + 1);

      window.scrollTo({ top: 0, behavior: 'smooth' });

    } else {

      setShowLeadForm(true);

      window.scrollTo({ top: 0, behavior: 'smooth' });

    }

  };

  const prevChapter = () => {

    setValidationError('');

    if (currentChapterIndex > 0) {

      setCurrentChapterIndex(prev => prev - 1);

      window.scrollTo({ top: 0, behavior: 'smooth' });

    }

  };

  // Generate Paradoxes for Codex based on answers

  const generateParadoxes = useMemo(() => {

    if (!showCodex) return [];

    const paradoxes = [];

    // Example Logic: Bold but Minimalist

    if (answers['e_bold_subtle'] < 4 && answers['e_min_max'] < 4) {

      paradoxes.push({ title: "Bold yet Minimalist", desc: "The brand demands attention not through shouting, but through the absolute conviction of its silence. High impact, zero clutter." });

    }

    // Example Logic: Dark but Approachable

    if (answers['c_dark_light'] < 4 && answers['e_lux_appr'] > 6) {

      paradoxes.push({ title: "Dark yet Approachable", desc: "It uses shadows and depth not to intimidate, but to create a private, cozy space. Intimacy through moody aesthetics." });

    }

    // Example Logic: Traditional but Playful

    if (answers['t_serif_sans'] < 4 && answers['e_corp_play'] > 6) {

      paradoxes.push({ title: "Heritage yet Irreverent", desc: "It wears the clothes of an institution but winks at the audience. It uses classic typography to tell a joke." });

    }

    // Fallback if none trigger

    if (paradoxes.length === 0) {

      paradoxes.push({ title: "Structured yet Organic", desc: "The brand builds rigorous systems but populates them with warmth and humanity."});

      paradoxes.push({ title: "Classic yet Kinetic", desc: "Timeless visual anchors brought into the present tense through modern motion."});

    }

    return paradoxes.slice(0, 3); // Max 3

  }, [answers, showCodex]);

  // ── QB OS: Auto-populate QBP from Sensescape ──────────────────────────────
  React.useEffect(() => {
    if (!showCodex) return;
    try {
      const existing = JSON.parse(localStorage.getItem('qb_qbp') || '{}');
      // Build color territory from slider answers
      const colorTemp = answers['c_warm_cool'] ? (answers['c_warm_cool'] < 5 ? 'Warm tones' : 'Cool tones') : '';
      const colorLight = answers['c_dark_light'] ? (answers['c_dark_light'] < 5 ? 'Dark, deep' : 'Light, airy') : '';
      const colorVib = answers['c_vib_mut'] ? (answers['c_vib_mut'] < 5 ? 'Vibrant, saturated' : 'Muted, restrained') : '';
      const colorTerritory = [colorLight, colorTemp, colorVib].filter(Boolean).join(' · ');
      
      // Build visual territory from shape/form answers
      const shapeDir = answers['s_ang_curv'] ? (answers['s_ang_curv'] < 5 ? 'Angular, decisive' : 'Curved, organic') : '';

          </div>

          <div className="flex items-center space-x-4 relative">

            <button onClick={toggleTheme} className="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors cursor-pointer">

              {theme === 'dark' ? <Sun size={16} className="text-[#4ade80]" /> : <Moon size={16} className="text-[#16a34a]" />}

            </button>

            <div className="flex space-x-2 border-l border-black/10 dark:border-white/10 pl-4">

              <button

                onClick={prevChapter}

                disabled={currentChapterIndex === 0}

                className="p-3 rounded-full hover:bg-black/5 dark:hover:bg-white/10 disabled:opacity-30 transition-colors cursor-pointer"

              >

                <ArrowLeft size={16} />

              </button>

              <button

                onClick={nextChapter}

                className="group flex items-center space-x-3 bg-black text-white dark:bg-white dark:text-black font-black uppercase tracking-widest rounded-full hover:bg-[#16a34a] hover:text-white dark:hover:bg-[#4ade80] dark:hover:text-black transition-all duration-300 active:scale-95 text-[10px] py-3 px-6 cursor-pointer"

              >

                <span>{currentChapterIndex === SENSESCAPE_DATA.length - 1 ? 'Execute' : 'Proceed'}</span>

                <ArrowRight size={14} className="group-hover:translate-x-1 transition-transform" />

              </button>

            </div>

            {validationError && (

              <div className="absolute right-0 top-full mt-4 flex items-center space-x-2 px-3 py-2 rounded-lg border border-red-500/30 bg-red-500/10 text-red-600 dark:text-red-500 font-mono text-[10px] uppercase tracking-widest animate-fade-in whitespace-nowrap">

                 <AlertCircle size={14} />

                 <span>{validationError}</span>

              </div>

            )}

          </div>

        </div>

        <main className="max-w-5xl mx-auto px-6 py-16 md:py-24 space-y-32">

          {/* Chapter Intro */}

          <header className="space-y-6 animate-fade-in text-center max-w-3xl mx-auto">

            <h4 className="font-mono text-[10px] uppercase tracking-[0.3em] text-zinc-500 dark:text-zinc-400">Section {currentChapter.chapter}</h4>

            <h1 className="text-5xl md:text-7xl font-black tracking-tighter leading-[1.1]">{currentChapter.title}.</h1>

            <p className="text-xl md:text-2xl text-zinc-600 dark:text-white/90 font-light italic">

              {currentChapter.subtitle}

            </p>

          </header>

          {/* Questions */}

          <div className="space-y-40">

            {currentChapter.questions.map((q, idx) => (

              <div key={q.id} className="space-y-8 animate-fade-in-up" style={{ animationDelay: `${idx * 100}ms` }}>

                {q.type === 'slider' ? (

                  <div className="grid md:grid-cols-2 gap-16 items-center">

                    {/* Left Col: The Control */}

                    <div className="space-y-12">

                      <div className="flex justify-between items-end border-b border-black/10 dark:border-white/10 pb-6">

                        <div className="space-y-2">

                          <span className="inline-block px-2 py-1 bg-black/5 dark:bg-white/5 font-mono text-[10px] uppercase tracking-[0.3em] text-zinc-500 dark:text-zinc-400 rounded">Spectrum</span>

                          <h3 className="text-3xl font-black tracking-tighter">{q.left} <span className="text-zinc-400 dark:text-zinc-600 font-light italic mx-2">vs</span> {q.right}.</h3>

                        </div>

                        <div className="text-5xl font-black text-[#16a34a] dark:text-[#4ade80]">

                          {answers[q.id]}

                        </div>

                      </div>

                      <div className="relative py-4">

                        {/* Custom Track Background */}

                        <div className="absolute top-1/2 left-0 right-0 h-[2px] bg-black/10 dark:bg-white/10 -translate-y-1/2" />

                        {/* Center mark */}

                        <div className="absolute top-1/2 left-1/2 w-[2px] h-4 bg-black/20 dark:bg-white/20 -translate-x-1/2 -translate-y-1/2" />

                        <input

                          type="range"

                          min="1" max="10" step="1"

                          value={answers[q.id] || 5}

                          onChange={(e) => handleSliderChange(q.id, e.target.value)}

                          className="w-full absolute top-1/2 -translate-y-1/2 opacity-0 cursor-pointer z-10"

                          style={{ height: '40px' }}

                        />

                        {/* Custom Thumb - Machine Switch Vibe */}

                        <div

                          className="absolute top-1/2 w-3 h-8 bg-black dark:bg-[#4ade80] shadow-[0_0_15px_rgba(22,163,74,0.3)] dark:shadow-[0_0_15px_rgba(74,222,128,0.3)] pointer-events-none transition-all duration-75"

                          style={{

                            left: `calc(${(answers[q.id] - 1) * (100 / 9)}%)`,

                            transform: 'translate(-50%, -50%)',

                            borderRadius: '2px'

                          }}

                        />

                      </div>

                      <div className="flex justify-between text-sm pt-4">

                        <div className="w-1/2 pr-6 space-y-4">

                          <p className="text-zinc-600 dark:text-[#71717a] font-normal leading-relaxed">{q.leftDesc}</p>

                          <p className="font-mono text-[9px] text-[#16a34a] dark:text-[#4ade80] uppercase tracking-[0.2em] border border-[#16a34a]/20 dark:border-[#4ade80]/20 inline-block px-2 py-1 rounded bg-[#16a34a]/5 dark:bg-[#4ade80]/5">REF: {q.anchorLeft}</p>

                        </div>

                        <div className="w-1/2 pl-6 text-right space-y-4 border-l border-black/10 dark:border-white/10">

                          <p className="text-zinc-600 dark:text-[#71717a] font-normal leading-relaxed">{q.rightDesc}</p>

                          <p className="font-mono text-[9px] text-[#16a34a] dark:text-[#4ade80] uppercase tracking-[0.2em] border border-[#16a34a]/20 dark:border-[#4ade80]/20 inline-block px-2 py-1 rounded bg-[#16a34a]/5 dark:bg-[#4ade80]/5">REF: {q.anchorRight}</p>

                        </div>

                      </div>

                    </div>

                    {/* Right Col: Live Preview */}

                    <div className="h-full">

                      <SensoryVisualizer type={q.previewType} value={answers[q.id] || 5} />

                    </div>

                  </div>

                ) : (

                  <div className="bg-white/60 dark:bg-[#0a0a0a]/60 backdrop-blur-[24px] p-8 md:p-16 rounded-[32px] border border-black/5 dark:border-white/10 shadow-2xl space-y-8 transition-colors duration-500 hover-glow relative overflow-hidden">

                    <h3 className="text-[10px] font-mono uppercase tracking-[0.3em] text-[#16a34a] dark:text-[#4ade80] flex items-center space-x-3">

                      <Square size={12} />

                      <span>{q.title}</span>

                    </h3>

                    <label className="block text-3xl md:text-4xl font-light italic text-black dark:text-white leading-[1.3]">

                      {q.prompt}

                    </label>

                    <textarea

                      value={answers[q.id] || ""}

                      onChange={(e) => handleTextChange(q.id, e.target.value)}

                      placeholder="Trust your instinct. Type here."

                      className="w-full bg-transparent border-b-2 border-black/10 dark:border-white/10 focus:border-[#16a34a] dark:focus:border-[#4ade80] outline-none py-4 text-xl md:text-2xl font-normal transition-colors resize-none rounded-none text-black dark:text-white"

                      rows="2"

                    />

                  </div>

                )}

              </div>

            ))}

          </div>

        </main>

      </div>

    </div>

  );

}

// Global Styles Component to inject necessary CSS

const GlobalStyles = () => (

  <style dangerouslySetInnerHTML={{__html: `

    @keyframes fadeInUp {

      from { opacity: 0; transform: translateY(30px); }

      to { opacity: 1; transform: translateY(0); }

    }

    @keyframes fadeIn {

      from { opacity: 0; }

      to { opacity: 1; }

    }

    @keyframes shine {

      to { background-position: 300% center; }

    }

    .animate-fade-in-up {

      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;

      opacity: 0;

    }

    .animate-fade-in {

      animation: fadeIn 1s ease forwards;

    }

    .animate-gradient-text-light {

      background: linear-gradient(to right, #000000, #16a34a, #000000, #16a34a);

      background-size: 300% auto;

      color: transparent;

      -webkit-background-clip: text;

      background-clip: text;

      animation: shine 8s linear infinite;

    }

    .animate-gradient-text-dark {

      background: linear-gradient(to right, #ffffff, #4ade80, #ffffff, #4ade80);

      background-size: 300% auto;

      color: transparent;

      -webkit-background-clip: text;

      background-clip: text;

      animation: shine 8s linear infinite;

    }

    .hover-glow:hover {

      box-shadow: 0 0 40px rgba(74, 222, 128, 0.05);

      border-color: rgba(74, 222, 128, 0.2);

    }

  `}} />

);

const AppWithStyles = () => (
  <>
    <GlobalStyles />
    <App />
  </>
);
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AppWithStyles />);
</script>
<script src="qb-shell.js"></script>
</body>
</html>
