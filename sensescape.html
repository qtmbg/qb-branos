    var motionSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    motionSvg.setAttribute('viewBox','0 0 420 280');
    motionSvg.setAttribute('preserveAspectRatio','none');
    motionSvg.innerHTML =
      '<rect x="0" y="0" width="420" height="280" fill="none" stroke="currentColor" stroke-opacity=".08" />' +
      '<path d="M 0,280 L 0,0" stroke="currentColor" stroke-opacity=".15" stroke-dasharray="3,6"/>' +
      '<path d="M 0,280 L 420,280" stroke="currentColor" stroke-opacity=".15" stroke-dasharray="3,6"/>' +
      '<path d="' + motion.pathD + '" stroke="var(--brass)" stroke-width="2.5" fill="none" stroke-linecap="round"/>';

    var claudeTokens = hasClaude('motionTokens') ? claudeOut.motionTokens : null;
    var secMotion = el('section', { class:'cdx-section' }, [
      sectionHeader('08.', 'The Motion Signature', motion.character.join(' · ').toUpperCase()),
      el('div', { class:'glass-card cdx-motion' }, [
        el('div', { class:'cdx-motion-canvas', style:{ color:'var(--text-2)' } }, motionSvg),
        el('div', { class:'cdx-motion-note cdx-body' }, [
          el('p', {}, [
            document.createTextNode('Curve: '),
            el('strong', { style:{ color:'var(--text-1)', fontFamily:'var(--f-mono)', fontSize:'13px' }, text: (claudeTokens && claudeTokens.curve) || motion.curve }),
            document.createTextNode('. Standard duration: '),
            el('strong', { style:{ color:'var(--text-1)' }, text: (claudeTokens && claudeTokens.durationBase) || motion.durationBase }),
            document.createTextNode('. Apply to every transition. No alternatives.')
          ]),
          el('div', { style:{ marginTop:'16px', paddingTop:'16px', borderTop:'1px solid var(--border-subtle)', display:'flex', flexDirection:'column', gap:'8px' } }, [
            el('div', { style:{ display:'flex', justifyContent:'space-between', gap:'10px' } }, [
              el('span', { class:'label', text:'Duration · Fast' }),
              el('span', { style:{ fontFamily:'var(--f-mono)', color:'var(--text-1)' }, text: (claudeTokens && claudeTokens.durationFast) || motion.durationFast })
            ]),
            el('div', { style:{ display:'flex', justifyContent:'space-between', gap:'10px' } }, [
              el('span', { class:'label', text:'Duration · Base' }),
              el('span', { style:{ fontFamily:'var(--f-mono)', color:'var(--text-1)' }, text: (claudeTokens && claudeTokens.durationBase) || motion.durationBase })
            ]),
            el('div', { style:{ display:'flex', justifyContent:'space-between', gap:'10px' } }, [
              el('span', { class:'label', text:'Duration · Slow' }),
              el('span', { style:{ fontFamily:'var(--f-mono)', color:'var(--text-1)' }, text: (claudeTokens && claudeTokens.durationSlow) || motion.durationSlow })
            ]),
            el('div', { style:{ display:'flex', justifyContent:'space-between', gap:'10px' } }, [
              el('span', { class:'label', text:'Curve' }),
              el('span', { style:{ fontFamily:'var(--f-mono)', color:'var(--text-1)', fontSize:'11px' }, text: (claudeTokens && claudeTokens.curve) || motion.curve })
            ])
          ]),
          el('div', { style:{ marginTop:'14px' } }, [
            el('div', { class:'label', style:{ marginBottom:'10px' }, text:'Motion rules' }),
            el('ul', { style:{ listStyle:'none', padding:0, margin:0, display:'flex', flexDirection:'column', gap:'8px' } },
              ((claudeTokens && claudeTokens.rule) ? [claudeTokens.rule] : motion.rules).map(function(rule){
                return el('li', {
                  style:{ paddingLeft:'18px', position:'relative', fontFamily:'var(--f-body)', fontSize:'14px', lineHeight:'1.6', color:'var(--text-2)' },
                  html:'<span style="position:absolute;left:0;top:.55em;width:10px;height:1px;background:var(--brass)"></span>' + escapeHTML(rule)
                });
              })
            )
          ])
        ])
      ])
    ]);

    var voiceChips = el('div', { class:'cdx-voice-grid' },
      voice.dims.map(function(d){
        return el('div', { class:'cdx-voice-chip' }, [
          el('div', { class:'k', text:d.k }),
          el('div', { class:'v', text:d.v })
        ]);
      })
    );

    var voiceCard = el('div', { class:'glass-card cdx-voice' }, [
      a.tvoice
        ? el('div', { class:'pullquote', text:a.tvoice })
        : el('div', { class:'pullquote', text:'The voice you described lives here — fill in "The Speaking Voice" to see it return.' }),
      voiceChips,
      el('div', { class:'cdx-voice-example' }, [
        el('span', { class:'tag', text:'SAMPLE IN YOUR VOICE' }),
        el('div', { class:'spec', text: voice.sample })
      ])
    ]);

    var claudeVoice = hasClaude('voice') ? claudeOut.voice : null;
    var pairsBlock = (claudeVoice && Array.isArray(claudeVoice.sayNotThat) && claudeVoice.sayNotThat.length) ? el('div', { class:'glass-card',
      style:{ padding:'40px 36px', marginTop:'20px' } }, [
        el('div', { class:'label', style:{ marginBottom:'20px', letterSpacing:'.28em' }, text:'Say this · not that' }),
        el('div', { class:'cdx-voice-pairs' },
          claudeVoice.sayNotThat.map(function(p){
            return el('div', { style:{ display:'contents' } }, [
              el('div', { class:'cdx-voice-pair' }, [
                el('span', { class:'tag say', text:'SAY' }),
                el('div',  { class:'val', text: p.say || '—' })
              ]),
              el('div', { class:'cdx-voice-pair not' }, [
                el('span', { class:'tag not', text:'NOT' }),
                el('div',  { class:'val', text: p.notThat || '—' })
              ])
            ]);
          })
        )
      ]) : null;
    var taglineBlock = (claudeVoice && Array.isArray(claudeVoice.taglines) && claudeVoice.taglines.length) ? el('div', { class:'glass-card',
      style:{ padding:'40px 36px', marginTop:'20px' } }, [
        el('div', { class:'label', style:{ letterSpacing:'.28em' }, text:'Tagline candidates' }),
        el('div', { class:'cdx-taglines' },
          claudeVoice.taglines.map(function(t){
            return el('div', { class:'cdx-tagline', text: t });
          })
        )
      ]) : null;
    // Voice-in-action mock touchpoints — rendered in their type + accent
    var voiceInAction = (function(){
      var taglineSample = (claudeVoice && Array.isArray(claudeVoice.taglines) && claudeVoice.taglines[0]) || voice.sample || 'Built for the work that deserves it.';
      var sayLine = (claudeVoice && Array.isArray(claudeVoice.sayNotThat) && claudeVoice.sayNotThat[0] && claudeVoice.sayNotThat[0].say) || voice.sample;
      var emailSubject = 'Your ' + (a.swmoment ? a.swmoment.split(/[,.;]/)[0].trim() : 'Monday') + ' brief — ' + (lead.company || 'from us');
      var social = sayLine || 'Three things we are shipping this week.';
      function spec(tag, body, foot, styleAsDisplay){
        var card = el('div', { class:'cdx-voice-specimen' }, [
          el('div', { class:'spec-k', text: tag }),
          el('div', { class:'spec-body', text: body }),
          el('div', { class:'spec-foot', text: foot })
        ]);
        var bodyEl = card.querySelector('.spec-body');
        if (styleAsDisplay){
          bodyEl.style.fontFamily = typography.primaryStack;
          bodyEl.style.fontWeight = String(typography.weightCss);
          bodyEl.style.fontSize = 'clamp(1.4rem, 2.4vw, 1.9rem)';
          bodyEl.style.letterSpacing = '-.015em';
        } else {
          bodyEl.style.fontFamily = typography.secondaryStack;
          bodyEl.style.fontSize = '16px';
          bodyEl.style.lineHeight = '1.55';
        }
        return card;
      }
      return el('div', { class:'cdx-voice-action' }, [
        spec('Web hero headline',  taglineSample, 'Set in ' + typography.primary, true),
        spec('Social post',        '“' + social + '”', '@' + (lead.company ? lead.company.toLowerCase().replace(/\s+/g,'') : 'yourbrand'), false),
        spec('Email subject line', emailSubject, 'Inbox preview', false)
      ]);
    })();

    var secVoice = el('section', { class:'cdx-section' }, [
      sectionHeader('09.', 'The Voice', voice.dims.map(function(d){ return d.v; }).join(' · ').toUpperCase()),
      voiceCard,
      voiceInAction,
      pairsBlock,
      taglineBlock,
      a.vbvoicefail ? el('div', { class:'cdx-sensory-card glass-card', style:{ marginTop:'20px' } }, [
        el('div', { class:'k', text:'The anti-voice' }),
        el('div', { class:'v', text:a.vbvoicefail })
      ]) : null
    ]);

    // Sensory + ritual — always prefer interpretation (destination) over repetition.
    var sensoryCards = [];
    function pushInterpretation(label, interp){
      if (!interp) return;
      sensoryCards.push(el('div', { class:'glass-card cdx-sensory-card' }, [
        el('div', { class:'k', text:label }),
        el('div', { class:'v', text: interp.destination }),
        el('div', {
          style:{ paddingTop:'14px', marginTop:'4px', borderTop:'1px solid var(--border-subtle)',
                  fontFamily:'var(--f-mono)', fontSize:'10px', textTransform:'uppercase',
                  letterSpacing:'.22em', color:'var(--text-3)' }
        }, [
          document.createTextNode('You said:'),
          el('span', { style:{ marginLeft:'8px', color:'var(--text-2)', textTransform:'none', letterSpacing:'0', fontSize:'12px', fontStyle:'italic', fontFamily:'var(--f-body)' }, text: '"' + interp.raw + '"' })
        ])
      ]));
    }
    pushInterpretation('The brand object',     interpretBrandObject(a.swobj));
    pushInterpretation('The brand moment',     interpretBrandMoment(a.swmoment));
    pushInterpretation('Dominant colour emotion', interpretDominantColor(a.cstorydom));
    pushInterpretation('Forbidden colour',     interpretForbiddenColor(a.cstorynever));
    pushInterpretation('The speaking voice',   interpretSpeakingVoice(a.tvoice));
    pushInterpretation('The anti-voice',       interpretAntiVoice(a.vbvoicefail));
    pushInterpretation('Sound signature',      interpretSoundSignature(a.sdsignature));
    pushInterpretation('Signature gesture',    interpretGesture(a.rtsignaturerit));

    var secSensory = sensoryCards.length ? el('section', { class:'cdx-section' }, [
      sectionHeader('10.', 'The Sensory World', 'FELT BEFORE UNDERSTOOD'),
      el('div', { class:'cdx-sensory' }, sensoryCards)
    ]) : null;

    var secParadox = paradoxes.length ? el('section', { class:'cdx-section cdx-paradoxes' }, [
      sectionHeader('11.', 'Paradoxes as Signature', 'CONTRADICTIONS AS SIGNATURE'),
      el('div', { class:'paradox-grid' },
        paradoxes.map(function(p){
          return el('div', { class:'glass-card paradox-card' }, [
            el('h3', { text:p.title }),
            el('p',  { text:p.desc })
          ]);
        })
      )
    ]) : null;

    // ---- 12 Competitive map (Claude) ----
    var secCompMap = hasClaude('competitiveMap') ? (function(){
      var cm = claudeOut.competitiveMap;
      var comp = Array.isArray(cm.competitors) ? cm.competitors : [];
      var brandPos = Array.isArray(cm.brandPosition) ? cm.brandPosition : [50,50];
      return el('section', { class:'cdx-section' }, [
        sectionHeader('12.', 'The Competitive Map', 'WHERE YOU SIT · TWO AXES'),
        el('div', { class:'glass-card cdx-compmap' }, [
          (function(){
            var canvas = el('div', { class:'cdx-compmap-canvas' });
            canvas.appendChild(el('span', { class:'cdx-compmap-axis top',    text: (cm.yAxisLabel || '').split('←')[0].trim() }));
            canvas.appendChild(el('span', { class:'cdx-compmap-axis bottom', text: (cm.yAxisLabel || '').split('→').pop().trim() }));
            canvas.appendChild(el('span', { class:'cdx-compmap-axis left',   text: (cm.xAxisLabel || '').split('←')[0].trim() }));
            canvas.appendChild(el('span', { class:'cdx-compmap-axis right',  text: (cm.xAxisLabel || '').split('→').pop().trim() }));
            comp.forEach(function(c){
              var point = el('div', { class:'cdx-compmap-point' }, [
                el('span', { class:'dot' }),
                el('span', { class:'name', text:c.name })
              ]);
              point.style.left = Math.min(96, Math.max(4, Number(c.x) || 50)) + '%';
              point.style.top  = Math.min(96, Math.max(4, 100 - (Number(c.y) || 50))) + '%';
              canvas.appendChild(point);
            });
            var mine = el('div', { class:'cdx-compmap-point mine' }, [
              el('span', { class:'dot' }),
              el('span', { class:'name', text: (lead.company || lead.name || 'YOU') })
            ]);
            mine.style.left = Math.min(96, Math.max(4, Number(brandPos[0]) || 50)) + '%';
            mine.style.top  = Math.min(96, Math.max(4, 100 - (Number(brandPos[1]) || 50))) + '%';
            canvas.appendChild(mine);
            return canvas;
          })(),
          el('div', { class:'cdx-compmap-note' }, [
            el('div', { class:'label', text:'Two axes' }),
            el('p', { class:'cdx-body', text: cm.xAxisLabel || '' }),
            el('p', { class:'cdx-body', text: cm.yAxisLabel || '' }),
            el('div', { class:'label', style:{ marginTop:'12px' }, text:'Your coordinates' }),
            el('p', { class:'cdx-body', text:'You sit at roughly (' + Math.round(brandPos[0]) + ', ' + Math.round(brandPos[1]) + '). The named competitors above are plotted honestly — steal where there is open territory, stay distinct where there is density.' })
          ])
        ])
      ]);
    })() : null;

    // ---- 13 First Campaign (Claude) ----
    var secCampaign = hasClaude('firstCampaign') ? (function(){
      var c = claudeOut.firstCampaign;
      return el('section', { class:'cdx-section' }, [
        sectionHeader('13.', 'The First Campaign', 'FOUR-SCENE LAUNCH BRIEF'),
        el('div', { class:'glass-card cdx-campaign' }, [
          el('h3', { text: c.title || 'Untitled Campaign' }),
          c.premise ? el('p', { class:'cdx-body', style:{ fontStyle:'italic' }, text: c.premise }) : null,
          el('div', { class:'cdx-campaign-scenes' },
            (Array.isArray(c.scenes) ? c.scenes : []).slice(0, 4).map(function(s, i){
              return el('div', { class:'cdx-campaign-scene' }, [
                el('div', { class:'scene-num', text: 'Scene 0' + (i + 1) }),
                el('div', { class:'scene-title', text: s.title || '' }),
                el('div', { class:'scene-copy',  text: s.copy  || '' }),
                s.visualDirection ? el('div', { class:'scene-visual', text: 'Visual: ' + s.visualDirection }) : null
              ]);
            })
          )
        ])
      ]);
    })() : null;

    // ---- 14 30-day sprint (Claude) ----
    var secSprint = hasClaude('sprint30') ? el('section', { class:'cdx-section' }, [
      sectionHeader('14.', '30-Day Implementation Sprint', 'THIS BUILDS THE BRAND'),
      el('div', { class:'cdx-sprint' },
        (Array.isArray(claudeOut.sprint30) ? claudeOut.sprint30 : []).map(function(w){
          return el('div', { class:'glass-card cdx-sprint-week' }, [
            el('div', { class:'week',  text: w.week  || '' }),
            el('div', { class:'focus', text: w.focus || '' }),
            el('ul', {},
              (Array.isArray(w.tasks) ? w.tasks : []).map(function(t){
                return el('li', { text: t });
              })
            )
          ]);
        })
      )
    ]) : null;

    // If Claude is missing entirely, fall back to First-Moves derived section
    var secMoves = !claudeOut ? el('section', { class:'cdx-section' }, [
      sectionHeader('15.', 'Your First Three Moves', 'DO THIS WEEK'),
      el('div', { class:'cdx-moves' },
        moves.map(function(m, i){
          return el('div', { class:'glass-card cdx-move-card' }, [
            el('span', { class:'num', text:('0' + (i+1)).slice(-2) }),
            el('span', { class:'tag', text: m.tag }),
            el('h3',   { text: m.title }),
            el('p',    { text: m.body })
          ]);
        })
      )
    ]) : null;

    // ---- Toolbar (reading switcher + regenerate + PDF export) ----
    var toolbar = el('div', { class:'cdx-toolbar' }, [
      state.readings.length > 1
        ? el('div', { class:'readings' },
            state.readings.map(function(r){
              return el('button', {
                class:'reading-pill' + (r.id === state.activeReading ? ' active' : ''),
                type:'button',
                onclick:function(){ state.activeReading = r.id; render(); }
              }, 'Reading ' + r.id);
            })
          )
        : el('div', { style:{ display:'flex', alignItems:'center', gap:'10px', fontFamily:'var(--f-mono)', fontSize:'10px', textTransform:'uppercase', letterSpacing:'.28em', color:'var(--text-3)' } }, [
            el('span', { class:'pulse-dot' }),
            document.createTextNode(claudeOut ? 'Reading ' + reading.id + ' · AI-synthesised' : 'Reading ' + reading.id + ' · Derived only')
          ]),
      el('div', { class:'right' }, [
        state.canRegenerate ? el('button', {
          class:'btn btn-sm', type:'button',
          onclick:function(){
            document.getElementById('regen-modal').classList.add('open');
          }
        }, 'Generate second reading') : null,
        el('button', { class:'btn btn-sm', type:'button', onclick:function(){
          try { window.print(); } catch(e){}
        } }, 'Export as PDF'),
        el('button', { class:'btn btn-primary btn-sm', type:'button', onclick:function(){
          // Full reset — back to intro, clear readings
          state.readings = [];
          state.canRegenerate = true;
          saveReadings(state.readings);
          state.chapterIndex = 0;
          setPhase('intro');
        } }, 'New scan')
      ])
    ]);

    // ---- Regeneration confirm modal ----
    var regenModal = el('div', { class:'regen-modal', id:'regen-modal' }, [
      el('div', { class:'regen-modal-card' }, [
        el('h3', { text:'Generate a second reading?' }),
        el('p',  { text:'The AI will synthesise your answers a second time. Both readings will be saved — you can toggle between them at the top of the Codex and export either as a PDF. This is the last regeneration available for this session (two readings maximum).' }),
        el('p',  { text:'Generation takes 20–40 seconds. Please keep this tab open.' }),
        el('div', { class:'regen-modal-actions' }, [
          el('button', { class:'btn btn-primary btn-sm', type:'button',
            onclick:function(){
              document.getElementById('regen-modal').classList.remove('open');
              triggerCodexGeneration({ regenerating:true });
            }
          }, 'Yes, generate a second reading'),
          el('button', { class:'btn btn-sm', type:'button',
            onclick:function(){ document.getElementById('regen-modal').classList.remove('open'); }
          }, 'Cancel')
        ])
      ])
    ]);

    return el('section', { class:'codex-shell' }, [
      el('div', { class:'codex-wrap animate-up' }, [
        el('header', { class:'codex-head' }, [
          el('div', { class:'topline' }, [
            el('span', { class:'pulse-dot' }),
            document.createTextNode(claudeOut ? 'Diagnostic complete · Codex generated by AI' : 'Diagnostic complete · Derived Codex')
          ]),
          el('h1', { text:'The Codex.' }),
          clientLine ? el('div', { class:'client', text: clientLine }) : null
        ]),
        toolbar,
        secBrandCard,
        secEssence,
        secPositioning,
        secManifesto,
        secNarrative,
        secPalette,
        secType,
        secShape,
        secMotion,
        secVoice,
        secSensory,
        secParadox,
        secCompMap,
        secCampaign,
        secSprint,
        secMoves,
        el('div', { class:'cdx-end' }, [
          el('div', { class:'label', text:'Sensescape · QB BrandOS' }),
          el('div', { class:'stamp', text:'Reading ' + reading.id + ' · Generated ' + (reading.createdAt || '').split('T')[0] })
        ]),
        regenModal
      ])
    ]);
  };

  function escapeHTML(s){
    return String(s || '').replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  /* ========================================================================
     PERSISTENCE
     ======================================================================== */
  function saveToQBP(){
    try {
      var existing = {};
      try { Object.assign(existing, JSON.parse(localStorage.getItem('qb_qbp') || '{}')); } catch(e){}
      var a = state.answers;
      var photo = a.vphotoill ?? 5;
      var contrast = a.vcontgrad ?? 5;
      var time = a.vfutnost ?? 5;
      var parts = [];
      if      (photo < 4) parts.push('Photography-led');
      else if (photo > 6) parts.push('Illustration-led');
      else                parts.push('Mixed photography & illustration');
      if      (contrast < 4) parts.push('high contrast');
      else if (contrast > 6) parts.push('soft gradients');
      if      (time < 4) parts.push('futuristic visual language');
      else if (time > 6) parts.push('nostalgic visual language');

      var updated = Object.assign({}, existing, {
        colorTerritory:        a.cstorydom     || '',
        typographyNote:        a.tvoice        || '',
        brandObject:           a.swobj         || '',
        brandMoment:           a.swmoment      || '',
        forbiddenColor:        a.cstorynever   || '',
        antiVoice:             a.vbvoicefail   || '',
        soundSignature:        a.sdsignature   || '',
        signatureGesture:      a.rtsignaturerit|| '',
        visualTerritoryNote:   parts.join(', '),
        sensescapeRawAnswers:  a,
        sensescapeCompletedAt: new Date().toISOString()
      });
      localStorage.setItem('qb_qbp', JSON.stringify(updated));
      try {
        window.dispatchEvent(new StorageEvent('storage', {
          key:'qb_qbp', newValue:JSON.stringify(updated), storageArea:localStorage
        }));
      } catch(e){}
    } catch(err){ console.warn('Sensescape qb_qbp save failed:', err); }
  }

  /* ========================================================================
     BOOT
     ======================================================================== */
  // Listen for theme changes from nav, re-render if needed (preview bg colors)
  window.addEventListener('qb-theme-change', function(){
    if (state.phase === 'chapter') render();
  });

  // Restore prior readings if any. If a full reading exists, land the user on Codex.
  var persisted = loadReadings();
  if (persisted.length){
    state.readings = persisted;
    state.activeReading = persisted[0].id;
    state.canRegenerate = persisted.length < 2;
    var latest = persisted[persisted.length - 1];
    if (latest.leadData)   state.leadData = Object.assign({}, latest.leadData);
    if (latest.rawAnswers) state.answers  = Object.assign({}, state.answers, latest.rawAnswers);
    state.phase = 'codex';
  }

  updateImmersive();
  render();

})();
</script>
