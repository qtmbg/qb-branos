<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB BrandOS — Sensescape</title>
<meta name="description" content="Sensescape · QB BrandOS Phase 01 — before a brand speaks, it is felt.">
<script>(function(){try{var legacy=localStorage.getItem('qb_theme');if(legacy){localStorage.setItem('qb-theme',legacy);localStorage.removeItem('qb_theme');}var t=localStorage.getItem('qb-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cormorant+Garamond:ital,wght@0,500;1,500&family=DM+Sans:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Figtree:wght@300..900&family=JetBrains+Mono:wght@400;500;700&family=Lora:wght@500&family=Playfair+Display:ital,wght@0,600;1,600&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box }
:root{
  --cream:          #F4F0EB;
  --cream-soft:     #EDE8E2;
  --cream-deep:     #E6E0D8;
  --cream-edge:     rgba(100,80,50,0.10);
  --cream-line:     rgba(100,80,50,0.14);
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(100,80,50,0.04);
  --bg-elevated:    rgba(100,80,50,0.07);
  --bg-overlay:     rgba(244,240,235,0.9);
  --border-subtle:  rgba(100,80,50,0.08);
  --border-medium:  rgba(100,80,50,0.14);
  --border-strong:  rgba(100,80,50,0.22);
  --ink:            #1A1610;
  --ink-soft:       #5A5040;
  --ink-mute:       #8A7E70;
  --ink-faint:      #B8AEA0;
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina:         #3A5F4A;
  --patina-lit:     #4A7A5E;
  --patina-dim:     rgba(58,95,74,0.15);
  --patina-faint:   rgba(58,95,74,0.06);
  --patina-deep:    #0E1C17;
  --brass:          #A8903E;
  --brass-lit:      #C4A84E;
  --brass-dim:      rgba(168,144,62,0.15);
  --brass-faint:    rgba(168,144,62,0.06);
  --terra:          #C4654A;
  --terra-lit:      #D4785E;
  --plum:           #7A5A6E;
  --plum-lit:       #9A7A8E;
  --warmred:        #8A4A4A;
  --pill-bg:        #F3E9C9;
  --pill-bg-hover:  #EFE1B4;
  --pill-border:    #A8903E;
  --pill-ink:       #1A1610;
  --f-display:      'EB Garamond','Cormorant Garamond',Georgia,serif;
  --f-body:         'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --f-mono:         'JetBrains Mono',ui-monospace,monospace;
  --ease:           cubic-bezier(.22,1,.36,1);
  --r-pill:         999px;
  --r-card:         24px;
  --r-card-lg:      36px;
  --nav-h:          74px;
  --container:      1200px;
}
[data-theme="dark"]{
  --cream:          #080604;
  --cream-soft:     #0A0806;
  --cream-deep:     #12100C;
  --cream-edge:     rgba(140,110,70,0.06);
  --cream-line:     rgba(140,110,70,0.11);
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(140,110,70,0.045);
  --bg-elevated:    rgba(140,110,70,0.07);
  --bg-overlay:     rgba(18,15,10,0.85);
  --border-subtle:  rgba(140,110,70,0.06);
  --border-medium:  rgba(140,110,70,0.11);
  --border-strong:  rgba(140,110,70,0.18);
  --ink:            #EEE5D2;
  --ink-soft:       #A8A092;
  --ink-mute:       #6F6A5E;
  --ink-faint:      #3E3830;
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina-dim:     rgba(58,95,74,0.2);
  --patina-faint:   rgba(58,95,74,0.08);
  --brass-dim:      rgba(168,144,62,0.18);
  --warmred:        #B06767;
  --pill-bg:        #2A2318;
  --pill-bg-hover:  #3A2E1F;
  --pill-border:    #A8903E;
  --pill-ink:       #EEE5D2;
}
html{ -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; scroll-behavior:smooth; background:var(--bg-void); }
body{
  font-family:var(--f-body); font-weight:400;
  background:var(--bg-void); color:var(--text-2);
  min-height:100vh; position:relative; overflow-x:hidden;
  transition:background .7s ease, color .3s ease;
}
body::after{
  content:''; position:fixed; inset:0; z-index:9999;
  pointer-events:none; opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
[data-theme="dark"] body::after{ opacity:.05; }
a{ color:inherit; text-decoration:none; }
img{ display:block; max-width:100%; }
button{ font-family:inherit; }

/* ================== AMBIENT ================== */
.ambient-glow{
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:radial-gradient(circle at 50% 0%, var(--brass-faint) 0%, transparent 70%);
}
.main-vignette{
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:radial-gradient(circle at center, transparent 0%, rgba(200,190,175,0.08) 100%);
}
[data-theme="dark"] .main-vignette{
  background:radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.35) 100%);
}

/* ================== BUTTONS (ecosystem parity) ================== */
.btn{
  display:inline-flex; align-items:center; justify-content:center;
  gap:.55em;
  font-family:var(--f-body); font-weight:500; font-size:.94rem;
  padding:14px 24px;
  border-radius:var(--r-pill);
  border:1px solid var(--ink);
  background:transparent; color:var(--ink);
  transition:all .25s var(--ease);
  white-space:nowrap; text-decoration:none !important;
  cursor:pointer;
}
.btn:hover{ background:var(--ink); color:var(--cream); }
@property --eco-angle{ syntax:'<angle>'; initial-value:0deg; inherits:false; }
.btn-primary{
  background:var(--pill-bg) !important;
  border-color:var(--pill-border) !important;
  color:var(--pill-ink) !important;
  position:relative; isolation:isolate;
  font-family:var(--f-body); font-weight:500;
}
.btn-primary::before{
  content:''; position:absolute; inset:-3px;
  background:conic-gradient(from var(--eco-angle), var(--patina), var(--brass), var(--terra), var(--plum), var(--patina));
  border-radius:999px; z-index:-1; opacity:0;
  transition:opacity .4s ease;
  animation:ecoSpin 6s linear infinite;
  filter:blur(10px);
}
@keyframes ecoSpin{ to{ --eco-angle:360deg; } }
.btn-primary:hover::before{ opacity:.75; }
.btn-primary:hover{
  background:var(--pill-bg-hover) !important;
  border-color:var(--pill-ink) !important;
  transform:translateY(-1px);
  box-shadow:0 14px 40px -12px rgba(168,144,62,.35) !important;
}
.btn-primary:disabled{ opacity:.45; cursor:not-allowed; transform:none; }
.btn-primary:disabled::before{ display:none; }
.btn-ghost{ border-color:transparent; }
.btn-ghost:hover{ background:transparent; color:var(--ink); text-decoration:underline; text-underline-offset:4px; }
.btn-sm{ padding:10px 18px; font-size:.85rem; }
.btn-lg{ padding:17px 30px; font-size:1rem; }
.icon-btn{
  width:36px; height:36px; border-radius:50%;
  border:1px solid var(--cream-line);
  background:transparent; color:var(--ink-mute);
  display:inline-flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s var(--ease);
  padding:0;
}
.icon-btn:hover{ color:var(--brass); border-color:var(--brass); background:var(--brass-faint); }
.icon-btn:disabled{ opacity:.3; cursor:not-allowed; }

/* ================== NAV (pill, ecosystem parity) ================== */
.nav-spacer{ height:28px; width:100%; flex-shrink:0; }
.nav{
  position:sticky; top:18px; z-index:50;
  padding:0 20px; width:100%;
}
.nav-inner{
  max-width:1160px; margin-inline:auto;
  background:var(--cream);
  border:1px solid var(--cream-line);
  border-radius:var(--r-pill);
  padding:8px 10px 8px 24px;
  display:flex; align-items:center; justify-content:space-between;
  gap:20px;
  box-shadow:0 6px 30px -18px rgba(26,22,16,.18);
  transition:background .4s ease, border-color .3s ease, box-shadow .3s ease;
}
.nav-brand{
  display:flex; align-items:center; gap:10px;
  font-family:var(--f-display); font-size:1.25rem;
  color:var(--ink); font-weight:500; padding:6px 0;
}
.nav-brand .dot{
  width:10px; height:10px; border-radius:50%;
  background:var(--brass);
  box-shadow:0 0 0 3px var(--brass-faint);
  animation:pulseDot 3s var(--ease) infinite;
}
@keyframes pulseDot{
  0%,100%{ transform:scale(1); box-shadow:0 0 0 3px var(--brass-faint); }
  50%{ transform:scale(1.15); box-shadow:0 0 0 5px rgba(168,144,62,.05); }
}
.nav-links{ display:flex; align-items:center; gap:4px; list-style:none; }
.nav-links a{
  padding:10px 16px; border-radius:var(--r-pill);
  font-size:.92rem; font-weight:500;
  color:var(--ink-soft);
  transition:all .2s var(--ease);
}
.nav-links a:hover{ background:var(--cream-deep); color:var(--ink); }
.nav-actions{ display:flex; align-items:center; gap:6px; }
.theme-toggle{
  width:36px; height:36px; border-radius:50%;
  border:1px solid var(--cream-line);
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; color:var(--ink-mute);
  cursor:pointer; background:transparent; flex-shrink:0;
  transition:all .25s var(--ease);
}
.theme-toggle:hover{ border-color:var(--brass); color:var(--brass); background:var(--brass-faint); }
.hamburger{
  display:none; width:42px; height:42px;
  border-radius:var(--r-pill);
  border:1px solid var(--cream-line);
  background:transparent; cursor:pointer;
  flex-direction:column; align-items:center; justify-content:center; gap:4px;
}
.hamburger span{ display:block; width:18px; height:1.5px; background:var(--ink); transition:.25s; }
.hamburger.open span:nth-child(1){ transform:translateY(5.5px) rotate(45deg); }
.hamburger.open span:nth-child(2){ opacity:0; }
.hamburger.open span:nth-child(3){ transform:translateY(-5.5px) rotate(-45deg); }
@media(max-width:960px){
  .nav-links, .nav .btn-ghost{ display:none; }
  .hamburger{ display:flex; }
  .nav-brand{ font-size:1.1rem; }
  .nav-inner{ padding:8px 8px 8px 20px; }
}
.mmenu{
  position:fixed; inset:0; z-index:100;
  background:var(--cream);
  display:none; flex-direction:column;
  padding:28px;
}
.mmenu.open{ display:flex; }
.mmenu-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
.mmenu-close{
  width:42px; height:42px; border-radius:50%;
  border:1px solid var(--cream-line);
  background:transparent; font-size:1.2rem; color:var(--ink); cursor:pointer;
}
.mmenu-list{ display:flex; flex-direction:column; gap:6px; }
.mmenu-list a{
  font-family:var(--f-display); font-size:2rem;
  padding:10px 0; color:var(--ink);
  border-bottom:1px solid var(--cream-line);
}
.mmenu-foot{ margin-top:auto; padding-top:28px; }

/* Dark mode nav overrides */
[data-theme="dark"] .nav-inner{
  background:rgba(18,15,10,.85);
  border-color:rgba(140,110,70,.15);
  backdrop-filter:blur(14px);
}
[data-theme="dark"] .nav-links a{ color:var(--ink-mute); }
[data-theme="dark"] .nav-links a:hover{ background:rgba(140,110,70,.08); color:var(--ink); }
[data-theme="dark"] .btn{ border-color:rgba(140,110,70,.2); color:var(--ink); }
[data-theme="dark"] .btn:hover{ background:var(--ink); color:var(--cream); }
[data-theme="dark"] .btn-ghost{ color:var(--ink-soft); }

/* Hide ecosystem nav during chapter/lead-form view (use internal chapter bar) */
body.immersive .nav-spacer,
body.immersive .nav,
body.immersive .mmenu{ display:none !important; }

/* ================== TYPE PRIMITIVES ================== */
.mono{ font-family:var(--f-mono); }
.serif{ font-family:var(--f-display); }
.label{
  font-family:var(--f-mono); font-size:10px; font-weight:500;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
}
.display{
  font-family:var(--f-display); font-weight:500;
  letter-spacing:-.015em; line-height:1.05;
  color:var(--text-1);
}

/* ================== SHARED ================== */
.pulse-dot{
  width:8px; height:8px; border-radius:50%;
  background:var(--brass);
  box-shadow:0 0 0 3px var(--brass-faint);
  animation:beat 3s var(--ease) infinite;
  display:inline-block;
}
@keyframes beat{
  0%,100%{ opacity:1; transform:scale(1); box-shadow:0 0 0 3px var(--brass-faint); }
  50%{ opacity:.6; transform:scale(1.15); box-shadow:0 0 0 5px rgba(168,144,62,.05); }
}
.glass-card{
  background:var(--bg-overlay);
  -webkit-backdrop-filter:blur(30px);
  backdrop-filter:blur(30px);
  border:1px solid var(--border-medium);
  border-radius:18px;
  position:relative; overflow:hidden;
}
.manifesto-block{
  position:relative; padding-left:28px;
}
.manifesto-block::before{
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:2px; background:var(--brass); border-radius:4px;
}
@keyframes fadeInUp{ from{ opacity:0; transform:translateY(30px); } to{ opacity:1; transform:translateY(0); } }
@keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
.animate-up{ animation:fadeInUp 1.1s var(--ease) forwards; opacity:0; }
.animate-in{ animation:fadeIn 1.4s ease forwards; }

/* ================== INTRO PHASE ================== */
.intro-shell{
  position:relative; z-index:3;
  height:calc(100vh - 110px);
  min-height:620px;
  padding:clamp(24px, 4vh, 60px) 24px clamp(24px, 4vh, 48px);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.intro-wrap{
  max-width:1160px; width:100%;
  display:flex; flex-direction:column;
  justify-content:space-between;
  height:100%;
  gap:clamp(20px, 3vh, 40px);
}
.intro-hero{ display:flex; flex-direction:column; gap:clamp(16px, 2vh, 28px); }
.intro-eyebrow{
  display:inline-flex; align-items:center; gap:14px;
}
.intro-eyebrow .label{ letter-spacing:.32em; }
.intro-hero h1{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(3rem,9vw,6rem);
  letter-spacing:-.025em; line-height:.95;
  color:var(--text-1);
}
.intro-lede{
  font-family:var(--f-display); font-style:italic; font-weight:400;
  font-size:clamp(1.1rem,2.2vw,1.55rem);
  line-height:1.5; color:var(--text-2);
  max-width:640px;
}
.intro-protocols{
  display:grid; grid-template-columns:1fr; gap:28px;
  padding-top:clamp(20px, 3vh, 40px); margin-top:clamp(16px, 2vh, 28px);
  border-top:1px solid var(--border-medium);
}
@media(min-width:760px){ .intro-protocols{ grid-template-columns:repeat(3,1fr); gap:40px; } }
.intro-protocol{
  transition:padding-left .4s ease;
  display:flex; flex-direction:column; gap:10px;
}
.intro-protocol:hover{ padding-left:8px; }
.intro-protocol .p-num{ letter-spacing:.3em; }
.intro-protocol h3{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.15rem, 1.6vw, 1.35rem);
  color:var(--text-1);
  line-height:1.2;
  letter-spacing:-.01em;
  transition:color .3s ease;
}
.intro-protocol:hover h3{ color:var(--brass); }
.intro-protocol p{
  font-family:var(--f-body); font-size:13.5px; line-height:1.55;
  color:var(--text-2); opacity:.85;
}
.intro-cta{ padding-top:clamp(12px, 1.5vh, 20px); }

/* Hide micro-footer when we're on the single-viewport intro */
body.phase-intro .micro-foot{ display:none; }
body.phase-intro{ overflow:hidden; }

/* ================== CHAPTER VIEW ================== */
.chapter-nav{
  position:sticky; top:0; z-index:50;
  background:var(--bg-overlay);
  -webkit-backdrop-filter:blur(28px);
  backdrop-filter:blur(28px);
  border-bottom:1px solid var(--border-medium);
  padding:18px 32px;
  display:flex; align-items:center; justify-content:space-between; gap:24px;
  transition:background .4s ease;
}
.chap-pill{
  display:inline-flex; align-items:center; gap:12px;
  padding:9px 20px;
  border-radius:999px;
  border:1px solid var(--border-medium);
  background:var(--bg-surface);
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--text-1);
}
.chap-pill .ch-prefix{ color:var(--patina); font-weight:600; }
.chap-nav-meta{ display:flex; align-items:center; gap:28px; }
.chap-crumbs{ display:none; }
@media(min-width:760px){ .chap-crumbs{ display:block; } }
.chap-crumbs .title{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.24em;
  color:var(--text-3); margin-bottom:10px;
}
.chap-crumbs .dots{ display:flex; gap:8px; }
.chap-crumbs .dot{
  width:28px; height:2px; border-radius:2px;
  background:var(--border-strong);
  transition:background .6s ease;
}
.chap-crumbs .dot.active{ background:var(--brass); }
.chap-actions{ display:flex; align-items:center; gap:14px; }
.chap-nav-sep{
  width:1px; height:24px; background:var(--border-medium);
  margin:0 6px;
}

.chapter-main{
  max-width:1180px; margin:0 auto;
  padding:120px 24px 220px;
  position:relative; z-index:3;
}
.chapter-header{
  text-align:center; max-width:820px; margin:0 auto 180px;
  display:flex; flex-direction:column; gap:28px;
}
.chapter-header .label{ margin-bottom:4px; letter-spacing:.32em; }
.chapter-header h1{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(3.5rem,9vw,7rem);
  letter-spacing:-.025em; line-height:1;
  color:var(--text-1);
}
.chapter-header .sub{
  font-family:var(--f-display); font-style:italic; font-weight:400;
  font-size:clamp(1.1rem,2.2vw,1.6rem);
  line-height:1.55; color:var(--text-2);
  max-width:640px; margin:0 auto;
}
.chapter-header::after{
  content:''; display:block;
  width:1px; height:56px;
  background:var(--brass-dim);
  margin:32px auto 0;
}
.question-list{ display:flex; flex-direction:column; gap:200px; }
/* Jump-line between questions on wide screens */
.question-list > *:not(:last-child)::after{
  content:''; display:block;
  width:60%; max-width:320px;
  height:1px; background:var(--border-subtle);
  margin:100px auto 0;
}

/* --- SLIDER QUESTION --- */
.q-slider{
  display:grid; grid-template-columns:1fr; gap:56px;
  align-items:stretch;
}
@media(min-width:960px){
  .q-slider{ grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:96px; }
}
.q-slider-side{ display:flex; flex-direction:column; gap:40px; padding:12px 0; }
.q-slider-head{
  display:flex; justify-content:space-between; align-items:flex-end;
  gap:24px;
  padding-bottom:36px;
  border-bottom:1px solid var(--border-medium);
}
.q-spectrum-pill{
  display:inline-block;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.3em;
  color:var(--text-3);
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  padding:7px 14px;
  border-radius:6px;
  margin-bottom:20px;
}
.q-title{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(2rem,5vw,3.2rem);
  color:var(--text-1); line-height:1.04;
  letter-spacing:-.015em;
}
.q-title .vs{
  font-family:var(--f-display); font-style:italic; font-weight:400;
  font-size:.6em;
  color:var(--text-3);
  margin:0 14px;
  display:inline-block; transform:translateY(-4px);
}
.q-score{ text-align:right; flex-shrink:0; }
.q-score .active-label{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.32em;
  color:var(--text-3);
  margin-bottom:10px;
}
.q-score .value{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(3rem,6vw,4.5rem);
  color:var(--brass); line-height:.9;
  letter-spacing:-.02em;
}

/* Slider track + thumb */
.q-range{
  position:relative;
  padding:24px 0;
}
.q-range-track{
  position:relative;
  height:2px; border-radius:2px;
  background:var(--border-strong);
  overflow:hidden;
}
.q-range-fill{
  position:absolute; left:0; top:0; bottom:0;
  background:linear-gradient(to right, var(--brass), var(--patina));
  border-radius:2px;
  transition:width .3s ease;
}
.q-range-ticks{
  position:absolute; inset:0;
  pointer-events:none;
}
.q-range-ticks span{
  position:absolute; top:-4px; width:1px; height:10px;
  background:var(--border-medium);
}
.q-range-ticks span:nth-child(1){ left:25%; }
.q-range-ticks span:nth-child(2){ left:50%; height:14px; top:-6px; background:var(--border-strong); }
.q-range-ticks span:nth-child(3){ left:75%; }
.q-range-thumb{
  position:absolute; top:50%; width:16px; height:16px;
  background:var(--brass);
  border:2px solid var(--bg-void);
  border-radius:50%;
  transform:translate(-50%, -50%);
  box-shadow:0 0 0 1px var(--brass-dim), 0 6px 18px -6px rgba(168,144,62,.5);
  pointer-events:none;
  transition:left .12s ease-out, transform .2s ease;
}
.q-range:hover .q-range-thumb{ transform:translate(-50%, -50%) scale(1.15); }
.q-range input[type="range"]{
  position:absolute; inset:0;
  width:100%; height:100%;
  opacity:0; cursor:pointer; z-index:5; margin:0;
}
.q-extremes{
  display:grid; grid-template-columns:1fr 1fr; gap:0;
  margin-top:16px;
}
.q-extreme{
  display:flex; flex-direction:column; justify-content:space-between;
  padding:0 22px;
  border-right:1px solid var(--border-subtle);
}
.q-extreme:last-child{ border-right:none; padding-left:22px; padding-right:0; text-align:right; }
.q-extreme p{
  font-family:var(--f-body); font-size:15px; line-height:1.7;
  color:var(--text-2); margin-bottom:20px;
}
.q-anchor{
  display:inline-flex; align-items:center; gap:10px;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.2em;
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  padding:8px 14px;
  border-radius:8px;
  width:fit-content;
  align-self:flex-start;
}
.q-extreme:last-child .q-anchor{ align-self:flex-end; }
.q-anchor .ref{ color:var(--text-3); }
.q-anchor .name{ color:var(--text-1); font-weight:700; }

/* Preview panel */
.q-preview{
  min-height:400px;
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--border-medium);
  background:var(--bg-surface);
  -webkit-backdrop-filter:blur(24px);
  backdrop-filter:blur(24px);
  position:relative;
  transition:all .6s ease;
  display:flex; align-items:center; justify-content:center;
}
.q-preview-label{
  position:absolute; top:16px; left:16px;
  display:inline-flex; align-items:center; gap:10px;
  padding:6px 14px;
  border-radius:999px;
  border:1px solid var(--border-subtle);
  background:var(--bg-overlay);
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.2em;
  color:var(--text-2);
  opacity:0; transition:opacity .4s ease;
}
.q-preview:hover .q-preview-label{ opacity:1; }
.q-preview .viz-meta{
  position:absolute; bottom:16px;
  font-family:var(--f-mono); font-size:10px;
  color:var(--text-3);
  text-transform:uppercase; letter-spacing:.3em;
}

/* --- TEXT QUESTION --- */
.q-text{
  padding:56px 40px;
  position:relative;
}
@media(min-width:960px){ .q-text{ padding:88px 80px; } }
.q-text .q-kind{
  display:inline-flex; align-items:center; gap:14px;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.32em;
  color:var(--brass);
  margin-bottom:48px;
}
.q-text .q-kind .sq{ width:10px; height:10px; border:1.5px solid var(--brass); display:inline-block; }
/* "Q N of M" indicator — appears top-right of every question */
.q-counter{
  position:absolute; top:18px; right:22px;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--text-3);
  padding:6px 12px;
  border:1px solid var(--border-subtle);
  border-radius:999px;
  background:var(--bg-surface);
}
/* "More below" hint when more questions follow */
.q-more-below{
  display:flex; flex-direction:column; align-items:center; gap:10px;
  margin:32px 0 0;
  padding-top:20px;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--brass);
  opacity:.65;
}
.q-more-below::after{
  content:'';
  width:1px; height:40px;
  background:linear-gradient(to bottom, var(--brass), transparent);
}
/* Tighten the gap between consecutive text questions (they are heavy already) */
.question-list .qwrap-text + .qwrap-text{
  margin-top:-90px;     /* absorbs part of the 200px gap between questions */
}
.question-list .qwrap-text + .qwrap-text::after{ display:none !important; }
/* Highlight an unanswered question that the user just tried to skip */
.q-text.unanswered{
  outline:2px solid var(--terra);
  outline-offset:6px;
}
.q-text label{
  display:block;
  font-family:var(--f-display); font-weight:500; font-style:italic;
  font-size:clamp(1.75rem,3.6vw,2.75rem);
  line-height:1.3; letter-spacing:-.01em;
  color:var(--text-1);
  margin-bottom:56px;
}
.q-text textarea{
  width:100%;
  background:transparent;
  border:none; border-bottom:1px solid var(--border-medium);
  padding:20px 0;
  font-family:var(--f-body); font-weight:400;
  font-size:clamp(1.1rem,2vw,1.5rem);
  line-height:1.45;
  color:var(--text-1);
  resize:none; outline:none;
  transition:border-color .3s ease;
}
.q-text textarea:focus{ border-bottom-color:var(--brass); }
.q-text textarea::placeholder{ color:var(--text-4); font-style:italic; opacity:.6; }

/* Validation toast */
.toast{
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%); z-index:60;
  display:inline-flex; align-items:center; gap:10px;
  padding:10px 20px;
  border-radius:999px;
  background:var(--bg-overlay);
  border:1px solid var(--border-medium);
  -webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.18em;
  color:var(--text-2);
  box-shadow:0 12px 36px -12px rgba(26,22,16,.3);
}
.toast svg{ color:var(--brass); }

/* ================== LEAD FORM ================== */
.lead-shell{
  position:relative; z-index:3;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:60px 24px;
}
.lead-form{
  padding:56px; width:100%; max-width:640px;
  display:flex; flex-direction:column; gap:36px;
}
.lead-form h1{
  text-align:center;
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(2.25rem,5vw,3rem);
  color:var(--text-1);
}
.lead-form .fields{ display:flex; flex-direction:column; gap:24px; }
.lead-form input{
  width:100%;
  background:transparent;
  border:none; border-bottom:1px solid var(--border-medium);
  padding:14px 0;
  font-family:var(--f-body); font-size:1.3rem;
  color:var(--text-1);
  outline:none;
  transition:border-color .3s ease;
}
.lead-form input:focus{ border-bottom-color:var(--patina); }
.lead-form input::placeholder{ color:var(--text-4); }
.lead-err{
  display:flex; align-items:center; gap:10px;
  font-family:var(--f-mono); font-size:11px;
  text-transform:uppercase; letter-spacing:.15em;
  color:var(--terra);
}

/* ================== CODEX ================== */
.codex-shell{
  position:relative; z-index:3;
  min-height:100vh;
  padding:100px 24px 140px;
}
.codex-wrap{
  max-width:1180px; margin:0 auto;
  display:flex; flex-direction:column; gap:100px;
}
.codex-head{
  border-bottom:1px solid var(--border-medium);
  padding-bottom:56px;
  display:flex; flex-direction:column; gap:28px;
}
.codex-head .topline{
  display:flex; align-items:center; gap:12px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.32em;
  color:var(--brass);
}
.codex-head h1{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(3rem,7vw,5.5rem);
  letter-spacing:-.025em; line-height:1.02;
  color:var(--text-1);
}
.codex-head .client{
  font-family:var(--f-display); font-style:italic;
  font-size:clamp(1.05rem,1.8vw,1.3rem);
  color:var(--text-3);
}
.codex-head .actions{ display:flex; align-items:center; gap:14px; margin-top:18px; }

/* Section header */
.cdx-section{ display:flex; flex-direction:column; gap:32px; }
.cdx-section-head{ display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
.cdx-section-num{
  font-family:var(--f-display);
  font-size:clamp(2.5rem, 4vw, 3.5rem); line-height:1;
  color:var(--brass); font-weight:500;
}
.cdx-section-title{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.75rem, 3vw, 2.5rem); letter-spacing:-.015em;
  color:var(--text-1);
}
.cdx-section-kicker{
  flex:1 1 auto; min-width:200px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--text-3);
  text-align:right;
}
.cdx-body{ font-family:var(--f-body); font-size:15px; line-height:1.75; color:var(--text-2); }

/* Essence block */
.cdx-essence{
  padding:56px;
  display:flex; flex-direction:column; gap:28px;
}
.cdx-essence .statement{
  font-family:var(--f-display); font-weight:500; font-style:italic;
  font-size:clamp(1.75rem, 3.6vw, 2.75rem);
  line-height:1.35; letter-spacing:-.01em;
  color:var(--text-1);
}
.cdx-essence .statement .hl{ color:var(--brass); font-style:normal; font-weight:500; }
.cdx-essence .statement.plain{ font-style:normal; }
.cdx-essence .caption{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--text-3);
}

/* Palette */
.cdx-palette{
  display:grid; grid-template-columns:repeat(5, 1fr); gap:12px;
}
@media(max-width:720px){ .cdx-palette{ grid-template-columns:repeat(2, 1fr); } }
.cdx-swatch{
  position:relative;
  border-radius:12px;
  overflow:hidden;
  aspect-ratio:3/4;
  border:1px solid var(--border-medium);
}
.cdx-swatch .chip{ position:absolute; inset:0; }
.cdx-swatch .meta{
  position:absolute; left:0; right:0; bottom:0;
  padding:14px 16px;
  background:linear-gradient(to top, rgba(0,0,0,.55), transparent);
  font-family:var(--f-mono); font-size:10px;
  color:#EEE5D2; letter-spacing:.14em; text-transform:uppercase;
}
.cdx-swatch .meta .role{ opacity:.75; display:block; font-size:9px; margin-bottom:2px; }
.cdx-swatch .meta .hex { font-weight:600; }
.cdx-palette-note{
  margin-top:18px;
  font-family:var(--f-body); font-size:15px; line-height:1.7;
  color:var(--text-2);
}

/* Typography specimen */
.cdx-type{
  display:grid; grid-template-columns:1fr; gap:32px;
}
@media(min-width:760px){ .cdx-type{ grid-template-columns:minmax(0,1.1fr) minmax(0,1fr); } }
.cdx-type-specimen{
  padding:48px 40px;
  display:flex; flex-direction:column; justify-content:center; align-items:flex-start;
  gap:24px;
}
.cdx-type-specimen .spec-big{
  font-size:clamp(6rem, 13vw, 10rem);
  line-height:.9; letter-spacing:-.03em;
  color:var(--text-1);
}
.cdx-type-specimen .spec-alpha{
  font-size:clamp(1.25rem, 2vw, 1.5rem);
  line-height:1.4; color:var(--text-2);
  opacity:.85;
}
.cdx-type-spec-secondary .spec-big{ font-size:clamp(3.5rem, 8vw, 6rem); }
.cdx-type-meta{
  display:flex; flex-direction:column; gap:20px;
  padding:40px;
}
.cdx-type-meta .row{
  display:flex; justify-content:space-between; gap:16px;
  padding:14px 0;
  border-bottom:1px solid var(--border-subtle);
}
.cdx-type-meta .row:last-child{ border-bottom:none; }
.cdx-type-meta .k{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--text-3);
}
.cdx-type-meta .v{
  font-family:var(--f-body); font-size:15px; font-weight:500;
  color:var(--text-1); text-align:right;
}

/* Shape diagram */
.cdx-shape{
  display:grid; grid-template-columns:1fr; gap:32px;
}
@media(min-width:760px){ .cdx-shape{ grid-template-columns:1fr 1fr; } }
.cdx-shape-canvas{
  padding:48px;
  min-height:320px;
  display:flex; align-items:center; justify-content:center;
}
.cdx-shape-canvas svg{ width:100%; max-width:320px; height:auto; color:var(--patina); }
.cdx-shape-note{
  padding:40px;
  display:flex; flex-direction:column; gap:18px;
}
.cdx-shape-note .dims{ display:flex; flex-direction:column; gap:14px; }
.cdx-shape-note .dim{ display:flex; justify-content:space-between; align-items:center; gap:14px; }
.cdx-shape-note .dim .k{ font-family:var(--f-mono); font-size:10px; text-transform:uppercase; letter-spacing:.22em; color:var(--text-3); }
.cdx-shape-note .dim .bar{ flex:1; height:2px; background:var(--border-subtle); border-radius:1px; margin:0 14px; position:relative; }
.cdx-shape-note .dim .bar .fill{ position:absolute; top:-1px; bottom:-1px; background:var(--brass); border-radius:2px; }
.cdx-shape-note .dim .bar .peg{ position:absolute; top:50%; transform:translate(-50%, -50%); width:10px; height:10px; border-radius:50%; background:var(--brass); }
.cdx-shape-note .dim .v{ font-family:var(--f-mono); font-size:10px; text-transform:uppercase; letter-spacing:.22em; color:var(--text-1); font-weight:500; min-width:90px; text-align:right; }

/* Motion curve */
.cdx-motion{
  padding:40px;
  display:grid; grid-template-columns:1fr; gap:28px;
}
@media(min-width:760px){ .cdx-motion{ grid-template-columns:1.3fr 1fr; } }
.cdx-motion-canvas{
  min-height:220px; display:flex; align-items:center; justify-content:center;
  border-right:1px solid var(--border-subtle);
  padding-right:24px;
}
@media(max-width:760px){ .cdx-motion-canvas{ border-right:none; border-bottom:1px solid var(--border-subtle); padding-right:0; padding-bottom:24px; } }
.cdx-motion-canvas svg{ width:100%; max-width:420px; height:auto; }
.cdx-motion-note{ display:flex; flex-direction:column; gap:14px; justify-content:center; }

/* Voice */
.cdx-voice{ padding:48px 40px; }
.cdx-voice .pullquote{
  font-family:var(--f-display); font-style:italic; font-weight:500;
  font-size:clamp(1.5rem, 3vw, 2rem);
  line-height:1.4; letter-spacing:-.01em;
  color:var(--text-1);
  padding:16px 0 24px;
  border-bottom:1px solid var(--border-subtle);
}
.cdx-voice .pullquote::before{ content:'“'; color:var(--brass); font-size:1.3em; margin-right:6px; }
.cdx-voice .pullquote::after{ content:'”'; color:var(--brass); font-size:1.3em; margin-left:6px; }
.cdx-voice-grid{
  display:grid; grid-template-columns:1fr; gap:24px;
  margin-top:28px;
}
@media(min-width:760px){ .cdx-voice-grid{ grid-template-columns:repeat(3,1fr); } }
.cdx-voice-chip{
  padding:20px;
  border:1px solid var(--border-medium);
  border-radius:10px;
  display:flex; flex-direction:column; gap:8px;
}
.cdx-voice-chip .k{ font-family:var(--f-mono); font-size:9px; text-transform:uppercase; letter-spacing:.26em; color:var(--text-3); }
.cdx-voice-chip .v{ font-family:var(--f-display); font-style:italic; font-size:1.25rem; color:var(--text-1); }
.cdx-voice-example{
  margin-top:28px;
  padding-top:28px;
  border-top:1px solid var(--border-subtle);
  font-family:var(--f-body); font-size:14px; line-height:1.7;
  color:var(--text-2);
}
.cdx-voice-example .tag{ display:block; font-family:var(--f-mono); font-size:10px; text-transform:uppercase; letter-spacing:.26em; color:var(--brass); margin-bottom:10px; }
.cdx-voice-example .spec{
  padding:18px 22px; margin-top:10px;
  background:var(--bg-surface);
  border-left:2px solid var(--brass);
  font-family:var(--f-display); font-style:italic; font-size:1.1rem;
  color:var(--text-1);
}

/* Sensory quotes */
.cdx-sensory{ display:grid; grid-template-columns:1fr; gap:20px; }
@media(min-width:760px){ .cdx-sensory{ grid-template-columns:1fr 1fr; } }
.cdx-sensory-card{
  padding:28px 32px;
  display:flex; flex-direction:column; gap:12px;
}
.cdx-sensory-card .k{ font-family:var(--f-mono); font-size:10px; text-transform:uppercase; letter-spacing:.28em; color:var(--brass); }
.cdx-sensory-card .v{ font-family:var(--f-display); font-style:italic; font-size:1.15rem; line-height:1.5; color:var(--text-1); }

/* Ritual */
.cdx-ritual{ display:grid; grid-template-columns:1fr; gap:24px; }
@media(min-width:760px){ .cdx-ritual{ grid-template-columns:minmax(0,1.3fr) minmax(0,1fr); } }
.cdx-ritual-quote{
  padding:40px;
  font-family:var(--f-display); font-style:italic; font-weight:500;
  font-size:clamp(1.25rem, 2.4vw, 1.6rem); line-height:1.5;
  color:var(--text-1);
  border-left:3px solid var(--brass);
  border-top:none; border-right:none; border-bottom:none;
  border-radius:0 14px 14px 0;
}
.cdx-ritual-dims{
  padding:32px; display:flex; flex-direction:column; gap:18px;
}

/* Paradoxes */
.cdx-paradoxes .paradox-grid{
  display:grid; grid-template-columns:1fr; gap:20px;
}
@media(min-width:760px){ .cdx-paradoxes .paradox-grid{ grid-template-columns:repeat(3,1fr); } }
.cdx-paradoxes .paradox-card{
  padding:32px;
  display:flex; flex-direction:column; gap:12px;
}
.cdx-paradoxes .paradox-card h3{
  font-family:var(--f-display); font-weight:500; font-size:1.5rem;
  color:var(--brass);
}
.cdx-paradoxes .paradox-card p{
  font-family:var(--f-body); font-size:14px; line-height:1.65;
  color:var(--text-2);
}

/* First moves */
.cdx-moves{ display:grid; grid-template-columns:1fr; gap:20px; }
@media(min-width:760px){ .cdx-moves{ grid-template-columns:repeat(3,1fr); } }
.cdx-move-card{
  padding:32px;
  display:flex; flex-direction:column; gap:14px;
  position:relative;
}
.cdx-move-card .num{
  font-family:var(--f-display); font-weight:500;
  font-size:3rem; color:var(--brass); line-height:1;
  opacity:.9;
}
.cdx-move-card h3{
  font-family:var(--f-display); font-weight:500; font-size:1.35rem;
  color:var(--text-1); line-height:1.2;
}
.cdx-move-card p{
  font-family:var(--f-body); font-size:14px; line-height:1.7;
  color:var(--text-2);
}
.cdx-move-card .tag{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--text-3);
  padding:6px 10px; border:1px solid var(--border-subtle);
  border-radius:6px; align-self:flex-start;
}

/* ================== CODEX · VISUAL APPLIED SECTIONS ================== */

/* Brand identity card — the "this is you" hero */
.cdx-brand-hero{
  position:relative;
  padding:clamp(48px, 6vw, 88px) clamp(32px, 5vw, 64px);
  border-radius:clamp(16px, 2.2vw, 28px);
  overflow:hidden;
  min-height:clamp(380px, 48vw, 520px);
  display:flex; flex-direction:column; justify-content:space-between;
  gap:36px;
  box-shadow:0 28px 80px -28px rgba(26,22,16,.35);
}
.cdx-brand-hero::before{
  content:''; position:absolute; inset:-40%;
  background:conic-gradient(from 220deg, transparent, rgba(255,255,255,.12), transparent 40%);
  mix-blend-mode:soft-light;
  animation:ecoSpin 32s linear infinite;
  pointer-events:none;
}
.cdx-brand-hero-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; flex-wrap:wrap; position:relative; z-index:2; }
.cdx-brand-hero-eyebrow{
  display:inline-flex; align-items:center; gap:10px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.32em;
  padding:8px 16px;
  border:1px solid currentColor;
  border-radius:999px;
  opacity:.9;
}
.cdx-brand-hero-meta{
  display:inline-flex; align-items:center; gap:8px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  opacity:.7;
}
.cdx-brand-hero-mid{ position:relative; z-index:2; }
.cdx-brand-hero h1{
  font-size:clamp(3rem, 10vw, 7rem);
  line-height:.92;
  letter-spacing:-.035em;
  font-weight:700;
  margin-bottom:20px;
  word-break:break-word;
}
.cdx-brand-hero .tagline{
  font-style:italic;
  font-size:clamp(1.1rem, 2vw, 1.5rem);
  line-height:1.45;
  max-width:680px;
  opacity:.88;
}
.cdx-brand-hero-bottom{
  position:relative; z-index:2;
  display:flex; align-items:flex-end; justify-content:space-between;
  gap:24px; flex-wrap:wrap;
}
.cdx-brand-hero-chips{ display:flex; gap:6px; }
.cdx-brand-hero-chip{
  width:36px; height:36px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,.5);
  box-shadow:0 4px 12px rgba(0,0,0,.2);
}
.cdx-brand-hero-cta{
  display:inline-flex; align-items:center; gap:10px;
  padding:14px 24px;
  border-radius:var(--hero-btn-r, 8px);
  background:rgba(255,255,255,.92);
  color:#0F0C08;
  font-family:inherit; font-weight:600; font-size:14px;
  letter-spacing:.02em;
  border:none; cursor:default;
}

/* Applied examples strip (buttons + card + tag in their system) */
.cdx-applied{
  padding:40px;
  display:flex; flex-direction:column; gap:28px;
}
.cdx-applied-row{
  display:flex; gap:14px; flex-wrap:wrap; align-items:center;
}
.cdx-applied-card{
  padding:28px;
  display:flex; flex-direction:column; gap:14px;
  max-width:360px;
}
.cdx-applied-card .card-k{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.26em;
}
.cdx-applied-card .card-h{
  font-size:clamp(1.4rem, 2.4vw, 1.75rem);
  line-height:1.15;
  letter-spacing:-.015em;
}
.cdx-applied-card .card-b{
  font-size:14px; line-height:1.6;
}
.cdx-applied-note{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--text-3);
}

/* Typography showcase — full alphabet + paragraph + weight ladder */
.cdx-type-showcase{
  padding:48px;
  display:flex; flex-direction:column; gap:32px;
}
.cdx-type-showcase .alpha-row{
  display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  padding:16px 0; border-bottom:1px solid var(--border-subtle);
}
.cdx-type-showcase .alpha-label{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--text-3); min-width:90px;
}
.cdx-type-showcase .alpha{
  flex:1 1 auto; color:var(--text-1);
  letter-spacing:-.01em; line-height:1.1;
  font-size:clamp(1.5rem, 3.6vw, 2.4rem);
}
.cdx-type-showcase .weights{
  display:grid; grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));
  gap:18px;
  padding-top:10px;
}
.cdx-type-showcase .weights .w{
  display:flex; flex-direction:column; gap:6px;
  padding:14px 16px;
  border:1px solid var(--border-subtle);
  border-radius:10px;
  background:var(--bg-surface);
}
.cdx-type-showcase .weights .w .label{ font-family:var(--f-mono); font-size:9px; letter-spacing:.22em; color:var(--text-3); }
.cdx-type-showcase .weights .w .sample{ font-size:clamp(1.75rem, 2.4vw, 2.25rem); color:var(--text-1); line-height:1; }
.cdx-type-showcase .para{
  font-size:16px; line-height:1.8;
  color:var(--text-2);
  max-width:68ch;
}

/* Voice in action — mock touchpoints */
.cdx-voice-action{
  display:grid; grid-template-columns:1fr; gap:16px;
  margin-top:24px;
}
@media(min-width:760px){ .cdx-voice-action{ grid-template-columns:repeat(3, 1fr); } }
.cdx-voice-specimen{
  padding:24px;
  border:1px solid var(--border-medium);
  border-radius:14px;
  background:var(--bg-surface);
  display:flex; flex-direction:column; gap:12px;
  min-height:200px;
}
.cdx-voice-specimen .spec-k{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--brass);
}
.cdx-voice-specimen .spec-body{
  flex:1;
  line-height:1.4;
  color:var(--text-1);
}
.cdx-voice-specimen .spec-foot{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
  padding-top:10px; border-top:1px solid var(--border-subtle);
}

/* Colour-in-use chips row — mini primary pill / surface sample */
.cdx-palette-demo{
  margin-top:24px;
  padding:32px;
  border:1px solid var(--border-subtle);
  border-radius:14px;
  display:flex; flex-direction:column; gap:20px;
  background:var(--bg-surface);
}
.cdx-palette-demo .label{ letter-spacing:.28em; }
.cdx-palette-demo-row{
  display:flex; gap:14px; flex-wrap:wrap; align-items:center;
}

/* Closing footer inside codex */
.cdx-end{
  padding-top:40px;
  border-top:1px solid var(--border-medium);
  text-align:center;
}
.cdx-end .label{ margin-bottom:14px; }
.cdx-end .stamp{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  color:var(--text-3);
}

/* ================== COMPOSING PHASE (AI generation) ================== */
.composing-shell{
  position:fixed; inset:0; z-index:60;
  background:var(--bg-void);
  display:flex; align-items:center; justify-content:center;
  padding:40px 24px;
  overflow:hidden;
}
.composing-shell::before{
  content:'';
  position:absolute; inset:-30%;
  background:radial-gradient(ellipse at 50% 50%, var(--brass-faint), transparent 55%);
  animation:composingGlow 8s ease-in-out infinite;
  pointer-events:none;
}
@keyframes composingGlow{
  0%,100%{ transform:scale(1) rotate(0deg); opacity:.5; }
  50%{    transform:scale(1.12) rotate(180deg); opacity:.9; }
}
.composing-wrap{
  position:relative; z-index:2;
  max-width:720px; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:40px;
}
.composing-eyebrow{
  display:inline-flex; align-items:center; gap:14px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.32em;
  color:var(--brass);
}
.composing-title{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(2.5rem, 6vw, 4.5rem);
  letter-spacing:-.025em; line-height:1;
  color:var(--text-1);
}
.composing-title .blink{
  display:inline-block; color:var(--brass);
  animation:blinkDot 1.1s ease-in-out infinite;
}
@keyframes blinkDot{ 0%,100%{ opacity:1; } 50%{ opacity:.2; } }
.composing-sub{
  font-family:var(--f-display); font-style:italic;
  font-size:clamp(1.05rem, 2vw, 1.3rem); line-height:1.5;
  color:var(--text-2); max-width:560px;
}
.composing-status{
  position:relative;
  width:100%; max-width:520px;
  padding:20px 24px;
  border:1px solid var(--border-medium);
  background:var(--bg-surface);
  border-radius:14px;
  min-height:80px;
  display:flex; align-items:center; justify-content:center;
  transition:background .3s ease;
}
.composing-status-text{
  font-family:var(--f-body); font-size:15px;
  color:var(--text-1); font-weight:500;
  animation:statusFade .45s var(--ease);
}
@keyframes statusFade{
  from{ opacity:0; transform:translateY(6px); }
  to  { opacity:1; transform:translateY(0); }
}
.composing-bar{
  width:100%; max-width:520px; height:2px;
  background:var(--border-subtle); border-radius:2px;
  overflow:hidden; position:relative;
}
.composing-bar::after{
  content:'';
  position:absolute; top:0; bottom:0; left:-30%;
  width:30%;
  background:linear-gradient(90deg, transparent, var(--brass), transparent);
  animation:barRun 2.4s ease-in-out infinite;
}
@keyframes barRun{
  0%{ left:-30%; } 100%{ left:100%; }
}
.composing-warn{
  display:inline-flex; align-items:center; gap:10px;
  padding:10px 16px;
  background:rgba(168,144,62,.06);
  border:1px solid var(--brass-dim);
  border-radius:999px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--brass);
}
.composing-warn .dot{
  width:6px; height:6px; border-radius:50%;
  background:var(--brass);
  animation:pulseDot 1.4s ease-in-out infinite;
}
.composing-err{
  padding:24px;
  border:1px solid var(--terra);
  background:rgba(196,101,74,.08);
  border-radius:12px;
  max-width:520px; width:100%;
  text-align:left;
  display:flex; flex-direction:column; gap:12px;
}
.composing-err .k{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--terra);
}
.composing-err p{ font-family:var(--f-body); font-size:14px; line-height:1.55; color:var(--text-1); }
.composing-err .row{ display:flex; gap:10px; }

/* ================== CODEX · READING SWITCHER / TOOLBAR ================== */
.cdx-toolbar{
  position:sticky; top:14px; z-index:40;
  margin:-60px auto 40px;
  max-width:1160px;
  display:flex; align-items:center; justify-content:space-between;
  gap:14px; flex-wrap:wrap;
  padding:14px 22px;
  background:var(--bg-overlay);
  -webkit-backdrop-filter:blur(24px);
  backdrop-filter:blur(24px);
  border:1px solid var(--border-medium);
  border-radius:999px;
  box-shadow:0 10px 30px -16px rgba(26,22,16,.25);
}
.cdx-toolbar .readings{
  display:inline-flex; gap:4px;
  padding:4px; border-radius:999px;
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
}
.cdx-toolbar .reading-pill{
  padding:8px 16px;
  border:none; background:transparent;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--text-3);
  border-radius:999px; cursor:pointer;
  transition:all .25s var(--ease);
}
.cdx-toolbar .reading-pill.active{
  background:var(--brass);
  color:var(--cream);
}
.cdx-toolbar .right{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

/* ================== CODEX · NEW SECTIONS (Claude-driven) ================== */
.cdx-positioning{
  padding:56px 48px;
  display:flex; flex-direction:column; gap:24px;
}
.cdx-positioning p{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.25rem, 2.4vw, 1.75rem); line-height:1.5;
  color:var(--text-1); letter-spacing:-.01em;
}
.cdx-positioning p + p{
  padding-top:18px;
  border-top:1px solid var(--border-subtle);
}

.cdx-manifesto{
  padding:60px 48px;
  display:flex; flex-direction:column; gap:18px;
}
.cdx-manifesto .line{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.4rem, 3vw, 2rem); line-height:1.35;
  letter-spacing:-.015em;
  color:var(--text-1);
  padding-left:22px; border-left:2px solid var(--brass);
  display:block;
}
.cdx-manifesto .line:nth-child(even){
  font-style:italic;
  color:var(--text-2);
}

.cdx-narrative{
  display:grid; grid-template-columns:1fr; gap:24px;
}
@media(min-width:760px){ .cdx-narrative{ grid-template-columns:repeat(3, 1fr); } }
.cdx-narrative-card{
  padding:36px 32px;
  display:flex; flex-direction:column; gap:16px;
}
.cdx-narrative-card .k{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--brass);
}
.cdx-narrative-card p{
  font-family:var(--f-display); font-style:italic; font-weight:500;
  font-size:1.15rem; line-height:1.55;
  color:var(--text-1);
}

/* Voice — say this / not that */
.cdx-voice-pairs{ display:grid; grid-template-columns:1fr; gap:12px; }
@media(min-width:760px){ .cdx-voice-pairs{ grid-template-columns:1fr 1fr; gap:16px 24px; } }
.cdx-voice-pair{
  display:grid; grid-template-columns:auto 1fr; gap:14px 18px;
  padding:16px 0;
  border-bottom:1px solid var(--border-subtle);
}
.cdx-voice-pair .tag{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.26em;
  padding:6px 10px;
  border:1px solid var(--border-subtle);
  border-radius:6px;
  white-space:nowrap;
  align-self:start;
}
.cdx-voice-pair .tag.say{ color:var(--patina); border-color:var(--patina-dim); background:var(--patina-faint); }
.cdx-voice-pair .tag.not{ color:var(--terra); border-color:rgba(196,101,74,.22); background:rgba(196,101,74,.08); }
.cdx-voice-pair .val{
  font-family:var(--f-display); font-size:1.1rem; line-height:1.5;
  color:var(--text-1); letter-spacing:-.005em;
}
.cdx-voice-pair.not .val{ font-style:italic; color:var(--text-2); }

/* Taglines */
.cdx-taglines{ display:flex; flex-direction:column; gap:14px; margin-top:28px; padding-top:28px; border-top:1px solid var(--border-subtle); }
.cdx-taglines .label{ margin-bottom:6px; letter-spacing:.28em; }
.cdx-tagline{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.5rem, 3vw, 2.25rem); letter-spacing:-.02em; line-height:1.15;
  color:var(--text-1);
  padding:10px 0;
  border-bottom:1px solid var(--border-subtle);
}
.cdx-tagline:last-child{ border-bottom:none; }

/* Competitive map */
.cdx-compmap{
  padding:32px;
  display:grid; grid-template-columns:1fr; gap:28px;
}
@media(min-width:900px){ .cdx-compmap{ grid-template-columns:1.3fr 1fr; align-items:center; } }
.cdx-compmap-canvas{
  position:relative;
  aspect-ratio:1/1;
  max-width:460px; margin:0 auto;
  width:100%;
  border:1px solid var(--border-medium);
  border-radius:14px;
  background:
    linear-gradient(var(--border-subtle) 1px, transparent 1px) 0 0 / 100% 25%,
    linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px) 0 0 / 25% 100%;
  background-color:var(--bg-surface);
}
.cdx-compmap-axis{
  position:absolute;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--text-3);
}
.cdx-compmap-axis.top    { top:10px;    left:50%; transform:translateX(-50%); }
.cdx-compmap-axis.bottom { bottom:10px; left:50%; transform:translateX(-50%); }
.cdx-compmap-axis.left   { top:50%; left:10px;  transform:translateY(-50%) rotate(-90deg); transform-origin:center; }
.cdx-compmap-axis.right  { top:50%; right:10px; transform:translateY(-50%) rotate(90deg);  transform-origin:center; }
.cdx-compmap-point{
  position:absolute;
  transform:translate(-50%, -50%);
  display:flex; align-items:center; gap:8px;
}
.cdx-compmap-point .dot{
  width:8px; height:8px; border-radius:50%;
  background:var(--text-3);
}
.cdx-compmap-point .name{
  font-family:var(--f-mono); font-size:10px;
  color:var(--text-3);
}
.cdx-compmap-point.mine .dot{
  background:var(--brass); width:14px; height:14px;
  box-shadow:0 0 0 4px var(--brass-faint);
}
.cdx-compmap-point.mine .name{
  color:var(--brass); font-weight:700;
  text-transform:uppercase; letter-spacing:.2em;
  font-size:11px;
}
.cdx-compmap-note{ display:flex; flex-direction:column; gap:14px; }

/* First campaign */
.cdx-campaign{ padding:40px; display:flex; flex-direction:column; gap:28px; }
.cdx-campaign h3{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.75rem, 3.4vw, 2.5rem); letter-spacing:-.02em;
  color:var(--text-1);
}
.cdx-campaign-scenes{ display:grid; grid-template-columns:1fr; gap:24px; }
@media(min-width:760px){ .cdx-campaign-scenes{ grid-template-columns:repeat(2, 1fr); } }
.cdx-campaign-scene{
  padding:28px; border:1px solid var(--border-medium); border-radius:14px;
  display:flex; flex-direction:column; gap:14px;
  background:var(--bg-surface);
}
.cdx-campaign-scene .scene-num{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--brass);
}
.cdx-campaign-scene .scene-title{
  font-family:var(--f-display); font-weight:500;
  font-size:1.35rem; color:var(--text-1); letter-spacing:-.01em;
}
.cdx-campaign-scene .scene-copy{
  font-family:var(--f-display); font-style:italic;
  font-size:1.05rem; line-height:1.55;
  color:var(--text-2);
}
.cdx-campaign-scene .scene-visual{
  font-family:var(--f-mono); font-size:10px;
  color:var(--text-3); text-transform:uppercase; letter-spacing:.24em;
  padding-top:12px; border-top:1px solid var(--border-subtle);
}

/* 30-day sprint */
.cdx-sprint{ display:grid; grid-template-columns:1fr; gap:20px; }
@media(min-width:900px){ .cdx-sprint{ grid-template-columns:repeat(4, 1fr); } }
.cdx-sprint-week{
  padding:28px 26px;
  display:flex; flex-direction:column; gap:14px;
}
.cdx-sprint-week .week{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--brass);
}
.cdx-sprint-week .focus{
  font-family:var(--f-display); font-weight:500;
  font-size:1.25rem; line-height:1.2;
  color:var(--text-1); letter-spacing:-.01em;
}
.cdx-sprint-week ul{
  list-style:none; padding:0; margin:0;
  display:flex; flex-direction:column; gap:10px;
}
.cdx-sprint-week li{
  padding-left:18px; position:relative;
  font-family:var(--f-body); font-size:13.5px; line-height:1.55;
  color:var(--text-2);
}
.cdx-sprint-week li::before{
  content:''; position:absolute; left:0; top:8px;
  width:8px; height:1px; background:var(--brass);
}

/* Regenerate confirm modal */
.regen-modal{
  position:fixed; inset:0; z-index:120;
  background:rgba(18,15,10,.6);
  display:none; align-items:center; justify-content:center;
  padding:24px;
  -webkit-backdrop-filter:blur(10px);
  backdrop-filter:blur(10px);
}
.regen-modal.open{ display:flex; }
.regen-modal-card{
  max-width:520px; width:100%;
  padding:40px;
  background:var(--cream); color:var(--ink);
  border:1px solid var(--cream-line);
  border-radius:16px;
  display:flex; flex-direction:column; gap:18px;
}
[data-theme="dark"] .regen-modal-card{ background:var(--cream-deep); color:var(--ink); }
.regen-modal-card h3{
  font-family:var(--f-display); font-weight:500;
  font-size:1.65rem; line-height:1.2; color:var(--text-1);
}
.regen-modal-card p{
  font-family:var(--f-body); font-size:14.5px; line-height:1.65;
  color:var(--text-2);
}
.regen-modal-actions{ display:flex; gap:12px; margin-top:12px; flex-wrap:wrap; }

/* Print CSS for Export as PDF */
@media print{
  html, body{ background:#FFF !important; color:#000 !important; }
  body::after, body::before, .ambient-glow, .main-vignette{ display:none !important; }
  .nav, .nav-spacer, .mmenu, .micro-foot, .cdx-toolbar, .regen-modal{ display:none !important; }
  .codex-shell{ padding:28px !important; min-height:auto !important; }
  .codex-wrap{ gap:48px !important; max-width:none !important; }
  .cdx-section{ break-inside:avoid; page-break-inside:avoid; }
  .glass-card{ backdrop-filter:none !important; -webkit-backdrop-filter:none !important; background:#FAF7F1 !important; border:1px solid #DDD2BF !important; }
  .cdx-section-head{ break-after:avoid; }
  .cdx-palette, .cdx-moves, .cdx-sensory, .cdx-campaign-scenes, .cdx-sprint, .cdx-narrative{ break-inside:avoid; }

.viz-weight{

/* --- Font-family: classical serif ↔ avant-garde display, fixed stage --- */
.viz-fontfamily-stage{
  position:relative;
  width:min(80%, 360px);
  height:200px;
  display:flex; align-items:center; justify-content:center;
}
.viz-fontfamily-stage > span{

  display:flex; align-items:center; justify-content:center;

.viz-ff-classic{
  font-family:'EB Garamond', Georgia, serif;

}
.viz-ff-avant{
  font-family:'Archivo Black', 'Figtree', sans-serif;
  font-weight:900;
  letter-spacing:-.05em;

/* --- Elevation (now image placeholder crossfade: Luxurious ↔ Approachable) --- */
.viz-elev-stage{
  position:absolute; inset:24px;
  display:grid; grid-template-columns:1fr 1fr;
  gap:16px;
}
.viz-elev-plate{
  position:relative;
  background:var(--bg-surface);
  border:1px dashed var(--border-strong);
  border-radius:10px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:10px;
  transition:opacity .3s ease, transform .3s ease;
  overflow:hidden;
}
.viz-elev-plate::before{
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg, var(--patina-faint) 0%, var(--brass-faint) 100%);
  opacity:.5;
}
.viz-elev-plate .plate-frame{
  position:relative; z-index:2;
  width:70%; height:50%;
  border:1px solid var(--border-strong);
  background:var(--bg-deep);
  display:flex; align-items:center; justify-content:center;
}
.viz-elev-plate .plate-frame::after{
  content:''; position:absolute; inset:0;
  background:
    linear-gradient(45deg, transparent 49.2%, var(--border-medium) 49.5%, var(--border-medium) 50.5%, transparent 50.8%),
    linear-gradient(-45deg, transparent 49.2%, var(--border-medium) 49.5%, var(--border-medium) 50.5%, transparent 50.8%);
  opacity:.55;
}
.viz-elev-plate .plate-caption{
  position:relative; z-index:2;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--text-3);
  text-align:center;
  padding:0 10px;
}
.viz-elev-plate .plate-caption strong{
  display:block; color:var(--text-1);
  font-weight:600; letter-spacing:.2em;
  margin-bottom:2px;
}
.viz-color-disk{
  width:180px; height:180px; border-radius:50%;
  border:1px solid rgba(255,255,255,.25);
  -webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  color:rgba(255,255,255,.92);
  text-shadow:0 1px 6px rgba(0,0,0,.35);
}
.viz-saturation{
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}
.viz-saturation::after{
  content:'';
  position:absolute; inset:-20%;
  background:conic-gradient(from 0deg, var(--brass), var(--terra), var(--patina), var(--plum), var(--brass));
  filter:saturate(var(--sat, 1)) blur(40px);
  transition:filter .3s ease;
}
.viz-saturation-core{
  position:relative; z-index:2;
  width:200px; height:200px; border-radius:50%;
  background:radial-gradient(circle at center, var(--brass), var(--patina));
  opacity:.9; mix-blend-mode:screen;
  filter:saturate(var(--sat, 1));
  transition:filter .3s ease;
}
.viz-luminosity{
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  transition:background .5s ease;
}
.viz-luminosity-square{
  width:160px; height:160px;
  border:1px solid currentColor; opacity:.65;
  transition:color .5s ease;
}
.viz-corners{
  width:240px; height:240px;
  background:conic-gradient(from var(--eco-angle), var(--patina), var(--brass), var(--terra), var(--plum), var(--patina));
  animation:ecoSpin 12s linear infinite;
  box-shadow:0 24px 64px -16px rgba(0,0,0,.3);
  transition:border-radius .25s ease;
}
.viz-tracking-stage{
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; padding:0 18px;
}
.viz-tracking{
  font-family:var(--f-body); font-weight:800;
  font-size:clamp(1.4rem, 3.2vw, 2rem);
  text-transform:uppercase;
  background:linear-gradient(95deg, var(--patina), var(--brass), var(--terra), var(--plum), var(--patina));
  background-size:200% 100%;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
  animation:rainbowShift 9s linear infinite;
  white-space:nowrap;
  transition:letter-spacing .25s ease, font-size .25s ease;
}
@keyframes rainbowShift{ 0%{ background-position:0% 0; } 100%{ background-position:200% 0; } }
.viz-density{
  position:absolute; inset:0; padding:32px;
  overflow:hidden;
}
.viz-density .cell{
  position:absolute;
  background:var(--patina-faint);
  border:1px solid var(--patina-dim);
  -webkit-backdrop-filter:blur(4px);
  backdrop-filter:blur(4px);
  transform:translate(-50%,-50%);
}
.viz-density-label{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  padding:10px 22px;
  background:var(--bg-overlay);
  -webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);
  border:1px solid var(--border-subtle);
  color:var(--patina);
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  z-index:2;
}
.viz-contrast{
  position:absolute; inset:0;
  transition:background .5s ease;
}
.viz-era{
  font-family:var(--f-display);
  font-weight:500;
  font-size:clamp(4rem,10vw,8rem);
  color:var(--text-1);
  letter-spacing:-.02em;
}

/* --- Image style: photo frame vs illustration marks --- */
.viz-image-style{
  position:relative; width:220px; height:280px;
  display:flex; align-items:center; justify-content:center;
}
.viz-img-photo{
  position:absolute; inset:0;
  border:6px solid var(--text-1); opacity:var(--photo-op,1);
  transition:opacity .3s ease;
}
.viz-img-photo::before{
  content:''; position:absolute; inset:12px;
  background:linear-gradient(135deg, var(--ink-soft) 0%, var(--ink-mute) 50%, var(--text-3) 100%);
  opacity:.7;
}
.viz-img-illust{
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  opacity:var(--ill-op,0);
  transition:opacity .3s ease;
}
.viz-img-illust svg{ width:160px; height:160px; color:var(--brass); }

/* --- Palette: one mono swatch vs multi swatch --- */
.viz-palette{
  display:flex; gap:10px;
  transition:gap .3s ease;
}
.viz-palette .sw{
  width:var(--sw-w,64px); height:160px;
  border-radius:4px;
  transition:width .3s ease, background .3s ease;
}

/* --- Color pop: corporate muted vs expressive splash --- */
.viz-colorpop{
  position:absolute; inset:24px;
  border-radius:16px;
  display:grid; grid-template-columns:repeat(4,1fr); gap:0;
  overflow:hidden;
  box-shadow:0 14px 40px -14px rgba(0,0,0,.3);
}
.viz-colorpop .band{
  width:100%; height:100%;
  transition:background-color .3s ease;
}

/* --- Layout density: grid fill vs sparse --- */
.viz-layout-density{
  position:absolute; inset:32px;
  display:grid; gap:var(--ld-gap, 4px);
  grid-template-columns:repeat(var(--ld-cols, 8), 1fr);
  grid-auto-rows:var(--ld-row, 24px);
  transition:gap .3s ease;
}
.viz-layout-density .blk{
  background:var(--patina-faint);
  border:1px solid var(--patina-dim);
  border-radius:2px;
}

/* --- Motion-echo stage (Static ↔ Kinetic): radiating rings, clearly different
       from the shape-based visualisers. --- */
.viz-motion-stage{
  position:relative;
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
}
.viz-motion-core{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%, -50%);
  width:22px; height:22px; border-radius:50%;
  background:var(--brass);
  box-shadow:0 0 24px var(--brass-dim);
  z-index:2;
}
.viz-motion-ring{
  position:absolute; top:50%; left:50%;
  width:22px; height:22px; border-radius:50%;
  border:2px solid var(--patina);
  transform:translate(-50%, -50%);
  pointer-events:none;
  opacity:0.9;
}
.viz-motion-ring.radiate{
  animation:motionEcho 3.4s ease-out infinite;
  animation-delay:var(--ring-delay, 0s);
}
.viz-motion-ring.radiate:nth-child(2){ border-color:var(--brass); }
.viz-motion-ring.radiate:nth-child(3){ border-color:var(--terra); }
.viz-motion-ring.radiate:nth-child(4){ border-color:var(--plum); }
.viz-motion-ring.radiate:nth-child(5){ border-color:var(--patina); }
.viz-motion-ring.radiate:nth-child(6){ border-color:var(--brass); }
@keyframes motionEcho{
  0%  { transform:translate(-50%, -50%) scale(0.3);  opacity:0.95; }
  100%{ transform:translate(-50%, -50%) scale(12);   opacity:0; }
}
/* Legacy class retained for the 'radius'/'corners' case only — not used by animation-state anymore. */
.viz-anim{
  width:160px; height:160px;
  border-radius:50%;
  background:conic-gradient(from var(--eco-angle), var(--patina), var(--brass), var(--terra), var(--plum), var(--patina));
}

/* Angularity SVG fills its host */
.viz-angularity-svg{
  width:90%; max-width:520px; height:auto;
}

/* --- Easing: SVG curve morphing smooth ↔ staccato --- */
.viz-easing{ width:80%; max-width:420px; height:160px; }
.viz-easing path{
  fill:none; stroke:var(--brass); stroke-width:2;
  transition:d .3s ease;
}

/* --- Texture: crosshatch vs smooth gradient --- */
.viz-texture{
  width:260px; height:200px;
  border-radius:8px;
  background:
    var(--tex-bg, linear-gradient(135deg, var(--brass), var(--patina)));

  box-shadow:0 14px 40px -14px rgba(0,0,0,.35);
}

/* --- Elevation: horizontal "floor line" --- */
.viz-elevation{
  position:absolute; inset:0;

}
.viz-elevation-plate::after{

  width:80px; height:80px;

  background:var(--bg-surface);
}

/* --- Headlines viz (Fast ↔ Slow) --- */
.viz-headlines{

}

.viz-headline-fast .dek{

.viz-headline-fast .burst{

}
.viz-headline-fast .burst > p{

}
.viz-headline-slow{

/* --- EQ bars (Silent ↔ Musical) --- */
.viz-eq{

<script>
/* ============================== NAV WIRING (ecosystem parity) ============================== */
(function(){
  var toggle = document.getElementById('themeToggle');
  var icon   = document.getElementById('toggleIcon');
  function setIcon(){
    if(!icon) return;
    icon.innerHTML = document.documentElement.getAttribute('data-theme') === 'dark' ? '&#9728;' : '&#9789;';
  }
  setIcon();
  if(toggle){
    toggle.addEventListener('click', function(){
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try{ localStorage.setItem('qb-theme', next); }catch(e){}
      setIcon();
      window.dispatchEvent(new CustomEvent('qb-theme-change', { detail:{ theme:next } }));
    });
  }
  var ham   = document.getElementById('hamburger');
  var mmenu = document.getElementById('mmenu');
  var mClose = document.getElementById('mmenuClose');
  if(ham && mmenu){
    ham.addEventListener('click', function(){
      ham.classList.toggle('open'); mmenu.classList.toggle('open');
    });
  }
  if(mClose && mmenu){
    mClose.addEventListener('click', function(){
      if(ham) ham.classList.remove('open'); mmenu.classList.remove('open');
    });
  }
  if(mmenu){
    mmenu.querySelectorAll('a').forEach(function(a){
      a.addEventListener('click', function(){
        if(ham) ham.classList.remove('open'); mmenu.classList.remove('open');
      });
    });
  }
})();
</script>

  /* --- State --- */
  var state = {
    phase: 'intro',          // intro | chapter | lead | composing | codex
    chapterIndex: 0,
    answers: {},
    leadData: { name:'', company:'', email:'' },
    isSubmitting: false,
    validationError: '',
    submitError: '',
    readings: [],            // [{ id:'A', createdAt, claudeOutput, derived, rawAnswers, leadData }]

    composingStatus: '',
    composingError: '',

  };

  /* --- Reading storage (localStorage). Bumped to _v2 so stale data from an
         older schema can't break the Codex. --- */
  var READINGS_KEY = 'qb_codex_readings_v2';
  function loadReadings(){
    try {
      // Clean up any legacy key
      try { localStorage.removeItem('qb_codex_readings'); } catch(e){}
      var raw = localStorage.getItem(READINGS_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch(e){ return []; }
  }
  function saveReadings(readings){
    try { localStorage.setItem(READINGS_KEY, JSON.stringify(readings)); } catch(e){}
  }
  // Always recompute derived from rawAnswers so readings are forward-compatible
  // with any later changes to the derive functions.
  function getActiveReading(){
    var r = state.readings.find(function(x){ return x.id === state.activeReading; }) || state.readings[0];
    if (r && r.rawAnswers){
      try {
        r.derived = {
          palette:    derivePalette(r.rawAnswers),
          typography: deriveTypography(r.rawAnswers),
          shape:      deriveShape(r.rawAnswers),
          motion:     deriveMotion(r.rawAnswers),
          voice:      deriveVoice(r.rawAnswers)
        };
      } catch(e){ /* fall through with whatever shape derived has */ }
    }
    return r;
  }

  // Initialize default answers
  SENSESCAPE_DATA.forEach(function(ch){
    ch.questions.forEach(function(q){
      state.answers[q.id] = q.type === 'slider' ? 5 : '';
    });
  });

  var $app = document.getElementById('app');

  function updateImmersive(){
    var b = document.body;
    b.classList.toggle('immersive', state.phase === 'chapter' || state.phase === 'lead' || state.phase === 'composing');
    b.classList.toggle('phase-intro', state.phase === 'intro');
    b.classList.toggle('phase-codex', state.phase === 'codex');
    b.classList.toggle('phase-composing', state.phase === 'composing');
  }

  function setPhase(next){
    state.phase = next;
    updateImmersive();
    render();
    try { window.scrollTo({ top:0, behavior:'smooth' }); } catch(e){ window.scrollTo(0,0); }
  }

  /* --- DOM helper --- */
  function el(tag, attrs, kids){
    var node = document.createElement(tag);
    if (attrs){
      for (var k in attrs){
        if (!attrs.hasOwnProperty(k)) continue;
        var v = attrs[k];
        if (v == null || v === false) continue;
        if (k === 'class')       node.className = v;
        else if (k === 'html')   node.innerHTML = v;
        else if (k === 'text')   node.textContent = v;
        else if (k === 'style' && typeof v === 'object') Object.assign(node.style, v);
        else if (k.indexOf('on') === 0 && typeof v === 'function') node.addEventListener(k.slice(2), v);
        else node.setAttribute(k, v);
      }
    }
    if (kids){
      var flat = [];
      (function flatten(arr){
        (Array.isArray(arr) ? arr : [arr]).forEach(function(c){
          if (Array.isArray(c)) flatten(c);
          else flat.push(c);
        });
      })(kids);
      flat.forEach(function(c){
        if (c == null || c === false) return;
        node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
    }
    return node;
  }

  function icon(name){
    // Minimal SVG icons (24x24 unless overridden via CSS width/height)
    var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.setAttribute('fill','none');
    svg.setAttribute('stroke','currentColor');
    svg.setAttribute('stroke-width','1.75');
    svg.setAttribute('stroke-linecap','round');
    svg.setAttribute('stroke-linejoin','round');
    svg.setAttribute('width','16');
    svg.setAttribute('height','16');
    var paths = {
      arrowLeft: 'M15 18l-6-6 6-6',
      arrowRight:'M9 18l6-6-6-6',
      alert:     'M12 2l10 20H2z M12 10v5 M12 18.01l.01-.01',
      spin:      'M12 2v4 M12 18v4 M4.93 4.93l2.83 2.83 M16.24 16.24l2.83 2.83 M2 12h4 M18 12h4 M4.93 19.07l2.83-2.83 M16.24 7.76l2.83-2.83'
    };
    var d = paths[name];
    if (d){
      d.split(' M').forEach(function(seg, i){
        var p = document.createElementNS('http://www.w3.org/2000/svg','path');
        p.setAttribute('d', (i === 0 ? '' : 'M') + seg);
        svg.appendChild(p);
      });
    }
    return svg;
  }

  /* ========================================================================
     RENDER
     ======================================================================== */
  var views = {};

  function render(){
    $app.innerHTML = '';
    var fn = views[state.phase];
    if (!fn) return;
    try {
      $app.appendChild(fn());
    } catch(err){
      console.error('[Sensescape] render failed for phase ' + state.phase + ':', err);
      // Fall back to intro so the user is never stranded on a blank page.
      if (state.phase !== 'intro'){
        state.phase = 'intro';
        updateImmersive();
        $app.innerHTML = '';
        try { $app.appendChild(views.intro()); } catch(e2){
          $app.innerHTML = '<div style="padding:80px 24px;text-align:center;font-family:var(--f-body);color:var(--text-1)">'
            + '<h1 style="font-family:var(--f-display);font-size:2rem;margin-bottom:16px">Something broke while rendering.</h1>'
            + '<p style="color:var(--text-2);margin-bottom:24px">Open DevTools → Console for the error. Clearing localStorage and reloading usually fixes it.</p>'
            + '<button onclick="localStorage.clear();location.reload()" class="btn btn-primary btn-sm">Reset &amp; reload</button>'
            + '</div>';
        }
      }
    }
  }

  /* --- CHAPTER --- */
  views.chapter = function(){
    var ch = SENSESCAPE_DATA[state.chapterIndex];
    var isLast = state.chapterIndex === SENSESCAPE_DATA.length - 1;

    var chapterNav = el('div', { class:'chapter-nav' }, [

          el('span', { class:'ch-prefix', text:'CH.' }),

              return el('span', { class:'dot' + (i <= state.chapterIndex ? ' active' : '') });
            })
          )
        ])
      ]),
      el('div', { class:'chap-actions' }, [
        (function(){
          var b = el('button', { class:'icon-btn', type:'button', 'aria-label':'Toggle theme' }, [ document.createTextNode('☽') ]);
          // sync icon
          function sync(){ b.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀' : '☽'; }
          sync();
          b.addEventListener('click', function(){
            var cur = document.documentElement.getAttribute('data-theme');
            var next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            try { localStorage.setItem('qb-theme', next); } catch(e){}
            sync();
            var hdr = document.getElementById('toggleIcon');
            if (hdr) hdr.innerHTML = next === 'dark' ? '&#9728;' : '&#9789;';
          });
          return b;
        })(),
        el('div', { class:'chap-nav-sep' }),
        el('button', { class:'icon-btn', type:'button', 'aria-label':'Previous chapter',
          disabled: state.chapterIndex === 0 ? '' : null,
          onclick:function(){
            syncTextRefs();
            state.validationError = '';
            if (state.chapterIndex > 0){ state.chapterIndex--; render(); try { window.scrollTo({top:0,behavior:'smooth'}); } catch(e){} }
          }
        }, [ document.createTextNode('←') ]),
        el('button', { class:'btn btn-primary btn-sm', type:'button',
          onclick:function(){
            syncTextRefs();
            // Find first unanswered text question
            var ch = SENSESCAPE_DATA[state.chapterIndex];
            var unanswered = null;
            for (var i = 0; i < ch.questions.length; i++){
              var qq = ch.questions[i];
              if (qq.type !== 'text') continue;
              var v = (state.answers[qq.id] || '').trim();
              if (!v){ unanswered = qq; break; }
            }
            if (unanswered){
              state.validationError = 'Question still empty — scrolling you to it.';
              updateToast();
              // Highlight + scroll
              document.querySelectorAll('.q-text.unanswered').forEach(function(n){ n.classList.remove('unanswered'); });
              var wrap = document.querySelector('[data-qid="' + unanswered.id + '"]');
              var card = wrap && wrap.querySelector('.q-text');
              if (card){
                card.classList.add('unanswered');
                try { card.scrollIntoView({ behavior:'smooth', block:'center' }); } catch(e){}
                setTimeout(function(){ card.classList.remove('unanswered'); }, 3500);
                var ta = card.querySelector('textarea');
                if (ta) setTimeout(function(){ try { ta.focus({ preventScroll:true }); } catch(e){} }, 600);
              }
              return;
            }
            state.validationError = '';
            if (state.chapterIndex < SENSESCAPE_DATA.length - 1){
              state.chapterIndex++;
              render();
              try { window.scrollTo({top:0,behavior:'smooth'}); } catch(e){}
            } else {
              setPhase('lead');
            }
          }
        }, [
          document.createTextNode(isLast ? 'Execute' : 'Proceed'),
          document.createTextNode(' →')
        ])
      ])
    ]);

    var header = el('header', { class:'chapter-header animate-in' }, [
      el('div', { class:'label', text:'Section ' + ch.chapter }),
      el('h1', { text:ch.title + '.' }),
      el('p', { class:'sub', text:ch.subtitle })
    ]);

    var totalQ = ch.questions.length;
    var list = el('div', { class:'question-list' },
      ch.questions.map(function(q, idx){
        var wrapper = el('div', {
          class:'animate-up qwrap-' + q.type,
          style:{ animationDelay: (idx * 150) + 'ms' },
          'data-qid': q.id
        });
        var qNode = q.type === 'slider' ? renderSlider(q) : renderTextQ(q);

        qNode.appendChild(el('div', { class:'q-counter', text: 'Question ' + (idx+1) + ' of ' + totalQ }));
