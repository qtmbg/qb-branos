<!-- Flash-free theme init -->
<script>
  (function(){
      var t=localStorage.getItem('qb-theme')||'dark';
      document.documentElement.setAttribute('data-theme',t);
  })();
  function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('qb-theme', next);
  }
</script>
<style>html:not([data-theme]){background:#080604;color:#A89A88}</style>

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

<!-- Google Fonts: Entangled Time Typography -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root, [data-theme="dark"] {
  --bg-void: #080604;
  --bg-deep: #0A0806;
  --bg-base: #0E0C09;
  --bg-surface: rgba(140,110,70,0.045);
  --bg-elevated: rgba(140,110,70,0.07);
  --bg-overlay: rgba(18,15,10,0.85);

  --border-subtle: rgba(140,110,70,0.06);
  --border-medium: rgba(140,110,70,0.11);
  --border-strong: rgba(140,110,70,0.18);

  --patina: #3A5F4A;
  --patina-lit: #4A7A5E;
  --patina-dim: rgba(58,95,74,0.2);
  --patina-faint: rgba(58,95,74,0.08);

  --brass: #A8903E;
  --brass-lit: #C4A84E;
  --brass-dim: rgba(168,144,62,0.18);
  --brass-faint: rgba(168,144,62,0.06);

  --text-1: #DDD4C4;
  --text-2: #A89A88;
  --text-3: #6A5E50;
  --text-4: #3E3830;

  /* Phase Colors */
  --phase-discovery: #4A7A5E;
  --phase-creation: #4A7A8A;
  --phase-content: #8A5A5A;
  --phase-execution: #5A7A6A;
  --phase-intel: #A8903E;
  
  --status-error: #8A4A4A;

  --font-serif: 'DM Serif Display', Georgia, serif;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

[data-theme="light"] {
  --bg-void: #F4F0EB;
  --bg-deep: #EDE8E2;
  --bg-base: #E6E0D8;
  --bg-surface: rgba(100,80,50,0.04);
  --bg-elevated: rgba(100,80,50,0.07);
  --bg-overlay: rgba(244,240,235,0.9);

  --border-subtle: rgba(100,80,50,0.08);
  --border-medium: rgba(100,80,50,0.14);
  --border-strong: rgba(100,80,50,0.22);

  --patina: #2E4E3C;
  --patina-lit: #3A6A4E;
  --patina-dim: rgba(46,78,60,0.15);
  --patina-faint: rgba(46,78,60,0.06);

  --brass: #8A7430;
  --brass-lit: #A08A3A;
  --brass-dim: rgba(138,116,48,0.15);
  --brass-faint: rgba(138,116,48,0.05);

  --text-1: #1A1610;
  --text-2: #5A5040;
  --text-3: #8A7E70;
  --text-4: #B8AEA0;

  --phase-discovery: #2E5A42;
  --phase-creation: #2E5A6A;
  --phase-content: #6A3A3A;
  --phase-execution: #3A5A4A;
  --phase-intel: #8A7430;

  --status-error: #7A2828;
}

body {
  background: var(--bg-base);
  color: var(--text-2);
  font-family: var(--font-sans);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.7;
}

/* Film Grain Overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}
[data-theme="light"] body::after { opacity: 0.02; }

/* Warm Vignette */
.main-content {
  position: relative;
  isolation: isolate;
}
.main-content::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(8,6,4,0.4) 100%);
}
[data-theme="light"] .main-content::before {
  background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(200,190,175,0.15) 100%);
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

/* Typography Classes */
.font-serif {
  font-family: var(--font-serif);
  font-weight: 400;
  letter-spacing: -0.015em;
  color: var(--text-1);
}
.font-mono { font-family: var(--font-mono); }

/* Inputs */
input, textarea, select {
  background: var(--bg-deep);
  border: 1px solid var(--border-subtle);
  color: var(--text-1);
  font-family: var(--font-sans);
  border-radius: 6px;
  padding: 12px 14px;
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: all .2s ease;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--patina);
  box-shadow: 0 0 0 3px rgba(58,95,74,0.08), 0 0 24px -4px rgba(168,144,62,0.08);
}
textarea { resize: vertical; line-height: 1.6; }
select option { background: var(--bg-deep); }
::placeholder {
  color: var(--text-3);
  opacity: 0.7;
  font-style: italic;
}

button { cursor: pointer; font-family: var(--font-sans); border: none; outline: none; }

/* Warm Glass Cards */
.glass-card {
  background: var(--bg-overlay);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  position: relative;
  overflow: hidden;
}
.glass-card::before {
  content: '';
  position: absolute;
  top: -30%; left: -10%;
  width: 60%; height: 60%;
  background: radial-gradient(ellipse at center, rgba(168,144,62,0.035) 0%, transparent 70%);
  pointer-events: none;
}

/* Primary Button */
.btn-primary {
  background: var(--patina);
  color: #E6DDD0; /* Always cream text per spec */
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 13px 30px;
  border-radius: 7px;
  transition: all 0.25s ease;
  border: 1px solid transparent;
}
.btn-primary:hover:not(:disabled) {
  background: var(--patina-lit);
  transform: translateY(-1px);
  box-shadow: 0 4px 24px -4px rgba(58,95,74,0.3), 0 0 0 1px rgba(168,144,62,0.08);
}
.btn-primary:disabled {
  opacity: 0.5;
  pointer-events: none;
  background: var(--bg-elevated);
  color: var(--text-3);
  border-color: var(--border-subtle);
}

/* Pulse Dot */
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--brass);
  box-shadow: 0 0 8px rgba(168,144,62,0.7), 0 0 2px rgba(168,144,62,1);
  animation: beat 3s ease infinite;
}
@keyframes beat {
  0%, 100% { transform: scale(1); opacity: 1; }
  12% { transform: scale(1.35); opacity: 1; }
  24% { transform: scale(0.95); opacity: 0.6; }
  36% { transform: scale(1.15); opacity: 1; }
  48% { transform: scale(1); opacity: 0.7; }
}

/* Manifesto Block */
.manifesto-block {
  position: relative;
  padding: 28px 0 28px 26px;
  background: transparent;
}
.manifesto-block::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2.5px;
  background: linear-gradient(180deg, var(--brass) 0%, var(--patina) 100%);
  border-radius: 2px;
  box-shadow: 0 0 8px rgba(168,144,62,0.1);
}

/* Theme Toggle */
.theme-toggle {
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-3);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 4px;
  margin-left: 16px;
  transition: all 0.2s ease;
}
.theme-toggle:hover {
  border-color: var(--brass);
  color: var(--brass);
}

/* Animations */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes spin { to{transform:rotate(360deg)} }

.fade-in { animation: fadeIn .4s ease forwards; }
.blink { animation: pulse 1.4s ease infinite; }
.spin { animation: spin .9s linear infinite; }

/* Tabs */
.tab-btn {
  padding: 8px 15px;
  border-radius: 5px;
  font-size: 11px;
  letter-spacing: .06em;
  text-transform: uppercase;
  font-family: var(--font-sans);
  font-weight: 600;
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-3);
  transition: all .2s;
  cursor: pointer;
  white-space: nowrap;
}
.tab-btn:hover { border-color: var(--border-medium); color: var(--text-2); }
.tab-btn.active {
  background: var(--bg-elevated);
  border-color: var(--patina);
  color: var(--text-1);
}

/* Script Sect */
.script-sect {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  margin-bottom: 8px;
  overflow: hidden;
}
.script-sect-hd {
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background .15s;
}
.script-sect-hd:hover { background: var(--bg-elevated); }

/* Pills */
.pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 9px;
  font-family: var(--font-mono);
  margin: 2px;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.pill-neutral { background: var(--bg-elevated); color: var(--text-2); border: 1px solid var(--border-subtle); }

.ep-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  padding: 14px 18px;
  cursor: pointer;
  transition: all .2s ease;
  margin-bottom: 8px;
}
.ep-card:hover { border-color: var(--border-medium); background: var(--bg-elevated); }
.ep-card.active { border-color: var(--brass); background: var(--bg-overlay); box-shadow: 0 0 12px var(--brass-faint); }
</style>

<script>
// ── QB SPINE v2 — API Key + QBP + Multi-provider adapter ───────────────────
(function(){
  var params = new URLSearchParams(window.location.search);
  var urlQBP = params.get('qbp');
  if(urlQBP){
    try{
      var norm = urlQBP.replace(/-/g,'+').replace(/_/g,'/');
      localStorage.setItem('qb_qbp', atob(norm));
    }catch(e){ console.warn('QB qbp decode failed', e); }
  }
  try{ window.QB_QBP = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); }catch(e){ window.QB_QBP = {}; }

  window.QB_AI = async function(systemPrompt, userPrompt, maxTokens){
    maxTokens = maxTokens || 4000;
    var body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    };
    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    var d = await res.json();
    if(d && d.error) throw new Error(d.error.message || d.error || 'AI request failed');
    var text = d && d.content && d.content[0] && d.content[0].text;
    if(!text) throw new Error('Empty response from AI service');
    return text;
  };

  window.QB_AUTOFILL = function(fieldMap){
    if(!window.QB_QBP || !fieldMap) return;
    var inputSetter   = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,   'value') && Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,   'value').set;
    var textAreaSetter= Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype,'value') && Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype,'value').set;
    var selectSetter  = Object.getOwnPropertyDescriptor(window.HTMLSelectElement.prototype,  'value') && Object.getOwnPropertyDescriptor(window.HTMLSelectElement.prototype,  'value').set;
    Object.entries(fieldMap).forEach(function(kv){
      var el = document.getElementById(kv[0]) || document.querySelector('[data-qbp="'+kv[1]+'"]');
      if(!el || el.value || window.QB_QBP[kv[1]] === undefined) return;
      var setter = el.tagName==='TEXTAREA' ? textAreaSetter : el.tagName==='SELECT' ? selectSetter : inputSetter;
      if(setter) setter.call(el, String(window.QB_QBP[kv[1]]));
      else el.value = String(window.QB_QBP[kv[1]]);
      el.dispatchEvent(new Event('input',  { bubbles: true }));
      el.dispatchEvent(new Event('change', { bubbles: true }));
    });
  };
})();
// ─────────────────────────────────────────────────────────────────────────────
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const ARCHETYPES=['The Rebel','The Sage','The Creator','The Ruler','The Magician','The Hero','The Explorer','The Caregiver','The Jester','The Everyman','The Innocent'];
const NATURAL_FORCES=['The Ocean','Lightning','Wildfire','The River','The Earthquake','The Sunrise'];
const STEPS=['QBP Input','Generating','Strategy'];

const ML=({c,children,mb=8})=><div className="font-mono" style={{fontSize:9,letterSpacing:'.15em',color:c||'var(--text-3)',textTransform:'uppercase',marginBottom:mb}}>{children}</div>;
const Card=({children,accent,style={}})=><div className="glass-card" style={{padding:'20px 24px',borderColor:accent||'var(--border-subtle)',...style}}>{children}</div>;

const TF=({label,value,onChange,placeholder,rows=1,hint})=>(
  <div style={{marginBottom:18}}>
    <ML>{label}</ML>
    {rows>1?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}/>
    :<input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>}
    {hint&&<div style={{fontSize:12,color:'var(--text-3)',marginTop:6,fontStyle:'italic'}}>{hint}</div>}
  </div>
);

const SF=({label,options,value,onChange})=>(
  <div style={{marginBottom:18}}>
    <ML>{label}</ML>
    <select value={value} onChange={e=>onChange(e.target.value)}>
      <option value="">— select —</option>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  </div>
);

const Sec=({title,n,children,note})=>(
  <div style={{marginBottom:36}}>
    <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:18,paddingBottom:12,borderBottom:'1px solid var(--border-subtle)'}}>
      <span className="font-mono" style={{fontSize:10,color:'var(--patina)',letterSpacing:'.2em'}}>0{n}</span>
      <span style={{fontSize:14,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--text-1)'}}>{title}</span>
      {note&&<span style={{fontSize:12,color:'var(--text-3)',marginLeft:'auto'}}>{note}</span>}
    </div>
    {children}
  </div>
);

// ── SCRIPT VIEWER ─────────────────────────────────────────────────────────────
const ScriptSection=({label,content,color,accent})=>{
  const [open,setOpen]=useState(label.includes('Hook'));
  const [copied,setCopied]=useState(false);
  const copy=async()=>{try{await navigator.clipboard.writeText(content);setCopied(true);setTimeout(()=>setCopied(false),1800);}catch(e){}};
  return(
    <div className="script-sect">
      <div className="script-sect-hd" onClick={()=>setOpen(!open)}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:color}}/>
          <span style={{fontSize:13,fontWeight:500,color:'var(--text-1)',letterSpacing:'.02em'}}>{label}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {open&&<button onClick={e=>{e.stopPropagation();copy();}} style={{background:'var(--bg-elevated)',border:'1px solid var(--border-subtle)',color:copied?'var(--patina)':'var(--text-3)',padding:'4px 10px',borderRadius:4,fontSize:10,fontFamily:'var(--font-mono)',letterSpacing:'.08em',textTransform:'uppercase',transition:'all .2s'}}>
            {copied?'Copied ✓':'Copy'}
          </button>}
          <span style={{color:'var(--text-3)',fontSize:11,transform:open?'rotate(180deg)':'none',transition:'transform .2s'}}>↓</span>
        </div>
      </div>
      {open&&(
        <div className="fade-in" style={{padding:'0 16px 16px',borderTop:'1px solid var(--border-subtle)'}}>
          <div style={{background:'var(--bg-deep)',borderRadius:6,padding:'16px 20px',fontSize:14,color:'var(--text-2)',whiteSpace:'pre-wrap',marginTop:12,maxHeight:400,overflowY:'auto'}}>
            {content}
          </div>
        </div>
      )}
    </div>
  );
};

const ScriptDetail=({video,index})=>{
  const [tab,setTab]=useState('script');
  if(!video) return null;
  const seriesColors=['var(--phase-creation)','var(--phase-intel)','var(--phase-execution)'];
  const seriesColor=seriesColors[Math.floor(index/2)%3]||'var(--phase-creation)';

  return(
    <div className="fade-in glass-card" style={{padding: '24px'}}>
      <div style={{marginBottom:24}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <span className="font-mono" style={{fontSize:10,color:seriesColor,border:`1px solid ${seriesColor}`,padding:'3px 8px',borderRadius:4,opacity:0.9}}>
            EP{String(index+1).padStart(2,'0')} · {video.series}
          </span>
          <span className="pill pill-neutral">{video.format}</span>
          <span className="pill pill-neutral">{video.duration}</span>
        </div>
        <h3 className="font-serif" style={{fontSize:24,color:'var(--text-1)',lineHeight:1.3,marginBottom:8}}>{video.title}</h3>
        <p style={{fontSize:14,color:'var(--text-3)',fontStyle:'italic'}}>{video.premise}</p>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:20,borderBottom:'1px solid var(--border-subtle)',paddingBottom:12}}>
        {['script','thumbnail','repurpose','metadata'].map(t=>(
          <button key={t} className={`tab-btn${tab===t?' active':''}`} onClick={()=>setTab(t)}>
            {t==='repurpose'?'Repurpose':t}
          </button>
        ))}
      </div>

      {tab==='script'&&(
        <div className="fade-in">
          {video.hook&&<ScriptSection label="Hook — first 30 seconds" content={video.hook} color="var(--phase-content)"/>}
          {video.intro&&<ScriptSection label="Intro — context + promise" content={video.intro} color="var(--phase-intel)"/>}
          {video.body&&video.body.map((s,i)=>(
            <ScriptSection key={i} label={`Act ${i+1} — ${s.title||'Body section'}`} content={s.content} color="var(--phase-creation)"/>
          ))}
          {video.transition&&<ScriptSection label="Transition / midpoint" content={video.transition} color="var(--phase-execution)"/>}
          {video.cta&&<ScriptSection label="CTA — end card" content={video.cta} color="var(--phase-discovery)"/>}
        </div>
      )}

      {tab==='thumbnail'&&(
        <div className="fade-in">
          <Card accent="var(--border-strong)" style={{marginBottom:12}}>
            <ML c="var(--text-2)">Thumbnail concept</ML>
            <p style={{fontSize:14,color:'var(--text-1)',lineHeight:1.7,marginBottom:16}}>{video.thumbnailConcept}</p>
            {video.thumbnailText&&(
              <div style={{background:'var(--bg-deep)',borderRadius:6,padding:'12px 16px',marginBottom:12,border:'1px solid var(--border-subtle)'}}>
                <ML c="var(--text-3)" mb={6}>On-image text</ML>
                <p className="font-serif" style={{fontSize:18,color:'var(--text-1)'}}>{video.thumbnailText}</p>
              </div>
            )}
            {video.thumbnailMidjourney&&(
              <div>
                <ML c="var(--text-3)" mb={6}>Midjourney prompt</ML>
                <div className="font-mono" style={{fontSize:11,color:'var(--text-2)',background:'var(--bg-deep)',borderRadius:6,padding:'12px 16px',lineHeight:1.7,wordBreak:'break-word',border:'1px solid var(--border-subtle)'}}>
                  {video.thumbnailMidjourney}
                </div>
              </div>
            )}
          </Card>
          {video.titleVariants&&(
            <Card>
              <ML c="var(--text-2)">Title variants — A/B test these</ML>
              {video.titleVariants.map((t,i)=>(
                <div key={i} style={{padding:'10px 0',borderBottom:i<video.titleVariants.length-1?'1px solid var(--border-subtle)':'',fontSize:14,color:'var(--text-1)'}}>{t}</div>
              ))}
            </Card>
          )}
        </div>
      )}

      {tab==='repurpose'&&(
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{fontSize:13,color:'var(--text-2)',lineHeight:1.6,padding:'12px 16px',background:'var(--bg-surface)',borderRadius:8,border:'1px solid var(--border-subtle)'}}>
            One video → {(video.reels?.length||0) + (video.linkedinPost?1:0) + (video.tweetThread?1:0) + (video.newsletterAngle?1:0)} repurposed assets. Same intelligence, different surfaces.
          </div>
          {video.reels?.map((reel,i)=>(
            <Card key={i} accent="var(--border-strong)">
              <ML c="var(--text-1)">Reel / Short {i+1} — {reel.angle}</ML>
              <div style={{marginBottom:12}}>

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [step,setStep]=useState(0);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [result,setResult]=useState(null);
  const [activeVideo,setActiveVideo]=useState(0);
  const [mainTab,setMainTab]=useState('channel');

  const [brandName,setBrandName]=useState('');
  const [founderName,setFounderName]=useState('');
  const [brandEssence,setBrandEssence]=useState('');
  const [spark,setSpark]=useState('');
  const [naturalForce,setNaturalForce]=useState('');
  const [archetype,setArchetype]=useState('');
  const [manifestoLine,setManifestoLine]=useState('');
  const [antiBrand,setAntiBrand]=useState('');
  const [primaryPersona,setPrimaryPersona]=useState('');
  const [offer,setOffer]=useState('');
  const [transformation,setTransformation]=useState('');
  const [methodName,setMethodName]=useState('');
  const [voiceNotes,setVoiceNotes]=useState('');
  const [channelGoal,setChannelGoal]=useState('');
  const [videoStyle,setVideoStyle]=useState('');
  const [existingContent,setExistingContent]=useState('');

  useEffect(() => {
    const q = window.QB_QBP || {};
    const hy = (val, fn) => { if (val !== undefined && val !== null && val !== '') fn(String(val)); };
    hy(q.brandName,          setBrandName);
    hy(q.founderName || q.hostName, setFounderName);
    hy(q.brandEssence,       setBrandEssence);
    hy(q.spark,              setSpark);
    hy(q.naturalForce,       setNaturalForce);
    hy(q.archetype,          setArchetype);
    hy(q.manifesto || q.manifestoLine, setManifestoLine);
    hy(q.antiBrand,          setAntiBrand);
    hy(q.primaryPersona,     setPrimaryPersona);
    hy(q.offer,              setOffer);
    hy(q.transformation,     setTransformation);
    hy(q.methodName,         setMethodName);
    hy(q.voiceNotes,         setVoiceNotes);
    hy(q.channelGoal,        setChannelGoal);
    hy(q.videoStyle,         setVideoStyle);
    hy(q.existingContent,    setExistingContent);
  }, []);

  const isValid=()=>brandName&&brandEssence&&naturalForce&&archetype&&primaryPersona&&offer;

  const buildSystemPrompt=()=>`You are the YouTube Strategy Agent inside the Quantum Branding BrandOS ecosystem.
Your function is to produce a complete YouTube channel strategy and 6 fully scripted videos from a Quantum Brand Profile.
These are not outlines. Scripts must be complete, on-brand, ready to record. Each video also has a full repurpose pack.
Return ONLY valid JSON. No markdown. No preamble. Honor the requested schema exactly.
Every script section must be word-for-word spoken language, not bullet points or stage directions.
Hooks must be exceptional and retention-aware.
Each video must include exactly 3 reels: Instagram Reels, TikTok, and YouTube Shorts.`;

  const buildUserPrompt=()=>`QUANTUM BRAND PROFILE:
Brand: ${brandName}
Founder / Host: ${founderName||'[Host]'}
Brand Essence: ${brandEssence}
The Spark: ${spark||'not specified'}
Natural Force: ${naturalForce}
Archetype: ${archetype}
Manifesto: ${manifestoLine||'not specified'}
Anti-Brand: ${antiBrand||'not specified'}
Primary Persona: ${primaryPersona}
Core Offer: ${offer}
Transformation: ${transformation||'not specified'}
Method Name: ${methodName||'not specified'}
Voice Notes: ${voiceNotes||'not specified'}
Channel Goal: ${channelGoal||'Build authority, attract ideal clients'}
Video Style Preference: ${videoStyle||'not specified'}
Existing Content: ${existingContent||'none'}

Return a JSON object with EXACTLY this structure:
{
  "channel": {
    "positioningStatement": "one sentence — what this channel is, who it's for, why it exists",
    "premise": "2-3 sentences on the channel's unique angle in the space",
    "targetViewer": "specific viewer description — who watches, what they carry, what they seek",
    "series": [
      {
        "name": "series name",
        "premise": "2-3 sentence series premise",
        "cadence": "posting frequency",
        "pillars": ["content pillar 1","content pillar 2","content pillar 3"]
      }
    ],
    "channelOptimizations": ["specific action to optimize channel page"],
    "repurposeSystem": "2-3 sentences on the repurpose flywheel"
  },
  "videos": [
    {
      "videoNumber": 1,
      "series": "which series this belongs to",
      "title": "the video title — SEO-aware but brand-voice-true",
      "premise": "one sentence on what this video is about",
      "format": "Talking head | Essay | Tutorial | Interview | Documentary | Manifesto",
      "duration": "estimated duration e.g. 8-12 min",
      "hook": "the complete first 30 seconds — word for word",
      "intro": "the next 60-90 seconds — context, stakes, what the viewer will get",
      "body": [
        {"title": "act/section title", "content": "complete word-for-word script"},
        {"title": "act/section title", "content": "complete word-for-word script"},
        {"title": "act/section title", "content": "complete word-for-word script"}
      ],
      "transition": "midpoint transition — script",
      "cta": "the end card — in brand voice",
      "thumbnailConcept": "visual concept for the thumbnail",
      "thumbnailText": "the 2-5 word on-image text",
      "thumbnailMidjourney": "complete Midjourney v6 prompt for thumbnail visual",
      "titleVariants": ["variant A", "variant B", "variant C"],
      "description": "full YouTube description — hook paragraph, bullets, CTA, hashtags",
      "tags": ["tag1","tag2","tag3","tag4","tag5","tag6","tag7","tag8"],
      "reels": [
        {
          "angle": "what angle this reel takes from the video",
          "duration": "15-30s | 30-60s | 60s",
          "platform": "Instagram Reels | TikTok | YouTube Shorts",
          "hookType": "hook type",
          "hook": "the reel opening line",
          "script": "complete word-for-word reel script"
        }
      ],
      "linkedinPost": "complete LinkedIn post adapted from this video",
      "tweetThread": "complete X / Twitter thread adapted from this video",
      "newsletterAngle": "how this video becomes a newsletter issue"
    }
  ]
}

REQUIREMENTS:
- Exactly 6 videos — 2 per series
- Exactly 3 series
- Every script section must be WORD FOR WORD — not bullet points, not directions
- Hooks must be exceptional — the first 30 seconds determine 80% of retention. No generic intros.
- Each video gets exactly 3 reels — one per platform (Instagram Reels, TikTok, YouTube Shorts)
- Voice must match the QBP voice notes throughout
- Body sections: 3 acts per video minimum, each fully scripted
- Series: exactly 3 distinct series with 2 videos each`;

  const run=async()=>{
    if(loading) return;
    if(!isValid()){setError('Complete required fields (*).');return;}
    setError('');setLoading(true);setStep(1);
    try{
      const res=await fetch('/api/claude',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:14000,
          system:buildSystemPrompt(),
          messages:[{role:'user',content:buildUserPrompt()}]
        })
      });
      const d=await res.json();
      if(d && d.error) throw new Error(d.error.message || d.error || 'AI request failed');
      const text = d && d.content && d.content[0] && d.content[0].text;
      if(!text) throw new Error('Empty response from AI service');
      const clean=text.trim().replace(/^```json\s*/,'').replace(/\s*```$/,'').replace(/^```\s*/,'').trim();
      const parsed=JSON.parse(clean);
      if(!parsed.videos || !parsed.videos.length) throw new Error('AI returned no videos');
      setResult(parsed);
      setActiveVideo(0);setMainTab('channel');setStep(2);
    }catch(e){setError('Agent error: '+e.message);setStep(0);}
    finally{setLoading(false);}
  };

  const exportAll=()=>{
    if(!result) return;
    const lines=[`YOUTUBE STRATEGY PACK — ${brandName}`,'Generated by QB BrandOS — YouTube Strategy Agent',''];
    result.videos?.forEach(v=>{
      lines.push(`${'='.repeat(60)}`);
      lines.push(`EP${String(v.videoNumber).padStart(2,'0')} — ${v.title}`);
      lines.push(`Series: ${v.series} | Format: ${v.format} | ${v.duration}`);
      lines.push('');
      lines.push('HOOK:');lines.push(v.hook||'');lines.push('');
      lines.push('INTRO:');lines.push(v.intro||'');lines.push('');
      v.body?.forEach((s,i)=>{lines.push(`ACT ${i+1} — ${s.title}:`);lines.push(s.content||'');lines.push('');});
      if(v.cta){lines.push('CTA:');lines.push(v.cta);lines.push('');}
      lines.push('REELS:');
      v.reels?.forEach((r,i)=>{lines.push(`Reel ${i+1} (${r.platform}): ${r.hook}`);lines.push(r.script||'');lines.push('');});
      lines.push('');
    });
    const blob=new Blob([lines.join('\n')],{type:'text/plain'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`${brandName.replace(/\s+/g,'-').toLowerCase()}-youtube-strategy.txt`;
    a.click();
  };

  const videos=result?.videos||[];

  return(
    <div className="main-content" style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header className="glass-card" style={{borderBottom:'1px solid var(--border-medium)',padding:'16px 28px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:50,borderRadius:0,background:'var(--bg-overlay)'}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div className="pulse-dot"></div>
          <div className="font-mono" style={{fontSize:11,letterSpacing:'.3em',color:'var(--brass)',textTransform:'uppercase',fontWeight:700}}>QB_BRANDOS</div>
          <div style={{width:1,height:14,background:'var(--border-strong)'}}/>
          <div className="font-mono" style={{fontSize:10,letterSpacing:'.2em',color:'var(--text-3)',textTransform:'uppercase'}}>YouTube Strategy Agent</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {STEPS.map((s,i)=>(
            <React.Fragment key={i}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:i<step?'var(--patina)':i===step?'var(--brass)':'var(--border-strong)',opacity:i===step?1:i<step?0.8:0.4,boxShadow:i===step?'0 0 8px rgba(168,144,62,0.7)':''}}/>
                <span className="font-mono" style={{fontSize:10,color:i<=step?'var(--text-2)':'var(--text-4)',letterSpacing:'.1em'}}>{s}</span>
              </div>
              {i<STEPS.length-1&&<div style={{width:16,height:1,background:'var(--border-medium)',margin:'0 2px'}}/>}
            </React.Fragment>
          ))}
          <button onClick={toggleTheme} className="theme-toggle">Theme</button>
        </div>
      </header>

      <main style={{flex:1,maxWidth:1140,margin:'0 auto',width:'100%',padding:'48px 24px'}}>

        {step===0&&(
          <div className="fade-in">
            <div style={{marginBottom:48}}>
              <ML c="var(--patina)">// Phase 03 — Content Creation</ML>
              <h1 className="font-serif" style={{fontSize:42,fontWeight:400,lineHeight:1.1,marginBottom:12,color:'var(--text-1)'}}>YouTube Strategy Agent</h1>
              <p style={{color:'var(--text-2)',fontSize:15,lineHeight:1.8,maxWidth:680}}>Channel positioning, 3 series architectures, 6 fully scripted videos, and a repurpose pack for each — Reels, LinkedIn posts, and newsletter angles. One brand, every platform.</p>
            </div>

            <Sec n={1} title="Brand & Channel Core" note="* required">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
                <TF label="Brand Name *" value={brandName} onChange={setBrandName} placeholder="The brand behind the channel" rows={1}/>
                <TF label="Host Name *" value={founderName} onChange={setFounderName} placeholder="Who appears on camera" rows={1}/>
              </div>
              <TF label="Brand Essence *" value={brandEssence} onChange={setBrandEssence} placeholder="Irreducible truth" rows={2}/>
              <TF label="The Spark" value={spark} onChange={setSpark} placeholder="Who this brand is, why it exists, what transformation it creates" rows={3}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
                <SF label="Natural Force *" options={NATURAL_FORCES} value={naturalForce} onChange={setNaturalForce}/>
                <SF label="Primary Archetype *" options={ARCHETYPES} value={archetype} onChange={setArchetype}/>
              </div>
            </Sec>

            <Sec n={2} title="Offer & Method">
              <TF label="Primary Persona *" value={primaryPersona} onChange={setPrimaryPersona} placeholder="Who watches — their role, struggle, desire. Specific." rows={3} hint="The more specific, the more precisely targeted every script will be"/>
              <TF label="Core Offer *" value={offer} onChange={setOffer} placeholder="What you sell — format and transformation" rows={2}/>
              <TF label="Transformation" value={transformation} onChange={setTransformation} placeholder="Before → after" rows={1}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
                <TF label="Method / Framework Name" value={methodName} onChange={setMethodName} placeholder="e.g. Quantum Branding, BrandOS" rows={1}/>
                <TF label="Manifesto Line" value={manifestoLine} onChange={setManifestoLine} placeholder="The one belief" rows={1}/>
              </div>
            </Sec>

            <Sec n={3} title="Voice & Production">
              <TF label="Voice Notes" value={voiceNotes} onChange={setVoiceNotes} placeholder="How this brand talks on video — rhythm, tone, what it refuses to sound like" rows={2}/>
              <TF label="Anti-Brand" value={antiBrand} onChange={setAntiBrand} placeholder="What this channel refuses to be" rows={1}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
                <TF label="Video Style Preference" value={videoStyle} onChange={setVideoStyle} placeholder="e.g. Talking head, B-roll heavy, essay style, documentary" rows={1}/>
                <TF label="Channel Goal" value={channelGoal} onChange={setChannelGoal} placeholder="e.g. Build authority, drive discovery calls, grow audience" rows={1}/>
              </div>
              <TF label="Existing Content / What's been done" value={existingContent} onChange={setExistingContent} placeholder="Any existing videos or content directions to build on or avoid" rows={2}/>
            </Sec>

            {error&&<div style={{background:'var(--bg-surface)',border:'1px solid var(--status-error)',borderRadius:8,padding:'14px 18px',marginBottom:24,fontSize:14,color:'var(--status-error)'}}>{error}</div>}
            
            <div style={{display:'flex',justifyContent:'flex-end',marginTop:24}}>
              <button onClick={run} disabled={!isValid()} className="btn-primary">
                Generate YouTube Strategy →
              </button>
            </div>
          </div>
        )}

        {step===1&&(
          <div className="fade-in" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:500,gap:32,textAlign:'center'}}>
            <div style={{width:64,height:64,border:'2px solid var(--border-medium)',borderTop:'2px solid var(--brass)',borderRadius:'50%'}} className="spin"/>
            <div>
              <ML c="var(--brass)">Agent Processing</ML>
              <div className="font-serif" style={{color:'var(--text-1)',fontSize:22,lineHeight:1.8,maxWidth:480,fontStyle:'italic'}}>
                Weaving identity into narrative architecture...
              </div>
            </div>
            <div className="font-mono" style={{fontSize:11,color:'var(--text-3)'}}>3 series · 6 scripts · 18 reels · full repurpose</div>
          </div>
        )}

        {step===2&&result&&(
          <div className="fade-in">
            <div style={{marginBottom:32,display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:16}}>
              <div>
                <ML c="var(--patina)">// YouTube Strategy — Complete</ML>
                <h1 className="font-serif" style={{fontSize:32,fontWeight:400,marginBottom:8,color:'var(--text-1)'}}>{brandName}</h1>
                <p style={{color:'var(--text-3)',fontSize:14}}>3 series · 6 videos · 18 reels · complete repurpose system</p>
              </div>
              <div style={{display:'flex',gap:12}}>
                <button onClick={exportAll} style={{background:'var(--bg-surface)',border:'1px solid var(--border-medium)',color:'var(--text-2)',padding:'10px 18px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'.1em',textTransform:'uppercase',transition:'all 0.2s'}}>Export Scripts</button>
                <button onClick={()=>{setStep(0);setResult(null);}} style={{background:'var(--bg-surface)',border:'1px solid var(--border-medium)',color:'var(--text-2)',padding:'10px 18px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'.1em',textTransform:'uppercase',transition:'all 0.2s'}}>New Strategy</button>
              </div>
            </div>

            <div style={{display:'flex',gap:8,marginBottom:28,paddingBottom:16,borderBottom:'1px solid var(--border-subtle)'}}>
              <button className={`tab-btn${mainTab==='channel'?' active':''}`} onClick={()=>setMainTab('channel')}>Channel Strategy</button>
              <button className={`tab-btn${mainTab==='videos'?' active':''}`} onClick={()=>setMainTab('videos')}>Scripts + Repurpose</button>
            </div>

            {mainTab==='channel'&&<ChannelStrategy data={result}/>}

            {mainTab==='videos'&&(
              <div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:32,alignItems:'start'}}>
                <div>
                  <ML c="var(--text-3)" mb={16}>6 videos — select to view</ML>
                  {videos.map((v,i)=>{
                    const seriesColors=['var(--phase-creation)','var(--phase-creation)','var(--phase-intel)','var(--phase-intel)','var(--phase-execution)','var(--phase-execution)'];
                    const sc=seriesColors[i]||'var(--phase-creation)';
                    return(
                      <div key={i} className={`ep-card${activeVideo===i?' active':''}`} onClick={()=>setActiveVideo(i)}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                          <span className="font-mono" style={{fontSize:9,color:sc,border:`1px solid ${sc}`,padding:'2px 6px',borderRadius:3,opacity:0.8}}>EP{String(i+1).padStart(2,'0')}</span>
                          <span className="font-mono" style={{fontSize:10,color:'var(--text-3)'}}>{v.series}</span>
                        </div>
                        <div className="font-serif" style={{fontSize:16,fontWeight:400,color:'var(--text-1)',lineHeight:1.3,marginBottom:8}}>{v.title}</div>
                        <div style={{display:'flex',gap:4}}>
                          <span className="pill pill-neutral">{v.format}</span>
                          <span className="pill pill-neutral">{v.duration}</span>

                    );

      <footer style={{borderTop:'1px solid var(--border-subtle)',padding:'24px 32px',display:'flex',justifyContent:'space-between',background:'var(--bg-deep)'}}>
        <span className="font-mono" style={{fontSize:10,color:'var(--text-3)',letterSpacing:'.2em',textTransform:'uppercase'}}>Quantum Branding BrandOS</span>
        <span className="font-mono" style={{fontSize:10,color:'var(--text-3)',letterSpacing:'.15em'}}>YouTube Strategy Agent / Phase 03</span>
      </footer>
    </div>
  );
}

// ── QB CONTENT APPROVAL LOOP ─────────────────────────────────────────────────
function QBApprovalWrapper({items, renderItem, onAllApproved, itemKey='id', revisionField='content'}) {
  const [states, setStates] = React.useState(() => {
    const s = {};
    items.forEach((item,i) => { s[i] = {status:'pending', round:0, feedback:'', item}; });
    return s;
  });
  const [revising, setRevising] = React.useState({});

  const allApproved = Object.values(states).every(s => s.status === 'approved' || s.status === 'removed');
  const approvedItems = Object.values(states).filter(s => s.status === 'approved').map(s => s.item);

  React.useEffect(() => {
    if (allApproved && approvedItems.length > 0) onAllApproved && onAllApproved(approvedItems);
  }, [allApproved]);

  const approve = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'approved'}}));
  const remove = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'removed'}}));
  const startRevise = (i) => setRevising(prev => ({...prev, [i]: true}));
  const submitRevise = async (i) => {
    const feedback = document.getElementById('revision-input-' + i)?.value || '';
    if (!feedback.trim()) return;
    setStates(prev => ({...prev, [i]: {...prev[i], status:'revising', round: prev[i].round + 1, feedback}}));
    setRevising(prev => ({...prev, [i]: false}));
    if (window.QB_AI && states[i].round < 3) {
      try {
        const original = JSON.stringify(states[i].item);
        const prompt = 'You produced this content piece: ' + original + '\n\nThe user requests this revision: ' + feedback + '\n\nReturn ONLY the revised version as a JSON object with the same structure. No markdown, no preamble.';
        const sys = 'You are a content revision agent. Revise the content piece exactly as requested. Maintain brand voice and platform requirements. Return only valid JSON.';
        const raw = await window.QB_AI(sys, prompt, 1000);
        const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').replace(/^```\s*/,'').trim();
        const revised = JSON.parse(clean);
        setStates(prev => ({...prev, [i]: {...prev[i], status:'revised', item: revised}}));
      } catch(e) {
        setStates(prev => ({...prev, [i]: {...prev[i], status:'pending'}}));
      }
    }
  };

  const statusColor = {pending:'var(--text-3)', approved:'var(--patina)', removed:'var(--status-error)', revising:'var(--brass)', revised:'var(--phase-creation)'};
  const statusLabel = {pending:'Pending review', approved:'✓ Approved', removed:'Removed', revising:'Revising…', revised:'Revised — review again'};

  return (
    <div>
      <div style={{background:'var(--bg-surface)',border:'1px solid var(--border-medium)',borderRadius:8,padding:'16px 20px',marginBottom:24,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <div className="font-mono" style={{fontSize:10,color:'var(--patina)',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:4}}>Content Review</div>
          <div style={{fontSize:13,color:'var(--text-2)'}}>{Object.values(states).filter(s=>s.status==='approved').length} approved · {Object.values(states).filter(s=>s.status==='pending'||s.status==='revised').length} pending · {Object.values(states).filter(s=>s.status==='removed').length} removed</div>
        </div>
        {allApproved && approvedItems.length > 0 && (
          <div className="font-mono" style={{fontSize:11,padding:'8px 16px',borderRadius:6,background:'var(--patina)',color:'#E6DDD0',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase'}}>All done ✓</div>
        )}
      </div>
      {items.map((item, i) => {
        const s = states[i];
        if (!s) return null;
        const isRevising = revising[i];
        const maxRoundsReached = s.round >= 3;
        return (
          <div key={i} className="glass-card" style={{borderColor:(s.status==='approved'?'var(--patina)':s.status==='removed'?'var(--status-error)':'var(--border-subtle)'),marginBottom:16,opacity:s.status==='removed'?0.4:1}}>
            <div style={{padding:'20px 24px 0'}}>
              {renderItem(s.item, i)}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 24px',borderTop:'1px solid var(--border-subtle)',background:'var(--bg-deep)',flexWrap:'wrap'}}>
              <div className="font-mono" style={{fontSize:10,color:statusColor[s.status],letterSpacing:'.1em',flex:1,textTransform:'uppercase'}}>
                {statusLabel[s.status]} {s.round > 0 ? '(Round '+s.round+'/3)' : ''}
              </div>
              {(s.status==='pending'||s.status==='revised') && !isRevising && (
                <>
                  <button onClick={()=>approve(i)} style={{background:'var(--patina-faint)',color:'var(--patina)',border:'1px solid var(--patina-dim)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'.08em',cursor:'pointer'}}>✓ Approve</button>
                  {!maxRoundsReached && <button onClick={()=>startRevise(i)} style={{background:'var(--brass-faint)',color:'var(--brass)',border:'1px solid var(--brass-dim)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'.08em',cursor:'pointer'}}>↻ Revise</button>}
                  <button onClick={()=>remove(i)} style={{background:'rgba(138,74,74,0.08)',color:'var(--status-error)',border:'1px solid rgba(138,74,74,0.15)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'.08em',cursor:'pointer'}}>× Remove</button>
                </>
              )}
              {s.status==='approved' && <button onClick={()=>setStates(prev=>({...prev,[i]:{...prev[i],status:'pending'}}))} style={{background:'none',color:'var(--text-3)',border:'1px solid var(--border-subtle)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',cursor:'pointer'}}>Undo</button>}
              {s.status==='revising' && <div className="font-mono" style={{fontSize:10,color:'var(--brass)'}}>Generating revision…</div>}
            </div>
            {isRevising && (
              <div style={{padding:'16px 24px',background:'var(--bg-surface)',borderTop:'1px solid var(--border-subtle)'}}>
                <div className="font-mono" style={{fontSize:10,color:'var(--brass)',letterSpacing:'.1em',marginBottom:8}}>REVISION REQUEST {s.round+1}/3</div>
                <textarea id={'revision-input-'+i} placeholder="What should change? Be specific..." style={{width:'100%',background:'var(--bg-deep)',border:'1px solid var(--brass-dim)',color:'var(--text-1)',borderRadius:6,padding:'12px 16px',fontSize:14,fontFamily:'var(--font-sans)',resize:'vertical',minHeight:70,outline:'none'}} rows={2}/>
                <div style={{display:'flex',gap:10,marginTop:12}}>
                  <button onClick={()=>submitRevise(i)} style={{background:'var(--brass)',color:'#111',padding:'8px 20px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',fontWeight:700,letterSpacing:'.08em',cursor:'pointer',border:'none'}}>Submit Revision →</button>
                  <button onClick={()=>setRevising(prev=>({...prev,[i]:false}))} style={{background:'none',color:'var(--text-3)',border:'1px solid var(--border-subtle)',padding:'8px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',cursor:'pointer'}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
// ─────────────────────────────────────────────────────────────────────────────

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
