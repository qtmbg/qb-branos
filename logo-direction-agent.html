<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root, [data-theme="dark"] {
  --bg-void: #080604; --bg-deep: #0A0806; --bg-base: #0E0C09;

  --border-subtle: rgba(140,110,70,0.06); --border-medium: rgba(140,110,70,0.11); --border-strong: rgba(140,110,70,0.18);

  --text-1: #DDD4C4; --text-2: #A89A88; --text-3: #6A5E50; --text-4: #3E3830;
  --error: #8A4A4A;
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

[data-theme="light"] {
  --bg-void: #F4F0EB; --bg-deep: #EDE8E2; --bg-base: #E6E0D8;
  --bg-surface: rgba(100,80,50,0.04); --bg-elevated: rgba(100,80,50,0.07);
  --bg-overlay: rgba(244,240,235,0.9);
  --border-subtle: rgba(100,80,50,0.08); --border-medium: rgba(100,80,50,0.14); --border-strong: rgba(100,80,50,0.22);
  --patina: #2E4E3C; --patina-lit: #3A6A4E; --patina-dim: rgba(46,78,60,0.15); --patina-faint: rgba(46,78,60,0.06);
  --brass: #8A7430; --brass-lit: #A08A3A; --brass-dim: rgba(138,116,48,0.15); --brass-faint: rgba(138,116,48,0.05);
  --text-1: #1A1610; --text-2: #5A5040; --text-3: #8A7E70; --text-4: #B8AEA0;
  --error: #A83A3A;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg-void); color: var(--text-2);
  font-family: var(--font-body); min-height: 100vh;
  overflow-x: hidden; line-height: 1.7;
}

.font-display { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.015em; color: var(--text-1); }
.font-mono { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.15em; }

body::after {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}

.vignette-container::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1;
  background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(8,6,4,0.35) 100%);
}
[data-theme="light"] .vignette-container::before {
  background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(200,190,175,0.12) 100%);
}

.glass-card {
  background: var(--bg-overlay); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-subtle); border-radius: 14px;
  position: relative; overflow: hidden;
}
.glass-card::before {
  content: ''; position: absolute; top: -30%; left: -10%; width: 60%; height: 60%;
  background: radial-gradient(ellipse at center, rgba(168,144,62,0.03) 0%, transparent 70%);
  pointer-events: none;
}

/* Inputs */
input[type="text"], textarea, select {
  background: var(--bg-surface); border: 1px solid var(--border-medium);
  color: var(--text-1); font-family: var(--font-body); border-radius: 8px;
  padding: 11px 15px; font-size: 14px; width: 100%; outline: none; transition: all 0.25s ease;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--patina);
  box-shadow: 0 0 0 3px var(--patina-faint), 0 0 20px -4px var(--brass-dim);
}
::placeholder { color: var(--text-3); opacity: 0.7; font-style: italic; }
select option { background: var(--bg-deep); color: var(--text-1); }
textarea { resize: vertical; }

/* Range */
input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
input[type=range]:focus { outline: none; box-shadow: none; }
input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--border-strong); border-radius: 2px; }
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%;
  background: var(--patina); cursor: pointer; margin-top: -7px;
  border: 2px solid var(--bg-base); transition: transform 0.1s, box-shadow 0.2s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); box-shadow: 0 0 10px var(--patina-dim); }

/* Buttons */
.btn-primary {
  background: var(--patina); color: #E6DDD0;
  font-family: var(--font-body); font-weight: 600; font-size: 11px;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 13px 30px; border-radius: 7px; border: none;
  transition: all 0.25s ease; cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary:hover:not(:disabled) {
  background: var(--patina-lit); transform: translateY(-1px);
  box-shadow: 0 4px 24px -4px rgba(58,95,74,0.3), 0 0 0 1px var(--brass-faint);
}
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

.btn-secondary {
  background: var(--bg-surface); color: var(--text-2);
  border: 1px solid var(--border-medium); font-family: var(--font-body);
  font-weight: 600; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 13px 26px; border-radius: 7px; transition: all 0.25s ease; cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-secondary:hover { background: var(--bg-elevated); color: var(--text-1); border-color: var(--brass); }

/* Pills */
.pill-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.pill {
  padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border-medium); background: var(--bg-surface);
  color: var(--text-2); cursor: pointer; transition: all 0.18s ease; user-select: none;
}
.pill:hover { border-color: var(--brass); color: var(--text-1); }
.pill.active { border-color: var(--patina); background: var(--patina-faint); color: var(--text-1); }

/* Misc */
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--brass);
  box-shadow: 0 0 8px var(--brass-dim), 0 0 2px var(--brass);
  animation: beat 3s ease infinite; flex-shrink: 0;
}
@keyframes beat {
  0%,100% { transform: scale(1); opacity: 1; }
  12% { transform: scale(1.35); }
  24% { transform: scale(0.95); opacity: 0.6; }
  36% { transform: scale(1.15); }
  48% { transform: scale(1); opacity: 0.7; }
}

.manifesto-block { position: relative; padding: 24px 0 24px 24px; }
.manifesto-block::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2.5px;
  background: linear-gradient(180deg, var(--brass) 0%, var(--patina) 100%);
  border-radius: 2px;
}

.divider { height: 1px; background: var(--border-subtle); margin: 28px 0; }
.section-label { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-3); }

.tag { font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.1em; color: var(--brass); border: 1px solid var(--brass-dim); padding: 3px 10px; border-radius: 4px; background: var(--brass-faint); }

.error-banner { background: rgba(138,74,74,0.1); border: 1px solid rgba(138,74,74,0.25); border-radius: 8px; padding: 14px 18px; color: #C48888; font-size: 13px; margin-top: 16px; }

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }

@media (max-width: 640px) {
  .hide-mobile { display: none !important; }
  .form-grid { grid-template-columns: 1fr !important; }
  .form-group.full { grid-column: 1 !important; }
}

/* Result markdown */
.result-section-header {
  font-family: var(--font-mono); font-size: 9px; text-transform: uppercase;
  letter-spacing: 0.2em; color: var(--brass); margin-top: 28px; margin-bottom: 10px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border-subtle);
}
.result-section-header:first-child { margin-top: 0; }
.result-bullet { display: flex; gap: 10px; margin-bottom: 7px; padding-left: 2px; }
.result-p { font-size: 14px; color: var(--text-2); line-height: 1.85; margin-bottom: 10px; }

<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var urlQBP = params.get('qbp');
  if(urlQBP){ try{ localStorage.setItem('qb_qbp', atob(urlQBP)); }catch(e){ console.warn('[QB_SPINE] QBP decode failed:', e); } }
  try{ window.QB_QBP = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); }catch(e){ window.QB_QBP = {}; }

  window.QB_AI = async function(sys, usr, maxTok){
    maxTok = maxTok || 4000;
    var res = await fetch('/api/claude', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: maxTok, system: sys, messages: [{ role: 'user', content: usr }] })
    });
    var d = await res.json();
    if(d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    return d.content[0].text;
  };
})();
</script>

<script type="text/babel">
const { useState, useRef } = React;

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const NATURAL_FORCES   = ['The Ocean','Lightning','Wildfire','The River','The Earthquake','The Sunrise'];
const MUSEUM_ROOMS     = ['Impressionism','Surrealism','Bauhaus','Renaissance','Abstract Expressionism','Minimalism','Art Nouveau','Pop Art'];
const MYTH_FIGURES     = ['The Alchemist','The Oracle','The Warrior','The Creator','The Sage','The Trickster','The Sovereign','The Healer'];
const ARCHETYPES       = ['The Innocent','The Explorer','The Sage','The Hero','The Outlaw','The Magician','The Lover','The Jester','The Caregiver','The Ruler','The Creator','The Everyman'];
const PARADOX_OPTIONS  = ['Timeless yet modern','Simple yet profound','Bold yet refined','Familiar yet surprising','Serious yet warm','Minimal yet expressive'];
const INDUSTRIES       = ['Luxury Lifestyle','Technology','Finance & Wealth','Fashion','Health & Wellness','Architecture & Design','Food & Hospitality','Creative Agency','Legal & Professional','Education & Knowledge'];

// ── SYSTEM PROMPT ─────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are the QB BrandOS Logo Direction Agent — a senior brand identity strategist and creative director. Your role is to translate brand strategy inputs into precise, actionable logo creative directions that a world-class designer can execute immediately.

You think in systems. A logo is not decoration — it is compressed meaning. Every curve, weight, spacing decision, and color choice must earn its place by serving the brand's strategic position.

OUTPUT FORMAT — respond with exactly these sections in order:

## STRATEGIC BRIEF
2–3 sentences distilling the core brand tension and what the logo must resolve or embody.

## THE DIRECTION
A poetic but precise name for this logo direction (e.g. "Tempered Sovereignty", "Dissolved Edge"). Follow with 3–4 sentences of directional prose.

## FORM & MARK
Specific guidance on mark type (wordmark / lettermark / symbol / combination), geometry, weight, construction logic. Be precise. Name reference points without copying them.

## TYPOGRAPHY
Primary typeface direction: category, specific characteristics to seek. If custom lettering, describe the modification logic. Mention 2–3 reference typefaces as directional anchors only.

## COLOR ARCHITECTURE
Primary palette with hex codes. Rationale for each. Usage hierarchy. One unexpected accent with careful deployment instructions.

## TEXTURE & FINISH
Surface quality, application contexts — what the logo should feel like in print, screen, embossing, foil.

## WHAT TO AVOID
3–5 specific traps this brand must not fall into. Be blunt.

## THE PROVOCATION
One sentence to pin above the designer's workspace.`;

// ── BUILD PROMPT ──────────────────────────────────────────────────────────────
function buildPrompt(f) {
  return `BRAND INPUTS:

Brand Name: ${f.brandName}
Industry: ${f.industry || 'Not specified'}
One-Line Positioning: ${f.positioning}
Target Audience: ${f.targetAudience || 'Not specified'}
Brand Essence: ${f.brandEssence || 'Not specified'}

Brand Archetype(s): ${f.archetypes.length ? f.archetypes.join(', ') : 'Not selected'}
Natural Force Metaphor: ${f.naturalForce || 'Not selected'}
If This Brand Were a Museum Room: ${f.museumRoom || 'Not selected'}
Mythological Figure: ${f.mythFigure || 'Not selected'}
Core Paradox to Hold: ${f.paradox || 'Not selected'}

Visual Boldness (1=Restraint → 10=Impact): ${f.boldness}/10
Visual Complexity (1=Minimal → 10=Intricate): ${f.complexity}/10
Timelessness (1=Trend-led → 10=Timeless): ${f.timelessness}/10

Existing Brand Color: ${f.existingColor || 'None'}
Absolute Constraints: ${f.constraints || 'None'}
Competitive Context: ${f.competitive || 'Not provided'}
Additional Context: ${f.additionalContext || 'None'}

Generate a complete logo creative direction for this brand.`;
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function ThemeToggle({ theme, onToggle }) {
  return (
    <button onClick={onToggle} className="btn-secondary" style={{ padding:'8px 14px', fontSize:'11px' }}>
      {theme === 'dark' ? '☀ Light' : '◑ Dark'}
    </button>
  );
}

function SectionHeader({ step, title }) {
  return (
    <div style={{ marginBottom:'22px' }}>
      <div className="section-label" style={{ marginBottom:'6px' }}>{step}</div>
      <h2 className="font-display" style={{ fontSize:'20px', color:'var(--text-1)' }}>{title}</h2>
    </div>
  );
}

function Field({ label, hint, children }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'7px' }}>
      <label style={{ fontSize:'11px', fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--text-3)' }}>
        {label}{hint && <span style={{ color:'var(--text-4)', fontWeight:400, textTransform:'none', letterSpacing:0 }}> — {hint}</span>}
      </label>
      {children}
    </div>
  );
}

function PillGroup({ items, value, onChange, multi }) {
  const isActive = item => multi ? (value||[]).includes(item) : value === item;
  const toggle = item => {
    if (!multi) { onChange(value === item ? null : item); return; }
    const arr = value || [];
    if (arr.includes(item)) onChange(arr.filter(x => x !== item));
    else if (arr.length < 3) onChange([...arr, item]);
  };
  return (
    <div className="pill-grid">
      {items.map(item => (
        <button key={item} className={`pill${isActive(item) ? ' active' : ''}`} onClick={() => toggle(item)}>{item}</button>
      ))}
    </div>
  );
}

function Slider({ label, value, onChange, leftLabel, rightLabel }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontSize:'11px', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em', color:'var(--text-3)' }}>{label}</span>
        <span style={{ fontSize:'13px', color:'var(--brass)', fontFamily:'var(--font-mono)', fontWeight:700 }}>{value}</span>
      </div>
      <input type="range" min={1} max={10} value={value} onChange={e => onChange(Number(e.target.value))} />
      <div style={{ display:'flex', justifyContent:'space-between' }}>
        <span style={{ fontSize:'10px', color:'var(--text-4)', fontFamily:'var(--font-mono)' }}>{leftLabel}</span>
        <span style={{ fontSize:'10px', color:'var(--text-4)', fontFamily:'var(--font-mono)' }}>{rightLabel}</span>
      </div>
    </div>
  );
}

function MarkdownOutput({ text }) {
  const elements = [];
  const lines = text.split('\n');
  lines.forEach((line, i) => {
    const h2 = line.match(/^#{1,2} (.+)/);
    const h3 = line.match(/^#{3} (.+)/);
    const bullet = line.match(/^[-•*] (.+)/);
    if (h2) {
      elements.push(<div key={i} className="result-section-header">{h2[1]}</div>);
    } else if (h3) {
      elements.push(<div key={i} style={{ fontSize:'13px', color:'var(--patina-lit)', fontFamily:'var(--font-mono)', letterSpacing:'0.08em', textTransform:'uppercase', marginTop:'16px', marginBottom:'8px' }}>{h3[1]}</div>);
    } else if (bullet) {
      elements.push(
        <div key={i} className="result-bullet">
          <span style={{ color:'var(--brass)', flexShrink:0, marginTop:'3px' }}>◆</span>
          <p className="result-p" style={{ margin:0 }}>{bullet[1]}</p>
        </div>
      );
    } else if (line.trim()) {
      elements.push(<p key={i} className="result-p">{line}</p>);
    }
  });
  return <div>{elements}</div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [theme, setTheme] = useState(() => { try { return localStorage.getItem('qb-theme') || 'light'; } catch(e) { return 'dark'; } });
  const toggleTheme = () => {
    const t = theme === 'dark' ? 'light' : 'dark';
    setTheme(t); document.documentElement.setAttribute('data-theme', t);
    try { localStorage.setItem('qb-theme', t); } catch(e) {}
  };

  const [f, setF] = useState({
    brandName:'', industry:null, positioning:'', targetAudience:'', brandEssence:'',
    archetypes:[], naturalForce:null, museumRoom:null, mythFigure:null, paradox:null,
    boldness:6, complexity:5, timelessness:7,
    existingColor:'', constraints:'', competitive:'', additionalContext:''
  });
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  const [loading, setLoading] = useState(false);
  const [result, setResult]   = useState('');
  const [error, setError]     = useState('');
  const resultRef = useRef(null);

  const canGenerate = f.brandName.trim().length > 0 && f.brandEssence.trim().length > 8;

  const run = async () => {
    if (!canGenerate || loading) return;
    setLoading(true); setError(''); setResult('');
    try {
      const text = await window.QB_AI(SYSTEM_PROMPT, buildPrompt(f), 4000);
      setResult(text);
      setTimeout(() => resultRef.current?.scrollIntoView({ behavior:'smooth', block:'start' }), 120);
    } catch(e) {
      setError(e.message || 'Generation failed. Check your API connection.');
    } finally { setLoading(false); }
  };

  const activeTags = [f.naturalForce, f.museumRoom, f.mythFigure, ...(f.archetypes||[])].filter(Boolean);

  return (
    <div style={{ maxWidth:'800px', margin:'0 auto', padding:'40px 24px 100px' }}>

      {/* TOP BAR */}
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:'52px' }}>
        <div>
          <div style={{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'14px' }}>
            <div className="pulse-dot" />
            <span className="font-mono" style={{ fontSize:'9px', color:'var(--brass)', letterSpacing:'0.2em' }}>QB BRANDOS · LOGO DIRECTION AGENT</span>
          </div>
          <h1 className="font-display" style={{ fontSize:'clamp(28px,5vw,46px)', lineHeight:1.12, marginBottom:'14px' }}>
            Logo Creative<br/>Direction
          </h1>
          <p style={{ fontSize:'14px', color:'var(--text-3)', maxWidth:'460px', lineHeight:'1.75' }}>
            Translate brand essence into precise visual language. No vague briefs. No wasted revisions.
          </p>
        </div>
        <ThemeToggle theme={theme} onToggle={toggleTheme} />
      </div>

      {/* MANIFESTO */}
      <div className="manifesto-block" style={{ marginBottom:'44px' }}>
        <p style={{ fontSize:'15px', color:'var(--text-2)', lineHeight:'1.85', fontStyle:'italic' }}>
          "A logo is not what you see. It is what you feel when you see it — the compressed residue of every decision you've made about who this brand is and who it is not."
        </p>
      </div>

      {/* ── CARD 1: BRAND CONTEXT ─────────────────────────────────────────── */}
      <div className="glass-card" style={{ padding:'32px', marginBottom:'20px' }}>
        <SectionHeader step="01 · Brand Context" title="Who is this brand?" />
        <div className="form-grid" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'18px' }}>
          <Field label="Brand Name">
            <input type="text" placeholder="e.g. Verne, Aurea, Nox Studio" value={f.brandName} onChange={e => set('brandName', e.target.value)} />
          </Field>
          <Field label="Industry">
            <select value={f.industry || ''} onChange={e => set('industry', e.target.value || null)}>
              <option value="">— Select industry —</option>
              {INDUSTRIES.map(i => <option key={i} value={i}>{i}</option>)}
            </select>
          </Field>
          <div className="form-group full" style={{ gridColumn:'1 / -1' }}>
            <Field label="Brand Essence" hint="one or two sentences that capture the soul of this brand">
              <textarea rows={3} placeholder="e.g. A luxury jewellery house for those who collect moments, not things. Quiet confidence. Earned elegance." value={f.brandEssence} onChange={e => set('brandEssence', e.target.value)} />
            </Field>
          </div>
          <div style={{ gridColumn:'1 / -1' }}>
            <Field label="One-Line Positioning">
              <input type="text" placeholder="e.g. The jeweller for women who have stopped performing femininity" value={f.positioning} onChange={e => set('positioning', e.target.value)} />
            </Field>
          </div>
          <div style={{ gridColumn:'1 / -1' }}>
            <Field label="Target Audience" hint="optional">
              <input type="text" placeholder="e.g. Affluent 30–50 collectors, globally mobile, taste-driven" value={f.targetAudience} onChange={e => set('targetAudience', e.target.value)} />
            </Field>
          </div>
        </div>
      </div>

      {/* ── CARD 2: MYTHOLOGY ─────────────────────────────────────────────── */}
      <div className="glass-card" style={{ padding:'32px', marginBottom:'20px' }}>
        <SectionHeader step="02 · Metaphoric Filters" title="What does this brand feel like?" />
        <div style={{ display:'flex', flexDirection:'column', gap:'26px' }}>
          <Field label="Natural Force">
            <PillGroup items={NATURAL_FORCES} value={f.naturalForce} onChange={v => set('naturalForce', v)} />
          </Field>
          <div className="divider" style={{ margin:'0' }} />
          <Field label="Museum Room">
            <PillGroup items={MUSEUM_ROOMS} value={f.museumRoom} onChange={v => set('museumRoom', v)} />
          </Field>
          <div className="divider" style={{ margin:'0' }} />
          <Field label="Mythological Figure">
            <PillGroup items={MYTH_FIGURES} value={f.mythFigure} onChange={v => set('mythFigure', v)} />
          </Field>
          <div className="divider" style={{ margin:'0' }} />
          <Field label="Brand Archetypes" hint="select up to 3">
            <PillGroup items={ARCHETYPES} value={f.archetypes} onChange={v => set('archetypes', v)} multi />
          </Field>
          <div className="divider" style={{ margin:'0' }} />
          <Field label="Core Paradox to Hold">
            <PillGroup items={PARADOX_OPTIONS} value={f.paradox} onChange={v => set('paradox', v)} />
          </Field>
        </div>
      </div>

      {/* ── CARD 3: TONE DIALS ────────────────────────────────────────────── */}
      <div className="glass-card" style={{ padding:'32px', marginBottom:'20px' }}>
        <SectionHeader step="03 · Visual Tone" title="Calibrate the visual tension" />
        <div style={{ display:'flex', flexDirection:'column', gap:'28px' }}>
          <Slider label="Boldness" value={f.boldness} onChange={v => set('boldness', v)} leftLabel="Whisper" rightLabel="Command" />
          <Slider label="Complexity" value={f.complexity} onChange={v => set('complexity', v)} leftLabel="Minimal" rightLabel="Intricate" />
          <Slider label="Timelessness" value={f.timelessness} onChange={v => set('timelessness', v)} leftLabel="Trend-led" rightLabel="Timeless" />
        </div>
      </div>

      {/* ── CARD 4: CONSTRAINTS ───────────────────────────────────────────── */}
      <div className="glass-card" style={{ padding:'32px', marginBottom:'32px' }}>
        <SectionHeader step="04 · Constraints & Context" title="What must we know?" />
        <div style={{ display:'flex', flexDirection:'column', gap:'18px' }}>
          <Field label="Existing Brand Color" hint="hex or name">
            <input type="text" placeholder="e.g. #1A1A1A, deep forest green, warm ivory" value={f.existingColor} onChange={e => set('existingColor', e.target.value)} />
          </Field>
          <Field label="Absolute Constraints">
            <textarea rows={2} placeholder="e.g. Must work in single color, no gradients, avoid serifs" value={f.constraints} onChange={e => set('constraints', e.target.value)} />
          </Field>
          <Field label="Competitive Landscape">
            <textarea rows={2} placeholder="e.g. Competing with Cartier, Mejuri — must feel distinct from both" value={f.competitive} onChange={e => set('competitive', e.target.value)} />
          </Field>
          <Field label="Additional Context" hint="optional">
            <textarea rows={2} placeholder="Brand history, nuances, founder story, application priorities..." value={f.additionalContext} onChange={e => set('additionalContext', e.target.value)} />
          </Field>
        </div>
      </div>

      {/* ── GENERATE ─────────────────────────────────────────────────────── */}
      <div style={{ display:'flex', justifyContent:'flex-end', alignItems:'center', gap:'12px' }}>
        {!canGenerate && <span style={{ fontSize:'12px', color:'var(--text-3)' }}>Brand name & essence required</span>}
        {result && <button className="btn-secondary" onClick={() => { setResult(''); setError(''); }}>Reset</button>}
        <button className="btn-primary" onClick={run} disabled={!canGenerate || loading}>
          {loading
            ? <><svg className="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>Generating…</>
            : 'Generate Logo Direction →'}
        </button>
      </div>

      {/* ── ERROR ─────────────────────────────────────────────────────────── */}
      {error && <div className="error-banner">⚠ {error}</div>}

      {/* ── RESULT ────────────────────────────────────────────────────────── */}
      {result && (
        <div ref={resultRef} style={{ marginTop:'44px' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'24px', flexWrap:'wrap', gap:'12px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
              <div className="pulse-dot" />
              <span className="font-mono" style={{ fontSize:'9px', color:'var(--brass)', letterSpacing:'0.2em' }}>LOGO DIRECTION · GENERATED</span>
            </div>
            {activeTags.length > 0 && (
              <div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>
                {activeTags.map(t => <span key={t} className="tag">{t}</span>)}
              </div>
            )}
          </div>
          <div className="glass-card" style={{ padding:'36px 40px' }}>
            <MarkdownOutput text={result} />
          </div>
          <div style={{ marginTop:'18px', display:'flex', gap:'10px', flexWrap:'wrap', justifyContent:'flex-end' }}>
            <button className="btn-secondary" onClick={() => navigator.clipboard?.writeText(result)}>Copy Brief</button>
            <button className="btn-secondary" onClick={run}>Regenerate</button>
            <button className="btn-secondary" onClick={() => { setResult(''); setError(''); }}>Start Over</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
