<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB BrandOS — The Brand Soul Map</title>
<meta name="description" content="The Brand Soul Map · QB BrandOS Phase 01 — discover your brand's irreducible truth, archetype, and emotional foundation.">
<script>(function(){try{var t=localStorage.getItem('qb-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark')}catch(e){}})();</script>
<script src="/qb-cloud.js"></script>
<script src="/qb-gate.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Figtree:wght@300..900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box }
:root{
  --cream:          #F4F0EB;
  --cream-soft:     #EDE8E2;
  --cream-deep:     #E6E0D8;
  --cream-line:     rgba(100,80,50,0.14);
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(100,80,50,0.04);
  --bg-elevated:    rgba(100,80,50,0.07);
  --bg-overlay:     rgba(244,240,235,0.9);
  --border-subtle:  rgba(100,80,50,0.08);
  --border-medium:  rgba(100,80,50,0.14);
  --border-strong:  rgba(100,80,50,0.22);
  --ink:            #1A1610;
  --ink-soft:       #5A5040;
  --ink-mute:       #8A7E70;
  --ink-faint:      #B8AEA0;
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina:         #3A5F4A;
  --patina-lit:     #4A7A5E;
  --patina-dim:     rgba(58,95,74,0.15);
  --patina-faint:   rgba(58,95,74,0.06);
  --brass:          #A8903E;
  --brass-lit:      #C4A84E;
  --brass-dim:      rgba(168,144,62,0.15);
  --brass-faint:    rgba(168,144,62,0.06);
  --terra:          #C4654A;
  --plum:           #7A5A6E;
  --warmred:        #8A4A4A;
  --error:          #8A4A4A;
  --error-faint:    rgba(138,74,74,0.06);
  --pill-bg:        #F3E9C9;
  --pill-bg-hover:  #EFE1B4;
  --pill-border:    #A8903E;
  --pill-ink:       #1A1610;
  --f-display:      'EB Garamond',Georgia,serif;
  --f-body:         'Figtree',-apple-system,BlinkMacSystemFont,sans-serif;
  --f-mono:         'JetBrains Mono',ui-monospace,monospace;
  --ease:           cubic-bezier(.22,1,.36,1);
  --r-pill:         999px;
  --r-card:         14px;
}
[data-theme="dark"]{
  --cream:          #080604;
  --cream-soft:     #0A0806;
  --cream-deep:     #12100C;
  --cream-line:     rgba(140,110,70,0.11);
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(140,110,70,0.045);
  --bg-elevated:    rgba(140,110,70,0.07);
  --bg-overlay:     rgba(18,15,10,0.85);
  --border-subtle:  rgba(140,110,70,0.06);
  --border-medium:  rgba(140,110,70,0.11);
  --border-strong:  rgba(140,110,70,0.18);
  --ink:            #EEE5D2;
  --ink-soft:       #A8A092;
  --ink-mute:       #6F6A5E;
  --ink-faint:      #3E3830;
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina-dim:     rgba(58,95,74,0.2);
  --patina-faint:   rgba(58,95,74,0.08);
  --brass-dim:      rgba(168,144,62,0.18);
  --warmred:        #B06767;
  --error:          #B06767;
  --error-faint:    rgba(176,103,103,0.08);
  --pill-bg:        #2A2318;
  --pill-bg-hover:  #3A2E1F;
  --pill-border:    #A8903E;
  --pill-ink:       #EEE5D2;
}
html{ -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; scroll-behavior:smooth; background:var(--bg-void); }
body{
  font-family:var(--f-body); font-weight:400;
  background:var(--bg-void); color:var(--text-2);
  min-height:100vh; position:relative; overflow:hidden;
  transition:background .5s ease, color .3s ease;
}
body::after{
  content:''; position:fixed; inset:0; z-index:9999;
  pointer-events:none; opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
[data-theme="dark"] body::after{ opacity:.05; }
a{ color:inherit; text-decoration:none; }
img{ display:block; max-width:100%; }
button{ font-family:inherit; cursor:pointer; }

/* ================== BUTTONS (ecosystem parity) ================== */
.btn{
  display:inline-flex; align-items:center; justify-content:center;
  gap:.55em;
  font-family:var(--f-body); font-weight:500; font-size:.94rem;
  padding:14px 24px;
  border-radius:var(--r-pill);
  border:1px solid var(--ink);
  background:transparent; color:var(--ink);
  transition:all .25s var(--ease);
  white-space:nowrap; text-decoration:none !important;
  cursor:pointer;
}
.btn:hover{ background:var(--ink); color:var(--cream); }
@property --eco-angle{ syntax:'<angle>'; initial-value:0deg; inherits:false; }
.btn-primary{
  background:var(--pill-bg) !important;
  border-color:var(--pill-border) !important;
  color:var(--pill-ink) !important;
  position:relative; isolation:isolate;
}
.btn-primary::before{
  content:''; position:absolute; inset:-3px;
  background:conic-gradient(from var(--eco-angle), var(--patina), var(--brass), var(--terra), var(--plum), var(--patina));
  border-radius:999px; z-index:-1; opacity:0;
  transition:opacity .4s ease;
  animation:ecoSpin 6s linear infinite;
  filter:blur(10px);
}
@keyframes ecoSpin{ to{ --eco-angle:360deg; } }
.btn-primary:hover::before{ opacity:.75; }
.btn-primary:hover{
  background:var(--pill-bg-hover) !important;
  border-color:var(--pill-ink) !important;
  transform:translateY(-1px);
  box-shadow:0 14px 40px -12px rgba(168,144,62,.35) !important;
}
.btn-primary:disabled{ opacity:.4; cursor:not-allowed; transform:none; }
.btn-primary:disabled::before{ display:none; }
.btn-sm{ padding:10px 18px; font-size:.85rem; }
.btn-lg{ padding:17px 30px; font-size:1rem; }

/* ================== LAYOUT ================== */
.app{
  display:flex; height:100vh; width:100vw;
  overflow:hidden; position:relative; z-index:2;
}

/* Sidebar */
.sidebar{
  width:280px; flex-shrink:0;
  background:var(--bg-deep);
  border-right:1px solid var(--border-subtle);
  padding:28px 24px;
  display:flex; flex-direction:column;
  height:100vh; overflow-y:auto;
  position:relative; z-index:10;
  transition:transform .3s ease;
}
.sidebar-head{
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:36px; gap:12px;
}
.sidebar-brand{
  font-family:var(--f-display); font-size:1.4rem;
  color:var(--text-1); font-weight:500;
  display:flex; align-items:center; gap:10px;
}
.sidebar-brand .dot{
  width:10px; height:10px; border-radius:50%;
  background:var(--brass);
  box-shadow:0 0 0 3px var(--brass-faint);
  animation:pulseDot 3s var(--ease) infinite;
}
@keyframes pulseDot{
  0%,100%{ transform:scale(1); box-shadow:0 0 0 3px var(--brass-faint); }
  50%{ transform:scale(1.15); box-shadow:0 0 0 5px rgba(168,144,62,.05); }
}
.sidebar-sub{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3); margin-top:6px;
}
.theme-toggle{
  width:36px; height:36px; border-radius:50%;
  border:1px solid var(--border-medium);
  background:transparent; color:var(--text-2);
  display:inline-flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s;
  flex-shrink:0;
}
.theme-toggle:hover{ color:var(--brass); border-color:var(--brass); background:var(--brass-faint); }
.step-nav{ flex:1; display:flex; flex-direction:column; gap:2px; }
.step-btn{
  display:flex; align-items:center; gap:14px;
  padding:12px 12px;
  border-left:2.5px solid transparent;
  background:transparent; border:none; text-align:left;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
  cursor:pointer;
  transition:all .2s;
}
.step-btn:hover:not(:disabled){ color:var(--text-1); border-left-color:var(--border-medium); }
.step-btn.active{
  color:var(--patina); border-left-color:var(--patina);
  background:var(--patina-faint);
}
.step-btn:disabled{ opacity:.4; cursor:not-allowed; color:var(--text-4); }
.step-btn .mark{
  width:18px; display:inline-flex; justify-content:center;
}
.step-btn .label{ flex:1; }
.save-indicator{
  padding-top:20px; margin-top:16px;
  border-top:1px solid var(--border-subtle);
  display:flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
}
.save-indicator.saving{ color:var(--brass); }
.save-indicator.saved  { color:var(--patina); }

/* Mobile nav */
.mobile-header{ display:none; }
.mobile-overlay{ display:none; position:fixed; inset:0; background:rgba(8,6,4,.55); z-index:80; -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }
@media(max-width:960px){
  .mobile-header{
    display:flex; position:fixed; top:0; left:0; right:0; z-index:60;
    padding:14px 20px;
    background:var(--bg-overlay);
    -webkit-backdrop-filter:blur(16px);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border-subtle);
    align-items:center; justify-content:space-between;
  }
  .mobile-header h1{ font-family:var(--f-display); font-size:1.2rem; color:var(--text-1); font-weight:500; }
  .mobile-header .right{ display:flex; gap:10px; align-items:center; }
  .hamburger{
    width:36px; height:36px; border-radius:8px;
    border:1px solid var(--border-medium); background:transparent;
    color:var(--text-1);
    display:inline-flex; align-items:center; justify-content:center;
  }
  .sidebar{
    position:fixed; top:0; left:0; bottom:0; z-index:100;
    transform:translateX(-100%);
  }
  .sidebar.open{ transform:translateX(0); }
  .mobile-overlay.open{ display:block; }
  .main{ padding-top:70px; }
}

/* Main */
.main{
  flex:1; height:100vh; overflow-y:auto;
  position:relative;
}
.main-inner{
  max-width:1000px; margin:0 auto;
  padding:56px clamp(16px, 3vw, 40px) 180px;
}
@media(max-width:960px){ .main-inner{ padding:20px 16px 180px; } }

/* Step transition */
@keyframes fadeUp{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:translateY(0); } }
.step-container{ animation:fadeUp .4s var(--ease) both; }

/* Dock */
.dock-wrap{
  position:sticky; bottom:24px; z-index:50;
  padding:0 clamp(16px, 3vw, 40px);
  pointer-events:none;
  display:flex; justify-content:center;
}
.dock{
  pointer-events:auto;
  max-width:800px; width:100%;
  padding:14px 18px;
  display:flex; align-items:center; justify-content:space-between; gap:14px;
  background:var(--bg-overlay);
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
  border:1px solid var(--border-medium);
  border-radius:var(--r-pill);
  box-shadow:0 20px 50px -20px rgba(26,22,16,.3);
  position:relative; overflow:hidden;
}
.dock-progress-bg{ position:absolute; top:0; left:0; right:0; height:2px; background:var(--border-subtle); }
.dock-progress-fill{
  position:absolute; top:0; left:0; height:2px;
  background:linear-gradient(90deg, var(--patina), var(--brass));
  transition:width .5s var(--ease);
}
.dock-prev{
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 18px;
  background:transparent; border:none;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  font-weight:700; color:var(--text-2);
  border-radius:var(--r-pill);
  transition:color .2s, background .2s;
}
.dock-prev:hover:not(:disabled){ color:var(--text-1); background:var(--bg-surface); }
.dock-prev:disabled{ opacity:.4; cursor:not-allowed; }
.dock-next-row{ display:flex; align-items:center; gap:12px; }
.dock-hint{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.2em;
  color:var(--brass);
  padding:6px 12px;
  border:1px solid var(--brass-dim);
  background:var(--brass-faint);
  border-radius:var(--r-pill);
  white-space:nowrap;
}
@media(max-width:760px){ .dock-hint{ display:none; } }

/* ================== TYPE PRIMITIVES ================== */
.headline{
  font-family:var(--f-display); font-weight:500;
  letter-spacing:-.02em; line-height:1.05;
  color:var(--text-1);
}
.label-mono{
  display:block;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
  margin-bottom:10px;
}
.helper-text{
  font-family:var(--f-display); font-style:italic;
  font-size:14px;
  color:var(--text-3); opacity:.85;
  margin-bottom:14px;
}

/* Inputs */
.glass-input{
  width:100%;
  padding:14px 18px;
  font-family:var(--f-body); font-size:14.5px;
  color:var(--text-1);
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);
  outline:none;
  transition:border-color .2s, background .2s;
}
.glass-input:focus{ border-color:var(--brass); background:var(--bg-elevated); }
.glass-input::placeholder{ color:var(--text-4); font-style:italic; }
textarea.glass-input{ resize:vertical; line-height:1.55; min-height:80px; }
select.glass-input{ cursor:pointer; appearance:none; background-image:linear-gradient(45deg, transparent 50%, var(--text-3) 50%), linear-gradient(135deg, var(--text-3) 50%, transparent 50%); background-position:calc(100% - 18px) 50%, calc(100% - 12px) 50%; background-size:6px 6px; background-repeat:no-repeat; padding-right:40px; }

/* Visual header with bg image */
.visual-header{
  position:relative;
  width:100%; height:clamp(180px, 24vh, 260px);
  border-radius:var(--r-card);
  overflow:hidden;
  margin-bottom:44px;
  border:1px solid var(--border-medium);
  background:var(--bg-surface);
}
.visual-header img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter:grayscale(.1) contrast(1.02); }
.visual-header::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(to top, rgba(8,6,4,.9) 0%, rgba(8,6,4,.55) 40%, transparent 100%);
}
[data-theme="light"] .visual-header::after{
  background:linear-gradient(to top, rgba(244,240,235,.92) 0%, rgba(244,240,235,.4) 40%, transparent 100%);
}
.visual-header .overlay{
  position:absolute; inset:0; z-index:2;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  text-align:center; padding:28px;
}
.visual-header .eyebrow{
  display:inline-block;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--brass);
  background:var(--brass-faint);
  border:1px solid var(--brass-dim);
  border-radius:var(--r-pill);
  padding:6px 12px;
  margin-bottom:14px;
}
.visual-header h2{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.75rem, 3.5vw, 2.5rem);
  letter-spacing:-.015em; line-height:1.05;
  color:#FFF;
  text-shadow:0 2px 12px rgba(0,0,0,.55);
}
[data-theme="light"] .visual-header h2{ color:var(--text-1); text-shadow:none; }

/* Glass panel — used throughout */
.glass-panel{
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  -webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);
  border-radius:var(--r-card);
  padding:clamp(28px, 3vw, 44px);
}
.panel-h{
  font-family:var(--f-display); font-weight:500;
  font-size:1.4rem; color:var(--text-1);
  padding-bottom:18px; margin-bottom:28px;
  border-bottom:1px solid var(--border-subtle);
}
.form-field{ margin-bottom:28px; }
.form-field:last-child{ margin-bottom:0; }

/* Checkpoint panel */
.checkpoint{
  max-width:720px; margin:32px auto;
  text-align:center;
}
.checkpoint-head{ margin-bottom:28px; }
.checkpoint-body{
  padding:clamp(28px, 3vw, 48px);
  text-align:left;
  position:relative;
}
.checkpoint-body::before{
  content:''; position:absolute; top:0; left:0; right:0;
  height:2px;
  background:linear-gradient(90deg, var(--brass), var(--patina), var(--brass));
  opacity:.6;
}
.checkpoint-row{
  margin-bottom:22px;
  font-family:var(--f-body); font-size:15px; line-height:1.7;
  color:var(--text-2);
}
.checkpoint-row .hl{ color:var(--text-1); font-weight:500; }
.checkpoint-row .mono-k{ display:block; margin-bottom:6px; }
.manifesto-block{
  padding:18px 22px;
  border-left:2px solid var(--brass);
  font-family:var(--f-display); font-style:italic; font-weight:500;
  font-size:1.35rem; line-height:1.4;
  color:var(--text-1);
  margin-top:16px;
}
.sync-stamp{
  margin-top:24px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
}
.sync-stamp .dot{
  width:6px; height:6px; border-radius:50%; background:var(--patina);
  animation:pulseDot 2.4s ease-in-out infinite;
}

/* Word selector */
.word-selector{ padding:28px; background:var(--bg-surface); border:1px solid var(--border-medium); border-radius:var(--r-card); margin-bottom:24px; }
.word-selector h4{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-1); font-weight:500;
  margin-bottom:20px;
  display:flex; align-items:center; gap:10px;
}
.word-selector h4 .dot{ width:6px; height:6px; border-radius:50%; background:var(--patina); }
.word-chips{ display:flex; flex-wrap:wrap; gap:8px; }
.word-chip{
  padding:8px 16px;
  border-radius:var(--r-pill);
  border:1px solid var(--border-strong);
  background:transparent;
  font-family:var(--f-mono); font-size:11px;
  text-transform:uppercase;
  color:var(--text-3);
  cursor:pointer;
  transition:all .2s;
}
.word-chip:hover{ border-color:var(--border-medium); color:var(--text-1); }
.word-chip.selected{ background:var(--patina); color:var(--cream); border-color:var(--patina); }
.word-chip.essential{
  background:var(--brass); color:var(--cream); border-color:var(--brass);
  font-weight:700;
  box-shadow:0 0 0 3px var(--brass-dim);
}
.essential-row{
  margin-top:24px; padding-top:20px;
  border-top:1px solid var(--border-medium);
}
.essential-row .hint{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3); margin-bottom:14px;
}
.essential-chip{
  padding:6px 14px;
  border:1px solid var(--border-strong);
  background:transparent;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase;
  color:var(--text-3);
  border-radius:var(--r-pill);
  cursor:pointer;
  margin-right:6px;
  transition:all .2s;
}
.essential-chip.active{ background:var(--brass-faint); color:var(--brass); border-color:var(--brass); font-weight:700; }

/* Grids */
.grid-1{ display:grid; grid-template-columns:1fr; gap:20px; }
.grid-2{ display:grid; grid-template-columns:1fr; gap:20px; }
.grid-3{ display:grid; grid-template-columns:1fr; gap:20px; }
@media(min-width:760px){
  .grid-2{ grid-template-columns:1fr 1fr; }
  .grid-3{ grid-template-columns:repeat(3, 1fr); }
}

/* Anti-brand mirror */
.mirror-card-neg{ padding:24px; border-radius:var(--r-card); background:var(--error-faint); border:1px solid var(--error); }
.mirror-card-pos{ padding:24px; border-radius:var(--r-card); background:var(--patina-faint); border:1px solid var(--patina-dim); }
.mirror-card-neg h4, .mirror-card-pos h4{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  margin-bottom:18px; font-weight:600;
}
.mirror-card-neg h4{ color:var(--error); }
.mirror-card-pos h4{ color:var(--patina); }

/* Positioning spine */
.pos-spine{
  padding:24px;
  background:var(--bg-elevated);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);
}
.pos-spine .lead{
  font-family:var(--f-mono); font-size:11px; color:var(--text-2);
  text-transform:uppercase; letter-spacing:.2em;
  display:inline; margin-right:4px;
}
.pos-spine-inputs{
  display:flex; flex-wrap:wrap; align-items:center; gap:10px;
  margin-top:14px;
}
.pos-adj-input{
  width:140px;
  padding:10px 12px; text-align:center;
  background:var(--bg-surface);
  border:1px solid var(--border-strong);
  border-radius:8px;
  font-family:var(--f-mono); font-size:13px; font-weight:700;
  text-transform:uppercase; color:var(--text-1);
  outline:none;
  transition:border-color .2s;
}
.pos-adj-input:focus{ border-color:var(--brass); }

/* Quote grid (manifesto) */
.quote-grid{
  display:grid; grid-template-columns:1fr; gap:12px;
  margin-bottom:28px;
}
@media(min-width:760px){ .quote-grid{ grid-template-columns:1fr 1fr; } }
.quote-card{
  padding:22px;
  border:1px solid var(--border-subtle);
  background:var(--bg-surface);
  border-radius:var(--r-card);
  cursor:pointer;
  transition:all .25s;
}
.quote-card:hover{ border-color:var(--border-medium); }
.quote-card.selected{ background:var(--brass-faint); border-color:var(--brass); box-shadow:0 0 0 1px var(--brass); }
.quote-card p{
  font-family:var(--f-display); font-style:italic; font-weight:400;
  font-size:1.1rem; color:var(--text-2); line-height:1.4;
  margin-bottom:12px;
}
.quote-card .author{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--brass);
}

/* Archetype select row */
.arch-select{
  padding:20px;
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);
  display:flex; flex-direction:column; gap:10px;
}
.arch-select .k{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
}

/* Binary card (celebrity personification) */
.binary-card{
  padding:24px; border:1px solid var(--border-medium);
  background:var(--bg-surface);
  border-radius:var(--r-card);
}
.binary-card h4{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-1); font-weight:500;
  margin-bottom:18px;
  display:flex; align-items:center; gap:10px;
}
.binary-card h4 .dot{ width:6px; height:6px; border-radius:50%; background:var(--patina); }
.binary-opts{ display:flex; flex-direction:column; gap:12px; }
@media(min-width:760px){ .binary-opts{ flex-direction:row; } }
.binary-opt{
  flex:1; padding:18px 18px 20px;
  border:1px solid var(--border-strong);
  background:transparent;
  border-radius:var(--r-card);
  cursor:pointer;
  transition:all .2s;
  text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:12px;
  font-family:inherit;
}
.binary-opt:hover{ border-color:var(--border-medium); }
.binary-opt.selected{
  background:var(--bg-base);
  border-color:var(--patina);
  box-shadow:0 0 0 1px var(--patina), 0 0 20px var(--patina-dim);
}
.binary-opt .name{
  font-family:var(--f-display); font-size:1.15rem; font-weight:500;
  color:var(--text-1); margin-bottom:4px;
}
.binary-opt .desc{
  font-family:var(--f-display); font-style:italic;
  font-size:13px; color:var(--text-3); line-height:1.5;
}
.binary-portrait{
  width:108px; height:108px;
  border-radius:50%;
  overflow:hidden;
  background:var(--cream-pale, #efe8dc);
  border:1px solid var(--border-subtle);
  position:relative;
  flex-shrink:0;
  filter:saturate(.85) contrast(1.02);
}
.binary-portrait img{
  position:absolute; inset:0;
  width:100%; height:100%; object-fit:cover;
  display:block;
}
.binary-portrait .portrait-fallback{
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--f-display); font-size:2.4rem; font-weight:500;
  color:var(--text-3);
  background:linear-gradient(135deg, var(--cream, #efe8dc) 0%, var(--bg-surface) 100%);
  z-index:0;
}
.binary-opt.selected .binary-portrait{
  border-color:var(--patina);
  box-shadow:0 0 0 2px var(--patina-dim);
  filter:saturate(1) contrast(1.05);
}

/* Archetype visual grid (Module III) */
.archetype-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
  gap:12px;
  margin-top:16px;
}
.archetype-card{
  padding:16px 12px 14px;
  border:1px solid var(--border-strong);
  background:var(--bg-surface);
  border-radius:var(--r-card);
  cursor:pointer;
  transition:all .2s;
  text-align:center;
  position:relative;
  display:flex; flex-direction:column; gap:10px; align-items:center; justify-content:flex-start;
  min-height:160px;
  font-family:inherit;
}
.archetype-card:hover{ border-color:var(--border-medium); transform:translateY(-1px); }
.archetype-card.selected{
  background:var(--bg-base);
}
.archetype-card.role-primary{
  border-color:var(--brass);
  box-shadow:0 0 0 1px var(--brass), 0 0 20px var(--brass-dim, rgba(184,146,82,.28));
}
.archetype-card.role-secondary{
  border-color:var(--patina);
  box-shadow:0 0 0 1px var(--patina), 0 0 20px var(--patina-dim);
}
.archetype-card.role-tension{
  border-color:var(--plum);
  box-shadow:0 0 0 1px var(--plum), 0 0 20px rgba(138, 92, 114, .3);
}
.archetype-card .role-badge{
  position:absolute; top:-8px; left:50%; transform:translateX(-50%);
  padding:4px 10px; border-radius:999px;
  font-family:var(--f-mono); font-size:8px; font-weight:600;
  text-transform:uppercase; letter-spacing:.22em;
  background:var(--ink); color:var(--cream);
  white-space:nowrap;
}
.archetype-card.role-primary   .role-badge{ background:var(--brass);   color:var(--ink); }
.archetype-card.role-secondary .role-badge{ background:var(--patina);  color:var(--cream); }
.archetype-card.role-tension   .role-badge{ background:var(--plum);    color:var(--cream); }
.archetype-logo{
  width:64px; height:64px;
  border-radius:50%;
  overflow:hidden;
  background:#fff;
  border:1px solid var(--border-subtle);
  position:relative;
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.archetype-logo img{
  position:absolute; inset:0;
  width:100%; height:100%; object-fit:contain;
  padding:8px;
  display:block;
}
.archetype-logo .logo-fallback{
  font-family:var(--f-mono); font-size:9px; font-weight:600;
  letter-spacing:.14em; text-transform:uppercase;
  color:var(--text-3);
  z-index:0; text-align:center;
  padding:0 4px;
}
.archetype-card .arch-name{
  font-family:var(--f-display); font-size:0.98rem; font-weight:500;
  color:var(--text-1); line-height:1.2;
}
.archetype-card .arch-brand{
  font-family:var(--f-mono); font-size:9px; font-weight:500;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
}
.archetype-role-legend{
  display:flex; gap:16px; flex-wrap:wrap;
  margin-bottom:4px; padding:10px 14px;
  border:1px solid var(--border-subtle); border-radius:var(--r-card);
  background:var(--bg-surface);
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3);
}
.archetype-role-legend .chip{
  display:inline-flex; align-items:center; gap:6px;
}
.archetype-role-legend .chip .swatch{
  width:10px; height:10px; border-radius:50%;
}
.archetype-role-legend .chip[data-role="primary"]   .swatch{ background:var(--brass); }
.archetype-role-legend .chip[data-role="secondary"] .swatch{ background:var(--patina); }
.archetype-role-legend .chip[data-role="tension"]   .swatch{ background:var(--plum); }
.archetype-reset{
  margin-left:auto;
  background:transparent; border:none; padding:0;
  font-family:var(--f-mono); font-size:9px; font-weight:600;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--terra, #c4654a); cursor:pointer;
}
.archetype-reset:hover{ text-decoration:underline; }

/* Always/Never manifesto */
.always-block, .never-block{
  padding:24px; border-radius:var(--r-card);
}
.always-block{ background:var(--patina-faint); border:1px solid var(--patina-dim); }
.never-block { background:var(--error-faint); border:1px solid var(--error); }
.always-block h4, .never-block h4{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  margin-bottom:20px; font-weight:600;
  display:flex; align-items:center; gap:8px;
}
.always-block h4{ color:var(--patina); }
.never-block h4{ color:var(--error); }
.manifesto-row{ display:flex; gap:12px; margin-bottom:10px; align-items:center; }
.manifesto-row input[type="radio"]{ width:16px; height:16px; accent-color:var(--patina); cursor:pointer; }
.never-block .manifesto-row input[type="radio"]{ accent-color:var(--error); }

/* Movement cards */
.movement-grid{ display:grid; grid-template-columns:1fr; gap:14px; }
@media(min-width:760px){ .movement-grid{ grid-template-columns:1fr 1fr; } }
.movement-card{
  padding:20px 22px;
  border:1px solid var(--border-medium);
  background:var(--bg-surface);
  border-radius:var(--r-card);
  cursor:pointer;
  transition:all .2s;
}
.movement-card:hover{ border-color:var(--border-strong); }
.movement-card.selected{
  background:var(--brass-faint);
  border-color:var(--brass);
  box-shadow:0 0 0 1px var(--brass);
}
.movement-card h4{
  font-family:var(--f-display); font-size:1.2rem; font-weight:500;
  color:var(--text-1); margin-bottom:6px;
}
.movement-card p{
  font-family:var(--f-display); font-style:italic;
  font-size:13px; color:var(--text-3); line-height:1.5;
}

/* Song rows */
.song-row{
  display:flex; gap:12px; align-items:center;
  padding:10px 16px;
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);
  margin-bottom:8px;
  flex-wrap:wrap;
}
.song-row .num{
  font-family:var(--f-mono); font-size:10px;
  color:var(--brass); font-weight:700;
  min-width:28px;
}
.song-row input{
  flex:1;
  background:transparent; border:none; outline:none;
  padding:6px 4px;
  font-family:var(--f-mono); font-size:12px;
  color:var(--text-1);
}
.song-row input.artist{ max-width:180px; opacity:.7; }

/* Soul Map final output */
.soul-map{
  padding:clamp(32px, 3.5vw, 56px);
  background:var(--bg-base);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);
  position:relative; overflow:hidden;
}
.soul-map::before{
  content:''; position:absolute; top:0; left:0; right:0;
  height:2.5px;
  background:linear-gradient(90deg, var(--brass), var(--patina), var(--brass));
  opacity:.6;
}
.soul-map-title{
  text-align:center; margin-bottom:56px;
  padding-bottom:36px; border-bottom:1px solid var(--border-medium);
}
.soul-map-title h1{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(2.5rem, 5vw, 3.5rem);
  letter-spacing:-.02em; line-height:1.05;
  color:var(--text-1);
  margin-bottom:12px;
}
.soul-map-title .stamp{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--brass);
}
.soul-map-grid{
  display:grid; grid-template-columns:1fr; gap:48px;
  margin-bottom:56px;
}
@media(min-width:760px){ .soul-map-grid{ grid-template-columns:1fr 1fr; column-gap:64px; } }
.soul-map-section h3{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3); font-weight:500;
  padding-left:14px; border-left:2px solid var(--patina-dim);
  margin-bottom:22px;
}
.soul-map-row{
  margin-bottom:14px;
  font-family:var(--f-body); font-size:14px; line-height:1.65;
  color:var(--text-1);
}
.soul-map-row .k{
  display:block;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-4); margin-bottom:4px;
}
.soul-map-spark-wrap{
  text-align:center; margin-bottom:56px;
  padding:44px 0; border-top:1px solid var(--border-medium);
}
.soul-map-spark-wrap h3{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--patina); font-weight:500;
  margin-bottom:28px;
}
.soul-map-spark{
  max-width:640px; margin:0 auto;
  padding:22px 26px;
  border-left:2px solid var(--brass);
  text-align:left;
  font-family:var(--f-display); font-size:1.25rem;
  line-height:1.55;
  color:var(--text-1);
}
.soul-map-essence-wrap{
  text-align:center; padding-top:36px;
  border-top:1px solid var(--border-medium);
}
.soul-map-essence-wrap h3{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3); font-weight:500;
  margin-bottom:24px;
}
.soul-map-essence{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.75rem, 3.2vw, 2.5rem);
  letter-spacing:-.015em; line-height:1.15;
  color:var(--text-1);
}

/* Synthesis header / exports */
.synth-exports{
  display:flex; align-items:flex-end; justify-content:space-between;
  flex-wrap:wrap; gap:16px; padding:0 4px;
  margin-bottom:36px;
}
.synth-exports .meta h2{
  font-family:var(--f-display); font-weight:500; font-size:1.8rem;
  color:var(--text-1); margin-bottom:6px;
}
.synth-exports .meta .email{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--brass);
}
.synth-exports .buttons{ display:flex; gap:10px; }

/* Loading / generating screen */
.generating{
  min-height:60vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:48px 24px; text-align:center;
}
.generating .spinner{
  width:32px; height:32px; border-radius:50%;
  background:var(--patina);
  animation:pulseDot 2s ease-in-out infinite;
  margin-bottom:28px;
}
.generating h2{
  font-family:var(--f-mono); font-size:12px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--patina); font-weight:500;
  margin-bottom:12px;
}
.generating p{
  font-family:var(--f-display); font-style:italic;
  font-size:15px; color:var(--text-3);
}

/* ================== CODEX · EDITORIAL DOCUMENT ================== */
/* Single-column, max-width 720px, print-ready. Per spec Part 4. */
.codex-shell{
  max-width:720px; margin:0 auto;
  padding:32px 4px 140px;
  color:var(--text-1);
}
.codex-layout{ position:relative; }
/* Sticky sidebar (>= 1024px only) */
.codex-jumpnav{
  display:none;
}
@media(min-width:1200px){
  .codex-layout{
    display:grid; grid-template-columns:200px 1fr; gap:60px;
    max-width:980px; margin:0 auto;
  }
  .codex-jumpnav{
    display:flex; flex-direction:column; gap:8px;
    position:sticky; top:40px;
    align-self:start;
    padding:24px 0;
    max-height:calc(100vh - 80px);
    overflow-y:auto;
  }
  .codex-jumpnav a{
    font-family:var(--f-mono); font-size:10px;
    text-transform:uppercase; letter-spacing:.22em;
    color:var(--text-3);
    padding:8px 12px;
    border-left:2px solid transparent;
    transition:color .2s, border-color .2s;
  }
  .codex-jumpnav a:hover{ color:var(--text-1); border-left-color:var(--border-medium); }
  .codex-jumpnav a.active{ color:var(--patina); border-left-color:var(--patina); background:var(--patina-faint); }
  .codex-shell{ max-width:720px; margin:0; padding-left:0; }
}

/* Actions bar (Copy / PDF / Print) */
.codex-actions{
  display:flex; align-items:center; justify-content:flex-end; gap:10px;
  margin-bottom:32px;
  flex-wrap:wrap;
}
.codex-actions .meta{
  flex:1;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.24em;
  color:var(--text-3);
}
.codex-actions .meta .dot{
  display:inline-block; width:8px; height:8px; border-radius:50%;
  background:var(--patina);
  box-shadow:0 0 0 3px var(--patina-faint);
  animation:pulseDot 2s ease-in-out infinite;
  vertical-align:middle; margin-right:8px;
}

/* Brand hero */
.cx-brandline{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  color:var(--brass); margin-bottom:18px;
}
.cx-brandhero{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(3rem, 8vw, 5rem);
  letter-spacing:-.025em; line-height:.95;
  color:var(--text-1);
  margin-bottom:36px;
}

/* Verdict */
.cx-verdict{
  padding-bottom:48px;
  margin-bottom:56px;
  border-bottom:1px solid var(--border-subtle);
}
.cx-verdict p{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.25rem, 2.4vw, 1.6rem);
  line-height:1.55; letter-spacing:-.01em;
  color:var(--text-1);
}

/* Essence */
.cx-essence{
  text-align:center;
  padding:72px 0;
}
.cx-essence .label{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  color:var(--brass);
  margin-bottom:28px;
}
.cx-essence h2{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(2.25rem, 5vw, 3rem);
  line-height:1.2; letter-spacing:-.02em;
  color:var(--text-1);
  max-width:640px; margin:0 auto;
}

/* Spark */
.cx-spark{
  text-align:center;
  padding:48px 0;
  border-top:1px solid var(--border-subtle);
  border-bottom:1px solid var(--border-subtle);
  margin-bottom:72px;
}
.cx-spark .label{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  color:var(--brass);
  margin-bottom:28px;
}
.cx-spark p{
  font-family:var(--f-display); font-style:italic;
  font-size:clamp(1.15rem, 2vw, 1.4rem);
  line-height:1.7;
  color:var(--text-1);
  max-width:620px; margin:0 auto;
}

/* Section (for everything below Spark) */
.cx-section{ margin-bottom:64px; scroll-margin-top:80px; }
.cx-section-head{
  margin-bottom:32px;
  padding-left:12px;
  border-left:2px solid var(--brass);
}
.cx-section-eyebrow{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  color:var(--brass);
  display:block;
  margin-bottom:6px;
}
.cx-section-title{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.75rem, 3vw, 2.25rem);
  letter-spacing:-.015em; line-height:1.15;
  color:var(--text-1);
}
.cx-sub-head{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--text-3);
  margin:28px 0 10px;
}
.cx-section p, .cx-section li{
  font-family:var(--f-body); font-size:16px; line-height:1.75;
  color:var(--text-2);
  margin-bottom:12px;
}
.cx-section p strong{ color:var(--text-1); font-weight:500; }

/* Lists */
.cx-list{ list-style:none; padding:0; margin:0; }
.cx-list li{
  padding:14px 0 14px 32px;
  position:relative;
  border-bottom:1px solid var(--border-subtle);
}

  border:1px solid var(--border-medium);
  border-radius:12px;
  border-left:3px solid var(--brass);
}

.cx-card p{
  font-family:var(--f-body); font-size:15.5px;
  line-height:1.65; color:var(--text-1);
  margin-bottom:10px;
}
.cx-card p.note{

  border-top:1px solid var(--border-subtle);
  padding-top:10px; margin-bottom:0;
}

/* Essential words (Module 4) */

.cx-word-row{
  padding:14px 0;
  border-bottom:1px solid var(--border-subtle);
}
.cx-word-row:last-child{ border-bottom:none; }
.cx-word-row .word{
  font-family:var(--f-display); font-weight:500;
  font-size:1.35rem;
  color:var(--brass);
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-right:14px;
  display:inline-block;
  min-width:140px;
}
.cx-word-row .cost{
  font-family:var(--f-body); font-size:15px;
  color:var(--text-2);
  line-height:1.55;
}

.cx-voice-samples{ display:flex; flex-direction:column; gap:22px; }
.cx-voice-sample{

  border-left:2px solid var(--brass-dim);
  padding-left:22px;
}
.cx-voice-sample .label{

  text-transform:uppercase; letter-spacing:.28em;
  color:var(--text-3);
  margin-bottom:10px;
}
.cx-voice-sample p{
  font-family:var(--f-display); font-style:italic;
  font-size:1.15rem; line-height:1.5;
  color:var(--text-1);
}

}
.cx-move{
  padding:28px 28px;

  border:1px solid var(--border-medium);
  border-radius:14px;
  display:flex; flex-direction:column; gap:14px;
}
.cx-move .move-num{

  text-transform:uppercase; letter-spacing:.28em;
  color:var(--brass);
}
.cx-move .move-action{

  font-size:1.4rem;
  color:var(--text-1); letter-spacing:-.015em;
  line-height:1.25;
}
.cx-move .move-rationale{
  font-family:var(--f-body); font-size:14.5px;
  color:var(--text-2); line-height:1.65;
}

  display:inline-flex; align-items:center; gap:8px;

  background:var(--pill-bg);
  color:var(--pill-ink);
  border:1px solid var(--pill-border);
  font-family:var(--f-body); font-weight:500; font-size:13px;
  border-radius:var(--r-pill);
  text-decoration:none !important;
  transition:transform .2s, background .2s;
  margin-top:4px;
}

  padding:48px 40px;
  background:var(--bg-surface);
  border:1px solid var(--border-medium);

  text-transform:uppercase; letter-spacing:.3em;
  color:var(--brass);
  margin-bottom:20px;

  font-family:var(--f-display);
  font-size:clamp(1.1rem, 2vw, 1.25rem);
  line-height:1.7; color:var(--text-1);

  border-top:1px solid var(--border-medium);
  display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;

  text-transform:uppercase; letter-spacing:.24em;
  color:var(--text-3);

.cx-loading-sub{

  font-size:clamp(1.05rem, 2vw, 1.2rem); line-height:1.55;
  color:var(--text-2);
  max-width:540px;
}

  color:var(--text-1); font-weight:500;
  max-width:540px; width:100%;
  min-height:56px;
  display:flex; align-items:center; justify-content:center;
}
.cx-loading-bar{
  width:100%; max-width:540px; height:2px;
  background:var(--border-subtle); border-radius:2px;
  position:relative; overflow:hidden;
}
.cx-loading-bar::after{
  content:''; position:absolute; top:0; bottom:0; left:-30%; width:30%;

  animation:barRun 2.4s ease-in-out infinite;
}
@keyframes barRun{ 0%{ left:-30%; } 100%{ left:100%; } }
.cx-loading-warn{
  display:inline-flex; align-items:center; gap:10px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--brass);
}

.cx-pending{
  max-width:640px; margin:80px auto 0;

  border-radius:16px;
  background:var(--bg-surface);
  display:flex; flex-direction:column; gap:22px;

  text-transform:uppercase; letter-spacing:.3em;
  border:1px solid var(--terra);

  border-radius:var(--r-pill);
  align-self:flex-start;

  color:var(--text-1);
}
.cx-pending p{
  font-family:var(--f-body); font-size:15.5px; line-height:1.7;
  color:var(--text-2);

  color:var(--text-3);

  border:1px solid var(--border-subtle);

  /* --- DOM helper (flat-arrays) --- */
  var $app = document.getElementById('app');

  function el(tag, attrs, kids){
    var node = document.createElement(tag);
    if (attrs){
      for (var k in attrs){
        if (!attrs.hasOwnProperty(k)) continue;
        var v = attrs[k];
        if (v == null || v === false) continue;
        if (k === 'class')     node.className = v;
        else if (k === 'html') node.innerHTML = v;
        else if (k === 'text') node.textContent = v;
        else if (k === 'style' && typeof v === 'object') Object.assign(node.style, v);
        else if (k.indexOf('on') === 0 && typeof v === 'function') node.addEventListener(k.slice(2), v);
        else node.setAttribute(k, v);
      }
    }
    if (kids){
      var flat = [];
      (function flatten(arr){
        (Array.isArray(arr) ? arr : [arr]).forEach(function(c){
          if (Array.isArray(c)) flatten(c);
          else flat.push(c);
        });
      })(kids);
      flat.forEach(function(c){
        if (c == null || c === false) return;
        node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
    }
    return node;
  }

      case 2:  return true;
      case 3:  return d.docArgument.trim() !== '' && d.originalManifesto.trim() !== '';

  /* --- Copy Codex as Markdown --- */
  function copyCodexMarkdown(){
    var c = state.codex || {};
    var d = state.data;
    var lines = [];
    lines.push('# ' + (d.brandName || 'Brand') + ' — Brand Soul Map Codex');
    lines.push('*' + new Date().toISOString().split('T')[0] + ' · Session ' + (state.codexSessionId || '—') + '*');
    lines.push('');
    if (c.verdict){          lines.push('## Verdict');            lines.push(c.verdict); lines.push(''); }
    if (c.essence){          lines.push('## Essence');            lines.push('> ' + c.essence); lines.push(''); }
    if (c.spark){            lines.push('## Spark');              lines.push('*' + c.spark + '*'); lines.push(''); }
    var sub = function(k, v){ if (v){ lines.push('### ' + k); lines.push(v); lines.push(''); } };
    if (c.identityPortrait){
      lines.push('## 01 · Identity portrait');
      sub('Energy', c.identityPortrait.energy);
      sub('Aesthetic', c.identityPortrait.aesthetic);
      sub('Archetype', c.identityPortrait.archetype);
    }
    if (c.purposeLegacy){
      lines.push('## 02 · Purpose & legacy');
      sub('Legacy claim', c.purposeLegacy.legacyRewritten);
      sub('Core belief', c.purposeLegacy.beliefRewritten);
      sub('Transformation', c.purposeLegacy.transformation);
    }
    if (c.positioningSpine){
      lines.push('## 03 · Positioning spine');
      sub('DNA reading', c.positioningSpine.dnaReading);
      sub('Claimed territory', c.positioningSpine.claimedTerritory);
      sub('Refused territory', c.positioningSpine.refusedTerritory);
      sub('Defensibility', c.positioningSpine.defensibility);
    }
    if (c.communitySoul){
      lines.push('## 04 · Community soul');
      sub('Person portrait', c.communitySoul.personPortrait);
      if (c.communitySoul.essentialWords){
        lines.push('### Five essential words');
        lines.push(typeof c.communitySoul.essentialWords === 'string' ? c.communitySoul.essentialWords
          : (Array.isArray(c.communitySoul.essentialWords) ? c.communitySoul.essentialWords.map(function(w){ return '- **' + (w.word || '') + '** — ' + (w.cost || ''); }).join('\n') : ''));
        lines.push('');
      }
      sub('The unsaid promise', c.communitySoul.unsaidPromise);
    }
    if (c.voiceToneCode){
      lines.push('## 05 · Voice & tone code');
      if (Array.isArray(c.voiceToneCode.principles)){
        lines.push('### Principles');
        c.voiceToneCode.principles.forEach(function(p, i){ lines.push((i + 1) + '. ' + p); });
        lines.push('');
      }
      if (Array.isArray(c.voiceToneCode.samples)){
        lines.push('### Samples');
        c.voiceToneCode.samples.forEach(function(s){
          lines.push('**' + (s.label || '') + '** — ' + (s.text || ''));
          lines.push('');
        });
      }
    }
    if (c.culturalPosition){
      lines.push('## 06 · Cultural position');
      sub('Movement inheritance', c.culturalPosition.movementInheritance);
      sub('Contemporary stance',  c.culturalPosition.contemporaryStance);
      sub('Refusal', c.culturalPosition.refusal);
      if (c.culturalPosition.signature){ lines.push('> ' + c.culturalPosition.signature); lines.push(''); }
    }
    if (Array.isArray(c.tensionsToManage)){
      lines.push('## 07 · Tensions to manage');
      c.tensionsToManage.forEach(function(t){
        lines.push('- **' + (t.tension || '') + '** — ' + (t.managementNote || ''));
      });
      lines.push('');
    }
    if (Array.isArray(c.risksAndBlindSpots)){
      lines.push('## 08 · Risks & blind spots');
      c.risksAndBlindSpots.forEach(function(r){
        lines.push('- **' + (r.risk || '') + '** — ' + (r.mitigation || ''));
      });
      lines.push('');
    }
    if (Array.isArray(c.operatingPrinciples)){
      lines.push('## 09 · Operating principles');
      c.operatingPrinciples.forEach(function(rule, i){ lines.push((i + 1) + '. ' + rule); });
      lines.push('');
    }
    if (Array.isArray(c.nextThreeMoves)){
      lines.push('## 10 · Next three moves');
      c.nextThreeMoves.forEach(function(m, i){
        lines.push((i + 1) + '. **' + (m.move || '') + '** (' + (m.tool || '') + ')');
        if (m.rationale) lines.push('   ' + m.rationale);
      });
      lines.push('');
    }
    if (c.closingDirective){
      lines.push('## Closing directive');
      lines.push(c.closingDirective);
    }
    var md = lines.join('\n');
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(md).then(function(){ alert('Copied Codex as Markdown.'); }).catch(function(){ alert('Copy failed.'); });
    }
  }

  /* --- Trigger + retry --- */
  function triggerCodexGeneration(){
    if (state.codexAttemptInProgress) return;
    state.codexAttemptInProgress = true;
    state.isGenerating = true;
    state.codexError = null;
    state.codexErrorKind = null;
    state.codex = null;
    scheduleSave();
    render();
    startCodexStatusCycle();
    generateCodex().then(function(json){
      stopCodexStatusCycle();
      state.codex = json;
      state.isGenerating = false;
      state.codexAttemptInProgress = false;
      syncQBP(state.data, json);
      scheduleSave();
      render();
    }).catch(function(err){
      stopCodexStatusCycle();
      state.isGenerating = false;
      state.codexAttemptInProgress = false;
      state.codexError = (err && err.message) || 'Unknown error.';
      state.codexErrorKind = (err && err.kind) || 'other';
      // Log for diagnostics
      console.error('[Soul Map Codex] generation failed', { sessionId: state.codexSessionId, kind: state.codexErrorKind, message: state.codexError });
      render();
    });
  }

  function rerenderStep(){ render(); }

  /* --- Generate default soul-map --- */
  function generateDefaultMap(data){
    var primA = (ARCHETYPES.find(function(a){ return a.id === data.primaryArch; }) || {}).name || '[Primary]';
    var secA  = (ARCHETYPES.find(function(a){ return a.id === data.secondaryArch; }) || {}).name || '[Secondary]';
    var mov   = (MOVEMENTS.find(function(m){ return m.id === data.movementId; }) || {}).name || '[Movement]';
    var alwaysText = data.coreAlwaysIdx !== null && data.always[data.coreAlwaysIdx] ? data.always[data.coreAlwaysIdx] : '[core always]';
    var neverText  = data.coreNeverIdx  !== null && data.nevers[data.coreNeverIdx]  ? data.nevers[data.coreNeverIdx]  : '[core never]';
    var spark = (data.brandName || 'This brand') + ' is not just a business. Moving through the world like ' + (data.leadChoice || '[Lead figure]') + ' and innovating like ' + (data.innChoice || '[Innovator]') + ', we are the only brand that can be ' + primA + ' and ' + secA + ' simultaneously. We exist to prove that ' + (data.originalManifesto || '[belief]') + '. We are definitively ' + (data.posAdj1 || '[adj]') + ', ' + (data.posAdj2 || '[adj]') + ', ' + (data.posAdj3 || '[adj]') + ', built exclusively for the ' + (data.cuEss || '[audience]') + ' who arrives carrying ' + (data.fanSurprise || '[baggage]') + '. We will always ' + alwaysText + ', and we absolutely refuse to ' + neverText + ', because we are the contemporary heirs to ' + mov + '. This is not a market position. It is a place in history.';
    var essence = (data.brandName || 'The brand') + '. The brand that transforms ' + (data.docArgument || '[argument]') + ' into ' + (data.originalManifesto || '[manifesto]') + '.';
    return { spark:spark, essence:essence, primA:primA, secA:secA, mov:mov, alwaysText:alwaysText, neverText:neverText };
  }

  /* --- Build the user payload (verbatim structure from spec Part 2) --- */
  function buildCodexPayload(d){
    var primA = (ARCHETYPES.find(function(a){ return a.id === d.primaryArch;   }) || {}).name || '';
    var secA  = (ARCHETYPES.find(function(a){ return a.id === d.secondaryArch; }) || {}).name || '';
    var tenA  = (ARCHETYPES.find(function(a){ return a.id === d.tensionArch;   }) || {}).name || '';
    var mov   = (MOVEMENTS.find(function(m){ return m.id === d.movementId;    }) || {}).name || '';
    var songLines = (d.songs || []).map(function(s, i){
      if (!s || (!s.n && !s.a && !s.t)) return '  ' + (i+1) + '. (empty)';
      var artist = s.t || s.a || '';
      var feels  = s.f || '';
      var why    = s.w || '';
      var bits = [s.n || '(untitled)'];
      if (artist) bits.push('by ' + artist);
      if (feels)  bits.push('feels ' + feels);
      if (why)    bits.push('why: ' + why);
      return '  ' + (i+1) + '. ' + bits.join(' — ');
    }).join('\n');

    return [
      'THE FOUNDER HAS COMPLETED THE BRAND SOUL MAP. HERE IS THE COMPLETE SESSION.',
      '',
      '══════════════ BRAND HEADER ══════════════',
      'Brand name: ' + (d.brandName || ''),

      'Documentary title: ' + (d.docTitle || ''),
      'Opening image: ' + (d.docImage || ''),
      'Central argument: ' + (d.docArgument || ''),
      'Three voices: ' + (d.docVoices || ''),
      'Final line: ' + (d.docFinalLine || ''),
      'Personal reflection: ' + (d.docReflection || ''),
      'Manifesto line they chose (or wrote): ' + (d.originalManifesto || ''),
      'Belief: ' + (d.manifestoBelief || ''),
      'Proof behavior: ' + (d.manifestoProof || ''),
      'What this belief opposes: ' + (d.manifestoOpposite || ''),
      '',
      '══════════════ MODULE III — CRAFT ══════════════',
      'Primary archetype: ' + primA,
      'Secondary archetype: ' + secA,
      'Tension archetype: ' + tenA,
      'Archetype fusion note: ' + (d.archFusion || ''),
      'Archetype shadow note: ' + (d.archShadow || ''),
      'Anti-brand name: ' + (d.abName || ''),
      'Anti-brand promise: ' + (d.abPromise || ''),
      'Anti-brand belief: ' + (d.abBelief || ''),
      'Anti-brand sells: ' + (d.abSells || ''),
      'Anti-brand never: ' + (d.abNever || ''),
      'Our belief: ' + (d.bBelief || ''),
      'Our sells: ' + (d.bSells || ''),
      'Our never: ' + (d.bNever || ''),
      'Positioning adjectives: ' + [d.posAdj1, d.posAdj2, d.posAdj3].filter(Boolean).join(', '),
      'For: ' + (d.posFor || ''),
      'Not for: ' + (d.posNotFor || ''),
      '',
      '══════════════ MODULE IV — TRIBE ══════════════',
      'Culture — 5 words: ' + (d.cWords || []).join(', ') + ' | Essential: ' + (d.cEss || '') + ' | Why irreplaceable: ' + (d.cEssReason || ''),
      'Customer — 5 words: ' + (d.cuWords || []).join(', ') + ' | Essential: ' + (d.cuEss || '') + ' | Belief that brought them: ' + (d.cuEssReason || ''),
      'Voice — 5 words: ' + (d.vWords || []).join(', ') + ' | Essential: ' + (d.vEss || '') + ' | First 10 seconds feeling: ' + (d.vEssReason || ''),
      'Look/Feel — 5 words: ' + (d.lWords || []).join(', ') + ' | Essential: ' + (d.lEss || '') + ' | Body feeling: ' + (d.lEssReason || ''),
      'Value — 5 words: ' + (d.valWords || []).join(', ') + ' | Essential: ' + (d.valEss || '') + ' | What becomes possible: ' + (d.valEssReason || ''),
      'The fan letter they wrote: ' + (d.fanLetter || ''),
      'What surprised them writing it: ' + (d.fanSurprise || ''),
      'What this person needs permission for: ' + (d.fanNeeds || ''),
      'Target recognition: ' + (d.fanTarget || ''),
      '',
      '══════════════ MODULE V — SIGNAL ══════════════',
      'Aligned brand 1: ' + (d.a1 || '')  + ' | Quality: '  + (d.a1Q || ''),
      'Aligned brand 2: ' + (d.a2 || '')  + ' | Quality: '  + (d.a2Q || ''),
      'Non-aligned brand 1: ' + (d.na1 || '') + ' | Contrast: ' + (d.na1C || ''),
      'Non-aligned brand 2: ' + (d.na2 || '') + ' | Contrast: ' + (d.na2C || ''),
      'Alignment principle: ' + (d.alignPrinciple || ''),
      'Always: ' + (d.alignAlways || ''),
      'Never: ' + (d.alignNever || ''),
      '',
      'Celebrity synthesis:',
      'Leads like: '    + (d.leadChoice || ''),
      'Influences like: ' + (d.infChoice || ''),
      'Innovates like: ' + (d.innChoice || ''),
      'Creates like: '  + (d.creChoice || ''),
      'Endures like: '  + (d.endChoice || ''),
      'Behavioral theme: ' + (d.behTheme || ''),
      '',
      'Soundtrack (5 tracks with brand meaning):',
      songLines,
      '',
      'Rhythm/tempo: ' + (d.rhythmTempo || ''),
      'Emotional register: ' + (d.rhythmEmotion || ''),
      'Voice synthesis note: ' + (d.voiceSynthesis || ''),
      '',
      '══════════════ MODULE VI — WORLD ══════════════',
      'Always list: ' + (d.always || []).filter(Boolean).join(' | '),
      'Core Always: ' + ((d.coreAlwaysIdx !== null && d.always && d.always[d.coreAlwaysIdx]) || ''),
      'Never list: '  + (d.nevers  || []).filter(Boolean).join(' | '),
      'Core Never: '  + ((d.coreNeverIdx  !== null && d.nevers && d.nevers[d.coreNeverIdx])  || ''),
      'Core conviction: '   + (d.coreConviction || ''),
      'Decision framework: ' + (d.decFramework || ''),
      '',
      'Cultural movement chosen: ' + mov,
      'Shared belief with movement: ' + (d.movBelief || ''),
      'Contemporary stance: ' + (d.movStance || ''),
      'Pushing against: ' + (d.movRefusal || ''),
      '',
      '══════════════ END OF SESSION ══════════════',
      '',
      'Synthesize the complete Brand Soul Map Codex. Return only the JSON object specified in the schema.'
    ].join('\n');
  }

  /* --- Call Claude with the production prompt + payload. Returns parsed JSON. --- */
  function generateCodex(){
    var payload = buildCodexPayload(state.data);
    return fetch('/api/claude', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',    // Latest Sonnet (spec: claude-sonnet-4-5 or latest available)
        max_tokens: 8000,
        temperature: 0.7,
        system: CODEX_SYSTEM_PROMPT,
        messages: [{ role:'user', content: payload }]
      })
    }).then(function(res){
      var ct = (res.headers.get('content-type') || '').toLowerCase();
      if (res.status === 404){
        var e = new Error('The /api/claude endpoint is not running here. Deploy to Vercel (or run `vercel dev`) to generate the Codex.');
        e.kind = 'api-key'; throw e;
      }
      if (ct.indexOf('application/json') === -1){
        return res.text().then(function(body){
          var e2 = new Error('Non-JSON response from /api/claude (status ' + res.status + ').');
          e2.kind = 'network'; throw e2;
        });
      }
      return res.json().then(function(data){ return { status:res.status, data:data }; });
    }).then(function(wrap){
      if (wrap.status === 503){
        var e = new Error('Claude API key is not configured. Full synthesis requires the QB API key.');
        e.kind = 'api-key'; throw e;
      }
      if (wrap.status !== 200 || !wrap.data || !wrap.data.content){
        var msg = (wrap.data && wrap.data.error && (wrap.data.error.message || wrap.data.error)) || 'Unexpected response from the AI service.';
        var e2 = new Error(msg); e2.kind = 'upstream'; throw e2;
      }
      var text = '';
      wrap.data.content.forEach(function(b){ if (b.type === 'text') text += b.text; });
      // One repair pass: strip markdown fences + preamble/postamble before parsing
      var clean = text.replace(/```json|```/g, '').trim();
      var s = clean.indexOf('{'), e = clean.lastIndexOf('}');
      if (s < 0 || e < 0){
        var err = new Error('AI response was not valid JSON.');
        err.kind = 'parse'; throw err;
      }
      try { return JSON.parse(clean.substring(s, e + 1)); }
      catch(err2){
        var e3 = new Error('Could not parse the AI response as JSON.');
        e3.kind = 'parse'; throw e3;
      }
    });
  }

  /* --- QBP writeback on Codex success. Writes the 8 new fields per spec Part 6,
         plus preserves the legacy fields downstream tools already read. --- */
  function syncQBP(data, codex){
    try {
      codex = codex || {};
      var primA = (ARCHETYPES.find(function(a){ return a.id === data.primaryArch; }) || {}).name || '';
      var secA  = (ARCHETYPES.find(function(a){ return a.id === data.secondaryArch; }) || {}).name || '';
      var alwaysText = data.coreAlwaysIdx !== null && data.always[data.coreAlwaysIdx] ? data.always[data.coreAlwaysIdx] : '';
      var neverText  = data.coreNeverIdx  !== null && data.nevers[data.coreNeverIdx]  ? data.nevers[data.coreNeverIdx]  : '';
      var voicePrinciples = (codex.voiceToneCode && Array.isArray(codex.voiceToneCode.principles))
        ? codex.voiceToneCode.principles : [];
      var voiceSamples = (codex.voiceToneCode && Array.isArray(codex.voiceToneCode.samples))
        ? codex.voiceToneCode.samples
        : (Array.isArray(codex.voiceSamples) ? codex.voiceSamples : []);
      var existing = {};
      try { Object.assign(existing, JSON.parse(localStorage.getItem('qb_qbp') || '{}')); } catch(e){}
      var updated = Object.assign({}, existing, {
        // Legacy fields (kept so downstream tools that already read them don't break)
        brandName:       data.brandName || existing.brandName || '',
        brandEssence:    (codex.essence || '').substring(0, 300),
        spark:           (codex.spark || '').substring(0, 800),
        archetype:       primA ? (primA + (secA ? ' + ' + secA : '')) : (existing.archetype || ''),
        manifesto:       data.originalManifesto || existing.manifesto || '',
        antiBrand:       (codex.positioningSpine && codex.positioningSpine.refusedTerritory)
                            || (neverText ? ('We refuse to: ' + neverText) : (existing.antiBrand || '')),
        alwaysNever:     ((alwaysText ? 'Always: ' + alwaysText : '') + (neverText ? ' | Never: ' + neverText : '')) || existing.alwaysNever || '',
        primaryPersona:  (codex.communitySoul && codex.communitySoul.personPortrait)
                            || (data.cuEss ? ('The ' + data.cuEss + ' who ' + (data.fanTarget || '')) : (existing.primaryPersona || '')),
        naturalForce:    data.mod1Force || existing.naturalForce || '',
        paradox:         data.posAdj1 && data.posAdj2 ? (data.posAdj1 + ' yet ' + data.posAdj2) : (existing.paradox || ''),
        // NEW fields (spec Part 6) — downstream tools (Voice Guide, Logo Direction, content agents) read these
        verdict:              codex.verdict || '',
        operatingPrinciples:  Array.isArray(codex.operatingPrinciples) ? codex.operatingPrinciples : [],
        voiceSamples:         voiceSamples,
        voiceNotes:           voicePrinciples.join(' | '),
        tensionsToManage:     Array.isArray(codex.tensionsToManage) ? codex.tensionsToManage : [],
        nextThreeMoves:       Array.isArray(codex.nextThreeMoves) ? codex.nextThreeMoves : [],
        culturalPosition:     (codex.culturalPosition && codex.culturalPosition.signature) || '',
        soulMapComplete:      true,
        soulMapCompletedAt:   new Date().toISOString(),
        soulMapSessionId:     state.codexSessionId || newSessionId()
      });
      // Cloud-aware write: mirrors to Supabase if user is authed, no-op otherwise
      if (window.QB && QB.setQBP) { QB.setQBP(updated); }
      else { localStorage.setItem('qb_qbp', JSON.stringify(updated)); }
      // Note: qb_soul_map_done legacy flag removed — completion is recorded
      // by QB.openGate() → QB.recordCompletion() below as the single source.
      try {
        if (window.parent && window.parent !== window){
          window.parent.postMessage({ type:'QB_PHASE_COMPLETE', phase:1, tool:'soul-map', qbp:updated }, window.location.origin || '*');
        }
      } catch(e){}
      // Open soft gate (no-op if already authed; records local completion either way)
      try {
        if (window.QB && QB.openGate) {
          QB.openGate({ toolId:'soul-map', toolName:'Brand Soul Map', brandName: updated.brandName || '' });
        }
      } catch(e){ console.warn('QB gate:', e); }
    } catch(e){ console.warn('QBP sync:', e); }
  }

  function copyToClipboard(){
    var el = document.getElementById('soul-map-content');
    if (!el) return;
    var text = el.innerText;
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){
        alert('Copied to clipboard.');
      }).catch(function(){ alert('Copy failed.'); });
    }
  }

  /* --- Navigation handlers --- */
  function handleNext(){
    if (!isStepValid(state.currentStep)) return;
    if (state.currentStep === STEPS.length - 2){
      // Entering synthesis — advance the step, then kick off the production Codex call.
      state.currentStep = STEPS.length - 1;
      state.maxStepReached = Math.max(state.maxStepReached, state.currentStep);
      state.codexSessionId = state.codexSessionId || newSessionId();
      scheduleSave();
      var mainEl = document.getElementById('mainScrollContainer');
      if (mainEl) mainEl.scrollTo({ top:0, behavior:'smooth' });
      // If we already have a cached codex for this session, show it; otherwise generate.
      if (state.codex){ render(); return; }
      triggerCodexGeneration();
      return;
    }
    var ns = Math.min(STEPS.length - 1, state.currentStep + 1);
    state.currentStep = ns;
    state.maxStepReached = Math.max(state.maxStepReached, ns);
    scheduleSave();
    render();
    var sc = document.getElementById('mainScrollContainer');
    if (sc) sc.scrollTo({ top:0, behavior:'smooth' });
  }
  function handlePrev(){
    if (state.currentStep === 0) return;
    state.currentStep = Math.max(0, state.currentStep - 1);
    scheduleSave();
    render();
    var sc = document.getElementById('mainScrollContainer');
    if (sc) sc.scrollTo({ top:0, behavior:'smooth' });
  }
  function jumpToStep(idx){
    if (!isStepUnlocked(idx)) return;
    state.currentStep = idx;
    state.mobileMenuOpen = false;
    paintMobile();
    scheduleSave();
    render();
    var sc = document.getElementById('mainScrollContainer');
    if (sc) sc.scrollTo({ top:0, behavior:'smooth' });
  }

  /* --- Paint helpers (partial rerenders to avoid destroying inputs on every keystroke) --- */
  function paintStepNav(){
    var nav = document.getElementById('stepNav');
    if (!nav) return;
    nav.innerHTML = '';
    STEPS.forEach(function(step, idx){
      var locked = !isStepUnlocked(idx);
      var active = state.currentStep === idx;
      var done   = isStepValid(idx) && idx < state.currentStep && !active;
      var btn = el('button', {
        class:'step-btn' + (active ? ' active' : ''),
        type:'button',
        disabled: locked ? '' : null,
        onclick:function(){ jumpToStep(idx); }
      }, [
        el('span', { class:'mark', text: done ? '✓' : (locked ? '🔒' : (idx < 10 ? '0' + idx : String(idx))) }),
        el('span', { class:'label', text: step.title })
      ]);
      nav.appendChild(btn);
    });
  }

  function paintDock(){
    var hintEl = document.getElementById('dockHint');
    var nextBtn = document.getElementById('dockNext');
    var prevBtn = document.getElementById('dockPrev');
    var fill    = document.getElementById('dockFill');
    var isLast = state.currentStep === STEPS.length - 1;
    var valid = isStepValid(state.currentStep);
    var disabled = state.isGenerating || !valid || isLast;
    var nextLabel = state.currentStep === STEPS.length - 2
      ? 'Initiate synthesis →'
      : (STEPS[state.currentStep + 1] && STEPS[state.currentStep + 1].checkpoint
          ? 'View diagnostic →'
          : 'Next module →');
    if (nextBtn){
      nextBtn.textContent = nextLabel;
      nextBtn.disabled = disabled;
    }
    if (prevBtn){
      prevBtn.disabled = state.currentStep === 0 || state.isGenerating;
    }
    if (hintEl){
      hintEl.textContent = disabled && !isLast ? 'Requirements not met' : '';
      hintEl.style.display = (disabled && !isLast) ? 'inline-block' : 'none';
    }
    if (fill){
      var pct = (state.currentStep / (STEPS.length - 1)) * 100;
      fill.style.width = pct + '%';
    }
  }

  function paintMobile(){
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('mobileOverlay');
    if (sidebar) sidebar.classList.toggle('open', state.mobileMenuOpen);
    if (overlay) overlay.classList.toggle('open', state.mobileMenuOpen);
  }

  /* --- Main render --- */
  function render(){
    $app.innerHTML = '';
    var fn = views[state.currentStep];
    if (fn){
      try { $app.appendChild(fn()); }
      catch(err){
        console.error('[Soul Map] render failed:', err);
        $app.innerHTML = '<div style="padding:80px 24px; text-align:center"><h1 style="font-family:var(--f-display); font-size:2rem; margin-bottom:16px">Something broke.</h1><p style="color:var(--text-3); margin-bottom:24px">Open the console for details. Clearing local storage usually fixes it.</p><button onclick="localStorage.removeItem(\'qb-soul-map-local\');location.reload()" class="btn btn-primary btn-sm">Reset & reload</button></div>';
      }
    }
    paintStepNav();
    paintDock();
    paintSaveIndicator();
  }

  /* --- Wire global buttons --- */
  document.getElementById('dockNext').addEventListener('click', handleNext);
  document.getElementById('dockPrev').addEventListener('click', handlePrev);

  var themeToggle = document.getElementById('themeToggle');
  var themeToggleMobile = document.getElementById('themeToggleMobile');
  var toggleIconEl = document.getElementById('toggleIcon');
  function syncThemeIcon(){
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (toggleIconEl) toggleIconEl.textContent = dark ? '☀' : '☽';
    if (themeToggleMobile) themeToggleMobile.textContent = dark ? '☀' : '☽';
  }
  syncThemeIcon();
  function toggleTheme(){
    var cur = document.documentElement.getAttribute('data-theme');
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('qb-theme', next); } catch(e){}
    syncThemeIcon();
  }
  if (themeToggle)       themeToggle.addEventListener('click', toggleTheme);
  if (themeToggleMobile) themeToggleMobile.addEventListener('click', toggleTheme);

  var mobileBtn = document.getElementById('mobileMenuBtn');
  var mobileOverlay = document.getElementById('mobileOverlay');
  if (mobileBtn){
    mobileBtn.addEventListener('click', function(){
      state.mobileMenuOpen = !state.mobileMenuOpen;
      paintMobile();
    });
  }
  if (mobileOverlay){
    mobileOverlay.addEventListener('click', function(){
      state.mobileMenuOpen = false;
      paintMobile();
    });
  }

  /* --- Boot --- */
  loadState();
  render();
})();
