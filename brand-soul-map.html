    <style>
        /* QB BrandOS Design System: Entangled Time */
        :root, [data-theme="dark"] {
            --bg-void: #080604;
            --bg-deep: #0A0806;
            --bg-base: #0E0C09;
            --bg-surface: rgba(140,110,70,0.045);
            --bg-elevated: rgba(140,110,70,0.07);
            --bg-overlay: rgba(18,15,10,0.85);
            --border-subtle: rgba(140,110,70,0.06);
            --border-medium: rgba(140,110,70,0.11);
            --border-strong: rgba(140,110,70,0.18);
            --patina: #3A5F4A;
            --patina-lit: #4A7A5E;
            --patina-dim: rgba(58,95,74,0.2);
            --patina-faint: rgba(58,95,74,0.08);
            --brass: #A8903E;
            --brass-lit: #C4A84E;
            --brass-dim: rgba(168,144,62,0.18);
            --brass-faint: rgba(168,144,62,0.06);
            --text-1: #DDD4C4;
            --text-2: #A89A88;
            --text-3: #6A5E50;
            --text-4: #3E3830;
        }

        [data-theme="light"] {
            --bg-void: #F4F0EB;
            --bg-deep: #EDE8E2;
            --bg-base: #E6E0D8;
            --bg-surface: rgba(100,80,50,0.04);
            --bg-elevated: rgba(100,80,50,0.07);
            --bg-overlay: rgba(244,240,235,0.9);
            --border-subtle: rgba(100,80,50,0.08);
            --border-medium: rgba(100,80,50,0.14);
            --border-strong: rgba(100,80,50,0.22);
            --patina: #2E4E3C;
            --patina-lit: #3A6A4E;
            --patina-dim: rgba(46,78,60,0.15);
            --patina-faint: rgba(46,78,60,0.06);
            --brass: #8A7430;
            --brass-lit: #A08A3A;
            --brass-dim: rgba(138,116,48,0.15);
            --brass-faint: rgba(138,116,48,0.05);
            --text-1: #1A1610;
            --text-2: #5A5040;
            --text-3: #8A7E70;
            --text-4: #B8AEA0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-void);
            color: var(--text-2);
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Vignette effect */
        .main-content::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(8,6,4,0.4) 100%);
            transition: background 0.4s ease;
        }
        [data-theme="light"] .main-content::before {
            background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(200,190,175,0.15) 100%);
        }

        /* Film Grain */
        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
            mix-blend-mode: normal;
        }
        [data-theme="light"] .noise-overlay { opacity: 0.02; mix-blend-mode: multiply; }

        /* Typography Defaults */
        h1, h2, h3, h4 {
            font-family: 'DM Serif Display', Georgia, serif !important;
            font-weight: 400 !important;
            letter-spacing: -0.015em !important;
            text-transform: none !important;
            color: var(--text-1) !important;
        }

        p, div, span {
            line-height: 1.7;
        }

        /* Glass Cards */
        .glass-card, .glass-panel, .glass-dock {
            background: var(--bg-overlay);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-medium);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .glass-dock { border-radius: 40px; }

        /* Warm light leak */
        .glass-card::before, .glass-panel::before, .glass-dock::before {
            content: '';
            position: absolute;
            top: -30%; left: -10%;
            width: 60%; height: 60%;
            background: radial-gradient(ellipse at center, var(--brass-dim) 0%, transparent 70%);
            pointer-events: none;
            opacity: 0.6;
            z-index: 0;
        }

        /* Ensure content inside glass elements sits above the pseudo-element */
        .glass-card > *, .glass-panel > *, .glass-dock > * {
            position: relative;
            z-index: 1;
        }

        /* Form Inputs */
        input:focus, textarea:focus, select:focus {
            border-color: var(--patina) !important;
            box-shadow: 0 0 0 3px var(--patina-faint), 0 0 24px -4px var(--brass-dim) !important;
            outline: none !important;
        }
        input, textarea, select {
            background: var(--bg-surface) !important;
            border: 1px solid var(--border-medium) !important;
            color: var(--text-1) !important;
            transition: all 0.2s ease;
        }
        input::placeholder, textarea::placeholder {
            font-style: italic;
            color: var(--text-3) !important;
            opacity: 0.7;
        }

        /* Buttons */
        .btn-primary {
            background: var(--patina) !important;
            color: #E6DDD0 !important;
            font-weight: 600 !important;
            font-size: 11px !important;
            letter-spacing: 0.06em !important;
            text-transform: uppercase !important;
            padding: 13px 30px !important;
            border-radius: 7px !important;
            border: none !important;
            transition: all 0.25s ease !important;
            font-family: 'Inter', sans-serif !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--patina-lit) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 24px -4px rgba(58,95,74,0.3), 0 0 0 1px var(--brass-faint) !important;
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: var(--bg-surface) !important;
            color: var(--text-3) !important;
            box-shadow: none !important;
            transform: none !important;
        }

        .qb-send-results-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--patina) !important;
            color: #E6DDD0 !important;
            border: none !important;
            border-radius: 7px !important;
            padding: 13px 30px !important;
            font-size: 11px !important;
            font-weight: 600 !important;
            letter-spacing: 0.06em !important;
            text-transform: uppercase !important;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            margin-top: 24px;
            transition: all 0.25s ease;
        }
        .qb-send-results-btn:hover {
            background: var(--patina-lit) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 24px -4px rgba(58,95,74,0.3), 0 0 0 1px var(--brass-faint) !important;
        }

        /* Manifesto Block */
        .manifesto-block {
            position: relative;
            padding: 28px 0 28px 26px;
        }
        .manifesto-block::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2.5px;
            background: linear-gradient(180deg, var(--brass) 0%, var(--patina) 100%);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--brass-faint);
        }

        /* Indicators */
        .pulse-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--brass);
            box-shadow: 0 0 8px var(--brass-dim), 0 0 2px var(--brass);
            animation: beat 3s ease infinite;
            display: inline-block;
        }
        @keyframes beat {
            0%, 100% { transform: scale(1); opacity: 1; }
            12% { transform: scale(1.35); opacity: 1; }
            24% { transform: scale(0.95); opacity: 0.6; }
            36% { transform: scale(1.15); opacity: 1; }
            48% { transform: scale(1); opacity: 0.7; }
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--patina), var(--brass));
            border-radius: 2px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--patina); }

        /* Grayscale & Warm Contrast for Visual Headers */
        .quantum-img {
            filter: grayscale(100%) contrast(110%) sepia(20%) hue-rotate(15deg);
            opacity: 0.4;
            mix-blend-mode: luminosity;
            transition: opacity 0.4s ease;
        }
        [data-theme="light"] .quantum-img {
            opacity: 0.25;
        }

        /* Image overlay text fix */
        .image-overlay-text {
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }

        /* Physics & Motion */
        .animate-fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Fix for select dropdown styling */
        select option {
            background: #0E0C09;
            color: #DDD4C4;
        }
        [data-theme="light"] select option {
            background: #E6E0D8;
            color: #1A1610;
        }
    </style>

        window._firebaseReady = true;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>

            look: ["Cinematic", "Tactile", "Luminous", "Minimal", "Lush", "Industrial", "Sacred", "Futuristic", "Handcrafted", "Architectural", "Organic", "Electric", "Timeless", "Avant-garde", "Earthy", "Sleek", "Layered", "Raw", "Curated", "Ancient", "Monumental"],
            value: ["Clarity", "Momentum", "Belonging", "Permission", "Authority", "Courage", "Mastery", "Peace", "Identity", "Direction", "Power", "Confidence", "Wholeness", "Voice", "Legacy", "Freedom", "Precision", "Visibility", "Purpose", "Wealth", "Dignity"]

        const MOVEMENTS = [

        const QUOTES = [

        // --- HELPER FUNCTIONS (outside component) ---

        const generateDefaultMap = (data) => {
            const primA = ARCHETYPES.find(a => a.id === data.primaryArch)?.name || '[Primary]';
            const secA = ARCHETYPES.find(a => a.id === data.secondaryArch)?.name || '[Secondary]';
            const mov = MOVEMENTS.find(m => m.id === data.movementId)?.name || '[Movement]';
            const alwaysText = data.coreAlwaysIdx !== null && data.always?.[data.coreAlwaysIdx] ? data.always[data.coreAlwaysIdx] : '[core always]';
            const neverText = data.coreNeverIdx !== null && data.nevers?.[data.coreNeverIdx] ? data.nevers[data.coreNeverIdx] : '[core never]';

            const spark = `${data.brandName} is not just a business. Moving through the world like ${data.leadChoice || '[Lead Figure]'} and innovating like ${data.innChoice || '[Innovator]'}, we are the only brand that can be ${primA} and ${secA} simultaneously. We exist to prove that ${data.manifestoBelief || '[belief]'}. We are definitively ${data.posAdj1 || '[adj]'}, ${data.posAdj2 || '[adj]'}, ${data.posAdj3 || '[adj]'}, built exclusively for the ${data.cuEss || '[audience]'} who arrives carrying ${data.fanSurprise || '[baggage]'}. We will always ${alwaysText}, and we absolutely refuse to ${neverText}, because we are the contemporary heirs to ${mov}. This is not a market position. It is a place in history.`;

            const essence = `${data.brandName} \u2014 The brand that transforms ${data.docArgument || '[argument]'} into ${data.originalManifesto || '[manifesto]'}.`;

            return { spark, essence, primA, secA, mov, alwaysText, neverText };
        };

        const generateAI = async (data) => {
            const primA = ARCHETYPES.find(a => a.id === data.primaryArch)?.name || '';
            const secA = ARCHETYPES.find(a => a.id === data.secondaryArch)?.name || '';
            const mov = MOVEMENTS.find(m => m.id === data.movementId)?.name || '';
            const tenA = ARCHETYPES.find(a => a.id === data.tensionArch)?.name || '';
            const alwaysText = data.coreAlwaysIdx !== null && data.always?.[data.coreAlwaysIdx] ? data.always[data.coreAlwaysIdx] : '';
            const neverText = data.coreNeverIdx !== null && data.nevers?.[data.coreNeverIdx] ? data.nevers[data.coreNeverIdx] : '';

            try {
                const response = await fetch('/api/claude', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1200,
                        system: `You are a master brand strategist. Synthesize brand inputs into precise, emotionally resonant brand intelligence. Respond with valid JSON only: {"spark":"...","essence":"..."}`,
                        messages: [{ role: 'user', content: `Brand: ${data.brandName}, Primary: ${primA}, Secondary: ${secA}, Movement: ${mov}, Tension: ${tenA}, Belief: ${data.manifestoBelief}, Adjectives: ${data.posAdj1}, ${data.posAdj2}, ${data.posAdj3}, Audience: ${data.cuEss}, Force: ${data.mod1Force}, Always: ${alwaysText}, Never: ${neverText}. Generate spark (200-350 words) and essence (one sentence). JSON only.` }]
                    })
                });

                if (!response.ok) throw new Error('API response not ok: ' + response.status);

                const result = await response.json();
                if (result.error) throw new Error(result.error.message || 'API error');

                const text = result.content?.[0]?.text || '';
                const clean = text.replace(/```json|```/g, '').trim();
                return JSON.parse(clean);
            } catch (e) {
                console.warn("AI Generation unavailable (standalone mode):", e.message);
                return null;
            }

        // --- MAIN APP ---
        const App = () => {

                    if (saved) return saved === 'dark';
                } catch(e) {}
                return true;
            });

            useEffect(() => {
                const theme = isDarkMode ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', theme);
                try { localStorage.setItem('qb-theme', theme); } catch(e) {}
            }, [isDarkMode]);

            const toggleTheme = useCallback(() => setIsDarkMode(p => !p), []);

            const updateData = useCallback((key, value) => {
                setData(prev => ({ ...prev, [key]: value }));
            }, []);

            const isStepValid = useCallback((idx) => {
                switch(idx) {
                    case 0: return data.brandName.trim() !== '';
                    case 1: return data.mod1Force.trim() !== '' && data.mod1Portrait.trim() !== '';
                    case 2: return true;
                    case 3: return data.docArgument.trim() !== '' && data.originalManifesto.trim() !== '';
                    case 4: return true;
                    case 5: return data.primaryArch !== null && data.secondaryArch !== null && data.posAdj1.trim() !== '';
                    case 6: return true;
                    case 7: return data.cEss !== '' && data.cuEss !== '' && data.fanTarget.trim() !== '';
                    case 8: return true;
                    case 9: return data.a1.trim() !== '' && data.na1.trim() !== '' && data.leadChoice !== '';
                    case 10: return true;
                    case 11: return data.coreAlwaysIdx !== null && data.coreNeverIdx !== null && data.always[data.coreAlwaysIdx]?.trim() !== '' && data.movementId !== null;
                    case 12: return true;
                    case 13: {
                        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                        return emailRegex.test(data.email.trim()) && (
                            (data.firstName.trim() !== '' && data.lastName.trim() !== '') || data.companyName.trim() !== ''
                        );
                    }
                    case 14: return true;
                    default: return false;
                }
            }, [data]);

            // Firebase init: wait for the module to signal readiness
            useEffect(() => {
                const tryInit = () => {
                    if (!window.FirebaseCore) return false;
                    try {
                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FirebaseCore;

                        // Check if config globals exist
                        const hasConfig = typeof __firebase_config !== 'undefined' && __firebase_config;
                        if (!hasConfig) {
                            console.warn("No Firebase config found — running in standalone/local mode.");
                            setFirebaseAvailable(false);
                            setIsLoaded(true);
                            return true;
                        }

                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const firestoreDb = getFirestore(app);
                        setDb(firestoreDb);
                        setAuthInstance(auth);
                        setFirebaseAvailable(true);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            signInWithCustomToken(auth, __initial_auth_token).catch(e => console.warn('Custom token auth failed:', e));
                        } else {
                            signInAnonymously(auth).catch(e => console.warn('Anonymous auth failed:', e));
                        }

                        onAuthStateChanged(auth, (usr) => { if (usr) setUser(usr); });
                        return true;
                    } catch (err) {
                        console.warn("Firebase init failed:", err.message);
                        setFirebaseAvailable(false);
                        setIsLoaded(true);
                        return true;
                    }
                };

                // Try immediately (module may already be loaded)
                if (tryInit()) return;

                // Otherwise listen for the ready event
                const handler = () => tryInit();
                window.addEventListener('firebase-ready', handler);

                // Safety fallback: if Firebase never loads, just start the app
                const timeout = setTimeout(() => {
                    console.warn("Firebase SDK load timeout — starting in standalone mode.");
                    setFirebaseAvailable(false);
                    setIsLoaded(true);
                }, 3000);

                return () => {
                    window.removeEventListener('firebase-ready', handler);
                    clearTimeout(timeout);
                };
            }, []);

            // Load saved data from Firestore
            useEffect(() => {
                if (!user || !db || !firebaseAvailable) return;
                const { doc, onSnapshot } = window.FirebaseCore;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'brandMap', 'progress');

                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const savedData = docSnap.data();
                        if (savedData.answers) setData(prev => ({...prev, ...savedData.answers}));
                        if (savedData.maxStep !== undefined && !isLoaded) {
                            setMaxStepReached(savedData.maxStep);
                            setCurrentStep(savedData.currentStep || 0);
                        }
                    }
                    if (!isLoaded) setIsLoaded(true);
                }, (err) => {
                    console.error("Firestore fetch error:", err);
                    if (!isLoaded) setIsLoaded(true);
                });

                return () => unsubscribe();
            }, [user, db, firebaseAvailable]);

            // If no firebase, load from localStorage
            useEffect(() => {
                if (!firebaseAvailable && isLoaded) {
                    try {
                        const saved = localStorage.getItem('qb-soul-map-local');
                        if (saved) {
                            const parsed = JSON.parse(saved);
                            if (parsed.answers) setData(prev => ({...prev, ...parsed.answers}));
                            if (parsed.maxStep !== undefined) setMaxStepReached(parsed.maxStep);
                            if (parsed.currentStep !== undefined) setCurrentStep(parsed.currentStep);
                        }
                    } catch(e) { console.warn('Local restore failed:', e); }
                }
            }, [firebaseAvailable, isLoaded]);

            // Save to Firestore or localStorage
            useEffect(() => {
                if (!isLoaded) return;

                const saveData = async () => {
                    setIsSaving(true);
                    try {
                        if (firebaseAvailable && user && db) {
                            const { doc, setDoc } = window.FirebaseCore;
                            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'brandMap', 'progress');
                            await setDoc(docRef, { answers: data, currentStep, maxStep: maxStepReached }, { merge: true });
                        } else {
                            // Fallback: save to localStorage
                            localStorage.setItem('qb-soul-map-local', JSON.stringify({
                                answers: data, currentStep, maxStep: maxStepReached
                            }));
                        }
                    } catch(err) {
                        console.error("Save error:", err);
                        // Fallback to localStorage on Firestore error
                        try {
                            localStorage.setItem('qb-soul-map-local', JSON.stringify({
                                answers: data, currentStep, maxStep: maxStepReached
                            }));
                        } catch(e) {}
                    } finally {
                        setTimeout(() => setIsSaving(false), 500);
                    }
                };

                const timeout = setTimeout(saveData, 1500);
                return () => clearTimeout(timeout);
            }, [data, currentStep, maxStepReached, user, db, isLoaded, firebaseAvailable]);

            const handleGoogleSignIn = async () => {
                if (!authInstance) return;
                try {
                    const { GoogleAuthProvider, signInWithPopup } = window.FirebaseCore;
                    const provider = new GoogleAuthProvider();
                    await signInWithPopup(authInstance, provider);
                } catch(e) { console.error("Google sign in error", e); }
            };

            // --- MODULE COMPONENTS (using useCallback-bound updateData) ---

            const IntroModule = () => (

                        </FormField>

            const Module1 = () => (

                    <VisualHeader title="Module I: Identity" subtitle="Exercises 1\u20134" imageUrl={IMAGES.identity} />
                    <div className="space-y-12">
                        <section className="glass-panel p-8 md:p-12">

                            <FormField label="The Energy" helper="What force of nature most accurately represents the energy of your brand?">
                                <TextInput value={data.mod1Force} onChange={(v) => updateData('mod1Force', v)} placeholder="Describe the force..." rows={2} />
                            </FormField>

                            <h3 className="text-2xl mb-8 border-b border-subtle pb-4 mt-12">02. The Museum Room</h3>
                            <FormField label="The Artifacts" helper="If your brand were a room in a museum, what objects are in it?">
                                <TextInput value={data.mod1Room} onChange={(v) => updateData('mod1Room', v)} placeholder="Describe the aesthetic and artifacts..." rows={2} />
                            </FormField>

                            <h3 className="text-2xl mb-8 border-b border-subtle pb-4 mt-12">03. Mythological Figure</h3>
                            <FormField label="The Archetype" helper="Which mythic figure or historical legend embodies your brand?">
                                <TextInput value={data.mod1Myth} onChange={(v) => updateData('mod1Myth', v)} placeholder="e.g. Prometheus bringing fire..." rows={2} />
                            </FormField>

                            <h3 className="text-2xl mb-8 border-b border-subtle pb-4 mt-12">04. The Identity Portrait</h3>
                            <FormField label="The Synthesis" helper="Synthesize the force, the artifacts, and the myth into your brand's portrait.">
                                <TextInput value={data.mod1Portrait} onChange={(v) => updateData('mod1Portrait', v)} placeholder="Combine them into a cohesive identity..." rows={3} />
                            </FormField>
                        </section>
                    </div>
                </div>
            );

            const Module1Recap = () => (
                <CheckpointPanel title="Identity Portrait" subtitle="Checkpoint I">
                    <p className="mb-6"><span className="font-mono text-[9px] tracking-[0.2em] uppercase text-text3 block mb-2">Energy</span>
                    <span className="text-text1 font-medium">{data.mod1Force || '[Natural Force]'}</span></p>
                    <p className="mb-6"><span className="font-mono text-[9px] tracking-[0.2em] uppercase text-text3 block mb-2">Aesthetic</span>
                    <span className="text-text1 font-medium">{data.mod1Room || '[Museum Room]'}</span></p>
                    <p className="mb-6"><span className="font-mono text-[9px] tracking-[0.2em] uppercase text-text3 block mb-2">Archetype</span>
                    <span className="text-text1 font-medium">{data.mod1Myth || '[Mythological Figure]'}</span></p>

                        const imgHeightMM = (canvas.height * pdfWidth) / canvas.width;
                        let heightLeft = imgHeightMM - pdfHeight;
                        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, imgHeightMM);
                        while (heightLeft > 0) {
                            pdf.addPage();
                            pdf.addImage(imgData, 'PNG', 0, -(imgHeightMM - heightLeft), pdfWidth, imgHeightMM);
                            heightLeft -= pdfHeight;
                        }
                        pdf.save((data.brandName || 'Brand') + '_SOULMAP.pdf');
                    } catch(e) {
                        console.error('PDF generation failed:', e);
                        alert('PDF generation failed. Try the Copy option instead.');
                    }
                };

                if (isGenerating) {
                    return (
                        <div className="max-w-5xl mx-auto py-32 fade-in flex flex-col items-center justify-center text-center min-h-[60vh]">
                            <div className="relative w-16 h-16 mb-8 flex items-center justify-center">
                                <div className="pulse-dot" style={{width: '24px', height: '24px'}}></div>
                            </div>
                            <h2 className="text-3xl font-mono text-patina tracking-[0.2em] uppercase mb-4" style={{fontFamily: '"JetBrains Mono", monospace', color: 'var(--patina)'}}>Processing Synthesis...</h2>
                            <p className="font-light italic text-text3 text-lg">Distilling your strategy and preparing output.</p>
                        </div>
                    );
                }

                return (
                    <div className="max-w-5xl mx-auto pb-20 fade-in">
                        <VisualHeader title="The Synthesis" subtitle="FINAL OUTPUT" imageUrl={IMAGES.synthesis} />
                        <div className="flex flex-col sm:flex-row justify-between items-end mb-12 px-4 gap-4">
                            <div>
                                <h2 className="text-3xl mb-2">The Brand Soul Map</h2>
                                <p className="font-mono text-[9px] text-brass uppercase tracking-[0.2em]">SYS.TRANSMITTED TO {data.email}</p>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={copyToClipboard} className="btn-primary" style={{background: 'var(--bg-surface)', color: 'var(--text-1)', border: '1px solid var(--border-medium)'}}>
                                    <IconCopy className="mr-2 w-4 h-4" /> COPY
                                </button>
                                <button onClick={downloadPDF} className="btn-primary">
                                    <IconDownload className="mr-2 w-4 h-4" /> PDF
                                </button>
                            </div>
                        </div>

                        <div id="soul-map-content" className="bg-base border border-medium rounded-[14px] p-10 md:p-20 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-[2.5px] bg-gradient-to-r from-brass via-patina to-brass opacity-50"></div>

                            <div className="text-center mb-20 pb-12 border-b border-medium">
                                <h1 className="text-4xl md:text-[54px] mb-4 leading-[1.1]">{data.brandName}</h1>
                                <p className="font-mono text-[9px] text-brass uppercase tracking-[0.2em]">THE SOUL MAP</p>
                            </div>

                            <div className="grid md:grid-cols-2 gap-x-16 gap-y-12 mb-16 font-sans">
                                <div>
                                    <h3 className="font-mono text-[9px] text-text3 uppercase tracking-[0.2em] mb-6 border-l-2 pl-4" style={{fontFamily: '"JetBrains Mono", monospace', color: 'var(--text-3)', borderColor: 'var(--patina-dim)'}}>I. The Purpose</h3>
                                    <div className="space-y-4 text-sm text-text1">
                                        <p><span className="font-mono text-[9px] tracking-[0.2em] text-text4 block mb-1">LEGACY</span> "{data.brandName} will prove {data.docArgument || '___'}"</p>
                                        <p><span className="font-mono text-[9px] tracking-[0.2em] text-text4 block mb-1">BELIEF</span> "{data.originalManifesto || '___'}"</p>
                                    </div>
                                </div>
                                <div>
                                    <h3 className="font-mono text-[9px] text-text3 uppercase tracking-[0.2em] mb-6 border-l-2 pl-4" style={{fontFamily: '"JetBrains Mono", monospace', color: 'var(--text-3)', borderColor: 'var(--patina-dim)'}}>II. The Positioning</h3>
                                    <div className="space-y-4 text-sm text-text1">
                                        <p><span className="font-mono text-[9px] tracking-[0.2em] text-text4 block mb-1">DNA</span> {mapData.primA} + {mapData.secA}</p>
                                        <p><span className="font-mono text-[9px] tracking-[0.2em] text-text4 block mb-1">MOAT</span> We believe {data.bBelief || '___'}.</p>
                                        <p><span className="font-mono text-[9px] tracking-[0.2em] text-text4 block mb-1">CLAIM</span> We are {data.posAdj1||'___'}, {data.posAdj2||'___'}, {data.posAdj3||'___'}.</p>
                                    </div>
                                </div>
                            </div>

                            <div className="text-center mb-20 mt-16 font-light italic text-2xl text-text2 leading-relaxed px-4 md:px-12">
                                <h3 className="font-mono text-[9px] text-patina uppercase tracking-[0.2em] mb-8 border-t border-medium pt-16 mx-auto w-1/2" style={{fontFamily: '"JetBrains Mono", monospace', color: 'var(--patina)'}}>THE SPARK</h3>
                                <div className="manifesto-block mx-auto text-left w-full max-w-2xl font-serif text-xl text-text1">
                                    "{data.aiSpark || mapData.spark}"
                                </div>
                            </div>

                            <div className="text-center pt-16 border-t border-medium mt-20">
                                <h3 className="font-mono text-[9px] text-text3 uppercase tracking-[0.2em] mb-8" style={{fontFamily: '"JetBrains Mono", monospace', color: 'var(--text-3)'}}>THE ESSENCE</h3>
                                <p className="text-3xl md:text-[42px] text-text1 leading-[1.1]">{data.aiEssence || mapData.essence}</p>
                            </div>
                        </div>
                    </div>
                );
            };

            // NOTE: Each module (IntroModule, Module1, ...) is defined inside App, so its
            // function identity changes on every render. Rendering them as <Module1 /> would
            // make React treat them as a brand-new component type each render, unmounting
            // and remounting the underlying <input>/<textarea> nodes and killing focus on
            // every keystroke. Calling them as plain functions inlines their returned JSX
            // into App's tree, so the DOM nodes persist across renders and focus is kept.
            const STEPS = [
                { title: 'INITIALIZE', isCheckpoint: false, component: IntroModule() },
                { title: 'IDENTITY', isCheckpoint: false, component: Module1() },
                { title: 'SYS.SYNC 01', isCheckpoint: true, component: Module1Recap() },
                { title: 'PURPOSE', isCheckpoint: false, component: Module2() },
                { title: 'SYS.SYNC 02', isCheckpoint: true, component: Module2Recap() },
                { title: 'CRAFT', isCheckpoint: false, component: Module3() },
                { title: 'SYS.SYNC 03', isCheckpoint: true, component: Module3Recap() },
                { title: 'TRIBE', isCheckpoint: false, component: Module4() },
                { title: 'SYS.SYNC 04', isCheckpoint: true, component: Module4Recap() },
                { title: 'SIGNAL', isCheckpoint: false, component: Module5() },
                { title: 'SYS.SYNC 05', isCheckpoint: true, component: Module5Recap() },
                { title: 'WORLD', isCheckpoint: false, component: Module6() },
                { title: 'SYS.SYNC 06', isCheckpoint: true, component: Module6Recap() },
                { title: 'AUTH', isCheckpoint: false, component: LeadCaptureModule() },
                { title: 'SYNTHESIS', isCheckpoint: false, component: SynthesisPanel() }
            ];

            const handleNext = async () => {
                if (currentStep === STEPS.length - 2) {
                    // Heading to Synthesis
                    setIsGenerating(true);
                    setCurrentStep(currentStep + 1);
                    setMaxStepReached(Math.max(maxStepReached, currentStep + 1));
                    const sc = document.getElementById('main-scroll-container');
                    if(sc) sc.scrollTo({ top: 0, behavior: 'smooth' });

                    try {
                        const ai = await generateAI(data);
                        const dm = generateDefaultMap(data);
                        let s = dm.spark, e = dm.essence;
                        if (ai?.spark && ai?.essence) {
                            s = ai.spark; e = ai.essence;
                        }
                        setData(prev => ({ ...prev, aiSpark: s, aiEssence: e }));

                        // Sync to QBP localStorage
                        try {
                            const primA = ARCHETYPES.find(a=>a.id===data.primaryArch)?.name || '';
                            const secA = ARCHETYPES.find(a=>a.id===data.secondaryArch)?.name || '';
                            const alwaysText = data.coreAlwaysIdx !== null && data.always?.[data.coreAlwaysIdx] ? data.always[data.coreAlwaysIdx] : '';
                            const neverText = data.coreNeverIdx !== null && data.nevers?.[data.coreNeverIdx] ? data.nevers[data.coreNeverIdx] : '';

                            const existing = JSON.parse(localStorage.getItem('qb_qbp') || '{}');
                            const updated = Object.assign({}, existing, {
                                brandName: data.brandName || existing.brandName || '',
                                brandEssence: (e || '').substring(0, 300),
                                spark: (s || '').substring(0, 800),
                                archetype: primA ? (primA + (secA ? ' + ' + secA : '')) : (existing.archetype || ''),
                                manifesto: data.originalManifesto || existing.manifesto || '',
                                antiBrand: neverText ? ('We refuse to: ' + neverText) : (existing.antiBrand || ''),
                                alwaysNever: ((alwaysText ? 'Always: ' + alwaysText : '') + (neverText ? ' | Never: ' + neverText : '')) || existing.alwaysNever || '',
                                primaryPersona: data.cuEss ? ('The ' + data.cuEss + ' who ' + (data.fanTarget || '')) : (existing.primaryPersona || ''),
                                naturalForce: data.mod1Force || existing.naturalForce || '',
                                paradox: data.posAdj1 && data.posAdj2 ? (data.posAdj1 + ' yet ' + data.posAdj2) : (existing.paradox || ''),
                                soulMapCompletedAt: new Date().toISOString()
                            });
                            localStorage.setItem('qb_qbp', JSON.stringify(updated));
                            localStorage.setItem('qb_soul_map_done', '1');

                            // Signal parent Hub if in iframe context
                            if (window.parent && window.parent !== window) {
                                const _pmOrigin = (typeof QB_PARENT_ORIGIN !== 'undefined' && QB_PARENT_ORIGIN) ? QB_PARENT_ORIGIN : '*';
                                window.parent.postMessage({ type: 'QB_PHASE_COMPLETE', phase: 1, tool: 'soul-map', qbp: updated }, _pmOrigin);
                            }
                        } catch(qbErr) { console.warn('QB QBP sync:', qbErr); }
                    } catch (err) {
                        console.error('Synthesis error:', err);
                    } finally {
                        setIsGenerating(false);
                    }
                } else {
                    const ns = Math.min(STEPS.length - 1, currentStep + 1);
                    setCurrentStep(ns);
                    setMaxStepReached(Math.max(maxStepReached, ns));
                    const sc = document.getElementById('main-scroll-container');
                    if(sc) sc.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            // Loading screen
            if (!isLoaded) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center main-content" style={{background: 'var(--bg-void)'}}>
                        <div className="noise-overlay"></div>
                        <div className="relative w-16 h-16 mb-4 flex items-center justify-center">
                            <div className="pulse-dot" style={{width: '16px', height: '16px'}}></div>
                        </div>
                        <p className="font-mono text-[9px] tracking-[0.2em] uppercase text-text3">BOOTING SEQUENCE...</p>
                    </div>
                );
            }

            const isNextDisabled = isGenerating || !isStepValid(currentStep);
            const progress = (currentStep / (STEPS.length - 1)) * 100;

            const ThemeToggle = () => (
                <button onClick={toggleTheme} className="p-2 rounded-full bg-surface text-text2 hover:bg-elevated transition-colors border border-medium">
                    {isDarkMode ? <IconSun className="w-4 h-4"/> : <IconMoon className="w-4 h-4"/>}
                </button>
            );

            return (
                <div className="flex h-screen w-full font-sans overflow-hidden main-content">
                    <div className="noise-overlay"></div>

                    {/* Mobile Header */}
                    <div className="md:hidden fixed top-0 left-0 right-0 flex items-center justify-between p-4 bg-overlay border-b border-subtle z-50" style={{backdropFilter: 'blur(16px)'}}>
                        <h1 className="font-serif text-xl text-text1 flex items-center gap-2"><IconTerminal className="w-4 h-4 text-brass" /> SOUL MAP</h1>
                        <div className="flex items-center gap-3"><ThemeToggle /><button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 bg-surface text-text1 rounded border border-medium"><IconMenu /></button></div>
                    </div>

                    {/* Mobile overlay */}
                    {isMobileMenuOpen && <div className="fixed inset-0 bg-void/80 backdrop-blur-sm z-40 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    {/* Sidebar */}
                    <div className={`fixed inset-y-0 left-0 w-72 md:w-[280px] border-r border-subtle flex-shrink-0 flex flex-col p-8 z-50 transform transition-transform duration-300 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 h-screen overflow-y-auto`} style={{background: 'var(--bg-deep)'}}>
                        <div className="mb-12 hidden md:flex items-start justify-between">
                            <div>
                                <h1 className="text-[22px] font-serif text-text1 flex items-center gap-2"><IconTerminal className="w-5 h-5 text-brass" /> SOUL MAP</h1>
                                <p className="font-mono text-[9px] text-text3 uppercase mt-2 tracking-[0.2em]">STRATEGY TERMINAL</p>
                            </div>
                            <ThemeToggle />
                        </div>

                        <nav className="flex-1">
                            <ul className="relative space-y-1">
                                {STEPS.map((step, idx) => {
                                    const isLocked = idx > maxStepReached;
                                    const isActive = currentStep === idx;
                                    const isComp = isStepValid(idx);
                                    return (
                                        <li key={idx} className="relative z-10">
                                            <button onClick={() => { if(!isLocked) { setCurrentStep(idx); setIsMobileMenuOpen(false); const sc = document.getElementById('main-scroll-container'); if(sc) sc.scrollTo({ top: 0, behavior: 'smooth' }); } }}
                                                disabled={isLocked} className={`w-full text-left flex items-center gap-4 py-3 px-3 border-l-[2.5px] transition-all font-mono text-[9px] tracking-[0.2em] uppercase ${isActive ? 'text-patina border-patina bg-patina-faint' : isLocked ? 'text-text4 border-transparent cursor-not-allowed' : 'text-text3 border-transparent hover:border-medium hover:text-text1'}`}>
                                                <span className="w-4 flex justify-center">{(isComp && idx < currentStep && !isActive) ? <IconCheck className="w-3 h-3 text-patina" /> : (isLocked ? <IconLock className="w-3 h-3 opacity-50" /> : (idx < 10 ? `0${idx}` : idx))}</span>
                                                <span className="flex-1 truncate">{step.title}</span>
                                            </button>
                                        </li>
                                    );
                                })}
                            </ul>
                        </nav>

                        <div className="mt-8 pt-6 border-t border-subtle flex flex-col gap-4">
                            {firebaseAvailable && user?.isAnonymous && <button onClick={handleGoogleSignIn} className="btn-primary w-full"><IconGlobe className="w-4 h-4 mr-2" /> LINK ACCOUNT</button>}
                            <div className="flex items-center gap-2 font-mono text-[9px] text-text3 uppercase tracking-[0.2em] justify-center mt-2">
                                {isSaving ? <span className="text-brass flex items-center gap-2"><div className="pulse-dot"></div> SYNCING...</span> : <span><IconCheck className="w-3 h-3 inline mr-1 text-patina"/> {firebaseAvailable ? 'SYS.SYNCED' : 'LOCAL.SAVED'}</span>}
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div id="main-scroll-container" className="flex-1 h-full overflow-y-auto relative bg-transparent pt-16 md:pt-0" style={{zIndex: 2}}>
                        <div className="w-full max-w-5xl mx-auto px-4 md:px-12 pt-8 md:pt-16 pb-32">
                            <div key={currentStep} className="animate-fade-in-up">
                                {STEPS[currentStep].component}
                            </div>
                        </div>

                        {/* Bottom Dock */}
                        <div className="sticky bottom-8 w-full px-4 md:px-12 pointer-events-none flex justify-center z-40">
                            <div className="pointer-events-auto w-full max-w-3xl glass-dock p-3 flex justify-between items-center relative overflow-hidden">
                                <div className="absolute top-0 left-0 h-[2px] w-full" style={{background: 'var(--bg-surface)', zIndex: 2}}>
                                    <div className="h-full progress-fill transition-all duration-500" style={{ width: `${progress}%` }}></div>
                                </div>

                                <button onClick={() => { setCurrentStep(Math.max(0, currentStep - 1)); const sc = document.getElementById('main-scroll-container'); if(sc) sc.scrollTo({ top: 0, behavior: 'smooth' }); }}
                                    disabled={currentStep === 0 || isGenerating} className={`flex items-center gap-2 px-6 py-3 rounded-full font-mono font-bold text-[9px] tracking-[0.2em] uppercase transition-all border border-transparent ${currentStep === 0 || isGenerating ? 'text-text4 cursor-not-allowed opacity-50' : 'text-text1 hover:border-medium active:scale-95'}`}>
                                    <IconChevronLeft className="w-4 h-4" /> PREV
                                </button>

                                <div className="flex items-center gap-4">
                                    {isNextDisabled && !isGenerating && currentStep !== STEPS.length - 1 && (
                                        <span className="hidden sm:block font-mono text-[9px] text-brass uppercase tracking-[0.2em] border border-brass-dim bg-brass-faint px-3 py-1.5 rounded-full">REQUIREMENTS NOT MET</span>
                                    )}
                                    <button onClick={handleNext} disabled={isNextDisabled || currentStep === STEPS.length - 1}
                                        className={`btn-primary ${isNextDisabled || currentStep === STEPS.length - 1 ? 'opacity-40 cursor-not-allowed' : ''}`}>
                                        {currentStep === STEPS.length - 2 ? 'INITIATE SYNTHESIS' : (STEPS[currentStep + 1]?.isCheckpoint ? 'VIEW DIAGNOSTIC' : 'NEXT MODULE')}
                                        <IconChevronRight className="w-4 h-4 ml-2" />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
