                                </div>

                            </div>

                            <div className="text-center mb-20 mt-16 font-light italic text-2xl text-zinc-600 dark:text-zinc-400 leading-relaxed px-4 md:px-12">

                                <h3 className="font-mono text-[10px] text-quantum uppercase tracking-[0.3em] mb-8 non-italic border-t border-black/10 dark:border-white/10 pt-16 mx-auto w-1/2">THE SPARK</h3>

                                "{data.aiSpark || mapData.spark}"

                            </div>

                            <div className="text-center pt-16 border-t border-black/10 dark:border-white/10 mt-20">

                                <h3 className="font-mono text-[10px] text-black/70 dark:text-white/50 uppercase tracking-[0.3em] mb-8">THE ESSENCE</h3>

                                <p className="text-3xl md:text-5xl font-black text-black dark:text-white tracking-tighter uppercase leading-[1.1]">{data.aiEssence || mapData.essence}</p>

                            </div>

                        </div>

                    </div>

                );

            };

            const STEPS = [

                { title: 'INITIALIZE', isCheckpoint: false, component: <IntroModule /> },

                { title: 'IDENTITY', isCheckpoint: false, component: <Module1 /> },

                { title: 'SYS.SYNC 01', isCheckpoint: true, component: <Module1Recap /> },

                { title: 'PURPOSE', isCheckpoint: false, component: <Module2 /> },

                { title: 'SYS.SYNC 02', isCheckpoint: true, component: <Module2Recap /> },

                { title: 'CRAFT', isCheckpoint: false, component: <Module3 /> },

                { title: 'SYS.SYNC 03', isCheckpoint: true, component: <Module3Recap /> },

                { title: 'TRIBE', isCheckpoint: false, component: <Module4 /> },

                { title: 'SYS.SYNC 04', isCheckpoint: true, component: <Module4Recap /> },

                { title: 'SIGNAL', isCheckpoint: false, component: <Module5 /> },

                { title: 'SYS.SYNC 05', isCheckpoint: true, component: <Module5Recap /> },

                { title: 'WORLD', isCheckpoint: false, component: <Module6 /> },

                { title: 'SYS.SYNC 06', isCheckpoint: true, component: <Module6Recap /> },

                { title: 'AUTH', isCheckpoint: false, component: <LeadCaptureModule /> },

                { title: 'SYNTHESIS', isCheckpoint: false, component: <SynthesisPanel /> }

            ];

            const handleNext = async () => {

                if (currentStep === STEPS.length - 2) {

                    setIsGenerating(true);

                    setCurrentStep(currentStep + 1);

                    setMaxStepReached(Math.max(maxStepReached, currentStep + 1));

                    const sc = document.getElementById('main-scroll-container');

                    if(sc) sc.scrollTo({ top: 0, behavior: 'smooth' });

                    try {

                        const ai = await generateAI(data);

                        const dm = generateDefaultMap(data);

                        let s = dm.spark, e = dm.essence;

                        if (ai?.spark && ai?.essence) {

                            s = ai.spark; e = ai.essence;

                            setData(prev => ({ ...prev, aiSpark: s, aiEssence: e }));

                        }

                        await sendEmail(data, s, e);

                        // ── QB OS: Auto-populate QBP ──────────────────────────
                        try {
                            const primA = ARCHETYPES.find(a=>a.id===data.primaryArch)?.name || '';
                            const secA = ARCHETYPES.find(a=>a.id===data.secondaryArch)?.name || '';
                            const mov = MOVEMENTS ? (MOVEMENTS.find(m=>m.id===data.movementId)?.name || '') : '';
                            const alwaysText = data.coreAlwaysIdx !== null && data.always && data.always[data.coreAlwaysIdx] ? data.always[data.coreAlwaysIdx] : '';
                            const neverText = data.coreNeverIdx !== null && data.nevers && data.nevers[data.coreNeverIdx] ? data.nevers[data.coreNeverIdx] : '';
                            const existing = JSON.parse(localStorage.getItem('qb_qbp') || '{}');
                            const updated = Object.assign({}, existing, {
                                brandName: data.brandName || existing.brandName || '',
                                brandEssence: (data.aiEssence || s.split('—')[1]?.trim() || existing.brandEssence || '').substring(0, 300),
                                spark: (s || existing.spark || '').substring(0, 800),
                                archetype: primA ? (primA + (secA ? ' + ' + secA : '')) : (existing.archetype || ''),
                                manifesto: data.originalManifesto || existing.manifesto || '',
                                antiBrand: neverText ? ('We refuse to: ' + neverText) : (existing.antiBrand || ''),
                                alwaysNever: ((alwaysText ? 'Always: ' + alwaysText : '') + (neverText ? ' | Never: ' + neverText : '')) || existing.alwaysNever || '',
                                primaryPersona: data.cuEss ? ('The ' + data.cuEss + ' who ' + (data.fanTarget || '')) : (existing.primaryPersona || ''),
                                naturalForce: data.mod1Force || existing.naturalForce || '',
                                paradox: data.posAdj1 && data.posAdj2 ? (data.posAdj1 + ' yet ' + data.posAdj2) : (existing.paradox || ''),
                                soulMapCompletedAt: new Date().toISOString()
                            });
                            localStorage.setItem('qb_qbp', JSON.stringify(updated));
                            localStorage.setItem('qb_soul_map_done', '1');
                            window._qbSoulMapComplete = true;
                            // Show floating results button
                            var existingBtn = document.getElementById('qb-float-results');
                            if (!existingBtn) {
                              var btn = document.createElement('button');
                              btn.id = 'qb-float-results';
                              btn.className = 'qb-send-results-btn';
                              btn.style.cssText = 'position:fixed;bottom:32px;right:32px;z-index:1000;box-shadow:0 8px 32px rgba(74,222,128,.25);';
                              btn.innerHTML = '📄 Send me my results';
                              btn.addEventListener('click', function() {
                                var qbp = {};
                                try { qbp = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); } catch(e) {}
                                if (window.QB_showResultsModal) {
                                  window.QB_showResultsModal({
                                    toolId: 'soul-map',
                                    qbp: qbp,
                                    results: { spark: qbp.spark, essence: qbp.brandEssence },
                                    pdfPage: '/brand-soul-map-pdf.html'
                                  });
                                }
                              });
                              document.body.appendChild(btn);
                            }
                            // Signal parent Hub if in iframe context
                            if (window.parent && window.parent !== window) {
                                window.parent.postMessage({ type: 'QB_PHASE_COMPLETE', phase: 1, tool: 'soul-map', qbp: updated }, '*');
                            }
                        } catch(qbErr) { console.warn('QB QBP sync:', qbErr); }
                        // ── END QB OS ─────────────────────────────────────────


                    } catch (err) { console.error(err); } finally { setIsGenerating(false); }

                } else {

                    const ns = Math.min(STEPS.length - 1, currentStep + 1);

                    setCurrentStep(ns);

                    setMaxStepReached(Math.max(maxStepReached, ns));

                    const sc = document.getElementById('main-scroll-container');

                    if(sc) sc.scrollTo({ top: 0, behavior: 'smooth' });

                }

            };

            if (!isLoaded) {

                return (

                    <div className="min-h-screen flex flex-col items-center justify-center bg-white dark:bg-black">

                        <div className="relative w-12 h-12 mb-4">

                            <div className="absolute inset-0 border border-quantum/30 rounded-full animate-[ping_3s_linear_infinite]"></div>

                            <div className="absolute inset-0 border border-quantum rounded-full border-t-transparent animate-spin"></div>

                            <div className="absolute inset-0 m-auto w-2 h-2 bg-quantum rounded-full animate-pulse"></div>

                        </div>

                        <p className="font-mono text-[10px] tracking-[0.3em] uppercase text-black/70 dark:text-white/50">BOOTING SEQUENCE...</p>

                    </div>

                );

            }

            const isNextDisabled = isGenerating || !isStepValid(currentStep);

            const progress = (currentStep / (STEPS.length - 1)) * 100;

            const ThemeToggle = () => (

                <button onClick={toggleTheme} className="p-2 rounded-full bg-black/5 dark:bg-white/5 text-black dark:text-white hover:bg-black/10 dark:hover:bg-white/10 transition-colors border border-black/10 dark:border-white/10">

                    {isDarkMode ? <IconSun className="w-4 h-4"/> : <IconMoon className="w-4 h-4"/>}

                </button>

            );

            return (

                <div className={`flex h-screen w-full font-sans overflow-hidden ${isDarkMode ? 'dark' : ''}`}>

                    <div className="noise-overlay"></div>

                    <div className="md:hidden absolute top-0 left-0 right-0 flex items-center justify-between p-4 bg-white/90 dark:bg-black/90 backdrop-blur-md border-b border-black/5 dark:border-white/10 z-50">

                        <h1 className="font-black text-black dark:text-white uppercase flex items-center gap-2 tracking-tighter"><IconTerminal className="w-4 h-4" /> SOUL MAP</h1>

                        <div className="flex items-center gap-3"><ThemeToggle /><button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 bg-black/5 dark:bg-white/5 text-black dark:text-white rounded border border-black/10 dark:border-white/10"><IconMenu /></button></div>

                    </div>

                    {isMobileMenuOpen && <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-40 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    

                    <div className={`fixed inset-y-0 left-0 w-72 md:w-[280px] bg-[#fcfcfc] dark:bg-[#050505] border-r border-black/5 dark:border-white/5 flex-shrink-0 flex flex-col p-8 z-50 transform transition-transform duration-300 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 h-screen overflow-y-auto`}>

                        <div className="mb-12 hidden md:flex items-start justify-between">

                            <div>

                                <h1 className="text-xl font-black text-black dark:text-white uppercase flex items-center gap-2 tracking-tighter"><IconTerminal className="w-5 h-5 text-quantum" /> SOUL MAP</h1>

                                <p className="font-mono text-[9px] text-zinc-500 uppercase mt-2 tracking-[0.3em]">STRATEGY TERMINAL</p>

                            </div>

                            <ThemeToggle />

                        </div>

                        <nav className="flex-1">

                            <ul className="relative space-y-1">

                                {STEPS.map((step, idx) => {

                                    const isLocked = idx > maxStepReached, isActive = currentStep === idx, isComp = isStepValid(idx);

                                    return (

                                        <li key={idx} className="relative z-10">

                                            <button onClick={() => { if(!isLocked) { setCurrentStep(idx); setIsMobileMenuOpen(false); const sc = document.getElementById('main-scroll-container'); if(sc) sc.scrollTo({ top: 0, behavior: 'smooth' }); } }}

                                                disabled={isLocked} className={`w-full text-left flex items-center gap-4 py-3 px-3 border-l-2 transition-all font-mono text-[10px] tracking-[0.2em] uppercase ${isActive ? 'text-quantum border-quantum bg-quantum/5' : isLocked ? 'text-black/30 dark:text-white/30 border-transparent cursor-not-allowed' : 'text-zinc-500 border-transparent hover:border-black/10 dark:hover:border-white/10 hover:text-black dark:hover:text-white'}`}>

                                                <span className="w-4 flex justify-center">{(isComp && idx < currentStep && !isActive) ? <IconCheck className="w-3 h-3 text-quantum" /> : (isLocked ? <IconLock className="w-3 h-3 opacity-50" /> : (idx < 9 ? `0${idx}` : idx))}</span>

                                                <span className="flex-1 truncate">{step.title}</span>

                                            </button>

                                        </li>

                                    );

                                })}

                            </ul>

                        </nav>

                        <div className="mt-8 pt-6 border-t border-black/5 dark:border-white/5 flex flex-col gap-4">

                            {user?.isAnonymous && <button onClick={handleGoogleSignIn} className="font-mono text-[10px] tracking-[0.2em] uppercase bg-black text-white dark:bg-white dark:text-black p-4 rounded-full font-black flex items-center justify-center gap-2 hover:bg-quantum hover:text-black dark:hover:bg-quantum transition-colors active:scale-95"><IconGlobe className="w-4 h-4" /> LINK ACCOUNT</button>}

                            <div className="flex items-center gap-2 font-mono text-[9px] text-zinc-500 uppercase tracking-[0.3em] justify-center">

                                {isSaving ? <span className="text-quantum flex items-center gap-2"><div className="w-1.5 h-1.5 bg-quantum rounded-full animate-ping"></div> SYNCING...</span> : <span><IconCheck className="w-3 h-3 inline mr-1 text-quantum"/> SYS.SYNCED</span>}

                            </div>

                        </div>

                    </div>

                    <div id="main-scroll-container" className="flex-1 h-full overflow-y-auto relative bg-white dark:bg-black bg-dots pt-16 md:pt-0">

                        <div className="w-full max-w-5xl mx-auto px-4 md:px-12 pt-8 md:pt-16 pb-32"><div className="animate-fade-in-up">{STEPS[currentStep].component}</div></div>

                        <div className="sticky bottom-8 w-full px-4 md:px-12 pointer-events-none flex justify-center z-40">

                            <div className="pointer-events-auto w-full max-w-3xl glass-dock p-3 flex justify-between items-center relative overflow-hidden">

                                <div className="absolute top-0 left-0 h-[2px] bg-black/5 dark:bg-white/5 w-full"><div className="h-full bg-quantum transition-all duration-500" style={{ width: `${progress}%` }}></div></div>

                                <button onClick={() => { setCurrentStep(Math.max(0, currentStep - 1)); const sc = document.getElementById('main-scroll-container'); if(sc) sc.scrollTo({ top: 0, behavior: 'smooth' }); }}

                                    disabled={currentStep === 0 || isGenerating} className={`flex items-center gap-2 px-6 py-3 rounded-full font-black text-[10px] tracking-[0.2em] uppercase transition-all border border-transparent ${currentStep === 0 || isGenerating ? 'text-black/30 dark:text-white/30 cursor-not-allowed opacity-50' : 'text-black dark:text-white hover:border-black/10 dark:hover:border-white/10 active:scale-95'}`}><IconChevronLeft className="w-4 h-4" /> PREV</button>

                                <div className="flex items-center gap-4">

                                    {isNextDisabled && !isGenerating && currentStep !== STEPS.length - 1 && <span className="hidden sm:block font-mono text-[9px] text-alert uppercase tracking-[0.3em] border border-alert/30 bg-alert/10 px-3 py-1.5 rounded-full">REQUIREMENTS NOT MET</span>}

                                    <button onClick={handleNext} disabled={isNextDisabled || currentStep === STEPS.length - 1}

                                        className={`flex items-center gap-2 px-8 py-4 rounded-full font-black uppercase tracking-[0.2em] text-[10px] transition-all ${isNextDisabled || currentStep === STEPS.length - 1 ? 'bg-black/5 dark:bg-white/5 text-black/30 dark:text-white/30 cursor-not-allowed' : 'bg-black text-white dark:bg-white dark:text-black hover:bg-quantum hover:text-black dark:hover:bg-quantum active:scale-95'}`}>

                                        {currentStep === STEPS.length - 2 ? 'INITIATE SYNTHESIS' : (STEPS[currentStep + 1]?.isCheckpoint ? 'VIEW DIAGNOSTIC' : 'NEXT MODULE')} <IconChevronRight className="w-4 h-4" />

                                    </button>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            );

        };

        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<App />);

    </script>


</body>

</html>
