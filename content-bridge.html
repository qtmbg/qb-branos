<script>
(function(){
  try { window.QB_QBP = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); } catch(e) { window.QB_QBP = {}; }

  // FIX (CRITICAL): was calling /api/claude — a non-existent backend route.
  // Now calls Anthropic API directly with proper headers and API key from localStorage.
  window.QB_AI = async function(sys, usr, max) {
    max = max || 2000;
    var apiKey = '';
    try { apiKey = localStorage.getItem('qb-api-key') || ''; } catch(e) {}
    if (!apiKey) throw new Error('API key not configured — click the key icon in the header to add your Anthropic API key.');
    var r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: max,
        system: sys,
        messages: [{ role: 'user', content: usr }]
      })
    });
    if (!r.ok) {
      var errBody = '';
      try { var ed = await r.json(); errBody = ed.error?.message || ''; } catch(e2) {}
      throw new Error('API error ' + r.status + (errBody ? ': ' + errBody : ' ' + r.statusText));
    }
    var d = await r.json();
    if (d.error) throw new Error(typeof d.error === 'string' ? d.error : (d.error.message || 'Unknown API error'));
    if (!d.content || !d.content[0] || !d.content[0].text) throw new Error('Empty or malformed response from API');
    return d.content[0].text;
  };
})();
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* Entangled Time Theme System */
:root, [data-theme="dark"] {

  --bg-base: #0E0C09;
  --bg-surface: rgba(140,110,70,0.045);

  --border-subtle: rgba(140,110,70,0.06);
  --border-medium: rgba(140,110,70,0.11);

  --patina: #3A5F4A;
  --patina-lit: #4A7A5E;
  --patina-dim: rgba(58,95,74,0.2);
  --patina-faint: rgba(58,95,74,0.08);

  --brass: #A8903E;

  --text-2: #A89A88;
  --text-3: #6A5E50;

  --status-success: #4A7A5E;
  --status-warning: #A8903E;

  --grain-opacity: 0.03;

  --font: 'Inter', -apple-system, sans-serif;

}

[data-theme="light"] {

  --bg-deep: #EDE8E2;
  --bg-base: #E6E0D8;
  --bg-surface: rgba(100,80,50,0.04);
  --bg-elevated: rgba(100,80,50,0.07);

  --border-subtle: rgba(100,80,50,0.08);
  --border-medium: rgba(100,80,50,0.14);

  --brass: #8A7430;
  --brass-lit: #A08A3A;

  --phase-discovery: #2E5A42;

  --phase-execution: #3A5A4A;

  --text-2: #5A5040;
  --text-3: #8A7E70;
  --text-4: #B8AEA0;

  --status-warning: #8A7430;
  --status-error: #6A3A3A;

  --font: 'Inter', -apple-system, sans-serif;

/* Base Styles */
body {
  background: var(--bg-void);
  color: var(--text-2);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Typography */
.font-serif { font-family: 'DM Serif Display', Georgia, serif; font-weight: 400; letter-spacing: -0.015em; }
.font-sans  { font-family: var(--font); }
.font-mono  { font-family: var(--mono); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

/* Film Grain */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: var(--grain-opacity);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}

/* Vignette */
.vignette {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, var(--vignette-bg) 100%);
}

.main-content {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Glass Cards */
.glass-card {
  background: var(--bg-overlay);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  position: relative;
  overflow: hidden;
}
.glass-card::before {
  content: '';
  position: absolute;
  top: -30%; left: -10%;
  width: 60%; height: 60%;
  background: radial-gradient(ellipse at center, rgba(168,144,62,0.035) 0%, transparent 70%);
  pointer-events: none;
}

/* Manifesto Block — MUST NOT share element with .glass-card (both use ::before) */
.manifesto-block {
  position: relative;
  padding: 24px 0 24px 26px;
}
.manifesto-block::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2.5px;
  background: linear-gradient(180deg, var(--brass) 0%, var(--patina) 100%);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--brass-faint);
}

/* Brass Pulse */
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--brass);
  box-shadow: 0 0 8px var(--brass-dim), 0 0 2px var(--brass);
  animation: beat 3s ease infinite;
}
@keyframes beat {
  0%, 100% { transform: scale(1); opacity: 1; }
  12% { transform: scale(1.35); opacity: 1; }
  24% { transform: scale(0.95); opacity: 0.6; }
  36% { transform: scale(1.15); opacity: 1; }
  48% { transform: scale(1); opacity: 0.7; }
}

/* Form Inputs */
input, textarea, select {
  background: var(--bg-surface);
  border: 1px solid var(--border-medium);
  color: var(--text-1);
  font-family: var(--font);
  border-radius: 7px;
  padding: 12px 16px;
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: all 0.25s ease;
}
input::placeholder, textarea::placeholder {
  color: var(--text-3);
  opacity: 0.7;
  font-style: italic;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--patina);
  box-shadow: 0 0 0 3px var(--patina-faint), 0 0 24px -4px var(--brass-faint);
  outline: none;
}
textarea { resize: vertical; line-height: 1.7; }
select option { background: var(--bg-deep); color: var(--text-1); }
button { cursor: pointer; font-family: var(--font); border: none; outline: none; }

button:focus-visible {
  outline: 2px solid var(--patina);
  outline-offset: 3px;
  border-radius: 7px;
}

/* Primary Button */
.btn-primary {
  background: var(--patina);
  color: #E6DDD0;
  font-family: var(--font);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 13px 30px;
  border-radius: 7px;
  border: none;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  gap: 10px;
}
.btn-primary:hover:not(:disabled) {
  background: var(--patina-lit);
  transform: translateY(-1px);
  box-shadow: 0 4px 24px -4px var(--patina-dim), 0 0 0 1px var(--brass-faint);
}
.btn-primary:disabled {
  background: var(--bg-surface);
  color: var(--text-3);
  cursor: not-allowed;
  box-shadow: none;
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }

.fade-in { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.spin     { animation: spin 0.8s linear infinite; }

/* Layer Cards */
.layer-card {
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  border-left-width: 3px;
  border-left-color: transparent;
}
.layer-card:hover {
  border-color: var(--border-medium);
  transform: translateY(-1px);
  background: var(--bg-elevated);
}
.layer-card.selected {
  border-color: var(--border-medium);
  border-left-color: var(--layer-color);
  background: var(--bg-elevated);
  box-shadow: -4px 0 24px -10px var(--layer-color);
}

.platform-btn {
  background: var(--bg-surface);

  border-radius: 8px;
  padding: 14px 20px;
  text-align: left;

.platform-btn:hover  { border-color: var(--brass-dim); background: var(--bg-elevated); }
.platform-btn.active { border-color: var(--patina); background: var(--patina-faint); }

  text-transform: uppercase;

.copy-btn:hover {

.quality-item {

  line-height: 1.6;

.quality-item:last-child { border-bottom: none; }

.theme-toggle {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  color: var(--text-2);
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--brass-dim); color: var(--brass); }

/* Nav Tabs */
.nav-tab {
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: var(--mono);
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  border: 1px solid var(--border-subtle);

.nav-tab.active {

  border-color: var(--patina-dim);

/* Step Circle */
.step-circle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}

@media (max-width: 640px) {
  .hide-mobile { display: none; }
}

/* API Key Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,6,4,0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeUp 0.25s cubic-bezier(0.16,1,0.3,1) forwards;
}

/* API Key Banner */
.api-banner {
  background: rgba(168,144,62,0.07);
  border: 1px solid rgba(168,144,62,0.2);
  border-radius: 10px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;

/* Icon Button (key icon in header) */
.icon-btn {
  background: var(--bg-surface);

<div style="background:var(--ink); color:var(--cream); text-align:center; padding:0.7em 1.5rem; font-family:'Inter',sans-serif; font-size:0.78rem; font-weight:500; letter-spacing:0.04em; position:relative; z-index:120;">
  <strong>Signal Scan is live.</strong> Free brand diagnostic. 5 minutes to your first insight.

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Micro-components ───────────────────────────────────────────────────── */

const ML = ({ c, children, mb = 8 }) => (
  <div className="font-mono" style={{ fontSize: 10, letterSpacing: '.2em', color: c || 'var(--text-3)', textTransform: 'uppercase', marginBottom: mb }}>
    {children}
  </div>
);

const Card = ({ children, accent, style = {} }) => (
  <div className="glass-card" style={{ border: `1px solid ${accent || 'var(--border-subtle)'}`, padding: '24px 28px', ...style }}>
    {children}
  </div>
);

const TF = ({ label, value, onChange, placeholder, rows = 1, hint }) => (
  <div style={{ marginBottom: 16 }}>
    {label && <ML>{label}</ML>}
    {rows > 1
      ? <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows} />
      : <input type="text" value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} />
    }
    {hint && <div style={{ fontSize: 12, color: 'var(--text-3)', marginTop: 6, fontStyle: 'italic' }}>{hint}</div>}
  </div>
);

/* ── API Key Modal ──────────────────────────────────────────────────────── */

function ApiKeyModal({ onSave, onClose, currentKey }) {
  const [val, setVal] = useState(currentKey || '');
  const [show, setShow] = useState(false);

  const handleSave = () => {
    const trimmed = val.trim();
    if (!trimmed) return;
    onSave(trimmed);
  };

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="glass-card" style={{ width: '100%', maxWidth: 480, padding: '36px 40px' }}>
        <ML c="var(--brass)" mb={16}>Anthropic API Key</ML>
        <h2 className="font-serif" style={{ fontSize: 26, color: 'var(--text-1)', marginBottom: 12 }}>Connect your account</h2>
        <p className="font-sans" style={{ fontSize: 14, color: 'var(--text-2)', lineHeight: 1.7, marginBottom: 28 }}>
          Content Bridge calls the Claude API directly from your browser. Your key is stored only in <code style={{ fontFamily: 'var(--mono)', fontSize: 12, background: 'var(--bg-surface)', padding: '2px 6px', borderRadius: 4 }}>localStorage</code> and never transmitted anywhere else.
        </p>

        <div style={{ position: 'relative', marginBottom: 24 }}>
          <ML mb={8}>Your API key</ML>
          <div style={{ position: 'relative' }}>
            <input
              type={show ? 'text' : 'password'}
              value={val}
              onChange={e => setVal(e.target.value)}
              placeholder="sk-ant-api03-..."
              onKeyDown={e => { if (e.key === 'Enter') handleSave(); }}
              autoFocus
              style={{ paddingRight: 48 }}
            />
            <button
              onClick={() => setShow(s => !s)}
              style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', color: 'var(--text-3)', cursor: 'pointer', padding: 4 }}
              aria-label={show ? 'Hide key' : 'Show key'}
            >
              {show

    </div>
  );

                'I take full responsibility for how this content is distributed and used commercially.',
              ].map((item, i) => (
                <div key={i} className="font-sans" style={{ fontSize: 13, color: 'var(--text-2)', lineHeight: 1.6, display: 'flex', gap: 12 }}>
                  <span style={{ color: 'var(--status-error)', flexShrink: 0 }}>—</span>{item}
                </div>
              ))}
            </div>
            <label style={{ display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer' }}>
              <input type="checkbox" checked={consentGiven} onChange={e => setConsentGiven(e.target.checked)}
                style={{ width: 18, height: 18, accentColor: 'var(--patina)', cursor: 'pointer', margin: 0 }} />
              <span className="font-sans" style={{ fontSize: 14, color: consentGiven ? 'var(--patina-lit)' : 'var(--text-1)', fontWeight: consentGiven ? 500 : 400, transition: 'color 0.2s' }}>
                I confirm the above. I am consenting to use of my own likeness.
              </span>
            </label>
          </div>
        )}

        {/* SOURCE QUALITY GUIDE */}
        {layer && selectedPlatform && (!layer.requiresConsent || consentGiven) && (
          <div style={{ marginBottom: 40 }} className="fade-in">
            <Card accent="var(--brass-dim)">
              <ML c="var(--brass)" mb={16}>Source quality guide — read before uploading</ML>
              <div>
                {layer.sourceQuality.map((item, i) => (
                  <div key={i} className="quality-item">
                    <span style={{ color: item.icon === '✓' ? 'var(--patina-lit)' : item.icon === '!' ? 'var(--brass)' : 'var(--status-error)', flexShrink: 0, fontWeight: 700 }}>{item.icon}</span>
                    <span>{item.text}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        )}

        {/* SCRIPT INPUT + BRIEF FIELDS */}
        {layer && selectedPlatform && (!layer.requiresConsent || consentGiven) && (
          <div style={{ marginBottom: 40 }} className="fade-in">
            <ML c="var(--text-3)" mb={16}>03 — Paste your QB agent output</ML>
            <TF
              label="Script or content from QB agent"
              value={script}
              onChange={setScript}
              placeholder={`Paste the script, caption, or strategy output from your QB Content agent here. The Bridge will format it precisely for ${platform?.name || 'the selected platform'}.`}
              rows={6}
              hint="This comes directly from LinkedIn Strategy Agent, Instagram Seed Agent, YouTube Strategy Agent, or the Repurposing Engine."
            />

            <div style={{ height: 24 }} />

            <ML c="var(--text-3)" mb={16}>04 — Brief details (optional but improves precision)</ML>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 16 }}>
              {layer.briefFields.map(fk => (
                <TF
                  key={fk}
                  label={BRIEF_FIELD_CONFIG[fk]?.label || fk}
                  value={briefFields[fk] || ''}
                  onChange={v => updateField(fk, v)}
                  placeholder={BRIEF_FIELD_CONFIG[fk]?.placeholder || ''}
                  rows={1}
                />
              ))}
            </div>

            {error && (
              <div style={{ background: 'rgba(138,74,74,0.1)', border: '1px solid rgba(138,74,74,0.3)', borderRadius: 8, padding: '14px 18px', marginTop: 12, marginBottom: 8, fontSize: 14, color: 'var(--status-error)' }}>
                {error}
              </div>
            )}
            <div style={{ height: 24 }} />

            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 24, borderTop: '1px solid var(--border-subtle)' }}>
              <div className="font-mono" style={{ fontSize: 11, color: 'var(--text-3)', letterSpacing: '0.05em' }}>
                {layer.label} <span style={{ color: 'var(--brass)' }}>→</span> {platform?.name} <span style={{ color: 'var(--brass)' }}>·</span> {qbp.brandName || 'Brand not set'}
              </div>
              <button onClick={generateBrief} disabled={loading || !script.trim()} className="btn-primary">
                {loading && (
                  <div style={{ width: 16, height: 16, border: '2px solid rgba(255,255,255,0.2)', borderTop: '2px solid #fff', borderRadius: '50%' }} className="spin" />
                )}
                {loading ? 'Processing…' : 'Generate Precision Brief'}
              </button>
            </div>
          </div>
        )}

        {/* GENERATED BRIEF */}
        {generatedBrief && (
          <div style={{ marginTop: 24 }} className="fade-in">
            <div style={{ marginBottom: 24, display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
              <div>
                <ML c="var(--patina)" mb={8}>Production brief ready</ML>
                <div className="font-serif" style={{ fontSize: 28, color: 'var(--text-1)' }}>{generatedBrief.platformReadyTitle}</div>
              </div>
              <div className="font-mono" style={{ fontSize: 11, padding: '6px 12px', borderRadius: 6, background: 'var(--patina-faint)', color: 'var(--patina-lit)', border: '1px solid var(--patina-dim)' }}>
                {platform?.name} Ready
              </div>
            </div>

            {/* Tabs */}
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 28, paddingBottom: 20, borderBottom: '1px solid var(--border-subtle)' }}>
              {['brief', 'script', 'brand', 'checklist'].map(t => (
                <button key={t} className={`nav-tab ${activeTab === t ? 'active' : ''}`} onClick={() => setActiveTab(t)}>
                  {t === 'brief' ? 'Production Steps' : t === 'script' ? 'Formatted Script' : t === 'brand' ? 'Brand Application' : 'Quality Checklist'}
                </button>
              ))}
            </div>

            {activeTab === 'brief' && (
              <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>

                {/* Executive Summary — glass-card wraps manifesto-block so both ::before work correctly */}
                <div className="glass-card">
                  <div className="manifesto-block" style={{ padding: '24px 32px' }}>
                    <ML c="var(--text-3)" mb={8}>Executive Summary</ML>
                    <p className="font-sans" style={{ fontSize: 15, color: 'var(--text-1)', lineHeight: 1.7 }}>{generatedBrief.executiveSummary}</p>
                  </div>
                </div>

                {generatedBrief.platformSettings && (
                  <Card accent="var(--phase-creation)">
                    <ML c="var(--phase-creation)" mb={16}>Platform specifications</ML>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 12 }}>
                      {Object.entries(generatedBrief.platformSettings).map(([k, v]) => (
                        <div key={k} style={{ background: 'var(--bg-surface)', border: '1px solid var(--border-subtle)', borderRadius: 8, padding: '14px 16px' }}>
                          <div className="font-mono" style={{ fontSize: 10, color: 'var(--text-3)', letterSpacing: '.12em', textTransform: 'uppercase', marginBottom: 6 }}>{k.replace(/([A-Z])/g, ' $1').trim()}</div>
                          <div className="font-sans" style={{ fontSize: 14, color: 'var(--text-1)', lineHeight: 1.5 }}>{v}</div>
                        </div>
                      ))}
                    </div>
                  </Card>
                )}

                {generatedBrief.productionInstructions?.length > 0 && (
                  <Card>
                    <ML c="var(--patina)" mb={20}>Step-by-step execution in {platform?.name}</ML>
                    {generatedBrief.productionInstructions.map((step, i) => (
                      <div key={i} style={{ display: 'flex', gap: 20, marginBottom: i < generatedBrief.productionInstructions.length - 1 ? 20 : 0, paddingBottom: i < generatedBrief.productionInstructions.length - 1 ? 20 : 0, borderBottom: i < generatedBrief.productionInstructions.length - 1 ? '1px solid var(--border-subtle)' : '' }}>
                        <div className="step-circle" style={{ background: 'var(--bg-surface)', color: 'var(--text-1)', border: '1px solid var(--border-medium)' }}>
                          {String(step.step).padStart(2, '0')}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div className="font-sans" style={{ fontSize: 15, fontWeight: 500, color: 'var(--text-1)', marginBottom: 6 }}>{step.action}</div>
                          <div className="font-sans" style={{ fontSize: 14, color: 'var(--text-2)', lineHeight: 1.6 }}>{step.detail}</div>
                        </div>
                      </div>
                    ))}
                  </Card>
                )}

                {generatedBrief.nextStep && (
                  <div style={{ background: 'var(--patina-faint)', border: '1px solid var(--patina-dim)', borderRadius: 10, padding: '20px 24px', display: 'flex', alignItems: 'flex-start', gap: 16 }}>
                    <div className="font-mono" style={{ fontSize: 14, color: 'var(--patina-lit)', flexShrink: 0 }}>→</div>
                    <div style={{ flex: 1 }}>
                      <ML c="var(--patina-lit)" mb={6}>Start here in {platform?.name}</ML>
                      <p className="font-sans" style={{ fontSize: 14, color: 'var(--text-1)', lineHeight: 1.6 }}>{generatedBrief.nextStep}</p>
                    </div>
                    <a href={platform?.url} target="_blank" rel="noopener noreferrer" className="btn-primary" style={{ flexShrink: 0, textDecoration: 'none' }}>
                      Open {platform?.name} ↗
                    </a>
                  </div>
                )}
              </div>
            )}

            {activeTab === 'script' && generatedBrief.scriptFormatted && (
              <div className="fade-in">
                <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 12 }}>
                  <button className="copy-btn" onClick={() => copy(generatedBrief.scriptFormatted, 'script')}>
                    {copied === 'script' ? 'Copied ✓' : 'Copy formatted script'}
                  </button>
                </div>
                <div className="glass-card" style={{ padding: '32px 40px', fontFamily: 'var(--mono)', fontSize: 14, lineHeight: 2, color: 'var(--text-1)', whiteSpace: 'pre-wrap' }}>
                  {generatedBrief.scriptFormatted}
                </div>
              </div>
            )}

            {activeTab === 'brand' && generatedBrief.brandApplication && (
              <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                {Object.entries(generatedBrief.brandApplication).map(([k, v]) => (
                  <Card key={k} accent="var(--brass-dim)">
                    <ML c="var(--brass)" mb={10}>{k.replace(/([A-Z])/g, ' $1').trim()}</ML>
                    <p className="font-sans" style={{ fontSize: 15, color: 'var(--text-1)', lineHeight: 1.7 }}>{v}</p>
                  </Card>
                ))}
              </div>
            )}

            {activeTab === 'checklist' && generatedBrief.qualityChecklist && (
              <div className="fade-in">
                <Card>
                  <ML c="var(--text-3)" mb={20}>Pre-export verification</ML>
                  {generatedBrief.qualityChecklist.map((item, i) => (
                    <div key={i} style={{ display: 'flex', gap: 16, padding: '14px 0', borderBottom: i < generatedBrief.qualityChecklist.length - 1 ? '1px solid var(--border-subtle)' : '', alignItems: 'flex-start' }}>
                      <div style={{ width: 18, height: 18, borderRadius: 4, border: '1px solid var(--border-strong)', flexShrink: 0, marginTop: 2, background: 'var(--bg-surface)' }} />
                      <div style={{ flex: 1 }}>
                        <div className="font-sans" style={{ fontSize: 15, color: 'var(--text-1)', marginBottom: 4 }}>{item.check}</div>
                        <div className="font-sans" style={{ fontSize: 13, color: 'var(--text-3)', fontStyle: 'italic' }}>{item.why}</div>
                      </div>
                    </div>
                  ))}
                </Card>
              </div>
            )}
          </div>
        )}

      </main>

      <footer style={{ borderTop: '1px solid var(--border-subtle)', padding: '24px 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'var(--bg-deep)', zIndex: 10 }}>
        <span className="font-mono" style={{ fontSize: 10, color: 'var(--text-3)', letterSpacing: '.2em', textTransform: 'uppercase' }}>Quantum Branding BrandOS</span>
        <span className="font-mono" style={{ fontSize: 10, color: 'var(--text-4)', letterSpacing: '.15em' }}>v1.0 · System Operational</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
