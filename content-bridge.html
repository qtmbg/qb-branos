<!DOCTYPE html>
<html lang="en" data-qb-tool="content-bridge">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB — Content Bridge</title>
<script>
(function(){
  var p=new URLSearchParams(window.location.search);
  var k=p.get('apikey');if(k)localStorage.setItem('qb_api_key',k);
  window.QB_API_KEY=k||localStorage.getItem('qb_api_key')||'';
  var pr=p.get('provider');if(pr)localStorage.setItem('qb_provider',pr);
  window.QB_PROVIDER=pr||localStorage.getItem('qb_provider')||'anthropic';
  try{window.QB_QBP=JSON.parse(localStorage.getItem('qb_qbp')||'{}');}catch(e){window.QB_QBP={};}
  window.QB_AI=async function(sys,usr,max){
    max=max||2000;
    if(window.QB_PROVIDER==='gemini'){
      var url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+window.QB_API_KEY;
      var r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemInstruction:{parts:[{text:sys}]},contents:[{role:'user',parts:[{text:usr}]}],generationConfig:{maxOutputTokens:max}})});
      var d=await r.json();if(d.error)throw new Error(d.error.message);
      return d.candidates[0].content.parts[0].text;
    } else {
      var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':window.QB_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:max,system:sys,messages:[{role:'user',content:usr}]})});
      var d=await r.json();if(d.error)throw new Error(d.error.message);
      return d.content[0].text;
    }
  };
})();
</script>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="qb-system.css">
<style>
  /* Tool-specific styles — base from qb-system.css */
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scanH{0%{left:-80%}100%{left:200%}}
.fade-in{animation:fadeIn .35s ease forwards}
.spin{animation:spin .8s linear infinite}
.scan-line{position:relative;overflow:hidden}
.scan-line::after{content:'';position:absolute;top:0;left:-80%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(58,95,74,0.04),transparent);animation:scanH 3s linear infinite}
.layer-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:20px 22px;cursor:pointer;transition:all .18s;position:relative}
.layer-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.layer-card.selected{border-color:var(--layer-color);background:var(--bg4)}
.layer-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--layer-color);opacity:.5;border-radius:10px 10px 0 0;transition:opacity .18s}
.layer-card.selected::before{opacity:1}
.platform-btn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px 16px;text-align:left;transition:all .18s;cursor:pointer;width:100%}
.platform-btn:hover{border-color:var(--border2)}
.platform-btn.active{border-color:var(--platform-color);background:var(--bg4)}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0}
.consent-box{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:16px 20px}
.copy-btn{background:var(--bg4);border:1px solid var(--border);color:var(--text3);padding:4px 10px;border-radius:4px;font-size:10px;font-family:var(--mono);letter-spacing:.06em;cursor:pointer;transition:all .15s}
.copy-btn:hover{color:var(--text2);border-color:var(--border2)}
.quality-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);line-height:1.5}
.quality-item:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef}=React;

const ML=({c,children,mb=8})=><div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.2em',color:c||'var(--text3)',textTransform:'uppercase',marginBottom:mb}}>{children}</div>;
const Card=({children,accent,style={}})=><div style={{background:'var(--bg3)',border:`1px solid ${accent||'var(--border)'}`,borderRadius:8,padding:'16px 20px',...style}}>{children}</div>;
const TF=({label,value,onChange,placeholder,rows=1,hint})=>(
  <div style={{marginBottom:14}}>
    {label&&<ML>{label}</ML>}
    {rows>1?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}/>
    :<input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>}
    {hint&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4,fontStyle:'italic'}}>{hint}</div>}
  </div>
);

// ── LAYERS ────────────────────────────────────────────────────────────────────
const LAYERS=[
  {
    id:'static',
    n:'01',
    label:'Branded Static Content',
    sub:'Posts, ads, lifestyle imagery — your brand identity baked in',
    color:'#a78bfa',
    icon:'◧',
    useCase:'Product photos, brand posts, LinkedIn banners, Instagram grid, ad creatives',
    platforms:[
      {id:'canva',  name:'Canva',          url:'https://canva.com',        color:'#7c3aed', tier:'Free / Pro',   best:'Brand posts, LinkedIn graphics, carousels, pitch decks',   apiAvailable:true},
      {id:'firefly',name:'Adobe Firefly',  url:'https://firefly.adobe.com',color:'#e85c33', tier:'Free / CC',    best:'AI-generated product lifestyle photography',               apiAvailable:false},
      {id:'glorify', name:'Glorify',        url:'https://glorify.com',      color:'#f59e0b', tier:'Paid',         best:'E-commerce product posts, D2C brand visuals',              apiAvailable:false},
    ],
    sourceQuality:[
      {icon:'✓',text:'Product photos: minimum 1000×1000px, white or neutral background, sharp focus, good lighting'},
      {icon:'✓',text:'Brand colors: export your hex codes from the QBP / Sensescape before starting'},
      {icon:'✓',text:'Logo: provide as SVG or PNG with transparent background — minimum 500px wide'},
      {icon:'✓',text:'Reference images: 3–5 examples of the visual style you want. Pull from your Visual DNA outputs.'},
      {icon:'✗',text:'Do not provide: blurry photos, screenshots, photos with other brand logos visible'},
    ],
    briefFields:['contentType','dimensions','brandColors','keyMessage','ctaText'],
  },
  {
    id:'ugc',
    n:'02',
    label:'UGC Video & Face Clone',
    sub:'Your face, your voice — without filming again',
    color:'#f472b6',
    icon:'◎',
    useCase:'Instagram Reels, TikTok, YouTube Shorts, LinkedIn video, testimonial-style ads',
    platforms:[
      {id:'heygen',   name:'HeyGen',    url:'https://heygen.com',   color:'#f472b6', tier:'Paid',    best:'Face clone + voice clone from a 2-min sample. Market leader. Most realistic.',       apiAvailable:true},
      {id:'creatify', name:'Creatify',  url:'https://creatify.ai',  color:'#60a5fa', tier:'Paid',    best:'UGC-style ads from script + product images. Fast, e-commerce native.',               apiAvailable:true},
      {id:'synthesia',name:'Synthesia', url:'https://synthesia.io', color:'#2dd4bf', tier:'Paid',    best:'Clean, corporate avatar. Best for training, explainer, or professional formats.',    apiAvailable:true},
    ],
    sourceQuality:[
      {icon:'✓',text:'Face video: record 2–5 minutes of yourself speaking naturally to camera. Well lit, quiet room.'},
      {icon:'✓',text:'Background: plain wall or simple environment. Avoid patterned clothing.'},
      {icon:'✓',text:'Camera: eye level, stable. Modern smartphone is sufficient. 1080p minimum.'},
      {icon:'✓',text:'Script delivery: speak at your natural pace. Include pauses. Do not rush.'},
      {icon:'✗',text:'Do not provide: shaky footage, heavy background noise, sunglasses, multiple people in frame'},
      {icon:'!',text:'Legal: you are cloning your own likeness. You must provide explicit consent within the platform during setup.'},
    ],
    briefFields:['scriptSource','videoFormat','duration','tone','ctaText'],
    requiresConsent:true,
  },
  {
    id:'avatar',
    n:'03',
    label:'AI Avatar / Digital Twin',
    sub:'A permanent digital version of you that creates content on demand',
    color:'#60a5fa',
    icon:'◐',
    useCase:'Scalable personal brand content, personalized outreach video, multilingual delivery',
    platforms:[
      {id:'heygen2',name:'HeyGen Avatar',url:'https://heygen.com/avatar',color:'#f472b6',tier:'Paid', best:'Most realistic. Photorealistic avatar speaks any script. Best for personal brand at scale.',  apiAvailable:true},
      {id:'tavus',  name:'Tavus',         url:'https://tavus.io',          color:'#60a5fa',tier:'Paid', best:'Personalized video at scale. Each output feels individually recorded. Strong for outreach.',  apiAvailable:true},
      {id:'d-id',   name:'D-ID',          url:'https://d-id.com',          color:'#a78bfa',tier:'Free/Paid',best:'Photo → talking avatar. Lower barrier to entry, slightly less realistic.',                  apiAvailable:true},
    ],
    sourceQuality:[
      {icon:'✓',text:'Photos: 10–20 high-quality portrait photos from different angles, lighting conditions, and expressions.'},
      {icon:'✓',text:'Video: 5–10 minutes of talking head footage across multiple sessions for best avatar quality.'},
      {icon:'✓',text:'Voice: record 30+ minutes of natural speech for highest-quality voice clone.'},
      {icon:'✓',text:'Consistency: consistent clothing and background across source material improves avatar quality.'},
      {icon:'!',text:'Legal: digital likeness rights vary by jurisdiction. Consult local regulations for commercial use.'},
      {icon:'!',text:'Platform terms: each platform has specific policies on avatar usage and distribution. Read them.'},
    ],
    briefFields:['scriptSource','targetPlatform','tone','language','personalizationLevel'],
    requiresConsent:true,
  },
];

const BRIEF_FIELD_CONFIG={
  contentType:{label:'Content type',placeholder:'e.g. Instagram carousel, LinkedIn banner, Facebook ad, product lifestyle post'},
  dimensions:{label:'Dimensions / format',placeholder:'e.g. 1080×1080px, 1200×628px, 9:16 vertical'},
  brandColors:{label:'Brand colors',placeholder:'e.g. Primary: #4ade80, Secondary: #111, Accent: #a78bfa'},
  keyMessage:{label:'Key message',placeholder:'The one thing this piece of content must communicate'},
  ctaText:{label:'Call to action',placeholder:'e.g. Book a call, Download free, Start your scan'},
  scriptSource:{label:'Script source',placeholder:'Paste your script here or describe which QB agent produced it'},
  videoFormat:{label:'Video format',placeholder:'e.g. Instagram Reel 9:16, LinkedIn 16:9, YouTube Short 9:16'},
  duration:{label:'Target duration',placeholder:'e.g. 30 seconds, 60 seconds, 90 seconds'},
  tone:{label:'Delivery tone',placeholder:'e.g. Direct and authoritative, warm and conversational, energetic'},
  targetPlatform:{label:'Target platform',placeholder:'e.g. LinkedIn, Instagram, YouTube, email outreach'},
  language:{label:'Language',placeholder:'e.g. English, French, Arabic — for multilingual avatar delivery'},
  personalizationLevel:{label:'Personalization level',placeholder:'e.g. One video for all, or personalized per recipient (Tavus)'},
};

// ── MAIN APP ──────────────────────────────────────────────────────────────────
export default function App(){
  const qbp=window.QB_QBP||{};
  const [selectedLayer,setSelectedLayer]=useState(null);
  const [selectedPlatform,setSelectedPlatform]=useState(null);
  const [consentGiven,setConsentGiven]=useState(false);
  const [script,setScript]=useState('');
  const [briefFields,setBriefFields]=useState({});
  const [generatedBrief,setGeneratedBrief]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [activeTab,setActiveTab]=useState('brief');
  const [showFaceless,setShowFaceless]=useState(false);
  const [copied,setCopied]=useState('');

  const layer=selectedLayer?LAYERS.find(l=>l.id===selectedLayer):null;
  const platform=layer&&selectedPlatform?layer.platforms.find(p=>p.id===selectedPlatform):null;

  const updateField=(k,v)=>setBriefFields(prev=>({...prev,[k]:v}));

  const copy=(text,key)=>{
    navigator.clipboard.writeText(text).catch(()=>{});
    setCopied(key);setTimeout(()=>setCopied(''),1800);
  };

  const generateBrief=async()=>{
    if(!script.trim()){setError('Paste your script or content before generating the brief.');return;}
    if(!layer||!platform){setError('Select a layer and platform first.');return;}
    setError('');setLoading(true);

    const sys=`You are the QB Content Bridge inside the Quantum Branding BrandOS ecosystem.
Your role is to translate QB OS agent outputs (scripts, strategies, brand profiles) into precise production briefs for third-party content platforms.
You produce briefs that are specific, actionable, and formatted to match the exact requirements of the target platform.
Return ONLY valid JSON. No markdown, no preamble.`;

    const usr=`QUANTUM BRAND PROFILE:
Brand: ${qbp.brandName||'not specified'}
Essence: ${qbp.brandEssence||'not specified'}
Voice: ${qbp.voiceNotes||'not specified'}
Archetype: ${qbp.archetype||'not specified'}
Color territory: ${qbp.colorTerritory||'not specified'}
Always/Never: ${qbp.alwaysNever||'not specified'}

PRODUCTION LAYER: ${layer.label}
TARGET PLATFORM: ${platform.name}
BEST USE CASE: ${platform.best}

SCRIPT / CONTENT INPUT:
${script}

ADDITIONAL BRIEF FIELDS:
${Object.entries(briefFields).filter(([k,v])=>v).map(([k,v])=>`${k}: ${v}`).join('\n')||'None provided'}

Generate a complete production brief for ${platform.name} and return:
{
  "platformReadyTitle": "a 5-7 word title for this content piece",
  "executiveSummary": "2 sentences. What this content is, what it should achieve.",
  "productionInstructions": [
    {"step": number, "action": "what to do", "detail": "specific detail, settings, or guidance for this step in ${platform.name}"}
  ],
  "scriptFormatted": "the script reformatted and optimized for ${platform.name} delivery — correct pacing, emphasis markers, pause indicators where relevant",
  "platformSettings": {
    "format": "exact format/resolution/aspect ratio for this platform",
    "duration": "recommended duration",
    "style": "visual or delivery style recommendation specific to ${platform.name}",
    "exportSettings": "how to export from ${platform.name} for the target channel"
  },
  "brandApplication": {
    "colors": "how to apply the brand colors in ${platform.name}",
    "typography": "font guidance if applicable",
    "voiceGuidance": "how the brand voice should translate to this format"
  },
  "qualityChecklist": [
    {"check": "what to verify before downloading/exporting", "why": "why this matters"}
  ],
  "nextStep": "exactly where to go in ${platform.name} to start — which menu, which feature, which template category"
}

Requirements: productionInstructions must be step-by-step for someone who has never used ${platform.name}. All guidance must be specific to this brand and this script — nothing generic.`;

    try{
      const raw=await window.QB_AI(sys,usr,3000);
      const clean=raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').replace(/^```\s*/,'').trim();
      setGeneratedBrief(JSON.parse(clean));
      setActiveTab('brief');
    }catch(e){setError('Brief generation error: '+e.message);}
    setLoading(false);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>

      {/* HEADER */}
      <header style={{borderBottom:'1px solid var(--border)',padding:'0 24px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--bg)',position:'sticky',top:0,zIndex:50}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.3em',color:'var(--green)',textTransform:'uppercase'}}>QB_BRANIDOS</div>
          <div style={{width:1,height:14,background:'var(--border)'}}/>
          <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.2em',color:'var(--text3)',textTransform:'uppercase'}}>Content Bridge v1.0</div>
        </div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.1em'}}>Phase 03 · Production Layer</div>
      </header>

      <main style={{flex:1,maxWidth:960,margin:'0 auto',width:'100%',padding:'36px 24px'}}>

        {/* INTRO */}
        <div style={{marginBottom:36}} className="fade-in">
          <ML c="var(--green)">// Phase 03 — Production Layer</ML>
          <h1 style={{fontSize:26,fontWeight:700,lineHeight:1.2,marginBottom:10}}>Content Bridge</h1>
          <p style={{color:'var(--text2)',fontSize:14,lineHeight:1.7,maxWidth:600}}>
            You have the script. Now produce it. Select the production layer, choose your platform, paste the QB agent output, and the Bridge generates a platform-ready brief — formatted for HeyGen, Creatify, Canva, or any third-party production tool.
          </p>
        </div>

        {/* LAYER SELECTION */}
        <div style={{marginBottom:28}}>
          <ML c="var(--text3)" mb={14}>01 — Select production layer</ML>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
            {LAYERS.map(l=>(
              <div key={l.id} className={`layer-card${selectedLayer===l.id?' selected':''}`}
                style={{'--layer-color':l.color}}
                onClick={()=>{setSelectedLayer(l.id);setSelectedPlatform(null);setGeneratedBrief(null);}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:10}}>
                  <div style={{width:30,height:30,borderRadius:6,background:`${l.color}18`,border:`1px solid ${l.color}30`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:l.color}}>{l.icon}</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:9,color:l.color,opacity:.6}}>{l.n}</div>
                </div>
                <div style={{fontSize:13,fontWeight:500,color:'var(--text)',marginBottom:4}}>{l.label}</div>
                <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.5}}>{l.sub}</div>
              </div>
            ))}
          </div>
        </div>

        {/* PLATFORM SELECTION */}
        {layer&&(
          <div style={{marginBottom:28}} className="fade-in">
            <ML c="var(--text3)" mb={14}>02 — Select platform</ML>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {layer.platforms.map(pl=>(
                <button key={pl.id} className={`platform-btn${selectedPlatform===pl.id?' active':''}`}
                  style={{'--platform-color':pl.color}}
                  onClick={()=>setSelectedPlatform(pl.id)}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:pl.color,flexShrink:0}}/>
                      <div>
                        <div style={{fontSize:13,fontWeight:500,color:'var(--text)',marginBottom:2}}>{pl.name}</div>
                        <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.4}}>{pl.best}</div>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                      {pl.apiAvailable&&<span style={{fontFamily:'var(--mono)',fontSize:9,padding:'1px 6px',borderRadius:2,background:'rgba(74,222,128,0.1)',color:'var(--green)',border:'1px solid rgba(74,222,128,0.2)'}}>API</span>}
                      <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',padding:'1px 6px',borderRadius:2,background:'var(--bg4)',border:'1px solid var(--border)'}}>{pl.tier}</span>
                      <a href={pl.url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
                        style={{fontFamily:'var(--mono)',fontSize:9,color:pl.color,padding:'2px 8px',borderRadius:3,background:`${pl.color}12`,border:`1px solid ${pl.color}20`,textDecoration:'none'}}>
                        Open →
                      </a>
                    </div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* CONSENT GATE */}
        {layer?.requiresConsent&&selectedPlatform&&(
          <div className="consent-box fade-in" style={{marginBottom:24}}>
            <ML c="var(--red)" mb={10}>Consent required — face & likeness</ML>
            <p style={{fontSize:13,color:'var(--text)',lineHeight:1.7,marginBottom:16}}>
              This production layer involves cloning your face, voice, or creating a digital likeness. You must confirm the following before proceeding:
            </p>
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
              {[
                'I am uploading my own face and voice. I am not uploading another person\'s likeness.',
                'I have read and agree to the terms of service of the platform I am using.',
                'I understand my digital likeness will be processed by a third-party AI platform.',
                'I take full responsibility for how this content is distributed and used commercially.',
              ].map((item,i)=>(
                <div key={i} style={{fontSize:12,color:'var(--text2)',lineHeight:1.6,display:'flex',gap:8}}>
                  <span style={{color:'var(--red)',flexShrink:0}}>—</span>{item}
                </div>
              ))}
            </div>
            <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
              <input type="checkbox" checked={consentGiven} onChange={e=>setConsentGiven(e.target.checked)}
                style={{width:16,height:16,accentColor:'var(--green)',cursor:'pointer'}}/>
              <span style={{fontSize:13,color:consentGiven?'var(--green)':'var(--text)',fontWeight:consentGiven?500:400}}>
                I confirm the above. I am consenting to use of my own likeness.
              </span>
            </label>
          </div>
        )}

        {/* SOURCE QUALITY GUIDE */}
        {layer&&selectedPlatform&&(!layer.requiresConsent||consentGiven)&&(
          <div style={{marginBottom:24}} className="fade-in">
            <Card>
              <ML c="var(--amber)" mb={12}>Source quality guide — read before uploading</ML>
              <div>{layer.sourceQuality.map((item,i)=>(
                <div key={i} className="quality-item">
                  <span style={{color:item.icon==='✓'?'var(--green)':item.icon==='!'?'var(--amber)':'var(--red)',flexShrink:0,fontWeight:700}}>{item.icon}</span>
                  <span>{item.text}</span>
                </div>
              ))}</div>
            </Card>
          </div>
        )}

        {/* SCRIPT INPUT + BRIEF FIELDS */}
        {layer&&selectedPlatform&&(!layer.requiresConsent||consentGiven)&&(
          <div style={{marginBottom:24}} className="fade-in">
            <ML c="var(--text3)" mb={14}>03 — Paste your QB agent output</ML>
            <TF label="Script or content from QB agent" value={script} onChange={setScript}
              placeholder={`Paste the script, caption, or strategy output from your QB Content agent here. The Bridge will format it precisely for ${platform?.name||'the selected platform'}.`}
              rows={6} hint="This comes directly from LinkedIn Strategy Agent, Instagram Seed Agent, YouTube Strategy Agent, or the Repurposing Engine."/>

            <ML c="var(--text3)" mb={10}>04 — Brief details (optional but improves precision)</ML>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {layer.briefFields.map(fk=>(
                <TF key={fk} label={BRIEF_FIELD_CONFIG[fk]?.label||fk}
                  value={briefFields[fk]||''}
                  onChange={v=>updateField(fk,v)}
                  placeholder={BRIEF_FIELD_CONFIG[fk]?.placeholder||''}
                  rows={1}/>
              ))}
            </div>

            {error&&<div style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,padding:'10px 14px',marginBottom:12,fontSize:13,color:'var(--red)'}}>{error}</div>}

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:12,color:'var(--text3)'}}>
                {layer.label} → {platform?.name} · {qbp.brandName||'Brand not set in QBP'}
              </div>
              <button onClick={generateBrief} disabled={loading||!script.trim()}
                style={{background:script.trim()&&!loading?'var(--green)':'var(--bg3)',color:script.trim()&&!loading?'#000':'var(--text3)',padding:'11px 24px',borderRadius:6,fontWeight:700,fontSize:12,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)',transition:'all .2s',display:'flex',alignItems:'center',gap:8}}>
                {loading&&<div style={{width:14,height:14,border:'2px solid rgba(0,0,0,0.3)',borderTop:'2px solid #000',borderRadius:'50%'}} className="spin"/>}
                {loading?'Building Brief…':'Generate Production Brief →'}
              </button>
            </div>
          </div>
        )}

        {/* GENERATED BRIEF */}
        {generatedBrief&&(
          <div style={{marginTop:8}} className="fade-in">
            <div style={{marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <ML c="var(--green)" mb={4}>Production brief ready</ML>
                <div style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>{generatedBrief.platformReadyTitle}</div>
              </div>
              <div style={{fontFamily:'var(--mono)',fontSize:10,padding:'4px 12px',borderRadius:4,background:'var(--green2)',color:'var(--green)',border:'1px solid rgba(74,222,128,0.25)'}}>
                {platform?.name}
              </div>
            </div>

            {/* Tabs */}
            <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:20,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>
              {['brief','script','brand','checklist'].map(t=>(
                <button key={t}
                  style={{padding:'7px 14px',borderRadius:5,fontSize:11,letterSpacing:'.12em',textTransform:'uppercase',fontFamily:'var(--mono)',cursor:'pointer',background:activeTab===t?'var(--green2)':'transparent',border:`1px solid ${activeTab===t?'rgba(74,222,128,0.3)':'var(--border)'}`,color:activeTab===t?'var(--green)':'var(--text3)',transition:'all .2s'}}
                  onClick={()=>setActiveTab(t)}>
                  {t==='brief'?'Production Steps':t==='script'?'Formatted Script':t==='brand'?'Brand Application':'Quality Checklist'}
                </button>
              ))}
            </div>

            {activeTab==='brief'&&(
              <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12}}>
                <Card>
                  <ML c="var(--text3)" mb={6}>Summary</ML>
                  <p style={{fontSize:13,color:'var(--text)',lineHeight:1.7}}>{generatedBrief.executiveSummary}</p>
                </Card>
                {generatedBrief.platformSettings&&(
                  <Card>
                    <ML c="var(--blue)" mb={10}>Platform settings for {platform?.name}</ML>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                      {Object.entries(generatedBrief.platformSettings).map(([k,v])=>(
                        <div key={k} style={{background:'var(--bg4)',borderRadius:5,padding:'8px 12px'}}>
                          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:3}}>{k.replace(/([A-Z])/g,' $1').toLowerCase()}</div>
                          <div style={{fontSize:12,color:'var(--text)',lineHeight:1.4}}>{v}</div>
                        </div>
                      ))}
                    </div>
                  </Card>
                )}
                {generatedBrief.productionInstructions?.length>0&&(
                  <Card>
                    <ML c="var(--green)" mb={12}>Step-by-step in {platform?.name}</ML>
                    {generatedBrief.productionInstructions.map((step,i)=>(
                      <div key={i} style={{display:'flex',gap:12,marginBottom:i<generatedBrief.productionInstructions.length-1?14:0,paddingBottom:i<generatedBrief.productionInstructions.length-1?14:0,borderBottom:i<generatedBrief.productionInstructions.length-1?'1px solid var(--border)':''}}>
                        <div className="step-circle" style={{background:'rgba(74,222,128,0.12)',color:'var(--green)',border:'1px solid rgba(74,222,128,0.2)'}}>{String(step.step).padStart(2,'0')}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:500,color:'var(--text)',marginBottom:3}}>{step.action}</div>
                          <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5}}>{step.detail}</div>
                        </div>
                      </div>
                    ))}
                  </Card>
                )}
                {generatedBrief.nextStep&&(
                  <div style={{background:'rgba(74,222,128,0.06)',border:'1px solid rgba(74,222,128,0.15)',borderRadius:8,padding:'14px 18px',display:'flex',alignItems:'flex-start',gap:12}}>
                    <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--green)',flexShrink:0}}>→</div>
                    <div>
                      <ML c="var(--green)" mb={4}>Start here in {platform?.name}</ML>
                      <p style={{fontSize:13,color:'var(--text)',lineHeight:1.6}}>{generatedBrief.nextStep}</p>
                    </div>
                    <a href={platform?.url} target="_blank" rel="noreferrer"
                      style={{background:'var(--green)',color:'#000',padding:'7px 16px',borderRadius:5,fontWeight:700,fontSize:11,letterSpacing:'.08em',textTransform:'uppercase',fontFamily:'var(--mono)',textDecoration:'none',whiteSpace:'nowrap',flexShrink:0}}>
                      Open {platform?.name} →
                    </a>
                  </div>
                )}
              </div>
            )}

            {activeTab==='script'&&generatedBrief.scriptFormatted&&(
              <div className="fade-in">
                <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
                  <button className="copy-btn" onClick={()=>copy(generatedBrief.scriptFormatted,'script')}>
                    {copied==='script'?'Copied ✓':'Copy script'}
                  </button>
                </div>
                <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'20px 24px',fontFamily:'var(--mono)',fontSize:13,lineHeight:2,color:'var(--text)',whiteSpace:'pre-wrap'}}>
                  {generatedBrief.scriptFormatted}
                </div>
              </div>
            )}

            {activeTab==='brand'&&generatedBrief.brandApplication&&(
              <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:10}}>
                {Object.entries(generatedBrief.brandApplication).map(([k,v])=>(
                  <Card key={k}>
                    <ML c="var(--purple)" mb={6}>{k.replace(/([A-Z])/g,' $1').toLowerCase()}</ML>
                    <p style={{fontSize:13,color:'var(--text)',lineHeight:1.7}}>{v}</p>
                  </Card>
                ))}
              </div>
            )}

            {activeTab==='checklist'&&generatedBrief.qualityChecklist&&(
              <div className="fade-in">
                <Card>
                  <ML c="var(--text3)" mb={12}>Before you export / download</ML>
                  {generatedBrief.qualityChecklist.map((item,i)=>(
                    <div key={i} style={{display:'flex',gap:12,padding:'10px 0',borderBottom:i<generatedBrief.qualityChecklist.length-1?'1px solid var(--border)':'',alignItems:'flex-start'}}>
                      <div style={{width:18,height:18,borderRadius:3,border:'1px solid var(--border2)',flexShrink:0,marginTop:1}}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,color:'var(--text)',marginBottom:2}}>{item.check}</div>
                        <div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>{item.why}</div>
                      </div>
                    </div>
                  ))}
                </Card>
              </div>
            )}
          </div>
        )}

      </main>

      <footer style={{borderTop:'1px solid var(--border)',padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.2em',textTransform:'uppercase'}}>Quantum Branding BrandOS</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.15em'}}>Content Bridge / Phase 03 Production Layer</span>
      </footer>
    </div>
  );
}

// ── FACELESS PATH COMPONENT ───────────────────────────────────────────────────
const FacelessPath = ({script, onBack}) => {
  const [selected, setSelected] = React.useState(null);
  const [generating, setGenerating] = React.useState(false);
  const [brief, setBrief] = React.useState(null);

  const FACELESS_OPTIONS = [
    {
      id:'text-screen',
      label:'Text on Screen',
      desc:'Bold text over background video or color. No face needed. High performance for educational and insight content.',
      tools:['CapCut (free)','Canva (free)','Adobe Express'],
      bestFor:'LinkedIn insights, Instagram carousels in video form, educational hooks',
      difficulty:'Easy',
    },
    {
      id:'ai-voice',
      label:'AI Voiceover + Visuals',
      desc:'AI-generated voice reads your script over relevant video clips, images, or screen recordings.',
      tools:['ElevenLabs (voice)','Pexels (free stock)','CapCut (editing)'],
      bestFor:'Explainer videos, tutorials, YouTube content without appearing on camera',
      difficulty:'Medium',
    },
    {
      id:'screen-record',
      label:'Screen Recording + Commentary',
      desc:'Record your screen while narrating. No face. Works for process walkthroughs, tools, analysis.',
      tools:['Loom (free)','OBS (free)','Descript'],
      bestFor:'LinkedIn thought leadership, Twitter/X video, YouTube how-to content',
      difficulty:'Easy',
    },
    {
      id:'ready-to-film',
      label:'I am ready to film — guide me',
      desc:'Get a step-by-step recording guide: what to wear, where to stand, how to light the shot, what to say. Then use HeyGen.',
      tools:['Your phone camera','HeyGen','Natural window light'],
      bestFor:'Best long-term strategy. Start here if you want face-clone capability later.',
      difficulty:'Guided',
    },
  ];

  const generateFacelessBrief = async () => {
    if (!selected || !script.trim()) return;
    setGenerating(true);
    const option = FACELESS_OPTIONS.find(o => o.id === selected);
    const sys = 'You are the QB Content Bridge. Produce a step-by-step production brief for creating faceless content using the selected format. Be extremely specific. Return only JSON.';
    const usr = `Script: ${script}\n\nFormat: ${option.label}\nTools: ${option.tools.join(', ')}\n\nReturn: {"title":"brief title","steps":[{"n":1,"action":"what to do","detail":"exact instructions","tool":"which tool"}],"settingsGuide":{"platform":"","format":"","export":""},"qualityTips":["tip1","tip2","tip3"],"recordingGuide":${selected==='ready-to-film'?'"step-by-step filming guide for first-time creators"':'"n/a"'}}`;
    try {
      if (window.QB_AI) {
        const raw = await window.QB_AI(sys, usr, 1500);
        const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
        setBrief(JSON.parse(clean));
      }
    } catch(e) { console.warn(e); }
    setGenerating(false);
  };

  return (
    <div style={{marginTop:20}} className="fade-in">
      <div style={{background:'rgba(45,212,191,0.06)',border:'1px solid rgba(45,212,191,0.2)',borderRadius:8,padding:'14px 18px',marginBottom:20}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--teal)',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:4}}>No footage? No problem.</div>
        <div style={{fontSize:13,color:'var(--text)',lineHeight:1.65}}>Choose how you want to produce your content without appearing on camera. Every format below is proven and achievable today.</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
        {FACELESS_OPTIONS.map(opt => (
          <div key={opt.id} onClick={()=>setSelected(opt.id)}
            style={{background:'var(--bg3)',border:'1px solid '+(selected===opt.id?'rgba(45,212,191,0.3)':'var(--border)'),borderRadius:10,padding:'16px 18px',cursor:'pointer',transition:'all .18s',background:selected===opt.id?'rgba(45,212,191,0.04)':'var(--bg3)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{opt.label}</div>
              <div style={{display:'flex',gap:6}}>
                <span style={{fontFamily:'var(--mono)',fontSize:9,padding:'2px 7px',borderRadius:3,background:opt.difficulty==='Easy'?'rgba(74,222,128,0.1)':opt.difficulty==='Guided'?'rgba(96,165,250,0.1)':'rgba(245,158,11,0.1)',color:opt.difficulty==='Easy'?'var(--green)':opt.difficulty==='Guided'?'var(--blue)':'var(--amber)',border:'1px solid transparent'}}>{opt.difficulty}</span>
              </div>
            </div>
            <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:8}}>{opt.desc}</div>
            <div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>Best for: {opt.bestFor}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:8}}>
              {opt.tools.map(t=><span key={t} style={{fontFamily:'var(--mono)',fontSize:9,padding:'2px 8px',borderRadius:3,background:'var(--bg4)',color:'var(--text3)',border:'1px solid var(--border)'}}>{t}</span>)}
            </div>
          </div>
        ))}
      </div>
      {selected && (
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <button onClick={generateFacelessBrief} disabled={generating}
            style={{background:generating?'var(--bg3)':'var(--teal)',color:'#000',padding:'11px 22px',borderRadius:6,fontWeight:700,fontSize:11,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)',cursor:generating?'not-allowed':'pointer',display:'flex',alignItems:'center',gap:8}}>
            {generating&&<div style={{width:12,height:12,border:'2px solid rgba(0,0,0,0.3)',borderTop:'2px solid #000',borderRadius:'50%',animation:'spin .8s linear infinite'}}/>}
            {generating?'Building brief…':'Generate Production Brief →'}
          </button>
          <button onClick={onBack} style={{background:'none',color:'var(--text3)',border:'1px solid var(--border)',padding:'10px 18px',borderRadius:6,fontSize:11,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase',cursor:'pointer'}}>← Back</button>
        </div>
      )}
      {brief && (
        <div style={{marginTop:20}} className="fade-in">
          <div style={{background:'var(--bg)',border:'1px solid rgba(45,212,191,0.15)',borderRadius:8,padding:'20px 24px',marginBottom:16}}>
            <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--teal)',letterSpacing:'.15em',marginBottom:8,textTransform:'uppercase'}}>Production Brief — {brief.title}</div>
            {brief.steps && brief.steps.map((step,i)=>(
              <div key={i} style={{display:'flex',gap:14,padding:'10px 0',borderBottom:i<brief.steps.length-1?'1px solid var(--border)':'',alignItems:'flex-start'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--teal)',width:20,flexShrink:0,marginTop:2}}>0{step.n}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--text)',marginBottom:3}}>{step.action}</div>
                  <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5,marginBottom:3}}>{step.detail}</div>
                  {step.tool&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--teal)',background:'rgba(45,212,191,0.08)',border:'1px solid rgba(45,212,191,0.15)',padding:'1px 7px',borderRadius:3}}>Tool: {step.tool}</span>}
                </div>
              </div>
            ))}
          </div>
          {brief.qualityTips && (
            <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 18px'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:8}}>Quality tips</div>
              {brief.qualityTips.map((tip,i)=><div key={i} style={{fontSize:12,color:'var(--text2)',display:'flex',gap:8,padding:'3px 0'}}><span style={{color:'var(--teal)'}}>→</span>{tip}</div>)}
            </div>
          )}
        </div>
      )}
    </div>
  );
};
// ── END FACELESS PATH ─────────────────────────────────────────────────────────

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script src="qb-shell.js"></script>
</body>
</html>
