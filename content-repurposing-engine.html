        var current = document.documentElement.getAttribute('data-theme');

        localStorage.setItem('qb-theme', next);

/* ── DESIGN SYSTEM: ENTANGLED TIME ────────────────────────────────────────── */
:root, [data-theme="dark"] {

  --patina-lit: #4A7A5E;

  --rgb-phase-content: 138, 90, 90;      /* #8A5A5A */

* { box-sizing: border-box; margin: 0; padding: 0; }

html:not([data-theme]) { background: #080604; color: #A89A88; }

body {
  background: var(--bg-base);
  color: var(--text-2);
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 14.5px;
  line-height: 1.7;
}

/* Film Grain */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}
[data-theme="light"] body::after { opacity: 0.02; }

/* Vignette */
.main-content::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background: radial-gradient(ellipse 80% 80% at 50% 20%, transparent 0%, rgba(8,6,4,0.4) 100%);
}
[data-theme="light"] .main-content::before {
  background: radial-gradient(ellipse 80% 80% at 50% 20%, transparent 0%, rgba(200,190,175,0.15) 100%);
}

/* Base UI wrappers */
.app-wrapper { position: relative; z-index: 10; display: flex; flex-direction: column; min-height: 100vh; }
.content-layer { flex: 1; max-width: 960px; margin: 0 auto; width: 100%; padding: 48px 24px; }

/* Typography */
h1, h2, h3, .serif { font-family: 'DM Serif Display', Georgia, serif; color: var(--text-1); font-weight: 400; letter-spacing: -0.015em; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-void); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-4); }

/* Inputs */
input, textarea, select {
  background: var(--bg-surface);
  border: 1px solid var(--border-medium);
  color: var(--text-1);
  font-family: 'Inter', sans-serif;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 14.5px;
  width: 100%;
  outline: none;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}
textarea { resize: vertical; line-height: 1.6; min-height: 80px; }
input::placeholder, textarea::placeholder { color: var(--text-3); font-style: italic; opacity: 0.7; }
input:focus, textarea:focus, select:focus {
  border-color: var(--patina);
  background: var(--bg-deep);
  box-shadow: 0 0 0 3px var(--patina-faint), 0 0 24px -4px var(--brass-faint);
}
select option { background: var(--bg-deep); color: var(--text-1); }
button { cursor: pointer; font-family: 'Inter', sans-serif; border: none; outline: none; background: transparent; }

/* Animations */
@keyframes slideUpFade { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes beat {
  0%, 100% { transform: scale(1); opacity: 1; }
  12% { transform: scale(1.35); opacity: 1; }
  24% { transform: scale(0.95); opacity: 0.6; }
  36% { transform: scale(1.15); opacity: 1; }
  48% { transform: scale(1); opacity: 0.7; }
}

.fade-in { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.stagger-1 { animation-delay: 0.05s; opacity: 0; }
.stagger-2 { animation-delay: 0.1s; opacity: 0; }
.stagger-3 { animation-delay: 0.15s; opacity: 0; }
.spin { animation: spin 1s linear infinite; }
.blink { animation: pulse 2s ease infinite; }

/* Signature Elements */
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--brass);
  box-shadow: 0 0 8px rgba(168,144,62,0.7), 0 0 2px rgba(168,144,62,1);
  animation: beat 3s ease infinite;
}

.manifesto-block {
  position: relative;
  padding: 24px 0 24px 32px;
}
.manifesto-block::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2.5px;
  background: linear-gradient(180deg, var(--brass) 0%, var(--patina) 100%);
  border-radius: 2px;
  box-shadow: 0 0 12px var(--brass-faint);
}

.glass-card {
  background: var(--bg-overlay);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
.glass-card::before {
  content: ''; position: absolute; top: -30%; left: -10%; width: 60%; height: 60%;
  background: radial-gradient(ellipse at center, var(--brass-faint) 0%, transparent 70%);
  pointer-events: none; opacity: 0.5; transition: opacity 0.4s ease;
}
.glass-card:hover { border-color: var(--border-medium); box-shadow: 0 8px 32px -8px rgba(0,0,0,0.2); }
.glass-card:hover::before { opacity: 1; }

.btn-primary {
  background: var(--patina);
  color: #E6DDD0; /* Cream text */
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 14px 32px;
  border-radius: 7px;
  border: none;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
}
.btn-primary:hover:not(:disabled) {
  background: var(--patina-lit);
  transform: translateY(-1px);
  box-shadow: 0 4px 24px -4px var(--patina-dim), 0 0 0 1px var(--brass-faint);
}
.btn-primary:disabled { opacity: 0.5; filter: grayscale(50%); cursor: not-allowed; }

.platform-btn {
  padding: 14px; border-radius: 8px; text-align: left;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);

.platform-btn:hover { border-color: var(--border-medium); background: var(--bg-elevated); transform: translateY(-1px); }
.platform-btn.on {

.pill {

}
.pill-neutral { background: var(--bg-elevated); color: var(--text-2); border: 1px solid var(--border-medium); }

<script>
// ── QB SPINE - API Key + QBP + Multi-provider adapter ────────────────────────
(function(){
  var params = new URLSearchParams(window.location.search);
  var urlQBP = params.get('qbp');
  if(urlQBP){ try{ localStorage.setItem('qb_qbp', atob(decodeURIComponent(urlQBP))); }catch(e){} }
  try{ window.QB_QBP = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); }catch(e){ window.QB_QBP = {}; }
  
  window.QB_MODEL = 'claude-sonnet-4-6';

  window.QB_AI = async function(systemPrompt, userPrompt, maxTokens){
    maxTokens = maxTokens || 4000;
    var body = {
      model: window.QB_MODEL,
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    };
    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    var d = await res.json();
    if(d.error) throw new Error(d.error.message);
    return d.content[0].text;
  };
})();
</script>

// Reusable approval/revision wrapper - not yet wired into App render tree.
// To activate: wrap any items array with <QBApprovalWrapper items={...} renderItem={...} onAllApproved={...} />
function QBApprovalWrapper({items, renderItem, onAllApproved, itemKey='id', revisionField='content'}) {
  const [states, setStates] = React.useState(() => {
    const s = {};
    items.forEach((item,i) => { s[i] = {status:'pending', round:0, feedback:'', item}; });
    return s;
  });
  const [revising, setRevising] = React.useState({});

  const allApproved = Object.values(states).every(s => s.status === 'approved' || s.status === 'removed');
  const approvedItems = Object.values(states).filter(s => s.status === 'approved').map(s => s.item);

  React.useEffect(() => {
    if (allApproved && approvedItems.length > 0) onAllApproved && onAllApproved(approvedItems);
  }, [allApproved, onAllApproved]);

  const approve = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'approved'}}));
  const remove = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'removed'}}));
  const startRevise = (i) => setRevising(prev => ({...prev, [i]: true}));
  // FIX 6 - QB_AI checked BEFORE state mutation; prevents stuck "revising" state
  const submitRevise = async (i) => {
    const feedback = document.getElementById('revision-input-' + i)?.value || '';
    if (!feedback.trim()) return;
    if (!window.QB_AI || states[i].round >= 3) {
      setStates(prev => ({...prev, [i]: {...prev[i], status:'pending'}}));
      return;
    }
    setStates(prev => ({...prev, [i]: {...prev[i], status:'revising', round: prev[i].round + 1, feedback}}));
    setRevising(prev => ({...prev, [i]: false}));
    try {
      const original = JSON.stringify(states[i].item);
      const prompt = 'You produced this content piece: ' + original + '\n\nThe user requests this revision: ' + feedback + '\n\nReturn ONLY the revised version as a JSON object with the same structure. No markdown, no preamble.';
      const sys = 'You are a content revision agent. Revise the content piece exactly as requested. Maintain brand voice and platform requirements. Return only valid JSON.';
      const raw = await window.QB_AI(sys, prompt, 1000);
      const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').replace(/^```\s*/,'').trim();
      const revised = JSON.parse(clean);
      setStates(prev => ({...prev, [i]: {...prev[i], status:'revised', item: revised}}));
    } catch(e) {
      setStates(prev => ({...prev, [i]: {...prev[i], status:'pending'}}));
    }
  };


  const statusColor = {pending:'var(--text-3)', approved:'var(--patina)', removed:'var(--error-warm)', revising:'var(--brass)', revised:'rgb(74, 122, 138)'};
  const statusLabel = {pending:'Pending review', approved:'✓ Approved', removed:'Removed', revising:'Revising…', revised:'Revised - review again'};

  return (
    <div>
      <div style={{background:'var(--bg-surface)',border:'1px solid var(--border-medium)',borderRadius:8,padding:'16px 20px',marginBottom:24,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <div className="mono" style={{fontSize:10,color:'var(--patina)',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:4}}>Content Review</div>
          <div style={{fontSize:13,color:'var(--text-2)'}}>{Object.values(states).filter(s=>s.status==='approved').length} approved · {Object.values(states).filter(s=>s.status==='pending'||s.status==='revised').length} pending · {Object.values(states).filter(s=>s.status==='removed').length} removed</div>
        </div>
        {allApproved && approvedItems.length > 0 && (
          <div className="mono" style={{fontSize:11,padding:'8px 16px',borderRadius:6,background:'var(--patina)',color:'#fff',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase'}}>All done ✓</div>
        )}
      </div>
      {items.map((item, i) => {
        const s = states[i];
        if (!s) return null;
        const isRevising = revising[i];
        const maxRoundsReached = s.round >= 3;
        
        let borderColor = 'var(--border-subtle)';
        if(s.status==='approved') borderColor = 'var(--patina-dim)';
        if(s.status==='removed') borderColor = 'rgba(138,74,74,0.3)';
        
        return (
          <div className="glass-card" key={i} style={{border:`1px solid ${borderColor}`,marginBottom:16,opacity:s.status==='removed'?0.4:1}}>
            <div style={{padding:'20px 24px 0'}}>
              {renderItem(s.item, i)}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12,padding:'16px 24px',borderTop:'1px solid var(--border-subtle)',background:'var(--bg-deep)',flexWrap:'wrap'}}>
              <div className="mono" style={{fontSize:10,color:statusColor[s.status],letterSpacing:'.1em',flex:1}}>
                {statusLabel[s.status]} {s.round > 0 ? '(Round '+s.round+'/3)' : ''}
              </div>
              {(s.status==='pending'||s.status==='revised') && !isRevising && (
                <>
                  <button onClick={()=>approve(i)} style={{background:'var(--patina-faint)',color:'var(--patina-lit)',border:'1px solid var(--patina-dim)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'.08em',cursor:'pointer'}}>✓ Approve</button>
                  {!maxRoundsReached && <button onClick={()=>startRevise(i)} style={{background:'var(--brass-faint)',color:'var(--brass)',border:'1px solid var(--brass-dim)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'.08em',cursor:'pointer'}}>↻ Revise</button>}
                  <button onClick={()=>remove(i)} style={{background:'rgba(138,74,74,0.08)',color:'var(--error-warm)',border:'1px solid rgba(138,74,74,0.2)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'.08em',cursor:'pointer'}}>× Remove</button>
                </>
              )}
              {s.status==='approved' && <button onClick={()=>setStates(prev=>({...prev,[i]:{...prev[i],status:'pending'}}))} style={{background:'transparent',color:'var(--text-3)',border:'1px solid var(--border-medium)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',cursor:'pointer'}}>Undo</button>}
              {s.status==='revising' && <div className="mono" style={{fontSize:10,color:'var(--brass)'}}>Generating revision…</div>}
            </div>
            {isRevising && (
              <div style={{padding:'16px 24px',background:'var(--bg-surface)',borderTop:'1px solid var(--border-medium)'}}>
                <div className="mono" style={{fontSize:10,color:'var(--brass)',letterSpacing:'.1em',marginBottom:8}}>REVISION REQUEST {s.round+1}/3</div>
                <textarea id={'revision-input-'+i} placeholder="What should change? Be specific: e.g. 'Make the hook more direct' or 'Remove the question format'" style={{width:'100%',background:'var(--bg-deep)',border:'1px solid var(--brass-dim)',color:'var(--text-1)',borderRadius:8,padding:'12px 16px',fontSize:14,fontFamily:'var(--font-sans)',resize:'vertical',minHeight:80,outline:'none'}} rows={2}/>
                <div style={{display:'flex',gap:12,marginTop:12}}>
                  <button onClick={()=>submitRevise(i)} style={{background:'var(--brass)',color:'#111',padding:'8px 20px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',fontWeight:700,letterSpacing:'.08em',cursor:'pointer'}}>Submit Revision →</button>
                  <button onClick={()=>setRevising(prev=>({...prev,[i]:false}))} style={{background:'transparent',color:'var(--text-3)',border:'1px solid var(--border-medium)',padding:'8px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',cursor:'pointer'}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
