*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--bg5:#252525;
  --border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--text2:#888;--text3:#555;--text4:#333;
  --green:#4ade80;--green2:rgba(74,222,128,0.12);--green3:rgba(74,222,128,0.05);
  --red:#ef4444;--red2:rgba(239,68,68,0.1);
  --amber:#f59e0b;--amber2:rgba(245,158,11,0.1);
  --blue:#60a5fa;--blue2:rgba(96,165,250,0.12);
  --purple:#a78bfa;--purple2:rgba(167,139,250,0.12);
  --teal:#2dd4bf;--teal2:rgba(45,212,191,0.1);
  --pink:#f472b6;--pink2:rgba(244,114,182,0.1);
  --orange:#fb923c;--orange2:rgba(251,146,60,0.1);
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input,textarea,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font);border-radius:6px;padding:10px 14px;font-size:13px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--green)}
textarea{resize:vertical;line-height:1.6}
select option{background:var(--bg3)}
button{cursor:pointer;font-family:var(--font);border:none;outline:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scanH{0%{left:-80%}100%{left:200%}}
@keyframes countUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.fade-in{animation:fadeIn .35s ease forwards}
.count-in{animation:countUp .4s ease forwards}
.blink{animation:pulse 1.4s ease infinite}
.spin{animation:spin .9s linear infinite}
.scan-line{position:relative;overflow:hidden}
.scan-line::after{content:'';position:absolute;top:0;left:-80%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(74,222,128,0.04),transparent);animation:scanH 3s linear infinite}
.tab-btn{padding:7px 13px;border-radius:5px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono);background:transparent;border:1px solid var(--border);color:var(--text3);transition:all .2s;cursor:pointer;white-space:nowrap}
.tab-btn:hover{border-color:var(--border2);color:var(--text2)}
.tab-btn.active{background:var(--green2);border-color:rgba(74,222,128,0.3);color:var(--green)}
.platform-btn{padding:10px 14px;border-radius:7px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono);background:var(--bg3);border:1px solid var(--border);color:var(--text3);transition:all .2s;cursor:pointer;text-align:center}
.platform-btn.on{background:var(--green2);border-color:rgba(74,222,128,0.3);color:var(--green)}
.output-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.output-card:hover{border-color:var(--border2)}
.output-card-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12}
.output-card-body{padding:0 18px 16px;border-top:1px solid var(--border)}
.pill{display:inline-block;padding:2px 9px;border-radius:4px;font-size:10px;font-family:var(--mono);margin:2px;letter-spacing:.04em}
.pill-green{background:var(--green2);color:var(--green);border:1px solid rgba(74,222,128,0.2)}
.pill-neutral{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.multiplier-badge{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:8px;font-family:var(--mono);font-size:15px;font-weight:700;flex-shrink:0}
</style>
<script>
// QB_SPINE v2 — API Key + QBP + Multi-provider adapter
(function(){
  var params = new URLSearchParams(window.location.search);
  // QBP
  var urlQBP = params.get('qbp');
  if(urlQBP){ try{ localStorage.setItem('qb_qbp', atob(urlQBP)); }catch(e){} }
  try{ window.QB_QBP = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); }catch(e){ window.QB_QBP = {}; }
  // Universal AI call — works with Anthropic or Gemini
  window.QB_AI = async function(systemPrompt, userPrompt, maxTokens){
    maxTokens = maxTokens || 4000;
    var body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    };
    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    var d = await res.json();
    if(d.error) throw new Error(d.error.message);
    return d.content[0].text;
  };
  window.QB_AUTOFILL = function(fieldMap){
    if(!window.QB_QBP) return;
    Object.entries(fieldMap).forEach(function(kv){
      var el = document.getElementById(kv[0]) || document.querySelector('[data-qbp="'+kv[1]+'"]');
      if(el && window.QB_QBP[kv[1]] && !el.value) el.value = window.QB_QBP[kv[1]];
    });
  };
})();
</script>

<script type="text/babel">
const {useState,useRef}=React;

// ── PLATFORM CONFIG ────────────────────────────────────────────────────────────
const PLATFORMS={
  instagram_caption:{label:'Instagram Caption',color:'var(--pink)',bg:'var(--pink2)',border:'rgba(244,114,182,0.2)',icon:'IG',count:3},
  instagram_carousel:{label:'Instagram Carousel',color:'var(--pink)',bg:'var(--pink2)',border:'rgba(244,114,182,0.2)',icon:'IG+',count:1},
  linkedin_personal:{label:'LinkedIn Personal',color:'var(--blue)',bg:'var(--blue2)',border:'rgba(96,165,250,0.2)',icon:'LI',count:2},
  linkedin_company:{label:'LinkedIn Company',color:'var(--blue)',bg:'var(--blue2)',border:'rgba(96,165,250,0.2)',icon:'LI+',count:1},
  twitter_thread:{label:'X/Twitter Thread',color:'var(--teal)',bg:'var(--teal2)',border:'rgba(45,212,191,0.2)',icon:'X',count:1},
  newsletter_excerpt:{label:'Newsletter Excerpt',color:'var(--amber)',bg:'var(--amber2)',border:'rgba(245,158,11,0.2)',icon:'✉',count:1},
  youtube_short:{label:'YouTube Short Script',color:'var(--red)',bg:'var(--red2)',border:'rgba(239,68,68,0.2)',icon:'YT',count:3},
  quote_graphic:{label:'Quote Graphics',color:'var(--purple)',bg:'var(--purple2)',border:'rgba(167,139,250,0.2)',icon:'QQ',count:3},
  podcast_intro:{label:'Podcast Intro',color:'var(--orange)',bg:'var(--orange2)',border:'rgba(251,146,60,0.2)',icon:'PD',count:1},
  email_subject:{label:'Email Subject Lines',color:'var(--green)',bg:'var(--green2)',border:'rgba(74,222,128,0.2)',icon:'EM',count:5},
};

const SOURCE_TYPES=['YouTube video script','Podcast episode','Newsletter issue','Blog article','LinkedIn long-form post','Instagram carousel','Webinar recording notes','Workshop transcript','Case study','Interview transcript'];
const ARCHETYPES=['The Rebel','The Sage','The Creator','The Ruler','The Magician','The Hero','The Explorer','The Caregiver','The Jester','The Everyman','The Innocent'];

// ── SHARED UI ─────────────────────────────────────────────────────────────────
const ML=({c,children,mb=8})=><div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.2em',color:c||'var(--text3)',textTransform:'uppercase',marginBottom:mb}}>{children}</div>;
const TF=({label,value,onChange,placeholder,rows=1,hint})=>(
  <div style={{marginBottom:14}}>
    <ML>{label}</ML>
    {rows>1?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}/>
    :<input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>}
    {hint&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4,fontStyle:'italic'}}>{hint}</div>}
  </div>
);
const SF=({label,options,value,onChange})=>(
  <div style={{marginBottom:14}}>
    <ML>{label}</ML>
    <select value={value} onChange={e=>onChange(e.target.value)}>
      <option value="">— select —</option>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  </div>
);
const Sec=({n,title,children,note})=>(
  <div style={{marginBottom:28}}>
    <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:14,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
      <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',letterSpacing:'.2em'}}>0{n}</span>
      <span style={{fontSize:13,fontWeight:500,letterSpacing:'.05em',textTransform:'uppercase'}}>{title}</span>
      {note&&<span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{note}</span>}
    </div>
    {children}
  </div>
);

// ── OUTPUT CARD ───────────────────────────────────────────────────────────────
const OutputCard=({platformKey,items,config})=>{
  const [open,setOpen]=useState(false);
  const [copiedIdx,setCopiedIdx]=useState(null);
  const copy=async(text,i)=>{
    try{await navigator.clipboard.writeText(text);setCopiedIdx(i);setTimeout(()=>setCopiedIdx(null),1800);}catch(e){}
  };
  if(!items?.length) return null;
  return(
    <div className="output-card">
      <div className="output-card-header" onClick={()=>setOpen(!open)}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div className="multiplier-badge" style={{background:config.bg,border:`1px solid ${config.border}`}}>
            <span style={{fontSize:9,color:config.color,letterSpacing:0}}>{config.icon}</span>
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:500,color:'var(--text)',marginBottom:2}}>{config.label}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{items.length} piece{items.length>1?'s':''} generated</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontFamily:'var(--mono)',fontSize:12,color:config.color,fontWeight:700}}>×{items.length}</span>
          <span style={{color:'var(--text3)',fontSize:11,transform:open?'rotate(180deg)':'none',transition:'transform .2s'}}>↓</span>
        </div>
      </div>
      {open&&(
        <div className="fade-in">
          {items.map((item,i)=>(
            <div key={i} style={{padding:'14px 0',borderTop:'1px solid var(--border)',marginLeft:18,marginRight:18}}>
              {item.label&&(
                <div style={{display:'flex',justify:'space-between',alignItems:'center',marginBottom:8,gap:8}}>
                  <span style={{fontSize:11,color:config.color,fontFamily:'var(--mono)',letterSpacing:'.1em'}}>{item.label}</span>
                  {item.format&&<span className="pill pill-neutral">{item.format}</span>}
                </div>
              )}
              {item.note&&<div style={{fontSize:11,color:'var(--text3)',marginBottom:8,fontStyle:'italic'}}>{item.note}</div>}
              <div style={{background:'var(--bg)',border:`1px solid ${config.border}`,borderRadius:6,padding:'14px',fontSize:13,lineHeight:1.85,color:'var(--text)',whiteSpace:'pre-wrap',marginBottom:8,position:'relative'}}>
                {item.content}
                <button
                  onClick={e=>{e.stopPropagation();copy(item.content,i);}}
                  style={{position:'absolute',top:8,right:8,background:'var(--bg3)',border:'1px solid var(--border)',color:copiedIdx===i?'var(--green)':'var(--text3)',padding:'3px 10px',borderRadius:4,fontSize:9,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase',transition:'color .2s'}}
                >{copiedIdx===i?'Copied ✓':'Copy'}</button>
              </div>
              {item.hashtags?.length>0&&(
                <div style={{marginTop:4}}>{item.hashtags.map((h,hi)=><span key={hi} className="pill pill-neutral">#{h}</span>)}</div>
              )}
              {item.visualBrief&&(
                <div style={{marginTop:8,padding:'8px 12px',background:'var(--bg4)',borderRadius:5,fontSize:11,color:'var(--text3)',lineHeight:1.5}}>
                  <span style={{color:'var(--text2)'}}>Visual: </span>{item.visualBrief}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ── STATS BAR ─────────────────────────────────────────────────────────────────
const StatsBar=({result,selected})=>{
  const totalPieces=Object.entries(result||{}).reduce((acc,[k,v])=>{
    if(selected[k]&&Array.isArray(v)) return acc+v.length;
    return acc;
  },0);
  const platforms=Object.keys(selected).filter(k=>selected[k]&&result?.[k]?.length).length;
  return(
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}}>
      {[
        {label:'Pieces generated',value:totalPieces,color:'var(--green)'},
        {label:'Platforms covered',value:platforms,color:'var(--blue)'},
        {label:'Multiplier',value:`1→${totalPieces}`,color:'var(--amber)'},
      ].map((s,i)=>(
        <div key={i} className="count-in" style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px',textAlign:'center',animationDelay:`${i*0.1}s`}}>
          <div style={{fontFamily:'var(--mono)',fontSize:20,fontWeight:700,color:s.color,marginBottom:4}}>{s.value}</div>
          <div style={{fontSize:10,color:'var(--text3)',letterSpacing:'.12em',textTransform:'uppercase'}}>{s.label}</div>
        </div>
      ))}
    </div>
  );
};

// ── MAIN APP ──────────────────────────────────────────────────────────────────
const STEPS=['Input','Processing','Output Pack'];

export default function App(){
  const [step,setStep]=useState(0);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [result,setResult]=useState(null);
  const [loadingStatus,setLoadingStatus]=useState('');

  // Source content
  const [sourceType,setSourceType]=useState('');
  const [sourceTitle,setSourceTitle]=useState('');
  const [sourceContent,setSourceContent]=useState('');

  // Brand voice
  const [brandName,setBrandName]=useState('');
  const [brandEssence,setBrandEssence]=useState('');
  const [archetype,setArchetype]=useState('');
  const [voiceNotes,setVoiceNotes]=useState('');
  const [alwaysNever,setAlwaysNever]=useState('');
  const [primaryPersona,setPrimaryPersona]=useState('');

  // Platform selection
  const [selectedPlatforms,setSelectedPlatforms]=useState({
    instagram_caption:true,instagram_carousel:true,
    linkedin_personal:true,linkedin_company:false,
    twitter_thread:true,newsletter_excerpt:true,
    youtube_short:true,quote_graphic:true,
    podcast_intro:false,email_subject:true,
  });

  const togglePlatform=p=>setSelectedPlatforms(prev=>({...prev,[p]:!prev[p]}));
  const activeCount=Object.values(selectedPlatforms).filter(Boolean).length;
  const isValid=()=>sourceContent.trim().length>100&&brandName&&voiceNotes;

  const buildPrompt=()=>{
    const active=Object.entries(selectedPlatforms).filter(([,v])=>v).map(([k])=>k);
    const specs=active.map(k=>{
      const c=PLATFORMS[k];
      const counts={
        instagram_caption:'3 separate captions — each angles the core idea differently',
        instagram_carousel:'1 carousel — 6-8 slides: hook slide, 4-6 content slides, CTA slide. Give each slide as a separate content item.',
        linkedin_personal:'2 posts — one belief-driven, one story-driven. Full posts, ready to publish.',
        linkedin_company:'1 post — methodology or proof focused. Company voice.',
        twitter_thread:'1 thread — opening tweet + 6-8 follow-up tweets. Number each tweet.',
        newsletter_excerpt:'1 excerpt — intro paragraph + 3-4 key insights formatted as newsletter content',
        youtube_short:'3 short-form video scripts — each under 60 seconds, hook in first 3 words',
        quote_graphic:'3 standalone quote-worthy lines pulled from the content — each must work alone visually',
        podcast_intro:'1 podcast intro teaser — 90-120 seconds spoken, first-person, draws listeners in',
        email_subject:'5 subject line options for an email version — ranging from direct to curiosity to bold',
      };
      return `${k}: ${specs||c.label} — ${counts[k]}`;
    }).join('\n');

    return `You are the Content Repurposing Engine inside the Quantum Branding BrandOS ecosystem.
Your function is to take one piece of long-form content and extract maximum value from it across multiple platforms — without repeating content, without losing brand voice, and without generic reformatting.
Each repurposed piece must feel like it was written natively for that platform. Not copied. Not summarized. Extracted, reframed, and rebuilt.
Return ONLY valid JSON — no markdown, no preamble.

BRAND VOICE CONTEXT:
Brand: ${brandName}
Brand Essence: ${brandEssence||'not specified'}
Archetype: ${archetype||'not specified'}
Voice Notes: ${voiceNotes}
Always/Never: ${alwaysNever||'not specified'}
Primary Persona: ${primaryPersona||'not specified'}

SOURCE CONTENT:
Type: ${sourceType||'long-form content'}
Title: ${sourceTitle||'untitled'}
Content:
---
${sourceContent}
---

PLATFORMS REQUESTED:
${specs}

For each platform, identify the strongest angle from the source content — the specific insight, story, tension, or idea that will perform best on that platform. Then rebuild it natively.

Return JSON with this structure — include ONLY the platforms requested:
{
  "extractedCore": "The single most powerful idea in this content — 1-2 sentences",
  "contentAngles": [
    {"angle": "angle name", "description": "what this angle focuses on", "bestFor": "which platforms"}
  ],
  "instagram_caption": [
    {"label": "Caption 1 — [angle used]", "content": "full caption with line breaks", "hashtags": ["tag1","tag2","tag3","tag4","tag5"], "visualBrief": "what image/visual this needs", "note": "angle/hook strategy"},
    {"label": "Caption 2 — [angle used]", "content": "full caption", "hashtags": [], "visualBrief": "", "note": ""},
    {"label": "Caption 3 — [angle used]", "content": "full caption", "hashtags": [], "visualBrief": "", "note": ""}
  ],
  "instagram_carousel": [
    {"label": "Slide 1 — Hook", "content": "slide text", "note": "visual direction"},
    {"label": "Slide 2", "content": "slide text", "note": ""},
    {"label": "Slide 3", "content": "slide text", "note": ""},
    {"label": "Slide 4", "content": "slide text", "note": ""},
    {"label": "Slide 5", "content": "slide text", "note": ""},
    {"label": "Slide 6 — CTA", "content": "slide text", "note": ""}
  ],
  "linkedin_personal": [
    {"label": "Post 1 — Belief-driven", "content": "complete LinkedIn post", "format": "Belief post", "note": "strategic angle"},
    {"label": "Post 2 — Story-driven", "content": "complete LinkedIn post", "format": "Story post", "note": "strategic angle"}
  ],
  "linkedin_company": [
    {"label": "Company Post", "content": "complete company page post", "format": "Method/Proof", "note": "angle"}
  ],
  "twitter_thread": [
    {"label": "Tweet 1 — Hook", "content": "tweet text under 280 chars"},
    {"label": "Tweet 2", "content": "tweet text"},
    {"label": "Tweet 3", "content": "tweet text"},
    {"label": "Tweet 4", "content": "tweet text"},
    {"label": "Tweet 5", "content": "tweet text"},
    {"label": "Tweet 6", "content": "tweet text"},
    {"label": "Tweet 7", "content": "tweet text"},
    {"label": "Tweet 8 — CTA", "content": "tweet text"}
  ],
  "newsletter_excerpt": [
    {"label": "Newsletter Excerpt", "content": "intro + insights formatted for email", "note": "how to use in newsletter"}
  ],
  "youtube_short": [
    {"label": "Short 1 — [angle]", "content": "full spoken script under 60s", "note": "visual direction for B-roll"},
    {"label": "Short 2 — [angle]", "content": "full spoken script", "note": ""},
    {"label": "Short 3 — [angle]", "content": "full spoken script", "note": ""}
  ],
  "quote_graphic": [
    {"label": "Quote 1", "content": "the quote exactly — standalone, powerful", "visualBrief": "visual style for this quote"},
    {"label": "Quote 2", "content": "the quote", "visualBrief": ""},
    {"label": "Quote 3", "content": "the quote", "visualBrief": ""}
  ],
  "podcast_intro": [
    {"label": "Podcast Teaser", "content": "full spoken intro script 90-120 seconds", "note": "pacing notes"}
  ],
  "email_subject": [
    {"label": "Subject 1 — Direct", "content": "subject line", "note": "type/angle"},
    {"label": "Subject 2 — Curiosity", "content": "subject line", "note": ""},
    {"label": "Subject 3 — Bold", "content": "subject line", "note": ""},
    {"label": "Subject 4 — Personal", "content": "subject line", "note": ""},
    {"label": "Subject 5 — Contrarian", "content": "subject line", "note": ""}
  ]
}

CRITICAL: Only include keys for platforms that were requested. Every piece must be in THIS brand's voice — specific, not generic. No filler. No watered-down summaries. Extract the real power from the source content.`;
  };

  const statuses=[
    'Reading source content...',
    'Identifying core angles...',
    'Rebuilding for Instagram...',
    'Reframing for LinkedIn...',
    'Extracting quote moments...',
    'Scripting YouTube Shorts...',
    'Writing email subjects...',
    'Assembling content pack...',
  ];

  const run=async()=>{
    if(!isValid()){setError('Add source content (min 100 chars), brand name, and voice notes.');return;}
    setError('');setLoading(true);setStep(1);
    let si=0;
    setLoadingStatus(statuses[0]);
    const statusInterval=setInterval(()=>{si=Math.min(si+1,statuses.length-1);setLoadingStatus(statuses[si]);},1800);
    try{
      const res=await fetch('/api/claude',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:10000,
          messages:[{role:'user',content:buildPrompt()}]
        })
      });
      const d=await res.json();
      clearInterval(statusInterval);
      if(d.error) throw new Error(d.error.message);
      const raw=d.content[0].text.trim();
      const clean=raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').replace(/^```\s*/,'').trim();
      setResult(JSON.parse(clean));
      setStep(2);
    }catch(e){clearInterval(statusInterval);setError('Engine error: '+e.message);setStep(0);}
    setLoading(false);
  };

  const exportAll=()=>{
    if(!result) return;
    const lines=[`CONTENT REPURPOSING PACK — ${brandName||'Brand'}`,`Source: ${sourceTitle||'Untitled'}`,`Generated by QB BrandOS — Content Repurposing Engine`,''];
    if(result.extractedCore){lines.push('CORE IDEA:');lines.push(result.extractedCore);lines.push('');}
    Object.entries(PLATFORMS).forEach(([key,cfg])=>{
      if(!selectedPlatforms[key]||!result[key]?.length) return;
      lines.push('='.repeat(50));
      lines.push(cfg.label.toUpperCase());
      lines.push('='.repeat(50),'');
      result[key].forEach((item,i)=>{
        lines.push(item.label||`Item ${i+1}`);
        lines.push(item.content||'');
        if(item.hashtags?.length) lines.push(item.hashtags.map(h=>'#'+h).join(' '));
        if(item.visualBrief) lines.push(`Visual: ${item.visualBrief}`);
        if(item.note) lines.push(`Note: ${item.note}`);
        lines.push('');
      });
    });
    const blob=new Blob([lines.join('\n')],{type:'text/plain'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`${(brandName||'brand').replace(/\s+/g,'-').toLowerCase()}-repurposed-pack.txt`;
    a.click();
  };

  const totalExpected=Object.entries(selectedPlatforms).filter(([,v])=>v).reduce((acc,[k])=>acc+(PLATFORMS[k]?.count||1),0);

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>

      {/* HEADER */}
      <header style={{borderBottom:'1px solid var(--border)',padding:'16px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--bg)',position:'sticky',top:0,zIndex:50}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.3em',color:'var(--green)',textTransform:'uppercase'}}>QB_BRANIDOS</div>
          <div style={{width:1,height:14,background:'var(--border)'}}/>
          <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.2em',color:'var(--text3)',textTransform:'uppercase'}}>Content Repurposing Engine v1.0</div>
        </div>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          {STEPS.map((s,i)=>(
            <React.Fragment key={i}>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:i<step?'var(--green)':i===step?'var(--green)':'var(--border)',opacity:i===step?1:i<step?.6:.3,boxShadow:i===step?'0 0 5px rgba(74,222,128,.5)':''}}/>
                <span style={{fontSize:10,color:i<=step?'var(--text2)':'var(--text4)',fontFamily:'var(--mono)',letterSpacing:'.1em'}}>{s}</span>
              </div>
              {i<STEPS.length-1&&<div style={{width:12,height:1,background:'var(--border)',margin:'0 2px'}}/>}
            </React.Fragment>
          ))}
        </div>
      </header>

      <main style={{flex:1,maxWidth:960,margin:'0 auto',width:'100%',padding:'36px 24px'}}>

        {/* ── STEP 0: INPUT ── */}
        {step===0&&(
          <div className="fade-in">
            <div style={{marginBottom:36}}>
              <ML c="var(--green)">// Phase 04 — Execution + Management</ML>
              <h1 style={{fontSize:26,fontWeight:700,lineHeight:1.2,marginBottom:8}}>Content Repurposing Engine</h1>
              <p style={{color:'var(--text2)',fontSize:14,lineHeight:1.7,maxWidth:620}}>One piece of long-form content. Up to {totalExpected}+ pieces across {activeCount} platforms. Each rebuilt natively for its surface — not copied, not summarized. Extracted, reframed, and made to perform.</p>
            </div>

            <Sec n={1} title="Source Content" note="* required">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <SF label="Source Type *" options={SOURCE_TYPES} value={sourceType} onChange={setSourceType}/>
                <TF label="Title / Subject" value={sourceTitle} onChange={setSourceTitle} placeholder="What is this piece about?" rows={1}/>
              </div>
              <TF
                label="Paste full source content *"
                value={sourceContent}
                onChange={setSourceContent}
                placeholder="Paste the complete script, article, newsletter, transcript, or post here. The more complete the source, the better the repurposing. Minimum 100 characters."
                rows={12}
                hint={`${sourceContent.length} characters${sourceContent.length>100?' — ready':', minimum 100 required'}`}
              />
            </Sec>

            <Sec n={2} title="Brand Voice" note="* required">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <TF label="Brand Name *" value={brandName} onChange={setBrandName} placeholder="The brand this content belongs to" rows={1}/>
                <SF label="Archetype" options={ARCHETYPES} value={archetype} onChange={setArchetype}/>
              </div>
              <TF label="Brand Essence" value={brandEssence} onChange={setBrandEssence} placeholder="The irreducible truth — one sentence" rows={1}/>
              <TF label="Voice Notes *" value={voiceNotes} onChange={setVoiceNotes} placeholder="How this brand writes — rhythm, register, what it sounds and doesn't sound like" rows={2}/>
              <TF label="Always / Never" value={alwaysNever} onChange={setAlwaysNever} placeholder="Writing rules — e.g. Always: direct, challenge-first. Never: jargon, passive voice." rows={2}/>
              <TF label="Primary Persona" value={primaryPersona} onChange={setPrimaryPersona} placeholder="Who this content is for — specific" rows={2}/>
            </Sec>

            <Sec n={3} title="Output Platforms" note={`${activeCount} selected · ~${totalExpected} pieces`}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:10}}>
                {Object.entries(PLATFORMS).map(([key,cfg])=>(
                  <button
                    key={key}
                    className={`platform-btn${selectedPlatforms[key]?' on':''}`}
                    onClick={()=>togglePlatform(key)}
                    style={{borderColor:selectedPlatforms[key]?cfg.border:'var(--border)',color:selectedPlatforms[key]?cfg.color:'var(--text3)',background:selectedPlatforms[key]?cfg.bg:'var(--bg3)'}}
                  >
                    <div style={{fontSize:14,marginBottom:4,fontFamily:'var(--mono)',fontWeight:700}}>{cfg.icon}</div>
                    <div style={{fontSize:9,lineHeight:1.3}}>{cfg.label}</div>
                    <div style={{fontSize:9,color:selectedPlatforms[key]?cfg.color:'var(--text4)',marginTop:3}}>×{cfg.count}</div>
                  </button>
                ))}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>Each source generates ×{cfg=>cfg.count} pieces per selected platform</div>
            </Sec>

            {error&&<div style={{background:'var(--red2)',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,padding:'11px 15px',marginBottom:16,fontSize:13,color:'var(--red)'}}>{error}</div>}

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:12,color:'var(--text3)'}}>
                {activeCount} platforms · ~{totalExpected} pieces from 1 source
              </div>
              <button onClick={run} disabled={!isValid()} style={{background:isValid()?'var(--green)':'var(--bg3)',color:isValid()?'#000':'var(--text3)',padding:'12px 28px',borderRadius:6,fontWeight:700,fontSize:13,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)',transition:'all .2s'}}>
                Repurpose Content →
              </button>
            </div>
          </div>
        )}

        {/* ── STEP 1: PROCESSING ── */}
        {step===1&&(
          <div className="fade-in" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:460,gap:28,textAlign:'center'}}>
            <div style={{position:'relative',width:64,height:64}}>
              <div style={{position:'absolute',inset:0,border:'2px solid var(--border)',borderTop:'2px solid var(--green)',borderRadius:'50%'}} className="spin"/>
              <div style={{position:'absolute',inset:8,border:'1px solid var(--border2)',borderBottom:'1px solid var(--amber)',borderRadius:'50%',animation:'spin .6s linear infinite reverse'}}/>
            </div>
            <div>
              <ML c="var(--green)">Engine Processing</ML>
              <div style={{fontSize:14,color:'var(--text)',fontWeight:500,marginBottom:8}}>{loadingStatus}</div>
              <div style={{fontSize:12,color:'var(--text3)'}}>Building {totalExpected}+ pieces from 1 source</div>
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center',maxWidth:400}}>
              {Object.entries(selectedPlatforms).filter(([,v])=>v).map(([k])=>(
                <span key={k} style={{fontSize:9,padding:'2px 8px',borderRadius:3,background:PLATFORMS[k].bg,color:PLATFORMS[k].color,border:`1px solid ${PLATFORMS[k].border}`,fontFamily:'var(--mono)',letterSpacing:'.08em'}}>
                  {PLATFORMS[k].label}
                </span>
              ))}
            </div>
          </div>
        )}

        {/* ── STEP 2: OUTPUT ── */}
        {step===2&&result&&(
          <div className="fade-in">
            <div style={{marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
              <div>
                <ML c="var(--green)">// Content Pack — Repurposing Complete</ML>
                <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{sourceTitle||'Content Pack'}</h1>
                <p style={{color:'var(--text2)',fontSize:13}}>1 source → multiple platforms · all in brand voice</p>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={exportAll} style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',padding:'8px 14px',borderRadius:5,fontSize:11,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase'}}>Export Pack</button>
                <button onClick={()=>{setStep(0);setResult(null);}} style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',padding:'8px 14px',borderRadius:5,fontSize:11,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase'}}>New Source</button>
              </div>
            </div>

            <StatsBar result={result} selected={selectedPlatforms}/>

            {/* Extracted core */}
            {result.extractedCore&&(
              <div style={{background:'var(--bg)',border:'1px solid rgba(74,222,128,0.15)',borderRadius:8,padding:'14px 18px',marginBottom:16}} className="scan-line">
                <ML c="var(--green)" mb={6}>Core idea extracted</ML>
                <p style={{fontSize:13,color:'var(--text)',lineHeight:1.7,fontStyle:'italic'}}>"{result.extractedCore}"</p>
              </div>
            )}

            {/* Content angles */}
            {result.contentAngles?.length>0&&(
              <div style={{marginBottom:16}}>
                <ML c="var(--text3)" mb={8}>Angles identified</ML>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {result.contentAngles.map((a,i)=>(
                    <div key={i} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 12px',fontSize:11}}>
                      <span style={{color:'var(--text)',fontWeight:500}}>{a.angle}</span>
                      {a.bestFor&&<span style={{color:'var(--text3)',marginLeft:6}}>→ {a.bestFor}</span>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Platform outputs */}
            <div style={{marginBottom:8}}>
              <ML c="var(--text3)" mb={12}>Platform outputs — click to expand</ML>
              {Object.entries(PLATFORMS).map(([key,cfg])=>{
                if(!selectedPlatforms[key]||!result[key]?.length) return null;
                return <OutputCard key={key} platformKey={key} items={result[key]} config={cfg}/>;
              })}
            </div>
          </div>
        )}

      </main>

      <footer style={{borderTop:'1px solid var(--border)',padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.2em',textTransform:'uppercase'}}>Quantum Branding BrandOS</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.15em'}}>Content Repurposing Engine / Phase 04</span>
      </footer>
    </div>
  );
}


// ── QB CONTENT APPROVAL LOOP ─────────────────────────────────────────────────
// Injected by QB OS build system
// Adds approve/revise/remove to each content piece, up to 3 rounds

function QBApprovalWrapper({items, renderItem, onAllApproved, itemKey='id', revisionField='content'}) {
  const [states, setStates] = React.useState(() => {
    const s = {};
    items.forEach((item,i) => { s[i] = {status:'pending', round:0, feedback:'', item}; });
    return s;
  });
  const [revising, setRevising] = React.useState({});

  const allApproved = Object.values(states).every(s => s.status === 'approved' || s.status === 'removed');
  const approvedItems = Object.values(states).filter(s => s.status === 'approved').map(s => s.item);

  React.useEffect(() => {
    if (allApproved && approvedItems.length > 0) onAllApproved && onAllApproved(approvedItems);
  }, [allApproved]);

  const approve = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'approved'}}));
  const remove = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'removed'}}));
  const startRevise = (i) => setRevising(prev => ({...prev, [i]: true}));
  const submitRevise = async (i) => {
    const feedback = document.getElementById('revision-input-' + i)?.value || '';
    if (!feedback.trim()) return;
    setStates(prev => ({...prev, [i]: {...prev[i], status:'revising', round: prev[i].round + 1, feedback}}));
    setRevising(prev => ({...prev, [i]: false}));
    // Trigger regeneration via QB_AI
    if (window.QB_AI && states[i].round < 3) {
      try {
        const original = JSON.stringify(states[i].item);
        const prompt = 'You produced this content piece: ' + original + '\n\nThe user requests this revision: ' + feedback + '\n\nReturn ONLY the revised version as a JSON object with the same structure. No markdown, no preamble.';
        const sys = 'You are a content revision agent. Revise the content piece exactly as requested. Maintain brand voice and platform requirements. Return only valid JSON.';
        const raw = await window.QB_AI(sys, prompt, 1000);
        const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').replace(/^```\s*/,'').trim();
        const revised = JSON.parse(clean);
        setStates(prev => ({...prev, [i]: {...prev[i], status:'revised', item: revised}}));
      } catch(e) {
        setStates(prev => ({...prev, [i]: {...prev[i], status:'pending'}}));
      }
    }
  };

  const statusColor = {pending:'var(--text3)', approved:'var(--green)', removed:'var(--red)', revising:'var(--amber)', revised:'var(--blue)'};
  const statusLabel = {pending:'Pending review', approved:'✓ Approved', removed:'Removed', revising:'Revising…', revised:'Revised — review again'};

  return (
    <div>
      <div style={{background:'rgba(74,222,128,0.05)',border:'1px solid rgba(74,222,128,0.15)',borderRadius:8,padding:'12px 16px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:2}}>Content Review</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>{Object.values(states).filter(s=>s.status==='approved').length} approved · {Object.values(states).filter(s=>s.status==='pending'||s.status==='revised').length} pending · {Object.values(states).filter(s=>s.status==='removed').length} removed</div>
        </div>
        {allApproved && approvedItems.length > 0 && (
          <div style={{fontFamily:'var(--mono)',fontSize:10,padding:'6px 14px',borderRadius:5,background:'var(--green)',color:'#000',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase'}}>All done ✓</div>
        )}
      </div>
      {items.map((item, i) => {
        const s = states[i];
        if (!s) return null;
        const isRevising = revising[i];
        const maxRoundsReached = s.round >= 3;
        return (
          <div key={i} style={{background:'var(--bg3)',border:'1px solid '+(s.status==='approved'?'rgba(74,222,128,0.2)':s.status==='removed'?'rgba(239,68,68,0.15)':'var(--border)'),borderRadius:10,marginBottom:12,overflow:'hidden',opacity:s.status==='removed'?0.4:1,transition:'all .2s'}}>
            <div style={{padding:'14px 18px 0'}}>
              {renderItem(s.item, i)}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 18px',borderTop:'1px solid var(--border)',background:'rgba(0,0,0,0.2)',flexWrap:'wrap'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:statusColor[s.status],letterSpacing:'.1em',flex:1}}>
                {statusLabel[s.status]} {s.round > 0 ? '(Round '+s.round+'/3)' : ''}
              </div>
              {(s.status==='pending'||s.status==='revised') && !isRevising && (
                <>
                  <button onClick={()=>approve(i)} style={{background:'rgba(74,222,128,0.12)',color:'var(--green)',border:'1px solid rgba(74,222,128,0.2)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.08em',cursor:'pointer'}}>✓ Approve</button>
                  {!maxRoundsReached && <button onClick={()=>startRevise(i)} style={{background:'rgba(245,158,11,0.1)',color:'var(--amber)',border:'1px solid rgba(245,158,11,0.2)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.08em',cursor:'pointer'}}>↻ Revise</button>}
                  <button onClick={()=>remove(i)} style={{background:'rgba(239,68,68,0.08)',color:'var(--red)',border:'1px solid rgba(239,68,68,0.15)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.08em',cursor:'pointer'}}>× Remove</button>
                </>
              )}
              {s.status==='approved' && <button onClick={()=>setStates(prev=>({...prev,[i]:{...prev[i],status:'pending'}}))} style={{background:'none',color:'var(--text3)',border:'1px solid var(--border)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>Undo</button>}
              {s.status==='revising' && <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)'}}>Generating revision…</div>}
            </div>
            {isRevising && (
              <div style={{padding:'12px 18px',background:'rgba(245,158,11,0.04)',borderTop:'1px solid rgba(245,158,11,0.1)'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)',letterSpacing:'.1em',marginBottom:6}}>REVISION REQUEST {s.round+1}/3</div>
                <textarea id={'revision-input-'+i} placeholder="What should change? Be specific: e.g. 'Make the hook more direct' or 'Remove the question format'" style={{width:'100%',background:'var(--bg3)',border:'1px solid rgba(245,158,11,0.2)',color:'var(--text)',borderRadius:6,padding:'10px 14px',fontSize:12,fontFamily:'var(--font)',resize:'vertical',minHeight:60,outline:'none'}} rows={2}/>
                <div style={{display:'flex',gap:8,marginTop:8}}>
                  <button onClick={()=>submitRevise(i)} style={{background:'var(--amber)',color:'#000',padding:'7px 16px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',fontWeight:700,letterSpacing:'.08em',cursor:'pointer'}}>Submit Revision →</button>
                  <button onClick={()=>setRevising(prev=>({...prev,[i]:false}))} style={{background:'none',color:'var(--text3)',border:'1px solid var(--border)',padding:'7px 12px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
// ── END QB CONTENT APPROVAL LOOP ─────────────────────────────────────────────

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
