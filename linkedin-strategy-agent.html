  (function() {

      document.documentElement.setAttribute('data-theme', theme);
    } catch(e) {}
  })();

  window.toggleTheme = function() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';

/* ── DESIGN SYSTEM: QB BRANDOS - "Entangled Time" ── */
*{box-sizing:border-box;margin:0;padding:0}

:root, [data-theme="dark"] {

  --bg-deep: #0A0806;
  --bg-base: #0E0C09;
  --bg-surface: rgba(140,110,70,0.045);
  --bg-elevated: rgba(140,110,70,0.07);
  --bg-overlay: rgba(18,15,10,0.85);

  --border-subtle: rgba(140,110,70,0.06);
  --border-medium: rgba(140,110,70,0.11);

  --bg3: var(--bg-base);
  --bg4: var(--bg-surface);
  --border: var(--border-subtle);
  --border2: var(--border-medium);
  --text: var(--text-1);
  --text2: var(--text-2);
  --text3: var(--text-3);
  --text4: var(--text-4);

  --green: var(--patina);

  --color-error-bg: rgba(138,74,74,0.1);
  --color-error-border: rgba(138,74,74,0.2);

  --blue: #4A7A8A; --blue2: rgba(74,122,138,0.12);

/* Base Body & Signatures */
html:not([data-theme]) { background: #080604; color: #A89A88; }
body {
  background: var(--bg-void);
  color: var(--text-2);
  font-family: var(--font-sans);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.7;

/* Film Grain Overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}
[data-theme="light"] body::after { opacity: 0.02; }

/* Warm Vignette Desk Light */
#root { position: relative; z-index: 2; }
#root::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(8,6,4,0.5) 100%);
}
[data-theme="light"] #root::before {
  background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(200,190,175,0.15) 100%);
}

/* Typography Classes */
.serif-title {
  font-family: var(--font-serif);
  font-weight: 400;
  color: var(--text-1);
  letter-spacing: -0.015em;
}

/* Custom Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }

/* Form Elements */
input, textarea, select {
  background: var(--bg-surface);
  border: 1px solid var(--border-medium);
  color: var(--text-1);
  font-family: var(--font-sans);
  border-radius: 8px;
  padding: 14px 18px;
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
}
input::placeholder, textarea::placeholder {
  color: var(--text-3);
  opacity: 0.7;
  font-style: italic;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--patina);
  background: var(--bg-base);
  box-shadow: 0 0 0 3px var(--patina-faint), 0 0 24px -4px var(--brass-faint);
}
textarea { resize: vertical; line-height: 1.6; }
select option { background: var(--bg-base); color: var(--text-1); }

/* Buttons */
button { cursor: pointer; font-family: var(--font-sans); border: none; outline: none; }

.btn-primary {
  background: var(--patina);
  color: #E6DDD0; /* Always cream */
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 14px 32px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary:hover:not(:disabled) {
  background: var(--patina-lit);
  transform: translateY(-2px);
  box-shadow: 0 4px 24px -4px var(--patina-dim), 0 0 0 1px var(--brass-faint);
}
.btn-primary:disabled {
  background: var(--bg-elevated);
  color: var(--text-4);
  border-color: var(--border-medium);
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

/* Micro-interactions & Indicators */
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
.fade-in { animation: fadeIn .5s cubic-bezier(0.16, 1, 0.3, 1) forwards }

@keyframes scanH { 0% { left: -80% } 100% { left: 200% } }
.scan-line { position: relative; overflow: hidden; }
.scan-line::after {
  content: ''; position: absolute; top: 0; left: -80%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, var(--brass-faint), transparent);
  animation: scanH 4s linear infinite;
}

.pulse-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--brass);
  box-shadow: 0 0 8px var(--brass-dim), 0 0 2px var(--brass);
  animation: beat 3s ease infinite;
  display: inline-block;
  flex-shrink: 0;
}
@keyframes beat {
  0%, 100% { transform: scale(1); opacity: 1; }
  12% { transform: scale(1.35); opacity: 1; }
  24% { transform: scale(0.95); opacity: 0.6; }
  36% { transform: scale(1.15); opacity: 1; }
  48% { transform: scale(1); opacity: 0.7; }
}

/* Glass & Blocks */
.glass-card {
  background: var(--bg-overlay);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}
.glass-card::before {
  content: ''; position: absolute; top: -30%; left: -10%; width: 60%; height: 60%;
  background: radial-gradient(ellipse at center, var(--brass-faint) 0%, transparent 70%);
  pointer-events: none; opacity: 0.6;
}

.manifesto-block {
  position: relative;
  padding: 16px 0 16px 24px;
}
.manifesto-block::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2.5px;
  background: linear-gradient(180deg, var(--brass) 0%, var(--patina) 100%);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--brass-faint);
}

.tab-btn.personal.active { background: var(--blue2); border-color: rgba(74,122,138,0.3); color: var(--blue); }
.tab-btn.company.active { background: var(--purple2); border-color: rgba(138,90,90,0.3); color: var(--purple); }

.pill {
  display: inline-block; padding: 3px 10px; border-radius: 5px;
  font-size: 10px; font-family: var(--font-mono); margin: 2px 4px 2px 0; letter-spacing: 0.04em;
}
.pill-green { background: var(--patina-faint); color: var(--patina-lit); border: 1px solid var(--patina-dim); }
.pill-blue { background: var(--blue2); color: var(--blue); border: 1px solid rgba(74,122,138,0.2); }
.pill-purple { background: var(--purple2); color: var(--purple); border: 1px solid rgba(138,90,90,0.2); }
.pill-amber { background: var(--amber2); color: var(--amber); border: 1px solid rgba(168,144,62,0.2); }
.pill-teal { background: var(--teal2); color: var(--teal); border: 1px solid rgba(90,122,106,0.2); }
.pill-pink { background: var(--pink2); color: var(--pink); border: 1px solid rgba(138,90,90,0.2); }
.pill-neutral { background: var(--bg-surface); color: var(--text-2); border: 1px solid var(--border-medium); }

/* Post Rows */
.post-row {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 10px;
  padding: 16px 22px;
  cursor: pointer;
  transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
  margin-bottom: 8px;

.post-row:hover {
  background: var(--bg-elevated);
  border-color: var(--border-medium);
}
.post-row.open {

  border-color: var(--border-strong);

}
[data-theme="light"] .post-row.open { box-shadow: 0 12px 40px -12px rgba(100,80,50,0.15); }

<script>
// QB_SPINE v2 - API Key + QBP + Multi-provider adapter
(function(){
  var params = new URLSearchParams(window.location.search);
  // QBP
  var urlQBP = params.get('qbp');
  if(urlQBP){ try{ localStorage.setItem('qb_qbp', atob(urlQBP)); }catch(e){} }
  try{ window.QB_QBP = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); }catch(e){ window.QB_QBP = {}; }
  // Universal AI call - works with Anthropic or Gemini
  window.QB_AI = async function(systemPrompt, userPrompt, maxTokens){
    maxTokens = maxTokens || 4000;
    var body = {
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    };
    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('API error: HTTP ' + res.status);
    var d = await res.json();
    if(d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    return d.content[0].text;
  };
  window.QB_AUTOFILL = function(fieldMap){
    if(!window.QB_QBP) return;
    Object.entries(fieldMap).forEach(function(kv){
      var el = document.getElementById(kv[0]) || document.querySelector('[data-qbp="'+kv[1]+'"]');
      if(el && window.QB_QBP[kv[1]] && !el.value) el.value = window.QB_QBP[kv[1]];
    });
  };
})();
</script>

        </div>
      </header>

      <main style={{flex:1,maxWidth:1000,margin:'0 auto',width:'100%',padding:'48px 24px'}}>

        {/* ── STEP 0: INPUT ── */}
        {step===0&&(
          <div className="fade-in">
            <div style={{marginBottom:48}}>
              <ML c="var(--brass)" mb={12}>// Phase 03 - Content Creation</ML>
              <h1 className="serif-title" style={{fontSize:42,lineHeight:1.1,marginBottom:16}}>LinkedIn Strategy Agent<span style={{color:'var(--brass)'}}>.</span></h1>
              <p style={{color:'var(--text-2)',fontSize:16,lineHeight:1.8,maxWidth:680}}>Two complete LinkedIn systems from one QBP input. Personal profile rewrite + 4 weeks of founder posts. Company page rewrite + 4 weeks of brand posts. Every post fully written and ready to publish.</p>
            </div>

            <Section number={1} title="Brand + Founder Core" note="* required">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                <TF label="Brand Name *" value={brandName} onChange={setBrandName} placeholder="The practice / company name" rows={1}/>
                <TF label="Founder Name" value={founderName} onChange={setFounderName} placeholder="The personal profile owner" rows={1}/>
              </div>
              <TF label="Brand Essence *" value={brandEssence} onChange={setBrandEssence} placeholder="The irreducible truth" rows={2}/>
              <TF label="The Spark - narrative synthesis" value={spark} onChange={setSpark} placeholder="Who this brand is, why it exists, what transformation it creates" rows={3}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                <SF label="Natural Force *" options={NATURAL_FORCES} value={naturalForce} onChange={setNaturalForce}/>
                <SF label="Primary Archetype *" options={ARCHETYPES} value={archetype} onChange={setArchetype}/>
              </div>
            </Section>

            <Section number={2} title="Offer + Transformation" note="* required">
              <TF label="Core Offer *" value={offer} onChange={setOffer} placeholder="What you sell - be specific about format, price tier, transformation" rows={2}/>
              <TF label="Transformation - before → after" value={transformation} onChange={setTransformation} placeholder="e.g. Scattered identity + weak positioning → coherent brand system that commands premium" rows={2}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                <TF label="Method / Framework Name" value={methodName} onChange={setMethodName} placeholder="e.g. Quantum Branding, BrandOS, The Signal Scan" rows={1}/>
                <TF label="Price Point" value={pricePoint} onChange={setPricePoint} placeholder="e.g. $997, $5K–$25K, $197/mo" rows={1}/>
              </div>
              <TF label="Manifesto Line" value={manifestoLine} onChange={setManifestoLine} placeholder="The one belief" rows={1}/>
              <TF label="Anti-Brand" value={antiBrand} onChange={setAntiBrand} placeholder="What this brand refuses to be on LinkedIn" rows={1}/>
            </Section>

            <Section number={3} title="Audience + Goals">
              <TF label="Primary Persona *" value={primaryPersona} onChange={setPrimaryPersona} placeholder="Who reads this LinkedIn - role, struggle, desire, what they carry. Specific." rows={3} hint="Specificity here determines how precisely the agent targets every post"/>
              <TF label="LinkedIn Goal" value={linkedinGoal} onChange={setLinkedinGoal} placeholder="e.g. Book discovery calls, build waitlist, establish thought leadership, sell course" rows={1}/>
            </Section>

            <Section number={4} title="Voice + Profile Context">
              <TF label="Voice Notes" value={voiceNotes} onChange={setVoiceNotes} placeholder="How this brand writes - rhythm, register, what it sounds like" rows={2}/>
              <TF label="Always / Never" value={alwaysNever} onChange={setAlwaysNever} placeholder="Writing rules - what this brand always does and never does in copy" rows={2}/>
              <TF label="Founder Story - what brought you here" value={founderStory} onChange={setFounderStory} placeholder="The origin - what you escaped, what you discovered, what you're building instead" rows={3}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                <TF label="Current Headline (to improve)" value={currentHeadline} onChange={setCurrentHeadline} placeholder="Paste current headline" rows={1}/>
                <TF label="Company Tagline (to improve)" value={companyTagline} onChange={setCompanyTagline} placeholder="Current company page tagline" rows={1}/>
              </div>
              <TF label="Current About (to rewrite)" value={currentAbout} onChange={setCurrentAbout} placeholder="Paste current About section - the agent will rewrite it" rows={3}/>
            </Section>

            {error&&<div style={{background:'var(--color-error-bg)',border:'1px solid var(--color-error-border)',borderRadius:8,padding:'16px 20px',marginBottom:24,fontSize:14,color:'var(--color-error)'}}>{error}</div>}

            <div style={{display:'flex',justifyContent:'flex-end',marginTop:24}}>
              <button onClick={run} disabled={!isValid()} className="btn-primary">
                Generate Strategy
              </button>
            </div>
          </div>
        )}

        {/* ── STEP 1: GENERATING ── */}
        {step===1&&(
          <div className="fade-in" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:500,gap:32,textAlign:'center'}}>
            <div className="pulse-dot" style={{width: 16, height: 16}}/>
            <div>
              <h2 className="serif-title" style={{fontSize:32, marginBottom:16}}>Agent Processing<span style={{color:'var(--brass)'}}>...</span></h2>
              <div style={{color:'var(--text-2)',fontSize:15,lineHeight:2.2,maxWidth:480}}>
                Reading Quantum Brand Profile<br/>
                Building personal authority positioning<br/>
                Rewriting profile headline + About<br/>
                Architecting 4-week personal post arc<br/>
                Writing 12 founder posts in brand voice<br/>
                Building company page strategy<br/>
                Writing 8 company posts in brand register<br/>
                Generating hashtag architecture<br/>
                Assembling complete LinkedIn pack
              </div>
            </div>
            <div style={{fontSize:11,color:'var(--text-3)',fontFamily:'var(--font-mono)',letterSpacing:'.1em'}}>2 PROFILES · 20 POSTS · 4-WEEK ARC</div>
          </div>
        )}

        {/* ── STEP 2: OUTPUT ── */}
        {step===2&&result&&(
          <div className="fade-in">
            {/* Header */}
            <div style={{marginBottom:32,display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:16}}>
              <div>
                <ML c="var(--brass)" mb={8}>// Strategy Complete</ML>
                <h1 className="serif-title" style={{fontSize:36,marginBottom:8}}>{brandName}<span style={{color:'var(--brass)'}}>.</span></h1>
                <p style={{color:'var(--text-2)',fontSize:14}}>2 profiles rewritten · 20 posts scripted · 4-week arc</p>
              </div>
              <div style={{display:'flex',gap:12}}>
                <button onClick={exportAll} className="tab-btn">Export All</button>
                <button onClick={()=>{setStep(0);setResult(null);setApprovedPosts({personal:null,company:null});}} className="tab-btn">New Strategy</button>
              </div>
            </div>

            {/* Mode selector */}
            <div style={{display:'flex',gap:10,marginBottom:24}}>
              <button className={`tab-btn personal${mode==='personal'?' active':''}`} onClick={()=>{setMode('personal');setModeTab('strategy');}}>
                {founderName||'Founder'} - Personal
              </button>
              <button className={`tab-btn company${mode==='company'?' active':''}`} onClick={()=>{setMode('company');setModeTab('strategy');}}>
                {brandName} - Company
              </button>
            </div>

            {/* Sub-tabs */}
            <div style={{display:'flex',gap:10,marginBottom:32,paddingBottom:16,borderBottom:'1px solid var(--border-medium)'}}>
              {['strategy','profile','posts'].map(t=>(
                <button key={t} className={`tab-btn${modeTab===t?' active':''}`} onClick={()=>setModeTab(t)}>
                  {t==='strategy'?'Strategy':t==='profile'?'Profile Rewrite':'4-Week Posts'}
                </button>
              ))}
              <div style={{marginLeft:'auto',fontSize:12,color:'var(--text-3)',display:'flex',alignItems:'center',gap:8,fontFamily:'var(--font-mono)'}}>
                <div style={{width:8,height:8,borderRadius:2,background:modeColor}}/>
                {mode==='personal'?`${result.personal?.posts?.length||0} posts`:`${result.company?.posts?.length||0} posts`}
              </div>
            </div>

            {modeTab==='strategy'&&<StrategyOverview data={currentData} mode={mode}/>}
            {modeTab==='profile'&&<ProfilePanel data={currentData?.profile} mode={mode}/>}
            {modeTab==='posts'&&currentData?.posts&&(
              <QBApprovalWrapper
                key={mode}
                items={currentData.posts}
                renderItem={(post,i)=>(
                  <PostCard
                    post={post}
                    index={i}
                    color={WEEK_COLORS[(post.week||1)-1]}
                    bgColor={WEEK_BG[(post.week||1)-1]}
                    borderColor={WEEK_BORDER[(post.week||1)-1]}
                    mode={mode}
                  />
                )}
                onAllApproved={(posts)=>setApprovedPosts(prev=>({...prev,[mode]:posts}))}
              />
            )}
          </div>
        )}

      </main>

      <footer style={{borderTop:'1px solid var(--border-subtle)',padding:'20px 32px',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--bg-deep)'}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text-4)',letterSpacing:'.2em',textTransform:'uppercase'}}>Quantum Branding BrandOS</span>
        <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text-4)',letterSpacing:'.15em'}}>Phase 03 / LinkedIn Strategy Agent</span>
      </footer>
    </div>
  );
}

// ── QB CONTENT APPROVAL LOOP ─────────────────────────────────────────────────
// Injected by QB OS build system
// Adds approve/revise/remove to each content piece, up to 3 rounds

function QBApprovalWrapper({items, renderItem, onAllApproved}) {
  const [states, setStates] = React.useState(() => {
    const s = {};
    items.forEach((item,i) => { s[i] = {status:'pending', round:0, feedback:'', item}; });
    return s;
  });
  const [revising, setRevising] = React.useState({});

  const allApproved = Object.values(states).every(s => s.status === 'approved' || s.status === 'removed');
  const approvedItems = Object.values(states).filter(s => s.status === 'approved').map(s => s.item);

  React.useEffect(() => {
    if (allApproved && approvedItems.length > 0) onAllApproved && onAllApproved(approvedItems);
  }, [allApproved, approvedItems.length, onAllApproved]);

  const approve = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'approved'}}));
  const remove = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'removed'}}));
  const startRevise = (i) => setRevising(prev => ({...prev, [i]: true}));
  const submitRevise = async (i) => {
    const feedback = document.getElementById('revision-input-' + i)?.value || '';
    if (!feedback.trim()) return;
    const currentRound = states[i].round;
    setStates(prev => ({...prev, [i]: {...prev[i], status:'revising', round: prev[i].round + 1, feedback}}));
    setRevising(prev => ({...prev, [i]: false}));
    if (window.QB_AI && currentRound < 3) {
      try {
        const original = JSON.stringify(states[i].item);
        const prompt = 'You produced this content piece: ' + original + '\n\nThe user requests this revision: ' + feedback + '\n\nReturn ONLY the revised version as a JSON object with the same structure. No markdown, no preamble.';
        const sys = 'You are a content revision agent. Revise the content piece exactly as requested. Maintain brand voice and platform requirements. Return only valid JSON.';
        const raw = await window.QB_AI(sys, prompt, 1000);
        const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').replace(/^```\s*/,'').trim();
        const revised = JSON.parse(clean);
        setStates(prev => ({...prev, [i]: {...prev[i], status:'revised', item: revised}}));
      } catch(e) {
        setStates(prev => ({...prev, [i]: {...prev[i], status:'pending'}}));
      }
    }
  };

  const statusColor = {pending:'var(--text-3)', approved:'var(--patina-lit)', removed:'var(--color-error)', revising:'var(--brass)', revised:'var(--blue)'};
  const statusLabel = {pending:'Pending review', approved:'✓ Approved', removed:'Removed', revising:'Revising…', revised:'Revised - review again'};

  return (
    <div>
      <div style={{background:'var(--bg-surface)',border:'1px solid var(--border-medium)',borderRadius:12,padding:'16px 20px',marginBottom:24,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--patina-lit)',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:4}}>Content Review</div>
          <div style={{fontSize:13,color:'var(--text-2)'}}>{Object.values(states).filter(s=>s.status==='approved').length} approved · {Object.values(states).filter(s=>s.status==='pending'||s.status==='revised').length} pending · {Object.values(states).filter(s=>s.status==='removed').length} removed</div>
        </div>
        {allApproved && approvedItems.length > 0 && (
          <div style={{fontFamily:'var(--font-mono)',fontSize:11,padding:'8px 16px',borderRadius:6,background:'var(--patina)',color:'#E6DDD0',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase'}}>All done ✓</div>
        )}
      </div>
      {items.map((item, i) => {
        const s = states[i];
        if (!s) return null;
        const isRevising = revising[i];
        const maxRoundsReached = s.round >= 3;
        return (
          <div key={i} className="glass-card" style={{border:'1px solid '+(s.status==='approved'?'var(--patina-dim)':s.status==='removed'?'rgba(138,74,74,0.3)':'var(--border-subtle)'),marginBottom:16,opacity:s.status==='removed'?0.4:1,transition:'all .3s ease'}}>
            <div style={{padding:'20px 24px 0'}}>
              {renderItem(s.item, i)}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'16px 24px',borderTop:'1px solid var(--border-subtle)',background:'var(--bg-deep)',flexWrap:'wrap'}}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:statusColor[s.status],letterSpacing:'.1em',flex:1}}>
                {statusLabel[s.status]} {s.round > 0 ? '(Round '+s.round+'/3)' : ''}
              </div>
              {(s.status==='pending'||s.status==='revised') && !isRevising && (
                <>
                  <button onClick={()=>approve(i)} style={{background:'var(--patina-faint)',color:'var(--patina-lit)',border:'1px solid var(--patina-dim)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'.08em',cursor:'pointer'}}>✓ Approve</button>
                  {!maxRoundsReached && <button onClick={()=>startRevise(i)} style={{background:'var(--brass-faint)',color:'var(--brass)',border:'1px solid var(--brass-dim)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'.08em',cursor:'pointer'}}>↻ Revise</button>}
                  <button onClick={()=>remove(i)} style={{background:'rgba(138,74,74,0.1)',color:'#8A4A4A',border:'1px solid rgba(138,74,74,0.2)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'.08em',cursor:'pointer'}}>× Remove</button>
                </>
              )}
              {s.status==='approved' && <button onClick={()=>setStates(prev=>({...prev,[i]:{...prev[i],status:'pending'}}))} style={{background:'transparent',color:'var(--text-3)',border:'1px solid var(--border-medium)',padding:'6px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',cursor:'pointer'}}>Undo</button>}
              {s.status==='revising' && <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--brass)'}}>Generating revision…</div>}
            </div>
            {isRevising && (
              <div style={{padding:'16px 24px',background:'var(--brass-faint)',borderTop:'1px solid var(--brass-dim)'}}>
                <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--brass-lit)',letterSpacing:'.1em',marginBottom:8}}>REVISION REQUEST {s.round+1}/3</div>
                <textarea id={'revision-input-'+i} placeholder="What should change? Be specific: e.g. 'Make the hook more direct' or 'Remove the question format'" style={{width:'100%',background:'var(--bg-base)',border:'1px solid var(--brass-dim)',color:'var(--text-1)',borderRadius:8,padding:'12px 16px',fontSize:13,fontFamily:'var(--font-sans)',resize:'vertical',minHeight:80,outline:'none'}} rows={2}/>
                <div style={{display:'flex',gap:10,marginTop:12}}>
                  <button onClick={()=>submitRevise(i)} style={{background:'var(--brass)',color:'#080604',padding:'8px 20px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',fontWeight:700,letterSpacing:'.08em',cursor:'pointer',border:'none'}}>Submit Revision →</button>
                  <button onClick={()=>setRevising(prev=>({...prev,[i]:false}))} style={{background:'transparent',color:'var(--text-3)',border:'1px solid var(--border-strong)',padding:'8px 16px',borderRadius:6,fontSize:11,fontFamily:'var(--font-mono)',cursor:'pointer'}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
// ── END QB CONTENT APPROVAL LOOP ─────────────────────────────────────────────

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
