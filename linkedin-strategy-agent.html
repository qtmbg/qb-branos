<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB — LinkedIn Strategy Agent</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--bg5:#252525;
  --border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--text2:#888;--text3:#555;--text4:#333;
  --green:#4ade80;--green2:rgba(74,222,128,0.12);--green3:rgba(74,222,128,0.05);
  --red:#ef4444;--red2:rgba(239,68,68,0.1);
  --amber:#f59e0b;--amber2:rgba(245,158,11,0.1);
  --blue:#60a5fa;--blue2:rgba(96,165,250,0.12);
  --purple:#a78bfa;--purple2:rgba(167,139,250,0.12);
  --teal:#2dd4bf;--teal2:rgba(45,212,191,0.1);
  --pink:#f472b6;--pink2:rgba(244,114,182,0.1);
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input,textarea,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font);border-radius:6px;padding:10px 14px;font-size:13px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--green)}
textarea{resize:vertical;line-height:1.6}
select option{background:var(--bg3)}
button{cursor:pointer;font-family:var(--font);border:none;outline:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scanH{0%{left:-80%}100%{left:200%}}
.fade-in{animation:fadeIn .35s ease forwards}
.blink{animation:pulse 1.4s ease infinite}
.spin{animation:spin .9s linear infinite}
.scan-line{position:relative;overflow:hidden}
.scan-line::after{content:'';position:absolute;top:0;left:-80%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(74,222,128,0.04),transparent);animation:scanH 3s linear infinite}
.tab-btn{padding:8px 16px;border-radius:5px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono);background:transparent;border:1px solid var(--border);color:var(--text3);transition:all .2s;cursor:pointer;white-space:nowrap}
.tab-btn:hover{border-color:var(--border2);color:var(--text2)}
.tab-btn.active{background:var(--green2);border-color:rgba(74,222,128,0.3);color:var(--green)}
.tab-btn.personal.active{background:var(--blue2);border-color:rgba(96,165,250,0.3);color:var(--blue)}
.tab-btn.company.active{background:var(--purple2);border-color:rgba(167,139,250,0.3);color:var(--purple)}
.post-row{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 18px;cursor:pointer;transition:all .15s;margin-bottom:6px}
.post-row:hover{border-color:var(--border2)}
.post-row.open{border-color:var(--border2);background:var(--bg4)}
.pill{display:inline-block;padding:2px 9px;border-radius:4px;font-size:10px;font-family:var(--mono);margin:2px;letter-spacing:.04em}
.pill-green{background:var(--green2);color:var(--green);border:1px solid rgba(74,222,128,0.2)}
.pill-blue{background:var(--blue2);color:var(--blue);border:1px solid rgba(96,165,250,0.2)}
.pill-purple{background:var(--purple2);color:var(--purple);border:1px solid rgba(167,139,250,0.2)}
.pill-amber{background:var(--amber2);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.pill-teal{background:var(--teal2);color:var(--teal);border:1px solid rgba(45,212,191,0.2)}
.pill-pink{background:var(--pink2);color:var(--pink);border:1px solid rgba(244,114,182,0.2)}
.pill-neutral{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.slider-thumb::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--green);cursor:pointer;border:2px solid var(--bg)}
.slider-thumb::-webkit-slider-runnable-track{background:var(--border2);height:3px;border-radius:2px}
.slider-thumb{-webkit-appearance:none;width:100%;height:3px;background:var(--border2);border-radius:2px;outline:none;cursor:pointer}
</style>
<script>
  (function() {
    try {
      var theme = localStorage.getItem('qb-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') document.documentElement.classList.add('dark');
    } catch(e) {}
  })();
</script>
<script>
// QB_SPINE v2 — API Key + QBP + Multi-provider adapter
(function(){
  var params = new URLSearchParams(window.location.search);
  // QBP
  var urlQBP = params.get('qbp');
  if(urlQBP){ try{ localStorage.setItem('qb_qbp', atob(urlQBP)); }catch(e){} }
  try{ window.QB_QBP = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); }catch(e){ window.QB_QBP = {}; }
  // Universal AI call — works with Anthropic or Gemini
  window.QB_AI = async function(systemPrompt, userPrompt, maxTokens){
    maxTokens = maxTokens || 4000;
    var body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    };
    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    var d = await res.json();
    if(d.error) throw new Error(d.error.message);
    return d.content[0].text;
  };
  window.QB_AUTOFILL = function(fieldMap){
    if(!window.QB_QBP) return;
    Object.entries(fieldMap).forEach(function(kv){
      var el = document.getElementById(kv[0]) || document.querySelector('[data-qbp="'+kv[1]+'"]');
      if(el && window.QB_QBP[kv[1]] && !el.value) el.value = window.QB_QBP[kv[1]];
    });
  };
})();
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const ARCHETYPES=['The Rebel','The Sage','The Creator','The Ruler','The Magician','The Hero','The Explorer','The Caregiver','The Jester','The Everyman','The Innocent'];
const NATURAL_FORCES=['The Ocean','Lightning','Wildfire','The River','The Earthquake','The Sunrise'];
const POST_TYPES_PERSONAL=['Belief post','Contrarian take','Personal story','Framework reveal','Industry challenge','Behind the method','Transformation story','Manifesto excerpt','Hot take','Question post','Case study thread','Observation'];
const POST_TYPES_COMPANY=['Method breakdown','Client result','Tool reveal','Framework post','Ecosystem post','Problem/solution','Social proof','Product feature','Industry positioning','Invitation post'];
const WEEK_COLORS=['var(--blue)','var(--purple)','var(--amber)','var(--teal)'];
const WEEK_BG=['var(--blue2)','var(--purple2)','var(--amber2)','var(--teal2)'];
const WEEK_BORDER=['rgba(96,165,250,0.2)','rgba(167,139,250,0.2)','rgba(245,158,11,0.2)','rgba(45,212,191,0.2)'];

// ── SHARED UI ─────────────────────────────────────────────────────────────────
const ML=({c,children,mb=8})=><div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.2em',color:c||'var(--text3)',textTransform:'uppercase',marginBottom:mb}}>{children}</div>;
const Card=({children,accent,style={}})=><div style={{background:'var(--bg3)',border:`1px solid ${accent||'var(--border)'}`,borderRadius:8,padding:'16px 20px',...style}}>{children}</div>;
const TF=({label,value,onChange,placeholder,rows=1,hint})=>(
  <div style={{marginBottom:14}}>
    <ML>{label}</ML>
    {rows>1?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}/>
    :<input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>}
    {hint&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4,fontStyle:'italic'}}>{hint}</div>}
  </div>
);
const SF=({label,options,value,onChange})=>(
  <div style={{marginBottom:14}}>
    <ML>{label}</ML>
    <select value={value} onChange={e=>onChange(e.target.value)}>
      <option value="">— select —</option>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  </div>
);
const Section=({title,number,children,note})=>(
  <div style={{marginBottom:28}}>
    <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:14,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
      <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',letterSpacing:'.2em'}}>0{number}</span>
      <span style={{fontSize:13,fontWeight:500,letterSpacing:'.05em',textTransform:'uppercase'}}>{title}</span>
      {note&&<span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{note}</span>}
    </div>
    {children}
  </div>
);

// ── POST CARD ─────────────────────────────────────────────────────────────────
const PostCard=({post,index,color,bgColor,borderColor,mode})=>{
  const [open,setOpen]=useState(false);
  const [copied,setCopied]=useState(false);
  const copy=async(t)=>{try{await navigator.clipboard.writeText(t);setCopied(true);setTimeout(()=>setCopied(false),1800);}catch(e){}};
  const wk=post.week?`W${post.week}`:`P${index+1}`;
  return(
    <div className={`post-row${open?' open':''}`} onClick={()=>setOpen(!open)}>
      <div style={{display:'flex',alignItems:'center',gap:10,justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,flex:1,minWidth:0}}>
          <span style={{fontFamily:'var(--mono)',fontSize:9,color,border:`1px solid ${borderColor}`,padding:'2px 7px',borderRadius:3,flexShrink:0,background:bgColor}}>{wk}·{String((post.dayNumber||index+1)).padStart(2,'0')}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:500,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',marginBottom:2}}>{post.postTitle}</div>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              <span className={`pill pill-${mode==='personal'?'blue':'purple'}`}>{post.postType}</span>
              {post.contentPillar&&<span className="pill pill-neutral">{post.contentPillar}</span>}
            </div>
          </div>
        </div>
        <span style={{color:'var(--text3)',fontSize:11,flexShrink:0,transform:open?'rotate(180deg)':'none',transition:'transform .2s'}}>↓</span>
      </div>

      {open&&(
        <div className="fade-in" style={{marginTop:14,paddingTop:14,borderTop:'1px solid var(--border)'}} onClick={e=>e.stopPropagation()}>
          {/* Hook */}
          <div style={{background:'var(--bg)',border:`1px solid ${borderColor}`,borderRadius:6,padding:'12px 16px',marginBottom:12}}>
            <ML c={color} mb={6}>Opening hook</ML>
          <p style={{fontSize:13,fontStyle:'italic',color:'var(--text)',lineHeight:1.7}}>"{post.hook}"</p>
            {post.hookType&&<div style={{marginTop:6,fontSize:11,color:'var(--text3)'}}>Hook type: <span style={{color:color}}>{post.hookType}</span></div>}
          </div>

          {/* Full post */}
          <div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <ML c="var(--text3)" mb={0}>Full post</ML>
              <button onClick={()=>copy(post.fullPost)} style={{background:'var(--bg4)',border:'1px solid var(--border)',color:copied?'var(--green)':'var(--text2)',padding:'4px 12px',borderRadius:4,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase',transition:'color .2s'}}>
                {copied?'Copied ✓':'Copy'}
              </button>
            </div>
            <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,padding:'16px',fontSize:13,lineHeight:1.9,color:'var(--text)',whiteSpace:'pre-wrap',maxHeight:320,overflowY:'auto'}}>
              {post.fullPost}
            </div>
          </div>

          {/* Meta row */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            {post.strategicPurpose&&(
              <div style={{background:'var(--bg4)',borderRadius:6,padding:'10px 12px'}}>
                <ML c="var(--text3)" mb={4}>Strategic purpose</ML>
                <p style={{fontSize:12,color:'var(--text2)',lineHeight:1.5}}>{post.strategicPurpose}</p>
              </div>
            )}
            {post.cta&&(
              <div style={{background:'var(--bg4)',borderRadius:6,padding:'10px 12px'}}>
                <ML c="var(--green)" mb={4}>CTA</ML>
                <p style={{fontSize:12,color:'var(--text)',lineHeight:1.5}}>{post.cta}</p>
              </div>
            )}
          </div>

          {/* Hashtags */}
          {post.hashtags?.length>0&&(
            <div>
              <ML c="var(--text3)" mb={6}>Hashtags</ML>
              <div>{post.hashtags.map((h,i)=><span key={i} className="pill pill-neutral">#{h}</span>)}</div>
            </div>
          )}

          {/* Best time */}
          {post.bestTime&&(
            <div style={{marginTop:10,fontSize:11,color:'var(--text3)'}}>Best time: <span style={{color:'var(--text2)'}}>{post.bestTime}</span></div>
          )}
        </div>
      )}
    </div>
  );
};

// ── PROFILE SECTION ──────────────────────────────────────────────────────────
const ProfilePanel=({data,mode})=>{
  const [copied,setCopied]=useState('');
  const copy=async(key,text)=>{try{await navigator.clipboard.writeText(text);setCopied(key);setTimeout(()=>setCopied(''),2000);}catch(e){}};
  if(!data) return null;
  const color=mode==='personal'?'var(--blue)':'var(--purple)';
  const accent=mode==='personal'?'rgba(96,165,250,0.2)':'rgba(167,139,250,0.2)';

  const CopyableBlock=({label,content,id})=>(
    <div style={{marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <ML c={color} mb={0}>{label}</ML>
        <button onClick={()=>copy(id,content)} style={{background:'var(--bg4)',border:'1px solid var(--border)',color:copied===id?'var(--green)':'var(--text2)',padding:'3px 10px',borderRadius:4,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase'}}>
          {copied===id?'Copied ✓':'Copy'}
        </button>
      </div>
      <div style={{background:'var(--bg)',border:`1px solid ${accent}`,borderRadius:6,padding:'12px 14px',fontSize:13,lineHeight:1.8,color:'var(--text)',whiteSpace:'pre-wrap'}}>{content}</div>
    </div>
  );

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12}}>
      {data.headline&&<CopyableBlock label="Headline" content={data.headline} id="headline"/>}
      {data.about&&<CopyableBlock label="About / Summary" content={data.about} id="about"/>}
      {data.featuredSection&&<CopyableBlock label="Featured section strategy" content={data.featuredSection} id="featured"/>}
      {data.bannerDirection&&(
        <Card accent={accent}>
          <ML c={color}>Banner / cover image direction</ML>
          <p style={{fontSize:13,color:'var(--text)',lineHeight:1.6}}>{data.bannerDirection}</p>
        </Card>
      )}
      {data.profilePhotoDirection&&(
        <Card accent={accent}>
          <ML c={color}>Profile photo direction</ML>
          <p style={{fontSize:13,color:'var(--text)',lineHeight:1.6}}>{data.profilePhotoDirection}</p>
        </Card>
      )}
      {data.experiencePositioning&&(
        <Card accent={accent}>
          <ML c={color}>Experience section positioning</ML>
          <p style={{fontSize:13,color:'var(--text)',lineHeight:1.6}}>{data.experiencePositioning}</p>
        </Card>
      )}
      {data.connectionStrategy&&(
        <Card>
          <ML>Connection + engagement strategy</ML>
          <p style={{fontSize:12,color:'var(--text2)',lineHeight:1.7}}>{data.connectionStrategy}</p>
        </Card>
      )}
    </div>
  );
};

// ── WEEK VIEW ─────────────────────────────────────────────────────────────────
const WeekView=({posts,mode})=>{
  const weeks=[1,2,3,4];
  const color=mode==='personal'?'var(--blue)':'var(--purple)';
  if(!posts?.length) return null;
  return(
    <div>
      {weeks.map(w=>{
        const wPosts=posts.filter(p=>p.week===w);
        if(!wPosts.length) return null;
        return(
          <div key={w} style={{marginBottom:24}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <div style={{width:28,height:28,borderRadius:6,background:WEEK_BG[w-1],border:`1px solid ${WEEK_BORDER[w-1]}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:10,color:WEEK_COLORS[w-1]}}>W{w}</span>
              </div>
              {posts.find(p=>p.week===w)?.weekTheme&&(
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{posts.find(p=>p.week===w).weekTheme}</div>
                  {posts.find(p=>p.week===w)?.weekIntent&&<div style={{fontSize:11,color:'var(--text3)',marginTop:1}}>{posts.find(p=>p.week===w).weekIntent}</div>}
                </div>
              )}
            </div>
            {wPosts.map((p,i)=>(
              <PostCard key={i} post={p} index={posts.indexOf(p)} color={WEEK_COLORS[w-1]} bgColor={WEEK_BG[w-1]} borderColor={WEEK_BORDER[w-1]} mode={mode}/>
            ))}
          </div>
        );
      })}
    </div>
  );
};

// ── STRATEGY OVERVIEW ─────────────────────────────────────────────────────────
const StrategyOverview=({data,mode})=>{
  if(!data?.strategy) return null;
  const color=mode==='personal'?'var(--blue)':'var(--purple)';
  const accent=mode==='personal'?'rgba(96,165,250,0.2)':'rgba(167,139,250,0.2)';
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{background:'var(--bg)',border:`1px solid ${accent}`,borderRadius:8,padding:'18px 22px'}} className="scan-line">
        <ML c={color}>Strategic positioning</ML>
        <p style={{fontSize:14,lineHeight:1.8,color:'var(--text)'}}>{data.strategy.positioning}</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Card accent={accent}>
          <ML c={color}>Content pillars</ML>
          {data.strategy.contentPillars?.map((p,i)=>(
            <div key={i} style={{padding:'7px 0',borderBottom:i<data.strategy.contentPillars.length-1?'1px solid var(--border)':''}}>
              <div style={{fontSize:12,fontWeight:500,color:'var(--text)',marginBottom:2}}>{p.pillar}</div>
              <div style={{fontSize:11,color:'var(--text3)',lineHeight:1.4}}>{p.why}</div>
            </div>
          ))}
        </Card>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <Card>
            <ML>Cadence</ML>
            <p style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>{data.strategy.cadence}</p>
          </Card>
          <Card>
            <ML>Audience to target</ML>
            <p style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>{data.strategy.audienceTarget}</p>
          </Card>
        </div>
      </div>
      {data.strategy.uniqueEdge&&(
        <Card accent={accent}>
          <ML c={color}>Unique edge — what makes this account unmistakable</ML>
          <p style={{fontSize:13,color:'var(--text)',lineHeight:1.7}}>{data.strategy.uniqueEdge}</p>
        </Card>
      )}
      {data.strategy.weeklyThemes&&(
        <Card>
          <ML>4-week arc themes</ML>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:4}}>
            {data.strategy.weeklyThemes.map((t,i)=>(

      <footer style={{borderTop:'1px solid var(--border)',padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.2em',textTransform:'uppercase'}}>Quantum Branding BrandOS</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.15em'}}>LinkedIn Strategy Agent / Phase 03</span>
      </footer>
    </div>
  );
}


// ── QB CONTENT APPROVAL LOOP ─────────────────────────────────────────────────
// Injected by QB OS build system
// Adds approve/revise/remove to each content piece, up to 3 rounds

function QBApprovalWrapper({items, renderItem, onAllApproved, itemKey='id', revisionField='content'}) {
  const [states, setStates] = React.useState(() => {
    const s = {};
    items.forEach((item,i) => { s[i] = {status:'pending', round:0, feedback:'', item}; });
    return s;
  });
  const [revising, setRevising] = React.useState({});

  const allApproved = Object.values(states).every(s => s.status === 'approved' || s.status === 'removed');
  const approvedItems = Object.values(states).filter(s => s.status === 'approved').map(s => s.item);

  React.useEffect(() => {
    if (allApproved && approvedItems.length > 0) onAllApproved && onAllApproved(approvedItems);
  }, [allApproved]);

  const approve = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'approved'}}));
  const remove = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'removed'}}));
  const startRevise = (i) => setRevising(prev => ({...prev, [i]: true}));
  const submitRevise = async (i) => {
    const feedback = document.getElementById('revision-input-' + i)?.value || '';
    if (!feedback.trim()) return;
    setStates(prev => ({...prev, [i]: {...prev[i], status:'revising', round: prev[i].round + 1, feedback}}));
    setRevising(prev => ({...prev, [i]: false}));
    // Trigger regeneration via QB_AI
    if (window.QB_AI && states[i].round < 3) {
      try {
        const original = JSON.stringify(states[i].item);
        const prompt = 'You produced this content piece: ' + original + '\n\nThe user requests this revision: ' + feedback + '\n\nReturn ONLY the revised version as a JSON object with the same structure. No markdown, no preamble.';
        const sys = 'You are a content revision agent. Revise the content piece exactly as requested. Maintain brand voice and platform requirements. Return only valid JSON.';
        const raw = await window.QB_AI(sys, prompt, 1000);
        const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').replace(/^```\s*/,'').trim();
        const revised = JSON.parse(clean);
        setStates(prev => ({...prev, [i]: {...prev[i], status:'revised', item: revised}}));
      } catch(e) {
        setStates(prev => ({...prev, [i]: {...prev[i], status:'pending'}}));
      }
    }
  };

  const statusColor = {pending:'var(--text3)', approved:'var(--green)', removed:'var(--red)', revising:'var(--amber)', revised:'var(--blue)'};
  const statusLabel = {pending:'Pending review', approved:'✓ Approved', removed:'Removed', revising:'Revising…', revised:'Revised — review again'};

  return (
    <div>
      <div style={{background:'rgba(74,222,128,0.05)',border:'1px solid rgba(74,222,128,0.15)',borderRadius:8,padding:'12px 16px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:2}}>Content Review</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>{Object.values(states).filter(s=>s.status==='approved').length} approved · {Object.values(states).filter(s=>s.status==='pending'||s.status==='revised').length} pending · {Object.values(states).filter(s=>s.status==='removed').length} removed</div>
        </div>
        {allApproved && approvedItems.length > 0 && (
          <div style={{fontFamily:'var(--mono)',fontSize:10,padding:'6px 14px',borderRadius:5,background:'var(--green)',color:'#000',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase'}}>All done ✓</div>
        )}
      </div>
      {items.map((item, i) => {
        const s = states[i];
        if (!s) return null;
        const isRevising = revising[i];
        const maxRoundsReached = s.round >= 3;
        return (
          <div key={i} style={{background:'var(--bg3)',border:'1px solid '+(s.status==='approved'?'rgba(74,222,128,0.2)':s.status==='removed'?'rgba(239,68,68,0.15)':'var(--border)'),borderRadius:10,marginBottom:12,overflow:'hidden',opacity:s.status==='removed'?0.4:1,transition:'all .2s'}}>
            <div style={{padding:'14px 18px 0'}}>
              {renderItem(s.item, i)}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 18px',borderTop:'1px solid var(--border)',background:'rgba(0,0,0,0.2)',flexWrap:'wrap'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:statusColor[s.status],letterSpacing:'.1em',flex:1}}>
                {statusLabel[s.status]} {s.round > 0 ? '(Round '+s.round+'/3)' : ''}
              </div>
              {(s.status==='pending'||s.status==='revised') && !isRevising && (
                <>
                  <button onClick={()=>approve(i)} style={{background:'rgba(74,222,128,0.12)',color:'var(--green)',border:'1px solid rgba(74,222,128,0.2)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.08em',cursor:'pointer'}}>✓ Approve</button>
                  {!maxRoundsReached && <button onClick={()=>startRevise(i)} style={{background:'rgba(245,158,11,0.1)',color:'var(--amber)',border:'1px solid rgba(245,158,11,0.2)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.08em',cursor:'pointer'}}>↻ Revise</button>}
                  <button onClick={()=>remove(i)} style={{background:'rgba(239,68,68,0.08)',color:'var(--red)',border:'1px solid rgba(239,68,68,0.15)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.08em',cursor:'pointer'}}>× Remove</button>
                </>
              )}
              {s.status==='approved' && <button onClick={()=>setStates(prev=>({...prev,[i]:{...prev[i],status:'pending'}}))} style={{background:'none',color:'var(--text3)',border:'1px solid var(--border)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>Undo</button>}
              {s.status==='revising' && <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)'}}>Generating revision…</div>}
            </div>
            {isRevising && (
              <div style={{padding:'12px 18px',background:'rgba(245,158,11,0.04)',borderTop:'1px solid rgba(245,158,11,0.1)'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)',letterSpacing:'.1em',marginBottom:6}}>REVISION REQUEST {s.round+1}/3</div>
                <textarea id={'revision-input-'+i} placeholder="What should change? Be specific: e.g. 'Make the hook more direct' or 'Remove the question format'" style={{width:'100%',background:'var(--bg3)',border:'1px solid rgba(245,158,11,0.2)',color:'var(--text)',borderRadius:6,padding:'10px 14px',fontSize:12,fontFamily:'var(--font)',resize:'vertical',minHeight:60,outline:'none'}} rows={2}/>
                <div style={{display:'flex',gap:8,marginTop:8}}>
                  <button onClick={()=>submitRevise(i)} style={{background:'var(--amber)',color:'#000',padding:'7px 16px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',fontWeight:700,letterSpacing:'.08em',cursor:'pointer'}}>Submit Revision →</button>
                  <button onClick={()=>setRevising(prev=>({...prev,[i]:false}))} style={{background:'none',color:'var(--text3)',border:'1px solid var(--border)',padding:'7px 12px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
// ── END QB CONTENT APPROVAL LOOP ─────────────────────────────────────────────

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
