<script src="/qb-cloud.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Figtree:wght@300..900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box }
:root{
  --cream:          #F4F0EB;
  --cream-soft:     #EDE8E2;
  --cream-deep:     #E6E0D8;
  --cream-edge:     rgba(100,80,50,0.10);
  --cream-line:     rgba(100,80,50,0.14);
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(100,80,50,0.04);
  --bg-elevated:    rgba(100,80,50,0.07);
  --bg-overlay:     rgba(244,240,235,0.9);
  --border-subtle:  rgba(100,80,50,0.08);
  --border-medium:  rgba(100,80,50,0.14);
  --border-strong:  rgba(100,80,50,0.22);
  --ink:            #1A1610;
  --ink-soft:       #5A5040;
  --ink-mute:       #8A7E70;
  --ink-faint:      #B8AEA0;
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina:         #3A5F4A;
  --patina-lit:     #4A7A5E;
  --patina-dim:     rgba(58,95,74,0.15);
  --patina-faint:   rgba(58,95,74,0.06);
  --patina-deep:    #0E1C17;
  --brass:          #A8903E;
  --brass-lit:      #C4A84E;
  --brass-dim:      rgba(168,144,62,0.15);
  --brass-faint:    rgba(168,144,62,0.06);
  --terra:          #C4654A;
  --terra-lit:      #D4785E;
  --plum:           #7A5A6E;
  --plum-lit:       #9A7A8E;
  --plum-dim:       rgba(122,90,110,0.18);
  --plum-faint:     rgba(122,90,110,0.07);
  --warmred:        #8A4A4A;
  --pill-bg:        #F3E9C9;
  --pill-bg-hover:  #EFE1B4;
  --pill-border:    #A8903E;
  --pill-ink:       #1A1610;
  --f-display:      'EB Garamond','Cormorant Garamond',Georgia,serif;
  --f-body:         'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --f-mono:         'JetBrains Mono',ui-monospace,monospace;
  --f-script:       'Caveat',cursive;
  --ease:           cubic-bezier(.22,1,.36,1);
  --r-pill:         999px;
  --r-card:         16px;
  --r-card-lg:      24px;
  --nav-h:          74px;
  --container:      1280px;
  /* Legacy aliases — preserved so existing inline-style references continue to resolve */
  --bg:             var(--bg-void);
  --bg2:            var(--bg-surface);
  --bg3:            var(--bg-elevated);
  --bg4:            var(--cream-deep);
  --text:           var(--text-1);
  --text2:          var(--text-2);
  --text3:          var(--text-3);
  --text4:          var(--text-4);
  --border:         var(--border-subtle);
  --border2:        var(--border-medium);
  --border3:        var(--border-strong);
  --green:          var(--patina);
  --green2:         var(--patina-faint);
  --green3:         var(--patina-dim);
  --amber:          var(--brass);
  --amber2:         var(--brass-faint);
  --amber3:         var(--brass-dim);
  --blue:           var(--plum);
  --blue2:          var(--plum-faint);
  --blue3:          var(--plum-dim);
  --red:            var(--terra);
  --mono:           var(--f-mono);
  --sans:           var(--f-body);
}
[data-theme="dark"]{
  --cream:          #080604;
  --cream-soft:     #0A0806;
  --cream-deep:     #12100C;
  --cream-edge:     rgba(140,110,70,0.06);
  --cream-line:     rgba(140,110,70,0.11);
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(140,110,70,0.045);
  --bg-elevated:    rgba(140,110,70,0.07);
  --bg-overlay:     rgba(18,15,10,0.85);
  --border-subtle:  rgba(140,110,70,0.06);
  --border-medium:  rgba(140,110,70,0.11);
  --border-strong:  rgba(140,110,70,0.18);
  --ink:            #EEE5D2;
  --ink-soft:       #A8A092;
  --ink-mute:       #6F6A5E;
  --ink-faint:      #3E3830;
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina-dim:     rgba(58,95,74,0.2);
  --patina-faint:   rgba(58,95,74,0.08);
  --brass-dim:      rgba(168,144,62,0.18);
  --warmred:        #B06767;
  --pill-bg:        #2A2318;
  --pill-bg-hover:  #3A2E1F;
  --pill-border:    #A8903E;
  --pill-ink:       #EEE5D2;
}
html{ -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; scroll-behavior:smooth; background:var(--bg-void); }
body{
  font-family:var(--f-body); font-weight:400;
  background:var(--bg-void); color:var(--text-2);
  min-height:100vh; position:relative; overflow-x:hidden;
  transition:background .5s ease, color .3s ease;
  font-size:16px; line-height:1.55;
}
body::after{
  content:''; position:fixed; inset:0; z-index:9999;
  pointer-events:none; opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
[data-theme="dark"] body::after{ opacity:.05; }
a{ color:inherit; text-decoration:none; }
img{ display:block; max-width:100%; }
button, input, textarea { font-family:inherit; color:inherit; }
button { cursor:pointer; border:none; background:none; }

.vignette{
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(200,190,175,0.08) 100%);
}
[data-theme="dark"] .vignette{
  background:radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(8,6,4,0.35) 100%);
}

/* ================== NAV (pill, ecosystem parity) ================== */
.nav-spacer{ height:28px; width:100%; flex-shrink:0; }
.nav{ position:sticky; top:18px; z-index:50; padding:0 20px; width:100%; }
.nav-inner{
  max-width:1160px; margin-inline:auto;
  background:var(--cream);
  border:1px solid var(--cream-line);
  border-radius:var(--r-pill);
  padding:8px 10px 8px 24px;
  display:flex; align-items:center; justify-content:space-between;
  gap:20px;
  box-shadow:0 6px 30px -18px rgba(26,22,16,.18);
}
.nav-brand{ display:flex; align-items:center; gap:10px; font-family:var(--f-display); font-size:1.25rem; color:var(--ink); font-weight:500; padding:6px 0; }
.nav-brand .dot{ width:10px; height:10px; border-radius:50%; background:var(--brass); box-shadow:0 0 0 3px var(--brass-faint); animation:pulseDot 3s var(--ease) infinite; }
@keyframes pulseDot{ 0%,100%{ transform:scale(1); box-shadow:0 0 0 3px var(--brass-faint); } 50%{ transform:scale(1.15); box-shadow:0 0 0 5px rgba(168,144,62,.05); } }
.nav-links{ display:flex; align-items:center; gap:4px; list-style:none; }
.nav-links a{ padding:10px 16px; border-radius:var(--r-pill); font-size:.92rem; font-weight:500; color:var(--ink-soft); transition:all .2s var(--ease); }
.nav-links a:hover{ background:var(--cream-deep); color:var(--ink); }
.nav-actions{ display:flex; align-items:center; gap:6px; }
.theme-toggle{ width:36px; height:36px; border-radius:50%; border:1px solid var(--cream-line); display:flex; align-items:center; justify-content:center; font-size:1rem; color:var(--ink-mute); cursor:pointer; background:transparent; flex-shrink:0; transition:all .25s var(--ease); }
.theme-toggle:hover{ border-color:var(--brass); color:var(--brass); background:var(--brass-faint); }
.hamburger{ display:none; width:42px; height:42px; border-radius:var(--r-pill); border:1px solid var(--cream-line); background:transparent; cursor:pointer; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
.hamburger span{ display:block; width:18px; height:1.5px; background:var(--ink); transition:.25s; }
.hamburger.open span:nth-child(1){ transform:translateY(5.5px) rotate(45deg); }
.hamburger.open span:nth-child(2){ opacity:0; }
.hamburger.open span:nth-child(3){ transform:translateY(-5.5px) rotate(-45deg); }
@media(max-width:960px){
  .nav-links, .nav .btn-ghost-link{ display:none; }
  .hamburger{ display:flex; }
  .nav-brand{ font-size:1.1rem; }
  .nav-inner{ padding:8px 8px 8px 20px; }
}
.mmenu{ position:fixed; inset:0; z-index:100; background:var(--cream); display:none; flex-direction:column; padding:28px; }
.mmenu.open{ display:flex; }
.mmenu-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
.mmenu-close{ width:42px; height:42px; border-radius:50%; border:1px solid var(--cream-line); background:transparent; font-size:1.2rem; color:var(--ink); cursor:pointer; }
.mmenu-list{ display:flex; flex-direction:column; gap:6px; }
.mmenu-list a{ font-family:var(--f-display); font-size:2rem; padding:10px 0; color:var(--ink); border-bottom:1px solid var(--cream-line); }
.mmenu-foot{ margin-top:auto; padding-top:28px; }
[data-theme="dark"] .nav-inner{ background:rgba(18,15,10,.85); border-color:rgba(140,110,70,.15); -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px); }
[data-theme="dark"] .nav-links a{ color:var(--ink-mute); }
[data-theme="dark"] .nav-links a:hover{ background:rgba(140,110,70,.08); color:var(--ink); }

img { max-width: 100%; display: block; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulseSoft { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
@keyframes flipIn { 0% { transform: rotateY(90deg); opacity: 0; } 100% { transform: rotateY(0); opacity: 1; } }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(58,95,74,0.10); } 50% { box-shadow: 0 0 40px rgba(58,95,74,0.22); } }

.fade-in { animation: fadeIn .5s ease forwards; }
.slide-up { animation: slideUp .6s cubic-bezier(.2,.8,.2,1) forwards; }
.flip-in { animation: flipIn .8s cubic-bezier(.2,.8,.2,1) forwards; backface-visibility: hidden; }
.spin { animation: spin 1.4s linear infinite; }
.pulse-soft { animation: pulseSoft 2s ease-in-out infinite; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--cream-line); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border3); }

/* Range / sliders */
input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; width: 100%; }
input[type=range]:focus { outline: none; }
input[type=range]::-webkit-slider-runnable-track { height: 2px; background: var(--cream-line); border-radius: 1px; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--patina); margin-top: -8px; cursor: pointer; box-shadow: 0 0 0 4px var(--patina-faint); transition: box-shadow .15s; }
input[type=range]:hover::-webkit-slider-thumb { box-shadow: 0 0 0 8px var(--patina-dim); }
input[type=range]::-moz-range-track { height: 2px; background: var(--cream-line); border-radius: 1px; }
input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--patina); border: none; cursor: pointer; }

/* Reusable components */
.mono { font-family: var(--f-mono); }
.glass { background: var(--bg2); border: 1px solid var(--border); }
.glass-2 { background: var(--bg3); border: 1px solid var(--border2); }
.no-select { user-select: none; -webkit-user-select: none; }

/* Phase progress ribbon — sits below the global nav, war-table wt-phase-nav parity */
.cf-phase-nav{
  max-width:1160px; margin:24px auto 0;
  padding:14px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:18px;
  background:var(--bg-overlay);
  -webkit-backdrop-filter:blur(18px);
  backdrop-filter:blur(18px);
  border:1px solid var(--border-medium);
  border-radius:999px;
  flex-wrap:wrap;
  position:relative; z-index:2;
}
.header { position:static; height:auto; background:transparent; backdrop-filter:none; -webkit-backdrop-filter:none; border-bottom:0; }
.header-inner { max-width:1160px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:18px; background:var(--bg-overlay); -webkit-backdrop-filter:blur(18px); backdrop-filter:blur(18px); border:1px solid var(--border-medium); border-radius:999px; flex-wrap:wrap; }
.header-tag { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--text-3); }
.header-right { display: flex; align-items: center; gap: 14px; }
.progress-track { width: 128px; height: 2px; background: var(--cream-line); border-radius: 1px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--patina); transition: width 0.5s ease; }
.progress-pct { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.25em; color: var(--text-3); }
.icon-btn { color: var(--text-3); transition: color .15s; padding: 4px; }
.icon-btn:hover { color: var(--text2); }
@media (max-width: 640px) { .progress-track { display: none; } }

/* Persona badge */
.persona-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 500; }
.persona-badge.sm { padding: 4px 8px; font-size: 9px; }
.persona-now { background: var(--patina-faint); border: 1px solid var(--patina-dim); color: var(--patina); }
.persona-next { background: var(--brass-faint); border: 1px solid var(--brass-dim); color: var(--brass); }
.persona-northStar { background: var(--plum-faint); border: 1px solid var(--plum-dim); color: var(--plum); }

/* Buttons — war-table SOT parity */
.btn{
  display:inline-flex; align-items:center; justify-content:center;
  gap:.55em;
  font-family:var(--f-body); font-weight:500; font-size:.94rem;
  padding:14px 24px;
  border-radius:var(--r-pill);
  border:1px solid var(--ink);
  background:transparent; color:var(--ink);
  transition:all .25s var(--ease);
  white-space:nowrap; text-decoration:none !important;
  cursor:pointer; text-transform:none; letter-spacing:0;
}
.btn:hover{ background:var(--ink); color:var(--cream); }
@property --eco-angle{ syntax:'<angle>'; initial-value:0deg; inherits:false; }
.btn-primary{
  background:var(--pill-bg) !important;
  border-color:var(--pill-border) !important;
  color:var(--pill-ink) !important;
  position:relative; isolation:isolate;
}
.btn-primary::before{
  content:''; position:absolute; inset:-3px;
  background:conic-gradient(from var(--eco-angle), var(--patina), var(--brass), var(--terra), var(--plum), var(--patina));
  border-radius:999px; z-index:-1; opacity:0;
  transition:opacity .4s ease;
  animation:ecoSpin 6s linear infinite;
  filter:blur(10px);
}
@keyframes ecoSpin{ to{ --eco-angle:360deg; } }
.btn-primary:hover::before{ opacity:.75; }
.btn-primary:hover{
  background:var(--pill-bg-hover) !important;
  border-color:var(--pill-ink) !important;
  transform:translateY(-1px);
  box-shadow:0 14px 40px -12px rgba(168,144,62,.35) !important;
}
.btn-primary:disabled{ opacity:.45; cursor:not-allowed; transform:none; }
.btn-primary:disabled::before{ display:none; }
.btn-ghost{ border-color:transparent; color:var(--ink-soft); }
.btn-ghost:hover{ background:transparent; color:var(--ink); text-decoration:underline !important; text-underline-offset:4px; }
.btn-secondary{
  display:inline-flex; align-items:center; justify-content:center; gap:.55em;
  padding:12px 20px;
  border-radius:8px;
  border:1px solid var(--border-strong);
  background:transparent;
  color:var(--text-1);
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  cursor:pointer;
  transition:all .2s;
}
.btn-secondary:hover{ background:var(--bg-surface); border-color:var(--brass); color:var(--brass); }
.btn-md{ padding:14px 24px; font-size:.94rem; }
.btn-sm{ padding:10px 18px; font-size:.85rem; }
.btn-lg{ padding:17px 30px; font-size:1rem; }
.btn:disabled{ opacity:.45; cursor:not-allowed; transform:none; }
[data-theme="dark"] .btn{ border-color:rgba(140,110,70,.2); color:var(--ink); }
[data-theme="dark"] .btn:hover{ background:var(--ink); color:var(--cream); }
[data-theme="dark"] .btn-ghost{ color:var(--ink-soft); }

/* Layout — war-table .wt-main parity (nav is sticky, no top padding needed) */
.screen { min-height: calc(100vh - 120px); padding: 36px 24px 140px; position:relative; z-index:2; }
.screen-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }
.container-sm { max-width: 480px; margin: 0 auto; width: 100%; }
.container-md { max-width: 640px; margin: 0 auto; width: 100%; }
.container-lg { max-width: 800px; margin: 0 auto; width: 100%; }
.container-xl { max-width: 1160px; margin: 0 auto; width: 100%; }

/* Typography — war-table SOT parity */
h1.display, h2.display, h3.display, .headline {
  font-family: var(--f-display); font-weight: 500; color: var(--text-1);
  letter-spacing: -.015em; line-height: 1.04;
}
h1.display { font-size: clamp(3rem, 7vw, 5.5rem); letter-spacing: -.025em; line-height: .98; }
h2.display { font-size: clamp(2rem, 4.5vw, 3.25rem); letter-spacing: -.02em; line-height: 1.02; }
h3.display { font-size: clamp(1.4rem, 3vw, 1.9rem); letter-spacing: -.012em; line-height: 1.15; }
.hook { font-family: var(--f-display); font-style: italic; color: var(--text-2); font-size: clamp(1.1rem, 2.2vw, 1.4rem); line-height: 1.5; }
.kicker { font-family: var(--f-mono); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .3em; color: var(--brass); display: block; margin-bottom: 10px; }
.label-mono { display: block; font-family: var(--f-mono); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .2em; color: var(--text-3); margin-bottom: 12px; }
.pill-mono { display: inline-block; font-family: var(--f-mono); font-size: 9px; text-transform: uppercase; letter-spacing: .22em; padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border-medium); background: var(--bg-surface); color: var(--text-2); }
.text-lead { font-size: 18px; color: var(--text-2); line-height: 1.6; }
.text-body { font-size: 15px; color: var(--text-2); line-height: 1.6; }
.text-small { font-size: 13px; color: var(--text-3); line-height: 1.5; }
.text-tiny { font-size: 11px; color: var(--text-3); }
.muted { color: var(--text-3); }
.muted-2 { color: var(--text-4); }

/* Field */
.field { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
.field-label { font-family: var(--f-mono); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
.field-value { color: var(--text); line-height: 1.5; }
.field-value.mono { font-family: var(--f-mono); font-size: 14px; }

/* Casting Reel card stack — patina-tinted aged-paper photo treatment */
.reel-stack { position: relative; width: 100%; aspect-ratio: 3/4; max-width: 380px; margin: 0 auto; }
.reel-card { position: absolute; inset: 0; border-radius: 18px; overflow: hidden; box-shadow: 0 30px 80px rgba(26,22,16,0.18), 0 8px 20px rgba(26,22,16,0.10); transition: transform .35s cubic-bezier(.2,.8,.2,1), opacity .3s; background: var(--cream-deep); }
.reel-card-bg { position: absolute; inset: 0; border-radius: 18px; background: var(--bg3); border: 1px solid var(--border2); }
.reel-card-bg.b1 { transform: translateY(8px) scale(0.96); opacity: 0.45; }

(function(){
  var toggle = document.getElementById('themeToggle');
  var icon   = document.getElementById('toggleIcon');
  function setIcon(){ if(!icon) return; icon.innerHTML = document.documentElement.getAttribute('data-theme') === 'dark' ? '&#9728;' : '&#9789;'; }
  setIcon();
  if(toggle) toggle.addEventListener('click', function(){
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try{ localStorage.setItem('qb-theme', next); }catch(e){}
    setIcon();
  });
  var ham = document.getElementById('hamburger');

  var mClose = document.getElementById('mmenuClose');
  if(ham && mmenu) ham.addEventListener('click', function(){ ham.classList.toggle('open'); mmenu.classList.toggle('open'); });

  if(mmenu) mmenu.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', function(){ if(ham) ham.classList.remove('open'); mmenu.classList.remove('open'); }); });
})();

function readQBP() {
  // 1. URL parameter ?qbp=base64json
  try {
    var params = new URLSearchParams(window.location.search);
    var qbpParam = params.get("qbp");
    if (qbpParam) {
      var decoded = atob(qbpParam);
      return JSON.parse(decoded);
    }
  } catch (e) {}
  // 2. localStorage qb_qbp
  try {
    var stored = localStorage.getItem("qb_qbp");
    if (stored) return JSON.parse(stored);
  } catch (e) {}
  // 3. Brand Soul Map output
  try {
    var bsm = localStorage.getItem("qb_brand_soul_map_output");
    if (bsm) return JSON.parse(bsm);
  } catch (e) {}
  return {};
}

function writeQBP(updates) {
  try {
    var current = JSON.parse(localStorage.getItem("qb_qbp") || "{}");
    Object.assign(current, updates);
    // Cloud-aware write: mirrors to Supabase if user is authed
    if (window.QB && QB.setQBP) { QB.setQBP(current); }
    else { localStorage.setItem("qb_qbp", JSON.stringify(current)); }
    // Notify other tools (postMessage pattern used elsewhere)
    try { window.postMessage({ type: "qb_qbp_update", payload: current }, "*"); } catch (e) {}
    return current;
  } catch (e) { return null; }
}

function readApiKey() {
  try {
    var params = new URLSearchParams(window.location.search);
    var fromUrl = params.get("apikey");
    if (fromUrl) return fromUrl;
  } catch (e) {}
  try {
    var stored = localStorage.getItem("qb_anthropic_key");
    if (stored) return stored;
  } catch (e) {}
  return "";
}

function saveApiKey(key) {
  try { localStorage.setItem("qb_anthropic_key", key); } catch (e) {}
  state.apiKey = key;
}

function h(tag, props) {
  var el = document.createElement(tag);
  if (props) {
    for (var k in props) {
      if (!props.hasOwnProperty(k)) continue;
      var v = props[k];
      if (v == null || v === false) continue;
      if (k === "class" || k === "className") el.className = v;
      else if (k === "style" && typeof v === "object") {
        for (var sk in v) if (v.hasOwnProperty(sk)) el.style[sk] = v[sk];
      }
      else if (k === "html") el.innerHTML = v;
      else if (k === "text") el.textContent = v;
      else if (k.indexOf("on") === 0 && typeof v === "function") {
        el.addEventListener(k.substring(2).toLowerCase(), v);
      }
      else el.setAttribute(k, v);
    }
  }
  for (var i = 2; i < arguments.length; i++) {
    var c = arguments[i];
    if (c == null || c === false) continue;
    if (Array.isArray(c)) {
      for (var j = 0; j < c.length; j++) {
        var cc = c[j];
        if (cc == null || cc === false) continue;
        el.appendChild(typeof cc === "string" || typeof cc === "number" ? document.createTextNode(String(cc)) : cc);
      }
    } else {
      el.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(String(c)) : c);
    }
  }
  return el;
}

async function callAnthropic(messages, system, maxTokens) {
  if (!state.apiKey) throw new Error("No API key configured");
  var res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "x-api-key": state.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
      "content-type": "application/json"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens || 4000,
      system: system,
      messages: messages
    })
  });
  if (!res.ok) {
    var errText = await res.text();
    throw new Error("API " + res.status + ": " + errText.substring(0, 200));
  }
  var data = await res.json();
  return data.content[0].text;
}

function renderReel(persona) {
  var idx = state["_reelIdx_" + persona] || 0;
  var animating = state["_reelAnim_" + persona] || null;
  var swipes = state.faceSwipes[persona] || {};

  var total = 18;
  var offset = persona === "now" ? 0 : 30;
  var faceIds = [];
  for (var i = 0; i < total; i++) faceIds.push(((i + offset) % FACE_IDS.length) + 1);

  var question = persona === "now"
    ? "Could this person be paying you today?"
    : "Could this person be your dream client in three years?";

  function swipe(decision) {
    if (state["_reelAnim_" + persona]) return;
    state["_reelAnim_" + persona] = decision;
    render();
    setTimeout(function() {
      var newSwipes = Object.assign({}, swipes);
      newSwipes[faceIds[idx]] = decision;
      state.faceSwipes[persona] = newSwipes;
      state["_reelAnim_" + persona] = null;
      if (idx + 1 >= total) {
        state["_reelIdx_" + persona] = 0;
        goNext();
      } else {
        state["_reelIdx_" + persona] = idx + 1;
        setState({});
      }
    }, 300);
  }

  function back() {
    if (idx === 0 || state["_reelAnim_" + persona]) return;
    var newSwipes = Object.assign({}, swipes);
    delete newSwipes[faceIds[idx - 1]];
    state.faceSwipes[persona] = newSwipes;
    state["_reelIdx_" + persona] = idx - 1;
    setState({});
  }

  var animClass = animating === "keep" ? " reel-keep" : animating === "pass" ? " reel-pass" : "";
  var img = h("img", {
    src: "https://i.pravatar.cc/600?img=" + faceIds[idx],
    alt: "",
    draggable: "false"
  });

  return h("div", { class: "screen screen-center no-select" },
    h("div", { class: "container-sm fade-in" },
      h("div", { class: "center mb-6" },

function getFanLetterLines() {
  var qbp = state.qbp || {};
  var fanLetter = qbp.fanLetter || qbp.fan_letter || qbp.fanLetterText || "";
  if (fanLetter && fanLetter.length > 100) {
    var sentences = fanLetter.split(/[.!?]/).filter(function(s) { return s.trim().length > 40; });
    if (sentences.length >= 3) {
      return [sentences[0].trim() + ".", sentences[Math.floor(sentences.length / 2)].trim() + ".", sentences[sentences.length - 1].trim() + "."];
    }
  }
  // Fallback generic lines (used when no Fan Letter)
  return [
    "When I found you, I was tired of looking. I had bought every other version of this and none of it stuck.",
    "I do not know exactly when it happened, but somewhere along the way I stopped trying to be impressive and started trying to be real. That is on you.",
    "I send people to you now without thinking about it. Not because of what you taught me, but because of who I became while you were teaching me."
  ];
}

function renderFanLetter() {
  var lines = getFanLetterLines();
  var assignments = state.fanLetterAssignment || {};

  function assign(lineIdx, persona) {
    var newAssign = Object.assign({}, assignments);
    // Remove any existing assignment of that persona
    Object.keys(newAssign).forEach(function(k) { if (newAssign[k] === persona) delete newAssign[k]; });
    newAssign[lineIdx] = persona;
    setState({ fanLetterAssignment: newAssign });
  }

  var lineEls = lines.map(function(line, idx) {
    var assigned = assignments[idx];
    var optionEls = PERSONA_KEYS.map(function(p) {
      return h("button", {
        class: "fan-option" + (assigned === p ? " active " + p : ""),
        onclick: function() { assign(idx, p); }
      }, PERSONA_LABELS[p]);
    });
    return h("div", { class: "fan-line" },
      h("div", { class: "fan-line-text", text: line }),
      h("div", { class: "fan-options" }, optionEls)
    );
  });

  var assignedCount = Object.keys(assignments).length;
  var allAssigned = assignedCount === 3 && new Set(Object.values(assignments)).size === 3;

  return h("div", { class: "screen" },
    h("div", { class: "container-md fade-in" },
      h("div", { class: "center mb-8" },
        h("div", { class: "kicker", text: 'Exercise 6 · The Fan Letter Cross-Cut' }),
        h("h2", { class: "display", style: { marginBottom: "12px" }, text: "Who is writing each line?" }),
        h("p", { class: "text-body", style: { maxWidth: "520px", margin: "0 auto" }, text: "Three sentences from your Fan Letter. Assign each to a persona. The same letter is being written by three different buyers." })
      ),
      h("div", null, lineEls),

        renderBtn("Back", { variant: "ghost", icon: "arrowLeft", onClick: goPrev }),
        renderBtn("Continue", { iconRight: "arrowRight", onClick: goNext, disabled: !allAssigned })
      )
    )
  );
}

function buildSynthesisPrompt() {
  var qbp = state.qbp || {};
  var habitatSelected = HABITAT_DATA.filter(function(h) { return state.habitatSelections.indexOf(h.seed) >= 0; }).map(function(h) { return h.label; });
  var triggerScene = TRIGGER_SCENES.find(function(t) { return t.id === state.triggerScene; });
  var refusedNames = REFUSAL_CARDS.filter(function(c) { return state.refusalDeck.indexOf(c.id) >= 0; }).map(function(c) { return c.name + " (" + c.desc + ")"; });
  var voiceText = (VOICE_SAMPLES.find(function(v) { return v.id === state.voiceMatch; }) || {}).text || "";

  function pulseSummary(p) {
    return PULSE_DIMENSIONS.map(function(d) {
      var v = state.pulse[p][d.id];
      if (v == null) return null;
      var leaning = v < 30 ? d.left : v > 70 ? d.right : "balanced (" + d.left + "/" + d.right + ")";
      return "- " + d.left + " / " + d.right + ": " + v + "% (" + leaning + ")";
    }).filter(Boolean).join("\n");
  }

  function tmapSummary(p) {
    return JOURNEY_STAGES.map(function(s) {
      var v = state.triggerMaps[p][s.id] || "(blank)";
      return "- " + s.label + ": " + v;
    }).join("\n");
  }

  var fanAssignments = Object.keys(state.fanLetterAssignment).map(function(idx) {
    return state.fanLetterAssignment[idx] + ": \"" + getFanLetterLines()[idx] + "\"";
  }).join("\n");

  var prompt = "You are synthesizing persona research from a tactile diagnostic exercise. Output three buyer profiles: NOW, NEXT, NORTH STAR. Each must be ad-ready.\n\n" +
    "BRAND CONTEXT:\n" +
    (qbp.brandName ? "- Brand: " + qbp.brandName + "\n" : "") +
    (qbp.archetype ? "- Archetype: " + qbp.archetype + "\n" : "") +
    (qbp.brandEssence || qbp.essence ? "- Essence: " + (qbp.brandEssence || qbp.essence) + "\n" : "") +
    (qbp.manifesto ? "- Manifesto: " + qbp.manifesto + "\n" : "") +
    (qbp.primaryPersona ? "- Primary persona (existing): " + qbp.primaryPersona + "\n" : "") +
    "\nSHARED INPUTS (apply to all three personas):\n" +
    "- Habitats: " + habitatSelected.join(", ") + "\n" +
    "- Trigger scene: " + (triggerScene ? triggerScene.title + " - " + triggerScene.desc : "(none)") + "\n" +
    "- Voice match (their inner monologue): \"" + voiceText + "\"\n" +
    "- Anti-personas to exclude from targeting: " + refusedNames.join("; ") + "\n" +
    "- Fan Letter assignments:\n" + fanAssignments + "\n\n" +
    "PER-PERSONA INPUTS:\n\n" +
    "NOW persona pulse:\n" + pulseSummary("now") + "\n" +
    "NOW persona journey:\n" + tmapSummary("now") + "\n\n" +
    "NEXT persona pulse:\n" + pulseSummary("next") + "\n" +
    "NEXT persona journey:\n" + tmapSummary("next") + "\n\n" +
    "NORTH STAR persona pulse:\n" + pulseSummary("northStar") + "\n" +
    "NORTH STAR persona journey:\n" + tmapSummary("northStar") + "\n\n" +
    "OUTPUT REQUIREMENTS:\n" +
    "Return ONLY valid JSON, no preamble, no markdown fences. Schema:\n" +
    "{\n" +
    "  \"now\": {\n" +
    "    \"name\": \"Persona name (3-5 words, evocative not generic)\",\n" +
    "    \"oneLine\": \"One-sentence description of who this person is in their inner life\",\n" +
    "    \"hook\": \"Ad-grade hook line in their voice, under 15 words\",\n" +
    "    \"angles\": [\"Angle 1\", \"Angle 2\", \"Angle 3\"],\n" +
    "    \"proof\": [\"Proof point 1\", \"Proof point 2\", \"Proof point 3\"],\n" +
    "    \"channel\": \"Primary channel where they live and where this ad runs\",\n" +
    "    \"language\": \"Three to five phrases in their actual words, comma separated\",\n" +
    "    \"antiRule\": \"One sentence rule for who to exclude from targeting based on the anti-personas\"\n" +
    "  },\n" +
    "  \"next\": { same schema },\n" +
    "  \"northStar\": { same schema }\n" +
    "}\n\n" +
    "Hooks must be specific, not generic. Angles must be different from each other. Channels must be one named channel each. Anti-rules must be exclusionary criteria for ad targeting.";

  return prompt;
}

async function runSynthesis() {
  state.loading = true;
  state.error = null;
  render();
  try {
    var prompt = buildSynthesisPrompt();
    var raw = await callAnthropic(
      [{ role: "user", content: prompt }],
      "You are a senior brand strategist and direct-response specialist. You produce ad-ready persona briefs that work in real campaigns. You write in the voice of the buyer, not about the buyer. You return only valid JSON.",
      4000
    );
    var cleaned = raw.replace(/```json|```/g, "").trim();
    var firstBrace = cleaned.indexOf("{");
    var lastBrace = cleaned.lastIndexOf("}");
    if (firstBrace >= 0 && lastBrace > firstBrace) {
      cleaned = cleaned.substring(firstBrace, lastBrace + 1);
    }
    var parsed = JSON.parse(cleaned);
    state.synthesis = parsed;
    state.loading = false;
    state.error = null;
    goNext();
  } catch (e) {
    state.loading = false;
    state.error = e.message || "Synthesis failed. Check API key and try again.";
    render();
  }
}

function renderSynthesis() {
  if (state.synthesis) {
    // Already done, jump to reveal
    setTimeout(goNext, 100);
    return h("div");
  }
  if (state.loading) {
    return h("div", { class: "screen screen-center" },
      h("div", { class: "container-md center fade-in" },
        renderLoader("Synthesizing"),
        h("div", { class: "text-body center", text: "Reading every signal you generated. Building three buyer profiles." }),
        h("div", { class: "text-tiny center mt-4 muted-2", text: "This usually takes 15 to 30 seconds." })
      )
    );
  }
  return h("div", { class: "screen screen-center" },
    h("div", { class: "container-md fade-in" },
      state.error ? renderError(state.error) : null,
      h("div", { class: "center" },
        h("div", { class: "kicker", text: 'Ready to synthesize' }),
        h("h2", { class: "display", style: { marginBottom: "20px" }, text: "Build the three briefs." }),
        h("p", { class: "text-body", style: { marginBottom: "32px" }, text: "Every signal you gave is now ready to be assembled into three ad-grade buyer profiles. One click." }),
        h("div", { class: "flex justify-center gap-3" },
          renderBtn("Back", { variant: "ghost", icon: "arrowLeft", onClick: goPrev }),
          renderBtn("Run synthesis", { size: "lg", icon: "sparkles", onClick: runSynthesis })
        )
      )
    )
  );
}

// ============================================================================
// STEP 16: REVEAL + APPROVAL
// ============================================================================

function renderReveal() {
  if (!state.synthesis) {
    return h("div", { class: "screen screen-center" },
      h("div", { class: "container-md center" },
        h("p", { class: "text-body", text: "No synthesis yet." }),
        renderBtn("Back to synthesis", { onClick: function() { goToStep(15); } })
      )
    );
  }

  var s = state.synthesis;
  var allApproved = state.approved.now && state.approved.next && state.approved.northStar;

  function renderPersonaCard(p) {
    var data = s[p];
    if (!data) return null;
    var isApproved = state.approved[p];
    var round = state.refineRound[p] || 0;
    var canRefine = round < 3;

    var actions;
    if (isApproved) {
      actions = h("div", { class: "approval-row" },
        h("button", { class: "approval-btn approval-approved", disabled: true }, "✓ Approved")
      );
    } else {
      actions = h("div", { class: "approval-row" },
        h("button", {
          class: "approval-btn approval-approve",
          onclick: function() {
            var newApproved = Object.assign({}, state.approved);
            newApproved[p] = true;
            setState({ approved: newApproved });
          }
        }, "Approve"),
        canRefine ? h("button", {
          class: "approval-btn approval-refine",
          onclick: function() { openRefineModal(p); }
        }, "Refine · round " + (round + 1) + " of 3") : h("span", { class: "text-tiny muted-2", text: "Refinement limit reached" })
      );
    }

    return h("div", { class: "reveal-card " + p, style: { animationDelay: (p === "now" ? "0s" : p === "next" ? "0.2s" : "0.4s") } },
      h("div", { class: "reveal-card-header" },
        h("div", null,
          renderPersonaBadge(p),
          h("div", { class: "reveal-card-title", style: { marginTop: "10px" }, text: data.name || "—" })
        )
      ),
      h("div", { class: "reveal-section" },
        h("div", { class: "reveal-section-label", text: "Who they are" }),
        h("div", { class: "text-body", text: data.oneLine || "" })
      ),
      h("div", { class: "reveal-section" },
        h("div", { class: "reveal-section-label", text: "Hook" }),
        h("div", { class: "reveal-hook", text: data.hook || "" })
      ),
      h("div", { class: "reveal-section" },
        h("div", { class: "reveal-section-label", text: "Three angles" }),
        h("ul", { class: "reveal-list" }, (data.angles || []).map(function(a) { return h("li", { text: a }); }))
      ),
      h("div", { class: "reveal-section" },
        h("div", { class: "reveal-section-label", text: "Proof points" }),
        h("ul", { class: "reveal-list" }, (data.proof || []).map(function(a) { return h("li", { text: a }); }))
      ),
      h("div", { class: "reveal-section" },
        h("div", { class: "reveal-row" },
          h("div", null,
            h("div", { class: "reveal-section-label", text: "Channel" }),
            h("div", { class: "reveal-pill", text: data.channel || "" })
          ),
          h("div", { style: { flex: "1" } },
            h("div", { class: "reveal-section-label", text: "Their language" }),
            h("div", { class: "text-body", text: data.language || "" })
          )
        )
      ),
      h("div", { class: "reveal-section" },
        h("div", { class: "reveal-section-label", text: "Anti-targeting rule" }),
        h("div", { class: "text-body", text: data.antiRule || "" })
      ),
      actions
    );
  }

  return h("div", { class: "screen" },
    h("div", { class: "container-md fade-in" },
      h("div", { class: "center mb-8" },
        h("div", { class: "kicker", text: 'The Reveal' }),
        h("h2", { class: "display", style: { marginBottom: "12px" }, text: "Your three buyers." }),
        h("p", { class: "text-body", style: { maxWidth: "520px", margin: "0 auto" }, text: "Each card is ad-grade. Approve when it lands. Refine if it needs sharpening. Up to three rounds per persona." }),
        state.error ? h("div", { style: { marginTop: "16px" } }, renderError(state.error)) : null
      ),
      h("div", null,
        renderPersonaCard("now"),
        renderPersonaCard("next"),
        renderPersonaCard("northStar")
      ),
      h("div", { class: "center mt-12" },
        allApproved ? renderBtn("Save to QBP and finish", { size: "lg", icon: "save", onClick: finalSave }) : h("div", { class: "text-tiny muted", text: "Approve all three to save and finish" })
      )
    )
  );
}

function openRefineModal(persona) {
  var existing = document.getElementById("refine-modal");
  if (existing) existing.remove();
  var feedbackInput;
  var modal = h("div", { id: "refine-modal", class: "modal-overlay", onclick: function(e) { if (e.target === modal) modal.remove(); } },
    h("div", { class: "modal" },
      h("div", { class: "modal-title", text: "Refine " + PERSONA_LABELS[persona] }),
      h("p", { class: "text-body", text: "What is wrong, missing, or off? One sharp paragraph. Claude will rebuild this persona based on your note." }),
      feedbackInput = h("textarea", { class: "modal-textarea", placeholder: "e.g. The hook is too generic. They are not 'tired of guessing' — they are tired of being underestimated. Rewrite around that..." }),
      h("div", { class: "flex gap-3 justify-between" },
        h("button", { class: "btn btn-ghost btn-sm", onclick: function() { modal.remove(); } }, "Cancel"),
        h("button", {
          class: "btn btn-primary btn-sm",
          onclick: function() {
            var feedback = feedbackInput.value.trim();
            if (!feedback) return;
            modal.remove();
            runRefine(persona, feedback);
          }
        }, "Rebuild this persona")
      )
    )
  );
  document.body.appendChild(modal);
  feedbackInput.focus();
}

async function runRefine(persona, feedback) {
  state.loading = true;
  state.error = null;
  render();
  try {
    var prevJson = JSON.stringify(state.synthesis[persona]);
    var brandLine = state.qbp.brandName ? "Brand: " + state.qbp.brandName + ". " : "";
    if (state.qbp.archetype) brandLine += "Archetype: " + state.qbp.archetype + ". ";
    if (state.qbp.brandEssence || state.qbp.essence) brandLine += "Essence: " + (state.qbp.brandEssence || state.qbp.essence) + ".";

    var prompt = "Refine this " + PERSONA_LABELS[persona] + " persona based on the user's feedback. Keep the same JSON schema. Return ONLY the new JSON object for this single persona.\n\n" +
      "Brand context: " + brandLine + "\n\n" +
      "PREVIOUS VERSION:\n" + prevJson + "\n\n" +
      "USER FEEDBACK:\n" + feedback + "\n\n" +
      "Output: same JSON schema as before, just for this single persona. Schema: { name, oneLine, hook, angles[3], proof[3], channel, language, antiRule }. No preamble, no fences.";

    var raw = await callAnthropic(
      [{ role: "user", content: prompt }],
      "You are a senior brand strategist refining a persona brief. Apply the user's feedback faithfully. Return only valid JSON.",
      2000
    );
    var cleaned = raw.replace(/```json|```/g, "").trim();
    var firstBrace = cleaned.indexOf("{");
    var lastBrace = cleaned.lastIndexOf("}");
    if (firstBrace >= 0 && lastBrace > firstBrace) {
      cleaned = cleaned.substring(firstBrace, lastBrace + 1);
    }
    var refined = JSON.parse(cleaned);
    var newSynth = Object.assign({}, state.synthesis);
    newSynth[persona] = refined;
    var newRound = Object.assign({}, state.refineRound);
    newRound[persona] = (newRound[persona] || 0) + 1;
    state.synthesis = newSynth;
    state.refineRound = newRound;
    state.loading = false;
    state.error = null;
    render();
  } catch (e) {
    state.loading = false;
    state.error = "Refine failed: " + (e.message || "Try again.");
    render();
  }
}

function finalSave() {
  // Write to QBP (cloud-aware via writeQBP → QB.setQBP)
  var s = state.synthesis;
  if (s) {
    writeQBP({
      nowPersona: s.now,
      nextPersona: s.next,
      northStarPersona: s.northStar,
      castingFloorComplete: true,
      castingFloorTimestamp: new Date().toISOString()
    });
    // Note: legacy qb_casting_floor_done flag dropped — completion is recorded
    // by QB.openGate() → QB.recordCompletion() below as the single source.
    try { localStorage.setItem("qb_casting_floor_output", JSON.stringify(s)); } catch (e) {}
  }
  // Show finish screen
  state._finished = true;
  render();
  // Open soft gate (no-op if already authed; records local + cloud completion either way)
  try {
    if (window.QB && QB.openGate) {
      var qbp = QB.getQBP ? QB.getQBP() : {};
      QB.openGate({ toolId: "casting-floor", toolName: "The Casting Floor", brandName: (qbp && qbp.brandName) || "" });
    }
  } catch (e) { console.warn("QB gate:", e); }
}

// Override render dispatch for finished state
var _origRender = render;
render = function() {
  if (state._finished) {
    var app = document.getElementById("app");
    app.innerHTML = "";
    app.appendChild(renderHeader(null));
    app.appendChild(renderFinish());
    return;
  }
  _origRender();
};

function renderFinish() {
  function downloadJSON() {
    var blob = new Blob([JSON.stringify(state.synthesis, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "casting-floor-personas.json";
    a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }
  function downloadMD() {
    var s = state.synthesis;
    var md = "# Casting Floor — Three Personas\n\n";
    PERSONA_KEYS.forEach(function(k) {
      var d = s[k];
      md += "## " + PERSONA_LABELS[k] + ": " + (d.name || "") + "\n\n";
      md += "**Who they are.** " + (d.oneLine || "") + "\n\n";
      md += "**Hook.** " + (d.hook || "") + "\n\n";
      md += "**Three angles.**\n";
      (d.angles || []).forEach(function(a) { md += "- " + a + "\n"; });
      md += "\n**Proof points.**\n";
      (d.proof || []).forEach(function(a) { md += "- " + a + "\n"; });
      md += "\n**Channel.** " + (d.channel || "") + "\n\n";
      md += "**Their language.** " + (d.language || "") + "\n\n";
      md += "**Anti-targeting rule.** " + (d.antiRule || "") + "\n\n---\n\n";
    });
    var blob = new Blob([md], { type: "text/markdown" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "casting-floor-personas.md";
    a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }

  return h("div", { class: "screen screen-center" },
    h("div", { class: "container-md center fade-in" },
      h("div", { class: "kicker", text: 'Saved to QBP' }),
      h("h2", { class: "display", style: { marginBottom: "20px" }, text: "Done." }),
      h("p", { class: "text-body", style: { marginBottom: "32px", maxWidth: "480px", margin: "0 auto 32px" }, text: "Three personas written into your QBP as nowPersona, nextPersona, and northStarPersona. Every downstream tool now has structured input. War Table, Voice Guide, and Predictive Panel will read this automatically." }),
      h("div", { class: "flex justify-center gap-3", style: { flexWrap: "wrap" } },
        renderBtn("Download JSON", { icon: "download", variant: "secondary", onClick: downloadJSON }),
        renderBtn("Download Markdown", { icon: "download", variant: "secondary", onClick: downloadMD }),
        renderBtn("Open the Hub", { iconRight: "arrowRight", onClick: function() { window.location.href = "qb-branidos-hub.html"; } })
      ),
      h("div", { class: "mt-8" },
        h("button", {
          class: "btn btn-ghost btn-sm",
          onclick: function() {
            if (confirm("Run the Casting Floor again? Your saved personas will remain in QBP, but progress in this tool will reset.")) {
              clearProgress();
              window.location.reload();
            }
          }
        }, "Start over")
      )
    )
  );
}

// ============================================================================
// INIT
// ============================================================================

(function init() {
  state.qbp = readQBP();
  state.apiKey = readApiKey();
  loadProgress();
  render();
})();

</script>
