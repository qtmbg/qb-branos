<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

  tailwind.config = {
    darkMode: "class",
    theme: { extend: { fontFamily: { sans: ["Inter","sans-serif"], mono: ["JetBrains Mono","monospace"] }, colors: { quantum: "#4ade80" } } }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body class="bg-white dark:bg-[#050505] min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const ChevronRight = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>;
const ChevronLeft = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"/></svg>;
const Target = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
const BrainCircuit = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M9 13a4.5 4.5 0 0 0 3-4"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.895a4 4 0 0 1 .585-.396"/><path d="M19.8 17.8a4 4 0 0 0-3.8-5.8"/><path d="M16.6 14a4 4 0 0 0-4.6-3"/><path d="M12 13h4"/><path d="M18 9h2"/><path d="M18 6h2"/><path d="M18 3h2"/></svg>;
const ShieldAlert = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
const Calculator = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="10" x2="16" y2="14"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>;
const Scale = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><line x1="12" y1="3" x2="12" y2="21"/><polyline points="3 6 12 3 21 6"/><path d="M3 6l3 9c0 1.7-1.3 3-3 3s-3-1.3-3-3l3-9"/><path d="M21 6l3 9c0 1.7-1.3 3-3 3s-3-1.3-3-3l3-9"/><line x1="3" y1="21" x2="21" y2="21"/></svg>;
const Map = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>;
const FileText = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
const Plus = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
const Trash2 = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
const AlertCircle = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
const CheckCircle2 = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>;
const Download = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
const Copy = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
const Sun = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>;
const Moon = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
const Mail = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>;
const Send = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
const Lock = ({size=16,className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;

// --- Constants & Config ---

const PHASES = [

  { id: 0, title: 'Intro', icon: Target, time: '3 min' },

  { id: 1, title: 'The Brief', icon: FileText, time: '5 min' },

  { id: 2, title: 'Brainstorm', icon: BrainCircuit, time: '10 min' },

  { id: 3, title: 'Interrogation', icon: ShieldAlert, time: '20 min' },

  { id: 4, title: 'Scoring', icon: Calculator, time: '10 min' },

  { id: 5, title: 'Trade-Off', icon: Scale, time: '7 min' },

  { id: 6, title: 'Unlock', icon: Lock, time: '1 min' },

  { id: 7, title: 'Roadmap', icon: Map, time: '5 min' },

  { id: 8, title: 'Synthesis', icon: FileText, time: '5 min' },

];

// Re-mapped to Quantum Branding technical badge colors

const PILLARS = [

  { id: 'Revenue', label: 'Revenue', color: 'bg-red-500/10 text-red-600 dark:text-red-500', border: 'border-red-500/30' },

  { id: 'Awareness', label: 'Awareness', color: 'bg-yellow-500/10 text-yellow-600 dark:text-yellow-500', border: 'border-yellow-500/30' },

  { id: 'Delight', label: 'Delight', color: 'bg-green-500/10 text-[#16a34a] dark:text-[#4ade80]', border: 'border-[#4ade80]/30' },

  { id: 'Automation', label: 'Automation', color: 'bg-blue-500/10 text-blue-600 dark:text-blue-500', border: 'border-blue-500/30' },

  { id: 'Reputation', label: 'Reputation', color: 'bg-purple-500/10 text-purple-600 dark:text-purple-500', border: 'border-purple-500/30' },

];

const CONSTRAINTS = ['Time', 'Money', 'Clarity', 'Team', 'Trust'];

const defaultScores = { impact: 5, ease: 5, personaFit: 5, brandSoul: 5, multiplier: 5, urgency: 5, leadCapture: false };

// --- Quantum Branding Reusable Classes ---

const classes = {

  glassCard: "bg-zinc-100/60 dark:bg-[#0a0a0a]/60 backdrop-blur-[24px] border border-black/5 dark:border-white/5 rounded-[32px] p-8 shadow-2xl transition-all duration-500",

  glassInput: "w-full p-4 rounded-xl border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 font-mono text-sm focus:border-[#4ade80] focus:ring-1 focus:ring-[#4ade80] outline-none transition-all dark:text-white text-black",

  labelMono: "block font-mono text-[10px] uppercase tracking-[0.3em] text-zinc-500 dark:text-[#4ade80]/70 mb-2",

  primaryBtn: "w-full py-4 bg-black dark:bg-white text-white dark:text-black font-black uppercase tracking-widest rounded-xl hover:bg-[#4ade80] dark:hover:bg-[#4ade80] hover:text-black active:scale-95 transition-all shadow-xl flex items-center justify-center gap-2",

  headline: "font-black tracking-tighter leading-[1.1] uppercase",

  hook: "font-light italic text-zinc-600 dark:text-white/90",

  pill: "inline-block rounded-full border px-3 py-1 font-mono text-[10px] uppercase tracking-[0.3em]"

};

function App() {

  const [phase, setPhase] = useState(0);

  const [isDarkMode, setIsDarkMode] = useState(true); // Default to Dark Mode for the "Command Center" vibe

  // --- State: Phase 1 (Brief) ---

  const [brief, setBrief] = useState({

    bottleneck: '', nextMonth: '', nextMonthDelay: '', working: '', personaGap: '',

    revenue: '', teamSize: '', keyMetric: '', missingCapability: '', fastestPath: '',

    constraint: 'Time'

  });

  // --- State: Global Brand Details ---

  const [brandInfo, setBrandInfo] = useState({

    brandName: 'Our Brand',

    primaryPersona: 'Primary Persona',

  });

  // --- State: Phase 2, 3, 4 (Initiatives) ---

  const [initiatives, setInitiatives] = useState([]);

  const [newInitiative, setNewInitiative] = useState({ name: '', description: '', pillar: 'Revenue', persona: '' });

  const [expandedInterrogation, setExpandedInterrogation] = useState(null);

  // --- State: Phase 5 (Trade-offs) ---

  const [tradeOffs, setTradeOffs] = useState({

    closeCall: { choose: '', because: '', acceptWait: '' },

    pillarClash: { buildFirst: '', because: '', risk: '' },

    brandTest: { firstMove: '', makeItFeel: '' },

    personaLoyalty: { serveFirst: '', because: '', returnMilestone: '' }

  });

  // --- State: Phase 6 (Unlock / Lead Capture) ---

  const [leadForm, setLeadForm] = useState({ name: '', surname: '', company: '', email: '' });

  const [isSubmittingForm, setIsSubmittingForm] = useState(false);

  const [hasUnlocked, setHasUnlocked] = useState(false);

  // --- Helper Functions ---

  const calculateScore = (scores) => {

    const raw = (scores.impact * 2) + (scores.ease * 1) + (scores.personaFit * 2) +

                (scores.brandSoul * 1.5) + (scores.multiplier * 1.5) + (scores.urgency * 1);

    const baseScore = (raw / 90) * 100;

    const finalScore = baseScore + (scores.leadCapture ? 5 : 0);

    return Math.round(finalScore);

  };

  const getBand = (score) => {

    if (score >= 80) return { label: 'NOW', color: 'bg-[#ef4444] text-white', desc: '0-60 days' };

    if (score >= 60) return { label: 'NEXT', color: 'bg-yellow-500 text-black', desc: '60-180 days' };

    if (score >= 40) return { label: 'LATER', color: 'bg-zinc-500 text-white', desc: '180-365 days' };

    return { label: 'PARK', color: 'bg-transparent border border-zinc-500 text-zinc-500', desc: 'Not this year' };

  };

  const updateInitiative = (id, field, value) => {

    setInitiatives(initiatives.map(i => i.id === id ? { ...i, [field]: value } : i));

  };

  const updateInterrogation = (id, field, value) => {

    setInitiatives(initiatives.map(i => i.id === id ? { ...i, interrogation: { ...i.interrogation, [field]: value } } : i));

  };

  const updateScore = (id, field, value) => {

    setInitiatives(initiatives.map(i => {

      if (i.id === id) {

        const newScores = { ...i.scores, [field]: value };

        return { ...i, scores: newScores, finalScore: calculateScore(newScores), band: getBand(calculateScore(newScores)).label };

      }

      return i;

    }));

  };

  const handleAddInitiative = () => {

    if (!newInitiative.name.trim()) return;

    const newId = Date.now().toString();

    const item = {

      ...newInitiative, id: newId,

      interrogation: { utility: '', timing: '', personaTest: '', urgency: '' },

      scores: { ...defaultScores },

      finalScore: calculateScore(defaultScores),

      band: getBand(calculateScore(defaultScores)).label

    };

    setInitiatives([...initiatives, item]);

    setNewInitiative({ name: '', description: '', pillar: 'Revenue', persona: '' });

  };

  const copyToClipboard = () => {

    const text = document.getElementById('synthesis-document').innerText;

    navigator.clipboard.writeText(text).then(() => alert('Document copied to clipboard.'));

  };

  // --- Derived State for Trade-offs ---

  const { topNow, topPillars, topOverall, topBrand } = useMemo(() => {

    const sorted = [...initiatives].sort((a, b) => b.finalScore - a.finalScore);

    const now = sorted.filter(i => i.band === 'NOW');



    const pillars = {};

    sorted.forEach(i => {

      if (!pillars[i.pillar] || pillars[i.pillar].finalScore < i.finalScore) pillars[i.pillar] = i;

    });



    const brandSorted = [...initiatives].sort((a, b) => b.scores.brandSoul - a.scores.brandSoul);

    return {

      topNow: now,

      topPillars: Object.values(pillars),

      topOverall: sorted[0],

      topBrand: brandSorted[0]

    };

  }, [initiatives]);

  // --- Tempo Enforcement (Validation) ---

  const phaseValidity = useMemo(() => {

    const p1 = !!(brandInfo.brandName?.trim() && brandInfo.primaryPersona?.trim() &&

                  brief.bottleneck?.trim() && brief.nextMonth?.trim() &&

                  brief.working?.trim() && brief.personaGap?.trim() &&

                  brief.revenue?.trim() && brief.teamSize?.trim() && brief.keyMetric?.trim());

    const p2 = initiatives.length >= 3;

    const p3 = initiatives.length > 0 && initiatives.every(i =>

      i.interrogation.utility?.trim() && i.interrogation.timing?.trim() &&

      i.interrogation.personaTest?.trim() && i.interrogation.urgency?.trim());

    const p4 = true;

    const p5 = !!(tradeOffs.closeCall.choose?.trim() && tradeOffs.closeCall.because?.trim() && tradeOffs.closeCall.acceptWait?.trim() &&

                  tradeOffs.pillarClash.buildFirst?.trim() && tradeOffs.pillarClash.because?.trim() &&

                  tradeOffs.brandTest.firstMove?.trim() && tradeOffs.brandTest.makeItFeel?.trim());

    const p6 = hasUnlocked;

    const p7 = true;

    const p8 = true;



    return [true, p1, p2, p3, p4, p5, p6, p7, p8];

  }, [brandInfo, brief, initiatives, tradeOffs, hasUnlocked]);

  const isPhaseUnlocked = (targetPhase) => {

    for (let i = 0; i < targetPhase; i++) {

      if (!phaseValidity[i]) return false;

    }

    return true;

  };

  const canProceed = phaseValidity[phase];

  const validationMessage = !canProceed ? (

    phase === 1 ? 'SYSTEM HALT: COMPLETE ALL DIAGNOSTIC FIELDS.' :

    phase === 2 ? `SYSTEM HALT: INSUFFICIENT DATA. ADD 3 INITIATIVES. (${initiatives.length}/3)` :

    phase === 3 ? 'SYSTEM HALT: COMPLETE ALL INTERROGATION PROTOCOLS.' :

    phase === 5 ? 'SYSTEM HALT: RESOLVE ALL STRATEGIC CONFLICTS.' :

    phase === 6 ? 'AUTHORIZATION REQUIRED: SUBMIT CREDENTIALS TO UNLOCK.' : ''

  ) : '';

  const handleLeadSubmit = (e) => {

    e.preventDefault();

    setIsSubmittingForm(true);

    setTimeout(() => {

      setIsSubmittingForm(false);

      setHasUnlocked(true);
      // ── QB OS: Auto-populate QBP from War Table ─────────────────────────────
      try {
        const existing = JSON.parse(localStorage.getItem('qb_qbp') || '{}');
        // Extract top initiatives from scoring
        const topInitiatives = initiatives
          ? initiatives.filter(i => i.name).sort((a,b) => (b.score||0)-(a.score||0)).slice(0,3).map(i=>i.name)
          : [];
        // Extract brief info
        const warBrief = brief ? {
          challenge: brief.challenge || '',
          goal: brief.goal || '',
          timeframe: brief.timeframe || ''
        } : {};
        const updated = Object.assign({}, existing, {
          warTableComplete: true,
          warTableCompletedAt: new Date().toISOString(),
          warTableTopInitiatives: topInitiatives,
          warTableBrief: warBrief,
          brandName: (brandInfo && brandInfo.name) ? brandInfo.name : (existing.brandName || ''),
        });
        localStorage.setItem('qb_qbp', JSON.stringify(updated));
        localStorage.setItem('qb_war_table_done', '1');
          // Show results button on completion
          setTimeout(function() {
            if (!document.getElementById('qb-float-results')) {
              var btn = document.createElement('button');
              btn.id = 'qb-float-results';
              btn.className = 'qb-send-results-btn';
              btn.style.cssText = 'position:fixed;bottom:32px;right:32px;z-index:9000;box-shadow:0 8px 32px rgba(74,222,128,.25);';
              btn.innerHTML = '&#128196; Send me my results';
              btn.addEventListener('click', function() {
                var qbp = {};
                try { qbp = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); } catch(e) {}
                window.QB_showResultsModal({
                  toolId: 'war-table',
                  qbp: qbp,
                  results: {},
                  pdfPage: '/war-table-pdf.html'
                });
              });
              document.body.appendChild(btn);
            }
          }, 600);
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'QB_PHASE_COMPLETE', phase: 1, tool: 'war-table', qbp: updated }, '*');
        }
      } catch(e) { console.warn('QB War Table sync:', e); }
      // ── END QB OS ─────────────────────────────────────────────────────────

      setPhase(7);

    }, 1500);

  };

  const isLeadFormValid = leadForm.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/) &&

                          (leadForm.name.trim() || leadForm.surname.trim() || leadForm.company.trim());

  // --- Renderers for Each Phase ---

  const renderIntro = () => (

    <div className="max-w-4xl mx-auto space-y-12 animate-in fade-in zoom-in duration-500 mt-12">

      <div className="text-center space-y-6">

        <h1 className={`text-6xl md:text-8xl ${classes.headline} bg-clip-text text-transparent bg-gradient-to-r from-black via-[#16a34a] to-black dark:from-white dark:via-[#4ade80] dark:to-white animate-gradient-text`}>

          The War Table

        </h1>

        <p className={`text-xl md:text-2xl ${classes.hook}`}>

          "Every resource you deploy has an opportunity cost."

        </p>

      </div>

      <div className={classes.glassCard}>

        <h2 className="text-2xl font-black uppercase tracking-tighter border-b border-black/10 dark:border-white/10 pb-4 mb-6">Design Philosophy</h2>

        <div className="space-y-6 text-lg text-zinc-600 dark:text-zinc-400 leading-relaxed font-normal">

          <p><strong className="text-black dark:text-white font-bold">1. Scoring without interrogation is just math.</strong> A number doesn't challenge a belief. Every initiative must survive five hard questions before it earns a score.</p>

          <p><strong className="text-black dark:text-white font-bold">2. Roadmaps that ignore brand and persona are liabilities.</strong> The scoring formula penalizes misalignment with your soul axis and target audience.</p>

          <p><strong className="text-black dark:text-white font-bold">3. The most important decision is what you DON'T do.</strong> This experience produces a short NOW list. The output should feel like a relief.</p>

        </div>

      </div>

      <div className="bg-red-500/10 border border-red-500/30 p-6 rounded-[32px] text-red-600 dark:text-red-400 backdrop-blur-md">

        <h3 className="font-mono text-sm uppercase tracking-[0.2em] flex items-center gap-3 font-bold mb-3">

          <AlertCircle className="w-5 h-5"/> Protocol Warning

        </h3>

        <p className="text-lg leading-relaxed">This experience will challenge you. It will ask you to defend your ideas, compare them against each other, and sometimes kill ones you love. That discomfort is the product.</p>

      </div>

    </div>

  );

  const renderBrief = () => (

    <div className="max-w-4xl mx-auto space-y-12 animate-in slide-in-from-right-8 duration-500 mt-8">

      <div>

        <h2 className={`text-5xl ${classes.headline} mb-4`}>Phase 1: The Brief</h2>

        <p className={`text-2xl ${classes.hook}`}>Where are you, where are you going, and what's in the way?</p>

      </div>

      <div className="grid gap-8">

        <div className={classes.glassCard}>

           <h3 className="text-xl font-black uppercase tracking-tighter mb-6 border-b border-black/10 dark:border-white/10 pb-4 text-[#16a34a] dark:text-[#4ade80]">00. System Parameters</h3>

           <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

             <div>

               <label className={classes.labelMono}>Brand Identity</label>

               <input type="text" value={brandInfo.brandName} onChange={e => setBrandInfo({...brandInfo, brandName: e.target.value})} className={classes.glassInput} />

             </div>

             <div>

               <label className={classes.labelMono}>Primary Target</label>

            <div className="relative">

              <Mail className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500" strokeWidth={1.5} />

              <input type="email" required value={leadForm.email} onChange={e => setLeadForm({...leadForm, email: e.target.value})} className={`${classes.glassInput} pl-12`} />

            </div>

          </div>

        </div>

        <button

          type="submit"

          disabled={!isLeadFormValid}

          className={`mt-10 ${classes.primaryBtn}`}

        >

          <Send className="w-5 h-5" /> Decrypt & Transfer

        </button>

      </form>

    </div>

  );

  const renderRoadmap = () => {

    const sorted = [...initiatives].sort((a, b) => b.finalScore - a.finalScore);

    const nowList = sorted.filter(i => i.band === 'NOW').slice(0, 5);

    const nextList = sorted.filter(i => i.band === 'NEXT').slice(0, 8);

    const laterList = sorted.filter(i => i.band === 'LATER');

    const parkList = sorted.filter(i => i.band === 'PARK');

    return (

      <div className="max-w-5xl mx-auto space-y-16 animate-in slide-in-from-right-8 duration-500 mt-8">

        <div>

          <h2 className={`text-5xl ${classes.headline} mb-4 text-center`}>Phase 6: Roadmap</h2>

          <p className={`text-2xl ${classes.hook} text-center`}>A sequence of bets.</p>

        </div>

        {/* NOW Band */}

        <div className="space-y-6">

          <div className="flex items-center gap-6 border-b border-[#ef4444]/30 pb-4">

            <div className="w-4 h-4 rounded-full bg-[#ef4444] animate-pulse shadow-[0_0_15px_#ef4444]"></div>

            <h3 className="text-4xl font-black tracking-tighter uppercase text-[#ef4444]">NOW</h3>

            <span className="font-mono text-xs uppercase tracking-[0.2em] text-[#ef4444]/70">0-60 Days // Max 5</span>

          </div>

          {nowList.length === 0 ? <p className="font-mono text-sm text-zinc-500 uppercase tracking-widest py-4">No assets meet threshold.</p> : (

            <div className="grid gap-4">

              {nowList.map((init, idx) => (

                <div key={init.id} className={`${classes.glassCard} p-6 flex items-center gap-6 border-l-4 border-[#ef4444] hover:bg-black/5 dark:hover:bg-white/5`}>

                  <div className="font-mono text-2xl font-bold text-[#ef4444]/50 w-8">0{idx + 1}</div>

                  <div className="flex-1">

                    <h4 className="font-black text-2xl uppercase tracking-tighter">{init.name}</h4>

                    <div className="flex gap-3 mt-3">

                      <span className={`${classes.pill} border-black/10 dark:border-white/10`}>{init.pillar}</span>

                      <span className={`${classes.pill} border-black/10 dark:border-white/10`}>{init.persona || 'Audience'}</span>

                    </div>

                  </div>

                  <div className="text-right font-mono">

                    <div className="text-[10px] uppercase tracking-[0.3em] text-zinc-500 mb-1">Score</div>

                    <div className="text-4xl font-black text-[#ef4444]">{init.finalScore}</div>

                  </div>

                </div>

              ))}

            </div>

          )}

        </div>

        {/* NEXT Band */}

        <div className="space-y-6">

          <div className="flex items-center gap-6 border-b border-yellow-500/30 pb-4">

            <div className="w-4 h-4 rounded-full bg-yellow-500"></div>

            <h3 className="text-4xl font-black tracking-tighter uppercase text-yellow-600 dark:text-yellow-500">NEXT</h3>

            <span className="font-mono text-xs uppercase tracking-[0.2em] text-yellow-600/70 dark:text-yellow-500/70">60-180 Days // Wait State</span>

          </div>

          <div className="grid md:grid-cols-2 gap-4">

            {nextList.map((init) => (

               <div key={init.id} className={`${classes.glassCard} p-6 border-l-2 border-yellow-500/50`}>

                 <h4 className="font-black text-lg uppercase tracking-tight">{init.name}</h4>

                 <div className="font-mono text-[10px] text-zinc-500 mt-4 uppercase tracking-[0.1em]">Awaiting Prerequisite</div>

               </div>

            ))}

          </div>

        </div>

        {/* LATER & PARK */}

        <div className="grid md:grid-cols-2 gap-12">

           <div className="space-y-6">

              <div className="flex items-center gap-4 border-b border-zinc-500/30 pb-4">

                <div className="w-3 h-3 rounded-full bg-zinc-500"></div>

                <h3 className="text-2xl font-black tracking-tighter uppercase text-zinc-600 dark:text-zinc-400">LATER</h3>

              </div>

              <ul className="space-y-3 font-mono text-sm">

                {laterList.map(init => <li key={init.id} className="border-l-2 border-zinc-300 dark:border-zinc-700 pl-4 py-1">{init.name}</li>)}

              </ul>

           </div>

           <div className="space-y-6">

              <div className="flex items-center gap-4 border-b border-zinc-800/30 pb-4">

                <div className="w-3 h-3 rounded-full bg-transparent border border-zinc-500"></div>

                <h3 className="text-2xl font-black tracking-tighter uppercase text-zinc-500">PARK</h3>

              </div>

              <ul className="space-y-3 font-mono text-sm">

                {parkList.map(init => <li key={init.id} className="border-l-2 border-zinc-200 dark:border-zinc-800 pl-4 py-1 line-through opacity-50">{init.name}</li>)}

              </ul>

           </div>

        </div>

      </div>

    );

  };

  const renderSynthesis = () => {

    const sorted = [...initiatives].sort((a, b) => b.finalScore - a.finalScore);

    const nowList = sorted.filter(i => i.band === 'NOW').slice(0, 5);

    const parkList = sorted.filter(i => i.band === 'PARK');

    return (

      <div className="max-w-5xl mx-auto space-y-8 animate-in zoom-in-95 duration-500 mt-8">

        <div className="flex justify-between items-end mb-8">

          <div>

            <h2 className={`text-5xl ${classes.headline}`}>Terminal Output</h2>

            <p className="font-mono text-sm text-[#16a34a] dark:text-[#4ade80] mt-2 uppercase tracking-[0.2em] animate-pulse">Connection Established</p>

          </div>

          <button onClick={copyToClipboard} className="px-6 py-3 bg-[#16a34a]/10 dark:bg-[#4ade80]/10 hover:bg-[#16a34a]/20 dark:hover:bg-[#4ade80]/20 text-[#16a34a] dark:text-[#4ade80] rounded-full font-mono text-xs font-bold uppercase tracking-widest transition-all active:scale-95 flex items-center gap-3 border border-[#16a34a]/30 dark:border-[#4ade80]/30">

            <Copy className="w-4 h-4"/> Copy Block

          </button>

        </div>



        {/* Terminal Window Design */}

        <div id="synthesis-document" className="bg-[#050505] p-8 md:p-12 rounded-[32px] font-mono text-sm leading-relaxed border border-[#4ade80]/20 overflow-x-auto whitespace-pre-wrap transition-colors duration-500 text-[#4ade80] shadow-[0_0_50px_rgba(74,222,128,0.05)] relative">



          <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#4ade80]/50 to-transparent"></div>



{`╔══════════════════════════════════════════════════════════════════╗

║           STRATEGIC COMMAND — ${brandInfo.brandName.toUpperCase() || '[BRAND NAME]'}

╠══════════════════════════════════════════════════════════════════╣

║

║   THE CONTEXT

║   Binding constraint:    ${brief.constraint || '[Constraint]'}

║   3-year scene:          $${brief.revenue || '___'} · ${brief.teamSize || 'n'} people · ${brief.keyMetric || '[key metric]'}

║   Fastest existing path: ${brief.working || '[what\'s already working]'}

║

╠══════════════════════════════════════════════════════════════════╣

║

║   THE PEOPLE WE'RE SERVING

║   Primary persona:    ${brandInfo.primaryPersona || '[Name]'}

║

║   PRIMARY PERSONA GAP:

║   "${brief.personaGap || '[What they need from us that we\'re not giving them yet]'}"

║

╠══════════════════════════════════════════════════════════════════╣

║

║   THE STRATEGIC PRINCIPLES

║   (From the Trade-off Arena)

║   1. Choose ${tradeOffs.closeCall.choose || '[A over B]'} because ${tradeOffs.closeCall.because || '[reason]'}

║   2. Build ${tradeOffs.pillarClash.buildFirst || '[X]'} first because ${tradeOffs.pillarClash.because || '[reason]'}

║

╠══════════════════════════════════════════════════════════════════╣

║

║   THE NEXT 60 DAYS (NOW LIST)

${nowList.length > 0 ? nowList.map((init, i) => `║   Initiative ${i+1}: ${init.name} (${init.pillar})`).join('\n') : '║   [No initiatives scored in the NOW band]'}

║

╠══════════════════════════════════════════════════════════════════╣

║

║   THE COMMITMENT

║   "We are choosing to execute ${nowList.length} initiatives in the next 60 days.

║    We are NOT doing ${parkList.length > 0 ? parkList.map(p=>p.name).join(', ') : '[parked items]'} this year.

║    We accept the cost of this focus because execution requires clarity."

║

╚══════════════════════════════════════════════════════════════════╝`}

        </div>

      </div>

    );

  };

  // --- Layout & Navigation ---

  const currentPhaseData = PHASES.find(p => p.id === phase);

  return (

    <div className={isDarkMode ? 'dark' : ''}>

      <div className="relative min-h-screen bg-white dark:bg-[#000000] text-black dark:text-[#ffffff] font-sans selection:bg-[#4ade80]/30 transition-colors duration-500 overflow-x-hidden">



        {/* Global Styles for Branding & Noise Overlay */}

        <style dangerouslySetInnerHTML={{__html: `

          @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,900;1,300&family=JetBrains+Mono:wght@400;700&display=swap');

          .font-sans { font-family: 'Inter', sans-serif; }

          .font-mono { font-family: 'JetBrains Mono', monospace; }

          .animate-gradient-text {

            background-size: 200% auto;

            animation: textGradient 6s linear infinite;

          }

          @keyframes textGradient {

            0% { background-position: 0% center; }

            100% { background-position: 200% center; }

          }

        `}} />

        <div className="pointer-events-none fixed inset-0 z-0 h-full w-full opacity-[0.03] dark:opacity-[0.02]" style={{ backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E")` }}></div>



        {/* Top Navigation / Progress */}

        <div className="fixed top-0 left-0 right-0 h-20 bg-white/70 dark:bg-[#000000]/70 backdrop-blur-xl border-b border-black/5 dark:border-white/5 z-50 flex items-center px-6 md:px-12 justify-between transition-colors duration-500">

          <div className="flex items-center gap-3 font-black text-2xl uppercase tracking-tighter">

            <Target className="w-8 h-8 text-[#16a34a] dark:text-[#4ade80]" strokeWidth={2.5} />

            WAR TABLE

          </div>



          <div className="hidden lg:flex items-center gap-2">

            {PHASES.map((p, idx) => {

              const unlocked = isPhaseUnlocked(p.id);

              return (

                <div key={p.id} className="flex items-center">

                  <button

                    onClick={() => unlocked ? setPhase(p.id) : null}

                    disabled={!unlocked}

                    className={`w-8 h-8 rounded-full flex items-center justify-center font-mono text-[10px] font-bold transition-all duration-300 border

                      ${phase === p.id ? 'bg-black text-white dark:bg-white dark:text-black border-transparent scale-110 shadow-[0_0_15px_rgba(255,255,255,0.2)]' :

                        unlocked ? 'bg-transparent text-black dark:text-white border-black/20 dark:border-white/20 hover:border-[#16a34a] dark:hover:border-[#4ade80] hover:text-[#16a34a] dark:hover:text-[#4ade80] cursor-pointer' :

                        'bg-transparent text-black/20 dark:text-white/20 border-black/5 dark:border-white/5 cursor-not-allowed'}`}

                  >

                    {idx}

                  </button>

                  {idx < PHASES.length - 1 && <div className={`w-6 h-[1px] transition-colors duration-300 ${isPhaseUnlocked(idx + 1) ? 'bg-black/20 dark:bg-white/20' : 'bg-black/5 dark:bg-white/5'}`} />}

                </div>

              );

            })}

          </div>

          <div className="flex items-center gap-6">

            <div className="font-mono text-[10px] text-zinc-500 uppercase tracking-[0.3em] transition-colors duration-300 hidden md:block border border-black/10 dark:border-white/10 px-4 py-2 rounded-full">

              EST. {currentPhaseData?.time}

            </div>



            <button

              onClick={() => setIsDarkMode(!isDarkMode)}

              className="w-10 h-10 rounded-full border border-black/10 dark:border-white/10 flex items-center justify-center hover:bg-black/5 dark:hover:bg-white/5 transition-all focus:outline-none"

            >

              {isDarkMode ? (

                <Sun className="w-4 h-4 text-zinc-400 hover:text-white transition-colors" />

              ) : (

                <Moon className="w-4 h-4 text-zinc-600 hover:text-black transition-colors" />

              )}

            </button>

          </div>

        </div>

        {/* Main Content Area */}

        <main className="pt-32 pb-40 px-6 md:px-12 relative z-10">

          {phase === 0 && renderIntro()}

          {phase === 1 && renderBrief()}

          {phase === 2 && renderBrainstorm()}

          {phase === 3 && renderInterrogation()}

          {phase === 4 && renderScoring()}

          {phase === 5 && renderTradeOffs()}

          {phase === 6 && renderUnlock()}

          {phase === 7 && renderRoadmap()}

          {phase === 8 && renderSynthesis()}

        </main>

        {/* Bottom Action Bar */}

        <div className="fixed bottom-0 left-0 right-0 p-6 bg-white/70 dark:bg-[#000000]/70 backdrop-blur-xl border-t border-black/5 dark:border-white/5 flex justify-between items-center z-50 transition-colors duration-500">

          <button

            onClick={() => setPhase(Math.max(0, phase - 1))}

            disabled={phase === 0}

            className="flex items-center gap-3 px-8 py-4 rounded-full font-mono text-xs uppercase tracking-[0.2em] font-bold text-zinc-500 hover:bg-black/5 dark:hover:bg-white/5 transition-all disabled:opacity-30 active:scale-95 border border-transparent hover:border-black/10 dark:hover:border-white/10"

          >

            <ChevronLeft className="w-4 h-4"/> Return

          </button>



          <div className="flex items-center gap-6">

            {!canProceed && validationMessage && (

              <span className="font-mono text-[10px] font-bold text-[#ef4444] uppercase tracking-[0.1em] flex items-center gap-2 animate-in fade-in slide-in-from-right-2">

                <AlertCircle className="w-4 h-4"/> <span className="hidden md:inline">{validationMessage}</span>

              </span>

            )}



            {phase < 8 ? (

              <button

                onClick={() => setPhase(Math.min(PHASES.length - 1, phase + 1))}

                disabled={!canProceed}

                className="flex items-center gap-3 px-10 py-4 rounded-full font-black uppercase tracking-widest bg-black text-white dark:bg-white dark:text-black shadow-xl hover:bg-[#16a34a] dark:hover:bg-[#4ade80] hover:text-white dark:hover:text-black active:scale-95 transition-all disabled:opacity-30 disabled:pointer-events-none"

              >

                Execute <ChevronRight className="w-5 h-5"/>

              </button>

            ) : (

              <button

                onClick={() => window.print()}

                className="flex items-center gap-3 px-10 py-4 rounded-full font-black uppercase tracking-widest border border-black/20 dark:border-white/20 hover:bg-[#16a34a] dark:hover:bg-[#4ade80] hover:border-transparent hover:text-black active:scale-95 transition-all"

              >

                <Download className="w-5 h-5"/> Print Record

              </button>

            )}

          </div>

        </div>

      </div>

    </div>

  );

}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
  <!-- QB Results Modal -->
  <script src="/qb-results-modal.js"></script>
</body>
</html>
