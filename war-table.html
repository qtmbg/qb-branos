<style>
  /* DESIGN SYSTEM: Entangled Time */
  
  /* Fallback before styles load */
  html:not([data-theme]) { background: #080604; color: #A89A88; }

  /* Dark theme (default) */
  :root, [data-theme="dark"] {
    --bg-void: #080604;
    --bg-deep: #0A0806;
    --bg-base: #0E0C09;
    --bg-surface: rgba(140,110,70,0.045);
    --bg-elevated: rgba(140,110,70,0.07);
    --bg-overlay: rgba(18,15,10,0.85);
    
    --border-subtle: rgba(140,110,70,0.06);
    --border-medium: rgba(140,110,70,0.11);
    --border-strong: rgba(140,110,70,0.18);
    
    --patina: #3A5F4A;
    --patina-lit: #4A7A5E;
    --patina-dim: rgba(58,95,74,0.2);
    --patina-faint: rgba(58,95,74,0.08);
    
    --brass: #A8903E;
    --brass-lit: #C4A84E;
    --brass-dim: rgba(168,144,62,0.18);
    --brass-faint: rgba(168,144,62,0.06);
    
    --text-1: #DDD4C4;
    --text-2: #A89A88;
    --text-3: #6A5E50;
    --text-4: #3E3830;

    --phase-discovery: #4A7A5E;
    --phase-creation: #4A7A8A;
    --phase-content: #8A5A5A;
    --phase-execution: #5A7A6A;
    --phase-intel: #A8903E;

    --grain-opacity: 0.035;
  }

  /* Light theme override */
  [data-theme="light"] {
    --bg-void: #F4F0EB;
    --bg-deep: #EDE8E2;
    --bg-base: #E6E0D8;
    --bg-surface: rgba(100,80,50,0.04);
    --bg-elevated: rgba(100,80,50,0.07);
    --bg-overlay: rgba(244,240,235,0.9);
    
    --border-subtle: rgba(100,80,50,0.08);
    --border-medium: rgba(100,80,50,0.14);
    --border-strong: rgba(100,80,50,0.22);
    
    --patina: #2E4E3C;
    --patina-lit: #3A6A4E;
    --patina-dim: rgba(46,78,60,0.15);
    --patina-faint: rgba(46,78,60,0.06);
    
    --brass: #8A7430;
    --brass-lit: #A08A3A;
    --brass-dim: rgba(138,116,48,0.15);
    --brass-faint: rgba(138,116,48,0.05);
    
    --text-1: #1A1610;
    --text-2: #5A5040;
    --text-3: #8A7E70;
    --text-4: #B8AEA0;

    --phase-discovery: #2E5A42;
    --phase-creation: #2E5A6A;
    --phase-content: #6A3A3A;
    --phase-execution: #3A5A4A;
    --phase-intel: #8A7430;

    --grain-opacity: 0.02;
  }

  /* Global Setup */
  body {
    background-color: var(--bg-void);
    color: var(--text-2);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  ::selection {
    background: var(--patina-dim);
    color: var(--text-1);
  }

  /* Film Grain Overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: var(--grain-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    mix-blend-mode: multiply;
  }

  /* Warm Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(8,6,4,0.4) 100%);
    transition: background 0.5s ease;
  }
  [data-theme="light"] .vignette {
    background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(200,190,175,0.15) 100%);
  }

  /* Warm Glass Cards */
  .glass-card {
    background: var(--bg-overlay);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 12px 40px -12px rgba(0,0,0,0.2);
  }
  .glass-card::before {
    content: '';
    position: absolute;
    top: -30%; left: -10%;
    width: 60%; height: 60%;
    background: radial-gradient(ellipse at center, var(--brass-faint) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Inputs & Textareas */
  .glass-input {
    background: var(--bg-surface);
    border: 1px solid var(--border-medium);
    border-radius: 8px;
    color: var(--text-1);
    font-family: 'Inter', sans-serif;
    transition: all 0.25s ease;
  }
  .glass-input::placeholder {
    color: var(--text-3);
    font-style: italic;
    opacity: 0.7;
  }
  .glass-input:focus {
    border-color: var(--patina);
    box-shadow: 0 0 0 3px var(--patina-faint), 0 0 24px -4px var(--brass-faint);
    outline: none;
  }

  /* Primary Button */
  .btn-primary {
    background: var(--patina);
    color: #E6DDD0;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px 32px;
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--patina-lit);
    transform: translateY(-1px);
    box-shadow: 0 6px 24px -4px var(--patina-dim), 0 0 0 1px var(--brass-faint);
  }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background: var(--bg-elevated);
    color: var(--text-3);
    border-color: transparent;
  }
  .btn-primary:active:not(:disabled) {
    transform: scale(0.98);
  }

  /* Secondary Button */
  .btn-secondary {
    background: transparent;
    color: var(--text-2);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px 32px;
    border-radius: 7px;
    border: 1px solid var(--border-strong);
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .btn-secondary:hover:not(:disabled) {
    border-color: var(--brass);
    color: var(--text-1);
    background: var(--bg-surface);
  }

  /* Brass Heartbeat Pulse */
  .pulse-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--brass);
    box-shadow: 0 0 8px var(--brass-dim), 0 0 2px var(--brass);
    animation: beat 3s ease infinite;
  }
  @keyframes beat {
    0%, 100% { transform: scale(1); opacity: 1; }
    12% { transform: scale(1.35); opacity: 1; }
    24% { transform: scale(0.95); opacity: 0.6; }
    36% { transform: scale(1.15); opacity: 1; }
    48% { transform: scale(1); opacity: 0.7; }
  }

  /* Manifesto Block */
  .manifesto-block {
    position: relative;
    padding: 12px 0 12px 24px;
  }
  .manifesto-block::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--brass) 0%, var(--patina) 100%);
    border-radius: 2px;
    box-shadow: 0 0 12px var(--brass-faint);
  }

  /* Table styles */
  th { font-weight: normal; }
  tr { border-bottom: 1px solid var(--border-subtle); }
  tr:last-child { border-bottom: none; }

  /* Custom Checkbox */
  input[type="checkbox"] {
    appearance: none;
    background-color: var(--bg-surface);
    margin: 0;
    font: inherit;
    color: currentColor;
    width: 20px;
    height: 20px;
    border: 1px solid var(--border-medium);
    border-radius: 4px;
    display: grid;
    place-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  input[type="checkbox"]::before {
    content: "";
    width: 10px;
    height: 10px;
    transform: scale(0);
    transition: 120ms transform ease-in-out;
    box-shadow: inset 1em 1em var(--patina-lit);
    background-color: var(--patina-lit);
    transform-origin: center;
    clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
  }
  input[type="checkbox"]:checked {
    border-color: var(--patina);
    background-color: var(--patina-faint);
  }
  input[type="checkbox"]:checked::before {
    transform: scale(1);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-void); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

  /* Terminal Synthesis */
  .terminal-box {
    background: var(--bg-deep);
    border: 1px solid var(--brass-dim);
    box-shadow: inset 0 0 40px var(--bg-void), 0 0 30px var(--brass-faint);
    color: var(--brass-lit);
  }

  /* ── Phase Transition Animations (replaces tailwindcss-animate dependency) ── */
  @keyframes qt-slideFromRight8 {
    from { opacity: 0; transform: translateX(2rem); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes qt-slideFromRight2 {
    from { opacity: 0; transform: translateX(0.5rem); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes qt-slideFromBottom8 {
    from { opacity: 0; transform: translateY(2rem); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes qt-fadeZoomIn {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes qt-zoomIn95 {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .animate-in.slide-in-from-right-8    { animation: qt-slideFromRight8  500ms cubic-bezier(0.16,1,0.3,1) both; }
  .animate-in.slide-in-from-right-2    { animation: qt-slideFromRight2  300ms cubic-bezier(0.16,1,0.3,1) both; }
  .animate-in.slide-in-from-bottom-8   { animation: qt-slideFromBottom8 700ms cubic-bezier(0.16,1,0.3,1) both; }
  .animate-in.fade-in.zoom-in          { animation: qt-fadeZoomIn       700ms cubic-bezier(0.16,1,0.3,1) both; }
  .animate-in.zoom-in-95               { animation: qt-zoomIn95         700ms cubic-bezier(0.16,1,0.3,1) both; }

  @media (prefers-reduced-motion: reduce) {
    .animate-in { animation: none !important; }
  }


</style>

  }
</script>

  { id: 'Awareness', label: 'Awareness', color: 'bg-creation/10 text-creation', border: 'border-creation/30' },
  { id: 'Delight', label: 'Delight', color: 'bg-content/10 text-content', border: 'border-content/30' },
  { id: 'Automation', label: 'Automation', color: 'bg-execution/10 text-execution', border: 'border-execution/30' },
  { id: 'Reputation', label: 'Reputation', color: 'bg-intel/10 text-intel', border: 'border-intel/30' },
];

const CONSTRAINTS = ['Time', 'Money', 'Clarity', 'Team', 'Trust'];
const defaultScores = { impact: 5, ease: 5, personaFit: 5, brandSoul: 5, multiplier: 5, urgency: 5, leadCapture: false };

// --- Styling Classes mapped to Entangled Time variables ---
const classes = {
  glassCard: "glass-card p-8 md:p-10 transition-all duration-500",
  glassInput: "glass-input w-full p-4 text-sm outline-none transition-all",
  labelMono: "block font-mono text-[9px] uppercase tracking-[0.2em] text-text3 mb-3",
  primaryBtn: "btn-primary w-full flex items-center justify-center gap-2",
  headline: "font-serif tracking-tight text-text1 leading-tight",
  hook: "font-serif italic text-text2 text-xl md:text-2xl mt-4",
  pill: "inline-block rounded-[4px] border px-2.5 py-1 font-mono text-[9px] uppercase tracking-[0.15em]"
};

function App() {
  const [phase, setPhase] = useState(0);
  const [theme, setTheme] = useState(() => document.documentElement.getAttribute('data-theme') || 'dark');

  const toggleTheme = () => {
    const next = theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('qb-theme', next); } catch(e) {}
    setTheme(next);
  };

  // --- State: Phase 1 (Brief) ---
  const [brief, setBrief] = useState({
    bottleneck: '', nextMonth: '', nextMonthDelay: '', working: '', personaGap: '',
    revenue: '', teamSize: '', keyMetric: '',
    constraint: 'Time'
  });

  // --- State: Global Brand Details ---
  const [brandInfo, setBrandInfo] = useState({
    brandName: 'Our Brand',
    primaryPersona: 'Primary Persona',
  });

  // --- State: Phase 2, 3, 4 (Initiatives) ---
  const [initiatives, setInitiatives] = useState([]);
  const [newInitiative, setNewInitiative] = useState({ name: '', description: '', pillar: 'Revenue', persona: '' });
  const [expandedInterrogation, setExpandedInterrogation] = useState(null);

  // --- State: Phase 5 (Trade-offs) ---
  const [tradeOffs, setTradeOffs] = useState({
    closeCall: { choose: '', because: '', acceptWait: '' },
    pillarClash: { buildFirst: '', because: '', risk: '' },
    brandTest: { firstMove: '', makeItFeel: '' },
    personaLoyalty: { serveFirst: '', because: '', returnMilestone: '' }
  });

  // --- State: Phase 6 (Unlock / Lead Capture) ---
  const [leadForm, setLeadForm] = useState({ name: '', surname: '', company: '', email: '' });
  const [isSubmittingForm, setIsSubmittingForm] = useState(false);
  const [hasUnlocked, setHasUnlocked] = useState(false);

  // --- Toast Notification (replaces native alert) ---
  const [toast, setToast] = useState(null);
  const showToast = (message, type = 'success') => {
    setToast({ message, type });
    setTimeout(() => setToast(null), 3000);
  };

  // --- Helper Functions ---
  const calculateScore = (scores) => {
    const raw = (scores.impact * 2) + (scores.ease * 1) + (scores.personaFit * 2) +
                (scores.brandSoul * 1.5) + (scores.multiplier * 1.5) + (scores.urgency * 1);
    const baseScore = (raw / 90) * 100;
    const finalScore = baseScore + (scores.leadCapture ? 5 : 0);
    return Math.round(Math.min(100, finalScore));
  };

  const getBand = (score) => {
    if (score >= 80) return { label: 'NOW', color: 'bg-patina text-void border-transparent', desc: '0-60 days' };
    if (score >= 60) return { label: 'NEXT', color: 'bg-brass text-void border-transparent', desc: '60-180 days' };
    if (score >= 40) return { label: 'LATER', color: 'bg-surface text-text2 border-medium', desc: '180-365 days' };
    return { label: 'PARK', color: 'bg-transparent border-strong text-text3', desc: 'Not this year' };
  };

  const updateInitiative = (id, field, value) => {
    setInitiatives(initiatives.map(i => i.id === id ? { ...i, [field]: value } : i));
  };

  const updateInterrogation = (id, field, value) => {
    setInitiatives(initiatives.map(i => i.id === id ? { ...i, interrogation: { ...i.interrogation, [field]: value } } : i));
  };

  const updateScore = (id, field, value) => {
    setInitiatives(initiatives.map(i => {
      if (i.id === id) {
        const newScores = { ...i.scores, [field]: value };
        return { ...i, scores: newScores, finalScore: calculateScore(newScores), band: getBand(calculateScore(newScores)).label };
      }
      return i;
    }));
  };

  const handleAddInitiative = () => {
    if (!newInitiative.name.trim()) return;
    const newId = Date.now().toString();
    const item = {
      ...newInitiative, id: newId,
      interrogation: { utility: '', timing: '', personaTest: '', urgency: '' },
      scores: { ...defaultScores },
      finalScore: calculateScore(defaultScores),
      band: getBand(calculateScore(defaultScores)).label
    };
    setInitiatives([...initiatives, item]);
    setNewInitiative({ name: '', description: '', pillar: 'Revenue', persona: '' });
  };

  const copyToClipboard = () => {
    const text = document.getElementById('synthesis-document').innerText;
    navigator.clipboard.writeText(text)
      .then(() => showToast('Strategic record copied to clipboard.'))
      .catch(() => showToast('Copy failed — select and copy manually.', 'error'));
  };

  // --- Derived State for Trade-offs ---
  const { topNow, topPillars, topOverall, topBrand } = useMemo(() => {
    const sorted = [...initiatives].sort((a, b) => b.finalScore - a.finalScore);
    const now = sorted.filter(i => i.band === 'NOW');

    const pillars = {};
    sorted.forEach(i => {
      if (!pillars[i.pillar] || pillars[i.pillar].finalScore < i.finalScore) pillars[i.pillar] = i;
    });

    const brandSorted = [...initiatives].sort((a, b) => b.scores.brandSoul - a.scores.brandSoul);
    return {
      topNow: now,
      topPillars: Object.values(pillars),
      topOverall: sorted[0],
      topBrand: brandSorted[0]
    };
  }, [initiatives]);

  // --- Validation ---
  const phaseValidity = useMemo(() => {
    const p1 = !!(brandInfo.brandName?.trim() && brandInfo.primaryPersona?.trim() &&
                  brief.bottleneck?.trim() && brief.nextMonth?.trim() &&
                  brief.working?.trim() && brief.personaGap?.trim() &&
                  brief.revenue?.trim() && brief.teamSize?.trim() && brief.keyMetric?.trim());
    const p2 = initiatives.length >= 3;
    const p3 = initiatives.length > 0 && initiatives.every(i =>
      i.interrogation.utility?.trim() && i.interrogation.timing?.trim() &&
      i.interrogation.personaTest?.trim() && i.interrogation.urgency?.trim());
    const p4 = true;
    const p5 = !!(tradeOffs.closeCall.choose?.trim() && tradeOffs.closeCall.because?.trim() && tradeOffs.closeCall.acceptWait?.trim() &&
                  tradeOffs.pillarClash.buildFirst?.trim() && tradeOffs.pillarClash.because?.trim() &&
                  tradeOffs.brandTest.firstMove?.trim() && tradeOffs.brandTest.makeItFeel?.trim());
    const p6 = hasUnlocked;
    const p7 = true;
    const p8 = true;

    return [true, p1, p2, p3, p4, p5, p6, p7, p8];
  }, [brandInfo, brief, initiatives, tradeOffs, hasUnlocked]);

  const isPhaseUnlocked = (targetPhase) => {
    for (let i = 0; i < targetPhase; i++) {
      if (!phaseValidity[i]) return false;
    }
    return true;
  };

  const canProceed = phaseValidity[phase];
  const validationMessage = !canProceed ? (
    phase === 1 ? 'SYSTEM HALT: COMPLETE ALL DIAGNOSTIC FIELDS.' :
    phase === 2 ? `SYSTEM HALT: INSUFFICIENT DATA. ADD 3 INITIATIVES. (${initiatives.length}/3)` :
    phase === 3 ? 'SYSTEM HALT: COMPLETE ALL INTERROGATION PROTOCOLS.' :
    phase === 5 ? 'SYSTEM HALT: RESOLVE ALL STRATEGIC CONFLICTS.' :
    phase === 6 ? 'AUTHORIZATION REQUIRED: SUBMIT CREDENTIALS TO UNLOCK.' : ''
  ) : '';

  const handleLeadSubmit = (e) => {
    e.preventDefault();
    setIsSubmittingForm(true);
    setTimeout(() => {
      setIsSubmittingForm(false);
      setHasUnlocked(true);
      // ── QB OS: Auto-populate QBP from War Table ─────────────────────────────
      const _qbParentOrigin = (function() {
        try { return document.referrer ? new URL(document.referrer).origin : 'https://qtmbg.com'; }
        catch(e) { return 'https://qtmbg.com'; }
      })();
      try {
        const existing = JSON.parse(localStorage.getItem('qb_qbp') || '{}');
        const topInitiatives = initiatives
          ? initiatives.filter(i => i.name).sort((a,b) => (b.finalScore||0)-(a.finalScore||0)).slice(0,3).map(i=>i.name)
          : [];
        const warBrief = brief ? {
          challenge: brief.bottleneck || '',
          goal: brief.nextMonth || '',
          constraint: brief.constraint || ''
        } : {};
        const updated = Object.assign({}, existing, {
          warTableCompletedAt: new Date().toISOString(),
          warTableTopInitiatives: topInitiatives,
          warTableBrief: warBrief,
          brandName: (brandInfo && brandInfo.brandName) ? brandInfo.brandName : (existing.brandName || ''),
        });
        localStorage.setItem('qb_qbp', JSON.stringify(updated));
        localStorage.setItem('qb_war_table_done', '1');
          
        setTimeout(function() {
          if (!document.getElementById('qb-float-results')) {
            var btn = document.createElement('button');
            btn.id = 'qb-float-results';
            btn.className = 'btn-primary';
            btn.style.cssText = 'position:fixed;bottom:104px;right:32px;z-index:9000;box-shadow:0 8px 32px rgba(58,95,74,.3);';
            btn.innerHTML = '&#128196; Send me my results';
            btn.addEventListener('click', function() {
              var qbp = {};
              try { qbp = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); } catch(e) {}
              if (window.QB_showResultsModal) { window.QB_showResultsModal({
                toolId: 'war-table',
                qbp: qbp,
                results: {},
                pdfPage: '/war-table-pdf.html'
              }); }
            });
            document.body.appendChild(btn);
          }
        }, 600);
        
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'QB_PHASE_COMPLETE', phase: 6, tool: 'war-table', qbp: updated }, _qbParentOrigin);
        }
      } catch(e) { console.warn('QB War Table sync:', e); }
      // ── END QB OS ─────────────────────────────────────────────────────────

      setPhase(7);
    }, 1500);
  };

  const isLeadFormValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(leadForm.email) &&
                          leadForm.name.trim() !== '';

  // --- Renderers for Each Phase ---

  const renderIntro = () => (
    <div className="max-w-4xl mx-auto space-y-16 animate-in fade-in zoom-in duration-700 mt-12">
      <div className="text-center space-y-6">
        <h1 className={`text-6xl md:text-8xl ${classes.headline}`}>
          The War Table
        </h1>
        <div className="w-24 h-px bg-patina mx-auto opacity-50"></div>
        <p className={`${classes.hook}`}>
          "Every resource you deploy has an opportunity cost."
        </p>
      </div>
      
      <div className={classes.glassCard}>
        <h2 className="text-2xl font-serif text-text1 border-b border-subtle pb-6 mb-8">Design Philosophy</h2>
        <div className="space-y-8 text-lg text-text2 leading-relaxed">
          <p className="flex gap-6"><span className="text-brass font-mono font-bold mt-1 text-sm">01</span><span><strong className="text-text1 font-semibold">Scoring without interrogation is just math.</strong> A number doesn't challenge a belief. Every initiative must survive four hard questions before it earns a score.</span></p>
          <p className="flex gap-6"><span className="text-brass font-mono font-bold mt-1 text-sm">02</span><span><strong className="text-text1 font-semibold">Roadmaps that ignore brand and persona are liabilities.</strong> The scoring formula penalizes misalignment with your soul axis and target audience.</span></p>
          <p className="flex gap-6"><span className="text-brass font-mono font-bold mt-1 text-sm">03</span><span><strong className="text-text1 font-semibold">The most important decision is what you DON'T do.</strong> This experience produces a short NOW list. The output should feel like a relief.</span></p>
        </div>
      </div>
      
      <div className="bg-[var(--phase-content)]/10 border border-[var(--phase-content)]/30 p-8 rounded-[14px] text-[var(--phase-content)] backdrop-blur-md">
        <h3 className="font-mono text-[10px] uppercase tracking-[0.2em] flex items-center gap-3 font-bold mb-4 text-text1">
          <AlertCircle className="w-4 h-4 text-[var(--phase-content)]"/> Protocol Warning
        </h3>
        <p className="text-base leading-relaxed text-text2">This experience will challenge you. It will ask you to defend your ideas, compare them against each other, and sometimes kill ones you love. <span className="text-[var(--phase-content)] italic">That discomfort is the product.</span></p>
      </div>
    </div>
  );

  const renderBrief = () => (
    <div className="max-w-4xl mx-auto space-y-12 animate-in slide-in-from-right-8 duration-500 mt-8">
      <div>
        <h2 className={`text-4xl md:text-5xl ${classes.headline} mb-4`}>Phase 1: The Brief</h2>
        <p className={classes.hook}>Where are you, where are you going, and what's in the way?</p>
      </div>
      
      <div className="grid gap-8">
        <div className={classes.glassCard}>
           <h3 className="text-xl font-serif text-text1 mb-8 border-b border-subtle pb-4 flex items-center gap-3">
             <span className="text-brass text-sm font-mono">00</span> System Parameters
           </h3>
           <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
             <div>
               <label htmlFor="brief-brand-name" className={classes.labelMono}>Brand Identity</label>
               <input id="brief-brand-name" type="text" value={brandInfo.brandName} onChange={e => setBrandInfo({...brandInfo, brandName: e.target.value})} className={classes.glassInput} />
             </div>
             <div>
               <label htmlFor="brief-primary-target" className={classes.labelMono}>Primary Target</label>
               <input id="brief-primary-target" type="text" value={brandInfo.primaryPersona} onChange={e => setBrandInfo({...brandInfo, primaryPersona: e.target.value})} className={classes.glassInput} />
             </div>
           </div>
        </div>

        <div className={classes.glassCard}>
          <h3 className="text-xl font-serif text-text1 mb-8 border-b border-subtle pb-4 flex items-center gap-3">
             <span className="text-brass text-sm font-mono">01</span> The Honest Now
          </h3>
          <div className="space-y-8">
            <div>
              <label htmlFor="brief-bottleneck" className={classes.labelMono}>Commercial Bottleneck (The Actual One)</label>
              <textarea id="brief-bottleneck" value={brief.bottleneck} onChange={e => setBrief({...brief, bottleneck: e.target.value})} className={`${classes.glassInput} min-h-[100px]`} />
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 items-end">
              <div className="md:col-span-2">
                <label htmlFor="brief-next-month" className={classes.labelMono}>The "Next Month" Delay</label>
                <input id="brief-next-month" type="text" value={brief.nextMonth} onChange={e => setBrief({...brief, nextMonth: e.target.value})} className={classes.glassInput} />
              </div>
              <div>
                <label htmlFor="brief-months-delayed" className={classes.labelMono}>Months Delayed</label>
                <input id="brief-months-delayed" type="number" value={brief.nextMonthDelay} onChange={e => setBrief({...brief, nextMonthDelay: e.target.value})} className={classes.glassInput} />
              </div>
            </div>
            <div>
              <label htmlFor="brief-working" className={classes.labelMono}>Organic Growth Vector (If doing nothing new)</label>
              <input id="brief-working" type="text" value={brief.working} onChange={e => setBrief({...brief, working: e.target.value})} className={classes.glassInput} />
            </div>
            <div>
              <label htmlFor="brief-persona-gap" className={classes.labelMono}>Critical Gap for <span className="text-patina">{brandInfo.primaryPersona || 'Target'}</span></label>
              <input id="brief-persona-gap" type="text" value={brief.personaGap} onChange={e => setBrief({...brief, personaGap: e.target.value})} className={classes.glassInput} />
            </div>
          </div>
        </div>

        <div className={classes.glassCard}>
          <h3 className="text-xl font-serif text-text1 mb-8 border-b border-subtle pb-4 flex items-center gap-3">
             <span className="text-brass text-sm font-mono">02</span> Future Horizon
          </h3>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
             <div>
               <label htmlFor="brief-revenue" className={classes.labelMono}>3-Year Revenue</label>
               <input id="brief-revenue" type="text" value={brief.revenue} onChange={e => setBrief({...brief, revenue: e.target.value})} className={classes.glassInput} />
             </div>
             <div>
               <label htmlFor="brief-team-size" className={classes.labelMono}>Team Volume</label>
               <input id="brief-team-size" type="text" value={brief.teamSize} onChange={e => setBrief({...brief, teamSize: e.target.value})} className={classes.glassInput} />
             </div>
             <div>
               <label htmlFor="brief-key-metric" className={classes.labelMono}>Primary Metric</label>
               <input id="brief-key-metric" type="text" value={brief.keyMetric} onChange={e => setBrief({...brief, keyMetric: e.target.value})} className={classes.glassInput} />
             </div>
          </div>
          <div>
            <label htmlFor="brief-constraint" className={classes.labelMono}>Binding Constraint</label>
            <select id="brief-constraint" value={brief.constraint} onChange={e => setBrief({...brief, constraint: e.target.value})} className={`${classes.glassInput} cursor-pointer`}>
              {CONSTRAINTS.map(c => <option key={c} value={c} className="bg-base text-text1">{c}</option>)}
            </select>
          </div>
        </div>
      </div>
    </div>
  );

  const renderBrainstorm = () => (
    <div className="max-w-6xl mx-auto space-y-12 animate-in slide-in-from-right-8 duration-500 mt-8">
      <div className="flex justify-between items-end border-b border-subtle pb-6">
        <div>
          <h2 className={`text-4xl md:text-5xl ${classes.headline} mb-4`}>Phase 2: The Brainstorm</h2>
          <p className={classes.hook}>Generate everything. Commit to nothing. Yet.</p>
        </div>
        <div className="text-right flex flex-col items-end">
          <span className="font-mono text-[9px] uppercase tracking-[0.2em] text-patina mb-2">Total Assets</span>
          <span className="text-6xl font-serif text-patina leading-none">{initiatives.length}</span>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
        <div className={`${classes.glassCard} lg:col-span-1 h-fit sticky top-24 border-t-2 border-t-patina`}>
          <h3 className="font-serif text-2xl text-text1 mb-8 flex items-center gap-3">
            <Plus className="w-5 h-5 text-patina"/> Input Asset
          </h3>
          <div className="space-y-6">
            <div>
              <label htmlFor="initiative-name" className={classes.labelMono}>Asset Designation</label>
              <input id="initiative-name" type="text" value={newInitiative.name} onChange={e => setNewInitiative({...newInitiative, name: e.target.value})} className={classes.glassInput} />
            </div>
            <div>
              <label htmlFor="initiative-pillar" className={classes.labelMono}>Pillar Classification</label>
              <select id="initiative-pillar" value={newInitiative.pillar} onChange={e => setNewInitiative({...newInitiative, pillar: e.target.value})} className={classes.glassInput}>
                {PILLARS.map(p => <option key={p.id} value={p.id} className="bg-base">{p.label}</option>)}
              </select>
            </div>
            <div>
              <label htmlFor="initiative-description" className={classes.labelMono}>Operational Description</label>
              <textarea id="initiative-description" value={newInitiative.description} onChange={e => setNewInitiative({...newInitiative, description: e.target.value})} className={classes.glassInput} rows="3" />
            </div>
            <div>
              <label htmlFor="initiative-persona" className={classes.labelMono}>Target Persona</label>
              <input id="initiative-persona" type="text" value={newInitiative.persona} onChange={e => setNewInitiative({...newInitiative, persona: e.target.value})} className={classes.glassInput} placeholder={brandInfo.primaryPersona} />
            </div>
            <div className="pt-2">
              <button onClick={handleAddInitiative} disabled={!newInitiative.name} className={classes.primaryBtn}>
                Write to Memory
              </button>
            </div>
          </div>
        </div>

        <div className="lg:col-span-2 space-y-6">
          {initiatives.length === 0 ? (
            <div className={`${classes.glassCard} flex flex-col items-center justify-center py-24 text-center border-dashed border-medium`}>
              <BrainCircuit className="w-16 h-16 mb-6 text-text4" strokeWidth={1} />
              <p className={classes.labelMono}>Memory Bank Empty</p>
              <p className="text-base text-text3">Initiate upload sequence across the 5 pillars.</p>
            </div>
          ) : (
            <div className="space-y-4">
              {initiatives.map(init => {
                const pillarStyle = PILLARS.find(p => p.id === init.pillar);
                return (
                  <div key={init.id} className={`${classes.glassCard} p-6 md:p-8 flex justify-between items-start gap-4 border-l-[3px] ${pillarStyle.border}`}>
                    <div>
                      <div className="flex items-center gap-3 mb-4">
                        <span className={`${classes.pill} ${pillarStyle.color}`}>{init.pillar}</span>
                        {init.persona && <span className={`${classes.pill} border-medium text-text3`}>USR: {init.persona}</span>}
                      </div>
                      <h4 className="font-serif text-2xl text-text1 mb-2">{init.name}</h4>
                      <p className="text-sm text-text2 leading-relaxed">{init.description}</p>
                    </div>
                    <button onClick={() => setInitiatives(initiatives.filter(i => i.id !== init.id))} className="text-text4 hover:text-[var(--phase-content)] p-2 transition-colors active:scale-95">
                      <Trash2 className="w-5 h-5"/>
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );

  const renderInterrogation = () => (
    <div className="max-w-5xl mx-auto space-y-12 animate-in slide-in-from-right-8 duration-500 mt-8">
      <div className={`${classes.glassCard} manifesto-block border-none rounded-none bg-transparent shadow-none p-0`}>
        <h2 className="text-4xl font-serif text-text1 flex items-center gap-4 mb-4">
          <ShieldAlert className="w-7 h-7 text-brass"/> Phase 3: Interrogation
        </h2>
        <p className={classes.hook}>Every initiative must earn its place. Expand and defend.</p>
      </div>

      <div className="space-y-6 mt-10">
        {initiatives.length === 0 && <p className={`${classes.labelMono} text-center py-12`}>No initiatives in memory. Return to Phase 2.</p>}
        {initiatives.map(init => (
          <div key={init.id} className={`${classes.glassCard} p-0 transition-all duration-300 ${expandedInterrogation === init.id ? 'ring-1 ring-brass-dim' : ''}`}>
            <div
              className="p-6 md:p-8 flex justify-between items-center cursor-pointer hover:bg-surface transition-colors group"
              onClick={() => setExpandedInterrogation(expandedInterrogation === init.id ? null : init.id)}
            >
              <div className="flex items-center gap-6">
                 <div className={`w-8 h-8 rounded-full border flex items-center justify-center font-mono text-xs transition-colors ${expandedInterrogation === init.id ? 'border-brass text-brass' : 'border-medium text-text3 group-hover:border-text2 group-hover:text-text2'}`}>
                   {expandedInterrogation === init.id ? '−' : '+'}
                 </div>
                 <h4 className="font-serif text-2xl text-text1">{init.name}</h4>
              </div>
              {Object.values(init.interrogation).every(v => v.trim() !== '') && <CheckCircle2 className="text-patina w-6 h-6" />}

          <button
            onClick={toggleTheme}
            className="w-9 h-9 rounded-full border border-subtle flex items-center justify-center hover:bg-surface transition-all focus:outline-none"
            aria-label="Toggle Theme"
          >
            {theme === 'dark' ? (
              <Sun className="w-4 h-4 text-text2" />
            ) : (
              <Moon className="w-4 h-4 text-text2" />
            )}
          </button>
        </div>
      </div>

      {/* Main Content Area */}
      <main className="flex-1 pt-32 pb-40 px-6 md:px-12 relative z-10 w-full max-w-[1440px] mx-auto">
        {phase === 0 && renderIntro()}
        {phase === 1 && renderBrief()}
        {phase === 2 && renderBrainstorm()}
        {phase === 3 && renderInterrogation()}
        {phase === 4 && renderScoring()}
        {phase === 5 && renderTradeOffs()}
        {phase === 6 && renderUnlock()}
        {phase === 7 && renderRoadmap()}
        {phase === 8 && renderSynthesis()}
      </main>

      {/* Bottom Action Bar */}
      <div className="fixed bottom-0 left-0 right-0 p-6 bg-overlay backdrop-blur-xl border-t border-subtle flex justify-between items-center z-50 transition-colors duration-500">
        <button
          onClick={() => setPhase(Math.max(0, phase - 1))}
          disabled={phase === 0}
          className="flex items-center gap-3 px-6 py-3 rounded-[6px] font-mono text-[10px] uppercase tracking-[0.2em] font-bold text-text3 hover:text-text1 hover:bg-surface transition-all disabled:opacity-30 disabled:pointer-events-none active:scale-95"
        >
          <ChevronLeft className="w-4 h-4"/> Return
        </button>

        <div className="flex items-center gap-6">
          {!canProceed && validationMessage && (
            <span className="font-mono text-[9px] font-bold text-[var(--phase-content)] uppercase tracking-[0.1em] flex items-center gap-2 animate-in fade-in slide-in-from-right-2">
              <AlertCircle className="w-4 h-4"/> <span className="hidden md:inline">{validationMessage}</span>
            </span>
          )}

          {phase < 8 ? (
            <button
              onClick={() => setPhase(Math.min(PHASES.length - 1, phase + 1))}
              disabled={!canProceed}
              className="btn-primary !w-auto flex items-center gap-3 px-8"
            >
              Execute <ChevronRight className="w-4 h-4"/>
            </button>
          ) : (
            <button
              onClick={() => window.print()}
              className="btn-secondary !w-auto flex items-center gap-3 px-8"
            >
              <Download className="w-4 h-4"/> Print Record
            </button>
          )}
        </div>
      </div>


      {/* Toast Notification */}
      {toast && (
        <div
          role="alert"
          className={`fixed top-6 right-6 z-[9999] glass-card px-6 py-4 font-mono text-[10px] uppercase tracking-[0.15em] flex items-center gap-3 transition-all duration-300 ${
            toast.type === 'error' ? 'text-[var(--phase-content)]' : 'text-patina'
          }`}
        >
          {toast.type === 'error'
            ? <AlertCircle className="w-4 h-4 flex-shrink-0" />
            : <CheckCircle2 className="w-4 h-4 flex-shrink-0" />}
          {toast.message}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
