<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB BrandOS — The War Table</title>
<meta name="description" content="The War Table · QB BrandOS Phase 01 — score, interrogate, and prioritise your strategic initiatives.">
<script>(function(){try{var t=localStorage.getItem('qb-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark')}catch(e){}})();</script>
<script src="/qb-cloud.js"></script>
<script src="/qb-gate.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Figtree:wght@300..900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box }
:root{
  --cream:          #F4F0EB;
  --cream-soft:     #EDE8E2;
  --cream-deep:     #E6E0D8;
  --cream-edge:     rgba(100,80,50,0.10);
  --cream-line:     rgba(100,80,50,0.14);
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(100,80,50,0.04);
  --bg-elevated:    rgba(100,80,50,0.07);
  --bg-overlay:     rgba(244,240,235,0.9);
  --border-subtle:  rgba(100,80,50,0.08);
  --border-medium:  rgba(100,80,50,0.14);
  --border-strong:  rgba(100,80,50,0.22);
  --ink:            #1A1610;
  --ink-soft:       #5A5040;
  --ink-mute:       #8A7E70;
  --ink-faint:      #B8AEA0;
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina:         #3A5F4A;
  --patina-lit:     #4A7A5E;
  --patina-dim:     rgba(58,95,74,0.15);
  --patina-faint:   rgba(58,95,74,0.06);
  --patina-deep:    #0E1C17;
  --brass:          #A8903E;
  --brass-lit:      #C4A84E;
  --brass-dim:      rgba(168,144,62,0.15);
  --brass-faint:    rgba(168,144,62,0.06);
  --terra:          #C4654A;
  --terra-lit:      #D4785E;
  --plum:           #7A5A6E;
  --plum-lit:       #9A7A8E;
  --warmred:        #8A4A4A;
  --pill-bg:        #F3E9C9;
  --pill-bg-hover:  #EFE1B4;
  --pill-border:    #A8903E;
  --pill-ink:       #1A1610;
  --f-display:      'EB Garamond','Cormorant Garamond',Georgia,serif;
  --f-body:         'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --f-mono:         'JetBrains Mono',ui-monospace,monospace;
  --ease:           cubic-bezier(.22,1,.36,1);
  --r-pill:         999px;
  --r-card:         16px;
  --r-card-lg:      24px;
  --nav-h:          74px;
  --container:      1280px;
}
[data-theme="dark"]{
  --cream:          #080604;
  --cream-soft:     #0A0806;
  --cream-deep:     #12100C;
  --cream-edge:     rgba(140,110,70,0.06);
  --cream-line:     rgba(140,110,70,0.11);
  --bg-void:        var(--cream);
  --bg-deep:        var(--cream-soft);
  --bg-base:        var(--cream-deep);
  --bg-surface:     rgba(140,110,70,0.045);
  --bg-elevated:    rgba(140,110,70,0.07);
  --bg-overlay:     rgba(18,15,10,0.85);
  --border-subtle:  rgba(140,110,70,0.06);
  --border-medium:  rgba(140,110,70,0.11);
  --border-strong:  rgba(140,110,70,0.18);
  --ink:            #EEE5D2;
  --ink-soft:       #A8A092;
  --ink-mute:       #6F6A5E;
  --ink-faint:      #3E3830;
  --text-1:         var(--ink);
  --text-2:         var(--ink-soft);
  --text-3:         var(--ink-mute);
  --text-4:         var(--ink-faint);
  --patina-dim:     rgba(58,95,74,0.2);
  --patina-faint:   rgba(58,95,74,0.08);
  --brass-dim:      rgba(168,144,62,0.18);
  --warmred:        #B06767;
  --pill-bg:        #2A2318;
  --pill-bg-hover:  #3A2E1F;
  --pill-border:    #A8903E;
  --pill-ink:       #EEE5D2;
}
html{ -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; scroll-behavior:smooth; background:var(--bg-void); }
body{
  font-family:var(--f-body); font-weight:400;
  background:var(--bg-void); color:var(--text-2);
  min-height:100vh; position:relative; overflow-x:hidden;
  transition:background .5s ease, color .3s ease;
}
body::after{
  content:''; position:fixed; inset:0; z-index:9999;
  pointer-events:none; opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
[data-theme="dark"] body::after{ opacity:.05; }
a{ color:inherit; text-decoration:none; }
img{ display:block; max-width:100%; }
button{ font-family:inherit; }

.vignette{
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(200,190,175,0.08) 100%);
}
[data-theme="dark"] .vignette{
  background:radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(8,6,4,0.35) 100%);
}

/* ================== BUTTONS (ecosystem parity) ================== */
.btn{
  display:inline-flex; align-items:center; justify-content:center;
  gap:.55em;
  font-family:var(--f-body); font-weight:500; font-size:.94rem;
  padding:14px 24px;
  border-radius:var(--r-pill);
  border:1px solid var(--ink);
  background:transparent; color:var(--ink);
  transition:all .25s var(--ease);
  white-space:nowrap; text-decoration:none !important;
  cursor:pointer;
}
.btn:hover{ background:var(--ink); color:var(--cream); }
@property --eco-angle{ syntax:'<angle>'; initial-value:0deg; inherits:false; }
.btn-primary{
  background:var(--pill-bg) !important;
  border-color:var(--pill-border) !important;
  color:var(--pill-ink) !important;
  position:relative; isolation:isolate;
}
.btn-primary::before{
  content:''; position:absolute; inset:-3px;
  background:conic-gradient(from var(--eco-angle), var(--patina), var(--brass), var(--terra), var(--plum), var(--patina));
  border-radius:999px; z-index:-1; opacity:0;
  transition:opacity .4s ease;
  animation:ecoSpin 6s linear infinite;
  filter:blur(10px);
}
@keyframes ecoSpin{ to{ --eco-angle:360deg; } }
.btn-primary:hover::before{ opacity:.75; }
.btn-primary:hover{
  background:var(--pill-bg-hover) !important;
  border-color:var(--pill-ink) !important;
  transform:translateY(-1px);
  box-shadow:0 14px 40px -12px rgba(168,144,62,.35) !important;
}
.btn-primary:disabled{ opacity:.45; cursor:not-allowed; transform:none; }
.btn-primary:disabled::before{ display:none; }
.btn-ghost{ border-color:transparent; }
.btn-ghost:hover{ background:transparent; color:var(--ink); text-decoration:underline; text-underline-offset:4px; }
.btn-sm{ padding:10px 18px; font-size:.85rem; }
.btn-lg{ padding:17px 30px; font-size:1rem; }

/* ================== NAV (pill, ecosystem parity) ================== */
.nav-spacer{ height:28px; width:100%; flex-shrink:0; }
.nav{
  position:sticky; top:18px; z-index:50;
  padding:0 20px; width:100%;
}
.nav-inner{
  max-width:1160px; margin-inline:auto;
  background:var(--cream);
  border:1px solid var(--cream-line);
  border-radius:var(--r-pill);
  padding:8px 10px 8px 24px;
  display:flex; align-items:center; justify-content:space-between;
  gap:20px;
  box-shadow:0 6px 30px -18px rgba(26,22,16,.18);
}
.nav-brand{ display:flex; align-items:center; gap:10px; font-family:var(--f-display); font-size:1.25rem; color:var(--ink); font-weight:500; padding:6px 0; }
.nav-brand .dot{ width:10px; height:10px; border-radius:50%; background:var(--brass); box-shadow:0 0 0 3px var(--brass-faint); animation:pulseDot 3s var(--ease) infinite; }
@keyframes pulseDot{ 0%,100%{ transform:scale(1); box-shadow:0 0 0 3px var(--brass-faint); } 50%{ transform:scale(1.15); box-shadow:0 0 0 5px rgba(168,144,62,.05); } }
.nav-links{ display:flex; align-items:center; gap:4px; list-style:none; }
.nav-links a{ padding:10px 16px; border-radius:var(--r-pill); font-size:.92rem; font-weight:500; color:var(--ink-soft); transition:all .2s var(--ease); }
.nav-links a:hover{ background:var(--cream-deep); color:var(--ink); }
.nav-actions{ display:flex; align-items:center; gap:6px; }
.theme-toggle{ width:36px; height:36px; border-radius:50%; border:1px solid var(--cream-line); display:flex; align-items:center; justify-content:center; font-size:1rem; color:var(--ink-mute); cursor:pointer; background:transparent; flex-shrink:0; transition:all .25s var(--ease); }
.theme-toggle:hover{ border-color:var(--brass); color:var(--brass); background:var(--brass-faint); }
.hamburger{ display:none; width:42px; height:42px; border-radius:var(--r-pill); border:1px solid var(--cream-line); background:transparent; cursor:pointer; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
.hamburger span{ display:block; width:18px; height:1.5px; background:var(--ink); transition:.25s; }
.hamburger.open span:nth-child(1){ transform:translateY(5.5px) rotate(45deg); }
.hamburger.open span:nth-child(2){ opacity:0; }
.hamburger.open span:nth-child(3){ transform:translateY(-5.5px) rotate(-45deg); }
@media(max-width:960px){
  .nav-links, .nav .btn-ghost{ display:none; }
  .hamburger{ display:flex; }
  .nav-brand{ font-size:1.1rem; }
  .nav-inner{ padding:8px 8px 8px 20px; }
}
.mmenu{ position:fixed; inset:0; z-index:100; background:var(--cream); display:none; flex-direction:column; padding:28px; }
.mmenu.open{ display:flex; }
.mmenu-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
.mmenu-close{ width:42px; height:42px; border-radius:50%; border:1px solid var(--cream-line); background:transparent; font-size:1.2rem; color:var(--ink); cursor:pointer; }
.mmenu-list{ display:flex; flex-direction:column; gap:6px; }
.mmenu-list a{ font-family:var(--f-display); font-size:2rem; padding:10px 0; color:var(--ink); border-bottom:1px solid var(--cream-line); }
.mmenu-foot{ margin-top:auto; padding-top:28px; }
[data-theme="dark"] .nav-inner{ background:rgba(18,15,10,.85); border-color:rgba(140,110,70,.15); -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px); }
[data-theme="dark"] .nav-links a{ color:var(--ink-mute); }
[data-theme="dark"] .nav-links a:hover{ background:rgba(140,110,70,.08); color:var(--ink); }
[data-theme="dark"] .btn{ border-color:rgba(140,110,70,.2); color:var(--ink); }
[data-theme="dark"] .btn:hover{ background:var(--ink); color:var(--cream); }
[data-theme="dark"] .btn-ghost{ color:var(--ink-soft); }

/* ================== TYPE PRIMITIVES ================== */
.label-mono{
  display:block;
  font-family:var(--f-mono); font-size:10px; font-weight:500;
  text-transform:uppercase; letter-spacing:.2em;
  color:var(--text-3);
  margin-bottom:12px;
}
.headline{
  font-family:var(--f-display); font-weight:500;
  color:var(--text-1); letter-spacing:-.015em; line-height:1.04;
}
.hook{
  font-family:var(--f-display); font-style:italic;
  color:var(--text-2); font-size:clamp(1.1rem, 2.2vw, 1.4rem);
  line-height:1.5;
}
.pill-mono{
  display:inline-block;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  padding:6px 10px; border-radius:4px;
  border:1px solid var(--border-medium);
  background:var(--bg-surface);
  color:var(--text-2);
}

/* ================== CARDS / INPUTS ================== */
.glass-card{
  background:var(--bg-surface);
  border:1px solid var(--border-medium);
  -webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);
  border-radius:var(--r-card);
  transition:border-color .3s ease, background .3s ease;
}
.glass-card.padded{ padding:clamp(28px, 3vw, 40px); }
.glass-input{
  width:100%;
  padding:14px 16px;
  font-family:var(--f-body); font-size:15px;
  color:var(--text-1);
  background:var(--bg-elevated);
  border:1px solid var(--border-subtle);
  border-radius:8px;
  outline:none;
  transition:border-color .2s, background .2s;
}
.glass-input:focus{ border-color:var(--brass); background:var(--bg-surface); }
.glass-input::placeholder{ color:var(--text-4); font-style:italic; }
textarea.glass-input{ resize:vertical; min-height:96px; line-height:1.55; }
select.glass-input{ cursor:pointer; appearance:none; background-image:linear-gradient(45deg, transparent 50%, var(--text-3) 50%), linear-gradient(135deg, var(--text-3) 50%, transparent 50%); background-position: calc(100% - 18px) 50%, calc(100% - 12px) 50%; background-size:6px 6px; background-repeat:no-repeat; padding-right:40px; }

.btn-secondary{
  display:inline-flex; align-items:center; justify-content:center; gap:.55em;
  padding:12px 20px;
  border-radius:8px;
  border:1px solid var(--border-strong);
  background:transparent;
  color:var(--text-1);
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  cursor:pointer;
  transition:all .2s;
}
.btn-secondary:hover{ background:var(--bg-surface); border-color:var(--brass); color:var(--brass); }

/* ================== TOP PHASE NAV ================== */
.wt-phase-nav{
  max-width:1160px; margin:28px auto 0;
  padding:16px 28px;
  display:flex; align-items:center; justify-content:space-between; gap:18px;
  background:var(--bg-overlay);
  -webkit-backdrop-filter:blur(18px);
  backdrop-filter:blur(18px);
  border:1px solid var(--border-medium);
  border-radius:999px;
  flex-wrap:wrap;
}
.wt-phase-dots{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.wt-phase-dot{
  width:30px; height:30px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--f-mono); font-size:10px; font-weight:700;
  background:transparent; color:var(--text-3);
  border:1px solid var(--border-medium);
  cursor:pointer;
  transition:all .25s var(--ease);
}
.wt-phase-dot.active{ background:var(--text-1); color:var(--cream); border-color:transparent; transform:scale(1.1); box-shadow:0 0 0 4px var(--brass-faint); }
.wt-phase-dot:disabled, .wt-phase-dot.locked{ opacity:.4; cursor:not-allowed; border-color:var(--border-subtle); color:var(--text-4); }
.wt-phase-dot:not(.locked):not(.active):hover{ border-color:var(--brass); color:var(--brass); }
.wt-phase-sep{ width:10px; height:1px; background:var(--border-medium); }
.wt-phase-meta{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.28em;
  color:var(--text-3);
  white-space:nowrap;
}

/* ================== MAIN CONTENT ================== */
.wt-main{
  max-width:1240px; margin:0 auto;
  padding:56px 24px 140px;
  position:relative; z-index:2;
}
.wt-phase{ display:flex; flex-direction:column; gap:48px; }
.wt-phase-head{
  display:flex; flex-direction:column; gap:16px;
  padding-bottom:24px;
  border-bottom:1px solid var(--border-subtle);
}
.wt-phase-head h2{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(2.5rem, 5vw, 3.5rem);
  letter-spacing:-.02em; line-height:1.02;
  color:var(--text-1);
}
.wt-phase-head .kicker{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  color:var(--brass);
}

/* Intro phase */
.wt-intro{ max-width:920px; margin:0 auto; display:flex; flex-direction:column; gap:60px; }
.wt-intro-hero{ text-align:center; display:flex; flex-direction:column; gap:28px; }
.wt-intro-hero h1{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(3.25rem, 8vw, 6rem);
  letter-spacing:-.025em; line-height:.98;
  color:var(--text-1);
}
.wt-intro-hero .separator{ width:96px; height:1px; background:var(--brass); margin:0 auto; opacity:.6; }
.wt-intro-philosophy{
  display:flex; flex-direction:column; gap:32px;
}
.wt-intro-philosophy .phil-row{
  display:flex; gap:24px; align-items:flex-start;
}
.wt-intro-philosophy .phil-num{
  font-family:var(--f-mono); font-size:12px; font-weight:700;
  color:var(--brass); min-width:24px; padding-top:4px;
}
.wt-intro-philosophy .phil-body{
  font-family:var(--f-body); font-size:16px; line-height:1.75;
  color:var(--text-2);
}
.wt-intro-philosophy .phil-body strong{ color:var(--text-1); font-weight:600; }
.wt-intro-warn{
  padding:32px;
  border-radius:var(--r-card);
  border:1px solid var(--terra);
  background:rgba(196,101,74,.07);
  display:flex; flex-direction:column; gap:14px;
}
.wt-intro-warn h3{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.26em;
  font-weight:700; color:var(--terra);
}
.wt-intro-warn p{
  font-family:var(--f-body); font-size:15.5px; line-height:1.7;
  color:var(--text-2);
}
.wt-intro-warn em{ color:var(--terra); font-style:italic; font-weight:500; }

/* Brief cards */
.wt-card-h{
  font-family:var(--f-display); font-size:1.4rem; color:var(--text-1);
  font-weight:500;
  padding-bottom:20px; border-bottom:1px solid var(--border-subtle);
  margin-bottom:28px;
  display:flex; align-items:center; gap:12px;
}
.wt-card-h .idx{ font-family:var(--f-mono); font-size:12px; color:var(--brass); font-weight:700; }
.wt-field-grid{ display:grid; grid-template-columns:1fr; gap:28px; }
@media(min-width:760px){
  .wt-field-grid.two{ grid-template-columns:1fr 1fr; }
  .wt-field-grid.three{ grid-template-columns:repeat(3, 1fr); }
  .wt-field-grid.two-one{ grid-template-columns:2fr 1fr; align-items:end; }
}

/* Brainstorm */
.wt-brainstorm{
  display:grid; grid-template-columns:1fr; gap:32px;
}
@media(min-width:960px){ .wt-brainstorm{ grid-template-columns:minmax(0, 360px) 1fr; } }
.wt-input-card{
  border-top:2px solid var(--patina);
  position:sticky; top:130px; align-self:start;
}
.wt-input-card h3{
  font-family:var(--f-display); font-size:1.4rem;
  color:var(--text-1); margin-bottom:24px;
}
.wt-initiative-card{
  border-left:3px solid var(--brass);
  display:flex; justify-content:space-between; gap:20px; align-items:flex-start;
}
.wt-initiative-card .meta{ flex:1; display:flex; flex-direction:column; gap:14px; }
.wt-initiative-card .pills-row{ display:flex; gap:8px; flex-wrap:wrap; }
.wt-initiative-card h4{
  font-family:var(--f-display); font-size:1.5rem; color:var(--text-1); font-weight:500;
  letter-spacing:-.01em;
}
.wt-initiative-card p{
  font-family:var(--f-body); font-size:14px; line-height:1.6; color:var(--text-2);
}
.wt-delete-btn{
  width:38px; height:38px; border-radius:8px;
  background:transparent; border:1px solid var(--border-subtle);
  display:inline-flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--text-3);
  transition:all .2s;
}
.wt-delete-btn:hover{ color:var(--terra); border-color:var(--terra); background:rgba(196,101,74,.06); }
.wt-empty-bank{
  border:2px dashed var(--border-medium);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:80px 24px;
  text-align:center; gap:10px;
}
.wt-empty-bank .icon{ width:48px; height:48px; color:var(--text-4); margin-bottom:14px; }

/* Interrogation accordion */
.wt-interrogate{
  display:flex; flex-direction:column; gap:18px;
}
.wt-interrogate-row{
  padding:0;
  overflow:hidden;
  transition:border-color .3s ease, background .3s ease;
}
.wt-interrogate-row.active{ border-color:var(--brass); }
.wt-interrogate-head{
  padding:24px 28px;
  display:flex; justify-content:space-between; align-items:center;
  cursor:pointer; gap:16px;
  transition:background .2s;
}
.wt-interrogate-head:hover{ background:var(--bg-surface); }
.wt-interrogate-head .left{ display:flex; align-items:center; gap:20px; }
.wt-interrogate-head .toggle{
  width:34px; height:34px; border-radius:50%;
  border:1px solid var(--border-medium);
  display:inline-flex; align-items:center; justify-content:center;
  color:var(--text-3);
  font-family:var(--f-mono); font-size:14px;
  transition:all .3s;
}
.wt-interrogate-row.active .toggle{ border-color:var(--brass); color:var(--brass); }
.wt-interrogate-head h4{
  font-family:var(--f-display); font-size:1.35rem; color:var(--text-1); font-weight:500;
}
.wt-interrogate-check{ color:var(--patina); font-size:18px; }
.wt-interrogate-body{
  max-height:0; opacity:0; overflow:hidden;
  transition:max-height .45s ease, opacity .45s ease;
}
.wt-interrogate-row.active .wt-interrogate-body{
  max-height:2000px; opacity:1;
}
.wt-interrogate-body-inner{
  padding:28px; border-top:1px solid var(--border-subtle);
  background:var(--bg-deep);
  display:flex; flex-direction:column; gap:28px;
}
.wt-interrogate-q{ display:flex; flex-direction:column; gap:10px; }
.wt-interrogate-q .q-label{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.24em;
  color:var(--brass); font-weight:600;
}
.wt-interrogate-q .q-hint{
  font-family:var(--f-body); font-size:13px; font-style:italic;
  color:var(--text-3);
}

/* Scoring table */
.wt-scoring-wrap{
  overflow-x:auto;
  border-radius:var(--r-card);
  border:1px solid var(--border-medium);
  background:var(--bg-surface);
}
.wt-scoring{
  width:100%;
  min-width:980px;
  border-collapse:collapse;
  color:var(--text-1);
}
.wt-scoring th{
  text-align:center;
  padding:18px 10px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em;
  color:var(--text-3); font-weight:500;
  border-bottom:1px solid var(--border-subtle);
  background:var(--bg-overlay);
  -webkit-backdrop-filter:blur(18px);
  backdrop-filter:blur(18px);
  position:sticky; top:0; z-index:2;
}
.wt-scoring th.asset{ text-align:left; padding-left:24px; min-width:240px; }
.wt-scoring th.output{ text-align:right; padding-right:24px; min-width:130px; }
.wt-scoring th .mult{ display:block; color:var(--text-4); font-size:9px; margin-bottom:6px; letter-spacing:.18em; }
.wt-scoring th.capture .mult{ color:var(--brass); }
.wt-scoring td{
  padding:14px 10px;
  border-top:1px solid var(--border-subtle);
  font-family:var(--f-body); font-size:14px;
  vertical-align:middle;
}
.wt-scoring tr:hover td{ background:var(--bg-surface); }
.wt-scoring .asset-cell{ padding:18px 24px; }
.wt-scoring .asset-cell .name{ font-family:var(--f-display); font-size:1.2rem; color:var(--text-1); margin-bottom:4px; }
.wt-scoring .asset-cell .pillar-tag{ font-family:var(--f-mono); font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--text-3); }
.wt-scoring .num-input{
  width:56px; padding:8px 0;
  text-align:center;
  font-family:var(--f-mono); font-size:14px;
  color:var(--text-1);
  background:var(--bg-deep);
  border:1px solid var(--border-subtle);
  border-radius:6px;
  outline:none;
  transition:border-color .2s;
}
.wt-scoring .num-input:focus{ border-color:var(--brass); }
.wt-scoring .capture-cb{
  width:18px; height:18px; accent-color:var(--brass); cursor:pointer;
}
.wt-scoring .output-cell{
  padding:18px 24px; text-align:right;
  display:flex; flex-direction:column; align-items:flex-end; gap:8px;
}
.wt-scoring .output-cell .score{ font-family:var(--f-display); font-size:2rem; color:var(--text-1); font-weight:500; line-height:1; }
.wt-scoring-empty{
  padding:72px 24px; text-align:center;
  font-family:var(--f-mono); font-size:11px;
  text-transform:uppercase; letter-spacing:.24em;
  color:var(--text-4); font-style:italic;
}

/* Band pills */
.band{
  display:inline-block;
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.22em;
  padding:5px 10px; border-radius:4px;
  font-weight:600;
  border:1px solid transparent;
}
.band.NOW{ background:var(--patina); color:var(--cream); }
.band.NEXT{ background:var(--brass); color:var(--cream); }
.band.LATER{ background:var(--bg-surface); color:var(--text-2); border-color:var(--border-medium); }
.band.PARK{ background:transparent; color:var(--text-3); border-color:var(--border-strong); }

/* Trade-offs */
.wt-arena{
  position:relative;
  border-top:2px solid var(--brass);
  padding:clamp(28px, 3vw, 40px);
  display:flex; flex-direction:column; gap:24px;
}
.wt-arena .conflict-tag{
  position:absolute; top:0; right:0;
  background:var(--brass); color:var(--cream);
  padding:6px 12px;
  border-bottom-left-radius:8px;
  font-family:var(--f-mono); font-size:9px; font-weight:700;
  text-transform:uppercase; letter-spacing:.22em;
}
.wt-arena h3{
  font-family:var(--f-display); font-size:clamp(1.75rem, 3vw, 2.25rem); color:var(--text-1);
  font-weight:500; letter-spacing:-.015em;
}
.wt-arena .sub{
  font-family:var(--f-display); font-style:italic;
  color:var(--text-2); font-size:1.05rem;
}
.wt-vs{
  display:flex; gap:14px; align-items:stretch;
}
.wt-vs .slot{
  flex:1;
  padding:22px; border:1px solid var(--border-subtle);
  background:var(--bg-deep);
  border-radius:8px;
  font-family:var(--f-display); font-size:1.25rem; color:var(--text-1);
  text-align:center;
}
.wt-vs .vs{
  display:flex; align-items:center; justify-content:center;
  padding:0 8px; color:var(--text-4);
  font-family:var(--f-mono); font-size:11px; font-weight:700;
}

/* Unlock / Lead */
.wt-unlock{
  max-width:480px; margin:80px auto 0;
  display:flex; flex-direction:column; gap:40px; text-align:center;
}
.wt-lock-icon{
  width:84px; height:84px; border-radius:50%;
  background:var(--patina-faint);
  border:1px solid var(--patina-dim);
  color:var(--patina);
  display:flex; align-items:center; justify-content:center;
  margin:0 auto;
  position:relative;
}
.wt-lock-icon::before{
  content:''; position:absolute; inset:-6px;
  border:1px solid var(--patina); border-radius:50%;
  animation:lockRing 2s cubic-bezier(0,0,.2,1) infinite;
  opacity:.25;
}
@keyframes lockRing{ 0%{ transform:scale(1); opacity:.45; } 100%{ transform:scale(1.35); opacity:0; } }
.wt-lead-form{
  padding:clamp(32px, 4vw, 48px);
  display:flex; flex-direction:column; gap:28px;
  border-color:var(--patina-dim);
  position:relative;
  text-align:left;
}
.wt-submit-overlay{
  position:absolute; inset:0;
  background:var(--bg-overlay);
  -webkit-backdrop-filter:blur(10px);
  backdrop-filter:blur(10px);
  border-radius:var(--r-card);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:24px; z-index:10;
}
.wt-submit-spinner{
  width:44px; height:44px; border-radius:50%;
  border:2px solid var(--patina); border-top-color:transparent;
  animation:spin 1s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* Roadmap */
.wt-roadmap{ display:flex; flex-direction:column; gap:64px; }
.wt-band-head{
  display:flex; align-items:center; gap:18px;
  padding-bottom:18px; border-bottom:1px solid var(--border-subtle);
}
.wt-band-head .dot{ width:10px; height:10px; border-radius:50%; background:var(--brass); box-shadow:0 0 0 4px var(--brass-faint); }
.wt-band-head .dot.patina{ background:var(--patina); box-shadow:0 0 0 4px var(--patina-faint); animation:pulseDot 2s ease-in-out infinite; }
.wt-band-head .dot.muted{ background:var(--text-3); }
.wt-band-head .dot.hollow{ background:transparent; border:1px solid var(--text-4); box-shadow:none; }
.wt-band-head h3{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.5rem, 2.8vw, 2rem);
  color:var(--text-1); letter-spacing:-.015em;
  flex:1;
}
.wt-band-head .meta{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.24em;
  color:var(--brass);
}
.wt-now-card{
  padding:20px 24px;
  display:flex; gap:22px; align-items:center;
  border-left:3px solid var(--brass);
}
.wt-now-card .idx{
  font-family:var(--f-mono); font-size:1.4rem; color:var(--text-4); min-width:36px; font-weight:500;
}
.wt-now-card .body{ flex:1; display:flex; flex-direction:column; gap:12px; }
.wt-now-card h4{
  font-family:var(--f-display); font-size:1.5rem; color:var(--text-1); font-weight:500;
}
.wt-now-card .meta-pills{ display:flex; gap:8px; flex-wrap:wrap; }
.wt-now-card .score-col{
  text-align:right;
  display:flex; flex-direction:column; gap:4px;
}
.wt-now-card .score{
  font-family:var(--f-display); font-size:2.4rem; color:var(--patina);
  line-height:1; font-weight:500;
}
.wt-next-grid{
  display:grid; grid-template-columns:1fr; gap:14px;
}
@media(min-width:760px){ .wt-next-grid{ grid-template-columns:1fr 1fr; } }
.wt-next-card{
  padding:22px 24px;
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  border-radius:8px;
}
.wt-next-card h4{ font-family:var(--f-display); font-size:1.15rem; color:var(--text-2); font-weight:500; }
.wt-next-card .tag{ font-family:var(--f-mono); font-size:9px; text-transform:uppercase; letter-spacing:.22em; color:var(--text-4); margin-top:10px; }
.wt-later-park{
  display:grid; grid-template-columns:1fr; gap:32px;
  padding-top:32px; border-top:1px solid var(--border-subtle);
}
@media(min-width:760px){ .wt-later-park{ grid-template-columns:1fr 1fr; gap:48px; } }
.wt-later-park h3{ font-family:var(--f-display); font-size:1.25rem; color:var(--text-3); display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.wt-later-park ul{ list-style:none; display:flex; flex-direction:column; gap:10px; font-family:var(--f-mono); font-size:13px; color:var(--text-3); }
.wt-later-park li{ padding:6px 0; padding-left:14px; border-left:2px solid var(--border-subtle); }
.wt-later-park .park li{ color:var(--text-4); text-decoration:line-through; text-decoration-color:var(--text-4); opacity:.65; }

/* Synthesis terminal */
.wt-synthesis{ max-width:1000px; margin:0 auto; display:flex; flex-direction:column; gap:32px; }
.wt-synthesis-head{
  display:flex; justify-content:space-between; align-items:flex-end; gap:20px; flex-wrap:wrap;
}
.wt-synthesis-head h2{
  font-family:var(--f-display); font-size:clamp(2.5rem, 5vw, 3.5rem);
  font-weight:500; letter-spacing:-.02em;
  color:var(--text-1);
}
.wt-synthesis-head .connect{
  display:flex; align-items:center; gap:12px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.24em;
  color:var(--patina); margin-top:14px;
}
.wt-synthesis-head .pulse{ width:8px; height:8px; border-radius:50%; background:var(--patina); box-shadow:0 0 0 3px var(--patina-faint); animation:pulseDot 2s ease-in-out infinite; }
.terminal-box{
  padding:clamp(28px, 3vw, 48px);
  font-family:var(--f-mono); font-size:13px; line-height:1.9;
  letter-spacing:.04em;
  color:var(--text-1);
  background:var(--bg-deep);
  border:1px solid var(--border-medium);
  border-radius:var(--r-card);
  white-space:pre-wrap;
  overflow-x:auto;
  position:relative;
}
[data-theme="dark"] .terminal-box{ background:#0A0806; }

/* Bottom action bar */
.wt-actionbar{
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  padding:18px 28px;
  background:var(--bg-overlay);
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border-medium);
  display:flex; justify-content:space-between; align-items:center;
  gap:16px; flex-wrap:wrap;
}
.wt-back{
  display:inline-flex; align-items:center; gap:10px;
  padding:12px 18px;
  border-radius:6px;
  background:transparent; border:none;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.22em; font-weight:600;
  color:var(--text-3); cursor:pointer;
  transition:color .2s, background .2s;
}
.wt-back:hover:not(:disabled){ color:var(--text-1); background:var(--bg-surface); }
.wt-back:disabled{ opacity:.3; cursor:not-allowed; }
.wt-actionbar-right{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; justify-content:flex-end; }
.wt-validation{
  display:inline-flex; align-items:center; gap:10px;
  font-family:var(--f-mono); font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:.18em;
  color:var(--terra);
}

/* Toast */
.wt-toast{
  position:fixed; top:80px; right:24px; z-index:9999;
  padding:16px 20px;
  display:inline-flex; align-items:center; gap:10px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.2em;
  background:var(--bg-overlay);
  -webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);
  border:1px solid var(--border-medium);
  border-radius:10px;
  color:var(--patina);
  box-shadow:0 12px 36px -12px rgba(26,22,16,.3);
  animation:toastIn .35s var(--ease);
}
.wt-toast.err{ color:var(--terra); }
@keyframes toastIn{ from{ opacity:0; transform:translateX(20px); } to{ opacity:1; transform:translateX(0); } }

/* Animations */
@keyframes fadeIn{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }
.animate-in{ animation:fadeIn .6s var(--ease) both; }

/* Float results button */
#qb-float-results{
  position:fixed; bottom:104px; right:32px; z-index:9000;
  border:1px solid var(--pill-border);
  background:var(--pill-bg);
  color:var(--pill-ink);
  font-family:var(--f-body); font-weight:500; font-size:14px;
  padding:14px 26px;
  border-radius:999px;
  cursor:pointer;
  box-shadow:0 12px 40px -12px rgba(168,144,62,.5);
  transition:transform .2s var(--ease), background .2s ease;
}
#qb-float-results:hover{ background:var(--pill-bg-hover); transform:translateY(-2px); }

/* ================== DOSSIER (Phase 8) ================== */
.dossier{
  max-width:1080px; margin:0 auto;
  display:flex; flex-direction:column; gap:56px;
}
.dossier-head{
  display:flex; flex-direction:column; gap:16px;
  padding-bottom:28px;
  border-bottom:1px solid var(--border-subtle);
}
.dossier-head .topline{
  display:flex; align-items:center; gap:12px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  color:var(--brass);
}
.dossier-head .topline .dot{ width:8px; height:8px; border-radius:50%; background:var(--brass); box-shadow:0 0 0 3px var(--brass-faint); animation:pulseDot 2s ease-in-out infinite; }
.dossier-head h1{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(2.75rem, 5.5vw, 4rem);
  letter-spacing:-.02em; line-height:1.02;
  color:var(--text-1);
}
.dossier-head .client{
  font-family:var(--f-display); font-style:italic;
  font-size:clamp(1rem, 1.6vw, 1.2rem);
  color:var(--text-3);
}
.dossier-head .actions{ display:flex; align-items:center; gap:10px; margin-top:18px; flex-wrap:wrap; }

/* Shared section shell — parallel to .wt-phase-head */
.d-section{ display:flex; flex-direction:column; gap:28px; }
.d-section-head{
  display:flex; flex-direction:column; gap:12px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border-subtle);
}
.d-section-kicker{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  color:var(--brass);
}
.d-section-title{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(2rem, 4vw, 2.75rem); letter-spacing:-.02em; line-height:1.02;
  color:var(--text-1);
}
.d-section-sub{
  font-family:var(--f-display); font-style:italic;
  font-size:clamp(1rem, 1.6vw, 1.15rem); line-height:1.5;
  color:var(--text-2);
}

/* 01 Diagnosis — four stacked prose blocks */
.d-diagnosis{
  padding:clamp(36px, 4vw, 56px);
  display:flex; flex-direction:column; gap:36px;
}
.d-diagnosis-block{
  padding-bottom:32px;
  border-bottom:1px solid var(--border-subtle);
}
.d-diagnosis-block:last-child{ border-bottom:none; padding-bottom:0; }
.d-diagnosis-block .sublabel{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.32em;
  color:var(--brass);
  margin-bottom:16px;
}
.d-diagnosis-block p{
  font-family:var(--f-body); font-size:16px;
  line-height:1.75; color:var(--text-2);
  max-width:68ch;
}

/* 02 Posture Statement — typography carries it, no decoration */
.d-posture{
  padding:clamp(40px, 5vw, 72px) clamp(28px, 4vw, 64px);
  display:flex; flex-direction:column; align-items:flex-start; gap:20px;
}
.d-posture .d-posture-eyebrow{
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  color:var(--brass);
}
.d-posture p{
  font-family:var(--f-display); font-weight:500;
  font-size:clamp(1.5rem, 3vw, 2.25rem);
  line-height:1.4; letter-spacing:-.015em;
  color:var(--text-1);
  max-width:640px;
  border-left:2px solid var(--brass);
  padding-left:clamp(20px, 2.5vw, 32px);
}

/* 03 Field Plan — vertical timeline, quieter dots */
.d-field-plan{ position:relative; padding-left:clamp(28px, 4vw, 56px); }
.d-field-plan::before{
  content:''; position:absolute; left:clamp(10px, 1.5vw, 16px); top:4px; bottom:4px;
  width:1px; background:var(--border-medium);
}
.d-week-block{
  position:relative;
  margin-bottom:36px;
  padding-left:clamp(14px, 2.5vw, 24px);
}
.d-week-block::before{
  content:'';
  position:absolute;
  left:calc(-1 * clamp(28px, 4vw, 56px) + clamp(10px, 1.5vw, 16px) - 4px);
  top:14px;
  width:9px; height:9px; border-radius:50%;
  background:var(--brass); box-shadow:0 0 0 3px var(--bg-void);
}
.d-week-label{
  display:inline-block;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.3em;
  color:var(--brass);
  margin-bottom:16px;
}
.d-init-cards{ display:flex; flex-direction:column; gap:16px; }
.d-init-card{
  padding:24px 28px;
  position:relative;
  display:flex; flex-direction:column; gap:14px;
}
.d-init-card h4{
  font-family:var(--f-display); font-weight:500; font-size:1.4rem;
  color:var(--text-1); line-height:1.2;
}
.d-init-card .meta-row{
  display:grid; grid-template-columns:1fr; gap:12px;
  font-family:var(--f-body); font-size:14px; line-height:1.6;
  color:var(--text-2);
}
@media(min-width:760px){ .d-init-card .meta-row{ grid-template-columns:repeat(2, 1fr); } }
.d-init-card .meta-row .k{
  font-family:var(--f-mono); font-size:9px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--text-3); display:block; margin-bottom:4px;
}
.d-init-card .meta-row .v{ color:var(--text-1); }
.d-init-card .kill{
  border-left:3px solid var(--terra);
  padding:12px 16px;
  background:rgba(196,101,74,.06);
  margin-top:6px;
  border-radius:0 8px 8px 0;
}
.d-init-card .kill .k{ color:var(--terra); }
.d-init-card .dep{
  font-family:var(--f-body); font-size:13.5px; font-style:italic;
  color:var(--text-3);
  padding-top:10px; border-top:1px solid var(--border-subtle);
}

/* 04 NEXT / LATER / PARK — three columns */
.d-queues{
  display:grid; grid-template-columns:1fr; gap:24px;
}
@media(min-width:760px){ .d-queues{ grid-template-columns:repeat(3, 1fr); } }
.d-queue{
  padding:28px 24px;
  display:flex; flex-direction:column; gap:16px;
  min-height:200px;
}
.d-queue-head{
  display:flex; align-items:center; gap:10px;
  padding-bottom:14px;
  border-bottom:1px solid var(--border-subtle);
}
.d-queue-head .dot{ width:8px; height:8px; border-radius:50%; background:var(--text-3); }
.d-queue.next .dot{ background:var(--brass); }
.d-queue.later .dot{ background:var(--text-3); }
.d-queue.park .dot{ background:transparent; border:1px solid var(--text-4); }
.d-queue-head h3{

  color:var(--text-2);

.d-queue-item{
  padding:16px 18px;
  border:1px solid var(--border-subtle);

}

}
.d-queue.park .d-queue-item h4{ color:var(--text-3); text-decoration:line-through; text-decoration-color:var(--text-4); text-decoration-thickness:1px; }

/* 05 Principles */
.d-principles{
  padding:clamp(40px, 5vw, 64px);
  display:flex; flex-direction:column; gap:36px;
}
.d-principle{

  font-family:var(--f-display); font-weight:500;

  color:var(--text-1);
}

.d-letter{

}
.d-letter-sign .scrawl{

  font-size:clamp(2rem, 4vw, 2.8rem);

}
.d-letter-sign .printed{
  font-family:var(--f-mono); font-size:10px;

.d-accountability{ display:flex; flex-direction:column; gap:20px; }
.d-acc-item{

.d-acc-email-head .traffic span:nth-child(2){ background:#E8B155; }
.d-acc-email-head .traffic span:nth-child(3){ background:#5EBE5A; }
.d-acc-email-head .label{
  font-family:var(--f-mono); font-size:10px;

.d-acc-email-body .subject{

.d-acc-email-body .subject .k{

}
.d-acc-email-body .content{
  font-family:var(--f-body); font-size:14.5px;
  line-height:1.7; color:var(--text-2);
  white-space:pre-wrap;
}
.d-acc-questions{
  padding:20px 24px;
  background:var(--bg-void);
  border:1px solid var(--border-medium);

}
.d-signature h3{

.d-signature .signatory{

.d-signature .signatory input{

.d-signature .signed .scrawl{ font-family:'Caveat', cursive; font-size:2rem; color:var(--patina); line-height:1; }
.d-signature .signed .meta{
  font-family:var(--f-mono); font-size:10px; color:var(--text-3);
  text-transform:uppercase; letter-spacing:.24em;
}

/* Loading (progressive reveal) */
.d-loading{
  max-width:1080px; margin:0 auto;
  display:flex; flex-direction:column; gap:48px;
  padding-top:40px;
}
.d-loading-head{ display:flex; flex-direction:column; gap:18px; }
.d-loading-head .topline{

}
.d-loading-head h1{

  font-size:clamp(2.5rem, 5vw, 4rem); letter-spacing:-.02em; line-height:1;
  color:var(--text-1);
}
.d-loading-head p{
  font-family:var(--f-display); font-style:italic;
  font-size:clamp(1rem, 2vw, 1.2rem); line-height:1.5;
  color:var(--text-2); max-width:560px;
}
.d-loading-bar{
  width:100%; max-width:540px; height:2px;
  background:var(--border-subtle); border-radius:2px;
  overflow:hidden; position:relative;
}
.d-loading-bar::after{
  content:''; position:absolute; top:0; bottom:0; left:-30%; width:30%;
  background:linear-gradient(90deg, transparent, var(--brass), transparent);
  animation:barRun 2.4s ease-in-out infinite;
}
@keyframes barRun{ 0%{ left:-30%; } 100%{ left:100%; } }
.d-loading-status{
  padding:18px 24px;
  border:1px solid var(--border-medium);
  background:var(--bg-surface);
  border-radius:12px;
  font-family:var(--f-body); font-size:14px;
  color:var(--text-1); font-weight:500;
  max-width:540px;
  min-height:54px;
  display:flex; align-items:center;
}
.d-loading-warn{
  display:inline-flex; align-items:center; gap:10px;
  padding:10px 16px;
  background:rgba(168,144,62,.06);
  border:1px solid var(--brass-dim);
  border-radius:999px;
  font-family:var(--f-mono); font-size:10px;
  text-transform:uppercase; letter-spacing:.26em;
  color:var(--brass);
  align-self:flex-start;
}
.d-loading-warn .dot{
  width:6px; height:6px; border-radius:50%;
  background:var(--brass);

}
.d-skeleton{
  display:grid; grid-template-columns:1fr; gap:18px;
}
.d-skeleton .block{

  animation-timing-function:linear, ease;
  animation-iteration-count:infinite, 1;
  animation-fill-mode:none, forwards;
  animation-delay:var(--d, 0s);
}
@keyframes shimmer{ 0%{ background-position:0% 50%; } 100%{ background-position:-200% 50%; } }

/* Error / API key state */
.d-error{

}

(function(){
  var toggle = document.getElementById('themeToggle');
  var icon   = document.getElementById('toggleIcon');

})();

        if (v == null || v === false) continue;
        if (k === 'class')      node.className = v;
        else if (k === 'html')  node.innerHTML = v;
        else if (k === 'text')  node.textContent = v;
        else if (k === 'style' && typeof v === 'object') Object.assign(node.style, v);
        else if (k.indexOf('on') === 0 && typeof v === 'function') node.addEventListener(k.slice(2), v);
        else node.setAttribute(k, v);
      }
    }
    if (kids){
      var flat = [];
      (function flatten(arr){
        (Array.isArray(arr) ? arr : [arr]).forEach(function(c){
          if (Array.isArray(c)) flatten(c);
          else flat.push(c);
        });
      })(kids);
      flat.forEach(function(c){
        if (c == null || c === false) return;
        node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
    }
    return node;
  }

  function showToast(message, type){
    state.toast = { message: message, type: type || 'success' };
    var t = el('div', { class: 'wt-toast' + (type === 'error' ? ' err' : '') }, message);
    document.body.appendChild(t);
    setTimeout(function(){ if (t.parentNode) t.parentNode.removeChild(t); }, 3000);
  }

  /* --- Scoring --- */
  function calcScore(scores){
    var raw = (scores.impact * 2) + (scores.ease * 1) + (scores.personaFit * 2) +
              (scores.brandSoul * 1.5) + (scores.multiplier * 1.5) + (scores.urgency * 1);
    var base = (raw / 90) * 100;
    var final = base + (scores.leadCapture ? 5 : 0);
    return Math.round(Math.min(100, final));
  }
  function getBand(score){
    if (score >= 80) return { label:'NOW',   desc:'0-60 days' };
    if (score >= 60) return { label:'NEXT',  desc:'60-180 days' };
    if (score >= 40) return { label:'LATER', desc:'180-365 days' };
    return             { label:'PARK',  desc:'Not this year' };
  }

  /* --- Validation --- */
  function isPhaseComplete(phaseId){
    var a = state;
    if (phaseId === 0) return true;
    if (phaseId === 1){
      return !!(a.brandInfo.brandName.trim() && a.brandInfo.primaryPersona.trim() &&
                a.brief.bottleneck.trim() && a.brief.nextMonth.trim() &&
                a.brief.working.trim() && a.brief.personaGap.trim() &&
                a.brief.revenue.trim() && a.brief.teamSize.trim() && a.brief.keyMetric.trim());
    }
    if (phaseId === 2) return a.initiatives.length >= 3;
    if (phaseId === 3){
      return a.initiatives.length > 0 && a.initiatives.every(function(i){
        return i.interrogation.utility.trim() && i.interrogation.timing.trim() &&
               i.interrogation.personaTest.trim() && i.interrogation.urgency.trim();
      });
    }
    if (phaseId === 4) return true;
    if (phaseId === 5){
      return !!(a.tradeOffs.closeCall.choose.trim() && a.tradeOffs.closeCall.because.trim() && a.tradeOffs.closeCall.acceptWait.trim() &&
                a.tradeOffs.pillarClash.buildFirst.trim() && a.tradeOffs.pillarClash.because.trim() &&
                a.tradeOffs.brandTest.firstMove.trim() && a.tradeOffs.brandTest.makeItFeel.trim());
    }
    if (phaseId === 6) return a.hasUnlocked;
    return true;
  }
  function isPhaseUnlocked(target){
    for (var i = 0; i < target; i++){ if (!isPhaseComplete(i)) return false; }
    return true;
  }

  /* --- Initiative ops --- */
  function updateInitiative(id, field, value){
    state.initiatives = state.initiatives.map(function(i){
      return i.id === id ? Object.assign({}, i, (function(){ var o = {}; o[field] = value; return o; })()) : i;
    });
  }
  function updateInterrogation(id, field, value){
    state.initiatives = state.initiatives.map(function(i){
      if (i.id !== id) return i;
      var newInterrog = Object.assign({}, i.interrogation);
      newInterrog[field] = value;
      return Object.assign({}, i, { interrogation: newInterrog });
    });
  }
  function updateScore(id, field, value){
    state.initiatives = state.initiatives.map(function(i){
      if (i.id !== id) return i;
      var newScores = Object.assign({}, i.scores);
      newScores[field] = value;
      var score = calcScore(newScores);
      return Object.assign({}, i, { scores:newScores, finalScore:score, band:getBand(score).label });
    });
  }
  function handleAddInitiative(){
    if (!state.newInitiative.name.trim()) return;
    var id = Date.now().toString();
    var scores = Object.assign({}, DEFAULT_SCORES);
    var score = calcScore(scores);
    state.initiatives.push({
      id: id,
      name: state.newInitiative.name,
      description: state.newInitiative.description,
      pillar: state.newInitiative.pillar,
      persona: state.newInitiative.persona,
      interrogation: { utility:'', timing:'', personaTest:'', urgency:'' },
      scores: scores,
      finalScore: score,
      band: getBand(score).label
    });
    state.newInitiative = { name:'', description:'', pillar:'Revenue', persona:'' };
    render();
  }
  function deleteInitiative(id){
    state.initiatives = state.initiatives.filter(function(i){ return i.id !== id; });
    render();
  }

  /* --- Derived for trade-offs --- */
  function getTradeOffData(){
    var sorted = state.initiatives.slice().sort(function(a, b){ return b.finalScore - a.finalScore; });
    var now = sorted.filter(function(i){ return i.band === 'NOW'; });
    var pillars = {};
    sorted.forEach(function(i){
      if (!pillars[i.pillar] || pillars[i.pillar].finalScore < i.finalScore) pillars[i.pillar] = i;
    });
    var brandSorted = state.initiatives.slice().sort(function(a, b){ return b.scores.brandSoul - a.scores.brandSoul; });
    return { topNow: now, topPillars: Object.values(pillars), topOverall: sorted[0], topBrand: brandSorted[0] };
  }

  function callDossierAPI(){
    var p = buildDossierPrompt();
    return fetch('/api/claude', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:7500,
        system: p.system,
        messages:[{ role:'user', content: p.user }]
      })
    }).then(function(res){
      var ct = (res.headers.get('content-type') || '').toLowerCase();
      var isJson = ct.indexOf('application/json') !== -1;
      if (res.status === 404){
        var e1 = new Error('The /api/claude endpoint is not running here. Deploy to Vercel (or run `vercel dev`) to enable AI synthesis.');
        e1.kind = 'api-key';
        throw e1;
      }
      if (!isJson){
        return res.text().then(function(body){
          var e2 = new Error('Non-JSON response from /api/claude (status ' + res.status + ').');
          e2.kind = 'network';
          throw e2;
        });
      }
      return res.json().then(function(data){ return { status:res.status, data:data }; });
    }).then(function(wrap){
      if (!wrap) return;
      if (wrap.status === 503){
        var e3 = new Error('Claude API key is not configured. Full synthesis requires the QB API key.');
        e3.kind = 'api-key';
        throw e3;
      }
      if (wrap.status !== 200 || !wrap.data || !wrap.data.content){
        var e4 = new Error((wrap.data && wrap.data.error && (wrap.data.error.message || wrap.data.error)) || 'Unexpected response from AI service.');
        e4.kind = 'other';
        throw e4;
      }
      var text = '';
      wrap.data.content.forEach(function(b){ if (b.type === 'text') text += b.text; });
      var start = text.indexOf('{'), end = text.lastIndexOf('}');
      if (start < 0 || end < 0){
        var e5 = new Error('AI response was not valid JSON.');
        e5.kind = 'parse';
        throw e5;
      }
      try { return JSON.parse(text.substring(start, end + 1)); }
      catch(e){
        var e6 = new Error('Could not parse the AI response as JSON.');
        e6.kind = 'parse';
        throw e6;
      }
    });
  }

        }

  /* --- Copy dossier as Markdown --- */

      lines.push('## 01 · Diagnosis');
      lines.push('### Posture');       lines.push(d.diagnosis.posture || ''); lines.push('');
      lines.push('### Hidden pattern'); lines.push(d.diagnosis.hiddenPattern || ''); lines.push('');
      lines.push('### Glossed gap');   lines.push(d.diagnosis.glossedGap || ''); lines.push('');
      lines.push('### Challenge');     lines.push(d.diagnosis.challenge || ''); lines.push('');
    }

      lines.push('## 02 · Posture statement');
      lines.push('> ' + d.postureStatement); lines.push('');

      lines.push('## 03 · Field plan');
      d.fieldPlan.forEach(function(w){
        lines.push('### Week ' + w.week);

          lines.push('- **' + i.name + '**');

          lines.push('  - Kill condition: ' + (i.killCondition || ''));
          if (i.dependency) lines.push('  - Unlocks: ' + i.dependency);
        });

    if (d.nextList){
      lines.push('## 04 · Queues');
      lines.push('### Next');

      lines.push(''); lines.push('### Later');
      (d.laterList || []).forEach(function(i){ lines.push('- ' + i.name + ': ' + (i.conditionToMove || '')); });
      lines.push(''); lines.push('### Park');
      (d.parkList || []).forEach(function(i){ lines.push('- ' + i.name + ': ' + (i.honestReason || '') + (i.revisitWhen ? ' (revisit: ' + i.revisitWhen + ')' : '')); });
      lines.push('');
    }
    if (d.principles && d.principles.length){
      lines.push('## 05 · Principles');
      d.principles.forEach(function(p, i){ lines.push((i + 1) + '. ' + p); });

    }
    if (d.personaContract){
      lines.push('## 06 · Persona contract (Day 61)');
      lines.push(d.personaContract); lines.push('');
    }
    if (d.accountabilityPack){
      var ap = d.accountabilityPack;
      lines.push('## 07 · Accountability pack');
      if (ap.kickoffEmail){
        lines.push('### Monday kickoff email');
        lines.push('**Subject:** ' + (ap.kickoffEmail.subject || ''));
        lines.push(''); lines.push(ap.kickoffEmail.body || ''); lines.push('');
      }
      if (ap.weeklyRitual){
        lines.push('### Weekly ritual (Friday, 15 minutes)');
        (ap.weeklyRitual || []).forEach(function(q, i){ lines.push((i + 1) + '. ' + q); });
        lines.push('');
      }
      if (ap.day60Retro){
        lines.push('### Day-60 retrospective');
        (ap.day60Retro || []).forEach(function(q, i){ lines.push((i + 1) + '. ' + q); });
        lines.push('');

      lines.push('');

    return lines.join('\n');

  /* --- Roadmap (phase 7) --- */
  views[7] = function(){
    var sorted = state.initiatives.slice().sort(function(a,b){ return b.finalScore - a.finalScore; });
    var nowList   = sorted.filter(function(i){ return i.band === 'NOW'; }).slice(0, 5);
    var nextList  = sorted.filter(function(i){ return i.band === 'NEXT'; }).slice(0, 8);

    return el('div', { class:'wt-phase animate-in wt-roadmap', style:{ maxWidth:'1120px', margin:'0 auto' } }, [
      el('div', { class:'wt-phase-head', style:{ textAlign:'center', alignItems:'center' } }, [
        el('div', { class:'kicker', text:'Phase 6' }),
        el('h2', { text:'Roadmap' }),
        el('p',  { class:'hook', text:'A sequence of bets.' })
      ]),

      el('section', { style:{ display:'flex', flexDirection:'column', gap:'20px' } }, [
        el('div', { class:'wt-band-head' }, [
          el('div', { class:'dot patina' }),
          el('h3', { text:'The NOW list' }),
          el('span', { class:'meta', text:'0-60 days · max 5' })
        ]),
        nowList.length === 0

          : el('div', { style:{ display:'flex', flexDirection:'column', gap:'14px' } },
              nowList.map(function(init, idx){
                return el('div', { class:'glass-card wt-now-card' }, [
                  el('div', { class:'idx', text: '0' + (idx + 1) }),
                  el('div', { class:'body' }, [
                    el('h4', { text: init.name }),
                    el('div', { class:'meta-pills' }, [
                      el('span', { class:'pill-mono', text: init.pillar }),
                      el('span', { class:'pill-mono', text: init.persona || 'Audience' })
                    ])
                  ]),
                  el('div', { class:'score-col' }, [
                    el('span', { class:'label-mono', style:{ marginBottom:'0' }, text:'Score' }),
                    el('span', { class:'score', text: init.finalScore })
                  ])
                ]);
              })
            )
      ]),
      // NEXT
      el('section', { style:{ display:'flex', flexDirection:'column', gap:'20px' } }, [
        el('div', { class:'wt-band-head' }, [
          el('div', { class:'dot muted' }),
          el('h3', { style:{ color:'var(--text-2)', fontSize:'1.4rem' }, text:'The NEXT list' }),
          el('span', { class:'meta', style:{ color:'var(--text-3)' }, text:'60-180 days · wait state' })
        ]),
        el('div', { class:'wt-next-grid' },

            ? el('p', { class:'label-mono', style:{ fontStyle:'italic' }, text:'Queue empty.' })
            : nextList.map(function(init){
                return el('div', { class:'wt-next-card' }, [
                  el('h4', { text: init.name }),
                  el('div', { class:'tag', text:'Awaiting prerequisite' })
                ]);
              })
        )
      ]),
      // LATER + PARK
      el('section', { class:'wt-later-park' }, [
        el('div', {}, [
          el('h3', {}, [ el('span', { class:'dot', style:{ width:'7px', height:'7px', background:'var(--text-4)' } }), document.createTextNode(' LATER') ]),
          el('ul', {},
            laterList.length === 0
              ? el('li', { style:{ fontStyle:'italic' }, text:'Empty' })
              : laterList.map(function(init){ return el('li', { text: init.name }); })
          )
        ]),
        el('div', { class:'park' }, [
          el('h3', {}, [ el('span', { class:'dot hollow', style:{ width:'7px', height:'7px' } }), document.createTextNode(' PARK') ]),
          el('ul', {},
            parkList.length === 0
              ? el('li', { style:{ fontStyle:'italic' }, text:'Nothing dropped.' })
              : parkList.map(function(init){ return el('li', { text: init.name }); })
          )
        ])
      ])
    ]);
  };

  /* --- Synthesis (phase 8) · Strategic Command Dossier --- */
  views[8] = function(){
    // On first mount, kick off AI synthesis
    if (!state.dossier && !state.isDossierLoading && !state.dossierError){
      setTimeout(function(){ if (state.phase === 8) triggerDossierGeneration(); }, 60);
    }
    if (state.isDossierLoading) return renderDossierLoading();
    if (state.dossierError) return renderDossierError();
    if (state.dossier) return renderDossier(state.dossier);
    // Fallback: baseline, before first call fires
    return renderDossierLoading();
  };

  function renderDossierLoading(){
    return el('div', { class:'d-loading animate-in' }, [
      el('div', { class:'d-loading-head' }, [
        el('div', { class:'topline' }, [
          el('span', { style:{ width:'8px', height:'8px', borderRadius:'50%', background:'var(--brass)', boxShadow:'0 0 0 3px var(--brass-faint)', animation:'pulseDot 2s ease-in-out infinite' } }),
          document.createTextNode('Strategic Command · AI synthesis')
        ]),
        el('h1', { text:'Composing your Dossier' }),
        el('p',  { text:'A senior strategic advisor would take a week to write this. We are drafting it now: diagnosis, field plan, persona contract, principles, handoffs. All from your 30 minutes of input. All in your brand voice.' })
      ]),
      el('div', { class:'d-loading-status', id:'d-loading-status', text: state.dossierStatus || DOSSIER_STATUS_MESSAGES[0] }),
      el('div', { class:'d-loading-bar' }),
      el('div', { class:'d-loading-warn' }, [
        el('span', { class:'dot' }),
        document.createTextNode('Please keep this tab open · 20–40 seconds · Do not reload')
      ]),
      // Skeleton sections (shimmer)
      el('div', { class:'d-skeleton' }, [
        el('div', { class:'block', style:{ '--h':'280px', '--d':'0s' } }),
        el('div', { class:'block', style:{ '--h':'220px', '--d':'.15s' } }),
        el('div', { class:'block', style:{ '--h':'340px', '--d':'.3s' } }),
        el('div', { class:'block', style:{ '--h':'180px', '--d':'.45s' } })
      ])
    ]);
  }

  function renderDossierError(){
    var kind = state.dossierErrorKind;
    var msg = state.dossierError || 'Unknown error.';
    var isKey = kind === 'api-key';
    var wrap = el('div', { class:'d-loading animate-in' }, [
      el('div', { class:'d-loading-head' }, [
        el('div', { class:'topline', style:{ color:'var(--terra)' } }, [
          el('span', { style:{ width:'8px', height:'8px', borderRadius:'50%', background:'var(--terra)' } }),
          document.createTextNode(isKey ? 'AI synthesis unavailable' : 'AI synthesis failed')
        ]),
        el('h1', { text: isKey ? 'Full synthesis needs the QB API key.' : 'We hit a snag.' })
      ]),
      isKey
        ? el('div', { class:'d-apikey' }, [
            el('h3', { text:'This environment cannot call the AI service.' }),
            el('p',  { text:'To generate the full Strategic Command Dossier, this page needs to be served by Vercel (or a local `vercel dev`) with the QB API key configured. You can still view the baseline dossier below — it renders everything you entered, without the AI voice.' }),
            el('div', { style:{ display:'flex', gap:'10px', flexWrap:'wrap' } }, [
              el('button', { class:'btn btn-primary btn-sm', type:'button', onclick: triggerDossierGeneration }, 'Retry synthesis'),
              el('button', { class:'btn btn-sm', type:'button', onclick:function(){ state.dossier = {}; render(); } }, 'Show baseline dossier')
            ])
          ])
        : el('div', { class:'d-error' }, [
            el('h3', { text:'AI synthesis failed' }),
            el('p',  { text: msg }),
            el('p',  { text:'Showing baseline dossier. Click retry to attempt AI synthesis again.' }),
            el('div', { class:'actions' }, [
              el('button', { class:'btn btn-primary btn-sm', type:'button', onclick: triggerDossierGeneration }, 'Retry synthesis'),
              el('button', { class:'btn btn-sm', type:'button', onclick:function(){ state.dossier = {}; render(); } }, 'Continue with baseline')
            ])
          ])
    ]);
    return wrap;
  }

  /* --- The full 8-section Dossier --- */
  function renderDossier(d){
    d = d || {};
    var brand = state.brandInfo.brandName || 'Your Brand';
    var persona = state.brandInfo.primaryPersona || 'Primary Persona';
    var today = new Date().toISOString().split('T')[0];

    // --- HEAD ---
    var head = el('header', { class:'dossier-head' }, [
      el('div', { class:'topline' }, [
        el('span', { class:'dot' }),
        document.createTextNode('Strategic Command · Dossier generated')
      ]),
      el('h1', { text: brand.toUpperCase() }),
      el('div', { class:'client', text: 'Prepared ' + today + ' · primary target: ' + persona }),
      el('div', { class:'actions' }, [
        el('button', { class:'btn btn-sm', type:'button', onclick: copyDossierMarkdown }, 'Copy as Markdown'),
        el('button', { class:'btn btn-sm', type:'button', onclick:function(){ try{ window.print(); }catch(e){} } }, 'Download as PDF'),
        el('button', { class:'btn btn-sm', type:'button', onclick: emailDossierToSelf }, 'Email to self'),
        el('button', { class:'btn btn-primary btn-sm', type:'button', onclick: triggerDossierGeneration }, 'Regenerate')
      ])
    ]);

    function sectionHead(num, eyebrow, title, sub){
      // Parallel to .wt-phase-head: kicker line, then title, then optional italic sub.
      // Number is compressed into the kicker so the brass accent is a line, not a giant glyph.
      return el('div', { class:'d-section-head' }, [
        el('div', { class:'d-section-kicker', text: num.replace('.', '') + ' · ' + eyebrow }),
        el('h2', { class:'d-section-title', text: title }),
        sub ? el('p', { class:'d-section-sub', text: sub }) : null
      ]);
    }

    // ---- 01 DIAGNOSIS ----
    var diag = d.diagnosis || {};
    var s01 = el('section', { class:'d-section' }, [
      sectionHead('01.', 'Diagnosis', 'What we see clearly.'),
      el('div', { class:'glass-card d-diagnosis' }, [
        el('div', { class:'d-diagnosis-block' }, [
          el('div', { class:'sublabel', text:'Posture' }),
          el('p', { text: diag.posture || 'Pending posture read.' })
        ]),
        el('div', { class:'d-diagnosis-block' }, [
          el('div', { class:'sublabel', text:'Hidden pattern' }),
          el('p', { text: diag.hiddenPattern || 'Pending pattern read.' })
        ]),
        el('div', { class:'d-diagnosis-block' }, [
          el('div', { class:'sublabel', text:'Glossed gap' }),
          el('p', { text: diag.glossedGap || 'Pending gap surface.' })
        ]),
        el('div', { class:'d-diagnosis-block' }, [
          el('div', { class:'sublabel', text:'Challenge' }),
          el('p', { text: diag.challenge || 'Pending honest challenge.' })
        ])
      ])
    ]);

    // ---- 02 POSTURE STATEMENT ----
    var s02 = el('section', { class:'d-section' }, [
      sectionHead('02.', 'Posture statement', 'In your brand voice.'),
      el('div', { class:'glass-card d-posture' }, [
        el('span', { class:'d-posture-eyebrow', text:'Declared' }),
        el('p', { text: d.postureStatement || 'You are choosing focus over motion. Three bets, one persona, one constraint.' })
      ])
    ]);

    // ---- 03 FIELD PLAN (8-week timeline) ----
    var plan = (d.fieldPlan || []);
    // Ensure weeks 1-8 even if empty
    var weekMap = {};
    plan.forEach(function(w){ weekMap[w.week] = w.initiatives || []; });
    var weekBlocks = [];
    for (var w = 1; w <= 8; w++){
      var inits = weekMap[w] || [];
      if (!inits.length && plan.length > 0) continue; // skip empty weeks if we have data
      weekBlocks.push(
        el('div', { class:'d-week-block' }, [
          el('span', { class:'d-week-label', text: 'Week ' + w }),
          el('div', { class:'d-init-cards' },
            inits.length === 0
              ? el('div', { class:'glass-card d-init-card', style:{ opacity:'.5' } }, [
                  el('p', { style:{ fontStyle:'italic', fontFamily:'var(--f-body)', color:'var(--text-3)' }, text:'No initiative scheduled.' })
                ])
              : inits.map(function(i){
                  return el('div', { class:'glass-card d-init-card' }, [
                    el('h4', { text: i.name || '' }),
                    el('div', { class:'meta-row' }, [
                      el('div', {}, [ el('span', { class:'k', text:'Action' }),            el('span', { class:'v', text: i.action || '—' }) ]),
                      el('div', {}, [ el('span', { class:'k', text:'Owner' }),             el('span', { class:'v', text: i.owner || '—' }) ]),
                      el('div', {}, [ el('span', { class:'k', text:'Leading indicator' }), el('span', { class:'v', text: i.leadingIndicator || '—' }) ]),
                      el('div', { class:'kill' }, [ el('span', { class:'k', text:'Kill condition' }), el('span', { class:'v', text: i.killCondition || '—' }) ])
                    ]),
                    i.dependency ? el('div', { class:'dep', text:'Unlocks: ' + i.dependency }) : null
                  ]);
                })
          )
        ])
      );
    }
    var s03 = el('section', { class:'d-section' }, [
      sectionHead('03.', '8-week field plan', 'NOW initiatives, sequenced by prerequisite.'),
      el('div', { class:'d-field-plan' }, weekBlocks.length ? weekBlocks : [
        el('p', { style:{ fontFamily:'var(--f-body)', color:'var(--text-3)', fontStyle:'italic' }, text:'No NOW-band initiatives to sequence yet.' })
      ])
    ]);

    // ---- 04 QUEUES (NEXT / LATER / PARK) ----
    function queue(cls, title, items, emptyText, renderItem){
      return el('div', { class:'glass-card d-queue ' + cls }, [
        el('div', { class:'d-queue-head' }, [ el('span', { class:'dot' }), el('h3', { text: title }) ]),
        items.length === 0
          ? el('p', { style:{ fontFamily:'var(--f-mono)', fontSize:'11px', color:'var(--text-4)', fontStyle:'italic' }, text: emptyText })
          : items.map(renderItem)
      ]);
    }
    var s04 = el('section', { class:'d-section' }, [
      sectionHead('04.', 'Queues', 'Everything that is not NOW — and when it becomes relevant.'),
      el('div', { class:'d-queues' }, [
        queue('next',  'Next · trigger-based', d.nextList || [], 'Queue empty.', function(i){
          return el('div', { class:'d-queue-item' }, [
            el('h4', { text: i.name || '' }),
            el('div', { class:'reason', text: (i.prerequisite || '') + (i.triggerMilestone ? ' · trigger: ' + i.triggerMilestone : '') })
          ]);
        }),
        queue('later', 'Later · condition-based', d.laterList || [], 'Nothing parked here.', function(i){
          return el('div', { class:'d-queue-item' }, [
            el('h4', { text: i.name || '' }),
            el('div', { class:'reason', text: i.conditionToMove || '' })
          ]);
        }),
        queue('park',  'Park · not this year', d.parkList || [], 'Nothing parked this year.', function(i){
          return el('div', { class:'d-queue-item' }, [
            el('h4', { text: i.name || '' }),
            el('div', { class:'reason', text: (i.honestReason || '') + (i.revisitWhen ? ' · revisit: ' + i.revisitWhen : '') })
          ]);
        })
      ])
    ]);

    // ---- 05 PRINCIPLES ----
    var principles = (d.principles || []);
    var s05 = el('section', { class:'d-section' }, [
      sectionHead('05.', 'Principles', 'Wall-worthy. In your voice.'),
      el('div', { class:'glass-card d-principles' },
        principles.length === 0
          ? [ el('p', { style:{ fontFamily:'var(--f-body)', color:'var(--text-3)', fontStyle:'italic' }, text:'No principles extracted yet.' }) ]
          : principles.map(function(p, i){
              return el('div', { class:'d-principle' }, [
                el('span', { class:'num', text: ('0' + (i + 1)).slice(-2) }),
                el('p', { text: p })
              ]);
            })
      )
    ]);

    // ---- 06 PERSONA CONTRACT (letter) ----
    var s06 = el('section', { class:'d-section' }, [
      sectionHead('06.', 'Persona contract', 'The letter the primary persona writes on Day 61 if the plan holds.'),
      el('div', { class:'glass-card d-letter' }, [
        el('div', { class:'stamp', text:'Fan letter · Day 61 · ' + new Date(Date.now() + 61*86400000).toISOString().split('T')[0] }),
        el('div', { class:'d-letter-body', text: d.personaContract || 'Dear ' + brand + ', I wanted to write this because something changed. You finally built the thing I was waiting for.' }),
        el('div', { class:'d-letter-sign' }, [
          el('div', { class:'scrawl', text: (persona.split(/\s+/)[0] || 'A fan') + ',' }),
          el('div', { class:'printed', text: persona })
        ])
      ])
    ]);

    // ---- 07 ACCOUNTABILITY PACK (3 expandable) ----
    var ap = d.accountabilityPack || {};
    var kickoff = ap.kickoffEmail || {};
    function accItem(id, title, body, copyText){
      var active = state.expandedAcc === id;
      return el('div', { class:'glass-card d-acc-item' + (active ? ' active' : '') }, [
        el('div', {
          class:'d-acc-head',
          onclick:function(){ state.expandedAcc = active ? null : id; render(); }
        }, [
          el('div', { class:'left' }, [
            el('span', { class:'toggle', text: active ? '−' : '+' }),
            el('h4', { text: title })
          ]),
          copyText ? el('button', { class:'d-acc-copy', type:'button', onclick:function(e){
            e.stopPropagation();
            if (navigator.clipboard) navigator.clipboard.writeText(copyText()).then(function(){ showToast('Copied.'); }).catch(function(){ showToast('Copy failed.', 'error'); });
          } }, 'Copy') : null
        ]),
        el('div', { class:'d-acc-body' }, [ el('div', { class:'d-acc-body-inner' }, body) ])
      ]);
    }
    var kickoffCopy = function(){ return (kickoff.subject ? 'Subject: ' + kickoff.subject + '\n\n' : '') + (kickoff.body || ''); };
    var ritualCopy = function(){ return (ap.weeklyRitual || []).map(function(q, i){ return (i + 1) + '. ' + q; }).join('\n'); };
    var retroCopy  = function(){ return (ap.day60Retro  || []).map(function(q, i){ return (i + 1) + '. ' + q; }).join('\n'); };

    var s07 = el('section', { class:'d-section' }, [
      sectionHead('07.', 'Accountability pack', 'Three tools so the plan survives the week.'),
      el('div', { class:'d-accountability' }, [
        accItem('kickoff', 'Monday kickoff email',
          el('div', { class:'d-acc-email' }, [
            el('div', { class:'d-acc-email-head' }, [
              el('div', { class:'traffic' }, [ el('span'), el('span'), el('span') ]),
              el('span', { class:'label', text:'New message' })
            ]),
            el('div', { class:'d-acc-email-body' }, [
              el('div', { class:'subject' }, [
                el('span', { class:'k', text:'Subject' }),
                document.createTextNode(kickoff.subject || 'Week 1 — the ' + (state.initiatives.filter(function(i){ return i.band === 'NOW'; }).length) + '-initiative plan')
              ]),
              el('div', { class:'content', text: kickoff.body || 'Pending.' })
            ])
          ]),
          kickoffCopy),
        accItem('ritual', 'Weekly ritual · Friday, 15 minutes',
          el('div', { class:'d-acc-questions' }, [
            el('ol', {},
              (ap.weeklyRitual || []).map(function(q){ return el('li', { text: q }); })
            )
          ]),
          ritualCopy),
        accItem('retro', 'Day-60 retrospective',
          el('div', { class:'d-acc-questions' }, [
            el('ol', {},
              (ap.day60Retro || []).map(function(q){ return el('li', { text: q }); })
            )
          ]),
          retroCopy)
      ])
    ]);

    // ---- 08 HANDOFFS ----
    var handoffs = d.handoffs || [];
    var s08 = el('section', { class:'d-section' }, [
      sectionHead('08.', 'Handoffs', 'Where this plan points next in QB BrandOS.'),
      el('div', { class:'d-handoffs' },
        handoffs.length === 0
          ? [ el('div', { class:'glass-card d-handoff' }, [
              el('span', { class:'priority', text:'Pending' }),
              el('h4', { text:'No handoffs generated.' }),
              el('p', { text:'Retry synthesis to receive next-tool recommendations.' })
            ])]
          : handoffs.map(function(h){
              return el('a', {
                class:'glass-card d-handoff',
                href: (h.tool || '#') + (h.tool ? '?from=war-table' : ''),
                target: '_self'
              }, [
                el('span', { class:'priority', text: (h.priority || '').toUpperCase() }),
                el('h4', { text: h.toolLabel || h.tool || 'Tool' }),
                el('p',  { text: h.reason || '' }),
                el('span', { class:'goto' }, [ document.createTextNode('Open ' + (h.tool || '')), document.createTextNode(' →') ])
              ]);
            })
      )
    ]);

    // ---- SIGNATURE COMMITMENT ----
    var sigRow = el('div', { class:'signatory' });
    var sigInput = el('input', { type:'text', placeholder:'Sign your name to commit' });
    sigInput.value = state.dossierSignedName || '';
    sigInput.addEventListener('input', function(e){ state.dossierSignedName = e.target.value; });
    var sigBtn = el('button', { class:'btn btn-primary btn-sm', type:'button', onclick:function(){
      var name = (state.dossierSignedName || sigInput.value || '').trim();
      if (!name){ showToast('Type your name first.', 'error'); sigInput.focus(); return; }
      writeCommitmentRecord(name);
      state.dossierSigned = true;
      showToast('Commitment signed + recorded.');
      render();
    } }, 'Sign & commit');
    sigRow.appendChild(sigInput);
    sigRow.appendChild(sigBtn);

    var signed = state.dossierSigned ? el('div', { class:'signed' }, [
      el('span', { class:'scrawl', text: state.dossierSignedName || '' }),
      el('span', { class:'meta', text:'Signed ' + today + ' · ' + state.brandInfo.brandName })
    ]) : null;

    var nowCount  = state.initiatives.filter(function(i){ return i.band === 'NOW'; }).length;
    var parkCount = state.initiatives.filter(function(i){ return i.band === 'PARK'; }).length;

    var signature = el('section', { class:'d-signature' }, [
      el('div', { class:'label-row' }, [
        el('span', { class:'stamp', text:'The commitment · ' + today }),
        el('span', { class:'stamp', style:{ color:'var(--text-3)' }, text: nowCount + ' initiatives NOW · ' + parkCount + ' parked' })
      ]),
      el('h3', { text:'You are choosing this plan. Sign it.' }),
      el('p', { style:{ fontFamily:'var(--f-body)', fontSize:'14.5px', lineHeight:'1.65', color:'var(--text-2)', maxWidth:'560px' },
        text:'Signing writes this dossier to your commitment log. You can revisit it in the BrandOS Hub, but the version you sign today is preserved — so you can tell yourself, honestly, six months from now, what you chose to believe on this day.' }),
      signed ? signed : sigRow
    ]);

    // Assemble
    return el('div', { class:'dossier animate-in' }, [
      head, s01, s02, s03, s04, s05, s06, s07, s08, signature
    ]);
  }

  function escapeHTML(s){
    return String(s || '').replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  /* --- Phase nav (top) --- */
  function renderPhaseNav(){
    $phaseNav.innerHTML = '';
    $phaseNav.appendChild(el('div', { class:'wt-phase-dots' },
      PHASES.map(function(p, idx){
        var unlocked = isPhaseUnlocked(p.id);
        var active = state.phase === p.id;
        var dot = el('button', {
          class:'wt-phase-dot' + (active ? ' active' : '') + (!unlocked ? ' locked' : ''),
          type:'button',
          disabled: !unlocked ? '' : null,
          onclick:function(){ if (unlocked){ state.phase = p.id; render(); window.scrollTo({ top:0, behavior:'smooth' }); } }
        }, String(idx));
        return idx < PHASES.length - 1
          ? [dot, el('span', { class:'wt-phase-sep' })]
          : dot;
      })
    ));
    var phaseData = PHASES.find(function(p){ return p.id === state.phase; });
    $phaseNav.appendChild(el('div', { class:'wt-phase-meta', text:'est. ' + phaseData.time }));
  }

  /* --- Action bar (bottom) --- */
  function renderActionBar(){
    $actionbar.innerHTML = '';
    var canProceed = isPhaseComplete(state.phase);
    var validationMessage = !canProceed
      ? (state.phase === 1 ? 'System halt: complete all diagnostic fields.'
       : state.phase === 2 ? 'System halt: insufficient data. Add 3 initiatives. (' + state.initiatives.length + '/3)'
       : state.phase === 3 ? 'System halt: complete all interrogation protocols.'
       : state.phase === 5 ? 'System halt: resolve all strategic conflicts.'
       : state.phase === 6 ? 'Authorization required: submit credentials to unlock.'
       : '')
      : '';
    $actionbar.appendChild(el('button', {
      class:'wt-back', type:'button',
      disabled: state.phase === 0 ? '' : null,
      onclick:function(){ if (state.phase > 0){ state.phase = Math.max(0, state.phase - 1); render(); window.scrollTo({ top:0, behavior:'smooth' }); } }
    }, [ document.createTextNode('← Return') ]));
    var right = el('div', { class:'wt-actionbar-right' });
    if (validationMessage){
      right.appendChild(el('span', { class:'wt-validation' }, [ document.createTextNode('⚠ '), document.createTextNode(validationMessage) ]));
    }
    if (state.phase < 8){
      right.appendChild(el('button', {
        class:'btn btn-primary btn-sm', type:'button',
        disabled: !canProceed ? '' : null,
        onclick:function(){
          if (!canProceed) return;
          state.phase = Math.min(PHASES.length - 1, state.phase + 1);
          render();
          window.scrollTo({ top:0, behavior:'smooth' });
        }
      }, 'Execute →'));
    } else {
      right.appendChild(el('button', {
        class:'btn-secondary', type:'button',
        onclick:function(){ try { window.print(); } catch(e){} }
      }, '⤓ Print record'));
    }
    $actionbar.appendChild(right);
  }

  /* --- Re-render the chrome (top phase nav + bottom action bar) only.
         Called on every input/change inside $app so the Execute button and
         phase-nav dots reflect the user's latest typing without wiping the
         form fields underneath. --- */
  function refreshChrome(){
    renderPhaseNav();
    renderActionBar();
  }

  /* --- Main render --- */
  function render(){
    refreshChrome();
    $app.innerHTML = '';
    var fn = views[state.phase];
    if (fn) $app.appendChild(fn());
  }

  /* --- Boot --- */
  // Listen for any input/change inside the app so the chrome reflects live validity.
  $app.addEventListener('input',  refreshChrome);
  $app.addEventListener('change', refreshChrome);
  render();
})();
</script>

</body>
</html>
