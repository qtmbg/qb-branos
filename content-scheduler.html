<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB — Content Scheduler</title>
<script>
(function(){
  var p=new URLSearchParams(window.location.search);
  try{window.QB_QBP=JSON.parse(localStorage.getItem('qb_qbp')||'{}');}catch(e){window.QB_QBP={};}
})();
</script>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
  --border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--text2:#888;--text3:#555;
  --green:#4ade80;--green2:rgba(74,222,128,0.12);
  --red:#ef4444;--amber:#f59e0b;--blue:#60a5fa;--purple:#a78bfa;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input,textarea,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font);border-radius:6px;padding:10px 14px;font-size:13px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--green)}
textarea{resize:vertical;line-height:1.6}
select option{background:var(--bg3)}
button{cursor:pointer;font-family:var(--font);border:none;outline:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .35s ease forwards}
.spin{animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const ML=({c,children,mb=8})=><div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.2em',color:c||'var(--text3)',textTransform:'uppercase',marginBottom:mb}}>{children}</div>;
const Card=({children,accent,style={}})=><div style={{background:'var(--bg3)',border:`1px solid ${accent||'var(--border)'}`,borderRadius:8,padding:'16px 20px',...style}}>{children}</div>;

const PLATFORMS=[
  {id:'instagram',label:'Instagram',color:'#f472b6',icon:'⬡'},
  {id:'linkedin_personal',label:'LinkedIn Personal',color:'#60a5fa',icon:'⬢'},
  {id:'linkedin_company',label:'LinkedIn Company',color:'#60a5fa',icon:'⬢'},
  {id:'twitter',label:'X / Twitter',color:'#fff',icon:'✕'},
  {id:'facebook',label:'Facebook',color:'#60a5fa',icon:'◉'},
];

const TIMES=[
  '07:00','08:00','09:00','10:00','11:00','12:00',
  '13:00','14:00','15:00','16:00','17:00','18:00',
  '19:00','20:00','21:00',
];

const BEST_TIMES={
  instagram:['08:00','12:00','17:00','20:00'],
  linkedin_personal:['07:30','12:00','17:30'],
  linkedin_company:['09:00','12:00','17:00'],
  twitter:['08:00','12:00','16:00','20:00'],
  facebook:['09:00','13:00','19:00'],
};

export default function App(){
  const [bufferToken,setBufferToken]=useState(localStorage.getItem('qb_buffer_token')||'');
  const [tokenSaved,setTokenSaved]=useState(!!localStorage.getItem('qb_buffer_token'));
  const [profiles,setProfiles]=useState([]);
  const [loadingProfiles,setLoadingProfiles]=useState(false);
  const [profilesError,setProfilesError]=useState('');
  const [queue,setQueue]=useState([]);
  const [newPost,setNewPost]=useState({text:'',platform:'instagram',profileId:'',date:'',time:'09:00'});
  const [scheduling,setScheduling]=useState(false);
  const [scheduled,setScheduled]=useState([]);
  const [tab,setTab]=useState('queue');
  const [pasteMode,setPasteMode]=useState(false);
  const [bulkText,setBulkText]=useState('');

  const qbp=window.QB_QBP||{};

  // Save token
  const saveToken=()=>{
    localStorage.setItem('qb_buffer_token',bufferToken);
    setTokenSaved(true);
    loadProfiles();
  };

  // Load Buffer profiles via proxy-safe approach
  // Buffer API requires server-side — we use a client-readable approach
  const loadProfiles=async()=>{
    if(!bufferToken){setProfilesError('Add your Buffer token first.');return;}
    setLoadingProfiles(true);setProfilesError('');
    try{
      // Buffer's /profiles endpoint
      const res=await fetch('https://api.bufferapp.com/1/profiles.json?access_token='+encodeURIComponent(bufferToken));
      if(!res.ok)throw new Error('Buffer API error: '+res.status);
      const data=await res.json();
      if(Array.isArray(data)){
        setProfiles(data.map(p=>({id:p.id,service:p.service,username:p.formatted_username||p.username,avatar:p.avatar_https})));
        setProfilesError('');
      } else {
        throw new Error('Unexpected response from Buffer');
      }
    }catch(e){
      setProfilesError(e.message);
      // Show manual profile setup if API fails (CORS likely)
      setProfiles([]);
    }
    setLoadingProfiles(false);
  };

  // Add to queue
  const addToQueue=()=>{
    if(!newPost.text.trim()){return;}
    setQueue(prev=>[...prev,{...newPost,id:Date.now(),status:'queued'}]);
    setNewPost({text:'',platform:'instagram',profileId:newPost.profileId,date:'',time:'09:00'});
  };

  // Bulk import from content agent output
  const importBulk=()=>{
    if(!bulkText.trim())return;
    // Split by double newline or numbered list
    const pieces=bulkText.split(/\n\n(?=\d+\.|POST \d+|Caption:|---)/i).filter(p=>p.trim().length>20);
    const today=new Date();
    const newItems=pieces.map((text,i)=>{
      const d=new Date(today);d.setDate(d.getDate()+i*3);
      return{
        id:Date.now()+i,
        text:text.replace(/^(\d+\.|POST \d+:|Caption:|---)/i,'').trim(),
        platform:'instagram',
        profileId:newPost.profileId||'',
        date:d.toISOString().split('T')[0],
        time:BEST_TIMES.instagram[i%BEST_TIMES.instagram.length],
        status:'queued',
      };
    });
    setQueue(prev=>[...prev,...newItems]);
    setBulkText('');setPasteMode(false);
  };

  // Schedule all queued posts
  const scheduleAll=async()=>{
    if(!bufferToken){setProfilesError('Add your Buffer access token first.');return;}
    setScheduling(true);
    const results=[];
    for(const post of queue.filter(p=>p.status==='queued'&&p.profileId)){
      try{
        const scheduledAt=new Date(post.date+'T'+post.time+':00').getTime()/1000;
        const body=new URLSearchParams({
          text:post.text,
          'profile_ids[]':post.profileId,
          scheduled_at:scheduledAt.toString(),
          access_token:bufferToken,
        });
        const res=await fetch('https://api.bufferapp.com/1/updates/create.json',{method:'POST',body});
        const data=await res.json();
        if(data.success){
          results.push({...post,status:'scheduled',bufferId:data.updates?.[0]?.id});
        } else {
          results.push({...post,status:'error',error:data.message||'Unknown error'});
        }
      }catch(e){
        results.push({...post,status:'error',error:e.message});
      }
    }
    const resultIds=new Set(results.map(r=>r.id));
    setQueue(prev=>prev.map(p=>resultIds.has(p.id)?results.find(r=>r.id===p.id):p));
    setScheduled(prev=>[...prev,...results.filter(r=>r.status==='scheduled')]);
    setScheduling(false);
  };

  const removeFromQueue=(id)=>setQueue(prev=>prev.filter(p=>p.id!==id));

  const todayStr=new Date().toISOString().split('T')[0];

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header style={{borderBottom:'1px solid var(--border)',padding:'0 24px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--bg)',position:'sticky',top:0,zIndex:50}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.3em',color:'var(--green)',textTransform:'uppercase'}}>QB_BRANIDOS</div>
          <div style={{width:1,height:14,background:'var(--border)'}}/>
          <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.2em',color:'var(--text3)',textTransform:'uppercase'}}>Content Scheduler</div>
        </div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.1em'}}>{queue.length} in queue · {scheduled.length} scheduled</div>
      </header>

      <main style={{flex:1,maxWidth:900,margin:'0 auto',width:'100%',padding:'36px 24px'}}>

        {/* BUFFER SETUP */}
        {!tokenSaved&&(
          <div className="fade-in" style={{marginBottom:28}}>
            <Card accent="rgba(245,158,11,0.2)">
              <ML c="var(--amber)" mb={10}>Connect Buffer</ML>
              <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.7,marginBottom:16}}>
                Buffer is a free social media scheduling tool. Connect it once and QB OS queues your content automatically across Instagram, LinkedIn, X, and Facebook.
              </p>
              <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10,marginBottom:12}}>
                <input type="password" value={bufferToken} onChange={e=>setBufferToken(e.target.value)} placeholder="Buffer Access Token — from buffer.com/developers/apps"/>
                <button onClick={saveToken} style={{background:'var(--amber)',color:'#000',padding:'10px 20px',borderRadius:6,fontWeight:700,fontSize:11,letterSpacing:'.08em',textTransform:'uppercase',fontFamily:'var(--mono)',whiteSpace:'nowrap'}}>Connect →</button>
              </div>
              <div style={{background:'var(--bg4)',borderRadius:6,padding:'10px 14px'}}>
                <ML c="var(--text3)" mb={4}>How to get your Buffer token</ML>
                <p style={{fontSize:12,color:'var(--text2)',lineHeight:1.7}}>1. Create a free account at buffer.com<br/>2. Go to buffer.com/developers/apps<br/>3. Create a new application (any name)<br/>4. Copy the Access Token and paste it above</p>
              </div>
            </Card>
          </div>
        )}

        {tokenSaved&&(
          <div style={{marginBottom:20,display:'flex',gap:10,alignItems:'center'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:10,padding:'4px 12px',borderRadius:4,background:'rgba(74,222,128,0.08)',color:'var(--green)',border:'1px solid rgba(74,222,128,0.2)'}}>✓ Buffer connected</div>
            <button onClick={()=>{setTokenSaved(false);}} style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',textDecoration:'underline',textUnderlineOffset:3}}>Change token</button>
            {profiles.length===0&&<button onClick={loadProfiles} style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--blue)',textDecoration:'underline',textUnderlineOffset:3}}>{loadingProfiles?'Loading…':'Load profiles'}</button>}
          </div>
        )}

        {profilesError&&<div style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:6,padding:'10px 14px',marginBottom:16,fontSize:12,color:'var(--red)',lineHeight:1.6}}>{profilesError}<br/><span style={{color:'var(--text3)'}}>Note: Buffer API may require server-side proxy for CORS. In that case, copy your profile IDs manually from buffer.com/app/profile/[YOUR_ID]</span></div>}

        {/* TABS */}
        <div style={{display:'flex',gap:5,marginBottom:24,borderBottom:'1px solid var(--border)',paddingBottom:14}}>
          {['queue','add','bulk','scheduled'].map(t=>(
            <button key={t} onClick={()=>setTab(t)}
              style={{padding:'7px 14px',borderRadius:5,fontSize:11,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)',background:tab===t?'var(--green2)':'transparent',border:`1px solid ${tab===t?'rgba(74,222,128,0.3)':'var(--border)'}`,color:tab===t?'var(--green)':'var(--text3)',cursor:'pointer'}}>
              {t==='queue'?`Queue (${queue.length})`:t==='add'?'Add Post':t==='bulk'?'Bulk Import':`Scheduled (${scheduled.length})`}
            </button>
          ))}
        </div>

        {/* QUEUE TAB */}
        {tab==='queue'&&(
          <div className="fade-in">
            {queue.length===0?(
              <Card>
                <div style={{textAlign:'center',padding:'24px 0'}}>
                  <div style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>No posts in queue yet</div>
                  <button onClick={()=>setTab('add')} style={{background:'var(--green)',color:'#000',padding:'9px 20px',borderRadius:6,fontWeight:700,fontSize:11,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)'}}>Add First Post →</button>
                </div>
              </Card>
            ):(
              <>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
                  <ML c="var(--text3)">{queue.filter(p=>p.status==='queued').length} posts ready to schedule</ML>
                  <button onClick={scheduleAll} disabled={scheduling||queue.filter(p=>p.status==='queued'&&p.profileId).length===0}
                    style={{background:scheduling?'var(--bg3)':'var(--green)',color:'#000',padding:'9px 20px',borderRadius:6,fontWeight:700,fontSize:11,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)',display:'flex',alignItems:'center',gap:8,opacity:queue.filter(p=>p.status==='queued'&&p.profileId).length===0?0.4:1}}>
                    {scheduling&&<div style={{width:12,height:12,border:'2px solid rgba(0,0,0,0.3)',borderTop:'2px solid #000',borderRadius:'50%'}} className="spin"/>}
                    {scheduling?'Scheduling…':'Schedule All →'}
                  </button>
                </div>
                {queue.map((post,i)=>(
                  <div key={post.id} style={{background:'var(--bg3)',border:'1px solid '+(post.status==='scheduled'?'rgba(74,222,128,0.2)':post.status==='error'?'rgba(239,68,68,0.2)':'var(--border)'),borderRadius:10,padding:'16px 18px',marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,marginBottom:10}}>
                      <div style={{flex:1}}>
                        <div style={{display:'flex',gap:8,marginBottom:6}}>
                          <span style={{fontFamily:'var(--mono)',fontSize:9,padding:'2px 8px',borderRadius:3,background:'rgba(255,255,255,0.04)',color:'var(--text3)',border:'1px solid var(--border)',textTransform:'uppercase'}}>{post.platform}</span>
                          <span style={{fontFamily:'var(--mono)',fontSize:9,color:post.status==='scheduled'?'var(--green)':post.status==='error'?'var(--red)':'var(--text3)'}}>{post.status}</span>
                        </div>
                        <div style={{fontSize:13,color:'var(--text)',lineHeight:1.6,marginBottom:8}}>{post.text.substring(0,200)}{post.text.length>200?'…':''}</div>
                        <div style={{display:'flex',gap:16,fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>
                          {post.date&&<span>📅 {post.date}</span>}
                          {post.time&&<span>⏰ {post.time}</span>}
                        </div>
                        {!post.profileId&&<div style={{fontSize:11,color:'var(--amber)',marginTop:6,fontFamily:'var(--mono)'}}>⚠ No profile ID — add before scheduling</div>}
                      </div>
                      {post.status!=='scheduled'&&<button onClick={()=>removeFromQueue(post.id)} style={{color:'var(--text3)',fontSize:18,padding:'2px 6px',borderRadius:4,border:'1px solid var(--border)',background:'none',lineHeight:1}}>×</button>}
                    </div>
                    {/* Quick edit fields */}
                    {post.status==='queued'&&(
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,paddingTop:10,borderTop:'1px solid var(--border)'}}>
                        <input type="text" placeholder="Buffer Profile ID" value={post.profileId} onChange={e=>setQueue(prev=>prev.map(p=>p.id===post.id?{...p,profileId:e.target.value}:p))}/>
                        <input type="date" value={post.date} min={todayStr} onChange={e=>setQueue(prev=>prev.map(p=>p.id===post.id?{...p,date:e.target.value}:p))}/>
                        <select value={post.time} onChange={e=>setQueue(prev=>prev.map(p=>p.id===post.id?{...p,time:e.target.value}:p))}>
                          {TIMES.map(t=><option key={t} value={t}>{t}</option>)}
                        </select>
                      </div>
                    )}
                  </div>
                ))}
              </>
            )}
          </div>
        )}

        {/* ADD POST TAB */}
        {tab==='add'&&(
          <div className="fade-in">
            <Card>
              <ML c="var(--green)" mb={16}>New Post</ML>
              <div style={{marginBottom:14}}>
                <ML>Caption / Text</ML>
                <textarea value={newPost.text} onChange={e=>setNewPost(p=>({...p,text:e.target.value}))} placeholder="Paste your caption from the content agents here…" rows={4}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
                <div>
                  <ML>Platform</ML>
                  <select value={newPost.platform} onChange={e=>setNewPost(p=>({...p,platform:e.target.value}))}>
                    {PLATFORMS.map(pl=><option key={pl.id} value={pl.id}>{pl.label}</option>)}
                  </select>
                </div>
                <div>
                  <ML>Buffer Profile ID</ML>
                  <input type="text" value={newPost.profileId} onChange={e=>setNewPost(p=>({...p,profileId:e.target.value}))} placeholder="e.g. 5b7d6..."/>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
                <div>
                  <ML>Publish Date</ML>
                  <input type="date" value={newPost.date} min={todayStr} onChange={e=>setNewPost(p=>({...p,date:e.target.value}))}/>
                </div>
                <div>
                  <ML>Publish Time</ML>
                  <select value={newPost.time} onChange={e=>setNewPost(p=>({...p,time:e.target.value}))}>
                    {TIMES.map(t=>{
                      const best=BEST_TIMES[newPost.platform]||[];
                      return<option key={t} value={t}>{t}{best.includes(t)?' ★ Best time':''}</option>;
                    })}
                  </select>
                </div>
              </div>
              <button onClick={addToQueue} disabled={!newPost.text.trim()}
                style={{background:newPost.text.trim()?'var(--green)':'var(--bg4)',color:newPost.text.trim()?'#000':'var(--text3)',padding:'11px 24px',borderRadius:6,fontWeight:700,fontSize:12,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)'}}>
                Add to Queue →
              </button>
            </Card>
          </div>
        )}

        {/* BULK IMPORT TAB */}
        {tab==='bulk'&&(
          <div className="fade-in">
            <Card>
              <ML c="var(--purple)" mb={10}>Bulk Import from Content Agents</ML>
              <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.7,marginBottom:16}}>
                Copy all your approved captions from the Instagram Agent, LinkedIn Agent, or Repurposing Engine and paste them here. The scheduler will auto-space them 3 days apart starting today.
              </p>
              <div style={{marginBottom:14}}>
                <ML>Paste Content Below</ML>
                <textarea value={bulkText} onChange={e=>setBulkText(e.target.value)} placeholder="POST 1:&#10;Your first caption here...&#10;&#10;POST 2:&#10;Your second caption here...&#10;&#10;(Separate posts with blank lines or numbered headings)" rows={10}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}}>
                <div>
                  <ML>Default Platform</ML>
                  <select value={newPost.platform} onChange={e=>setNewPost(p=>({...p,platform:e.target.value}))}>
                    {PLATFORMS.map(pl=><option key={pl.id} value={pl.id}>{pl.label}</option>)}
                  </select>
                </div>
                <div>
                  <ML>Buffer Profile ID</ML>
                  <input type="text" value={newPost.profileId} onChange={e=>setNewPost(p=>({...p,profileId:e.target.value}))} placeholder="Applied to all imported posts"/>
                </div>
              </div>
              <button onClick={importBulk} disabled={!bulkText.trim()}
                style={{background:bulkText.trim()?'var(--purple)':'var(--bg4)',color:bulkText.trim()?'#000':'var(--text3)',padding:'11px 24px',borderRadius:6,fontWeight:700,fontSize:12,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)'}}>
                Import and Queue →
              </button>
            </Card>
          </div>
        )}

        {/* SCHEDULED TAB */}
        {tab==='scheduled'&&(
          <div className="fade-in">
            {scheduled.length===0?(
              <Card>
                <div style={{textAlign:'center',padding:'24px 0',fontSize:13,color:'var(--text2)'}}>No posts scheduled yet. Schedule from the Queue tab.</div>
              </Card>
            ):(
              scheduled.map((post,i)=>(
                <div key={post.id} style={{background:'var(--bg3)',border:'1px solid rgba(74,222,128,0.15)',borderRadius:10,padding:'14px 18px',marginBottom:10}}>
                  <div style={{display:'flex',gap:8,marginBottom:6}}>
                    <span style={{fontFamily:'var(--mono)',fontSize:9,padding:'2px 8px',borderRadius:3,background:'rgba(74,222,128,0.08)',color:'var(--green)',border:'1px solid rgba(74,222,128,0.15)'}}>✓ SCHEDULED</span>
                    <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>{post.platform}</span>
                  </div>
                  <div style={{fontSize:13,color:'var(--text)',lineHeight:1.6,marginBottom:6}}>{post.text.substring(0,150)}{post.text.length>150?'…':''}</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{post.date} at {post.time} · Buffer ID: {post.bufferId||'–'}</div>
                </div>
              ))
            )}
          </div>
        )}

      </main>

      <footer style={{borderTop:'1px solid var(--border)',padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.2em',textTransform:'uppercase'}}>Quantum Branding BrandOS</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.12em'}}>Content Scheduler — Powered by Buffer</span>
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
