  padding: 24px;
  margin-bottom: 16px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.glass-card::before {
  content: '';
  position: absolute;
  top: -30%; left: -10%;
  width: 60%; height: 60%;
  background: radial-gradient(ellipse at center, var(--brass-faint) 0%, transparent 70%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.glass-card:hover,
.glass-card:focus {
  border-color: var(--border-medium);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px -8px rgba(0,0,0,0.4);
  outline: none;
}

[data-theme="light"] .glass-card:focus { box-shadow: 0 12px 32px -8px rgba(100,80,50,0.1); }
.glass-card:hover::before,
.glass-card:focus::before { opacity: 1; }

.glass-card.is-popular {
  background: var(--bg-base);
  border-color: var(--border-medium);
}
.glass-card.is-popular::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2.5px;
  background: linear-gradient(180deg, var(--brass) 0%, var(--patina) 100%);
  border-radius: 2px 0 0 2px;
  box-shadow: 0 0 8px var(--brass-faint);
}

.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--brass);
  box-shadow: 0 0 8px var(--brass-dim), 0 0 2px var(--brass);
  animation: beat 3s ease infinite;
  flex-shrink: 0;
}
@keyframes beat {
  0%, 100% { transform: scale(1); opacity: 1; }
  12% { transform: scale(1.35); opacity: 1; }
  24% { transform: scale(0.95); opacity: 0.6; }
  36% { transform: scale(1.15); opacity: 1; }
  48% { transform: scale(1); opacity: 0.7; }
}

.spinner {
  width: 48px; height: 48px;
  border: 2px solid var(--border-medium);
  border-top: 2px solid var(--patina);
  border-left: 2px solid var(--brass);
  border-radius: 50%;
  animation: spin 0.8s cubic-bezier(0.6, 0.1, 0.4, 0.9) infinite;
  margin: 0 auto 24px;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }

  html += `
    <div class="free-note">
      <div class="pulse-dot" style="animation-duration: 4s;"></div>
      <span class="free-note-text">Free: Signal Scan + Brand Soul Map + Sensescape</span>
    </div>
    <div style="text-align:center; margin-top: 24px;">
      <span style="font-size:13px; color:var(--text-3);">Already subscribed? </span>
      <button type="button" class="text-link" onclick="showLogin()">Sign in →</button>
    </div>
  `;

  app.innerHTML = html;
}

function renderAuth() {
  const plan = PLANS.find(p => p.id === selectedPlan);

  const passAutocomplete = authMode === 'signup' ? 'new-password' : 'current-password';
  const passPlaceholder  = authMode === 'signup' ? 'Password (min 8 characters)' : 'Password';

  let html = `
    <button type="button" class="back-btn" onclick="goBack()">← Back to plans</button>
  `;

  if (plan) {
    html += `<div class="auth-badge">${plan.name} · ${plan.price}/month</div>`;
  }

  html += `
    <h2 class="auth-title">${authMode === 'signup' ? 'Create your account' : 'Sign in'}</h2>
    <p class="auth-sub">${authMode === 'signup' ? 'Your account stores your QBP and unlocks your tools.' : 'Welcome back to your Brand OS.'}</p>
  `;

  if (errorMsg) {
    html += `<div class="error-msg" role="alert">${encodeHTML(errorMsg)}</div>`;
  }

  html += `
    <div class="input-group">
      <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="input-group">
      <input type="password" id="auth-pass" placeholder="${passPlaceholder}" autocomplete="${passAutocomplete}">
    </div>
    <button type="button" class="btn-primary" id="auth-submit">
      ${authMode === 'signup' ? 'Continue to Payment →' : 'Sign In →'}
    </button>
    <div style="text-align:center; margin-top: 24px; font-size: 13px; color: var(--text-3);">
      ${authMode === 'signup'
        ? 'Already have an account? <button type="button" class="text-link" onclick="toggleAuthMode()">Sign in</button>'
        : 'New here? <button type="button" class="text-link" onclick="toggleAuthMode()">Create account</button>'}
    </div>
  `;

  app.innerHTML = html;

  document.getElementById('auth-submit').onclick = async () => {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-pass').value;
    if (!email || !password) { errorMsg = 'Please fill in all fields.'; render(); return; }
    if (password.length < 8) { errorMsg = 'Password must be at least 8 characters.'; render(); return; }
    await handleAuth(email, password);
  };
}

function renderConfirmEmail() {
  app.innerHTML = `
    <div class="center-view">
      <div class="success-icon">✉</div>
      <h2 style="font-size: 28px; margin-bottom: 12px;">Check your inbox</h2>
      <p style="margin-bottom: 24px;">We sent a confirmation link to your email address. Click it, then return here to sign in and complete your checkout.</p>
      <div class="info-note">After confirming your email, use <strong>Sign In</strong> below to proceed to payment.</div>
      <button type="button" class="btn-primary" style="margin-top: 32px;" onclick="switchToLogin()">Sign In After Confirming →</button>
    </div>
  `;
}

function renderProcessing() {
  app.innerHTML = `
    <div class="center-view">
      <div class="spinner"></div>
      <h2 style="font-size:22px; margin-bottom:12px;">Redirecting to checkout</h2>
      <p>You will complete payment securely on Stripe.</p>
    </div>
  `;
}

function renderSuccess() {
  app.innerHTML = `
    <div class="center-view">
      <div class="success-icon">✓</div>
      <h2 style="font-size: 36px; margin-bottom: 16px;">You're in.</h2>
      <p style="margin-bottom: 32px;">Your account is active. Your API key and QBP are waiting in the system.</p>
      <button type="button" class="btn-primary" onclick="window.location.href='/qb-branidos-hub.html'">Enter QB BrandOS →</button>
    </div>
  `;
}

function renderError() {
  app.innerHTML = `
    <div class="center-view">
      <div class="error-icon">!</div>
      <h2 style="font-size: 24px; margin-bottom: 12px; color: var(--text-1);">Something went wrong</h2>
      <p style="margin-bottom: 32px; color: var(--text-2);">${encodeHTML(errorMsg || 'Please try again or contact support.')}</p>
      <button type="button" class="btn-primary" onclick="goBack()">← Try Again</button>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
// ACTIONS & LOGIC
// ─────────────────────────────────────────────────────────────────────────────
window.goBack = function() {
  view = prevView || 'plans';
  errorMsg = '';
  render();
};

window.switchToLogin = function() {
  authMode = 'login';
  errorMsg = '';
  view = 'auth';
  render();
};

window.toggleAuthMode = function() {
  authMode = authMode === 'signup' ? 'login' : 'signup';
  errorMsg = '';
  render();
};

window.selectPlan = function(planId) {
  selectedPlan = planId;
  authMode = 'signup';
  errorMsg = '';
  prevView = 'plans';
  const session = getSession();
  if (session) {
    redirectToStripe(session.email);
  } else {
    view = 'auth';
    render();
  }
};

window.showLogin = function() {
  selectedPlan = null;
  authMode = 'login';
  errorMsg = '';
  prevView = 'plans';
  view = 'auth';
  render();
};

async function handleAuth(email, password) {
  view = 'processing';
  render();

  if (!isConfigured) {
    saveSession({ email, tier: selectedPlan || 'starter', demo: true });
    localStorage.setItem('qb_user_email', email);
    localStorage.setItem('qb_user_tier', selectedPlan || 'starter');
    view = 'success';
    render();
    return;
  }

  try {
    const endpoint = authMode === 'signup'
      ? CONFIG.SUPABASE_URL + '/auth/v1/signup'
      : CONFIG.SUPABASE_URL + '/auth/v1/token?grant_type=password';

    const res  = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': CONFIG.SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.error || (!data.access_token && !data.user)) {
      errorMsg = data.error?.message || data.msg || 'Authentication failed';
      prevView = 'auth';
      view = 'auth';
      render();
      return;
    }

    // Handle Supabase email confirmation pending: signup returns { user, session: null }
    if (authMode === 'signup' && data.user && !data.session) {
      view = 'confirm-email';
      render();
      return;
    }

    const session = authMode === 'signup' ? data.session : data;
    saveSession({ email, token: session?.access_token, supabaseId: data.user?.id });
    localStorage.setItem('qb_user_email', email);

    // Login: go to checkout if a plan is selected, otherwise go straight to hub
    if (authMode === 'login') {
      if (selectedPlan) {
        await redirectToStripe(email);
      } else {
        window.location.href = '/qb-branidos-hub.html';
      }
      return;
    }

    // Signup: proceed to checkout or success
    if (selectedPlan) {
      await redirectToStripe(email);
    } else {
      view = 'success';
      render();
    }

  } catch(e) {
    errorMsg = 'Connection error: ' + e.message;
    prevView = 'auth';
    view = 'auth';
    render();
  }
}

// PAYMENT_LINKS are the primary path — no server required.
// stripe.redirectToCheckout({ lineItems }) is deprecated; kept as last resort only.
// Future migration: create a server-side Checkout Session and redirect to session.url.
async function redirectToStripe(email) {
  if (!selectedPlan) { view = 'plans'; render(); return; }

  view = 'processing'; render();

  // Primary: Stripe Payment Links with email prefill
  const link = CONFIG.PAYMENT_LINKS[selectedPlan];
  if (link) {
    const url = link + (email ? '?prefilled_email=' + encodeURIComponent(email) : '');
    window.location.href = url;
    return;
  }

  // Last resort: legacy Stripe.js (deprecated)
  if (!isConfigured || !stripe) {
    errorMsg = 'Payment system unavailable. Please contact support.';
    prevView = 'plans';
    view = 'error';
    render();
    return;
  }

  try {
    const result = await stripe.redirectToCheckout({
      lineItems: [{ price: CONFIG.PRICES[selectedPlan], quantity: 1 }],
      mode: 'subscription',
      successUrl: CONFIG.SUCCESS_URL + '&plan=' + selectedPlan,
      cancelUrl: CONFIG.CANCEL_URL,
      customerEmail: email,
    });
    if (result.error) throw new Error(result.error.message);
  } catch(e) {
    errorMsg = e.message;
    prevView = 'plans';
    view = 'error';
    render();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// SESSION & UTILS
// ─────────────────────────────────────────────────────────────────────────────
function saveSession(data) {
  try { localStorage.setItem('qb_session', JSON.stringify(data)); } catch(e) {}
}
function getSession() {
  try { const s = localStorage.getItem('qb_session'); return s ? JSON.parse(s) : null; } catch(e) { return null; }
}

// Fires after Stripe redirects back to payment.html?payment=success
// Sets qb_user_tier and merges plan into the session object
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('payment') === 'success') {
  const plan = urlParams.get('plan');
  if (plan) {
    localStorage.setItem('qb_user_tier', plan);
    const existing = getSession();
    if (existing) saveSession({ ...existing, tier: plan });
  }
  view = 'success';
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', render);
} else {
  render();
}
</script>
</body>
</html>
