<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* Entangled Time - Dark Theme (Default) */
:root, [data-theme="dark"] {
  --bg-void: #080604;
  --bg-deep: #0A0806;
  --bg-base: #0E0C09;
  --bg-surface: rgba(140, 110, 70, 0.045);
  --bg-elevated: rgba(140, 110, 70, 0.07);
  --bg-overlay: rgba(18, 15, 10, 0.85);
  
  --border-subtle: rgba(140, 110, 70, 0.06);
  --border-medium: rgba(140, 110, 70, 0.11);
  --border-strong: rgba(140, 110, 70, 0.18);
  
  --patina: #3A5F4A;
  --patina-lit: #4A7A5E;
  --patina-dim: rgba(58, 95, 74, 0.2);
  --patina-faint: rgba(58, 95, 74, 0.08);
  
  --brass: #A8903E;
  --brass-lit: #C4A84E;
  --brass-dim: rgba(168, 144, 62, 0.18);
  --brass-faint: rgba(168, 144, 62, 0.06);
  
  --phase-creation: #4A7A8A;
  --phase-content: #8A5A5A;
  --phase-execution: #5A7A6A;
  
  --text-1: #DDD4C4;
  --text-2: #A89A88;
  --text-3: #6A5E50;
  --text-4: #3E3830;
  
  --font-serif: 'DM Serif Display', Georgia, serif;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* Legacy mappings to prevent breaking inline styles */
  --bg: var(--bg-base); --bg2: var(--bg-deep); --bg3: var(--bg-surface); --bg4: var(--bg-elevated);
  --border: var(--border-medium); --border2: var(--border-strong);
  --text: var(--text-1); --text2: var(--text-2); --text3: var(--text-3); --text4: var(--text-4);
  --green: var(--patina); --green2: var(--patina-dim);
  --amber: var(--brass); --amber2: var(--brass-dim);
  --blue: var(--phase-creation); --blue2: rgba(74,122,138,0.12);
  --purple: var(--phase-content); --purple2: rgba(138,90,90,0.12);
  --teal: var(--phase-execution); --teal2: rgba(90,122,106,0.12);
  --red: #8A4A4A; --red2: rgba(138,74,74,0.1);
}

/* Entangled Time - Light Theme */
[data-theme="light"] {
  --bg-void: #F4F0EB;
  --bg-deep: #EDE8E2;
  --bg-base: #E6E0D8;
  --bg-surface: rgba(100, 80, 50, 0.04);
  --bg-elevated: rgba(100, 80, 50, 0.07);
  --bg-overlay: rgba(244, 240, 235, 0.9);
  
  --border-subtle: rgba(100, 80, 50, 0.08);
  --border-medium: rgba(100, 80, 50, 0.14);
  --border-strong: rgba(100, 80, 50, 0.22);
  
  --patina: #2E4E3C;
  --patina-lit: #3A6A4E;
  --patina-dim: rgba(46, 78, 60, 0.15);
  --patina-faint: rgba(46, 78, 60, 0.06);
  
  --brass: #8A7430;
  --brass-lit: #A08A3A;
  --brass-dim: rgba(138, 116, 48, 0.15);
  --brass-faint: rgba(138, 116, 48, 0.05);

  --phase-creation: #2E5A6A;
  --phase-content: #6A3A3A;
  --phase-execution: #3A5A4A;
  
  --text-1: #1A1610;
  --text-2: #5A5040;
  --text-3: #8A7E70;
  --text-4: #B8AEA0;

  --red: #8A3030;
  --red2: rgba(138,48,48,0.1);
}

body {
  background: var(--bg-void);
  color: var(--text-2);
  font-family: var(--font-sans);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Film Grain Overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}
[data-theme="light"] body::after { opacity: 0.02; }

/* Warm Vignette */
.main-wrapper::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(8,6,4,0.4) 100%);
}
[data-theme="light"] .main-wrapper::before {
  background: radial-gradient(ellipse 70% 60% at 50% 35%, transparent 0%, rgba(200,190,175,0.15) 100%);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* Typography */
h1, h2, h3, h4, .font-serif {
  font-family: var(--font-serif);
  font-weight: 400;
  color: var(--text-1);
  letter-spacing: -0.015em;
  margin: 0;
}
.font-mono {
  font-family: var(--font-mono);
}

/* Inputs */
input, textarea, select {
  background: var(--bg-surface);
  border: 1px solid var(--border-medium);
  color: var(--text-1);
  font-family: var(--font-sans);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
input::placeholder, textarea::placeholder {
  color: var(--text-3);
  font-style: italic;
  opacity: 0.7;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--patina);
  box-shadow: 0 0 0 3px var(--patina-faint), 0 0 24px -4px var(--brass-faint);
  background: var(--bg-elevated);
}
textarea { resize: vertical; line-height: 1.7; }
select option { background: var(--bg-deep); color: var(--text-1); }

/* Buttons */
button { cursor: pointer; font-family: var(--font-sans); border: none; outline: none; background: none; }

.btn-primary {
  background: var(--patina);
  color: #E6DDD0; /* Always cream for primary button */
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 13px 30px;
  border-radius: 7px;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary:hover:not(:disabled) {
  background: var(--patina-lit);
  transform: translateY(-1px);
  box-shadow: 0 4px 24px -4px var(--patina-dim), 0 0 0 1px var(--brass-faint);
}
.btn-primary:disabled {
  background: var(--bg-surface);
  color: var(--text-3);
  cursor: not-allowed;
  border: 1px solid var(--border-medium);
}

/* Tabs */
.tab-btn {
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: var(--font-mono);
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-3);
  transition: all 0.3s ease;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text-1); background: var(--bg-surface); }
.tab-btn.active {
  background: var(--bg-elevated);
  border-color: var(--border-strong);
  color: var(--text-1);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}

/* Glass Cards & Manifesto Blocks */
.glass-card {
  background: var(--bg-overlay);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s ease;
}
.glass-card::before {
  content: '';
  position: absolute;
  top: -30%; left: -10%;
  width: 60%; height: 60%;
  background: radial-gradient(ellipse at center, var(--brass-faint) 0%, transparent 70%);
  pointer-events: none;
  opacity: 0.7;
}

.manifesto-block {
  position: relative;
  padding: 24px 0 24px 26px;
}
.manifesto-block::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2.5px;
  background: linear-gradient(180deg, var(--brass) 0%, var(--patina) 100%);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--brass-faint);
}

/* UI Elements */
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--brass);
  box-shadow: 0 0 8px var(--brass-dim), 0 0 2px var(--brass);
  animation: beat 3s ease infinite;
}
@keyframes beat {
  0%, 100% { transform: scale(1); opacity: 1; }
  12% { transform: scale(1.35); opacity: 1; }
  24% { transform: scale(0.95); opacity: 0.6; }
  36% { transform: scale(1.15); opacity: 1; }
  48% { transform: scale(1); opacity: 0.7; }
}

.issue-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-medium);
  border-radius: 10px;
  padding: 16px 20px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  margin-bottom: 8px;
}
.issue-card:hover { border-color: var(--border-strong); background: var(--bg-elevated); transform: translateX(2px); }
.issue-card.active {
  border-color: var(--patina);
  background: var(--bg-overlay);
  box-shadow: 0 4px 20px -4px var(--patina-faint);
}

.section-block {
  background: var(--bg-surface);
  border: 1px solid var(--border-medium);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: all 0.3s ease;
}
.section-hd {
  padding: 14px 18px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.2s;
}
.section-hd:hover { background: var(--bg-elevated); }

.pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 10px;
  font-family: var(--font-mono);
  margin: 2px 4px 2px 0;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.pill-teal { background: var(--patina-faint); color: var(--patina-lit); border: 1px solid var(--patina-dim); }
.pill-green { background: rgba(58,95,74,0.12); color: var(--patina); border: 1px solid var(--patina-dim); }
.pill-amber { background: var(--brass-faint); color: var(--brass-lit); border: 1px solid var(--brass-dim); }
.pill-blue { background: rgba(74,122,138,0.1); color: var(--phase-creation); border: 1px solid rgba(74,122,138,0.2); }
.pill-purple { background: rgba(138,90,90,0.1); color: var(--phase-content); border: 1px solid rgba(138,90,90,0.2); }
.pill-neutral { background: var(--bg-elevated); color: var(--text-2); border: 1px solid var(--border-medium); }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); filter: blur(4px); }
  to { opacity: 1; transform: translateY(0); filter: blur(0); }
}
.fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 1.5s linear infinite; }
@keyframes scanH { 0% { left: -100%; } 100% { left: 200%; } }
.scan-line { position: relative; overflow: hidden; }
.scan-line::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, var(--patina-faint), transparent);
  animation: scanH 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}

/* Header/Layout Base */
.app-header {
  border-bottom: 1px solid var(--border-subtle);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-overlay);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 50;
}
.main-wrapper {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.content-container {
  max-width: 1040px;
  margin: 0 auto;
  width: 100%;
  padding: 48px 24px;
  position: relative;
  z-index: 10;
}
/* === v3.4 OVERRIDE BLOCK (cream/ink/Fraunces ecosystem unification) === */
:root {
  --cream:#FBF5E6 !important; --cream-card:#F2EBD3; --cream-warm:#ECDDB8; --cream-edge:#DBD4C0;
  --cream-rose:#F4D9DD; --white:#FFFEF8;
  --ink:#2D1521 !important;
  --ink-75:rgba(45,21,33,0.75); --ink-50:rgba(45,21,33,0.50);
  --ink-33:rgba(45,21,33,0.33); --ink-25:rgba(45,21,33,0.25);
  --gold:#E0B069; --gold-deep:#B58840; --rose:#CA6180; --rose-deep:#8E3F58;
  --teal:#9ED3DC; --teal-deep:#5BA8B5; --aubergine:#4A2B3A;
  --pink:#FCB7C7; --butter:#FEFD99; --teal-soft:#C5E5E9; --rose-soft:#ECC4D0;
  --phase-acquisition:#C5E5E9; --phase-discovery:#9CC4A2; --phase-creation:#B5C8E5;
  --phase-content:#FCB7C7; --phase-execution:#E89380; --phase-intelligence:#B080A0;
  --illus-forest:#5B7E6A; --illus-peach:#E89380; --illus-coral:#DC6B52;
  --illus-mustard:#D4B85A; --illus-rust:#B8704D; --illus-lavender:#B8A0C7; --illus-pink-soft:#F4C4D0;
  --bg-void:var(--cream) !important; --bg-deep:var(--cream-card) !important; --bg-base:var(--cream) !important;
  --bg-surface:var(--cream-card) !important; --bg-elevated:var(--white) !important; --bg-overlay:var(--white) !important;
  --border-subtle:var(--ink-25) !important; --border-medium:var(--ink-33) !important; --border-strong:var(--ink-50) !important;
  --text-1:var(--ink) !important; --text-2:var(--ink-75) !important; --text-3:var(--ink-50) !important; --text-4:var(--ink-33) !important;
  --patina:var(--phase-discovery) !important; --patina-lit:var(--illus-forest) !important;
  --patina-dim:rgba(156,196,162,0.25) !important; --patina-faint:rgba(156,196,162,0.10) !important;
  --brass:var(--gold) !important; --brass-lit:var(--gold-deep) !important;
  --brass-dim:rgba(224,176,105,0.25) !important; --brass-faint:rgba(224,176,105,0.10) !important;
  --error:var(--rose-deep) !important;
  --font-display:'Fraunces','Times New Roman',serif !important;
  --font-serif:'Fraunces','Times New Roman',serif !important;
  --serif:'Fraunces','Times New Roman',serif !important;
  --font-body:'Inter',-apple-system,sans-serif !important;
  --font-mono:'JetBrains Mono',monospace !important;
}
[data-theme="dark"] { /* deactivated by v3.4 override */ }


/* =====================================================
   TOOL SHELL SOT UPGRADE (auto-injected, ecosystem.html aligned)
   Aligns every tool with the ecosystem page on motion, depth,
   spring, and entrance rhythm. Additive only.
   ===================================================== */

/* Snappier pop on every legacy button class. The ecosystem qb-button
   already has its own pop; this brings the rest of the surface up. */
.btn, .btn-primary, .btn-secondary, .btn-ghost, .btn-ghost-link,
.cta-primary, .cta-secondary, .option-btn, .filter-pill, .bcard-cta,
.card-cta, .bottom-cta-btn, .nav-actions .btn, .mmenu .btn {
  transition:
    transform 0.4s cubic-bezier(0.19,1,0.22,1),
    filter 0.4s cubic-bezier(0.19,1,0.22,1),
    box-shadow 0.4s cubic-bezier(0.19,1,0.22,1),
    background 0.4s cubic-bezier(0.19,1,0.22,1),
    color 0.4s cubic-bezier(0.19,1,0.22,1);
}
@media (hover:hover) {
  .btn:hover, .btn-primary:hover, .btn-secondary:hover, .btn-ghost:hover,
  .cta-primary:hover, .cta-secondary:hover, .option-btn:hover,
  .filter-pill:hover, .bcard-cta:hover, .card-cta:hover, .bottom-cta-btn:hover {
    transform: translateY(-3px);
    filter: brightness(1.07);
  }
}
.btn:active, .btn-primary:active, .btn-secondary:active,
.cta-primary:active, .cta-secondary:active, .option-btn:active,
.filter-pill:active, .bcard-cta:active, .card-cta:active, .bottom-cta-btn:active {
  transform: translateY(2px) scale(0.97);
  filter: brightness(0.92);
  transition-duration: 0.15s;
}

/* Hard offset shadow + hover lift on every common card surface. */
.glass-card, .mock-card, .qb-card, .qb-illus-card,
.price-card, .testi-card, .phase-card, .how-card,
.tool-card, .tool-bcard, .stat-card, .compass-card, .voice-card,
.proof-card, .module-card, .codex-card, .panel-verdict {
  transition:
    transform 0.5s cubic-bezier(0.19,1,0.22,1),
    box-shadow 0.5s cubic-bezier(0.19,1,0.22,1) !important;
}
@media (hover:hover) {
  .glass-card:hover, .mock-card:hover, .qb-card:hover,
  .price-card:hover, .testi-card:hover, .phase-card:hover, .how-card:hover,
  .tool-card:hover, .tool-bcard:hover, .stat-card:hover, .compass-card:hover {
    transform: translateY(-4px);
  }
  .qb-illus-card:hover { transform: translate(-4px, -4px); }
}

/* Richer reveal entrance. Override the legacy fade-in keyframe so any
   element with .fade-in or [data-reveal] gets the ecosystem treatment. */
@keyframes qb-shell-reveal {
  from { opacity: 0; transform: translateY(36px) scale(0.97); filter: blur(4px); }
  to   { opacity: 1; transform: none; filter: blur(0); }
}
.fade-in { animation: qb-shell-reveal 0.9s cubic-bezier(0.19,1,0.22,1) forwards !important; }

/* Idle float on illustration assets where they exist. */
@keyframes qb-shell-float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
.qb-illus-card img,
.illus-anchor,
.compass-illust img,
.founder-portrait img,
.synergy-vid {
  animation: qb-shell-float 8s ease-in-out infinite;
}

/* Pop the qb-button two-layer pill harder so the spring matches
   ecosystem (only takes effect where qb-button already exists). */
@media (hover:hover) {
  .qb-button:hover .qb-button_content {
    transform: translateY(-0.45em) scale(1.02);
    filter: brightness(1.08);
  }
  .qb-button:hover::before { transform: translateY(0.05em) scale(0.99); }
}
.qb-button:active .qb-button_content {
  transform: translateY(0.32em) scale(0.96);
  filter: brightness(0.92);
  transition-duration: 0.15s;
}
.qb-button:active::before {
  transform: translateY(0.42em) scale(0.99);
  transition-duration: 0.15s;
}

/* Reduced-motion guards for everything above. */
@media (prefers-reduced-motion: reduce) {
  .btn, .btn-primary, .btn-secondary, .btn-ghost,
  .cta-primary, .cta-secondary, .option-btn, .filter-pill,
  .glass-card, .mock-card, .qb-card, .qb-illus-card,
  .price-card, .testi-card, .phase-card, .how-card,
  .tool-card, .tool-bcard {
    transition: none !important;
  }
  .btn:hover, .cta-primary:hover, .glass-card:hover, .mock-card:hover,
  .qb-card:hover, .qb-illus-card:hover, .qb-button:hover .qb-button_content {
    transform: none !important;
  }
  .fade-in { animation: none !important; opacity: 1; transform: none; filter: none; }
  .qb-illus-card img, .illus-anchor, .compass-illust img,
  .founder-portrait img, .synergy-vid { animation: none !important; }
}

/* === END TOOL SHELL SOT UPGRADE === */

</style>

<script>
// QB_SPINE v2 - API Key + QBP + Multi-provider adapter
(function(){
  var params = new URLSearchParams(window.location.search);
  var urlQBP = params.get('qbp');
  if(urlQBP){ try{ localStorage.setItem('qb_qbp', atob(urlQBP)); }catch(e){ console.warn('[QB_SPINE] Failed to decode/store QBP token:', e.message); } }
  try{ window.QB_QBP = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); }catch(e){ console.warn('[QB_SPINE] Failed to parse QBP - using empty profile:', e.message); window.QB_QBP = {}; }
  
  window.QB_AI = async function(systemPrompt, userPrompt, maxTokens){
    maxTokens = maxTokens || 4000;
    var body = {
      model: 'claude-sonnet-4-6',
      max_tokens: Math.min(maxTokens, 8000),
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    };
    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    var d = await res.json();
    if(d.error) throw new Error(d.error.message);
    return d.content[0].text;
  };
  
  window.QB_AUTOFILL = function(fieldMap){
    if(!window.QB_QBP) return;
    Object.entries(fieldMap).forEach(function(kv){
      var el = document.getElementById(kv[0]) || document.querySelector('[data-qbp="'+kv[1]+'"]');
      if(el && window.QB_QBP[kv[1]] && !el.value) el.value = window.QB_QBP[kv[1]];
    });
  };
})();
</script>

<script type="text/babel">

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState(0);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [result, setResult] = useState(null);
  const [activeIssue, setActiveIssue] = useState(0);
  const [mainTab, setMainTab] = useState('architecture');

  const [brandName, setBrandName] = useState('');
  const [founderName, setFounderName] = useState('');
  const [brandEssence, setBrandEssence] = useState('');
  const [spark, setSpark] = useState('');
  const [naturalForce, setNaturalForce] = useState('');
  const [archetype, setArchetype] = useState('');
  const [manifestoLine, setManifestoLine] = useState('');
  const [antiBrand, setAntiBrand] = useState('');
  const [primaryPersona, setPrimaryPersona] = useState('');
  const [offer, setOffer] = useState('');
  const [transformation, setTransformation] = useState('');
  const [voiceNotes, setVoiceNotes] = useState('');
  const [alwaysNever, setAlwaysNever] = useState('');
  const [newsletterGoal, setNewsletterGoal] = useState('');
  const [existingNewsletter, setExistingNewsletter] = useState('');
  const [newsletterName, setNewsletterName] = useState('');

  useEffect(() => {
    const q = window.QB_QBP || {};
    if (q.brandName) setBrandName(q.brandName);
    if (q.brandEssence) setBrandEssence(q.brandEssence);
    if (q.spark) setSpark(q.spark);
    if (q.naturalForce) setNaturalForce(q.naturalForce);
    if (q.archetype) setArchetype(q.archetype);
    if (q.manifesto) setManifestoLine(q.manifesto);
    if (q.antiBrand) setAntiBrand(q.antiBrand);
    if (q.primaryPersona) setPrimaryPersona(q.primaryPersona);
    if (q.offer) setOffer(q.offer);
    if (q.founderName) setFounderName(q.founderName);
    if (q.transformation) setTransformation(q.transformation);
    if (q.voiceNotes) setVoiceNotes(q.voiceNotes);
    if (q.alwaysNever) setAlwaysNever(q.alwaysNever);
  }, []);

  const isValid = () => brandName && brandEssence && naturalForce && archetype && primaryPersona && offer;

  const buildPrompt = () => `You are the Newsletter Architecture Agent inside the Quantum Branding BrandOS ecosystem.
Your function is to design a complete newsletter system and write the first 4 issues fully from a Quantum Brand Profile.
The newsletter is the highest-leverage owned channel - no algorithm between the brand and the audience.
Return ONLY valid JSON - no markdown, no preamble.

QUANTUM BRAND PROFILE:
Brand: ${brandName}
Author: ${founderName||'[Author]'}
Brand Essence: ${brandEssence}
The Spark: ${spark||'not specified'}
Natural Force: ${naturalForce}
Archetype: ${archetype}
Manifesto: ${manifestoLine||'not specified'}
Anti-Brand: ${antiBrand||'not specified'}
Primary Persona: ${primaryPersona}
Core Offer: ${offer}
Transformation: ${transformation||'not specified'}
Voice Notes: ${voiceNotes||'not specified'}
Always/Never: ${alwaysNever||'not specified'}
Newsletter Goal: ${newsletterGoal||'Build owned audience, establish authority, drive toward offer'}
Existing Newsletter: ${existingNewsletter||'none'}
Newsletter Name Idea: ${newsletterName||'generate one'}

Return a JSON object with EXACTLY this structure:
{
  "architecture": {
    "name": "the newsletter name - specific, memorable, brand-aligned",
    "tagline": "one-line positioning statement for the newsletter",
    "nameRationale": "2-3 sentences on why this name works for this brand",
    "positioningStatement": "what this newsletter is, who it's for, and why it exists - one sentence",
    "format": "2-3 sentences describing the format structure - length, feel, what a typical issue contains",
    "sections": ["section name 1", "section name 2", "section name 3"],
    "cadence": "send frequency and day recommendation with reasoning",
    "idealReader": "specific description of who subscribes and why",
    "toneRegister": "how this newsletter sounds - 2 sentences. Different from the brand's other channels how?",
    "signatureElements": ["distinctive recurring element - e.g. opening ritual, sign-off phrase, section header style"],
    "growthStrategy": "how to grow the list - first 100, first 1000, ongoing",
    "platformRecommendation": "which platform to use and why - Beehiiv, Substack, ConvertKit, etc. specific reasoning",
    "welcomeEmailOutline": "the welcome email sequence - what each email in the onboarding does"
  },
  "issues": [
    {
      "issueNumber": 1,
      "issueType": "Manifesto | Deep dive | Framework | Story | Challenge | Observation",
      "subjectLine": "the exact subject line - specific, not generic",
      "subjectLineVariants": ["variant A", "variant B"],
      "previewText": "the preview text that appears in inbox - 40-90 chars",
      "premise": "what this issue is about in one sentence",
      "readTime": "e.g. 4 min read",
      "strategicPurpose": "what this issue achieves in the 4-issue arc",
      "bestSendTime": "e.g. Tuesday 7am - with reasoning",
      "opening": "the complete opening section - the hook paragraph or two that makes the reader stay. Written fully. On-brand voice. Not a generic introduction.",
      "sections": [
        {
          "sectionName": "section name / header",
          "content": "complete section content - word for word, fully written, on-brand voice, as if ready to send. Every section should feel like the author is talking directly to the reader."
        }
      ],
      "closing": "the complete closing - the wrap, the one thing to remember, and the specific CTA. Not generic.",
      "ps": "the P.S. - an afterthought, a human moment, or a secondary CTA. This is often the most-read part of any email.",
      "growthHook": "the referral or forward prompt embedded naturally in this issue",
      "repurposeAngles": ["LinkedIn post angle from this issue", "Instagram quote angle", "YouTube video angle"]
    }
  ]
}

REQUIREMENTS:
- 4 issues - each fully written. No placeholders, no summaries, no outlines.
- Issue 1: Manifesto / Why this newsletter exists - sets the tone, establishes authority, makes a promise
- Issue 2: A belief challenge - takes a contrarian position the persona needs to hear
- Issue 3: A framework or method reveal - demonstrates expertise, gives real value
- Issue 4: A transformation story or case - proves the method works, drives toward offer naturally
- Every section must be complete prose, not bullets or headers only
- Voice must match the QBP voice notes - sounds like this specific person, not a generic newsletter
- Opening hooks must earn the read - first paragraph determines everything
- Architecture sections: exactly 3 recurring sections per issue (same structure each issue = signature format)
- All 4 issues together tell a story that moves the reader from stranger to believer`;

  const run = async () => {
    if(!isValid()) { setError('Complete required fields (*).'); return; }
    setError(''); setLoading(true); setStep(1);
    try {
      const res = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 8000,
          system: 'You are the Newsletter Architecture Agent inside the Quantum Branding BrandOS ecosystem. Return ONLY valid JSON - no markdown, no preamble.',
          messages: [{role: 'user', content: buildPrompt()}]
        })
      });
      const d = await res.json();
      if(d.error) throw new Error(d.error.message);
      const raw = d.content[0].text.trim();
      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new SyntaxError('No JSON object found in agent response.');
      setResult(JSON.parse(jsonMatch[0]));
      setActiveIssue(0); setMainTab('architecture'); setStep(2);
    } catch(e) {
      if (e instanceof SyntaxError) setError('Could not parse agent response - please try again.');
      else setError('Agent error: ' + e.message);
      setStep(0);
    }
    setLoading(false);
  };

  const exportAll = () => {
    if(!result) return;
    const a = result.architecture;
    const lines = [`NEWSLETTER PACK - ${a?.name||brandName}`, 'Generated by QB BrandOS - Newsletter Architecture Agent', ''];
    lines.push('ARCHITECTURE'); lines.push('='.repeat(60));
    lines.push(`Name: ${a?.name}`); lines.push(`Tagline: ${a?.tagline}`);
    lines.push(`Cadence: ${a?.cadence}`); lines.push('');
    result.issues?.forEach(issue => {
      lines.push('='.repeat(60));
      lines.push(`ISSUE ${String(issue.issueNumber).padStart(2,'0')} - ${issue.issueType}`);
      lines.push(`Subject: ${issue.subjectLine}`);
      lines.push(`Preview: ${issue.previewText}`); lines.push('');
      lines.push('OPENING:'); lines.push(issue.opening||''); lines.push('');
      issue.sections?.forEach(s => { lines.push(`[${s.sectionName}]`); lines.push(s.content||''); lines.push(''); });
      lines.push('CLOSING:'); lines.push(issue.closing||''); lines.push('');
      if(issue.ps) { lines.push(`P.S. ${issue.ps}`); lines.push(''); }
    });
    const blob = new Blob([lines.join('\n')], {type: 'text/plain'});
    const a2 = document.createElement('a');
    a2.href = URL.createObjectURL(blob);
    a2.download = `${brandName.replace(/\s+/g,'-').toLowerCase()}-newsletter-pack.txt`;
    a2.click();
  };

  const issues = result?.issues || [];

// ── QB CONTENT APPROVAL LOOP ─────────────────────────────────────────────────
function QBApprovalWrapper({items, renderItem, onAllApproved, itemKey='id', revisionField='content'}) {
  const [states, setStates] = React.useState(() => {
    const s = {};
    items.forEach((item,i) => { s[i] = {status:'pending', round:0, feedback:'', item}; });
    return s;
  });
  const [revising, setRevising] = React.useState({});
  const [revisionInputs, setRevisionInputs] = React.useState({});

  const allApproved = Object.values(states).every(s => s.status === 'approved' || s.status === 'removed');
  const approvedItems = Object.values(states).filter(s => s.status === 'approved').map(s => s.item);

  React.useEffect(() => {
    if (allApproved && approvedItems.length > 0) onAllApproved && onAllApproved(approvedItems);
  }, [allApproved]);

  const approve = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'approved'}}));
  const remove = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'removed'}}));
  const startRevise = (i) => setRevising(prev => ({...prev, [i]: true}));
  
  const submitRevise = async (i) => {
    const feedback = (revisionInputs[i] || '');
    if (!feedback.trim()) return;
    setStates(prev => ({...prev, [i]: {...prev[i], status:'revising', round: prev[i].round + 1, feedback}}));
    setRevising(prev => ({...prev, [i]: false}));
    
    if (window.QB_AI && states[i].round < 3) {
      try {
        const original = JSON.stringify(states[i].item);
        const prompt = 'You produced this content piece: ' + original + '\n\nThe user requests this revision: ' + feedback + '\n\nReturn ONLY the revised version as a JSON object with the same structure. No markdown, no preamble.';
        const sys = 'You are a content revision agent. Revise the content piece exactly as requested. Maintain brand voice and platform requirements. Return only valid JSON.';
        const raw = await window.QB_AI(sys, prompt, 1000);
        const jsonMatch2 = raw.match(/\{[\s\S]*\}/);
        if (!jsonMatch2) throw new SyntaxError('No JSON in revision response');
        const revised = JSON.parse(jsonMatch2[0]);
        setStates(prev => ({...prev, [i]: {...prev[i], status:'revised', item: revised}}));
      } catch(e) {
        setStates(prev => ({...prev, [i]: {...prev[i], status:'pending'}}));
      }
    }
  };

  const statusColor = {pending:'var(--text-3)', approved:'var(--patina)', removed:'var(--red)', revising:'var(--brass)', revised:'var(--phase-creation)'};
  const statusLabel = {pending:'Pending Review', approved:'✓ Approved', removed:'Removed', revising:'Revising…', revised:'Revised - Review Again'};

  return (
    <div>
      <div style={{background:'var(--bg-surface)', border:'1px solid var(--border-medium)', borderRadius:10, padding:'16px 20px', marginBottom:24, display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12}}>
        <div>
          <div style={{fontFamily:'var(--font-mono)', fontSize:10, color:'var(--brass)', letterSpacing:'.15em', textTransform:'uppercase', marginBottom:4}}>Content Review</div>
          <div style={{fontSize:13, color:'var(--text-2)'}}>{Object.values(states).filter(s=>s.status==='approved').length} approved · {Object.values(states).filter(s=>s.status==='pending'||s.status==='revised').length} pending · {Object.values(states).filter(s=>s.status==='removed').length} removed</div>
        </div>
        {allApproved && approvedItems.length > 0 && (
          <div style={{fontFamily:'var(--font-mono)', fontSize:11, padding:'8px 16px', borderRadius:6, background:'var(--patina)', color:'#E6DDD0', fontWeight:600, letterSpacing:'.1em', textTransform:'uppercase'}}>All done ✓</div>
        )}
      </div>
      
      {items.map((item, i) => {
        const s = states[i];
        if (!s) return null;
        const isRevising = revising[i];
        const maxRoundsReached = s.round >= 3;
        
        return (
          <div key={i} className="glass-card" style={{marginBottom:16, opacity: s.status==='removed' ? 0.4 : 1, borderColor: s.status==='approved' ? 'var(--patina)' : s.status==='removed' ? 'var(--red)' : 'var(--border-subtle)'}}>
            <div style={{padding:'20px 24px 0'}}>
              {renderItem(s.item, i)}
            </div>
            <div style={{display:'flex', alignItems:'center', gap:10, padding:'16px 24px', borderTop:'1px solid var(--border-subtle)', background:'var(--bg-elevated)', flexWrap:'wrap'}}>
              <div style={{fontFamily:'var(--font-mono)', fontSize:10, color:statusColor[s.status], letterSpacing:'.1em', flex:1, textTransform:'uppercase'}}>
                {statusLabel[s.status]} {s.round > 0 ? `(ROUND ${s.round}/3)` : ''}
              </div>
              
              {(s.status==='pending'||s.status==='revised') && !isRevising && (
                <>
                  <button onClick={()=>approve(i)} className="tab-btn" style={{background:'var(--patina-faint)', color:'var(--patina-lit)', borderColor:'var(--patina-dim)'}}>✓ Approve</button>
                  {!maxRoundsReached && <button onClick={()=>startRevise(i)} className="tab-btn" style={{background:'var(--brass-faint)', color:'var(--brass-lit)', borderColor:'var(--brass-dim)'}}>↻ Revise</button>}
                  <button onClick={()=>remove(i)} className="tab-btn" style={{background:'var(--red2)', color:'var(--red)', borderColor:'var(--red2)'}}>× Remove</button>
                </>
              )}
              
              {s.status==='approved' && <button onClick={()=>setStates(prev=>({...prev,[i]:{...prev[i],status:'pending'}}))} className="tab-btn">Undo</button>}
              {s.status==='revising' && <div style={{fontFamily:'var(--font-mono)', fontSize:10, color:'var(--brass)'}}>Generating revision…</div>}
            </div>
            
            {isRevising && (
              <div className="fade-in" style={{padding:'20px 24px', background:'var(--bg-surface)', borderTop:'1px solid var(--border-subtle)'}}>
                <div style={{fontFamily:'var(--font-mono)', fontSize:10, color:'var(--brass)', letterSpacing:'.1em', marginBottom:12, textTransform:'uppercase'}}>Revision Request {s.round+1}/3</div>
                <textarea
                  value={revisionInputs[i] || ''}
                  onChange={e => setRevisionInputs(prev => ({...prev, [i]: e.target.value}))}
                  placeholder="What should change? Be specific: e.g. 'Make the hook more direct' or 'Remove the question format'"
                  style={{width:'100%', background:'var(--bg-deep)', border:'1px solid var(--brass-dim)', color:'var(--text-1)', borderRadius:8, padding:'12px 16px', fontSize:14, resize:'vertical', minHeight:80, outline:'none'}}
                  rows={2}
                />
                <div style={{display:'flex', gap:12, marginTop:16}}>
                  <button onClick={()=>submitRevise(i)} className="btn-primary" style={{background:'var(--brass)', color:'#080604'}}>Submit Revision →</button>
                  <button onClick={()=>setRevising(prev=>({...prev,[i]:false}))} className="tab-btn">Cancel</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
// ── END QB CONTENT APPROVAL LOOP ─────────────────────────────────────────────
