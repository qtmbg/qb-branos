<!DOCTYPE html>
<html lang="en" data-qb-tool="newsletter-arch">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB — Newsletter Architecture Agent</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="qb-system.css">
<style>
  /* Tool-specific styles — base from qb-system.css */
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scanH{0%{left:-80%}100%{left:200%}}
.fade-in{animation:fadeIn .35s ease forwards}
.blink{animation:pulse 1.4s ease infinite}
.spin{animation:spin .9s linear infinite}
.scan-line{position:relative;overflow:hidden}
.scan-line::after{content:'';position:absolute;top:0;left:-80%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(58,95,74,0.04),transparent);animation:scanH 3s linear infinite}
.tab-btn{padding:8px 15px;border-radius:5px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono);background:transparent;border:1px solid var(--border);color:var(--text3);transition:all .2s;cursor:pointer;white-space:nowrap}
.tab-btn:hover{border-color:var(--border2);color:var(--text2)}
.tab-btn.active{background:var(--teal2);border-color:rgba(45,212,191,0.3);color:var(--teal)}
.issue-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 18px;cursor:pointer;transition:all .15s;margin-bottom:6px}
.issue-card:hover{border-color:var(--border2)}
.issue-card.active{border-color:rgba(45,212,191,0.35);background:var(--bg4)}
.section-block{background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.section-hd{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.section-hd:hover{background:var(--bg4)}
.pill{display:inline-block;padding:2px 9px;border-radius:4px;font-size:10px;font-family:var(--mono);margin:2px;letter-spacing:.04em}
.pill-teal{background:var(--teal2);color:var(--teal);border:1px solid rgba(45,212,191,0.2)}
.pill-green{background:var(--green2);color:var(--green);border:1px solid rgba(74,222,128,0.2)}
.pill-amber{background:var(--amber2);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.pill-blue{background:var(--blue2);color:var(--blue);border:1px solid rgba(96,165,250,0.2)}
.pill-purple{background:var(--purple2);color:var(--purple);border:1px solid rgba(167,139,250,0.2)}
.pill-neutral{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.slider-thumb::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--green);cursor:pointer;border:2px solid var(--bg)}
.slider-thumb::-webkit-slider-runnable-track{background:var(--border2);height:3px;border-radius:2px}
.slider-thumb{-webkit-appearance:none;width:100%;height:3px;background:var(--border2);border-radius:2px;outline:none;cursor:pointer}
</style>
<script>
// QB_SPINE v2 — API Key + QBP + Multi-provider adapter
(function(){
  var params = new URLSearchParams(window.location.search);
  // API Key
  var urlKey = params.get('apikey');
  if(urlKey) localStorage.setItem('qb_api_key', urlKey);
  window.QB_API_KEY = urlKey || localStorage.getItem('qb_api_key') || '';
  // Provider: anthropic | gemini
  var urlProvider = params.get('provider');
  if(urlProvider) localStorage.setItem('qb_provider', urlProvider);
  window.QB_PROVIDER = urlProvider || localStorage.getItem('qb_provider') || 'anthropic';
  // QBP
  var urlQBP = params.get('qbp');
  if(urlQBP){ try{ localStorage.setItem('qb_qbp', atob(urlQBP)); }catch(e){} }
  try{ window.QB_QBP = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); }catch(e){ window.QB_QBP = {}; }
  // Universal AI call — works with Anthropic or Gemini
  window.QB_AI = async function(systemPrompt, userPrompt, maxTokens){
    maxTokens = maxTokens || 4000;
    if(window.QB_PROVIDER === 'gemini'){
      var model = 'gemini-2.0-flash';
      var url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + window.QB_API_KEY;
      var body = {
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: 'user', parts: [{ text: userPrompt }] }],
        generationConfig: { maxOutputTokens: maxTokens, temperature: 0.7 }
      };
      var res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      var d = await res.json();
      if(d.error) throw new Error(d.error.message || JSON.stringify(d.error));
      return d.candidates[0].content.parts[0].text;
    } else {
      var url = 'https://api.anthropic.com/v1/messages';
      var body = {
        model: 'claude-sonnet-4-20250514',
        max_tokens: maxTokens,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      };
      var res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': window.QB_API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify(body)
      });
      var d = await res.json();
      if(d.error) throw new Error(d.error.message);
      return d.content[0].text;
    }
  };
  window.QB_AUTOFILL = function(fieldMap){
    if(!window.QB_QBP) return;
    Object.entries(fieldMap).forEach(function(kv){
      var el = document.getElementById(kv[0]) || document.querySelector('[data-qbp="'+kv[1]+'"]');
      if(el && window.QB_QBP[kv[1]] && !el.value) el.value = window.QB_QBP[kv[1]];
    });
  };
})();
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

const ARCHETYPES=['The Rebel','The Sage','The Creator','The Ruler','The Magician','The Hero','The Explorer','The Caregiver','The Jester','The Everyman','The Innocent'];
const NATURAL_FORCES=['The Ocean','Lightning','Wildfire','The River','The Earthquake','The Sunrise'];
const STEPS=['QBP Input','Generating','Newsletter'];

const ML=({c,children,mb=8})=><div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.2em',color:c||'var(--text3)',textTransform:'uppercase',marginBottom:mb}}>{children}</div>;
const Card=({children,accent,style={}})=><div style={{background:'var(--bg3)',border:`1px solid ${accent||'var(--border)'}`,borderRadius:8,padding:'16px 20px',...style}}>{children}</div>;
const TF=({label,value,onChange,placeholder,rows=1,hint})=>(
  <div style={{marginBottom:14}}>
    <ML>{label}</ML>
    {rows>1?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}/>
    :<input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>}
    {hint&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4,fontStyle:'italic'}}>{hint}</div>}
  </div>
);
const SF=({label,options,value,onChange})=>(
  <div style={{marginBottom:14}}>
    <ML>{label}</ML>
    <select value={value} onChange={e=>onChange(e.target.value)}>
      <option value="">— select —</option>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  </div>
);
const Sec=({title,n,children,note})=>(
  <div style={{marginBottom:28}}>
    <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:14,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
      <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',letterSpacing:'.2em'}}>0{n}</span>
      <span style={{fontSize:13,fontWeight:500,letterSpacing:'.05em',textTransform:'uppercase'}}>{title}</span>
      {note&&<span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{note}</span>}
    </div>
    {children}
  </div>
);

// ── SECTION BLOCK ─────────────────────────────────────────────────────────────
const SectionBlock=({label,content,color,defaultOpen=false})=>{
  const [open,setOpen]=useState(defaultOpen);
  const [copied,setCopied]=useState(false);
  const copy=async()=>{try{await navigator.clipboard.writeText(content);setCopied(true);setTimeout(()=>setCopied(false),1800);}catch(e){}};
  return(
    <div className="section-block">
      <div className="section-hd" onClick={()=>setOpen(!open)}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:5,height:5,borderRadius:'50%',background:color||'var(--teal)'}}/>
          <span style={{fontSize:12,fontWeight:500,color:'var(--text)'}}>{label}</span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {open&&<button onClick={e=>{e.stopPropagation();copy();}} style={{background:'var(--bg5)',border:'1px solid var(--border)',color:copied?'var(--green)':'var(--text3)',padding:'3px 10px',borderRadius:3,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase'}}>
            {copied?'✓ Copied':'Copy'}
          </button>}
          <span style={{color:'var(--text3)',fontSize:11,transform:open?'rotate(180deg)':'none',transition:'transform .2s'}}>↓</span>
        </div>
      </div>
      {open&&(
        <div className="fade-in" style={{padding:'0 16px 16px',borderTop:'1px solid var(--border)'}}>
          <div style={{background:'var(--bg)',borderRadius:6,padding:'14px 16px',fontSize:13,lineHeight:1.95,color:'var(--text)',whiteSpace:'pre-wrap',marginTop:12,maxHeight:500,overflowY:'auto',fontFamily:label.toLowerCase().includes('subject')?'var(--mono)':'var(--font)'}}>
            {content}
          </div>
        </div>
      )}
    </div>
  );
};

// ── ISSUE DETAIL ──────────────────────────────────────────────────────────────
const IssueDetail=({issue,index})=>{
  const [tab,setTab]=useState('issue');
  if(!issue) return null;
  const issueColors=['var(--teal)','var(--amber)','var(--blue)','var(--purple)'];
  const issueAccents=['rgba(45,212,191,0.2)','rgba(245,158,11,0.2)','rgba(96,165,250,0.2)','rgba(167,139,250,0.2)'];
  const c=issueColors[index%4];
  const a=issueAccents[index%4];

  return(
    <div className="fade-in">
      <div style={{marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <span style={{fontFamily:'var(--mono)',fontSize:10,color:c,border:`1px solid ${c}33`,padding:'2px 8px',borderRadius:3,background:`${c}11`}}>
            ISSUE {String(index+1).padStart(2,'0')}
          </span>
          {issue.issueType&&<span className="pill pill-neutral">{issue.issueType}</span>}
          {issue.readTime&&<span className="pill pill-neutral">{issue.readTime}</span>}
        </div>
        <h3 style={{fontSize:16,fontWeight:600,lineHeight:1.3,marginBottom:4,color:'var(--text)'}}>{issue.subjectLine}</h3>
        <p style={{fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>{issue.premise}</p>
      </div>

      <div style={{display:'flex',gap:5,marginBottom:16,flexWrap:'wrap'}}>
        {['issue','meta','growth'].map(t=>(
          <button key={t} className={`tab-btn${tab===t?' active':''}`} onClick={()=>setTab(t)}>
            {t==='issue'?'Full Issue':t==='meta'?'Subject + Preview':'Growth'}
          </button>
        ))}
      </div>

      {tab==='meta'&&(
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:10}}>
          <Card accent={a}>
            <ML c={c}>Subject line</ML>
            <p style={{fontSize:15,fontWeight:600,color:'var(--text)',fontFamily:'var(--mono)'}}>{issue.subjectLine}</p>
            {issue.subjectLineVariants&&(
              <div style={{marginTop:12}}>
                <ML c="var(--text3)" mb={6}>A/B variants</ML>
                {issue.subjectLineVariants.map((v,i)=>(
                  <div key={i} style={{padding:'5px 0',borderBottom:i<issue.subjectLineVariants.length-1?'1px solid var(--border)':'',fontSize:13,color:'var(--text)',fontFamily:'var(--mono)'}}>{v}</div>
                ))}
              </div>
            )}
          </Card>
          {issue.previewText&&(
            <Card>
              <ML>Preview text (inbox snippet)</ML>
              <p style={{fontSize:13,color:'var(--text)',fontFamily:'var(--mono)'}}>{issue.previewText}</p>
            </Card>
          )}
          {issue.strategicPurpose&&(
            <Card>
              <ML>Strategic purpose in the sequence</ML>
              <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.7}}>{issue.strategicPurpose}</p>
            </Card>
          )}
          {issue.bestSendTime&&(
            <div style={{fontSize:12,color:'var(--text3)'}}>Best send time: <span style={{color:'var(--text2)'}}>{issue.bestSendTime}</span></div>
          )}
        </div>
      )}

      {tab==='issue'&&(
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:6}}>
          {issue.opening&&<SectionBlock label="Opening — the hook" content={issue.opening} color={c} defaultOpen={true}/>}
          {issue.sections?.map((s,i)=>(
            <SectionBlock key={i} label={s.sectionName||`Section ${i+1}`} content={s.content} color={issueColors[(index+i+1)%4]}/>
          ))}
          {issue.closing&&<SectionBlock label="Closing + CTA" content={issue.closing} color="var(--green)"/>}
          {issue.ps&&<SectionBlock label="P.S." content={issue.ps} color="var(--text3)"/>}
        </div>
      )}

      {tab==='growth'&&(
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:10}}>
          {issue.growthHook&&(
            <Card accent={a}>
              <ML c={c}>Referral / forward hook in this issue</ML>
              <p style={{fontSize:13,color:'var(--text)',lineHeight:1.7}}>{issue.growthHook}</p>
            </Card>
          )}
          {issue.repurposeAngles&&(
            <Card>
              <ML>Repurpose angles from this issue</ML>
              {issue.repurposeAngles.map((r,i)=>(
                <div key={i} style={{display:'flex',gap:10,padding:'7px 0',borderBottom:i<issue.repurposeAngles.length-1?'1px solid var(--border)':'',fontSize:12,color:'var(--text)',lineHeight:1.5}}>
                  <span style={{color:c,flexShrink:0,fontFamily:'var(--mono)'}}>→</span>{r}
                </div>
              ))}
            </Card>
          )}
        </div>
      )}
    </div>
  );
};

// ── ARCHITECTURE PANEL ────────────────────────────────────────────────────────
const ArchitecturePanel=({data})=>{
  if(!data?.architecture) return null;
  const a=data.architecture;
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div style={{background:'var(--bg)',border:'1px solid rgba(45,212,191,0.15)',borderRadius:8,padding:'18px 22px',gridColumn:'1/-1'}} className="scan-line">
          <ML c="var(--teal)">Newsletter positioning</ML>
          <p style={{fontSize:15,lineHeight:1.8,color:'var(--text)',fontStyle:'italic'}}>"{a.positioningStatement}"</p>
        </div>
        <Card accent="rgba(45,212,191,0.2)">
          <ML c="var(--teal)">Name + tagline</ML>
          <div style={{fontSize:18,fontWeight:700,color:'var(--text)',marginBottom:6}}>{a.name}</div>
          <div style={{fontSize:13,color:'var(--text2)',fontStyle:'italic'}}>{a.tagline}</div>
          {a.nameRationale&&<p style={{fontSize:12,color:'var(--text3)',marginTop:8,lineHeight:1.5}}>{a.nameRationale}</p>}
        </Card>
        <Card>
          <ML>Format + structure</ML>
          <div style={{fontSize:12,color:'var(--text)',lineHeight:1.7,marginBottom:8}}>{a.format}</div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {a.sections?.map((s,i)=><span key={i} className="pill pill-teal">{s}</span>)}
          </div>
        </Card>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
        <Card>
          <ML>Cadence</ML>
          <p style={{fontSize:13,color:'var(--text)',lineHeight:1.6}}>{a.cadence}</p>
        </Card>
        <Card>
          <ML>Ideal reader</ML>
          <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>{a.idealReader}</p>
        </Card>
        <Card>
          <ML>Tone + register</ML>
          <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>{a.toneRegister}</p>
        </Card>
      </div>

      {a.signatureElements&&(
        <Card accent="rgba(74,222,128,0.15)">
          <ML c="var(--green)">Signature elements — what makes every issue recognizable</ML>
          {a.signatureElements.map((e,i)=>(
            <div key={i} style={{display:'flex',gap:10,padding:'7px 0',borderBottom:i<a.signatureElements.length-1?'1px solid var(--border)':'',fontSize:12,color:'var(--text)',lineHeight:1.5}}>
              <span style={{color:'var(--green)',flexShrink:0}}>✦</span>{e}
            </div>
          ))}
        </Card>
      )}

      {a.growthStrategy&&(
        <Card>
          <ML>Growth + subscriber strategy</ML>
          <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.7}}>{a.growthStrategy}</p>
        </Card>
      )}

      {a.platformRecommendation&&(
        <Card accent="rgba(167,139,250,0.2)">
          <ML c="var(--purple)">Platform recommendation</ML>
          <p style={{fontSize:13,color:'var(--text)',lineHeight:1.7}}>{a.platformRecommendation}</p>
        </Card>
      )}

      {a.welcomeEmailOutline&&(
        <Card>
          <ML>Welcome email — outline</ML>
          <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.8,whiteSpace:'pre-wrap'}}>{a.welcomeEmailOutline}</p>
        </Card>
      )}
    </div>
  );
};

// ── MAIN APP ──────────────────────────────────────────────────────────────────
export default function App(){
  const [step,setStep]=useState(0);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [result,setResult]=useState(null);
  const [activeIssue,setActiveIssue]=useState(0);
  const [mainTab,setMainTab]=useState('architecture');

  const [brandName,setBrandName]=useState('');
  const [founderName,setFounderName]=useState('');
  const [brandEssence,setBrandEssence]=useState('');
  const [spark,setSpark]=useState('');
  const [naturalForce,setNaturalForce]=useState('');
  const [archetype,setArchetype]=useState('');
  const [manifestoLine,setManifestoLine]=useState('');
  const [antiBrand,setAntiBrand]=useState('');
  const [primaryPersona,setPrimaryPersona]=useState('');
  const [offer,setOffer]=useState('');
  const [transformation,setTransformation]=useState('');
  const [voiceNotes,setVoiceNotes]=useState('');
  const [alwaysNever,setAlwaysNever]=useState('');
  const [newsletterGoal,setNewsletterGoal]=useState('');
  const [existingNewsletter,setExistingNewsletter]=useState('');
  const [newsletterName,setNewsletterName]=useState('');

  const isValid=()=>brandName&&brandEssence&&naturalForce&&archetype&&primaryPersona&&offer;

  const buildPrompt=()=>`You are the Newsletter Architecture Agent inside the Quantum Branding BrandOS ecosystem.
Your function is to design a complete newsletter system and write the first 4 issues fully from a Quantum Brand Profile.
The newsletter is the highest-leverage owned channel — no algorithm between the brand and the audience.
Return ONLY valid JSON — no markdown, no preamble.

QUANTUM BRAND PROFILE:
Brand: ${brandName}
Author: ${founderName||'[Author]'}
Brand Essence: ${brandEssence}
The Spark: ${spark||'not specified'}
Natural Force: ${naturalForce}
Archetype: ${archetype}
Manifesto: ${manifestoLine||'not specified'}
Anti-Brand: ${antiBrand||'not specified'}
Primary Persona: ${primaryPersona}
Core Offer: ${offer}
Transformation: ${transformation||'not specified'}
Voice Notes: ${voiceNotes||'not specified'}
Always/Never: ${alwaysNever||'not specified'}
Newsletter Goal: ${newsletterGoal||'Build owned audience, establish authority, drive toward offer'}
Existing Newsletter: ${existingNewsletter||'none'}
Newsletter Name Idea: ${newsletterName||'generate one'}

Return a JSON object with EXACTLY this structure:
{
  "architecture": {
    "name": "the newsletter name — specific, memorable, brand-aligned",
    "tagline": "one-line positioning statement for the newsletter",
    "nameRationale": "2-3 sentences on why this name works for this brand",
    "positioningStatement": "what this newsletter is, who it's for, and why it exists — one sentence",
    "format": "2-3 sentences describing the format structure — length, feel, what a typical issue contains",
    "sections": ["section name 1", "section name 2", "section name 3"],
    "cadence": "send frequency and day recommendation with reasoning",
    "idealReader": "specific description of who subscribes and why",
    "toneRegister": "how this newsletter sounds — 2 sentences. Different from the brand's other channels how?",
    "signatureElements": ["distinctive recurring element — e.g. opening ritual, sign-off phrase, section header style"],
    "growthStrategy": "how to grow the list — first 100, first 1000, ongoing",
    "platformRecommendation": "which platform to use and why — Beehiiv, Substack, ConvertKit, etc. specific reasoning",
    "welcomeEmailOutline": "the welcome email sequence — what each email in the onboarding does"
  },
  "issues": [
    {
      "issueNumber": 1,
      "issueType": "Manifesto | Deep dive | Framework | Story | Challenge | Observation",
      "subjectLine": "the exact subject line — specific, not generic",
      "subjectLineVariants": ["variant A", "variant B"],
      "previewText": "the preview text that appears in inbox — 40-90 chars",
      "premise": "what this issue is about in one sentence",
      "readTime": "e.g. 4 min read",
      "strategicPurpose": "what this issue achieves in the 4-issue arc",
      "bestSendTime": "e.g. Tuesday 7am — with reasoning",
      "opening": "the complete opening section — the hook paragraph or two that makes the reader stay. Written fully. On-brand voice. Not a generic introduction.",
      "sections": [
        {
          "sectionName": "section name / header",
          "content": "complete section content — word for word, fully written, on-brand voice, as if ready to send. Every section should feel like the author is talking directly to the reader."
        }
      ],
      "closing": "the complete closing — the wrap, the one thing to remember, and the specific CTA. Not generic.",
      "ps": "the P.S. — an afterthought, a human moment, or a secondary CTA. This is often the most-read part of any email.",
      "growthHook": "the referral or forward prompt embedded naturally in this issue",
      "repurposeAngles": ["LinkedIn post angle from this issue", "Instagram quote angle", "YouTube video angle"]
    }
  ]
}

REQUIREMENTS:
- 4 issues — each fully written. No placeholders, no summaries, no outlines.
- Issue 1: Manifesto / Why this newsletter exists — sets the tone, establishes authority, makes a promise
- Issue 2: A belief challenge — takes a contrarian position the persona needs to hear
- Issue 3: A framework or method reveal — demonstrates expertise, gives real value
- Issue 4: A transformation story or case — proves the method works, drives toward offer naturally
- Every section must be complete prose, not bullets or headers only
- Voice must match the QBP voice notes — sounds like this specific person, not a generic newsletter
- Opening hooks must earn the read — first paragraph determines everything
- Architecture sections: exactly 3 recurring sections per issue (same structure each issue = signature format)
- All 4 issues together tell a story that moves the reader from stranger to believer`;

  const run=async()=>{
    if(!isValid()){setError('Complete required fields (*).');return;}
    setError('');setLoading(true);setStep(1);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':window.QB_API_KEY||'','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:14000,
          messages:[{role:'user',content:buildPrompt()}]
        })
      });
      const d=await res.json();
      if(d.error) throw new Error(d.error.message);
      const raw=d.content[0].text.trim();
      const clean=raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').replace(/^```\s*/,'').trim();
      setResult(JSON.parse(clean));
      setActiveIssue(0);setMainTab('architecture');setStep(2);
    }catch(e){setError('Agent error: '+e.message);setStep(0);}
    setLoading(false);
  };

  const exportAll=()=>{
    if(!result) return;
    const a=result.architecture;
    const lines=[`NEWSLETTER PACK — ${a?.name||brandName}`,'Generated by QB BrandOS — Newsletter Architecture Agent',''];
    lines.push('ARCHITECTURE');lines.push('='.repeat(60));
    lines.push(`Name: ${a?.name}`);lines.push(`Tagline: ${a?.tagline}`);
    lines.push(`Cadence: ${a?.cadence}`);lines.push('');
    result.issues?.forEach(issue=>{
      lines.push('='.repeat(60));
      lines.push(`ISSUE ${String(issue.issueNumber).padStart(2,'0')} — ${issue.issueType}`);
      lines.push(`Subject: ${issue.subjectLine}`);
      lines.push(`Preview: ${issue.previewText}`);lines.push('');
      lines.push('OPENING:');lines.push(issue.opening||'');lines.push('');
      issue.sections?.forEach(s=>{lines.push(`[${s.sectionName}]`);lines.push(s.content||'');lines.push('');});
      lines.push('CLOSING:');lines.push(issue.closing||'');lines.push('');
      if(issue.ps){lines.push(`P.S. ${issue.ps}`);lines.push('');}
    });
    const blob=new Blob([lines.join('\n')],{type:'text/plain'});
    const a2=document.createElement('a');
    a2.href=URL.createObjectURL(blob);
    a2.download=`${brandName.replace(/\s+/g,'-').toLowerCase()}-newsletter-pack.txt`;
    a2.click();
  };

  const issues=result?.issues||[];

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header style={{borderBottom:'1px solid var(--border)',padding:'16px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--bg)',position:'sticky',top:0,zIndex:50}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.3em',color:'var(--green)',textTransform:'uppercase'}}>QB_BRANIDOS</div>
          <div style={{width:1,height:14,background:'var(--border)'}}/>
          <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.2em',color:'var(--text3)',textTransform:'uppercase'}}>Newsletter Architecture Agent v1.0</div>
        </div>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          {STEPS.map((s,i)=>(
            <React.Fragment key={i}>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:i<step?'var(--green)':i===step?'var(--green)':'var(--border)',opacity:i===step?1:i<step?.6:.3,boxShadow:i===step?'0 0 5px rgba(74,222,128,.5)':''}}/>
                <span style={{fontSize:10,color:i<=step?'var(--text2)':'var(--text4)',fontFamily:'var(--mono)',letterSpacing:'.1em'}}>{s}</span>
              </div>
              {i<STEPS.length-1&&<div style={{width:12,height:1,background:'var(--border)',margin:'0 2px'}}/>}
            </React.Fragment>
          ))}
        </div>
      </header>

      <main style={{flex:1,maxWidth:1100,margin:'0 auto',width:'100%',padding:'36px 24px'}}>

        {step===0&&(
          <div className="fade-in">
            <div style={{marginBottom:36}}>
              <ML c="var(--green)">// Phase 03 — Content Creation</ML>
              <h1 style={{fontSize:26,fontWeight:700,lineHeight:1.2,marginBottom:8}}>Newsletter Architecture Agent</h1>
              <p style={{color:'var(--text2)',fontSize:14,lineHeight:1.7,maxWidth:640}}>The highest-leverage owned channel — no algorithm, direct access to the audience. This agent designs the full newsletter system and writes the first 4 issues completely. Name, format, cadence, growth strategy, and every word of four ready-to-send issues.</p>
            </div>

            <Sec n={1} title="Brand Core" note="* required">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <TF label="Brand Name *" value={brandName} onChange={setBrandName} placeholder="The brand behind the newsletter" rows={1}/>
                <TF label="Author Name" value={founderName} onChange={setFounderName} placeholder="Who writes it — the by-line" rows={1}/>
              </div>
              <TF label="Brand Essence *" value={brandEssence} onChange={setBrandEssence} placeholder="Irreducible truth" rows={2}/>
              <TF label="The Spark" value={spark} onChange={setSpark} placeholder="Who this brand is, why it exists, what transformation it creates" rows={3}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <SF label="Natural Force *" options={NATURAL_FORCES} value={naturalForce} onChange={setNaturalForce}/>
                <SF label="Primary Archetype *" options={ARCHETYPES} value={archetype} onChange={setArchetype}/>
              </div>
            </Sec>

            <Sec n={2} title="Audience + Offer" note="* required">
              <TF label="Primary Persona *" value={primaryPersona} onChange={setPrimaryPersona} placeholder="Who subscribes — role, struggle, desire. Specific." rows={3} hint="The more specific, the more precisely the issues will speak to the right person"/>
              <TF label="Core Offer *" value={offer} onChange={setOffer} placeholder="What this brand sells — the newsletter must eventually lead here naturally" rows={2}/>
              <TF label="Transformation" value={transformation} onChange={setTransformation} placeholder="Before → after" rows={1}/>
              <TF label="Manifesto Line" value={manifestoLine} onChange={setManifestoLine} placeholder="The one belief" rows={1}/>
            </Sec>

            <Sec n={3} title="Voice + Newsletter Context">
              <TF label="Voice Notes" value={voiceNotes} onChange={setVoiceNotes} placeholder="How this brand writes — rhythm, register, what it refuses to sound like" rows={2}/>
              <TF label="Always / Never" value={alwaysNever} onChange={setAlwaysNever} placeholder="Writing rules for copy" rows={2}/>
              <TF label="Anti-Brand" value={antiBrand} onChange={setAntiBrand} placeholder="What this newsletter refuses to be" rows={1}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <TF label="Newsletter Name Idea" value={newsletterName} onChange={setNewsletterName} placeholder="Leave blank to generate, or suggest a direction" rows={1}/>
                <TF label="Newsletter Goal" value={newsletterGoal} onChange={setNewsletterGoal} placeholder="e.g. Build owned audience, drive to offer, establish authority" rows={1}/>
              </div>
              <TF label="Existing Newsletter (if any)" value={existingNewsletter} onChange={setExistingNewsletter} placeholder="Current name, platform, cadence, what's working / not working" rows={2}/>
            </Sec>

            {error&&<div style={{background:'var(--red2)',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,padding:'11px 15px',marginBottom:16,fontSize:13,color:'var(--red)'}}>{error}</div>}
            <div style={{display:'flex',justifyContent:'flex-end'}}>
              <button onClick={run} disabled={!isValid()} style={{background:isValid()?'var(--green)':'var(--bg3)',color:isValid()?'#000':'var(--text3)',padding:'12px 28px',borderRadius:6,fontWeight:700,fontSize:13,letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)',transition:'all .2s'}}>
                Build Newsletter System →
              </button>
            </div>
          </div>
        )}

        {step===1&&(
          <div className="fade-in" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:460,gap:24,textAlign:'center'}}>
            <div style={{width:52,height:52,border:'2px solid var(--border)',borderTop:'2px solid var(--green)',borderRadius:'50%'}} className="spin"/>
            <div>
              <ML c="var(--green)">Agent Processing</ML>
              <div style={{color:'var(--text2)',fontSize:13,lineHeight:2.1,maxWidth:420}}>
                Reading Quantum Brand Profile<br/>
                Designing newsletter name + architecture<br/>
                Building signature format + sections<br/>
                Writing Issue 01 — Manifesto<br/>
                Writing Issue 02 — Belief challenge<br/>
                Writing Issue 03 — Framework reveal<br/>
                Writing Issue 04 — Transformation story<br/>
                Building growth + repurpose system...
              </div>
            </div>
            <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>Architecture · 4 complete issues · repurpose system</div>
          </div>
        )}

        {step===2&&result&&(
          <div className="fade-in">
            <div style={{marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
              <div>
                <ML c="var(--green)">// Newsletter System — Complete</ML>
                <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{result.architecture?.name||brandName}</h1>
                <p style={{color:'var(--text2)',fontSize:13}}>{result.architecture?.tagline} · {issues.length} issues ready to send</p>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={exportAll} style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',padding:'8px 14px',borderRadius:5,fontSize:11,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase'}}>Export Pack</button>
                <button onClick={()=>{setStep(0);setResult(null);}} style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',padding:'8px 14px',borderRadius:5,fontSize:11,fontFamily:'var(--mono)',letterSpacing:'.1em',textTransform:'uppercase'}}>New Newsletter</button>
              </div>
            </div>

            <div style={{display:'flex',gap:6,marginBottom:20,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>
              <button className={`tab-btn${mainTab==='architecture'?' active':''}`} onClick={()=>setMainTab('architecture')}>Architecture</button>
              <button className={`tab-btn${mainTab==='issues'?' active':''}`} onClick={()=>setMainTab('issues')}>4 Issues</button>
            </div>

            {mainTab==='architecture'&&<ArchitecturePanel data={result}/>}

            {mainTab==='issues'&&(
              <div style={{display:'grid',gridTemplateColumns:'240px 1fr',gap:24,alignItems:'start'}}>
                <div>
                  <ML c="var(--text3)" mb={10}>4 issues — select to read</ML>
                  {issues.map((issue,i)=>{
                    const colors=['var(--teal)','var(--amber)','var(--blue)','var(--purple)'];
                    const borders=['rgba(45,212,191,0.2)','rgba(245,158,11,0.2)','rgba(96,165,250,0.2)','rgba(167,139,250,0.2)'];
                    return(
                      <div key={i} className={`issue-card${activeIssue===i?' active':''}`} onClick={()=>setActiveIssue(i)}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                          <span style={{fontFamily:'var(--mono)',fontSize:9,color:colors[i],border:`1px solid ${borders[i]}`,padding:'1px 6px',borderRadius:2,background:`${colors[i]}11`}}>
                            {String(i+1).padStart(2,'0')}
                          </span>
                          {issue.issueType&&<span className="pill pill-neutral">{issue.issueType}</span>}
                        </div>
                        <div style={{fontSize:12,fontWeight:500,color:'var(--text)',lineHeight:1.3,marginBottom:4}}>{issue.subjectLine}</div>
                        <div style={{fontSize:11,color:'var(--text3)'}}>{issue.readTime}</div>
                      </div>
                    );
                  })}
                </div>
                <IssueDetail issue={issues[activeIssue]} index={activeIssue}/>
              </div>
            )}
          </div>
        )}

      </main>

      <footer style={{borderTop:'1px solid var(--border)',padding:'12px 24px',display:'flex',justifyContent:'space-between'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.2em',textTransform:'uppercase'}}>Quantum Branding BrandOS</span>
        <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.15em'}}>Newsletter Architecture Agent / Phase 03</span>
      </footer>
    </div>
  );
}

// ── QB CONTENT APPROVAL LOOP ─────────────────────────────────────────────────
// Injected by QB OS build system
// Adds approve/revise/remove to each content piece, up to 3 rounds

function QBApprovalWrapper({items, renderItem, onAllApproved, itemKey='id', revisionField='content'}) {
  const [states, setStates] = React.useState(() => {
    const s = {};
    items.forEach((item,i) => { s[i] = {status:'pending', round:0, feedback:'', item}; });
    return s;
  });
  const [revising, setRevising] = React.useState({});

  const allApproved = Object.values(states).every(s => s.status === 'approved' || s.status === 'removed');
  const approvedItems = Object.values(states).filter(s => s.status === 'approved').map(s => s.item);

  React.useEffect(() => {
    if (allApproved && approvedItems.length > 0) onAllApproved && onAllApproved(approvedItems);
  }, [allApproved]);

  const approve = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'approved'}}));
  const remove = (i) => setStates(prev => ({...prev, [i]: {...prev[i], status:'removed'}}));
  const startRevise = (i) => setRevising(prev => ({...prev, [i]: true}));
  const submitRevise = async (i) => {
    const feedback = document.getElementById('revision-input-' + i)?.value || '';
    if (!feedback.trim()) return;
    setStates(prev => ({...prev, [i]: {...prev[i], status:'revising', round: prev[i].round + 1, feedback}}));
    setRevising(prev => ({...prev, [i]: false}));
    // Trigger regeneration via QB_AI
    if (window.QB_AI && states[i].round < 3) {
      try {
        const original = JSON.stringify(states[i].item);
        const prompt = 'You produced this content piece: ' + original + '\n\nThe user requests this revision: ' + feedback + '\n\nReturn ONLY the revised version as a JSON object with the same structure. No markdown, no preamble.';
        const sys = 'You are a content revision agent. Revise the content piece exactly as requested. Maintain brand voice and platform requirements. Return only valid JSON.';
        const raw = await window.QB_AI(sys, prompt, 1000);
        const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').replace(/^```\s*/,'').trim();
        const revised = JSON.parse(clean);
        setStates(prev => ({...prev, [i]: {...prev[i], status:'revised', item: revised}}));
      } catch(e) {
        setStates(prev => ({...prev, [i]: {...prev[i], status:'pending'}}));
      }
    }
  };

  const statusColor = {pending:'var(--text3)', approved:'var(--green)', removed:'var(--red)', revising:'var(--amber)', revised:'var(--blue)'};
  const statusLabel = {pending:'Pending review', approved:'✓ Approved', removed:'Removed', revising:'Revising…', revised:'Revised — review again'};

  return (
    <div>
      <div style={{background:'rgba(74,222,128,0.05)',border:'1px solid rgba(74,222,128,0.15)',borderRadius:8,padding:'12px 16px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:2}}>Content Review</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>{Object.values(states).filter(s=>s.status==='approved').length} approved · {Object.values(states).filter(s=>s.status==='pending'||s.status==='revised').length} pending · {Object.values(states).filter(s=>s.status==='removed').length} removed</div>
        </div>
        {allApproved && approvedItems.length > 0 && (
          <div style={{fontFamily:'var(--mono)',fontSize:10,padding:'6px 14px',borderRadius:5,background:'var(--green)',color:'#000',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase'}}>All done ✓</div>
        )}
      </div>
      {items.map((item, i) => {
        const s = states[i];
        if (!s) return null;
        const isRevising = revising[i];
        const maxRoundsReached = s.round >= 3;
        return (
          <div key={i} style={{background:'var(--bg3)',border:'1px solid '+(s.status==='approved'?'rgba(74,222,128,0.2)':s.status==='removed'?'rgba(239,68,68,0.15)':'var(--border)'),borderRadius:10,marginBottom:12,overflow:'hidden',opacity:s.status==='removed'?0.4:1,transition:'all .2s'}}>
            <div style={{padding:'14px 18px 0'}}>
              {renderItem(s.item, i)}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 18px',borderTop:'1px solid var(--border)',background:'rgba(0,0,0,0.2)',flexWrap:'wrap'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:statusColor[s.status],letterSpacing:'.1em',flex:1}}>
                {statusLabel[s.status]} {s.round > 0 ? '(Round '+s.round+'/3)' : ''}
              </div>
              {(s.status==='pending'||s.status==='revised') && !isRevising && (
                <>
                  <button onClick={()=>approve(i)} style={{background:'rgba(74,222,128,0.12)',color:'var(--green)',border:'1px solid rgba(74,222,128,0.2)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.08em',cursor:'pointer'}}>✓ Approve</button>
                  {!maxRoundsReached && <button onClick={()=>startRevise(i)} style={{background:'rgba(245,158,11,0.1)',color:'var(--amber)',border:'1px solid rgba(245,158,11,0.2)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.08em',cursor:'pointer'}}>↻ Revise</button>}
                  <button onClick={()=>remove(i)} style={{background:'rgba(239,68,68,0.08)',color:'var(--red)',border:'1px solid rgba(239,68,68,0.15)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'.08em',cursor:'pointer'}}>× Remove</button>
                </>
              )}
              {s.status==='approved' && <button onClick={()=>setStates(prev=>({...prev,[i]:{...prev[i],status:'pending'}}))} style={{background:'none',color:'var(--text3)',border:'1px solid var(--border)',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>Undo</button>}
              {s.status==='revising' && <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--amber)'}}>Generating revision…</div>}
            </div>
            {isRevising && (
              <div style={{padding:'12px 18px',background:'rgba(245,158,11,0.04)',borderTop:'1px solid rgba(245,158,11,0.1)'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)',letterSpacing:'.1em',marginBottom:6}}>REVISION REQUEST {s.round+1}/3</div>
                <textarea id={'revision-input-'+i} placeholder="What should change? Be specific: e.g. 'Make the hook more direct' or 'Remove the question format'" style={{width:'100%',background:'var(--bg3)',border:'1px solid rgba(245,158,11,0.2)',color:'var(--text)',borderRadius:6,padding:'10px 14px',fontSize:12,fontFamily:'var(--font)',resize:'vertical',minHeight:60,outline:'none'}} rows={2}/>
                <div style={{display:'flex',gap:8,marginTop:8}}>
                  <button onClick={()=>submitRevise(i)} style={{background:'var(--amber)',color:'#000',padding:'7px 16px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',fontWeight:700,letterSpacing:'.08em',cursor:'pointer'}}>Submit Revision →</button>
                  <button onClick={()=>setRevising(prev=>({...prev,[i]:false}))} style={{background:'none',color:'var(--text3)',border:'1px solid var(--border)',padding:'7px 12px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',cursor:'pointer'}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
// ── END QB CONTENT APPROVAL LOOP ─────────────────────────────────────────────

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
