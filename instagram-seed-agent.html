<script>
// Theme init & Flash Prevention
(function() {
  try {
    var theme = localStorage.getItem('qb-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    
    window.toggleTheme = function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('qb-theme', next);
    };
  } catch(e) {}
})();

<script>
// QB_SPINE v3 - hardened API adapter + base64url-safe QBP decoding
(function(){
  var params = new URLSearchParams(window.location.search);

  function decodeQBP(value){
    if(!value) return null;
    try{
      var normalized = value.replace(/-/g,'+').replace(/_/g,'/').replace(/\s/g,'+');
      while(normalized.length % 4) normalized += '=';
      return atob(normalized);
    }catch(e){
      return null;
    }
  }

  var urlQBP = params.get('qbp');
  if(urlQBP){
    try{
      var decoded = decodeQBP(urlQBP);
      if(decoded) localStorage.setItem('qb_qbp', decoded);
      else localStorage.setItem('qb_qbp_error', 'Invalid qbp payload');
    }catch(e){
      localStorage.setItem('qb_qbp_error', 'Invalid qbp payload');
    }
  }

  try{ window.QB_QBP = JSON.parse(localStorage.getItem('qb_qbp') || '{}'); }
  catch(e){ window.QB_QBP = {}; }

  window.QB_API = async function(payload){
    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    var raw = await res.text();
    var data = {};
    try { data = raw ? JSON.parse(raw) : {}; }
    catch(e){
      throw new Error('Invalid JSON response from /api/claude');
    }

    if(!res.ok){
      var message = (data && data.error && data.error.message) || data.message || ('HTTP ' + res.status + ': ' + res.statusText);
      throw new Error(message);
    }

    if(data.error){
      throw new Error(data.error.message || data.error || 'Unknown API error');
    }

    return data;
  };

  window.QB_AI = async function(systemPrompt, userPrompt, maxTokens){
    maxTokens = maxTokens || 4000;
    var data = await window.QB_API({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    });

    var textBlock = data && data.content && data.content[0] && data.content[0].text;
    if(!textBlock) throw new Error('No text returned from AI response');
    return textBlock;
  };
})();</script>

<script type="text/babel">
const {useState,useEffect}=React;

// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const CONTENT_ARCS = [
  {id:'identity',label:'Identity arc',desc:'Posts 1-3 establish WHO you are - energy, philosophy, force'},
  {id:'belief',label:'Belief arc',desc:'Posts 4-6 establish WHAT you stand for - manifesto, stance, conviction'},

// Entangled Time Phase Color Mappings
const ARC_COLORS = {
    identity: '#4A7A5E', // Discovery/Patina
    belief: '#4A7A8A',   // Creation/Teal
    work: '#8A5A5A',     // Content/Rose
    community: '#5A7A6A' // Execution/Sage
};
const ARC_BG = {
    identity: 'rgba(74, 122, 94, 0.08)',
    belief: 'rgba(74, 122, 138, 0.08)',
    work: 'rgba(138, 90, 90, 0.08)',
    community: 'rgba(90, 122, 106, 0.08)'
};
const ARC_BORDER = {
    identity: 'rgba(74, 122, 94, 0.25)',
    belief: 'rgba(74, 122, 138, 0.25)',
    work: 'rgba(138, 90, 90, 0.25)',
    community: 'rgba(90, 122, 106, 0.25)'
};

const normalizeArc = (arc, index) => {
  if (arc && ARC_COLORS[arc]) return arc;
  if (index < 3) return 'identity';
  if (index < 6) return 'belief';
  if (index < 9) return 'work';
  return 'community';
};

const sectionNumber = (number) => String(number).padStart(2, '0');

const stripCodeFence = (raw='') => raw
  .replace(/^```json\s*/i,'')
  .replace(/^```\s*/i,'')
  .replace(/\s*```$/,'')
  .trim();

// ── SHARED UI ──────────────────────────────────────────────────────────────────
const MonoLabel=({c,children,mb=8})=><div style={{fontFamily:'var(--font-mono)',fontSize:10,letterSpacing:'.15em',color:c||'var(--text-3)',textTransform:'uppercase',marginBottom:mb}}>{children}</div>;
const Card=({children,accent,style={}})=><div className="glass-card" style={{border:`1px solid ${accent||'var(--border-subtle)'}`,padding:'24px',...style}}>{children}</div>;
const TF=({label,value,onChange,placeholder,rows=1,hint})=>(
  <div style={{marginBottom:16}}>

const Section=({title,number,children,note})=>(

// ── GRID VIEW ─────────────────────────────────────────────────────────────────

// ── MAIN APP ──────────────────────────────────────────────────────────────────
const STEPS=['QBP Input','Generating','Content Pack'];

function App(){

    if (q.manifesto) setManifestoLine(q.manifesto);

    if (q.naturalForce) setNaturalForce(q.naturalForce);
    if (q.archetype) setArchetype(q.archetype);
    if (q.antiBrand) setAntiBrand(q.antiBrand);
    if (q.primaryPersona) setPrimaryPersona(q.primaryPersona);
    if (q.offer) setOffer(q.offer);
    if (q.voiceNotes) setVoiceNotes(q.voiceNotes);
    if (q.visualNotes) setVisualNotes(q.visualNotes);
    if (q.alwaysNever) setAlwaysNever(q.alwaysNever);
    if (q.colorPalette) setColorPalette(q.colorPalette);
    else if (q.colorTerritory) setColorPalette(q.colorTerritory);
    if (q.profileBio) setProfileBio(q.profileBio);
    if (q.accountGoal) setAccountGoal(q.accountGoal);
  }, []);

  const isValid=()=>brandName&&brandEssence&&naturalForce&&archetype&&primaryPersona;

  const buildPrompt=()=>`QUANTUM BRAND PROFILE:
Brand: ${brandName}
Essence: ${brandEssence}
Manifesto: ${manifestoLine||'not specified'}
The Spark: ${spark||'not specified'}
Natural Force: ${naturalForce}
Archetype: ${archetype}
Anti-Brand: ${antiBrand||'not specified'}
Primary Persona: ${primaryPersona}
Core Offer: ${offer||'not specified'}
Voice Notes: ${voiceNotes||'not specified'}
Visual / Color: ${visualNotes||'not specified'} - Palette: ${colorPalette||'not specified'}
Always/Never: ${alwaysNever||'not specified'}
Profile Bio: ${profileBio||'not specified'}
Account Goal: ${accountGoal||'Establish brand presence and attract ideal clients'}

Return a JSON object with this EXACT structure:
{
  "strategy": {
    "intent": "2-3 sentence strategic intent for this 12-post sequence",
    "arcIntentions": {
      "identity": "what the identity arc establishes for this specific brand",
      "belief": "what the belief arc establishes",
      "work": "what the work arc establishes",

    },

  },
  "posts": [
    {
      "postNumber": 1,
      "arc": "identity",

  const posts=result?.posts||[];
  
  return(
    <div style={{position:'relative', zIndex:2, display:'flex', flexDirection:'column', minHeight:'100vh'}}>

      {/* HEADER */}
      <div style={{padding:'16px 24px 0', position:'sticky', top:0, zIndex:50}}>
        <header className="glass-card" style={{padding:'16px 24px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
            <div style={{display:'flex', alignItems:'center', gap:16}}>
                <div className="pulse-dot"></div>
                <div style={{fontFamily:'var(--font-serif)', fontSize:18, color:'var(--text-1)', letterSpacing:'-0.01em'}}>QB BrandOS</div>
                <div style={{width:1, height:14, background:'var(--border-strong)'}}/>
                <div style={{fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'.15em', color:'var(--text-3)', textTransform:'uppercase'}}>Instagram Seed Agent</div>
            </div>
            <div style={{display:'flex', gap:20, alignItems:'center'}}>
            <div style={{display:'flex', gap:6, alignItems:'center'}} className="hide-mobile">
                {STEPS.map((s,i)=>(
                    <React.Fragment key={i}>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <div style={{width:6,height:6,borderRadius:'50%',background:i<step?'var(--patina)':i===step?'var(--patina)':'var(--border-strong)',opacity:i===step?1:i<step?.6:.3,boxShadow:i===step?'0 0 8px var(--patina-dim)':''}}/>
                        <span style={{fontSize:10,color:i<=step?'var(--text-2)':'var(--text-4)',fontFamily:'var(--font-mono)',letterSpacing:'.1em', textTransform:'uppercase'}}>{s}</span>
                    </div>
                    {i<STEPS.length-1&&<div style={{width:16,height:1,background:'var(--border-medium)',margin:'0 4px'}}/>}
                    </React.Fragment>
                ))}
            </div>
            <button onClick={()=>window.toggleTheme()} className="btn-secondary" style={{padding:'6px 12px'}}>Theme</button>
            </div>
        </header>
      </div>

      <main style={{flex:1,maxWidth:1100,margin:'0 auto',width:'100%',padding:'48px 24px'}}>

        {/* ── STEP 0: INPUT ── */}
        {step===0&&(
          <div className="fade-in stagger-in">
            <div style={{marginBottom:56}}>
              <MonoLabel c="var(--patina)">// Phase 03 - Content Creation</MonoLabel>
              <h1 style={{fontSize:46, lineHeight:1.1, marginBottom:16}}>Instagram Seed Content Agent</h1>
              <p style={{color:'var(--text-2)',fontSize:16,lineHeight:1.7,maxWidth:600}}>Feed the QBP. The agent generates the first 12 posts - fully written captions, visual briefs, Midjourney prompts, hooks, hashtags - as a complete content pack ready to publish.</p>
            </div>

            <Section number={1} title="Brand Core" note="* required">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                <TF label="Brand Name *" value={brandName} onChange={setBrandName} placeholder="The brand entering Instagram" rows={1}/>
                <SF label="Natural Force *" options={NATURAL_FORCES} value={naturalForce} onChange={setNaturalForce}/>
              </div>
              <TF label="Brand Essence *" value={brandEssence} onChange={setBrandEssence} placeholder="The irreducible truth - one sentence" rows={2}/>
              <TF label="Manifesto Line" value={manifestoLine} onChange={setManifestoLine} placeholder="The belief that drives everything" rows={1}/>
              <TF label="The Spark - narrative synthesis" value={spark} onChange={setSpark} placeholder="Who this brand is, why it exists, what it is here to do" rows={3}/>
            </Section>

            <Section number={2} title="Identity + Audience" note="* required">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                <SF label="Primary Archetype *" options={ARCHETYPES} value={archetype} onChange={setArchetype}/>
                <TF label="Anti-Brand" value={antiBrand} onChange={setAntiBrand} placeholder="What this brand refuses to be" rows={1}/>
              </div>
              <TF label="Primary Persona *" value={primaryPersona} onChange={setPrimaryPersona} placeholder="Who is following this account - their state, desire, what they carry. Be specific." rows={3}
                hint="The more specific, the more precisely targeted every post will be"/>
              <TF label="Core Offer" value={offer} onChange={setOffer} placeholder="What this brand sells or does - the transformation it provides" rows={2}/>
              <TF label="Account Goal" value={accountGoal} onChange={setAccountGoal} placeholder="e.g. Build authority, attract discovery call bookings, grow waitlist, sell digital product" rows={1}/>
            </Section>

            <Section number={3} title="Voice + Visual System">
              <TF label="Voice Notes - how this brand writes" value={voiceNotes} onChange={setVoiceNotes} placeholder="e.g. Short declarative sentences. Challenge-first. No filler. Sounds like Dieter Rams meets Virgil Abloh." rows={2}/>
              <TF label="Always / Never" value={alwaysNever} onChange={setAlwaysNever} placeholder="e.g. Always: direct, one idea per post. Never: motivational quotes, hashtag stuffing, generic captions." rows={2}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                <TF label="Visual Direction" value={visualNotes} onChange={setVisualNotes} placeholder="e.g. Dark, editorial, architectural. Strong shadows. Minimal text on image." rows={2}/>
                <TF label="Color Palette" value={colorPalette} onChange={setColorPalette} placeholder="e.g. Deep black, warm amber, aged bronze. No bright colors." rows={2}/>
              </div>
            </Section>

            <Section number={4} title="Profile Context">
              <TF label="Current or intended bio" value={profileBio} onChange={setProfileBio} placeholder="The bio text - the agent will suggest optimizations" rows={2}/>
            </Section>

            {error&&<div style={{background:'var(--bg-surface)',border:'1px solid #8A4A4A',borderRadius:8,padding:'14px 20px',marginBottom:24,fontSize:14,color:'#8A4A4A'}}>{error}</div>}

            <div style={{display:'flex',justifyContent:'flex-end'}}>
              <button onClick={run} disabled={!isValid() || loading} className="btn-primary">
                {loading ? 'Generating…' : 'Generate 12 Posts →'}
              </button>
            </div>
          </div>
        )}

        {/* ── STEP 1: GENERATING ── */}
        {step===1&&(
          <div className="fade-in" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:460,gap:32,textAlign:'center'}}>
            <div className="pulse-dot" style={{width: 12, height: 12}}></div>
            <div>
              <div style={{fontFamily:'var(--font-serif)', fontSize:28, color:'var(--text-1)', marginBottom: 16}}>Agent Processing</div>
              <div style={{color:'var(--text-2)',fontSize:15,lineHeight:2.2,maxWidth:420, fontFamily:'var(--font-sans)'}}>
                Reading Quantum Brand Profile<br/>
                Mapping 12-post strategic arc sequence<br/>
                Writing captions in brand voice<br/>
                Building visual briefs from identity data<br/>
                Generating Midjourney prompts<br/>
                Analyzing hooks for persona resonance<br/>
                Building hashtag architecture<br/>
                Assembling content pack...
              </div>
            </div>
            <div style={{fontSize:11,color:'var(--text-3)',fontFamily:'var(--font-mono)', letterSpacing:'.15em', textTransform:'uppercase'}}>12 posts · 4 arcs · complete pack</div>
          </div>
        )}

        {/* ── STEP 2: CONTENT PACK ── */}
        {step===2&&result&&(
          <div className="fade-in stagger-in">
            {/* Header */}
            <div style={{marginBottom:32,display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:16}}>
              <div>
                <MonoLabel c="var(--patina)">// Content Pack - 12 Posts Complete</MonoLabel>
                <h1 style={{fontSize:36,marginBottom:8}}>{brandName}</h1>
                <p style={{color:'var(--text-2)',fontSize:14}}>First 12 posts · 4-arc sequence · ready to publish</p>
              </div>
              <div style={{display:'flex',gap:12,alignItems:'center', marginTop:16}}>
                {copied&&<span style={{fontSize:11,color:'var(--patina)',fontFamily:'var(--font-mono)',textTransform:'uppercase'}}>Copied ✓</span>}
                <button onClick={exportPack} className="btn-secondary">Export Pack</button>
                <button onClick={()=>{setStep(0);setResult(null);}} className="btn-secondary">New Pack</button>
              </div>
            </div>

            {/* Main tabs */}
            <div style={{display:'flex',gap:8,marginBottom:32,paddingBottom:16,borderBottom:'1px solid var(--border-medium)'}}>
              {['grid','list','strategy'].map(t=>(
                <button key={t} className={`tab-btn${mainTab===t?' active':''}`} onClick={()=>setMainTab(t)}>
                  {t==='grid'?'Grid View':t==='list'?'Post List':'Strategy'}
                </button>
              ))}
            </div>

            {/* Strategy tab */}
            {mainTab==='strategy'&&<StrategyPanel data={result}/>}

            {/* Grid + detail view */}
            {mainTab==='grid'&&(
              <div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:32,alignItems:'start'}}>
                <GridView posts={posts} selected={selectedPost} onSelect={setSelectedPost}/>
                <PostDetail post={posts[selectedPost]} index={selectedPost} onCopyCaption={copyCaption}/>
              </div>
            )}

            {/* List view */}
            {mainTab==='list'&&(
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {posts.map((p,i)=>{
                  const arc=normalizeArc(p.arc, i);
                  return(
                    <div key={i} className={`post-card${selectedPost===i?' selected':''}`}
                      onClick={()=>{setSelectedPost(i);setMainTab('grid');}}
                      style={{padding:'20px 24px'}}
                    >
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:16}}>
                        <div style={{display:'flex',alignItems:'center',gap:16,flex:1,minWidth:0}}>
                          <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:ARC_COLORS[arc],border:`1px solid ${ARC_BORDER[arc]}`,padding:'4px 8px',borderRadius:4,flexShrink:0}}>
                            {String(i+1).padStart(2,'0')}
                          </span>
                          <div style={{minWidth:0}}>
                            <div style={{fontFamily:'var(--font-serif)',fontSize:18,color:'var(--text-1)',marginBottom:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.postTitle}</div>
                            <div style={{fontSize:12,color:'var(--text-3)',fontFamily:'var(--font-mono)',textTransform:'uppercase'}}>{p.postType} · {CONTENT_ARCS.find(a=>a.id===arc)?.label}</div>
                          </div>
                        </div>
                        <div style={{fontSize:13,color:'var(--text-2)',fontStyle:'italic',flexShrink:0,maxWidth:320,textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          "{p.hook}"
                        </div>
                        <span style={{color:'var(--text-3)',fontSize:16,flexShrink:0}}>→</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </main>

      <footer style={{borderTop:'1px solid var(--border-subtle)',padding:'24px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'auto'}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text-3)',letterSpacing:'.2em',textTransform:'uppercase'}}>Quantum Branding BrandOS</span>
        <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text-3)',letterSpacing:'.15em'}}>Instagram Seed Agent / Phase 03</span>
      </footer>
    </div>
  );
}




ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
